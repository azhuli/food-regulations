    "食品器具容器包裝衛生標準附表_20230111": [{"no":"附表一 一般規定","chapter":"附表一 一般規定","content":"<div class=\"reg-table-block\">\n<p class=\"reg-intro\">本附表規定食品器具、容器及包裝之材質試驗與溶出試驗標準。溶劑模擬對象：水（pH 5以上食品）、4%醋酸（pH 5以下食品）、正庚烷（含油脂食品）、20%乙醇（含酒精食品）。使用溫度達100℃以上者，溶出條件改為95℃，30分鐘。</p>\n\n<div class=\"annex-h\">器具、容器、包裝之一般規定</div>\n<table class=\"annex-table\">\n<thead><tr><th>品名及原材料</th><th>材質試驗項目及合格標準</th><th>溶劑</th><th>溶出條件</th><th>項目及合格標準</th><th>備註</th></tr></thead>\n<tbody>\n<tr><td>銅製或銅合金製器具、容器、包裝</td><td>除具固有光澤且不生銹者外，直接接觸食品部分應全面鍍錫、鍍銀或其他適當處理</td><td>—</td><td>—</td><td>—</td><td></td></tr>\n<tr><td>鍍錫用錫</td><td>鉛：5% 以下</td><td>—</td><td>—</td><td>—</td><td></td></tr>\n<tr><td>器具、容器、包裝之製造、修補用焊料</td><td>鉛：20% 以下（罐頭外部用焊料另有特別規定）</td><td>—</td><td>—</td><td>—</td><td></td></tr>\n<tr><td>器具、容器、包裝</td><td>著色劑應符合食品添加物使用範圍及限量暨規格標準之規定</td><td>—</td><td>—</td><td>—</td><td></td></tr>\n<tr><td>玻璃、陶瓷器、施琺瑯之器具、容器<br>（a）深2.5cm以上，容量1.1L以下</td><td>—</td><td>4% 醋酸</td><td>常溫（暗處）24小時</td><td>鉛：5 ppm 以下；鎘：0.5 ppm 以下</td><td></td></tr>\n<tr><td>玻璃、陶瓷器、施琺瑯之器具、容器<br>（b）深2.5cm以上，容量1.1L以上</td><td>—</td><td>4% 醋酸</td><td>常溫（暗處）24小時</td><td>鉛：2.5 ppm 以下；鎘：0.25 ppm 以下</td><td></td></tr>\n<tr><td>玻璃、陶瓷器、施琺瑯之器具、容器<br>（c）深2.5cm以下或液體無法充滿者</td><td>—</td><td>4% 醋酸</td><td>常溫（暗處）24小時</td><td>鉛：17 μg/cm² 以下；鎘：1.7 μg/cm² 以下</td><td></td></tr>\n<tr><td rowspan=\"3\">金屬合金類<br>（與食品直接接觸面為金屬合金者）</td><td rowspan=\"3\">鉛：0.1% 以下；銻：5% 以下</td><td>水</td><td>60℃，30分鐘</td><td>砷：0.2 ppm 以下；鉛：0.4 ppm 以下；鎘：0.1 ppm 以下</td><td rowspan=\"3\">針對金屬罐（盛裝乾燥非油脂性食品者除外），適用接觸面塗布以天然油脂為主原料之塗料，塗膜中氧化鋅含量3%以上者</td></tr>\n<tr><td>0.5% 檸檬酸溶液</td><td>60℃，30分鐘</td><td>砷：0.2 ppm 以下；鉛：0.4 ppm 以下；鎘：0.1 ppm 以下</td></tr>\n<tr><td>正庚烷</td><td>25℃，1小時</td><td>蒸發殘渣：90 ppm 以下</td></tr>\n<tr><td rowspan=\"4\">金屬合金類<br>（與食品直接接觸面為合成樹脂塗漆者）</td><td rowspan=\"4\">—</td><td>水</td><td>60℃，30分鐘</td><td>酚：5 ppm 以下；甲醛：陰性；蒸發殘渣：30 ppm 以下（30 ppm以上者，氯仿可溶物30 ppm以下）</td><td rowspan=\"4\"></td></tr>\n<tr><td>4% 醋酸</td><td>60℃，30分鐘</td><td>蒸發殘渣：30 ppm 以下</td></tr>\n<tr><td>20% 乙醇</td><td>60℃，30分鐘</td><td>蒸發殘渣：30 ppm 以下</td></tr>\n<tr><td>正戊烷</td><td>25℃，1小時</td><td>環氧氯丙烷（Epichlorohydrin Monomer）：0.5 ppm 以下</td></tr>\n<tr><td>器具（附有直接通電流於食品中之裝置者）之電極</td><td>限用鐵、鋁、白金及鈦（通於食品中之電流為微量者，亦可使用不銹鋼）</td><td>—</td><td>—</td><td>—</td><td></td></tr>\n<tr><td rowspan=\"3\">塑膠類</td><td rowspan=\"3\">鉛：100 ppm 以下；鎘：100 ppm 以下。塑化劑（DEHP、DBP、BBP、DIDP、DINP、DMP、DNOP、DEP）個別含量不超過0.1%（重量比）</td><td>水</td><td>60℃，30分鐘</td><td>高錳酸鉀消耗量：10 ppm 以下</td><td rowspan=\"3\">1. 塑膠類食品器具、容器、包裝除本附表外，尚應符合附表二對應材質之規定<br>2. 材質試驗中有關塑化劑之規定，不適用聚氯乙烯材質</td></tr>\n<tr><td>4% 醋酸</td><td>60℃，30分鐘</td><td>重金屬：1 ppm 以下（以Pb計）</td></tr>\n<tr><td>正庚烷</td><td>25℃，1小時</td><td>塑化劑：DEHP 1.5 ppm以下；DBP 0.3 ppm以下；BBP 30 ppm以下；DIDP 9 ppm以下；DINP 9 ppm以下；DEHA 18 ppm以下</td></tr>\n<tr><td rowspan=\"4\">紙類<br>（與食品直接接觸面為蠟或紙漿製品者）</td><td rowspan=\"4\">螢光增白劑：不得檢出</td><td>水</td><td>60℃，30分鐘</td><td>砷：0.1 ppm以下（以As₂O₃計）；甲醛：陰性；蒸發殘渣：30 ppm以下（30 ppm以上者，氯仿可溶物40 ppm以下）</td><td rowspan=\"4\">適用於以紙漿或植物纖維為主體之餐盒、盤、碗、杯類等食品器具及容器；乳品用紙製容器應符合附表三</td></tr>\n<tr><td>4% 醋酸</td><td>60℃，30分鐘</td><td>砷：0.1 ppm以下（以As₂O₃計）；重金屬：1 ppm以下（以Pb計）；蒸發殘渣：30 ppm以下</td></tr>\n<tr><td>正庚烷</td><td>25℃，1小時</td><td>蒸發殘渣：30 ppm以下（30 ppm以上者，氯仿可溶物40 ppm以下）</td></tr>\n<tr><td>20% 乙醇</td><td>60℃，30分鐘</td><td>蒸發殘渣：30 ppm以下（30 ppm以上者，氯仿可溶物40 ppm以下）</td></tr>\n<tr><td>紙類（與食品直接接觸面為植物纖維者）</td><td colspan=\"4\">同「紙類—與食品直接接觸面為蠟或紙漿製品者」之溶出試驗規定</td><td></td></tr>\n<tr><td>紙類（與食品直接接觸面為塑膠類者）</td><td colspan=\"4\">1. 以附表二所列材質為原料者，應符合各材質之溶出試驗規定<br>2. 非附表二所列材質者，溶出試驗應符合「金屬合金類—與食品直接接觸面為合成樹脂塗漆者」之規定</td><td></td></tr>\n</tbody>\n</table>\n\n<div class=\"annex-notes\">\n<p class=\"notes-title\">附註</p>\n<ol>\n<li>各溶劑之模擬對象：水→pH 5以上之食品；4%醋酸、0.5%檸檬酸溶液→pH 5以下（含pH5）之食品；正庚烷→含表面油脂及脂肪性之食品；20%乙醇溶液→含酒精成分之食品。（玻璃、陶瓷器、施琺瑯之器具、容器項目不適用）</li>\n<li>食品製造加工或調理過程之使用溫度達100℃以上者，其溶出條件為95℃，30分鐘。</li>\n<li>塑化劑簡稱：DEHP＝鄰苯二甲酸二(2-乙基己基)酯；DBP＝鄰苯二甲酸二丁酯；BBP＝鄰苯二甲酸丁苯甲酯；DIDP＝鄰苯二甲酸二異癸酯；DINP＝鄰苯二甲酸二異壬酯；DMP＝鄰苯二甲酸二甲酯；DNOP＝鄰苯二甲酸二正辛酯；DEP＝鄰苯二甲酸二乙酯；DEHA＝己二酸二辛酯。</li>\n<li>紙類規定：應使用食品用紙，不得使用廢料；不得使用回收材料。</li>\n</ol>\n</div>\n</div>"},{"no":"附表二 塑膠材質之規定","chapter":"附表二 塑膠材質之規定","content":"<div class=\"reg-table-block\">\n<p class=\"reg-intro\">各塑膠材質之材質試驗項目、合格標準及溶出試驗規定。溶出條件同附表一。使用溫度達100℃以上者，溶出條件改為95℃，30分鐘。</p>\n\n<div class=\"annex-h\">附表二 塑膠材質規定一覽</div>\n<table class=\"annex-table\">\n<thead><tr><th>材質</th><th>材質試驗項目及合格標準</th><th>溶劑</th><th>溶出條件</th><th>項目及合格標準</th><th>備註</th></tr></thead>\n<tbody>\n<tr><td rowspan=\"4\" style=\"font-weight:600\">PVC<br>聚氯乙烯</td><td rowspan=\"4\">鉛：100 ppm以下；鎘：100 ppm以下；二丁錫化物：50 ppm以下（以二氯二丁錫計）；甲酚磷酸酯：1000 ppm以下；氯乙烯單體：1 ppm以下；塑化劑（DEHP等8種）總和：不超過0.1%（重量比）</td><td>水</td><td>60℃，30分鐘</td><td>高錳酸鉀消耗量：10 ppm以下；蒸發殘渣：30 ppm以下</td><td rowspan=\"4\"></td></tr>\n<tr><td>4% 醋酸</td><td>60℃，30分鐘</td><td>重金屬：1 ppm以下（以Pb計）；蒸發殘渣：30 ppm以下</td></tr>\n<tr><td>正庚烷</td><td>25℃，1小時</td><td>蒸發殘渣：150 ppm以下</td></tr>\n<tr><td>20% 乙醇</td><td>60℃，30分鐘</td><td>蒸發殘渣：30 ppm以下</td></tr>\n\n<tr><td rowspan=\"4\" style=\"font-weight:600\">PVDC<br>聚偏二氯乙烯</td><td rowspan=\"4\">鉛：100 ppm以下；鎘：100 ppm以下；鋇：100 ppm以下；偏二氯乙烯單體：6 ppm以下</td><td>水</td><td>60℃，30分鐘</td><td>高錳酸鉀消耗量：10 ppm以下；蒸發殘渣：30 ppm以下</td><td rowspan=\"4\"></td></tr>\n<tr><td>4% 醋酸</td><td>60℃，30分鐘</td><td>重金屬：1 ppm以下（以Pb計）；蒸發殘渣：30 ppm以下</td></tr>\n<tr><td>正庚烷</td><td>25℃，1小時</td><td>蒸發殘渣：30 ppm以下</td></tr>\n<tr><td>20% 乙醇</td><td>60℃，30分鐘</td><td>蒸發殘渣：30 ppm以下</td></tr>\n\n<tr><td rowspan=\"4\" style=\"font-weight:600\">PE / PP<br>聚乙烯 / 聚丙烯</td><td rowspan=\"4\">鉛：100 ppm以下；鎘：100 ppm以下</td><td>水</td><td>60℃，30分鐘</td><td>高錳酸鉀消耗量：10 ppm以下；蒸發殘渣：30 ppm以下</td><td rowspan=\"4\"></td></tr>\n<tr><td>4% 醋酸</td><td>60℃，30分鐘</td><td>重金屬：1 ppm以下（以Pb計）；蒸發殘渣：30 ppm以下</td></tr>\n<tr><td>正庚烷</td><td>25℃，1小時</td><td>蒸發殘渣：30 ppm以下（使用溫度100℃以下者為150 ppm以下）</td></tr>\n<tr><td>20% 乙醇</td><td>60℃，30分鐘</td><td>蒸發殘渣：30 ppm以下</td></tr>\n\n<tr><td rowspan=\"4\" style=\"font-weight:600\">PS<br>聚苯乙烯</td><td rowspan=\"4\">鉛：100 ppm以下；鎘：100 ppm以下；揮發性物質（苯乙烯、甲苯、乙苯、正丙苯、異丙苯之合計）：5000 ppm以下（發泡PS為2000 ppm以下，其中苯乙烯及乙苯各應1000 ppm以下）</td><td>水</td><td>60℃，30分鐘</td><td>高錳酸鉀消耗量：10 ppm以下；蒸發殘渣：30 ppm以下</td><td rowspan=\"4\">PS餐具不適合盛裝100℃以上之食品</td></tr>\n<tr><td>4% 醋酸</td><td>60℃，30分鐘</td><td>重金屬：1 ppm以下（以Pb計）；蒸發殘渣：30 ppm以下</td></tr>\n<tr><td>正庚烷</td><td>25℃，1小時</td><td>蒸發殘渣：240 ppm以下</td></tr>\n<tr><td>20% 乙醇</td><td>60℃，30分鐘</td><td>蒸發殘渣：30 ppm以下</td></tr>\n\n<tr><td rowspan=\"4\" style=\"font-weight:600\">PET<br>聚對苯二甲酸乙二酯</td><td rowspan=\"4\">鉛：100 ppm以下；鎘：100 ppm以下</td><td>水</td><td>60℃，30分鐘</td><td>高錳酸鉀消耗量：10 ppm以下；蒸發殘渣：30 ppm以下</td><td rowspan=\"4\"></td></tr>\n<tr><td>4% 醋酸</td><td>60℃，30分鐘</td><td>重金屬：1 ppm以下（以Pb計）；銻：0.05 ppm以下；鍺：0.1 ppm以下；蒸發殘渣：30 ppm以下</td></tr>\n<tr><td>正庚烷</td><td>25℃，1小時</td><td>蒸發殘渣：30 ppm以下</td></tr>\n<tr><td>20% 乙醇</td><td>60℃，30分鐘</td><td>蒸發殘渣：30 ppm以下</td></tr>\n\n<tr><td rowspan=\"2\" style=\"font-weight:600\">以甲醛為合成原料之塑膠</td><td rowspan=\"2\">鉛：100 ppm以下；鎘：100 ppm以下</td><td>水</td><td>60℃，30分鐘</td><td>酚：陰性；甲醛：陰性</td><td rowspan=\"2\"></td></tr>\n<tr><td>4% 醋酸</td><td>60℃，30分鐘</td><td>蒸發殘渣：30 ppm以下</td></tr>\n\n<tr><td rowspan=\"3\" style=\"font-weight:600\">以甲醛-三聚氰胺為合成原料之塑膠</td><td rowspan=\"3\">鉛：100 ppm以下；鎘：100 ppm以下</td><td>水</td><td>60℃，30分鐘</td><td>酚：陰性；甲醛：陰性</td><td rowspan=\"3\"></td></tr>\n<tr><td>4% 醋酸</td><td>60℃，30分鐘</td><td>蒸發殘渣：30 ppm以下</td></tr>\n<tr><td>4% 醋酸</td><td>95℃，30分鐘</td><td>三聚氰胺：2.5 ppm以下</td></tr>\n\n<tr><td rowspan=\"4\" style=\"font-weight:600\">PMMA<br>聚甲基丙烯酸甲酯</td><td rowspan=\"4\">鉛：100 ppm以下；鎘：100 ppm以下</td><td>水</td><td>60℃，30分鐘</td><td>高錳酸鉀消耗量：10 ppm以下；蒸發殘渣：30 ppm以下</td><td rowspan=\"4\"></td></tr>\n<tr><td>4% 醋酸</td><td>60℃，30分鐘</td><td>重金屬：1 ppm以下（以Pb計）；蒸發殘渣：30 ppm以下</td></tr>\n<tr><td>正庚烷</td><td>25℃，1小時</td><td>蒸發殘渣：30 ppm以下</td></tr>\n<tr><td>20% 乙醇</td><td>60℃，30分鐘</td><td>蒸發殘渣：30 ppm以下；甲基丙烯酸甲酯單體：15 ppm以下</td></tr>\n\n<tr><td rowspan=\"4\" style=\"font-weight:600\">PA / Nylon<br>聚醯胺（尼龍）</td><td rowspan=\"4\">鉛：100 ppm以下；鎘：100 ppm以下</td><td>水</td><td>60℃，30分鐘</td><td>高錳酸鉀消耗量：10 ppm以下；蒸發殘渣：30 ppm以下</td><td rowspan=\"4\"></td></tr>\n<tr><td>4% 醋酸</td><td>60℃，30分鐘</td><td>重金屬：1 ppm以下（以Pb計）；蒸發殘渣：30 ppm以下</td></tr>\n<tr><td>正庚烷</td><td>25℃，1小時</td><td>蒸發殘渣：30 ppm以下</td></tr>\n<tr><td>20% 乙醇</td><td>60℃，30分鐘</td><td>蒸發殘渣：30 ppm以下；己內醯胺單體：15 ppm以下</td></tr>\n\n<tr><td rowspan=\"4\" style=\"font-weight:600\">PMP<br>聚甲基戊烯</td><td rowspan=\"4\">鉛：100 ppm以下；鎘：100 ppm以下</td><td>水</td><td>60℃，30分鐘</td><td>高錳酸鉀消耗量：10 ppm以下；蒸發殘渣：30 ppm以下</td><td rowspan=\"4\"></td></tr>\n<tr><td>4% 醋酸</td><td>60℃，30分鐘</td><td>重金屬：1 ppm以下（以Pb計）；蒸發殘渣：30 ppm以下</td></tr>\n<tr><td>正庚烷</td><td>25℃，1小時</td><td>蒸發殘渣：120 ppm以下</td></tr>\n<tr><td>20% 乙醇</td><td>60℃，30分鐘</td><td>蒸發殘渣：30 ppm以下</td></tr>\n\n<tr><td rowspan=\"3\" style=\"font-weight:600\">橡膠<br>（哺乳器具除外）</td><td rowspan=\"3\">鉛：100 ppm以下；鎘：100 ppm以下；2-巰基咪唑啉：陰性</td><td>水</td><td>60℃，30分鐘</td><td>酚：5 ppm以下；甲醛：陰性；蒸發殘渣：60 ppm以下</td><td rowspan=\"3\"></td></tr>\n<tr><td>4% 醋酸</td><td>60℃，30分鐘</td><td>鋅：15 ppm以下；重金屬：1 ppm以下（以Pb計）</td></tr>\n<tr><td>20% 乙醇</td><td>60℃，30分鐘</td><td>蒸發殘渣：60 ppm以下</td></tr>\n\n<tr><td rowspan=\"2\" style=\"font-weight:600\">橡膠<br>（哺乳器具）</td><td rowspan=\"2\">鉛：10 ppm以下；鎘：10 ppm以下</td><td>水</td><td>40℃，24小時</td><td>酚：5 ppm以下；甲醛：陰性；蒸發殘渣：40 ppm以下；鋅：1 ppm以下</td><td rowspan=\"2\"></td></tr>\n<tr><td>4% 醋酸</td><td>40℃，24小時</td><td>重金屬：1 ppm以下（以Pb計）</td></tr>\n\n<tr><td rowspan=\"2\" style=\"font-weight:600\">PC<br>聚碳酸酯</td><td rowspan=\"2\">鉛：100 ppm以下；鎘：100 ppm以下</td><td>水</td><td>95℃，30分鐘</td><td>高錳酸鉀消耗量：10 ppm以下；蒸發殘渣：30 ppm以下；雙酚A（嬰幼兒奶瓶除外）：0.6 ppm以下</td><td rowspan=\"2\"></td></tr>\n<tr><td>4% 醋酸</td><td>60℃，30分鐘</td><td>重金屬：1 ppm以下（以Pb計）；蒸發殘渣：30 ppm以下；雙酚A（嬰幼兒奶瓶除外）：0.6 ppm以下</td></tr>\n\n<tr><td rowspan=\"2\" style=\"font-weight:600\">PPSU<br>聚苯碸樹脂<br>（嬰幼兒奶瓶）</td><td rowspan=\"2\">鉛：100 ppm以下；鎘：100 ppm以下</td><td>水</td><td>95℃，30分鐘</td><td>高錳酸鉀消耗量：10 ppm以下；蒸發殘渣：30 ppm以下</td><td rowspan=\"2\"></td></tr>\n<tr><td>4% 醋酸</td><td>60℃，30分鐘</td><td>重金屬：1 ppm以下（以Pb計）；蒸發殘渣：30 ppm以下</td></tr>\n\n<tr><td rowspan=\"2\" style=\"font-weight:600\">PES<br>聚醚碸樹脂<br>（嬰幼兒奶瓶）</td><td rowspan=\"2\">鉛：100 ppm以下；鎘：100 ppm以下</td><td>水</td><td>95℃，30分鐘</td><td>高錳酸鉀消耗量：10 ppm以下；蒸發殘渣：30 ppm以下</td><td rowspan=\"2\"></td></tr>\n<tr><td>4% 醋酸</td><td>60℃，30分鐘</td><td>重金屬：1 ppm以下（以Pb計）；蒸發殘渣：30 ppm以下</td></tr>\n\n<tr><td rowspan=\"4\" style=\"font-weight:600\">PLA<br>聚乳酸</td><td rowspan=\"4\">鉛：100 ppm以下；鎘：100 ppm以下</td><td>水</td><td>50℃，4小時（使用溫度達50℃以上或複合材料者：60℃，30分鐘）</td><td>高錳酸鉀消耗量：10 ppm以下；蒸發殘渣：30 ppm以下；總乳酸：30 ppm以下</td><td rowspan=\"4\">PLA不適合高溫滅菌之加工或調理過程，不適合盛裝100℃以上之食品</td></tr>\n<tr><td>4% 醋酸</td><td>同水之條件</td><td>重金屬：1 ppm以下（以Pb計）；蒸發殘渣：30 ppm以下</td></tr>\n<tr><td>20% 乙醇</td><td>同水之條件</td><td>蒸發殘渣：30 ppm以下</td></tr>\n<tr><td>正庚烷</td><td>25℃，1小時</td><td>蒸發殘渣：30 ppm以下</td></tr>\n</tbody>\n</table>\n</div>"},{"no":"附表三 乳品用容器包裝材質之規定","chapter":"附表三 乳品用容器包裝材質之規定","content":"<div class=\"reg-table-block\">\n<p class=\"reg-intro\">乳品（包括鮮乳、部分脫脂乳、脫脂乳、調味乳、發酵乳、乳酸菌飲料、含乳飲料、乳脂及奶油）用之容器、包裝材質規定。</p>\n\n<div class=\"annex-h\">附表三 乳品用容器包裝材質規定一覽</div>\n<table class=\"annex-table\">\n<thead><tr><th>品名及原材料</th><th>材質試驗項目及合格標準</th><th>溶劑</th><th>溶出條件</th><th>溶出試驗合格標準</th><th>特殊試驗合格標準</th></tr></thead>\n<tbody>\n<tr><td rowspan=\"2\" style=\"font-weight:600\">乳品用之聚乙烯製容器、包裝或聚乙烯加工紙製容器包裝<br>（不含乳脂及奶油）</td><td rowspan=\"2\">正己烷抽出物：2.6%以下；二甲苯可溶物：11.3%以下；砷：2 ppm以下（以As₂O₃計）；重金屬：20 ppm以下（以Pb計）</td><td>水</td><td>60℃，30分鐘</td><td>高錳酸鉀消耗量：5 ppm以下</td><td rowspan=\"2\">破裂強度試驗：容量300 mL以下≥2.0 kgf/cm²（常溫保存≥4.0）；300 mL以上≥5.0（常溫保存≥8.0）；封緘強度試驗：無破損或漏氣；針孔試驗：濾紙無甲基藍斑點；常溫保存製品應具遮光性及無氣體透過性</td></tr>\n<tr><td>4% 醋酸</td><td>60℃，30分鐘</td><td>蒸發殘渣：15 ppm以下；重金屬：1 ppm以下（以Pb計）</td></tr>\n\n<tr><td rowspan=\"3\" style=\"font-weight:600\">乳脂（cream）及奶油（butter）用之聚乙烯製或聚乙烯加工紙製容器</td><td rowspan=\"3\">正己烷抽出物：2.6%以下；二甲苯可溶物：11.3%以下；砷：2 ppm以下（以As₂O₃計）；重金屬：20 ppm以下（以Pb計）</td><td>水</td><td>60℃，30分鐘</td><td>高錳酸鉀消耗量：5 ppm以下</td><td rowspan=\"3\">破裂強度試驗：同乳品用；封緘強度試驗：同乳品用；針孔試驗：同乳品用</td></tr>\n<tr><td>4% 醋酸</td><td>60℃，30分鐘</td><td>重金屬：1 ppm以下（以Pb計）</td></tr>\n<tr><td>正庚烷</td><td>25℃，1小時</td><td>蒸發殘渣：15 ppm以下</td></tr>\n\n<tr><td style=\"font-weight:600\">乳品用之玻璃瓶</td><td colspan=\"4\">應符合附表一之玻璃瓶項目規定，並應為透明者</td><td></td></tr>\n\n<tr><td rowspan=\"2\" style=\"font-weight:600\">乳品用之金屬罐<br>（與食品直接接觸面為塑膠者）</td><td rowspan=\"2\">砷：2 ppm以下（以As₂O₃計）；鎘：100 ppm以下；鉛：100 ppm以下（若接觸面為PVC，另需符合相關規定）</td><td>水</td><td>60℃，30分鐘</td><td>高錳酸鉀消耗量：5 ppm以下；酚：陰性；甲醛：陰性</td><td rowspan=\"2\"></td></tr>\n<tr><td>4% 醋酸</td><td>60℃，30分鐘</td><td>砷：0.1 ppm以下（以As₂O₃計）；重金屬：1 ppm以下（以Pb計）；蒸發殘渣：15 ppm以下</td></tr>\n\n<tr><td style=\"font-weight:600\">發酵乳、乳酸菌飲料及含乳飲料用之聚乙烯加工紙製容器包裝（以塑膠加工鋁箔密栓者）</td><td colspan=\"4\">同乳品用聚乙烯製容器包裝之規定</td><td>封緘強度試驗：同乳品用；針孔試驗：同乳品用；破裂強度試驗：5.0 kgf/cm²以上</td></tr>\n\n<tr><td rowspan=\"2\" style=\"font-weight:600\">發酵乳、乳酸菌飲料及含乳飲料用之聚苯乙烯製容器包裝（以塑膠加工鋁箔密栓者）</td><td rowspan=\"2\">揮發性物質（苯乙烯、甲苯、乙苯、異丙苯及正丙苯之合計）：1500 ppm以下；砷：2 ppm以下（以As₂O₃計）；重金屬：20 ppm以下（以Pb計）</td><td>水</td><td>60℃，30分鐘</td><td>高錳酸鉀消耗量：5 ppm以下</td><td rowspan=\"2\">封緘強度試驗：同乳品用；針孔試驗：同乳品用；穿刺強度試驗：1.0 kgf/cm²以上</td></tr>\n<tr><td>4% 醋酸</td><td>60℃，30分鐘</td><td>蒸發殘渣：15 ppm以下；重金屬：1 ppm以下（以Pb計）</td></tr>\n\n<tr><td style=\"font-weight:600\">發酵乳、乳酸菌飲料及含乳飲料用之組合式容器包裝</td><td colspan=\"4\">金屬部分符合附表一之金屬合金類項目規定；合成樹脂、合成樹脂加工紙及合成樹脂加工鋁箔應符合個別材質之規定</td><td></td></tr>\n\n<tr><td rowspan=\"2\" style=\"font-weight:600\">容器包裝鋁蓋部分之塑膠加工鋁箔</td><td rowspan=\"2\">砷：2 ppm以下（以As₂O₃計）；鎘：100 ppm以下；鉛：100 ppm以下（若接觸面為PVC，另需符合相關規定）</td><td>水</td><td>60℃，30分鐘</td><td>高錳酸鉀消耗量：5 ppm以下；酚：陰性；甲醛：陰性</td><td rowspan=\"2\">破裂強度試驗：2.0 kgf/cm²以上</td></tr>\n<tr><td>4% 醋酸</td><td>60℃，30分鐘</td><td>蒸發殘渣：15 ppm以下；重金屬：1 ppm以下（以Pb計）</td></tr>\n\n<tr><td style=\"font-weight:600\">乳粉用之金屬罐</td><td colspan=\"4\">1. 金屬罐之規定應符合乳品用金屬罐之規定<br>2. 封口部分限使用PE或PET製之合成樹脂，該二類應符合個別材質之規定</td><td></td></tr>\n\n<tr><td rowspan=\"3\" style=\"font-weight:600\">乳粉用之合成樹脂積層容器包裝<br>（接觸面為聚乙烯者）</td><td rowspan=\"3\">同乳品用聚乙烯製容器包裝之規定</td><td>水</td><td>60℃，30分鐘</td><td>高錳酸鉀消耗量：5 ppm以下</td><td rowspan=\"3\">破裂強度試驗：容量300 mL以下≥2.0 kgf/cm²；300 mL以上≥5.0（有外包裝且內外合併最大值≥10.0 kgf/cm²時，內包裝≥2.0即可）；封緘強度試驗：無破損或漏氣</td></tr>\n<tr><td>4% 醋酸</td><td>60℃，30分鐘</td><td>重金屬：1 ppm以下（以Pb計）</td></tr>\n<tr><td>正庚烷</td><td>25℃，1小時</td><td>蒸發殘渣：15 ppm以下</td></tr>\n\n<tr><td rowspan=\"3\" style=\"font-weight:600\">乳粉用之合成樹脂積層容器包裝<br>（接觸面為PET者）</td><td rowspan=\"3\">鉛：100 ppm以下；鎘：100 ppm以下</td><td>水</td><td>60℃，30分鐘</td><td>高錳酸鉀消耗量：5 ppm以下</td><td rowspan=\"3\">破裂強度試驗：同上；封緘強度試驗：同上</td></tr>\n<tr><td>4% 醋酸</td><td>60℃，30分鐘</td><td>重金屬：1 ppm以下（以Pb計）；銻：0.025 ppm以下；鍺：0.05 ppm以下</td></tr>\n<tr><td>正庚烷</td><td>25℃，1小時</td><td>蒸發殘渣：15 ppm以下</td></tr>\n</tbody>\n</table>\n\n<div class=\"annex-notes\">\n<p class=\"notes-title\">附註</p>\n<ol>\n<li>乳品包括鮮乳、部分脫脂乳、脫脂乳、調味乳、發酵乳、乳酸菌飲料、含乳飲料、乳脂及奶油。</li>\n<li>聚乙烯加工紙製容器包裝僅指與內容物直接接觸的部分為聚乙烯者。</li>\n<li>組合式容器包裝係指由合成樹脂、合成樹脂加工紙、合成樹脂加工鋁箔或金屬，以二種或二種以上之材質組成之容器包裝。</li>\n<li>乳粉包括全脂乳粉、部分脫脂乳粉、脫脂乳粉、調製乳粉。</li>\n</ol>\n</div>\n</div>"}],
    "食品及其相關產品回收銷毀處理辦法_20260203": [{"no": "第一條", "chapter": null, "content": "本辦法依食品安全衛生管理法（以下簡稱本法）第五十二條第三項規定訂定之。"}, {"no": "第二條", "chapter": null, "content": "食品及其相關產品（以下簡稱產品）之回收銷毀作業，由該產品之製造、販賣、輸入業者（以下簡稱責任廠商）為之。\n前項責任廠商應建立常態編組，負責下列事項：\n一、回收及銷毀之啟動。\n二、第三條產品回收銷毀計畫之研擬、提交報備及執行。\n三、第五條之回收進度報告。\n前項編組應置召集人一人，於產品回收原因發生時，召集相關人員研議回收銷毀程序之啟動及執行。"}, {"no": "第三條", "chapter": null, "content": "責任廠商執行產品之回收銷毀作業，應訂定產品回收銷毀計畫，並以書面或電子方式保存。\n前項計畫之內容應包括下列項目：\n一、責任廠商之名稱、地址及電話。\n二、回收產品之名稱、包裝、型態或其他可供辨識之特徵或符號。\n三、回收產品之批號、編號，或其他足資識別之日期、符號、圖誌或代號。\n四、回收產品之輸入、製造、進貨、出貨及庫存重量或容量。\n五、下游廠商之名稱、地址、緊急聯絡電話、出貨日期，與出貨產品之批號及其重量或容量。\n六、回收之原因。\n七、預定完成回收期限。\n八、回收產品保管地點，及負責保管之人員。\n九、回收產品之最終處置：\n（一）採行消毒、改製或其他適當安全措施者，應載明所採用之措施方法與實施程序，及預定完成日期。\n（二）銷毀者，應載明銷毀之方式與期限，及銷毀產品之重量或容量。\n十、其他經主管機關指定執行回收銷毀事項。\n責任廠商應將第一項之產品回收銷毀計畫，提交直轄市、縣（市）主管機關報備。"}, {"no": "第四條", "chapter": null, "content": "責任廠商對回收產品與其庫存品之置放，應與其他原料、半成品及成品有效區隔並明顯標示。"}, {"no": "第五條", "chapter": null, "content": "責任廠商應自回收啟動日起，至回收完成日，依直轄市、縣（市）主管機關指定之頻率、方式，報告回收進度。\n前項報告方式，得以中央主管機關指定之電子系統登錄回收進度。\n第一項報告內容，應包含下列事項：\n一、問題產品之相關製品名稱、規格、有效日期。\n二、問題產品與其相關製品製造或進貨量、庫存量、下游回收量及退回上游量、售出下游量。\n三、通知下游廠商下架回收之日期及方式。\n四、下游廠商名稱、地址。\n五、其他經主管機關指定應報告事項。\n有本法第五十二條第一項第三款所列回收事由者，不適用第二項。"}, {"no": "第六條", "chapter": null, "content": "主管機關送達責任廠商或其代理人之文件，得先以電子方式傳送至中央主管機關指定之電子系統。\n責任廠商或其代理人於前項電子系統閱覽時起，應依前條規定執行。"}, {"no": "第七條", "chapter": null, "content": "責任廠商就回收產品之銷毀，應報請直轄市、縣（市）主管機關核可後，始得為之。"}, {"no": "第八條", "chapter": null, "content": "直轄市、縣（市）主管機關應監督責任廠商執行產品之回收銷毀作業。\n前項監督，其內容應包括下列事項：\n一、指定責任廠商報告回收進度之頻率及方式。\n二、查核責任廠商回收程序之啟動。\n三、查核責任廠商依第三條所定計畫之執行情形，及第五條所定報告回收進度之內容正確性。\n四、查核責任廠商就其回收產品，完成最終處置之情形。\n五、其他經中央主管機關指定事項。"}, {"no": "第九條", "chapter": null, "content": "責任廠商就產品回收銷毀之執行程序及內容，應作成完整紀錄，並以紙本或電子檔保存至少五年。"}, {"no": "第十條", "chapter": null, "content": "本辦法自發布日施行。"}]
  });

  Object.assign(lawArticles, {"草案-寵物食品管理法": [{"no": "第一條", "chapter": "第一章 總則", "content": "為管理寵物食品衛生安全，保障寵物健康，維護消費者之權益及寵物食品事業發展，特制定本法。"}, {"no": "第二條", "chapter": "第一章 總則", "content": "本法所稱主管機關：在中央為農業部；在直轄市為直轄市政府；在縣（市）為縣（市）政府。"}, {"no": "第三條", "chapter": "第一章 總則", "content": "本法用詞，定義如下：\n一、寵物：指犬、貓及其他經中央主管機關指定之動物。\n二、寵物食品：指供寵物食用之下列產品及其原料：\n(一)完全日糧：指其營養成分足以作為日糧之食品。\n(二)輔助性食品：指僅具一定比例營養成分，須與其他寵物食品結合使用之食品。\n三、寵物食品業者：指經營寵物食品之製造、加工、分裝、販賣、運送、貯存、輸入或輸出之業者。\n四、製造業者：指經營寵物食品之製造、加工或分裝之業者。\n五、容器或包裝：指與寵物食品直接接觸之容器或包裹物。\n六、標示：指於寵物食品容器或包裝上，記載品名或為說明之文字、圖畫、記號或附加之說明書。\n七、營養標示：指於寵物食品容器或包裝上，記載寵物食品之營養成分、含量及營養說明。"}, {"no": "第四條", "chapter": "第一章 總則", "content": "為維護寵物食品安全與品質，中央主管機關應邀集獸醫、動物營養學、風險管理、農業、法律等相關領域專家學者及民間團體，組成寵物食品諮詢會，辦理下列事項之諮詢：\n一、以科學證據為原則，風險評估為基礎，訂定寵物食品管理措施之事項。\n二、寵物食品之衛生安全及營養、廣告標示、檢驗方法之事項。\n前項諮詢會成員任一性別人數，不得少於委員總數三分之一。"}, {"no": "第五條", "chapter": "第一章 總則", "content": "主管機關依科學實證，實施寵物食品衛生安全監測，於監測發現有危害寵物食品衛生安全之虞之事件發生時，應主動查驗，並發布預警或採行必要管制措施。\n前項主動查驗、發布預警或採行必要管制措施，包含主管機關應抽樣檢驗、追查原料來源、產品流向、公布檢驗結果及揭露資訊，並通知寵物食品業者自主檢驗。\n主管機關對重大或突發性寵物食品衛生安全事件，必要時得依預警原則、風險評估或流行病學調查結果，公告對特定產品或特定地區之產品採取下列管理措施：\n一、限制或停止輸入查驗、製造及加工之方式或條件。\n二、下架、封存、限期回收、限期改製、沒入銷毀。"}, {"no": "第六條", "chapter": "第一章 總則", "content": "寵物食品業者之從業人員、作業場所、設施衛生管理及其品保制度，均應符合寵物食品之良好衛生規範準則。\n經中央主管機關公告類別及規模之寵物食品業者，應符合寵物食品安全管制系統準則之規定。\n第一項食品之良好衛生規範準則及前項食品安全管制系統準則，由中央主管機關定之。"}, {"no": "第七條", "chapter": "第一章 總則", "content": "寵物食品業者應實施自主管理，確保寵物食品之衛生安全。\n寵物食品製造、輸入及輸出業者，應將其產品原料、半成品或成品，自行或送交其他經認可之檢驗機關(構)、法人或團體檢驗。但屬中央主管機關公告類別及規模之業者，應設置實驗室，從事自主檢驗。\n前項應辦理檢驗之寵物食品業者，其類別及規模、最低檢驗週期、實驗室之設置及其他相關事項，由中央主管機關定之。\n寵物食品業者於發現產品有危害衛生安全之虞時，應立即封存、主動停止製造、加工、販賣及辦理回收，並通報所在地直轄市、縣（市）主管機關。"}, {"no": "第八條", "chapter": "第一章 總則", "content": "各級主管機關得以補助、獎勵或輔導方式，推動促進寵物食品產業發展等相關事項。"}, {"no": "第九條", "chapter": "第二章 寵物食品業者之管理", "content": "製造、加工或分裝寵物食品，應使用經中央主管機關公告之原料或添加物。"}, {"no": "第十條", "chapter": "第二章 寵物食品業者之管理", "content": "完全日糧及經指定之輔助性食品製造或輸入業者，應向中央主管機關申請許可，經核准並發給寵物食品業者許可證後，始得製造、加工、分裝或輸入；其許可事項有變更者，亦同。\n非屬前項須許可之製造或輸入業者，應至中央主管機關指定之網站申請核准後，始得製造、加工、分裝或輸入；其核准事項有變更者，亦同。\n第一項指定之業者、申請許可要件、程序、應檢附文件、來源證明、許可條件、許可證之核發、許可之撤銷或廢止、前項申請核准之事項、程序、核准之撤銷或廢止及其他應遵行事項之辦法，由中央主管機關定之。"}, {"no": "第十一條", "chapter": "第二章 寵物食品業者之管理", "content": "完全日糧及經指定之輔助性食品製造業者之製造場所及其建築、設備，應向直轄市、縣（市）主管機關申請登記，經核准並發給寵物食品製造登記證；並應符合工廠設立標準，取得工廠登記。\n非屬前項業者之製造場所及其建築、設備，應符合工廠設立標準，取得工廠登記。\n前二項之工廠登記，應由直轄市、縣（市）主管機關辦理；工廠設立標準，由中央主管機關會同中央工業主管機關定之。\n第一項申請登記要件、程序、應檢附文件、衛生安全、製造登記證之核發、撤銷或廢止及其他應遵行事項之辦法，由中央主管機關定之。"}, {"no": "第十二條", "chapter": "第二章 寵物食品業者之管理", "content": "輸入寵物食品，應依海關專屬貨品分類號列，向中央主管機關申請查驗並申報相關資訊。\n輸入前項寵物食品非供販賣，且其金額、數量符合中央主管機關公告者，得免申請查驗。\n第一項產品輸入之查驗及申報，中央主管機關得委任、委託相關機關（構）、法人或團體辦理。"}, {"no": "第十三條", "chapter": "第二章 寵物食品業者之管理", "content": "中央主管機關對於完全日糧及經指定之輔助性食品，得於其輸入前，實施系統性查核。\n前項實施系統性查核之範圍、程序及其他相關事項之辦法，由中央主管機關定之。"}, {"no": "第十四條", "chapter": "第二章 寵物食品業者之管理", "content": "寵物食品業者應建立及保存寵物食品直接供應來源及流向之資料。但不包含直接販賣至消費者之產品流向資料。\n前項業者應建立及保存資料之範圍、項目、內容、方式、期限及其他應遵行事項之辦法，由中央主管機關定之。"}, {"no": "第十五條", "chapter": "第二章 寵物食品業者之管理", "content": "寵物食品業者應指定專責人員，負責寵物食品衛生安全。\n完全日糧及經中央主管機關指定之輔助性食品之寵物食品製造業者，應置寵物食品營養管理師。\n第一項專責人員資格、條件、前項指定寵物食品業者、寵物食品營養管理師之職責、業務執行及管理辦法，由中央主管機關定之。"}, {"no": "第十六條", "chapter": "第二章 寵物食品業者之管理", "content": "寵物食品業者應投保產品責任保險；產品責任保險金額及契約內容，由中央主管機關定之。"}, {"no": "第十七條", "chapter": "第三章 寵物食品之管理", "content": "寵物食品應以密封包裝或容器之形式販賣或贈與消費者。"}, {"no": "第十八條", "chapter": "第三章 寵物食品之管理", "content": "寵物食品有下列情形之一者，不得製造、加工、分裝、販賣、輸入、輸出、贈與或意圖販賣而公開陳列：\n一、使用第九條中央主管機關公告以外之原料或添加物。\n二、霉爛變質或腐敗。\n三、染有病原微生物。\n四、有害寵物健康物質之含量超出安全容許量。\n五、異物。\n六、逾有效日期。\n七、其他經中央主管機關指定不得使用之物質。\n前項病原微生物之種類、有害寵物健康物質之種類與其安全容許量及不得使用物質之標準，由中央主管機關定之。"}, {"no": "第十九條", "chapter": "第三章 寵物食品之管理", "content": "寵物食品容器、包裝有下列情形之一者，不得製造、販賣、輸入、輸出或使用：\n一、有毒。\n二、易生不良化學作用。\n三、其他足以危害健康。"}, {"no": "第二十條", "chapter": "第三章 寵物食品之管理", "content": "寵物食品應以中文及通用符號，顯著標示下列事項於容器、包裝或說明書之上：\n一、品名。\n二、淨重、容量、數量或度量等；其淨重、容量或度量應標示法定度量衡單位，必要時，得加註其他單位。\n三、所使用主要原料、添加物名稱。\n四、營養標示。\n五、製造、加工、分裝業者名稱、地址及電話。輸入者並應加註輸入業者及國內負責廠商名稱、地址、電話及原產地。\n六、有效日期或製造日期。\n七、保存期限、保存方法及條件。\n八、適用寵物種類、方法及其他應注意事項。\n九、其他經中央主管機關公告指定標示之事項。\n前項各款標示之應遵行事項，由中央主管機關定之。"}, {"no": "第二十一條", "chapter": "第三章 寵物食品之管理", "content": "對於寵物食品所為之標示、宣傳或廣告，不得有不實、誇張或易生誤解之情形；涉及醫療效能者，應依動物用藥品管理法處理。\n前項不實、誇張或易生誤解之認定基準、宣傳或廣告之內容、方式及其他應遵行事項之準則，由中央主管機關定之。"}, {"no": "第二十二條", "chapter": "第三章 寵物食品之管理", "content": "寵物食品及其容器或包裝之檢驗，由主管機關或委任、委託經認可之相關機關(構)、法人或團體辦理。\n前項檢驗之方法，由中央主管機關定之；未定檢驗方法者，得依國際間認可之方法為之。"}, {"no": "第二十三條", "chapter": "第三章 寵物食品之管理", "content": "主管機關或寵物食品業者發布寵物食品衛生檢驗資訊時，應同時公開檢驗方法、檢驗單位及結果。"}, {"no": "第二十四條", "chapter": "第三章 寵物食品之管理", "content": "網際網路平臺提供者或網際網路應用服務提供者（以下併稱為網路業者），經主管機關通知網頁涉有下列情形之一者，應先行限制瀏覽、移除違法網頁資料，或採取其他必要之處置：\n一、散布、播送、販賣或以他法供人觀賞、聽聞違反第九條、第十八條、第十九條或第二十一條規定之寵物食品之文字、圖畫、聲音、影像、電磁紀錄或其他物品。但為供學術研究或公益用途者，不在此限。\n二、違反第十條規定，未取得許可證或申請核准，擅自製造、加工、分裝或輸入寵物食品。\n三、違反第十一條規定，製造業者未取得寵物食品製造登記證或工廠登記。\n四、違反第十二條第一項規定，未經查驗並申報，擅自輸入寵物食品。\n前項違法網頁資料與行為人之個人資料及網路使用紀錄資料，應保留至少六十日，以提供主管機關調查。\n違反第一項規定經依本法規定處罰者，主管機關應通知其限期改善；屆期未改善者，主管機關得通知網際網路接取服務提供者於技術可行下，限制接取。\n網路業者於主管機關要求提供第二項違法網頁資料與行為人之個人資料及網路使用紀錄資料時，不得規避、妨礙或拒絕。"}, {"no": "第二十五條", "chapter": "第四章 行政稽查及管制", "content": "主管機關為確保寵物食品、寵物食品容器或包裝符合本法規定，得執行下列措施，業者不得規避、妨礙或拒絕：\n一、進入製造、加工、分裝、運送、貯存、販賣場所執行現場查核及抽樣檢驗。\n二、為前款查核或抽樣檢驗時，得要求前款場所之業者提供原料或產品之來源及數量、作業、品保、販賣對象、金額、其他佐證資料、證明或紀錄，並得查閱、扣留或複製之。\n三、對於有違反第六條、第九條至十二條、第十四條至二十一條之虞者，得通知其暫停製造、加工、販賣、陳列，並得將其該項物品定期封存，由業者出具保管書，暫行保管。"}, {"no": "第二十六條", "chapter": "第四章 行政稽查及管制", "content": "經主管機關調查，寵物食品有下列情形之一者，其製造或輸入業者，應即通知下游業者，並依規定限期收回市售品，連同庫存品依本法有關規定處理：\n一、違反第六條所定寵物食品之良好衛生規範準則或安全管制系統準則，經主管機關認定有害衛生安全之虞。\n二、使用第九條中央主管機關公告以外之原料或添加物。\n三、違反第十條規定，未取得寵物食品業者許可證或未申請核准。\n四、違反第十一條規定，未取得製造登記證或工廠登記。\n五、違反第十二條第一項規定，未申請查驗並申報相關資訊。\n六、違反第十七條規定，寵物食品未以密封包裝或容器之形式販賣或贈與。\n七、寵物食品或其容器、包裝有違反第十八條至第二十條規定情形之一。\n八、違反第二十一條第一項規定，對於寵物食品所為之標示、宣傳或廣告，有不實、誇張或易生誤解之情形。\n九、其他經中央主管機關公告應收回之情形。\n寵物食品製造或輸入業者收回前項所定寵物食品時，下游業者應予配合。"}, {"no": "第二十七條", "chapter": "第四章 行政稽查及管制", "content": "寵物食品有下列情形之一者，由主管機關依抽查、檢驗結果為下列處分︰\n一、違反第六條所定寵物食品之良好衛生規範準則或安全管制系統準則者，應予沒入銷毀。但實施消毒或採行適當安全措施後，仍可使用或得改製使用者，應通知限期消毒、改製或採行安全措施；逾期未遵行者，沒入銷毀之。\n二、使用第九條中央主管機關公告以外之原料或添加物，應予沒入銷毀。\n三、其他違反本法之規定者，經主管機關認定有害衛生安全，應予沒入銷毀或為其他適當之處置。\n前項各款應予沒入之產品，應先通知製造、販賣或輸入業者限期公告停止使用，並予回收、銷毀；必要時，所在地直轄市、縣（市）主管機關得代為回收、銷毀，並收取必要之費用。\n前項應回收、銷毀之產品，其回收、銷毀處理辦法，由中央主管機關定之。\n製造、加工、分裝、販賣、運送、貯存、輸入或輸出第一項第一款或第二款產品之寵物食品業者，由所在地直轄市、縣（市）主管機關公布其商號、地址、負責人姓名、商品名稱及違法情節。\n輸入第一項產品經通關查驗不符合規定者，主管機關應管制其輸入，並得為第一項各款、第二項及前項之處分。"}, {"no": "第二十八條", "chapter": "第四章 行政稽查及管制", "content": "主管機關對於檢舉查獲違反本法規定者，除應對檢舉人身分資料嚴守秘密外，並得酌予獎勵；檢舉人身分資料之保密，於訴訟程序，亦同。\n前項主管機關受理檢舉案件之管轄、處理期間、保密、檢舉人獎勵及其他應遵行事項之辦法，由中央主管機關定之。\n雇主不得因勞工向主管機關或司法機關揭露違反本法之行為、擔任訴訟程序之證人或拒絕參與違反本法之行為而予解僱、調職或其他不利之處分。\n雇主或代表雇主行使管理權之人，為前項規定所為之解僱、降調或減薪者，無效。\n雇主以外之人曾參與違反本法之規定且應負刑事或行政責任之行為，而向主管機關或司法機關揭露，因而破獲雇主違反本法之行為者，減輕或免除其刑。"}, {"no": "第二十九條", "chapter": "第五章 罰則", "content": "散播有關寵物食品安全之謠言或不實訊息，足生損害於公眾或他人者，處二年以下有期徒刑、拘役或新臺幣一百萬元以下罰金。"}, {"no": "第三十條", "chapter": "第五章 罰則", "content": "有第十八條第一項第一款、第三款、第四款或第十九條第一款行為者，處一年以下有期徒刑、拘役，得併科新臺幣二千萬元以下罰金。\n因過失犯前項之罪者，處六個月以下有期徒刑、拘役或科新臺幣五百萬元以下罰金。\n法人之代表人、法人或自然人之代理人、受僱人或其他從業人員，因執行業務犯第一項之罪者，除處罰其行為人外，對該法人或自然人科以該項十倍以下之罰金。"}, {"no": "第三十一條", "chapter": "第五章 罰則", "content": "有下列情形之一者，處新臺幣二十萬元以上一百萬元以下罰鍰，並得按次處罰；情節重大者，並得通知其歇業、停業一定期間、廢止其業者之許可或核准、工廠之製造登記證；經廢止者，三年內不得再重新申請許可、核准或登記：\n一、使用第九條中央主管機關公告以外之原料或添加物。\n二、製造、加工、分裝、販賣、輸入、輸出、贈與、意圖販賣而公開陳列第十八條第一項各款情形之一之寵物食品。\n三、製造、販賣、輸入、輸出或使用有第十九條各款情形之一之寵物食品。\n四、未依第二十條第一項各款規定標示或標示不實，或標示未符合同條第二項所定應遵行事項之規定。\n五、經主管機關依第二十五條第三款規定，通知暫停製造、加工、販賣、陳列，或定期封存而未遵行。\n六、違反第二十六條第一項規定，製造或輸入業者未通知下游業者，或未依限期收回市售品，連同庫存品依本法有關規定處理。\n七、經主管機關依第二十七條第二項及第三項規定，通知其回收、銷毀而未遵行。\n網路業者違反第二十四條第一項規定，經主管機關通知後，未限制瀏覽、移除違法網頁資料或採取其他必要之處置，處新臺幣二十萬元以上一百萬元以下罰鍰，並得按次處罰。"}, {"no": "第三十二條", "chapter": "第五章 罰則", "content": "有下列情形之一者，處新臺幣十萬元以上五十萬元以下罰鍰：\n一、違反第十條規定，未取得許可證或申請核准，擅自製造、加工、分裝或輸入寵物食品。\n二、違反第十一條規定，製造業者未取得寵物食品製造登記證。\n三、違反第十二條第一項規定，未經查驗並申報，擅自輸入寵物食品。\n明知為前項之寵物食品而販賣、供應、運送、寄藏、媒介、轉讓、標示、廣告或意圖販賣而陳列者，依前項規定處罰之。\n有前二項行為之一，情節重大足以危害寵物健康之虞者，處一年以下有期徒刑、拘役，得併科新臺幣二千萬元以下罰金。"}, {"no": "第三十三條", "chapter": "第五章 罰則", "content": "有下列情形之一者，處新臺幣五萬元以上二十五萬元以下罰鍰，並得按次處罰；情節重大者，並得通知其歇業、停業一定期間、廢止其業者之許可或核准、工廠之製造登記證；經廢止者，二年內不得再重新申請許可、核准或登記：\n一、違反第六條規定，經主管機關依第二十七條第一項第一款規定為沒入銷毀處分。\n二、違反第七條第四項規定，未立即封存、主動停止製造、加工、販賣或辦理回收，通報所在地直轄市、縣（市）主管機關。\n三、製造業、輸入業之許可或核准事項有變更，未依第十條第一項或第二項規定申請許可或核准變更。\n四、寵物食品業者違反第十四條第一項規定，未建立與保存寵物食品直接供應來源及流向之資料。\n五、寵物食品業者違反第十四條第二項所訂辦法中有關建立與保存資料之範圍、項目、內容、方式、期限之規定，經通知限期改善，屆期仍未改善。\n六、違反第十七條規定，以未密封包裝或容器之形式販賣或贈與消費者。\n七、違反第二十一條第一項規定，寵物食品之標示、宣傳或廣告有不實、誇張或易生誤解之情形。\n八、違反第二十四條第二項規定，未保留違法網頁資料、行為人之個人資料或網路使用紀錄資料。\n九、違反第二十四條第四項規定，規避、妨礙或拒絕提供違法網頁資料、行為人之個人資料或網路使用紀錄資料。\n十、違反第二十五條第一款或第二款規定，寵物食品業者規避、妨礙或拒絕主管機關所為之查證、查核或配合之事項。"}, {"no": "第三十四條", "chapter": "第五章 罰則", "content": "有下列情形之一者，處新臺幣一萬元以上五萬元以下罰鍰；情節重大者，並得通知其歇業、停業一定期間、廢止其業者之許可或核准、工廠之製造登記證；經廢止者，一年內不得再重新申請許可、核准或登記：\n一、經主管機關依第五條第二項規定通知寵物食品業者自主檢驗而未遵行。\n二、寵物食品業者未依第七條第二項及第三項規定檢驗週期、設置實驗室及其他相關事項辦理自主檢驗，經通知限期改善，屆期仍未改善。\n三、違反第十五條第一項規定，未依規定指定專責人員。\n四、違反第十五條第二項規定，未依規定設置寵物食品營養管理師，經通知限期改善，屆期仍未改善。\n五、完全日糧及經中央主管機關指定之輔助性食品之寵物食品製造業者，違反第十五條第三項所定辦法中有關寵物食品營養管理師之職責、業務執行及管理之規定，經通知限期改善，屆期仍未改善。\n六、違反第十六條規定，未依規定投保產品責任保險。"}, {"no": "第三十五條", "chapter": "第六章 附則", "content": "中央主管機關為保障寵物食品安全事件消費者之權益，得設立寵物食品安全保護基金，並得委託其他機關（構）、法人或團體辦理。\n前項基金之來源如下：\n一、違反本法罰鍰之部分提撥。\n二、依本法科處並繳納之罰金，及因違反本法規定沒收或追徵之現金或變賣所得。\n三、依本法或行政罰法規定沒入、追繳、追徵或抵償之不當利得部分提撥。\n四、基金孳息收入。\n五、捐贈收入。\n六、循預算程序之撥款。\n七、其他有關收入。\n第一項基金之用途如下：\n一、補助消費者保護團體因寵物食品衛生安全事件依消費者保護法之規定，提起消費訴訟之律師報酬及訴訟相關費用。\n二、補助寵物食品衛生安全事件，有關動物健康風險評估費用。\n三、補助勞工因檢舉雇主違反本法之行為，遭雇主解僱、調職或其他不利處分所提之回復原狀、給付工資及損害賠償訴訟之律師報酬及訴訟相關費用。\n四、補助依第二十八條第二項所定辦法之獎金。\n五、補助其他有關促進寵物食品安全之相關費用。\n中央主管機關應設置基金運用管理監督小組，由學者專家、消費者保護團體、社會公正人士組成，監督補助業務。\n第三項基金之補助對象、申請資格、審查程序、補助基準、補助之廢止、前項基金運用管理監督小組之組成、運作及其他應遵行事項之辦法，由中央主管機關定之。"}, {"no": "第三十六條", "chapter": "第六章 附則", "content": "主管機關依本法受理寵物食品業者申請許可、核准或登記之審查及證照之核發、寵物食品之檢驗，應收取審查費、檢驗費及證照費；其收費標準，由中央主管機關定之。"}, {"no": "第三十七條", "chapter": "第六章 附則", "content": "本法施行之日前，已依動物保護法第二十二條之三規定申報之業者，應自本法施行之日起一年內，依本法規定完成相關登記、核准程序及其他相關事項；屆期未完成者，依第三十二條第一項第一款及第二款規定處理。"}, {"no": "第三十八條", "chapter": "第六章 附則", "content": "自本法施行之日起，動物保護法關於寵物食品規定不再適用。"}, {"no": "第三十九條", "chapter": "第六章 附則", "content": "本法施行細則，由中央主管機關定之。"}, {"no": "第四十條", "chapter": "第六章 附則", "content": "本法自公布日施行。"}], "寵物食品病原微生物與有害健康物質種類及安全容許量標準_20171027": [{"no": "第一條", "chapter": null, "content": "本標準依動物保護法第二十二條之四第二項規定訂定之。"}, {"no": "第二條", "chapter": null, "content": "本標準用詞，定義如下：\n一、黃麴毒素含量：指 B1、B2、G1 及 G2 含量總合。\n二、ppb：指每公斤所含微克數。\n三、ppm：指每公斤所含毫克數。"}, {"no": "第三條", "chapter": null, "content": "寵物食品不得含有下列病原微生物：\n一、沙門氏菌（Salmonella）\n二、李斯特菌（Listeria monocytogenes）\n三、致病性大腸桿菌（Pathogenic Escherichia coli）\n四、產氣莢膜梭菌（Clostridium perfringens）"}, {"no": "第四條", "chapter": null, "content": "寵物食品之黃麴毒素含量不得超過 20 ppb。"}, {"no": "第五條", "chapter": null, "content": "寵物食品之重金屬含量不得超過下列基準：\n一、砷：\n1.含有水產動物或藻類及其產品者，於百分之十二含水率時：無機砷 2ppm，總砷 10ppm。\n2.未含前目產品者：總砷 2ppm。\n二、鎘：2ppm。\n三、鉛：5ppm。\n四、汞：0.4ppm。"}, {"no": "第六條", "chapter": null, "content": "寵物食品之農藥殘留含量不得超過下列基準：\n一、阿特靈及地特靈（Aldrin and Dieldrin）：0.01 ppm。\n二、蟲必死（BHC）：0.01 ppm。\n三、滴滴涕（DDT）：0.1 ppm。\n四、安特靈（Endrin）：0.01 ppm。\n五、飛佈達（Heptachlor）：0.01 ppm。"}, {"no": "第七條", "chapter": null, "content": "寵物食品之保存劑及抗氧化劑含量不得超過下列基準：\n一、衣索金（Ethoxyquin）、丁羥甲苯（Butylated hydroxytoluene, BHT）及丁羥甲醚（Butylated hydroxyanisole, BHA）含量總和：150ppm，且衣索金不得超過 75 ppm。\n二、亞硝酸鈉：100 ppm。"}, {"no": "第八條", "chapter": null, "content": "寵物食品之有害化學物質含量不得超過下列基準：\n一、三聚氰胺：2.5 ppm。\n二、丙二醇：貓用之寵物食品不得檢出。"}, {"no": "第八條之一", "chapter": null, "content": "寵物食品之銫一三四與銫一三七之輻射量總和（Cs-134+Cs-137）不得超過每公斤六百貝克（600Bq/kg）。"}, {"no": "第九條", "chapter": null, "content": "本標準自發布日施行。"}]});

  Object.assign(lawArticles, {"可供給家畜、家禽、水產動物之飼料參考物質表": [{"no": "版本", "chapter": null, "content": "110.10.19 版本"}, {"no": "1.", "chapter": "1. 植物性飼料（vegetable feeds）", "content": "植物性飼料（vegetable feeds）"}, {"no": "1.1.", "chapter": "1. 植物性飼料（vegetable feeds）", "content": "乾草及粗芻料（dry forages and roughages）"}, {"no": "1.1.1.", "chapter": "1. 植物性飼料（vegetable feeds）", "content": "乾草（hay）\n例如：百慕達乾草、苜蓿乾草……等"}, {"no": "1.1.2.", "chapter": "1. 植物性飼料（vegetable feeds）", "content": "纖維質（Fiber）\n例如：木質素（lignin）、木質纖維（lignocellulose）……等"}, {"no": "1.1.3.", "chapter": "1. 植物性飼料（vegetable feeds）", "content": "農作物及其副產物，包括穗、穗軸、殼、種皮、桿及其他可供家畜、家禽或水產動物食用部分（crop and its byproducts such as ear, spike-stalk, hull, stalk and other edible parts for livestock, poultry and aquatic animal）\n例如：玉米穗……等"}, {"no": "1.2.", "chapter": "1. 植物性飼料（vegetable feeds）", "content": "鮮草（grass）\n例如：狼尾草……等"}, {"no": "1.3.", "chapter": "1. 植物性飼料（vegetable feeds）", "content": "青貯料（silages）\n例如：玉米青貯……等"}, {"no": "1.4.", "chapter": "1. 植物性飼料（vegetable feeds）", "content": "植物性熱能飼料（vegetable energy feeds）"}, {"no": "1.4.1.", "chapter": "1. 植物性飼料（vegetable feeds）", "content": "穀粒及其碾製副產物，包括碎粒、麩皮、糠、碎片、渣及其他可供家畜、家禽或水產動物食用部分（grains and its milling byproducts, such as groat, bran, grit, meal and other edible parts for livestock, poultry and aquatic animal）\n例如：玉米、小麥、小麥粉、熟化小麥、燕麥、熟化燕麥、米、米糠、碎米、發芽大麥、麵粉、麩皮、粗糠、大麥、蕎麥、糙米、高粱、黑麥、小黑麥、粟、小米……等"}, {"no": "1.4.2.", "chapter": "1. 植物性飼料（vegetable feeds）", "content": "根莖類及其加工副產物（roots and stems and their byproducts）\n例如：樹薯塊、甜菜、蘿蔔、馬鈴薯、甘藷、菊苣根……等"}, {"no": "1.4.3.", "chapter": "1. 植物性飼料（vegetable feeds）", "content": "糖蜜（molasses）\n例如：甘蔗糖蜜……等"}, {"no": "1.4.4.", "chapter": "1. 植物性飼料（vegetable feeds）", "content": "植物性油脂（vegetable fat）\n例如：黃豆油、棕櫚油、皂化油脂、椰子油、氫化植物油、棕櫚油分餾物、棕櫚油脂肪粉、（油）菜籽油（rapeseed oil）、米糠油、玉米油、葵花子油、葵花油、可可油、大豆卵磷脂、棕櫚油硬脂（palm stearin）、硬酯酸、共軛亞麻油酸（conjugate linoleic acid）、棕梠酸（palmitic acid）、植物油脂肪酸（vegetable fatty acid）、甘油酯（glyceride）、中鏈三酸甘油酯（medium chain triglyceride, MCT）……等"}, {"no": "1.4.5.", "chapter": "1. 植物性飼料（vegetable feeds）", "content": "其他（others）"}, {"no": "1.4.5.1.", "chapter": "1. 植物性飼料（vegetable feeds）", "content": "澱粉（starch）\n例如：玉米澱粉、小麥澱粉、馬鈴薯澱粉、樹薯澱粉、α澱粉……等"}, {"no": "1.4.5.2.", "chapter": "1. 植物性飼料（vegetable feeds）", "content": "糖漿、甜菜糖、葡萄糖、蔗糖及果糖（syrup, beet sugar, glucose, sugarcane and fructose）\n例如：水合葡萄糖（dextose monohydrate, d-glucose）、含水葡萄糖、結晶葡萄糖……等"}, {"no": "1.4.5.3.", "chapter": "1. 植物性飼料（vegetable feeds）", "content": "蔬果及蔬果渣（vegetable and fruit pulp）\n例如：可食用之蔬果、鳳梨渣、蘋果渣、菊苣渣（chicory fiber）、甜菜漿（beet pulp）、番茄漿（tomato pomace）……等"}, {"no": "1.5.", "chapter": "1. 植物性飼料（vegetable feeds）", "content": "植物性蛋白質飼料（vegetable protein feeds）"}, {"no": "1.5.1.", "chapter": "1. 植物性飼料（vegetable feeds）", "content": "種籽及其加工產物（seeds and their processed products）"}, {"no": "1.5.1.1.", "chapter": "1. 植物性飼料（vegetable feeds）", "content": "種籽、油籽粕及其萃取物與加工副產物（oilseed, oilseed meals and their extracts and byproducts）\n例如：大豆、扁豆、紅豆、綠豆、碗豆、鷹嘴豆、可食用瓜籽、全脂豆粉、大豆粕、椰子粕、花生粕、脫殼豆粉、豆皮、豆渣、芝麻粕、棉籽粕、（油）菜籽粕、棕梠粕、亞麻粕、亞麻子粕、葵花粕、杏仁粕、番茄子粕、橄欖粕、核桃仁粕、紅花籽粕、花椒子粕、木棉子粕、葡萄籽粕、沙棘籽粕、酸棗粕、文冠果粕、月見草粕、紫蘇粕……等"}, {"no": "1.5.1.2.", "chapter": "1. 植物性飼料（vegetable feeds）", "content": "胚芽（germs）\n例如：小麥胚芽、玉米胚芽……等"}, {"no": "1.5.1.3.", "chapter": "1. 植物性飼料（vegetable feeds）", "content": "筋質粉（gluten flour）\n例如：小麥麵筋、粉頭、玉米麵筋、玉米麩……等"}, {"no": "1.5.1.4.", "chapter": "1. 植物性飼料（vegetable feeds）", "content": "濃縮蛋白（protein concentrate）\n例如：大豆蛋白、大豆濃縮蛋白、小麥蛋白、烘烤大豆蛋白、玉米蛋白、馬鈴薯蛋白、碗豆蛋白、大米蛋白……等"}, {"no": "1.5.1.5.", "chapter": "1. 植物性飼料（vegetable feeds）", "content": "水解產物（hydrolysates）\n例如：水解蛋白……等"}, {"no": "1.5.2.", "chapter": "1. 植物性飼料（vegetable feeds）", "content": "釀製副產物（brewer's and distiller's products）\n例如：醬油粕、DDGS、DDG、酒糟……等"}, {"no": "1.5.2.2.", "chapter": "1. 植物性飼料（vegetable feeds）", "content": "微生物發酵產物（microbial fermentation products）\n例如：發酵豆粉、靈芝粉（linze powder）、玉米萃取物發酵產物、糖蜜發酵產物、酵母培養基、枯草芽孢桿菌發酵液、乳酸菌發酵產物、Corynebacterium發酵物、靈芝發酵產物、納豆菌發酵產物、冬蟲夏草發酵產物、靈芝多醣體及其萃取物、巴西蘑菇多醣體及其萃取物、冬蟲夏草多醣體及其萃取物、未明生長因子（unidentified growth factor, UGF）、核苷酸、蛋白質粉……等"}, {"no": "1.5.3.", "chapter": "1. 植物性飼料（vegetable feeds）", "content": "藻類及其加工產品（algae and its processed products）\n例如：微藻、綠球藻（Chlorella vulgaris）、螺旋藻、純頂螺旋藻（Spirulina platensis）、破囊壺菌（Aurantiochytrium limacinum）、藻粉、海帶粉、海藻粉、微藻粉、裂壺藻粉、螺旋藻粉、海藻萃取物（seaweeds extracts）、DHA、EPA、海藻酸鈉（Sodium alginate）、洋菜（agar）、卡拉膠（carrageenan）……等"}, {"no": "1.5.4.", "chapter": "1. 植物性飼料（vegetable feeds）", "content": "酵母粉及其加工產品（yeast and its proceeds products）\n例如：啤酒酵母、糖蜜酵母、活酵母、含硒酵母菌、啤酒酵母萃取物、酵母水解物、釀酒酵母、可溶性發酵酵母、酵母萃取物、酵母發酵液……等"}, {"no": "2.", "chapter": "2. 動物性飼料（animal feeds）", "content": "動物性飼料（animal feeds）"}, {"no": "2.1.", "chapter": "2. 動物性飼料（animal feeds）", "content": "乳製品（dairy products）"}, {"no": "2.1.1.", "chapter": "2. 動物性飼料（animal feeds）", "content": "乳粉（dried milk）\n例如：全脂奶粉、脫脂奶粉……等"}, {"no": "2.1.2.", "chapter": "2. 動物性飼料（animal feeds）", "content": "乳清（whey）\n例如：高乳糖乳清粉、乳清粉濃縮物（whey protein concentrate）、乳清濃縮蛋白……等"}, {"no": "2.1.3.", "chapter": "2. 動物性飼料（animal feeds）", "content": "乳糖（lactose/milk sugar）"}, {"no": "2.1.4.", "chapter": "2. 動物性飼料（animal feeds）", "content": "乳蛋白製品（milk protein products）\n例如：乳白蛋白、乳清蛋白、酪蛋白、酪蛋白酸鈉、乳鐵蛋白……等"}, {"no": "2.1.5.", "chapter": "2. 動物性飼料（animal feeds）", "content": "發酵產物（fermentation products）\n例如：乳清發酵產物、乾酪粉、乳酪粉……等"}, {"no": "2.2.", "chapter": "2. 動物性飼料（animal feeds）", "content": "血粉、血漿粉、血漿蛋白、濃縮副產物，限使用於反芻動物以外之家畜、家禽或水產動物（blood meal, dried plasma, plasma proteins blood concentrating byproducts, used for livestock, poultry and aquatic animals except ruminant）"}, {"no": "2.3.", "chapter": "2. 動物性飼料（animal feeds）", "content": "家畜、家禽之肉塊、肉粉、肉骨粉、骨粉、油粕及其他副產物，限使用於反芻動物以外之家畜、家禽或水產動物\n例如：水解乾燥家禽粉、雞渣粉、骨粉、雞肉粉、腸黏膜蛋白……等"}, {"no": "2.4.", "chapter": "2. 動物性飼料（animal feeds）", "content": "家畜、家禽、水產動物性油脂。但家畜、家禽油脂限使用於反芻動物以外之家畜、家禽或水產動物\n例如：牛油、豬油、家禽油、魚油、磷蝦油、烏賊油、鮭魚油、鱈魚油、魚肝油、鱈魚肝油（Cod liver oil）、氫化魚油、DHA、EPA、膽固醇、甘油酯、中鏈三酸甘油脂（MCT）、皂化油脂、脂肪粉……等"}, {"no": "2.5.", "chapter": "2. 動物性飼料（animal feeds）", "content": "蛋粉及其他副產物（dried egg and other byproducts）\n例如：全蛋粉、雞蛋白蛋白（chicken egg white protein）、水解乾燥蛋白粉末、乾燥雞蛋粉、IgG、IgY……等"}, {"no": "2.6.", "chapter": "2. 動物性飼料（animal feeds）", "content": "水解產物（hydrolyzed products）\n例如：水解毛髮、水解蛋白、水解魚肉蛋白、乾燥之水解家禽粉、蛋白胜肽（protein peptide）……等"}, {"no": "2.7.", "chapter": "2. 動物性飼料（animal feeds）", "content": "水產動物與其加工產品及加工副產物（aquatic animal products and their processed products and byproducts）\n例如：魚粉、魚精粉、魚溶漿、魚骨粉、烏賊肉粉、烏賊內臟粉、烏賊膏、豐年蝦（artemia）、蝦粉、蝦殼粉、磷蝦粉、蟹殼粉、蚵殼粉、魷魚粉、鱈魚肝粉、干貝肝粉、支角類（cladocera）、橈腳類（copepod）、輪蟲（rotifer）、水蚤（water flea）……等"}, {"no": "2.8.", "chapter": "2. 動物性飼料（animal feeds）", "content": "發酵產物（fermentation products）\n例如：魚源未明生長因子（unidentified growth factor, UGF）"}, {"no": "2.9.", "chapter": "2. 動物性飼料（animal feeds）", "content": "蠶蛹、蜂蛹、蠅蛆、蚯蚓、麵包蟲、大麥蟲、孑孓、絲蚯蚓、紅蟲、蝗蟲\n例如：黃粉蟲／麵包蟲粉（Tenebrio molitor）、大麥蟲／超級麥皮蟲（Zophobas morio）、蚯蚓粉……等"}, {"no": "2.10.", "chapter": "2. 動物性飼料（animal feeds）", "content": "水虻乾（粉）：水分含量百分之十三以下，且限以飼料餵養所長成之蟲體製成。以1.植物性飼料以外之飼料餵養所長成之蟲體製成者，限使用於家禽或水產動物。\n例如：黑水虻（Hermetia illucens L.）、黃金水虻（Ptecticus aurifer）、鳳凰蟲（黑水虻及黃金水虻之幼蟲）"}, {"no": "3.", "chapter": "3. 補助飼料（complementary feeds）", "content": "補助飼料（complementary feeds）"}, {"no": "3.1.", "chapter": "3. 補助飼料（complementary feeds）", "content": "胺基酸、胺基酸鹽及其衍生物（amino acids and their salts and derivatives）\n例如：N-乙醯半胱胺酸（NAC）、乙醯甲硫胺酸、二羥基四甲硫基丁酸（HMTBa）、天門冬胺酸（aspartic acid）、天門冬醯胺（asparagine）、牛磺酸（taurine）、丙胺酸（alanine）、半胱胺（cysteamine）、甘胺酸（glycine）、甲硫胺酸／蛋胺酸（methionine）、白胺酸（leucine）、色胺酸（tryptophan）、苯丙胺酸（phenylalanine）、胱胺酸（Cystine）、異白胺酸（isoleucine）、組胺酸（histidine）、脯胺酸（proline）、絲胺酸（serine）、酪胺酸（tyrosine）、精胺酸（arginine）、聚麩胺酸（polyglutamic acid）、麩胺酸（glutamic acid）、麩醯胺酸（glutamine）、離胺酸／賴胺酸（lysine）、蘇胺酸／羥丁胺酸（threonine）、纈胺酸（valine）……等"}, {"no": "3.2.", "chapter": "3. 補助飼料（complementary feeds）", "content": "礦物質及其螯合物（minerals and chelated minerals）\n例如：鉀、鈉、鈣、鎂、鐵、鋅、鈷、錳、銅、磷、硫、碘、硒、銨鹽、胺基酸礦物質螯合物、亞硒酸鈉（Sodium Selenite）、硒化鈉、甲硫胺酸硒（selenomethionine）、硫酸鈉、硫酸鈣、硫酸鎂、硫酸鋅、硫酸亞鐵、硫酸銅、氫氧化鎂、氧化鋅、氧化鋁、氧化鎂、碘化鉀、碘酸鈣、氯化鉀、氯化鈣、氯化鎂、氯化鈉、碳酸鈷、碳酸鈣、碳酸氫鈉、磷酸一鈣、磷酸二鈣／磷酸氫鈣、磷酸二氫鈣、磷酸二氫鉀（MKP）、甲基吡啶鉻（chromium picolinate）、矽藻土……等"}, {"no": "3.3.", "chapter": "3. 補助飼料（complementary feeds）", "content": "維生素及類維生素（vitamins）\n例如：β胡蘿蔔素（beta-carotene）、維他命A、B1～B12、C、D3、E、H、菸鹼醯胺（維生素B3衍生物）、泛酸鈣（維生素B5衍生物）、生物素（維生素B7/H）、葉酸（維生素B9）、氯化膽鹼（choline chloride）、肌醇（inositol）、甲萘醌／維生素K3（menadione）、甲萘醌亞硫酸氫鈉（MNB）、肉鹼（carnitine）、甜菜鹼（betaine）、牛磺酸（taurine）……等"}, {"no": "3.4.", "chapter": "3. 補助飼料（complementary feeds）", "content": "脂肪酸（fatty acid）\n例如：植物性脂肪酸、羊脂酸（caprylic acid）、葵酸（capric acid）、月桂酸（lauric acid）、Omega3不飽和脂肪酸（包括DHA、EPA、α-次亞麻油酸（ALA）等）、Omega6不飽和脂肪酸（包括亞麻油酸、共軛亞麻油酸（CLA）、γ-次亞麻油酸（GLA）等）、Omega9不飽和脂肪酸（包括油酸、芥酸等）……等"}, {"no": "3.5.", "chapter": "3. 補助飼料（complementary feeds）", "content": "非蛋白態氮產物，限反芻動物飼料使用（non-protein nitrogen, used only for ruminant）"}, {"no": "3.5.1.", "chapter": "3. 補助飼料（complementary feeds）", "content": "尿素（urea）"}, {"no": "3.5.2.", "chapter": "3. 補助飼料（complementary feeds）", "content": "無水氨（ammonia, NH3）\n例如：游離氨……等"}, {"no": "3.5.3.", "chapter": "3. 補助飼料（complementary feeds）", "content": "雙縮尿素（biuret）"}, {"no": "3.5.4.", "chapter": "3. 補助飼料（complementary feeds）", "content": "氯化銨（ammonium chloride）"}, {"no": "4.", "chapter": "4. 配合飼料（formula feeds）", "content": "配合飼料（formula feeds）"}, {"no": "4.1.", "chapter": "4. 配合飼料（formula feeds）", "content": "完全飼料（complete feeds）"}, {"no": "4.2.", "chapter": "4. 配合飼料（formula feeds）", "content": "濃縮飼料（concentrated feeds）"}, {"no": "5.", "chapter": "5. 其他", "content": "其他"}, {"no": "5.1.", "chapter": "5. 其他", "content": "經直轄市、縣（市）環境保護主管機關依廢棄物清理法相關規定核准再利用機構再利用之廚餘\n符合「行政院環保署一般廢棄物回收清除處理辦法」相關規定之再利用機構始得使用。再利用機構應具有高溫蒸煮設備、動物防疫措施及相關設施，高溫蒸煮時應持續攪拌，並維持中心溫度90℃以上，蒸煮至少一小時以上。"}], "可供給家畜、家禽、水產動物之飼料添加物參考物質表": [{"no": "版本", "chapter": null, "content": "107.8.2 版本"}, {"no": "1.", "chapter": "1. 微生物（microorganisms）", "content": "微生物（microorganisms）"}, {"no": "1.1.", "chapter": "1. 微生物（microorganisms）", "content": "乳酸桿菌屬"}, {"no": "1.1.1.", "chapter": "1. 微生物（microorganisms）", "content": "Lactobacillus acidophilus　嗜酸乳桿菌"}, {"no": "1.1.2.", "chapter": "1. 微生物（microorganisms）", "content": "Lact ate）"}, {"no": "5.9.", "chapter": "5. 酸度調節劑（acidity regulators）", "content": "苯酸（benzoic acid）及其鹽類\n例如：苯酸鈉／苯甲酸鈉（sodium benzoate）、苯酸鈣（calcium benzoate）……等"}, {"no": "5.10.", "chapter": "5. 酸度調節劑（acidity regulators）", "content": "延胡索酸（fumaric acid）"}, {"no": "5.11.", "chapter": "5. 酸度調節劑（acidity regulators）", "content": "磷酸（phosphoric acid/orthophosphoric acid）、磷酸鉀（potassium phosphate）\n（磷酸又名正磷酸）"}, {"no": "5.12.", "chapter": "5. 酸度調節劑（acidity regulators）", "content": "氯化銨（ammonium chloride）"}, {"no": "5.13.", "chapter": "5. 酸度調節劑（acidity regulators）", "content": "碳酸氫鈉（sodium bicarbonate）"}, {"no": "5.14.", "chapter": "5. 酸度調節劑（acidity regulators）", "content": "二甲酸鈉（sodium diformate）、二甲酸鉀（potassium diformate）"}, {"no": "5.15.", "chapter": "5. 酸度調節劑（acidity regulators）", "content": "氨水（aqueous ammonia solution）"}, {"no": "5.16.", "chapter": "5. 酸度調節劑（acidity regulators）", "content": "葡萄糖酸（Gluconic Acid）"}, {"no": "6.", "chapter": "6. 品質提升劑（quality improving agent）", "content": "品質提升劑（quality improving agent）"}, {"no": "6.1.", "chapter": "6. 品質提升劑（quality improving agent）", "content": "乳化劑（emulsifiers）"}, {"no": "6.1.1.", "chapter": "6. 品質提升劑（quality improving agent）", "content": "磷脂質產品（phospholipids）\n例如：磷脂質（phospholipid）、脫鈣磷脂質、卵磷脂（lecithins）、溶血磷脂醯膽鹼（LPC）、磷脂醯膽鹼（PC）……等"}, {"no": "6.1.2.", "chapter": "6. 品質提升劑（quality improving agent）", "content": "甘油（glycerol）"}, {"no": "6.1.3.", "chapter": "6. 品質提升劑（quality improving agent）", "content": "酯類（ester）\n例如：食用油之單酸甘油酯、食用油之雙酸甘油酯、甘油蓖麻醇酸酯（glyceryl polyethylene glycol ricinoleate）、脂肪酸山梨醇酐酯（sorbitan fatty acid ester）、脂肪酸蔗糖酯（sucrose fatty acid ester）、硬脂醯-2-乳酸（stearoyl-2-lactylic acid）、硬脂醯-2-乳酸鈉（sodium stearoyl-2-lactylate）、聚山梨醇酯20／吐溫80（TWEEN 80）、SPAN80、丙酸甘油酯、三丁酸甘油酯（Glycerol Tributyrate）……等"}, {"no": "6.1.4.", "chapter": "6. 品質提升劑（quality improving agent）", "content": "甘露醇（mannitol）"}, {"no": "6.1.5.", "chapter": "6. 品質提升劑（quality improving agent）", "content": "膽汁酸（bile acid）"}, {"no": "6.2.", "chapter": "6. 品質提升劑（quality improving oving agent）", "content": "風味劑（flavoring agent）"}, {"no": "6.4.1.", "chapter": "6. 品質提升劑（quality improving agent）", "content": "香味劑（scenting agent）\n例如：天然與等同天然香料混合物、天然風味物質（natural flavouring substances）、類天然風味物質（nature-identical flavouring substances）、琥珀酸（succinic acid）、迷迭香（rosemary）、甘草（Glycyrrhiza glabra）、甘草酸（glycyrrhizic acid）、香芹酚（carvacrol）、壬酸（nonanoic acid）、味精（monosodium glutamate）、芳樟醇（linalool）、香蘭素／香草醛（vanillin）、肉桂醛（cinnamaldehyde）、百里香酚／麝香草酚（thymol）……等（詳見原始文件）"}, {"no": "6.4.2.", "chapter": "6. 品質提升劑（quality improving agent）", "content": "甜味劑（sweetening agent）\n例如：山梨醇（sorbitol）、甜馬索（thaumatin）、糖精鈉鹽（sodium saccharin）、甘露醇（mannitol）、新橙皮苷二氫查耳酮（neohesperidine dihydrochalcone）、葡萄糖（glucose）、乳糖（lactose）、蔗糖（sucrose）、果糖（fructose）、阿斯巴甜（aspartame）、乙基麥芽醇（ethyl maltol）……等"}, {"no": "6.5.", "chapter": "6. 品質提升劑（quality improving agent）", "content": "抗結塊劑及黴菌毒素吸附劑（anticaking agents and substances for reduction of the contamination of feed by mycotoxins）"}, {"no": "6.5.1.", "chapter": "6. 品質提升劑（quality improving agent）", "content": "海泡石（sepiolite）"}, {"no": "6.5.2.", "chapter": "6. 品質提升劑（quality improving agent）", "content": "沸石（zeolite）\n例如：斜發沸石（clinoptilolite）……等"}, {"no": "6.5.3.", "chapter": "6. 品質提升劑（quality improving agent）", "content": "膨潤土（bentonite）\n例如：蒙脫石（montmorillonite）……等"}, {"no": "6.5.4.", "chapter": "6. 品質提升劑（quality improving agent）", "content": "非活性酵母及酵母菌萃取物（inactivated yeast and yeast extract）\n例如：酵母細胞壁、釀酒酵母菌（Saccharomyces cerevisiae／brewer's yeast）、乾燥酵母（dried yeast）、乾燥酵母萃取物（dried yeast extract）……等"}, {"no": "6.5.5.", "chapter": "6. 品質提升劑（quality improving agent）", "content": "二氧化矽（silicon dioxide）\n例如：二氧化矽／二氧化硅（silicon dioxide）、矽藻土（Kieselgur/diatomaceous earth）、膠態氧化硅（colloidal silica）……等"}, {"no": "6.5.6.", "chapter": "6. 品質提升劑（quality improving agent）", "content": "滑石和綠泥石自然混合物（natural mixtures of steatites and chlorite）"}, {"no": "6.5.7.", "chapter": "6. 品質提升劑（quality improving agent）", "content": "矽酸、矽酸鋁鹽及其化合物（Silicic acid and aluminosilicate）\n例如：矽酸鋁（aluminosilicate）、水合矽酸鋁鈉鈣（hydrated sodium calcium aluminosilicate）、矽酸鋁鈉鹽（sodium aluminosilicate）、矽酸鈉（sodium silicate）、蛭石（vermiculite）、矽酸鎂……等"}, {"no": "6.5.8.", "chapter": "6. 品質提升劑（quality improving agent）", "content": "硬脂酸及其鹽類（Stearic acid and Stearates）\n例如：硬脂酸、硬脂酸鈣、硬脂酸鎂……等"}, {"no": "6.5.9.", "chapter": "6. 品質提升劑（quality improving agent）", "content": "聚乙烯吡咯烷酮（polyvinylpyrrolidone, PVP）、交聯聚乙烯吡咯烷酮（polyvinyl polypyrrolidone, PVPP）"}, {"no": "6.5.10.", "chapter": "6. 品質提升劑（quality improving agent）", "content": "多層網格狀葉矽酸鹽白陶土（layer-lattice, phyllosilicate, PSC）\n例如：高嶺土（kaolin）、黏土（clay）、蒙脫石（montmorillonite）……等"}, {"no": "6.5.11.", "chapter": "6. 品質提升劑（quality improving agent）", "content": "雲母（Verxite）"}, {"no": "7.", "chapter": "7. 畜、水產技術添加物（zootechnical additives）", "content": "畜、水產技術添加物（zootechnical additives）"}, {"no": "7.1.", "chapter": "7. 畜、水產技術添加物（zootechnical additives）", "content": "腸道菌相穩定劑（gut flora stabilizing agent）"}, {"no": "7.1.1.", "chapter": "7. 畜、水產技術添加物（zootechnical additives）", "content": "益生素（prebiotics）"}, {"no": "7.1.1.1.", "chapter": "7. 畜、水產技術添加物（zootechnical additives）", "content": "寡醣（oligosaccharides）\n例如：果寡醣（fructo oligosaccharides）、甘露寡醣（Mannan oligosaccharides）、異麥芽寡醣（isomalto oligosaccharides）……等"}, {"no": "7.1.1.2.", "chapter": "7. 畜、水產技術添加物（zootechnical additives）", "content": "多醣（polysaccharides）\n例如：菊糖（inulin）……等"}, {"no": "7.1.1.3.", "chapter": "7. 畜、水產技術添加物（zootechnical additives）", "content": "山梨醇（sorbitol）"}, {"no": "7.2.", "chapter": "7. 畜、水產技術添加物（zootechnical additives）", "content": "其他畜、水產技術添加物（other zootechnical additives）"}, {"no": "7.2.1.", "chapter": "7. 畜、水產技術添加物（zootechnical additives）", "content": "飼料用天然植物及其殘渣（herbaceous plants）\n例如：丁香、七里香、人蔘、土茯苓、大薊、小茴香、小薊、山茱萸、山楂、山藥、川芎、五加皮、五味子、升麻、天門冬、尤加利樹、牛至、玉竹、玉米鬚、甘草、石榴皮、印度苦楝、地黃、地榆、百里香、肉豆蔻、肉桂、艾草、何首烏、決明子、沙棘子、乳薊、刺五加、松樹葉、枇杷葉、知母、花椒、金銀花、金橘、金蕎麥、金櫻子、長豆角莢、青蒿、厚朴、枳殼、枸杞子、洋槐、穿心蓮、紅景天、胡荽草、苦西瓜、韭菜籽、香附、香茅、香薷、党蔘、核桃葉、桃杏葉、桃金娘、桑葉、桔梗、烏梅、益母草、益智仁、茜草、茯苓、草莓葉、骨碎補、高良薑、淡竹葉、甜菊、荷葉、野菊花、陳皮、魚腥草、麥芽、番椒、紫錐菊、紫蘇葉、絞股藍、絲蘭、菊花、菊苣、菟絲子、越橘、黃耆、黃連、黃精、黑芝麻、當歸、葛根、葫蘆巴、蒼术、遠志、酸棗仁、廣藿香、餘甘子、澤瀉、積雪草、龍膽、薄荷、薏苡仁、薑、薑黃、檸檬、羅布麻、蘿蔔、靈芝、活性碳……等"}, {"no": "7.2.2.", "chapter": "7. 畜、水產技術添加物（zootechnical additives）", "content": "植物萃取物（plant extract）及等同天然有效成分\n例如：等同天然植物萃取物成分、等同天然精油、植物固醇（Phytosterol）、薄荷醇（menthol）、肉桂醛（Cinnamaldehyde）、肉桂酸（Cinnamic acid）、大蒜萃取物、薑萃取物、乳薊萃取物、水飛薊素（silymarin extract）、枸杞萃取物、柑橘萃取物、茴香萃取物、百里香萃取物、茶萃取物、蔓越莓萃取物、柚皮苷（naringin）、光果甘草萃取物、黃岑苷（Baicalin）、積雪草萃取物、洋蔥萃取物、香芹酚（carvacrol）、皂苷／皂素（Saponin）、單寧酸（tannic acid）、牛至萃取物、血根鹼（sanguinarine）、天然松烯／萜烯（natural terpenes）、百里香酚（thymol）、絲蘭萃取物、胡椒鹼（piperine）、大黃酸（Rhein）、沒食子酸（Gallic acid）、苦楝油（Neem Oil）……等"}, {"no": "7.2.3.", "chapter": "7. 畜、水產技術添加物（zootechnical additives）", "content": "腐植質（humic substances）\n例如：黃腐酸／富里酸（fulvic acid）、腐植酸（humic acid）、腐質素（humin）、泥炭（peat）……等"}, {"no": "7.2.4.", "chapter": "7. 畜、水產技術添加物（zootechnical additives）", "content": "醣類（carbohydrate）\n例如：葡聚醣（Glucan）、肽聚醣（Peptidoglycan）、葡萄糖胺（Glucosamine）、d-核糖（d-ribose）、葡萄糖醛酸內酯（glucuronolactone）、醣蛋白（Glycoproteins）、幾丁寡糖（chitosan oligosaccharide）、葡萄糖胺寡醣（glucosamine oligosaccharide）、甘露聚糖（mannosan）……等"}, {"no": "7.2.5.", "chapter": "7. 畜、水產技術添加物（zootechnical additives）", "content": "核酸及核苷酸（nucleic acids and nucleotides）\n例如：核糖核酸（RNA）、去氧核醣核酸（DNA）、單磷酸鳥苷（GMP）、肌苷酸（IMP）……等"}, {"no": "7.2.6.", "chapter": "7. 畜、水產技術添加物（zootechnical additives）", "content": "礦物油（mineral oil）"}]});
  Object.assign(lawArticles, {"114年版-食品標示問答集彙整手冊": [{"no": "第22條-Q1", "chapter": "食安法第22條 一般食品標示", "content": "問：一般食品及輸入食品應如何作中文標示？\n\n答：\n一、依食品安全衛生管理法第22條規定，食品之容器或外包裝，應以中文及通用符號明顯標示品名、內容物名稱、淨重、容量或數量、食品添加物名稱、製造廠商或國內負責廠商名稱、電話號碼及地址、原產地(國)、有效日期、營養標示、含基因改造食品原料及其他經中央主管機關公告之事項。\n二、上述標示亦應依同法施行細則第7條至第13條辦理。另依同法施行細則第19條規定，輸入者，應依食安法第22條規定，加中文標示，始得輸入。但需再經改裝、分裝或其他加工程序者，得於販賣前完成中文標示。\n三、依食安法第28條規定，食品標示、宣傳或廣告之內容不得有不實、誇張、易生誤解或宣稱醫療效能之情事，業者應審慎確認食品外包裝標示之正確性。"}, {"no": "第22條-Q2", "chapter": "食安法第22條 一般食品標示", "content": "問：禮盒產品之標示型態以「拉頁小DM」方式，是否符合規定？\n\n答：食品倘為完整包裝食品，使用拉頁式小DM置於禮盒內或禮袋內，不符合食安法第22條應於食品之容器或外包裝明顯標示規定，恐無法使消費者充分瞭解產品應揭露資訊，易衍生消費爭議。"}, {"no": "第22條-Q5", "chapter": "食安法第22條 一般食品標示", "content": "問：市售產品有內外包裝，內包裝為密封包裝（如玻璃瓶），外面為紙盒包裝，中文標示要標示在哪裡（瓶身或外紙盒）比較適當？\n\n答：食品之最小販售包裝應依食安法第22條之規定，作完整標示。如內包裝為完整密封包裝之玻璃瓶，外包裝為紙盒，則應於消費者接觸之最小販售包裝紙盒包裝上作完整標示。"}, {"no": "第22條-Q7", "chapter": "食安法第22條 一般食品標示", "content": "問：何謂最小販售單位？出貨單位包含單包與整箱，最小販售單位為何？\n\n答：\n一、食品之最小販售包裝應依食安法第22條規定作完整標示。\n二、「最小販售單位」係指產品販賣銷售時之最小單位，販售對象包含食品工廠、餐飲業者或消費者。例如：泡麵產品規格為12包/箱，倘製造商以「箱」作為最小販售單位，且確認於任一販售通路無以「包」單獨販售之情形，則得僅於外箱上作完整標示。惟倘該產品於最初設計時即欲以「包」為最小販售單位販售，則應於外箱及單包外作完整標示。"}, {"no": "品名-Q1", "chapter": "品名（食安法第22條第1項第1款）", "content": "問：食品品名有何相關規定？\n\n答：\n一、依食安法第22條第1項第1款規定，食品之容器或外包裝應標示品名，且依同法施行細則第7條規定，品名之標示名稱與食品本質相符，並依中央主管機關規定之名稱或中華民國國家標準所定之名稱，或自定其名稱。\n二、惟食品之標示、宣傳或廣告不得有不實、誇張或易生誤解之情形（食安法第28條）；業者應審慎確認食品品名之正確性。"}, {"no": "品名-Q2", "chapter": "品名（食安法第22條第1項第1款）", "content": "問：混合油品之「品名」該如何標示？\n\n答：食品混合兩種以上油脂，其品名應能呈現食品之本質，不得以單一油脂名稱標示（如將混合油標示為「純豬油」），應以能清楚呈現其食品本質之品名標示，例如「混合油脂」、「調和植物油」等。"}, {"no": "內容物-Q1", "chapter": "內容物名稱（食安法第22條第1項第2款）", "content": "問：內容物名稱之標示原則為何？\n\n答：\n一、依食安法第22條第1項第2款，食品內容物名稱應依其含量多寡由高至低分別標示之。\n二、依食安法施行細則第8條規定，內容物中液汁與固形物混合者，分別標明內容量及固形量；內容物含量得視食品性質，註明最低、最高或最低與最高含量。\n三、食品添加物名稱須依食品添加物使用範圍及限量暨規格標準附表一所定品名或一般社會通用名稱標示，屬甜味劑、防腐劑、抗氧化劑者，應同時標示其功能性名稱。"}, {"no": "內容物-Q2", "chapter": "內容物名稱（食安法第22條第1項第2款）", "content": "問：食品原料如使用複方食品添加物，其成分展開標示之原則為何？\n\n答：複方食品添加物應依規定展開標示各單方添加物名稱；惟透過合法原料使用而帶入食品之食品添加物，且其含量明顯低於直接添加於食品之需用量，對終產品無功能者，得免標示之（食安法施行細則第9條第2項）。"}, {"no": "淨重-Q1", "chapter": "淨重、容量或數量（食安法第22條第1項第3款）", "content": "問：食品之淨重、容量標示應以何種單位？\n\n答：依食安法施行細則第8條規定，淨重、容量應以法定度量衡單位或其代號標示之。另應注意包裝食品裝量檢驗法規定之容許負誤差範圍，確保標示量與實際裝量相符。"}, {"no": "淨重-Q2", "chapter": "淨重、容量或數量（食安法第22條第1項第3款）", "content": "問：液汁與固形物混合之食品（如罐頭），淨重如何標示？\n\n答：依食安法施行細則第8條規定，內容物中液汁與固形物混合者，應分別標明內容量（淨重）及固形量。但其為均勻混合且不易分離者，得僅標示內容物淨重。"}, {"no": "廠商-Q1", "chapter": "製造廠商或國內負責廠商（食安法第22條第1項第5款）", "content": "問：何謂「製造廠商」與「國內負責廠商」，輸入食品如何標示？\n\n答：\n一、依食安法施行細則第10條，製造廠商係指製造、加工、調配製成終產品之廠商；受託製造之廠商；或足以影響產品衛生安全之改裝廠商。\n二、「國內負責廠商」依第11條係指對產品於國內直接負法律責任之食品業者。\n三、輸入食品應標示國內負責廠商之名稱、電話號碼及地址，並得另標示國外製造廠商資訊；國內製造食品應標示製造廠商或國內負責廠商資訊。\n四、僅標示國內負責廠商名稱者，應將製造廠商、受託製造廠商或輸入廠商之相關資訊通報轄區主管機關。"}, {"no": "原產地-Q1", "chapter": "原產地（食安法第22條第1項第6款）", "content": "問：「原產地（國）」如何認定及標示？\n\n答：\n一、依食安法施行細則第12條，原產地（國）係指製造、加工或調配製成終產品之國家或地區。\n二、輸入食品之原產地（國），依「進口貨物原產地認定標準」認定之。\n三、輸入食品依進口貨物原產地認定標準，屬不得認定為實質轉型之混裝食品，應依各食品混裝含量多寡由高至低標示各別原產地（國）。\n四、中文標示之食品製造廠商地址足以表徵為原產地（國）者，得免另為標示。"}, {"no": "有效日期-Q1", "chapter": "有效日期（食安法第22條第1項第7款）", "content": "問：有效日期應如何標示？可否以製造日期加保存期限方式代替？\n\n答：\n一、依食安法施行細則第13條規定，有效日期應印刷於容器或外包裝之上，並依習慣能辨明之方式標明年月日。但保存期限在三個月以上者，其有效日期得僅標明年月，並以當月之末日為終止日。\n二、「有效日期」係在特定儲存條件下可保持產品價值的最終期限，應為時間點；「保存期限」係時間範圍。如僅標示保存期限而未標示有效日期，則不符合規定；如同時標示製造日期及保存期限，則三者之間的推定邏輯應一致，以免衍生消費爭議。"}, {"no": "有效日期-Q2", "chapter": "有效日期（食安法第22條第1項第7款）", "content": "問：禮盒包含2種不同效期的產品組合，禮盒外包裝應如何標示有效日期？\n\n答：如以禮盒為最小販賣單位，應依食安法第22條規定於外包裝完整中文標示；倘內容物係不同效期產品組合販售者，外包裝有效日期應標示最先到期之日期。"}, {"no": "有效日期-Q3", "chapter": "有效日期（食安法第22條第1項第7款）", "content": "問：有效日期之改正方式為何？\n\n答：食品（食品添加物）中文標示如係直接印刷於原始包裝上者，「有效日期」應採打印方式以不退色油墨標明，不得單獨另外以黏貼方式加附日期；如整體中文標示係以黏貼方式標明者，其所有標示項目應印刷於同一標籤上，「有效日期」亦同樣應採打印方式以不退色油墨標明，不得單獨另外以黏貼方式附加日期。其他產品外包裝標示資訊，可以貼標方式補正，惟其貼紙應具備不脫落或不易換貼之特性。"}, {"no": "營養標示-Q1", "chapter": "營養標示（食安法第22條第1項第8款及第3項）", "content": "問：哪些包裝食品得免營養標示？\n\n答：依「得免營養標示之包裝食品規定」，下列食品得免標示營養標示：\n一、未添加任何其他成分或配料且未有營養宣稱之生鮮、冷藏或冷凍之水果、蔬菜、家畜、家禽、蛋、液蛋和水產品。\n二、非直接販售予消費者之食品原料。\n三、法規另有規定者（如特殊即飲型香草茶、香草、香辛料等）。\n如欲自願提供營養標示，仍應依「包裝食品營養標示應遵行事項」辦理。"}, {"no": "營養標示-Q2", "chapter": "營養標示（食安法第22條第1項第8款及第3項）", "content": "問：包裝食品營養標示之格式為何？\n\n答：\n一、應於包裝容器外表之明顯處以表格方式由上至下依序提供：「營養標示」標題、每一份量及份數、每份與每100公克（或毫升）之熱量、蛋白質、脂肪（含飽和脂肪、反式脂肪）、碳水化合物（含糖）、鈉，以及宣稱之其他營養素含量。\n二、多項包裝食品或口味共同使用同一營養標示，得以組合併列格式標示。\n三、總表面積小於100平方公分之包裝食品，得以表格框橫向方式標示。"}, {"no": "營養標示-Q3", "chapter": "營養標示（食安法第22條第1項第8款及第3項）", "content": "問：維生素礦物質類之膠囊錠狀食品如何標示營養？\n\n答：依「包裝維生素礦物質類之錠狀膠囊狀食品營養標示應遵行事項」，應以建議食用量（整數）作為每一份量，以表格方式標示每份及每日參考值百分比，並加註每包裝所含份數。應標示熱量、蛋白質、脂肪、碳水化合物、糖、鈉，及主要訴求之維生素或礦物質含量，並加標每日參考值。"}, {"no": "營養宣稱-Q1", "chapter": "包裝食品營養宣稱（食安法第22條第3項）", "content": "問：何謂「營養宣稱」？食品宣稱「無糖」、「低鈉」應符合什麼標準？\n\n答：\n一、「營養宣稱」係指以任何說明、隱喻或暗示方式，表達該食品具有或不具有特定之熱量或營養素性質。\n二、依「包裝食品營養宣稱應遵行事項」：\n- 宣稱「無糖、不含糖、零糖」：每100公克（固體）或每100毫升（液體）糖含量不超過0.5公克。\n- 宣稱「低鈉」：每100公克或每100毫升鈉含量不超過120毫克，並應於營養標示中標示鉀含量。\n三、涉及「高、多、強化、富含」等宣稱，應符合各營養素最低含量要求；涉及含量比較之宣稱，應標明比較食品品名及增加／減低之量或比例。"}, {"no": "基因改造-Q1", "chapter": "含基因改造食品原料（食安法第22條第1項第9款）", "content": "問：哪些食品須標示含基因改造食品原料？標示方式為何？\n\n答：\n一、依「含基因改造食品原料之標示應遵行事項」，包裝食品倘使用基因改造食品原料，其容器或外包裝應依規定標示。\n二、主成分為基因改造原料（如玉米、黃豆等）且在品名或內容物所占比例大於前三項，應於品名或內容物名稱後以「基因改造」字樣或小括弧內標示。\n三、非刻意添加，且其基因改造成分低於3%者（非蓄意摻雜），可免標示。\n四、精製後之食品添加物（如醬油、玉米糖漿等），依規定可免標示。"}, {"no": "其他公告-Q1", "chapter": "其他公告事項（食安法第22條第1項第10款）", "content": "問：目前有哪些中央主管機關公告之標示事項（第10款）？\n\n答：依食安法第22條第1項第10款，中央主管機關已公告多項應標示事項，包括：\n一、過敏原標示：蝦、蟹、芒果、花生、牛奶、蛋、堅果類、芝麻、含麩質之穀物及其製品、大豆等10大過敏食材（食品過敏原標示規定，2019年起）。\n二、咖啡因含量：現場調製含咖啡因飲料（飲料容量標示）。\n三、特定加工方式：重組肉、注脂肉等加工肉品需標示「重組」或「注脂」（重組肉及注脂肉食品標示規定）。\n四、主成分含量百分比（食安法第22條第2項）：特定食品之主成分應標明所占百分比。"}, {"no": "主成分-Q1", "chapter": "主成分含量百分比（食安法第22條第2項）", "content": "問：主成分含量百分比的標示規定適用哪些食品？\n\n答：依衛福部公告之「食品主成分百分比標示應遵行事項」，目前要求標示主成分百分比之食品包含：蜂蜜及其糖漿類、巧克力產品（可可含量）等。標示方式依各公告規定辦理，應於品名旁或適當明顯處標示主成分含量百分比，如「蜂蜜（含蜂蜜OO%）」或「黑巧克力（可可固形物含量OO%以上）」等。"}, {"no": "其他原則-Q1", "chapter": "其他原則及指引", "content": "問：黏貼方式標示之補正規定為何？\n\n答：\n一、食品之標示應以不易脫落為原則，業者得採更換包材或黏貼覆蓋等型式為之；如以黏貼覆蓋方式，其貼紙應具備不易再撕開、不易換貼或不易脫落之特性。\n二、有效日期不得單獨另外以黏貼方式加附，應採打印方式以不退色油墨標明。\n三、標示字體之長度及寬度各不得小於2毫米；但最大表面積不足80平方公分之小包裝，除品名、廠商名稱及有效日期外，其他項目字體得小於2毫米。"}, {"no": "其他原則-Q2", "chapter": "其他原則及指引", "content": "問：食品標示不符規定應如何限期改正？\n\n答：依食安法第52條，食品標示違反第22條第1項或依第2項及第3項公告事項者，應通知限期回收改正，改正前不得繼續販賣；屆期未遵行者，沒入銷毀之。違反第22條規定之業者依食安法第47條，可處新臺幣3萬元以上300萬元以下罰鍰，情節重大者並得命其歇業、停業等。"}, {"no": "第24條-Q1", "chapter": "食安法第24條 食品添加物產品標示", "content": "問：食品添加物產品應標示哪些項目？\n\n答：依食安法第24條之規定，食品添加物產品應以中文及通用符號，明顯標示下列事項：\n(一) 品名\n(二) 「食品添加物」或「食品添加物原料」字樣\n(三) 食品添加物名稱（應以食品添加物使用範圍及限量暨規格標準所定品名或公告通用名稱標示）\n(四) 淨重、容量或數量\n(五) 製造廠商或國內負責廠商名稱、電話號碼及地址\n(六) 有效日期\n(七) 使用範圍、用量標準及使用限制\n(八) 原產地（國）\n(九) 含基因改造食品添加物之原料\n(十) 其他經中央主管機關公告之事項（如單方食品添加物應標示許可證字號及產品登錄碼）\n另，食品添加物產品無需標示營養標示。"}, {"no": "第24條-Q2", "chapter": "食安法第24條 食品添加物產品標示", "content": "問：複方食品添加物之使用範圍及用量標準與使用限制應如何標示？\n\n答：複方食品添加物產品之使用範圍、用量標準應為各單方食品添加物之使用範圍及用量標準（依各單品含量換算其最高使用量）之交集，另使用限制部分應符合各使用範圍之限量。"}, {"no": "第24條-Q3", "chapter": "食安法第24條 食品添加物產品標示", "content": "問：香料產品所含之香料成分是否須展開標示？\n\n答：依「食品添加物中所含香料成分標示之應遵行事項」，食品添加物所含香料成分得以「香料」標示之；如屬天然香料者，得以「天然香料」標示之，無需逐一展開香料單體名稱。但除香料成分外，所含其他原料（包含內容物及食品添加物），仍須依食安法第24條規定，於產品包裝上詳實標示各原料名稱。"}, {"no": "第25條-Q1", "chapter": "食安法第25條 散裝食品及直接供應飲食場所標示", "content": "問：何謂「散裝食品」？其標示規定為何？\n\n答：\n一、依食安法施行細則第20條，散裝食品係指陳列販賣時無包裝，或有包裝而具下列情形之一者：不具啟封辨識性、不具延長保存期限、非密封、非以擴大販賣範圍為目的。\n二、依「散裝食品標示規定」，散裝食品販售業者應於販賣場所以清楚明顯方式標示：品名、原產地（國）、含基因改造食品原料（如有）、製造日期或有效日期及其他經中央主管機關公告之事項（如過敏原）。\n三、屬公告規定之散裝食品類型，其相關標示規定依各公告辦理。"}, {"no": "第25條-Q2", "chapter": "食安法第25條 散裝食品及直接供應飲食場所標示", "content": "問：直接供應飲食場所之散裝食品標示有哪些規定？\n\n答：依「直接供應飲食場所散裝食品標示規定」，直接供應飲食場所（如餐廳、自助餐廳等）提供之散裝食品，應依規定標示原產地等資訊。\n一、供應豬肉（含內臟）及豬肉產品，應於菜單或其他明顯方式標示原產地。\n二、連鎖飲料業及便利商店現場調製飲料，依「連鎖飲料便利商店及速食業之現場調製飲料標示規定」，應標示飲料品名、容量、售價等資訊，並標示所用茶葉及咖啡原料之原產地。"}, {"no": "第28條-Q1", "chapter": "食安法第28條 食品廣告詞句標示及宣稱", "content": "問：食品標示、廣告不得有哪些不實或誇張情事？\n\n答：依食安法第28條，食品、食品添加物、食品用洗潔劑及食品器具、食品容器或包裝之標示、宣傳或廣告，不得有不實、誇張或易生誤解之情形；食品不得為醫療效能之標示、宣傳或廣告。違者依食安法第45條，處新臺幣4萬元以上400萬元以下罰鍰；違反醫療效能規定者，處60萬元以上500萬元以下罰鍰。"}, {"no": "第28條-Q2", "chapter": "食安法第28條 食品廣告詞句標示及宣稱", "content": "問：食品宣稱涉及「增強免疫力」、「促進新陳代謝」等詞句是否涉及醫療效能？\n\n答：依「食品標示宣傳或廣告詞句涉及誇張易生誤解或醫療效能之認定基準」：\n一、「增強免疫力」、「提升免疫系統」等宣稱涉及生理功能，如適當表述（如「有助於維持免疫功能正常運作」）且有科學證據支持，並符合健康食品管理法所定查驗登記之效能範圍，則屬健康食品之效能宣稱，一般食品不得宣稱。\n二、「治療」、「預防」、「減輕症狀」等明顯涉及疾病或醫療效能的宣稱，一律禁止於食品標示或廣告中出現。"}, {"no": "第28條-Q3", "chapter": "食安法第28條 食品廣告詞句標示及宣稱", "content": "問：食品廣告使用「天然」、「有機」、「無農藥」等詞句有何限制？\n\n答：\n一、使用「天然」、「純天然」等用語，如產品實際非天然，則涉及不實標示；業者應確實確認所使用原料，確為天然方可宣稱。\n二、「有機」標示須依農業部「有機農產品及有機農產加工品驗證管理辦法」取得驗證，未取得驗證者不得標示。\n三、「無農藥」、「無農藥殘留」等宣稱，應有農藥殘留檢測報告佐證，否則涉及誇張或易生誤解。"}, {"no": "其他法規-食品原料-Q1", "chapter": "食安法其他相關標示法規 — 食品原料相關標示規定", "content": "問：食品原料（供下游業者使用）之標示規定為何？\n\n答：具完整包裝之食品及食品原料，無論販售予下游加工業者或餐飲業者，皆應於販售前依食安法第22條規定，以中文如實完整標示。惟符合「得免營養標示之包裝食品規定」者，得免標示營養標示；如係非直接販售予消費者之食品原料，亦可依規定免除營養標示。業者仍應確保其他標示項目（品名、內容物、有效日期等）完整標示。"}, {"no": "其他法規-塑膠-Q1", "chapter": "食安法其他相關標示法規 — 食品接觸面含塑膠材質之容器具標示", "content": "問：食品接觸面含塑膠材質之容器具應如何標示？\n\n答：依「食品器具容器包裝塑膠類材質名稱標示原則」及食安法第26條，經中央主管機關公告之食品器具、食品容器或包裝（如食品接觸面含塑膠材質者），應以中文及通用符號明顯標示品名、材質名稱及耐熱溫度、淨重、容量或數量、國內負責廠商名稱電話及地址、原產地（國）、製造日期及使用注意事項或微波等警語。其中材質名稱及耐熱溫度應以印刷、打印或壓印方式標示於主要本體上，不得僅以貼標方式標示。"}, {"no": "其他法規-洗潔劑-Q1", "chapter": "食安法其他相關標示法規 — 食品洗潔劑標示", "content": "問：食品用洗潔劑之標示規定為何？\n\n答：依食安法第27條，食品用洗潔劑之容器或外包裝應以中文及通用符號，明顯標示：品名、主要成分之化學名稱（多種成分者分別標明）、淨重或容量、國內負責廠商名稱電話及地址、原產地（國）、製造日期及有效日期（有時效性者）、適用對象或用途、使用方法及使用注意事項或警語、其他經中央主管機關公告之事項。"}, {"no": "健康食品-Q1", "chapter": "健康食品管理法", "content": "問：健康食品與一般食品在標示上有何不同？\n\n答：\n一、健康食品須依健康食品管理法取得查驗登記許可，始得使用「健康食品」標示及特定保健功效宣稱。\n二、健康食品之標示，除依食安法有關包裝食品之標示規定外，尚須依健康食品管理法第13條規定，標示許可字號（衛部健食字第XXXXXX號）、核准之保健功效、保健功效之相關說明（每日食用限量、攝取注意事項）及「本品經衛生福利部許可，詳細保健功效，請參閱核准之外盒標示」等。\n三、未取得健康食品許可，不得標示或廣告具保健功效，否則依健康食品管理法第21條違反規定處新臺幣10萬元以上50萬元以下罰鍰。"}, {"no": "健康食品-Q2", "chapter": "健康食品管理法", "content": "問：健康食品有哪些功效標章，其使用規定為何？\n\n答：健康食品取得查驗登記後，得使用衛生福利部核准之健康食品標章（綠色小人圖案）。使用標章須依核准字號版本，且不得使用於與核准商品不同之產品。標章使用須符合查驗登記核准內容，不得誇大或與核准保健功效不符。另，保健功效宣稱僅限於核准之宣稱範圍，不得超出核准內容。"}], "包裝食品宣稱為素食標示問答集_20241105": [{"no": "Q1", "chapter": "素食分類定義", "content": "問：素食產品標示分為哪幾類？\n\n答：素食產品標示分為「全素或純素」、「蛋素」、「奶素」、「奶蛋素」及「植物五辛素」五類，其定義如下：\n全素或純素：指食用不含奶蛋、也不含五辛（蔥、蒜、韭、薤菜及興蕖）的純植物性食品。\n蛋素：全素或純素及蛋製品。\n奶素：全素或純素及奶製品。\n奶蛋素：全素或純素及奶蛋製品。\n植物五辛素：指食用植物性食物，但可含五辛或奶蛋。\n「全素或純素」、「蛋素」、「奶素」、「奶蛋素」則不含植物五辛。"}, {"no": "Q2", "chapter": "素食分類定義", "content": "問：何謂植物五辛，可否舉例說明？\n\n答：植物五辛包括「蔥、蒜、韭、蕎及興渠」五類植物：\n1.蔥：含青蔥、紅蔥、革蔥、慈蔥、蘭蔥。\n2.蒜：含大蒜、蒜苗。\n3.韭：含韭菜、韭黃、韭菜花。\n4.蕎：即為蕗蕎或薤菜（「薤」念ㄒㄧㄝˋ），閩南話稱為蕗藠、藠頭，阿美族稱之為火蔥。\n5.興渠：即為洋蔥。"}, {"no": "Q3", "chapter": "素食分類定義", "content": "問：如何區分素食或葷食？\n\n答：凡食物製程中，有動物被犧牲或添加動物性成分者，皆屬於葷食。"}, {"no": "Q4", "chapter": "素食分類定義", "content": "問：「植物五辛素」與「奶蛋素」之標示分類是否有重覆之虞？\n\n答：「植物五辛素」為素食標示中最寬鬆的分類，是指所有可食的植物性食物，且含植物五辛；而「奶蛋素」則指全素、純素及奶蛋製品，且不含植物五辛，因此兩者並沒有分類重覆之疑慮。"}, {"no": "Q5", "chapter": "標示原則", "content": "問：全素或純素、蛋素、奶素、奶蛋素及植物五辛素等標示，其後可加上「食品」、「可食」等字樣嗎？\n\n答：可以。例如：「全素可食」、「全素食品」；「純素可食」、「純素食品」；「蛋素可食」、「蛋素食品」；「奶素可食」、「奶素食品」；「奶蛋素可食」、「奶蛋素食品」或「植物五辛素可食」、「植物五辛素食品」；惟不得單獨以「素食可食」之字樣標示，仍應區別是五種素食中哪一類別。"}, {"no": "Q6", "chapter": "標示原則", "content": "問：素食、葷食中常見之共同基本食材（如米、植物油、鹽、醬油、白醋、茶、糖），於素食店販售時需要特別標示嗎？\n\n答：標示之目的在於使素食者能充分得知其所食用食物之分類，故素食店販售之標示原則如下：\n1.素食、葷食共同常食用之基本食材（如米、植物油、鹽、醬油、白醋、茶、糖、蔬菜及水果），於素食店販售時，消費者已普遍認知為全素，因此無需再宣稱為素食。\n2.雞蛋普遍被消費者認定為蛋類、鮮奶被認定為奶類，亦無需再宣稱為素食。\n3.其他無法辨識之加工食品，均須依規定標示。"}, {"no": "Q7", "chapter": "標示原則", "content": "問：植物五辛素如有添加奶蛋，應如何標示？\n\n答：請於標示之「內容物名稱」中明列。"}, {"no": "Q8", "chapter": "特定原料素食判定", "content": "問：純奶粉可以稱為「奶素」嗎？\n\n答：可以。"}, {"no": "Q9", "chapter": "特定原料素食判定", "content": "問：奶粉如有添加二十二碳六烯酸（DHA）和二十碳五烯酸（EPA）可以稱為「奶素」嗎？\n\n答：不可以。DHA和EPA是從魚油萃取而來，而魚油萃取過程中，魚已被犧牲，因此這種奶粉應被歸類為「葷食」，不可稱為「奶素」。"}, {"no": "Q10", "chapter": "特定原料素食判定", "content": "問：針對微生物該如何界定其是否為素食？\n\n答：\n1.培養微生物的培養基若未添加任何動物性成分，則培養出來的產物可宣稱為全素。例如，培養香菇、金針菇、冬蟲夏草菌絲體或子實體的培養基未添加動物性成分，該產物可稱為全素；但培養靈芝的培養基如添加有牛肉汁，則屬於葷食，不得稱為素食。\n2.凝乳酵素（Rennet）係由牛的胃裏抽取提煉而來，若該酵素於抽取過程中並無犧牲牛隻之情事，則可宣稱為奶素，反之則屬葷食。"}, {"no": "Q11", "chapter": "特定原料素食判定", "content": "問：從蠶寶寶糞便中萃取出來的銅葉綠素可以標示為「全素」嗎？\n\n答：可以。蠶寶寶的食物為桑葉，且取其糞便時並未犧牲蠶寶寶，故可以標示為「全素」。"}, {"no": "Q12", "chapter": "特定原料素食判定", "content": "問：胭脂蟲提煉出食用天然色素胭脂紅，是否應屬於葷食？\n\n答：是。胭脂蟲為動物，且在提煉過程中被犧牲，故胭脂紅不可標示為素食。"}, {"no": "Q13", "chapter": "特定原料素食判定", "content": "問：蛋白質分解物如peptone等，是葷食還是素食？該如何區分？\n\n答：須依據其有無犧牲動物之情事來決定；若有，則屬葷食；若沒有，則屬素食。\n如其為素食，則究竟屬於何種素食分類，須依據其蛋白質之來源決定：\n1.由豆類而來：屬純素。\n2.由奶類而來：屬奶素。\n3.由蛋類而來：屬蛋素。\n4.由奶蛋類而來：屬奶蛋素。"}, {"no": "Q14", "chapter": "生產規範", "content": "問：衛生福利部食品藥物管理署是否會規範宣稱素食的產品，生產線要完全獨立？\n\n答：不會。但全素產品若能與葷食產品產製各自獨立，則可避免引發食用全素者之爭議。"}, {"no": "Q15", "chapter": "標示原則", "content": "問：品名或商標中若有「素」字，是否屬於素食宣稱而要標示素食種類？例如「香菇素蠔油」、「寶素齋」？\n\n答：須依規定標示屬於何種素食種類。"}, {"no": "Q16", "chapter": "特定原料素食判定", "content": "問：酒類及其衍生物是否屬於素食？豆瓣醬、味噌醬等發酵產品含有酒類衍生物，該如何界定？\n\n答：大部分茹素者「戒酒」，因此食品中如含有酒作為原料，不宜標示為素食。\n依據菸酒管理法第四條規定，「酒」指含酒精成分以容量計算超過0.5%之飲料及相關製品。因此，含有酒類衍生物之豆瓣醬、味噌醬等發酵產品，如酒精成分以容量計算未超過0.5%，可視為素食。"}, {"no": "Q17", "chapter": "特定原料素食判定", "content": "問：以酒粕製成之食品（如：紅麴餅乾）可否標示為素食？\n\n答：酒粕酒精成分約佔8%，本身不可被視為素食。但若以酒粕製成之食品，其酒精成分以容量計算未超過0.5%，且未有犧牲動物之情事，則可以視為素食，並視其特性標示「全素或純素」、「蛋素」、「奶素」、「奶蛋素」或「植物五辛素」等字樣。"}, {"no": "Q18", "chapter": "特定原料素食判定", "content": "問：健素糖是否可列為素食食品？\n\n答：健素糖是以果糖、砂糖、玉米澱粉、食用膠為主原料製造，另添加薄荷、杏仁油、香料、可可脂及食用色素等副原料。若其使用之原料及其製程中未有犧牲動物之情事，則可以視為素食。製造業者如於該包裝食品宣稱為素食，依規定應視其特性標示相應的素食種類。"}, {"no": "Q19", "chapter": "特定原料素食判定", "content": "問：膠囊食品可以稱為素食嗎？\n\n答：\n1.若該膠囊為動物膠（gelatin）製成，則不可以稱為素食。\n2.若該膠囊為經合法查驗登記之羧甲基纖維素鈉（Sodium Carboxymethyl Cellulose）製成，則該膠囊可以視為素食，業者如於該包裝食品宣稱為素食，依規定應視其特性標示相應的素食種類。"}, {"no": "Q20", "chapter": "標示原則", "content": "問：宣稱素食之組裝大包裝食品，應如何標示？\n\n答：\n1.組裝大包裝食品如係直接售予消費者，依法大包裝上應有中文標示。業者如於該包裝食品宣稱為素食，依規定應視其特性標示相應的素食種類。如大包裝內為不同種類之素食小包裝，應一併於大包裝上分別標示。\n2.組裝大包裝內之小包裝食品，凡屬可供個別零售者，仍應各別依食品安全衛生管理法規定標示，業者如宣稱為素食，應依規定視其特性標示相應的素食種類。"}, {"no": "Q21", "chapter": "違規處理", "content": "問：宣稱全素的產品如果被驗出動物基因，衛生機關會如何處置？違規認定基準為何？\n\n答：\n1.宣稱素食產品卻檢驗出含動物性成分者，涉及違反食品安全衛生管理法第15條第1項第7款攙偽或假冒之規定，並依同法第44條、第49條及第52條規定處分。\n2.宣稱素食產品有標示不實、誇張或易生誤解之情形（例如：標示為純素，其內容物卻含有蛋或奶成分），則涉屬違反食安法第28條第1項規定，並依同法第45條及第52條規定處分。\n3.產品生產製程不符合衛生規範（例如：所使用之設備、器具及容器之操作、使用與維護，使食品遭受污染），則涉屬違反食安法第8條第1項食品良好衛生規範準則，並依同法第44條規定處分。"}, {"no": "Q22", "chapter": "違規處理", "content": "問：植物性農產原料在種植、採收、運送過程中，如遭動物性成分污染且宣稱為素食者，是否不符規定？\n\n答：部分農產原料在種植、採收、運送過程中，如遭動物性成分污染，且含量可被驗出基因片段者，屬微量反應者，衛生機關會斟酌予以適當之限期改正，而不會逕予罰款。"}, {"no": "Q23", "chapter": "檢驗方法", "content": "問：素食檢定使用何種檢驗方法？\n\n答：依據食安法第38條規定，食品衛生安全檢驗方法，由中央主管機關定之；未定檢驗方法者，得依國際間認可之方法為之。目前衛生機關檢驗素食攙葷，係使用經衛生福利部公告之檢驗方法，可至食藥署網站「研究檢驗」>「公告檢驗方法」項下查詢。"}, {"no": "Q24", "chapter": "檢驗方法", "content": "問：衛生機關採用何方法確認業者所標示之素食宣稱屬實？\n\n答：確認業者之素食標示是否屬實之檢驗方法，其原理為聚合酵素鏈反應（PCR），測試範圍係指能夠抽取出DNA之食品，如為經過高度加工或不含DNA之食品，則輔以現場稽核判定。至於添加植物五辛之素食產品，食藥署亦已研擬植物五辛檢驗方法供檢驗確認。"}, {"no": "Q25", "chapter": "檢驗方法", "content": "問：食藥署公告的檢驗方法包含針對豬、牛、金線魚等多種動物DNA檢驗，是否每一項素食食品都需要執行所有的動物性DNA檢驗？\n\n答：先進行動物性成分篩選檢驗，如為陽性反應，才會針對常見攙葷成分進行個別單一的檢驗。"}, {"no": "Q26", "chapter": "檢驗方法", "content": "問：素食規定需要嚴謹到二次原料以上來源的追蹤嗎？\n\n答：\n1.基本上檢驗單位進行攙偽之檢驗結果判定時，會先經過即時PCR篩檢，判定其是否蓄意添加、製程污染或為單純之接觸污染。例如：商品為昆布類，因昆布於海洋中附著於貝殼上，衛生機關不會逕予處罰。\n2.如單一生產線生產，品管製作過程中未混入動物性成分原料，但經DNA檢驗驗出動物性原料，此情形即為二次原料之污染。因此，業者於生產素食時，需要對二次原料以上來源進行追蹤，以避免污染。"}, {"no": "Q27", "chapter": "檢驗方法", "content": "問：為證明商品是否為素食產品，食品業者是否可將商品自行送至檢驗機關分析？\n\n答：\n1.食品業者可自費將商品送至民間檢驗實驗室進行檢驗。\n2.有關經食藥署認可之素食攙葷檢驗實驗室名單，請至食藥署網站「實驗室認證」>「認證實驗室名單」項下查詢。"}, {"no": "Q28", "chapter": "特定原料素食判定", "content": "問：羊毛油屬動物性油，唯非經殺生取得，是否屬素食食品？\n\n答：\n1.素食僅含括「全素或純素」、「蛋素」、「奶素」、「奶蛋素」及「植物五辛素」等五類。羊毛油雖非經殺生取得，惟是否屬素食食品，則宜由素食者自行決定，目前仍不宜宣稱為素食，其成分應標明。\n2.中華民國一貫道總會認為羊毛油是否屬素食由素食者自行決定；台灣素食推廣協會則認為羊毛油是屬羊的脂肪，不能認定為素食。"}, {"no": "Q29", "chapter": "特定原料素食判定", "content": "問：（新增）產品成分含有乳糖，那產品可標示「全素」嗎？\n\n答：\n1.包裝食品宣稱為素食者，應於包裝上顯著標示「全素或純素」、「蛋素」、「奶素」、「奶蛋素」、「植物五辛素」等字樣。\n2.乳糖為牛乳成分之一，且市售乳糖原料亦係以牛乳為原料所加工製得，因此食品在其他原料屬於全素之情形下，如使用乳糖原料，且欲宣稱為素食食品，則應歸類為「奶素」。"}], "小包裝食品免一部標示規定_20210901": [{"no": "第一點", "chapter": null, "content": "依食品安全衛生管理法（以下簡稱本法）第二十三條規定訂定之。"}, {"no": "第二點", "chapter": null, "content": "市售食品之容器或外包裝之最大表面積不足二十平方公分者，得依下列方式，擇一標示：\n(一) 於產品外包裝得僅標示下列事項：\n1. 品名。\n2. 有效日期。\n3. 國內負責廠商名稱及電話號碼。\n4. 原產地及經中央主管機關公告應標示之原料原產地。\n5. 過敏原等醒語資訊。\n(二) 除品名及有效日期應於產品外包裝標示外，其他本法第二十二條第一項第二款至第六款及第八款至第十款應標示事項，得以「QR Code」或其他電子化方式揭露，並應於電子化標示之上方或下方位置，附有「掃描此處可獲得產品標示資訊」或等同意義字樣。"}], "包裝食品營養宣稱應遵行事項_20260101": [{"no": "第一點", "chapter": null, "content": "本應遵行事項依食品安全衛生管理法第二十二條第三項規定訂定之。"}, {"no": "第二點", "chapter": null, "content": "本應遵行事項適用於包裝食品標示之營養宣稱；「特殊營養食品」之營養宣稱，除另有規定外，適用本應遵行事項規定。"}, {"no": "第三點", "chapter": null, "content": "本應遵行事項用詞，定義如下：\n(一)營養宣稱：以任何說明、隱喻、暗示方式表達該產品具有或不具有特定之熱量或營養素。\n(二)需適量攝取之營養素：攝取過量，將對國民健康有不利影響之熱量、脂肪、飽和脂肪、反式脂肪、膽固醇、鈉、糖、乳糖。\n(三)可補充攝取之營養素：攝取不足，將影響國民之健康，可經由額外提供方式予以補充之蛋白質、膳食纖維、維生素A、維生素B1、維生素B2、維生素B6、維生素B12、維生素C、維生素D、維生素E、維生素K、菸鹼素、葉酸、泛酸、生物素、膽素、鈣、鐵、碘、鎂、鋅、氟、硒。"}, {"no": "第四點", "chapter": null, "content": "營養宣稱應依下列規定辦理：\n(一)記載食品所含熱量或營養素含量之數值者，以該食品之單位重量、容量、數量或每份量，表達所含熱量或營養素之含量。\n(二)需適量攝取之營養素：\n1.固體（半固體）食品，其標示表一第一欄所列營養素為「無」、「不含」、「零」或等同意義詞句者，該食品每一百公克所含該營養素量，不得超過表一第二欄所示之量。\n2.液體食品，其標示表一第一欄所列營養素為「無」、「不含」、「零」或等同意義詞句者，該食品每一百毫升所含該營養素量，不得超過表一第三欄所示之量。\n3.固體（半固體）食品，其標示表二第一欄所列營養素為「低」、「少」、「薄」、「微」、「略含」或等同意義詞句者，該食品每一百公克所含該營養素量，不得超過表二第二欄所示之量。\n4.液體食品，其標示表二第一欄所列營養素為「低」、「少」、「薄」、「微」、「略含」或等同意義詞句者，該食品每一百毫升所含該營養素量，不得超過表二第三欄所示之量。\n5.食品宣稱「低鈉」者，除鈉含量不得超過表二第二欄或第三欄所示之量外，於營養標示中標示「鉀」含量。\n(三)可補充攝取之營養素（詳見表三）：\n1.固體（半固體）食品，宣稱「高、多、強化、富含」，每一百公克達表三第二欄之量；屬表五所列者，每三十公克（實重）達表三第二欄之量；屬表六所列者，每一公克（乾貨）達表三第二欄之量。\n2.液體食品，宣稱「高、多、強化、富含」，每一百毫升達表三第三欄之量，或每一百大卡達表三第四欄之量。\n3.膠囊狀、錠狀食品，宣稱「高、多、強化、富含」，每日最低攝取量達表三第二欄之量。\n(四)表四所列之營養素，其營養宣稱涉生理功能者，含量應遵循相關規定（詳見表四）。\n(五)涉營養素含量比較者：\n1.就表二第一欄所列營養素為「較…低」、「較…少」或「減…」（不包含減鈉鹽）或等同意義詞句者，其與同類參考食品之差距，分別達表二第二欄或第三欄所示之量，且標明比較食品品名及減低之量或比例。\n2.就表三第一欄所列營養素為「較…高」、「較…多」或「…倍」或等同意義詞句者，其與同類參考食品之差距，分別達表三第二欄、第三欄或第四欄所示之二分之一量，且標明比較食品品名及增加之量或比例。\n(六)表七所列之食品，不得作「高、多、強化、富含、較…高、較…多」或等同意義詞句之營養宣稱，以及營養素生理功能等之宣稱。"}, {"no": "第五點", "chapter": null, "content": "需再經復水或稀釋才可供食用之食品（如奶粉、果汁粉、咖啡等），得以一百公克固體或以依產品標示建議量調製後之一百毫升液體之營養素含量，作為營養宣稱衡量基準，且其營養標示方式應與營養宣稱之衡量基準一致。屬沖泡且不直接食用內容物之食品（如茶包等），應依沖泡方式之一百毫升沖泡液之營養素含量，作為衡量基準。"}, {"no": "第六點", "chapter": null, "content": "一食品為二項以上營養宣稱者，其宣稱之營養素，應以同型態【固體(半固體)或液體】作為衡量基準；其選擇以液體作為衡量基準者，以一百毫升為原則；如以一百大卡為衡量基準者，應於包裝上註明。"}, {"no": "第七點", "chapter": null, "content": "非屬「需適量攝取」或「可補充攝取」之營養素，不得標示第四點第二款或第三款之營養宣稱詞句，亦不得標示涉營養素含量比較之詞句。"}, {"no": "表一", "chapter": "附表", "content": "表一　需適量攝取之營養素「無、不含、零」宣稱限量\n<div class=\"reg-table-block\"><p><strong>表一　需適量攝取之營養素「無、不含、零」宣稱限量</strong></p>\n<div class=\"table-scroll\"><table class=\"annex-table\" border=\"1\">\n<thead><tr><th>第一欄<br>營養素</th><th>第二欄<br>固體（半固體）100 公克</th><th>第三欄<br>液體 100 毫升</th></tr></thead>\n<tbody>\n<tr><td>熱量</td><td>4 大卡</td><td>4 大卡</td></tr>\n<tr><td>脂肪</td><td>0.5 公克</td><td>0.5 公
