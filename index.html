適當之處理措施，避免造成油污及油煙污染作業場所及用餐環境。\n四、廚房有維持適當空氣壓力及室溫之措施。\n五、販賣櫃臺與調理、加工及操作之場所，予以有效區隔。"}, {"no": "第31條", "chapter": "第五章 餐飲業", "content": "餐飲業應依下列方式，就設施、設備及器具、容器，施行清潔及消毒或殺菌：\n一、清潔：採用符合飲用水水質標準之洗滌用水清洗；其使用清潔劑者，應以食品用清潔劑為限。\n二、消毒或殺菌：\n(一)砧板、菜刀、鍋鏟及餐具：使用乾熱、蒸氣、熱水、氯液或其他有效方法處理。\n(二)毛巾及抹布：使用蒸氣、沸水、氯液或其他有效方法處理。"}, {"no": "第32條", "chapter": "第五章 餐飲業", "content": "餐飲業製備及供應之衛生管理，應符合下列規定：\n一、製備過程中所使用設備及器具，其操作及維護，避免污染食品；必要時，以顏色區分不同用途之設備及器具。\n二、使用之免洗餐具，用畢即丟棄；共桌分食之場所，提供分食專用之匙、筷、叉、刀及其他所需餐具。\n三、提供之餐具，維持乾燥清潔，餐具與食品接觸面平滑，且無變形、破損、裂縫、缺口或鏽蝕；無油脂、澱粉、蛋白質及食品用洗潔劑之殘留；必要時，進行病原性微生物之檢測。\n四、製備流程，採取避免交叉污染措施。\n五、製備之菜餚，其貯存及供應應維持適當之溫度；室溫下不得存放二小時以上，熟食及易腐敗菜餚應及時冷藏；熟食之熱藏溫度保持在攝氏六十度以上。\n六、貯放食品及餐具，有防塵、防蟲及必要之衛生設施。\n七、供應非自行製備之即食菜餚者，採取防止變質、腐敗及其他維護衛生安全之措施。\n八、製備食品使用之機具、器具及其他設備，保持清潔。\n九、供應生冷食品者，於專屬作業區進行調理、加工及操作。\n十、生鮮水產品之養殖處所與調理處所，予以有效區隔。\n十一、製備時段內，廚房及作業區域之進出貨與人員進出，有適當之管制。\n十二、餐食區隨時維持清潔。"}, {"no": "第33條", "chapter": "第五章 餐飲業", "content": "外燴業者，除應符合第三十條至前條規定外，並應遵守下列規定：\n一、烹調場所及供應之食物，不得直接日曬、雨淋或接觸污染源，並有遮蔽、冷凍(藏)設備或設施。\n二、烹調食物時，符合新鮮、清潔、迅速、加熱及冷藏原則，並不得交叉污染。\n三、辦理二百人以上餐飲時，於辦理三日前向辦理外燴餐飲地點之衛生局（所）報請備查；其備查內容包括委辦者、承辦者、辦理地點、參加人數及菜單。"}, {"no": "第34條", "chapter": "第五章 餐飲業", "content": "餐飲業烹調從業人員持有中餐烹調技術士證、西餐烹調技術士證或食物製備技術士證之比率及衛生講習，應符合食品業者專門職業或技術證照人員設置及管理辦法之規定。\n前項依食品業者專門職業或技術證照人員設置及管理辦法設置之中餐烹調技術士、西餐烹調技術士或食物製備技術士，得向任一直轄市、縣(市)餐飲相關工會或公會，申請發給廚師證書，並得於全國各直轄市、縣(市)從事廚師業務。廚師證書有效期間為四年。\n前項工會或公會辦理廚師證書發證事宜，應接受直轄市、縣(市)主管機關督導。"}, {"no": "第35條", "chapter": "第六章 食品添加物業", "content": "食品添加物業就食品添加物之進貨及貯存管理，應符合下列規定：\n一、建立食品添加物或原料進貨之驗收作業及追溯、追蹤制度，記錄進貨來源、內容物成分、數量及其他相關資料。\n二、依原材料、半成品或成品，貯存於不同場所，必要時，貯存於冷凍貯存設備或冷藏貯存設備。\n三、食品添加物應置於與其他原材料、半成品或成品明顯辨別之專區貯存，並指定專人管理，且以紙本或電子檔案，專冊登載食品添加物種類、許可證字號或產品登錄碼、進貨量、出貨量、使用量及存量。"}, {"no": "第36條", "chapter": "第六章 食品添加物業", "content": "食品添加物業者於製程中使用溶劑或粉劑時，應設置相關設施或設備，防止有害物質外洩，或避免其他危害發生。"}, {"no": "第37條", "chapter": "第六章 食品添加物業", "content": "食品添加物業者，其製程之設備、器具、容器及包裝，應符合下列規定：\n一、易於清洗、消毒及檢查。\n二、防止潤滑油、金屬碎屑、污水或其他可能造成污染之物質混入食品添加物。\n三、符合食品器具容器包裝衛生標準之規定。"}, {"no": "第38條", "chapter": "第六章 食品添加物業", "content": "食品添加物業者，其製程及品質管制，應符合下列規定：\n一、建立製程及品質管制標準作業程序，並應完整記錄。\n二、每批成品應確認符合其品保要求；不符合者，應有適當處理程序，並作成紀錄。\n三、成品應符合食品添加物使用範圍及限量暨規格標準，並完整包裝及標示。\n四、產品銷售予非自然人之直接買受者，應有得追蹤其流向之資料或紀錄。"}, {"no": "第39條", "chapter": "第六章 食品添加物業", "content": "食品添加物業，本章未規定者，適用第二章至第四章規定。"}, {"no": "第40條", "chapter": "第七章 熱殺菌密閉容器包裝低酸性食品及酸化食品製造業", "content": "熱殺菌密閉容器包裝低酸性食品及酸化食品製造業(以下簡稱低酸性及酸化食品製造業)之生產及加工，應符合附件四之規定。\n\n【附件四】熱殺菌密閉容器包裝低酸性食品及酸化食品製造業生產及加工管理規定\n一、名詞定義：\n(一)殺菌條件：指熱殺菌密閉容器包裝低酸性食品及酸化食品為達到殺菌要求，所採行之控制處理及殺菌程序。\n(二)殺菌重要因子：指任何特性、條件或參數等，其變異足以影響殺菌方法及商業滅菌或熱殺菌效果者。\n(三)D值：特定微生物含量在特定溫度條件下減少百分之九十所需要之時間(單位：分鐘)。\n(四)z值：特定微生物D值減少百分之九十所需要提高之攝氏溫度。\n(五)殺菌值(F0)：表示熱處理條件之殺菌程度，其熱致死總效應相當於達攝氏一百二十一點一度時，對z值等於攝氏十度之細菌或孢子殺滅能力(單位：分鐘)。\n(六)LSV值(Least Sterilization Value)：表示熱處理條件之殺菌程度，其熱致死總效應相當於攝氏八十二點二度時，對z值等於攝氏十點八三度之細菌或孢子殺滅能力(單位：分鐘)。\n(七)保溫試驗：將樣品置於攝氏三十七度十天，觀察其是否因微生物繁殖而導致產品膨脹、變形或pH值異常改變等品質變化之試驗。\n二、產品調製：\n(一)熱殺菌密閉容器包裝低酸性食品：\n1.產品之裝填及裝填後之脫氣，符合第三點所定殺菌條件。\n2.依第三點所定之殺菌條件中，與產品調製相關之殺菌重要因子，予以控制在界限內。\n(二)酸化食品：\n1.訂有pH值量測標準作業程序，且在熱殺菌前及熱殺菌後，皆進行產品pH值量測，確定每批產品之最終平衡pH值保持在四點六以下，並作成紀錄。\n2.每批酸化作業紀錄，應由品管主管及製造主管核對簽名及加註日期，且作業記錄人員不得為該二主管。\n三、殺菌條件之訂定：\n(一)訂定殺菌條件，應考慮生產上可能發生之變異種類、程序及各種變異之組合，影響殺菌條件之重要因子，均應於殺菌條件中規定。\n(二)每一熱殺菌密閉容器包裝低酸性食品之殺菌條件及殺菌重要因子之訂定可採下列方式之一：\n1.由殺菌專業機構量測訂定，並取得殺菌條件報告書留存備查。\n2.經殺菌專業機構實地評鑑合格之食品製造業者自行量測，將建立殺菌條件之量測資料送殺菌專業機構審查後訂定，並取得殺菌條件報告書留存備查。\n(三)熱殺菌密閉容器包裝低酸性食品之殺菌條件之殺菌值(F0)應大於或等於三。\n(四)酸化食品之殺菌條件：\n1.每一生產品項規格之殺菌條件及殺菌重要因子，得由製造業者自行訂定。\n2.前款殺菌條件及殺菌重要因子之訂定，非由殺菌專業機構所為並取得殺菌條件報告書者，其量測及評估資料應留存備查。\n3.殺菌條件之LSV值應大於或等於零點二。\n四、殺菌作業之管理：\n(一)每一種產品所設定之殺菌條件，張貼於殺菌設備附近明顯易見或置於殺菌操作人員容易取閱之處。\n(二)殺菌作業區應防止已殺菌及未殺菌產品混雜。\n(三)殺菌操作予以控制，不得低於所訂定之殺菌條件。\n(四)殺菌計時之時鐘，精確且易觀察，不得使用手錶或袋錶。\n(五)殺菌操作人員即時填寫殺菌工作報告，並每日在自動溫度紀錄儀紙上簽名及加註日期，此二種紀錄應互相對照。\n(六)殺菌工作報告及自動溫度紀錄儀紙，在製造後一星期內，由殺菌技術管理人員核對簽名及加註日期。\n(七)每一批之產品，取樣品做保溫試驗並作成紀錄。\n(八)酸化食品之殺菌作業不受第五款及第六款所限。\n五、殺菌條件之管制：\n(一)對於殺菌重要因子，應以足夠之頻率加以測定並記錄。\n(二)熱殺菌密閉容器包裝低酸性食品發現有低於殺菌條件或殺菌重要因子未妥善控制時，除附件五另有規定外，非經殺菌專業機構評估為無有害活性微生物及其孢子存在，不得為銷毀以外之處置；其銷毀或處置應作成紀錄。\n(三)酸化食品發現有低於殺菌條件或殺菌重要因子未妥善控制時，非經製造業者評估為無有害活性微生物及其孢子存在，不得為銷毀以外之處置；其銷毀或處置應作成紀錄。"}, {"no": "第41條", "chapter": "第七章 熱殺菌密閉容器包裝低酸性食品及酸化食品製造業", "content": "低酸性食品製造業之殺菌設備，應經殺菌專業機構確認效能，並由該機構出具報告書；其使用附件五所列殺菌設備及方法者，應符合該附件之規定。\n前項殺菌專業機構，應對殺菌設備及方法具有專門知識，並經中央主管機關認定。\n殺菌設備之溫度指示裝置，應於裝置前及裝置後每年度至少校正一次；壓力錶每年度至少校正一次。\n\n【附件五】熱殺菌密閉容器包裝低酸性食品及酸化食品製造業殺菌設備與方法管理規定（重點摘錄）\n本附件就下列殺菌方式分別訂定溫度指示裝置、自動溫度記錄儀、壓力錶、蒸汽控制器、進汽管路、洩汽栓、排氣裝置、殺菌籃框、籃框支架、安全閥及冷卻方法等設備規格與操作規定：\n一、靜置式殺菌釜蒸汽加壓殺菌。\n二、靜置式殺菌釜熱水加壓殺菌。\n三、非連續式轉動殺菌釜蒸汽加壓殺菌。\n四、非連續式轉動殺菌釜熱水加壓殺菌。\n五、無菌加工及包裝系統（含產品殺菌機、容器殺菌及產品充填、密封作業）。\n各類殺菌設備均應具備精準之溫度指示裝置（精準度達攝氏零點五度）與自動溫度記錄儀，並定期校正、作成紀錄；殺菌過程中不得以壓力作為殺菌條件之依據；排氣作業須確保釜內空氣完全排除、溫度分佈均勻後，始得開始殺菌計時；無菌加工系統應設有分流系統，於殺菌不足或異常時自動停機或將產品導離充填機或無菌貯存槽。\n本附件另訂有各式殺菌釜管徑、孔徑、孔數等詳細工程規格表及排氣裝置示意圖，屬設備建置技術規範，業者應依實際採用之殺菌設備型式，洽詢經中央主管機關認定之殺菌專業機構取得完整技術規格及殺菌條件報告書。"}, {"no": "第42條", "chapter": "第七章 熱殺菌密閉容器包裝低酸性食品及酸化食品製造業", "content": "低酸性及酸化食品製造業，應置下列人員：\n一、密封操作人員。\n二、密封檢查人員。\n三、殺菌操作人員。\n四、殺菌技術管理人員。\n同一製造批次，前項第一款與第二款人員，不得互相兼代；第三款與第四款人員間，不得互相兼代。\n第一項第四款人員，應經殺菌專業機構訓練合格，並領有證書。\n第一項第一款至第三款之人員，屬製造熱殺菌密閉容器包裝低酸性金屬罐裝產品者，應經殺菌專業機構訓練合格，並領有證書；其餘人員，應受有相關專業訓練。"}, {"no": "第43條", "chapter": "第七章 熱殺菌密閉容器包裝低酸性食品及酸化食品製造業", "content": "低酸性及酸化食品製造業之容器密封，應符合附件六之規定。\n\n【附件六】熱殺菌密閉容器包裝低酸性食品及酸化食品製造業容器密封之管制規定\n一、容器之密封(封口)，應符合下列規定：\n(一)金屬罐捲封之外觀檢查，檢查間隔不得超過一小時，並詳實記錄。\n(二)金屬罐之外觀檢查，不得有膨罐、污銹罐、彈性或急跳罐、嚴重凹罐之現象，且捲封不得有切罐、斷封、尖銳捲緣、疑似捲封、捲緣不平、唇狀、舌狀、側封不正常等可能引起漏罐之現象。\n(三)捲封之解體檢查，每罐型第一罐，進行解體檢查，其後檢查間隔不得超過四小時，並應詳實記錄。\n(四)前款之檢查項目為捲封寬度與厚度、罐蓋深度、蓋鈎、罐鈎、鈎疊長度或鈎疊率及皺紋度；其捲封品質及檢驗方法，符合中華民國國家標準CNS827食品罐頭用圓形金屬空罐之規定。\n(五)玻璃瓶之封蓋，不得有斜蓋或密閉不緊等密封不完全之現象。\n(六)殺菌袋之封口外觀檢查，不得有穿孔、封口不平、封口處殘留夾雜物或封口不完全等可能引起漏袋之現象。\n(七)各類型容器，以適當頻率檢查封口機之效率及產品密封性，並應詳實記錄。\n二、殺菌冷卻後之產品，使用輸送帶輸送時，應避免輸送帶與捲封(封口)之接觸；有破損之輸送帶、罐緩衝器等，均應更新，與金屬罐捲封(封口)接觸之軌道及輸送帶，應保持清潔。\n三、密封作業及其檢查，應作成紀錄，由品管主管及製造主管核對簽名及加註日期，且記錄人員不得為該二主管。"}, {"no": "第44條", "chapter": "第七章 熱殺菌密閉容器包裝低酸性食品及酸化食品製造業", "content": "低酸性及酸化食品製造業，本章未規定者，適用第二章規定。"}, {"no": "第45條", "chapter": "第八章 食品器具、容器或包裝製造業", "content": "食品器具、容器或包裝之製造業者，其製造應依最終使用條件，選用適宜原料，並保存相關衛生安全資料。"}, {"no": "第46條", "chapter": "第八章 食品器具、容器或包裝製造業", "content": "食品器具、容器或包裝之製造業者，其製造場所之混料區、加工區或包裝區，應採取措施，避免粉塵或油氣污染。"}, {"no": "第47條", "chapter": "第八章 食品器具、容器或包裝製造業", "content": "食品器具、容器或包裝之製造業者，其製程及品質管制，應作成紀錄；有異常發生者，應採取矯正及預防措施，並作成紀錄。"}, {"no": "第48條", "chapter": "第八章 食品器具、容器或包裝製造業", "content": "食品器具、容器或包裝之製造業者，其每批成品應確認符合其品保要求；不符合者，應有適當處理程序，並作成紀錄。"}, {"no": "第49條", "chapter": "第八章 食品器具、容器或包裝製造業", "content": "食品器具、容器或包裝製造業，依本準則規定所建立之紀錄，應至少保存五年；產品訂有有效日期者，其紀錄應保存至各該批成品有效日期後三年，且自紀錄作成日起不得少於五年。"}, {"no": "第50條", "chapter": "第八章 食品器具、容器或包裝製造業", "content": "第四十五條至前條規定，食品器具、容器或包裝製造業，除塑膠類製造業外，其施行日期如下:\n一、非塑膠類之製造工廠，其資本額新臺幣三千萬以上者，自本準則中華民國一百十四年六月四日修正發布後三年施行。\n二、前款以外之非塑膠類製造業，自本準則一百十四年六月四日修正發布後五年施行。"}, {"no": "第51條", "chapter": "第九章 食品用洗潔劑製造業", "content": "食品用洗潔劑製造業，其製造應依產品最終使用條件，選用適宜之原料，並保存相關衛生安全資料。"}, {"no": "第52條", "chapter": "第九章 食品用洗潔劑製造業", "content": "食品用洗潔劑製造業者，其製程及品質管制，應作成紀錄；有異常發生者，應採取矯正及預防措施，並作成紀錄。"}, {"no": "第53條", "chapter": "第九章 食品用洗潔劑製造業", "content": "食品用洗潔劑製造業者，其每批成品應確認符合其品保要求；不符合者，應有適當處理程序，並作成紀錄。"}, {"no": "第54條", "chapter": "第十章 附則", "content": "本準則除另定施行日期者外，自發布日施行。"}], "食品良好衛生規範準則問答集_202508": [{"no": "Q1", "chapter": "第一章 總則", "content": "問：何謂食品良好衛生規範準則？\n\n答：食品良好衛生規範準則(The Regulations on Good Hygiene Practice for Food, GHP)是依據食品安全衛生管理法(以下簡稱食安法)第8條第4項規定所定，為食品業者確保其產品之衛生安全及品質所應符合之最基本軟、硬體要求。所有食品業者皆應實施GHP，以確保食品在製造、加工、調配、包裝、運送、貯存、販賣、輸入、輸出等過程中，做好衛生管理，達到降低污染之功效。"}, {"no": "Q2", "chapter": "第一章 總則", "content": "問：食品良好衛生規範準則之管理內容為何？\n\n答：食安法第8條第1項規定，所有食品業者均應符合食品良好衛生規範準則(下稱本準則)，本準則自從業人員、作業場所、設施衛生管理及其品保制度等四大面向著手，除訂定應遵守之一般規定外，另針對不同業者，分別訂定規範專章，包括食品製造業、食品工廠、食品物流業、食品販賣業、餐飲業、食品添加物業、熱殺菌密閉容器包裝低酸性食品及酸化食品製造業、食品器具容器或包裝製造業及食品用洗潔劑製造業。"}, {"no": "Q3", "chapter": "第一章 總則", "content": "問：「食品良好衛生規範準則」適用之食品業者為何？\n\n答：食品良好衛生規範準則為所有食品業者應符合之強制性規定，故凡從事食品或食品添加物之製造、加工、調配、包裝、運送、貯存、販賣、輸入、輸出或從事食品器具、食品容器或包裝、食品用洗潔劑之製造、加工、輸入、輸出或販賣之業者，均應符合本準則之規定。"}, {"no": "Q4", "chapter": "第一章 總則", "content": "問：違反「食品良好衛生規範準則」之罰則？\n\n答：衛生主管機關稽查時，如發現食品業者不符合本準則時，依食安法第44條第1款規定，經命其限期改正，屆期不改正，處新臺幣6萬元以上2億元以下罰鍰；情節重大者，並得命其歇業、停業一定期間、廢止其公司、商業、工廠之全部或部分登記事項，或食品業者之登錄；經廢止登錄者，一年內不得再申請重新登錄。"}, {"no": "Q5", "chapter": "第一章 總則", "content": "問：食品不得直接放置於地面的原因？\n\n答：本準則第7條第2款規定「物品應予分類，採取有效措施離地貯放，並保持整潔及良好通風」。第6條附件三第7點第3款規定「原材料、半成品及成品，於製程中不得與地面直接接觸」。所述「離地措施」旨在確保食品於儲放期間免於直接接觸地面，以降低微生物或病媒污染之風險。食品或用品應離地至少5~15公分放置，以容器具或紙箱盛裝之食品，仍應放置於棧板、貨架、地墊上，不直接放置地面。"}, {"no": "Q6", "chapter": "附件一 場區、設施及設備之衛生管理規定", "content": "問：食品業者之用水應符合何項規定？\n\n答：1.本準則第4條附件一，供水設施應符合下列規定：\n(1) 食品、食品添加物、食品用洗潔劑製程中之用水、冰塊，及清洗製造有關之設備與用具之用水，應符合飲用水水質標準。\n(2) 應有足夠之水量及供水設施。\n(3) 使用地下水源者，其水源與化糞池、廢棄物堆積場所等污染源，應至少保持15公尺之距離。\n(4) 蓄水池(塔、槽)設置地點應距離化糞池、廢棄物堆積場所或其他污染源3公尺以上，並保持清潔，每年至少清理一次，並作成紀錄。\n(5) 飲用水與非飲用水之管路系統，應完全分離；第一款與非第一款用水，能明顯辨識區分出水口。\n2.飲用水與非飲用水之出水口，應能明顯辨識區分，可以用顏色、形狀、標示區分，以可以讓操作人員明顯分辨，避免遭誤用為原則。"}, {"no": "Q7", "chapter": "附件一 場區、設施及設備之衛生管理規定", "content": "問：本準則所稱「防止病媒侵入設施」為何？\n\n答：1. 本準則第4條附件一第2點第3、4款規定，出入口、門窗、通風口及其他孔道應保持清潔，並應設置防止病媒侵入設施。排水系統應完整暢通，避免有異味，排水溝應有攔截固體廢棄物之設施，並應設置防止病媒侵入之設施。第2點第9款規定，應實施有效之病媒防治措施，避免發現有病媒或其出沒之痕跡。本項規定旨於防止病媒侵入，非事後補捉。\n2. 防止病媒侵入設施指以適當且有形的隔離方式，防範病媒侵入之裝置，例如陰井或適當孔徑的柵欄、紗網等。另可使用黏鼠板、蟑螂屋、捕蚊燈等，進行病媒防治，惟應避免放置於清潔區中，且定期將病媒防治器具更新。\n3. 倘為監測病媒防治成效，若有實際需求，清潔區可在特定條件下設置捕蟲燈，例如：設備位置應設於非作業干擾處，並避免對作業流程或產品造成污染風險、作業期間關閉燈源，僅於非作業時間開啟，用於監控與誘捕、須有完整的記錄與病媒趨勢分析，並納入環境衛生管理計畫中。"}, {"no": "Q8", "chapter": "附件一 場區、設施及設備之衛生管理規定", "content": "問：食品作業場所照明燈管一定要有燈罩嗎？\n\n答：本準則第4條附件一第2點第5款規定，食品上方之照明設備，應有防護設備。食品作業場所之燈具如果裝設於作業線上或食品上方，應加防護罩或有防爆措施，以防止燈管破裂時玻璃碎片或其他雜物污染食品。燈具設備如因應工業科技發展，其設計足以預防前述污染情事，不加裝燈罩尚符合GHP準則規定。"}, {"no": "Q9", "chapter": "附件一 場區、設施及設備之衛生管理規定", "content": "問：食品作業場所應標示之正確洗手流程為何？\n\n答：1. 本準則第4條附件一第7點第3款規定，作業場所洗手設施應於明顯之位置標示簡明易懂之洗手步驟及方法；本準則第5條附件二第1點第5款規定，於作業場所工作之人員，其手部應保持清潔，並應於進入作業場所前、如廁、吐痰、擤鼻涕或其他可能污染手部之行為後，立即洗淨再工作。食品業者於作業場所洗手設施內應標示「食品從業人員正確洗手步驟」，以提醒食品從業人員應依正確步驟洗手。\n2.食品從業人員之洗手流程，應遵守「濕、洗、刷、搓、沖、乾」6步驟，其中「刷」為利用乾淨的指甲刷把指尖及指甲刷乾淨，以避免指甲內髒污污染食品，為食品從業人員必要的洗手步驟，食品業者應自主管理，定期清潔或更換指甲刷及器具。\n3.食品從業人員正確洗手步驟相關資訊，可參見衛生福利部食品藥物管理署(下稱食藥署)網站(業務專區>食品>餐飲衛生> 8.出版品及宣導品專區 > 洗手海報> 食品從業人員正確洗手步驟)。業者尚可自行設計洗手步驟之圖示，惟仍需以「濕、洗、刷、搓、沖、乾」為食品從業人員之正確洗手步驟。\n4.本準則第4條附件一第5點第4款規定，廁所應於明顯處標示「如廁後應洗手」或相類文義之用語。"}, {"no": "Q10", "chapter": "附件一 場區、設施及設備之衛生管理規定", "content": "問：有關食品作業場所環境落菌、機械塗抹、人員手部塗抹等檢驗項目，是否有相關規定可供依循？\n\n答：食品業者之從業人員、作業場所、設施衛生管理及其品保制度，均應符合本準則之規定，並視整體食品及其製程特性，以及各作業區清潔度等要求，自主訂定衛生安全管理措施及其標準，以確保食品產品之衛生安全品質。"}, {"no": "Q11", "chapter": "附件二 從業人員、器具設備、化學物質、廢棄物及油炸時使用之食用油之衛生管理規定", "content": "問：食品從業人員健康檢查項目為何？\n\n答：本準則第5條附件二第1點第1款及第3款規定，新進食品從業人員應經醫療機構檢查Ａ型肝炎、傷寒、出疹、膿瘡、外傷、手部皮膚病等合格後，始得聘僱；雇主每年應主動辦理食品從業人員前述檢查至少一次。罹患或感染Ａ型肝炎、傷寒、出疹、膿瘡、外傷、手部皮膚病或其他可能造成食品污染之疾病，其罹患或感染期間，應主動告知現場主管，不得從事與食品接觸之工作。"}, {"no": "Q12", "chapter": "附件二 從業人員、器具設備、化學物質、廢棄物及油炸時使用之食用油之衛生管理規定", "content": "問：食品從業人員健康檢查之頻率為何？\n\n答：本準則第5條附件二第1點第1款規定，雇主每年應主動辦理食品從業人員前述檢查至少一次，該規定所稱「每年」以年度為判定，員工健康檢查，業者可安排於年度內任何日期辦理。"}, {"no": "Q13", "chapter": "附件二 從業人員、器具設備、化學物質、廢棄物及油炸時使用之食用油之衛生管理規定", "content": "問：食品從業人員是否可至醫事檢驗所辦理健康檢查？或由醫療機構委託醫事檢驗所辦理健康檢查？\n\n答：本準則第5條附件二第1點第1款規定，進用食品從業人員時，經醫療機構檢查Ａ型肝炎、傷寒、出疹、膿瘡、外傷、手部皮膚病等合格後，始得聘僱；雇主每年應主動辦理食品從業人員前述檢查至少一次。查醫療法及醫療機構設置標準規定，醫院、診所、衛生所等機構屬前開規定所稱之醫療機構，尚未包括醫事檢驗所。且健康檢查結果應經由醫師診斷。倘食品從業人員至診所等醫療機構，並由其委託之醫事檢驗所進行健康檢查，檢查結果應由醫師診斷，尚符合前揭準則之規定。"}, {"no": "Q14", "chapter": "附件二 從業人員、器具設備、化學物質、廢棄物及油炸時使用之食用油之衛生管理規定", "content": "問：食品從業人員接受健康檢查時，A型肝炎應檢查那些項目？\n\n答：1. 食品從業人員A型肝炎之檢查項目，建議檢驗IgM抗體及IgG抗體二項，或至少檢驗一項，且應避免於接種A型肝炎疫苗12週內接受該項目健康檢查。IgM抗體通常於感染後1至2週內臨床症狀出現前便能測得，並持續4至6個月，少數個案甚至延續數年。感染後產生之IgG抗體可延續終生，因終生有抵抗力。\n2. 食品從業人員A型肝炎IgG為陽性者，表示已具A型肝炎免疫力，該員可從事與食品接觸之工作；IgG為陰性者，表示不具A型肝炎免疫力，應再檢驗IgM，以確認是否可從事與食品接觸工作。\n3. 食品從業人員A型肝炎IgM為陽性者，若有相關臨床症狀，經醫師診斷，綜合評估符合急性病毒性A型肝炎通報定義，請依循衛生福利部疾病管制署「急性病毒性A型肝炎防治工作手冊」辦理，於研判排除前，應暫時停止從事與食品接觸之工作。\n4. A型肝炎IgG及IgM皆為陰性者，表示未曾感染A型肝炎，建議施打2劑疫苗(間隔6至12個月）可提供20年以上之保護力。食品從業人員提具20年內已接種2劑A型肝炎疫苗之證明或提具醫生開立A型肝炎確診證明者，可免再檢驗A型肝炎項目。"}, {"no": "Q15", "chapter": "附件二 從業人員、器具設備、化學物質、廢棄物及油炸時使用之食用油之衛生管理規定", "content": "問：食品從業人員患有B型肝炎，可否從事食品製造？\n\n答：人類感染B型肝炎係經由皮膚、黏膜的傷口，接觸到帶原者的血液、唾液或其他體液所致，因其傳染性較低，故帶原者仍可從事食品、餐飲等業務，惟仍應注意衛生操作。"}, {"no": "Q16", "chapter": "附件二 從業人員、器具設備、化學物質、廢棄物及油炸時使用之食用油之衛生管理規定", "content": "問：手部患有濕疹，可否從事食品製造？\n\n答：患有手部濕疹之人員，應經醫療機構檢查，確認未患有膿腫、瘡傷或其他可能污染食物之手部皮膚病者，始可從事與食品接觸之相關工作。造成食品中毒之金黃色葡萄球菌，常存於人體的皮膚、毛髮、鼻腔及咽喉等黏膜及糞便中，尤其是化膿的傷口，極易經由人體而污染食品。因此手部有膿腫、瘡傷者，不得從事與食品接觸之工作，以降低金黃色葡萄球菌污染食品之風險。"}, {"no": "Q17", "chapter": "附件二 從業人員、器具設備、化學物質、廢棄物及油炸時使用之食用油之衛生管理規定", "content": "問：食品從業人員之傷寒檢查，採血清或糞便檢查？\n\n答：依疾管署「傳染病防治工作手冊」之傷寒及副傷寒防治措施預防方法第6款規定，餐飲從業人員、外國人及外籍勞工等健康檢查相關作業，應採糞便檢查作為診斷，而非血清診斷(widal test)，因widal test之專一性不高，不能作為確診或通報之依據。"}, {"no": "Q18", "chapter": "附件二 從業人員、器具設備、化學物質、廢棄物及油炸時使用之食用油之衛生管理規定", "content": "問：食品從業人員一定需要配戴髮帽、口罩嗎？\n\n答：1. 本準則第5條附件二第1點第4款規定，食品從業人員於作業場所內，應穿戴整潔之工作衣帽(鞋)及戴口罩。\n2.食品從業人員於食品作業場所工作時，應戴口罩，本項規定以防止口沫及鼻中異物污染食品為目的，業者以達前開目的為原則，選擇適當口罩配戴，包括布口罩、紙質口罩、活性碳口罩、一般醫療口罩或微笑口罩(透明塑膠口罩)等，口罩破損或弄髒應立即更換。\n3.本準則所稱作業場所，指原材料、半成品、成品之處理、製造、加工、調配、配膳、包裝及貯存之場所。依此，小吃攤之食品從業人員於製備餐飲時應戴口罩；食品製造業之食品從業人員於製程中應戴口罩。\n4.餐廳外場(用餐區)非屬作業場所，餐廳外場端菜人員未強制要求戴口罩。販售業僅陳列商品之場所非屬作業場所，故販售食品人員未強制要求戴口罩。"}, {"no": "Q19", "chapter": "附件二 從業人員、器具設備、化學物質、廢棄物及油炸時使用之食用油之衛生管理規定", "content": "問：食品從業人員一定需要更換工作鞋嗎?還是可以穿自己的鞋子?\n\n答：本準則第5條附件二第1點第4款規定，食品從業人員於作業場所內，應穿戴整潔之工作衣帽(鞋)。食安法規並未指定食品從業人員工作鞋之樣式，惟建議穿著踝關節下緣圓周以下全包，且具防滑功能之工作鞋，不適宜穿拖鞋、涼鞋。"}, {"no": "Q20", "chapter": "附件二 從業人員、器具設備、化學物質、廢棄物及油炸時使用之食用油之衛生管理規定", "content": "問：從業人員如佩帶玉鐲或婚戒無法取下時，應如何處理以符合規定？\n\n答：1. 本準則第5條附件二第1點第5款規定，於作業場所工作之人員，其手部應保持清潔；不得蓄留指甲、塗抹指甲油、指甲彩繪、使用指甲貼片或佩戴飾物。前述不得佩戴飾物(如耳環、項鍊、手錶、手環、戒指等)，係為避免異物混入，污染產品。\n2.從業人員不得佩戴飾物，若無法拔除玉鐲或手環時，亦應穿戴消毒清潔之不透水手套，以避免飾物與食品接觸，造成食品污染。並請注意應適時更換手套，以避免交叉污染。"}, {"no": "Q21", "chapter": "附件二 從業人員、器具設備、化學物質、廢棄物及油炸時使用之食用油之衛生管理規定", "content": "問：法規禁止調理即食食品之手部同時接觸金錢，店家如何達到降低手部接觸風險？\n\n答：店家可發揮創意，設計多元作業方式，例如人力許可下，收銀與調理不同人，避免交叉污染，摸錢後洗手或酒精消毒，透過手套區隔、用夾子處理食品、把零錢放在攤前讓顧客自己找錢，或行動（電子）支付、自助點餐結帳等方式。"}, {"no": "Q22", "chapter": "附件二 從業人員、器具設備、化學物質、廢棄物及油炸時使用之食用油之衛生管理規定", "content": "問：食品從業人員之教育訓練規定為何？\n\n答：1. 新進食品從業人員應經至少3小時教育訓練，使其執行能力符合生產、衛生及品質管理要求之要求，並作成紀錄。教育訓練可由食品業者自行辦理，或參加衛生主管機關或其認可之機關辦理之教育訓練。\n2. 在職食品從業人員，除法令另有規定外，定期接受食品業者自行、衛生主管機關或其認可之機構辦理之食品安全、衛生及品質管理教育訓練，每年至少3小時，並作成紀錄。\n3. 業者自行辦理之教育訓練，其講師應由具食品安全衛生及品質管理相關學、經歷之人員或外聘專家擔任。前述講師可由專科以上學校食品、營養、家政、生活應用科學、畜牧、獸醫、化學、化工、農業化學、生物化學、生物、藥學、公共衛生等相關科系畢業者，或於食品產業擔任衛生、生產或品質管理職務3年以上經驗者擔任。\n4. 前述「法令另有規定」係指食品安全管制系統準則、食品製造工廠衛生管理人員設置辦法及食品業者專門職業或技術證照人員設置及管理辦法等規定，針對管制小組人員、衛生管理人員、專門職業人員或技術證照人員等已規定從業期間，應接受衛生主管機關或其認可機構辦理之訓練或衛生講習一定時數。\n5. 食品從業人員倘歇業1年以上重新復業，入職時，依新進人員應經至少3小時教育訓練。同行業別轉職人員，同年度已完成之在職教育訓練，可抵免新進人員訓練及在職食品從業人員訓練。"}, {"no": "Q23", "chapter": "附件二 從業人員、器具設備、化學物質、廢棄物及油炸時使用之食用油之衛生管理規定", "content": "問：衛生主管機關或其認可機關所辦理之衛生講習或訓練課程可至何處查詢？\n\n答：各級主管機關或其認可機關及開辦課程資訊，可至食藥署建置之「食品衛生安全課程資訊管理系統」查詢(http://www.fda.gov.tw/TC/siteContent.aspx?sid=4005)。各衛生主管機關建置之線上課程，可至台北E大、E等公務園等查詢。"}, {"no": "Q24", "chapter": "附件二 從業人員、器具設備、化學物質、廢棄物及油炸時使用之食用油之衛生管理規定", "content": "問：非食品從業人員進入倉儲或包裝場所，是否應依GHP準則第5條附件二第1點第9款規定?\n\n答：若業者之倉庫或包裝場所為獨立設置，且所存放之產品有完整密封包裝，該包裝作業僅係對已有完整包裝產品進行裝箱，因非進入食品暴露場所及依清潔度要求分區管制之場所，且進入該等場所之人員所穿戴衣物、手部衛生或其他行為並無影響產品衛生安全之虞時，尚無須依本準則第5條附件二第1點第9款規定。"}, {"no": "Q25", "chapter": "附件二 從業人員、器具設備、化學物質、廢棄物及油炸時使用之食用油之衛生管理規定", "content": "問：食品業使用之清潔劑及消毒劑之衛生管理規定為何？\n\n答：1.本準則第5條附件二第3點第2款規定，清潔劑、消毒劑及其他化學物質、藥劑，應明確標示及存放於固定場所，並指定專人負責保管及記錄其用量。\n2.食品業者之生產設備中與食品接觸面之清洗消毒作業，應使用符合食品用洗潔劑衛生標準規定之產品。此外，進行設備、器具之清洗消毒作業時，應防止清潔劑或消毒劑污染食品、食品接觸面及包(盛)裝材料。"}, {"no": "Q26", "chapter": "附件二 從業人員、器具設備、化學物質、廢棄物及油炸時使用之食用油之衛生管理規定", "content": "問：廢棄物可任意堆置於食品作業場所內或任意丟棄嗎？\n\n答：本準則第5條附件二第4點，廢棄物處理，應符合下列規定：\n1.食品作業場所內及其四周，不得任意堆置廢棄物，以防孳生病媒。\n2.放置廢棄物場所，不得有異味或有害(毒)氣體溢出，並依廢棄物清理法相關法規清除及處理。有關廢棄物清理法可至全國法規資料庫查詢(http://law.moj.gov.tw/LawClass/LawAll.aspx?PCode=O0050001)。\n3. 反覆使用盛裝廢棄物之容器及處理廢棄物之機器設備，於使用後，應立即清洗，必要時進行消毒。\n4. 化學藥品、放射性物質、有害微生物、腐敗物、過期回收產品或其他足以危害人體健康及食品安全衛生之廢棄物，應分別設置專用貯存設備。"}, {"no": "Q27", "chapter": "附件二 從業人員、器具設備、化學物質、廢棄物及油炸時使用之食用油之衛生管理規定", "content": "問：運送食品之司機、販售完整包裝食品之人員，是否認定為食品從業人員?\n\n答：1. 本準則第3條第3款規定，食品從業人員，指工作內容與食品、食品添加物直接接觸，或製程中用器械及工具處理食品、食品添加物，且影響產品衛生安全之人員。\n2. 運送食品之司機員、販售完整包裝食品之人員，倘確認職務範疇未涉上述行為，非本準則所稱之食品從業人員。"}, {"no": "Q28", "chapter": "附件二 從業人員、器具設備、化學物質、廢棄物及油炸時使用之食用油之衛生管理規定", "content": "問：過期食品是否可以賣給飼料業，作為動物飼料使用？\n\n答：1.飼料管理法第2條規定，該法之主管機關，在中央為農業部，爰過期之食品作為動物飼料之適法性，仍須洽農業部確認。\n2. 本準則第5條附件二第4點第2款及第4款規定，廢棄物應依廢棄物清理法相關法規清除及處理；過期回收產品等廢棄物，應分別設置專用貯存設備，逾期產品相關處理應符合前述規定，始無違反。"}, {"no": "Q29", "chapter": "附件二 從業人員、器具設備、化學物質、廢棄物及油炸時使用之食用油之衛生管理規定", "content": "問：輸入業需要指派管理衛生人員嗎?是否需要符合本準則有關教育訓練之規定？\n\n答：本準則第5條附件二為所有食品業者應遵循事項，輸入業者亦應指派管理衛生人員，其教育訓練，應符合準則第5條附件二第1點第2款規定。"}, {"no": "Q30", "chapter": "附件三 製程及品質管制規定", "content": "問：調味料或大型粉料拆除包裝後分裝至另外容器，是否需標示？\n\n答：1. 本準則第6條附件三第4點，原材料，依先到期先出或先進先出原則使用；於外包裝或置放處，載明名稱、日期或其他可供辨識及追溯之資訊；於分裝或拆除外箱後，亦同。\n2. 為避免原材料遭誤用及確保在期限內使用，調味料或大型粉料拆除包裝後分裝至另外容器，應載明品名、日期(有效日期、製造日期或分裝日期)或業者自訂可連結上述規定具可供辨識及追溯資訊。"}, {"no": "Q31", "chapter": "附件三 製程及品質管制規定", "content": "問：食品倉儲溫度，應如何管制?\n\n答：1.本準則第7條第4款規定，倉儲作業，避免溫度劇烈變動；有管制溫度或溼度必要者，訂定合理溫度或溼度管制方法及基準，並定期檢查及確實記錄。\n2.本準則第4條附件一第3點規定：\n(1)冷凍貯存設備保持在攝氏負十八度以下；冷藏貯存設備保持在攝氏七度以下凍結點以上。\n(2)避免溫度劇烈變動，並定期除霜，保持清潔。\n(3)於明顯處設置溫度指示器，並作成紀錄。相關設備及儀器，定期維護或確認效能及校正其準確性。\n(4)冷凍、冷藏之運輸、貯存及陳列，不得逾貯存或運輸設備之最大裝載線；無最大裝載線者，其貯存或陳列，應考量氣體之適當流動，維持適當之冷空氣循環。"}, {"no": "Q32", "chapter": "附件三 製程及品質管制規定", "content": "問：改變食品貯存或運輸溫度，需檢具之佐證資料為何？\n\n答：1.本準則第7條第5款及第8條第5款規定，除有合理原因及依據，並作成紀錄者外，不得改變原設定之貯存或運輸條件。\n2.食品業者改變食品貯存或運輸溫度之原則:\n(1) 食品安全衛生管理法第15條規定，食品逾有效日者，不得製造、加工、調配、包裝、運送、貯存、販賣、輸入、輸出、作為贈品或公開陳列。\n(2) 食品業者應具該產品之所有權或受原製造業者委託，且由已登錄之食品製造業者，依符合食品良好衛生規範準則下，進行改變保存溫度程序。\n(3) 食品之有效日期會受到所使用的原料、製造過程，以及運輸、儲存及販售環境等因素的影響，製造業者應依前述之個別情況，據以研訂有效日期，並應確認在此期限內產品無變質、腐敗及其他違反食品安全衛生管理法規定之情事發生，並在此期限內負全責。產品應依原製造業者提具改變保存溫度後之有效日期評估資料，據以研訂，惟不得大於原製造業者所訂定之有效日期。\n(4) 另如原製造業者無法提供，則由改變保存溫度之食品製造業者，依據產品製程、相關保存試驗等研訂有效日期。惟應備妥該產品驗收、生產紀錄、保存試驗等相關資料及適當標示，俾追蹤追溯管理。\n3. 產品應以符合食品良好衛生規範準則之條件下，於冷藏之有效日期前，進行冷藏品轉冷凍形式保存，並依評估原則標示合理之有效日期。\n4. 倘於冷凍庫發現標示逾保存期限食品，依該食品業者衛生安全管理相關紀錄，據以研判。倘產品於冷藏有效日期內轉入冷凍庫，因未提具改變保存溫度後之有效日期評估資料，並作成紀錄者外，涉違反食品良好衛生規範準則第7條第5款；另，倘已逾冷藏有效日期或無法證明者，涉嫌違反食品安全衛生管理法第15條規定，依同法第44條規定，可處新臺幣6萬元以上2億元以下罰鍰。"}, {"no": "Q33", "chapter": "附件三 製程及品質管制規定", "content": "問：食品輸入業之倉儲、運輸及客訴案件處理是否應符合「食品良好衛生規範準則」規範?\n\n答：1.食品良好衛生規範準則為所有食品業者應符合之強制性規定，故從事食品、食品添加物、食品器具、食品容器或包裝、食品用洗潔劑之輸入業者，應符合本準則之規定。\n2.食品輸入業者之倉儲管制及運輸管制，應符合本準則第7條及第8條之規定；並依第9條對於申訴案件之處理及產品之回收與處理，應作成紀錄。"}, {"no": "Q34", "chapter": "附件三 製程及品質管制規定", "content": "問：微生物檢驗時使用「無菌操作台」進行微生物檢驗，是否就可當作為有形之區隔？\n\n答：1.本準則第10條第2款規定，設有微生物檢驗場所者，與其他檢驗場所為有形之區隔。\n2.為控管微生物檢驗品質，微生物檢驗室應具安全防護措施，並具通道管制獨立動線，避免交叉污染。依此，無菌操作台不能當作為與其他檢驗場所為有形之區隔。"}, {"no": "Q35", "chapter": "附件三 製程及品質管制規定", "content": "問：食品業者依本準則規定所建立之相關紀錄、文件及電子檔案或資料庫，於成品有效期限屆滿時即可銷毀嗎?\n\n答：否。本準則第11條規定，食品業者依本準則作成之紀錄、報告或其他相關文件、資料，應至少應保存5年，5年之時間計算自事實發生日起算。"}, {"no": "Q36", "chapter": "第二章 食品製造業", "content": "問：自行製造販售食品，在食品安全衛生管理方面，需符合哪些規範？\n\n答：從事食品加工製造及販售等行為事宜，原則上，食品業者有關衛生管理部分，應以符合食安法及本準則為前提；業者必須盡到所有管理之責任，如產品衛生、安全、標示及廣告等，皆須遵守食品安全衛生相關法令規定。"}, {"no": "Q37", "chapter": "第二章 食品製造業", "content": "問：若從事食品分裝及重新製作，改包過程中不涉及產品的裸露，如將未拆封食品直接放入紙盒包裝或是將產品張貼中文標示，該業者是否屬於食安法第3條第7款所定之食品業者？是否須遵守本準則第二章食品製造業之規定？\n\n答：1.食安法第3條第1項第7款規定，食品業者係指從事食品或食品添加物之製造、加工、調配、包裝、運送、貯存、販賣、輸入、輸出或從事食品器具、食品容器或包裝、食品用洗潔劑之製造、加工、輸入、輸出或販賣之業者。同法施行細則第10條第1項第3款規定，本法第22條第1項第5款及第24條第1項第5款所稱製造廠商，經分裝、切割、裝配、組合等改裝製程，且足以影響產品衛生安全者。\n2.從事食品包裝業者即為食品業者，倘食品經分裝製程，且足以影響產品衛生安全，則認屬為食品製造業者，皆須依食安法等相關規定辦理。食安法第8條第1項規定，食品業者之從業人員、作業場所、設施衛生管理及其品保制度，均應符合本準則。"}, {"no": "Q38", "chapter": "第二章 食品製造業", "content": "問：食品工廠各作業區之間的門，應如何做區隔管理？\n\n答：依本準則第12條規定，食品製造業作業場所依作業性質不同，應個別設置或有效區隔，並採取避免交叉污染之措施。故食品作業場所各作業區的門需隨時關閉且門的密合度需良好，如為自動門，需每日確認是否正常運作。"}, {"no": "Q39", "chapter": "第二章 食品製造業", "content": "問：食品工廠原料倉儲溫度，應如何管制？\n\n答：1.本準則第7條規定，倉儲作業，避免溫度劇烈變動；有管制溫度或溼度必要者，訂定合理溫度或溼度管制方法及基準，並定期檢查及確實記錄。\n2.本準則第21條規定，食品工廠應就第四條至第十七條所定事項，訂定標準作業程序據以執行，並作成紀錄。"}, {"no": "Q40", "chapter": "第二章 食品製造業", "content": "問：食品工廠成品留樣保存之規定為何？\n\n答：1.本準則第14條規定，食品製造業訂定產品有效日期，應以保存性之試驗或其他合理文件、資料為據，並將其試驗結果作成紀錄；產品並應留樣保存至有效日期。\n2.本準則第21條規定，食品工廠應就第四條至第十七條所定事項，訂定標準作業程序據以執行，並作成紀錄。食品工廠應考量產品本身之加工方式、產品種類、產線等因素及特性，訂定適當之成品留樣方法與標準程序，據以執行，以確保其留樣品之代表性，並負完全之責任。"}, {"no": "Q41", "chapter": "第二章 食品製造業", "content": "問：成品留樣室之設置，在法規上是否有相關規定？\n\n答：1.本準則第12條第1款規定，食品作業場所之配置及空間，作業性質不同之場所，應個別設置或有效區隔，並採取避免交叉污染之措施；本準則第14條規定，食品製造業訂定產品有效日期，應以保存性之試驗或其他合理文件、資料為據，並將其試驗結果作成紀錄；產品並應留樣保存至有效日期。\n2.成品留樣主要目的係為確保產品於有效日期前之品質與衛生安全，倘產品發生問題時，可據以確認與釐清問題。食安法等相關規定，雖未明訂應設置留樣室，惟應於符合前述規定之前提下，設置適當的保存環境進行成品留樣，以維持產品品質與衛生安全。"}, {"no": "Q42", "chapter": "第二章 食品製造業", "content": "問：本準則所稱真空包裝即食食品，指脫氣密封於密閉容器內，拆封後即可食用之食品。有關脫氣，有明確的條件定義嗎?\n\n答：食品安全衛生相關法規，尚無明定脫氣之定義。產品真空度視產品特性、製程、內容物充填量等不同因素影響，業者應於符合食品相關法規前提下，自訂廠內程序規範。"}, {"no": "Q43", "chapter": "第三章 食品物流業", "content": "問：依本準則規定，食品物流業應訂定的管制標準作業程序內容有哪些？\n\n答：1.本準則第22條規定，食品物流業者，應訂定物流管制標準作業程序據以執行，並作成紀錄。前項作業程序，應包括倉儲及運送管制。\n2.上述倉儲管制應符合本準則第7條規定，運送管制應符合第8條規定。\n3.本準則第8條第6款規定，以具冷凍或冷藏功能之運輸設備廂體，裝載訂有保存溫度之食品原料、半成品或成品，應於每日收貨、裝貨、理貨或卸貨時，抽測運輸設備廂體內環境溫度，並作成紀錄。本項規定旨於業者運輸管制，裝載冷凍食品或冷藏食品時，能在收貨、裝貨、理貨或卸貨之一的時機，加以抽測運輸車廂內環境溫度及記錄，隨時注意裝載的低溫食品狀況，以維持低溫食品品質。"}, {"no": "Q44", "chapter": "第三章 食品物流業", "content": "問：於食品物流之倉儲過程中，應定期檢查的項目為何？\n\n答：倉儲過程中定期檢查之項目應包含倉儲環境衛生、溫濕度、貯存物之性狀(如包裝完整性、產品狀態)及有效日期等。可依材料、產品的型態訂定其必須檢查之項目，以確保食品之衛生安全。"}, {"no": "Q45", "chapter": "第三章 食品物流業", "content": "問：食品物流業是否屬於食安法所定之食品業者？是否該遵守本準則之規定？\n\n答：食安法第3條第7款規定，如有運送食品或食品添加物之營業行為，即屬食品物流業。食品物流業者應符合食安法第8條第1項規定，即應符合本準則之第一章總則及第四章食品物流業之規定。"}, {"no": "Q46", "chapter": "第三章 食品物流業", "content": "問：物流箱使用上，是否有規定食品及非食品類要分開放置？\n\n答：1.本準則第22條規定，食品物流業者，應訂定物流管制標準作業程序據以執行，前項作業程序，應包括倉儲及運送管制。\n2.本準則第8條第9款規定，同時載運可能污染原材料、半成品或成品之其他物品者，設置防止交叉污染之措施；其未能防止交叉污染者，不得同時載運；第7條第2款規定，物品應予分類，採取其他有效措施離地貯放，保持整潔及良好通風。故物品不得直接放置地面，且應將食品及非食品類分類貯放，以確保食品之衛生安全。"}, {"no": "Q47", "chapter": "第三章 食品物流業", "content": "問：連鎖餐飲業自行外送餐點，是否也須符合本準則第25條規定？\n\n答：本準則第25條所規範之對象為食品外送平台業者提供食品外送服務，故連鎖餐飲業者自行外送餐點，屬於對自家產品之運輸管制範疇，非以物流業者視之。餐飲業由自家食品從業人員外送餐點，其運輸管制應符合草案第8條食品業者運輸管制；外送員應符合食品從業人員規定。"}, {"no": "Q48", "chapter": "第三章 食品物流業", "content": "問：外送員交付食品時是否可嚼口香糖，違反者將遭受何種處罰？懲處的是外送平台還是外送員本人？\n\n答：1. 本準則第25條2款規定，外送員「取得」及「交付」食品時，不得有吸菸、嚼檳榔、嚼口香糖、飲食或其他污染食品之行為。\n2. GHP準則規範對象係「食品外送平台業者」，如違反規定係裁處「外送平台業者」，爰此，外送平台業者應負監督外送員與餐點運輸之衛生安全之責。"}, {"no": "Q49", "chapter": "第三章 食品物流業", "content": "問：食品外送平台業者提供食品外送服務時，「外送時間」管控措施為何？\n\n答：1.本準則第25條第6款規定，食品外送平台業者提供食品外送服務，應避免溫度劇烈變動，並有外送時間及溫度之管控措施。\n2.外送時間過久，食品於常溫下太久，食品容易腐壞或微生物孳生，增加食品中毒的風險。外送平台業者提供食品外送服務其外送時間可以考量訂單餐點數量、交通路況及天候等因素，建立妥適之派單機制，以確保食品品質。"}, {"no": "Q50", "chapter": "第四章 食品販賣業", "content": "問：對於販賣場所的照明設施，是否有相關規定？\n\n答：本準則第26條第10點規定，販賣場所之光線應達到二百勒克斯以上；使用之光源，不得改變食品之顏色。"}, {"no": "Q51", "chapter": "第四章 食品販賣業", "content": "問：販賣、貯存烘焙食品者，應符合哪些規定？\n\n答：本準則第28條，販賣、貯存烘焙食品者，應符合下列規定：\n1.未包裝者，使用清潔之容器、器具裝貯，分類陳列，並有防止污染之措施及設備，且備有清潔之夾子及盛物籃(盤)供消費者選購使用。\n2.以奶油、布丁、果凍、水果或易變質、腐敗之餡料或其他相關食品裝飾或充餡者，應貯放於冷藏貯存設備內。"}, {"no": "Q52", "chapter": "第四章 食品販賣業", "content": "問：販賣禽畜水產食品者，應符合哪些規定？\n\n答：依本準則第29條，販賣禽畜水產食品者應符合下列規定：\n1.陳列檯面應採不易透水及耐腐蝕之材質。\n2.販售場所應有適當洗滌及排水設施。\n3.禽畜、水產食品之販賣及處理，分類貯放於棧板、貨架或採取其他隔離措施，不得直接放置地面，並保持良好通風及排水。\n4.供應生食或不經加熱即可食用之魚類、肉類及其製品，另備專用刀具、砧板。\n5.使用絞肉機、切片機或其他相關機具，應保持清潔，並避免污染。\n6.生鮮禽畜、水產食品之清洗，以水槽或適當容器盛裝；清洗之用水符合飲用水水質標準。\n7.禽畜、水產食品之貯存、陳列或販賣，進行時間管制，並維持適當溫度。\n8.販賣冷凍、冷藏之禽畜水產食品，應有冷凍、冷藏之貯存設施。\n9.以冰藏方式貯存、陳列、販賣者，使用之冰塊應符合飲用水水質標準。"}, {"no": "Q53", "chapter": "第四章 食品販賣業", "content": "問：販賣、貯存冷凍食品或冷藏食品者，應符合哪些規定？\n\n答：本準則第27條規定，販賣、貯存冷凍食品或冷藏食品者應符合下列規定：\n1.不得改變製造業者原來設定之食品保存溫度。\n2.冷凍食品應予包裝或適當包裹；包裝、包裹脫落或破損時，不得販賣。\n3.食品貯存或陳列於冷凍（藏）貯存設備時，不得超越最大裝載線；無最大裝載線者，其貯存或陳列，應考量氣體之適當流動，維持保存溫度。"}, {"no": "Q54", "chapter": "第四章 食品販賣業", "content": "問：超商販售即食熟食食品，是否應符合食品良好衛生規範準則？\n\n答：超商現場販售即食熟食食品，工作人員如需處理食材，則應符合本準則規定，確保食品衛生安全，相關人員亦應符合餐飲從業人員之相關規定。"}, {"no": "Q55", "chapter": "第五章 餐飲業", "content": "問：如何判斷餐飲業油炸用食用油應更換新油之時機？\n\n答：本準則第5條附件二第5點規定，油炸時所使用之食用油其總極性化合物含量達25%時，應全部更換新油，不得再予使用。"}, {"no": "Q56", "chapter": "第五章 餐飲業", "content": "問：餐具清洗、消毒或殺菌之規定為何？餐具衛生應符合哪些規定？\n\n答：1.本準則第30條規定，餐飲業之洗滌場所應有符合飲用水水質標準之流動自來水，並具有洗滌、沖洗及有效殺菌功能之餐具清洗設施；水龍頭高度應高於水槽滿水位高度，防水逆流污染；無充足之流動自來水者，應提供用畢即行丟棄之餐具。\n2.另第31條規定，餐飲業應依下列方式，就設施、設備及器具、容器，施行清潔及消毒或殺菌：\n(1)清潔：採用符合飲用水水質標準之洗滌用水清洗；其使用清潔劑者，應以食品用清潔劑為限。\n(2)消毒或殺菌：\nA.砧板、菜刀、鍋鏟及餐具：使用乾熱、蒸氣、熱水、氯液或其他有效方法處理。\nB.毛巾及抹布：使用蒸氣、沸水、氯液或其他有效方法處理。\n3.餐飲業可參考下列方法之一，施行殺菌：\n(1)煮沸殺菌：以攝氏一百度之沸水，餐具等煮沸一分鐘以上；毛巾及抹布煮沸五分鐘以上。\n(2)蒸汽殺菌：以攝氏一百度之蒸汽，餐具等加熱時間二分鐘以上；毛巾及抹布加熱時間十分鐘以上。\n(3)熱水殺菌：餐具等以攝氏八十度以上之熱水，加熱時間二分鐘以上。\n(4)乾熱殺菌：餐具等以溫度攝氏一百一十度以上之乾熱，加熱時間三十分鐘以上。\n(5)氯液殺菌：以氯液總有效氯百萬分之二百以下，浸入溶液中時間二分鐘以上。\n4.本準則第32條第3款規定，提供之餐具，應維持乾燥清潔，餐具與食品接觸面平滑，且無變形、破損、裂縫、缺口或鏽蝕；無油脂、澱粉、蛋白質及食品用洗潔劑之殘留；必要時，應進行病原性微生物之檢測。"}, {"no": "Q57", "chapter": "第五章 餐飲業", "content": "問：餐具可以使用紫外線燈(UV)消毒嗎？\n\n答：以紫外線燈殺菌時，應考量照射強度及照射時間等因素；因紫外線波長容易破壞塑膠分子鏈，造成塑膠老化，塑膠容器具不建議使用紫外線殺菌。"}, {"no": "Q58", "chapter": "第五章 餐飲業", "content": "問：餐桶消毒殺菌後，應如何貯放？\n\n答：餐桶消毒殺菌後，倘若無立即使用，應倒扣存放，保持乾燥並避免積水，貯放使時，應有防塵、防病媒等衛生設施。"}, {"no": "Q59", "chapter": "第五章 餐飲業", "content": "問：廚房通風良好，改善通風之措施為何？\n\n答：通風可改善廚房環境的空氣，去除臭味、氣體，不讓油脂、塵埃及黴菌累積在牆壁、天花板上。可藉裝置窗戶、抽氣機、抽油煙機、風扇、空氣調節裝置(如冷氣機、除濕)等達到通風、保持乾燥目的。"}, {"no": "Q60", "chapter": "第五章 餐飲業", "content": "問：廚房是否可將抽油煙機清洗納入衛生定期檢查項目？\n\n答：業者應本於自主管理，依風險評估訂定抽油煙機清洗頻率。"}, {"no": "Q61", "chapter": "第五章 餐飲業", "content": "問：餐飲業之從業人員，是否都應持有烹調技術士證及取得廚師證書?\n\n答：1. 依「食品業者專門職業或技術證照人員設置及管理辦法」及「應置專門職業或技術證照人員之食品業者類別及規模規定」，特定餐飲業別應置一定比率領有中餐烹調技術士證、西餐烹條技術士證或食物製備技術士證者。並依上開規定，每年接受8小時訓練。\n2.本準則第34條第2項規定，依食品業者專門職業或技術證照人員設置及管理辦法設置之中餐烹調技術士、西餐烹調技術士或食物製備技術士，得向任一直轄市、縣(市)餐飲相關工會或公會，申請發給廚師證書。\n3.本準則已修正廚師證書改為自願性申請，及未強制加入工會，故餐飲業設置之技術證照人員未換廚師證或未加入工會均未違反GHP準則規定。"}, {"no": "Q62", "chapter": "第五章 餐飲業", "content": "問：餐飲業製備菜餚其貯存及供應，應有時間及溫度管理之規定為何？\n\n答：1.為預防食品中毒，參考世界衛生組織「Five keys to safer food」資料，爰本準則第32條第5款規定，餐飲業製備之菜餚，其貯存及供應應維持適當之溫度；室溫下不得存放2小時以上，熟食及易腐敗菜餚應及時冷藏；熟食之熱藏溫度保持在60℃以上。係指烹煮完之餐食，如未有熱藏保存，餐食溫度降至60℃以下進入危險溫度帶時，當室溫放置時即應儘速食用，如欲放入冰箱冷藏備用，應於2小時內及時冷藏。\n2.食品於危險溫度帶(7℃~60℃之間)，許多病原菌於此溫度間可快速繁殖或產生毒素，必須管制食品在危險溫度帶曝露的時間，透過溫度與時間之管理，降低微生物生長或毒素生成，避免食品中毒發生。烹煮完之餐食如需運輸配送，建議根據餐食降溫速度調整烹煮順序，優先烹煮降溫較慢之品項，並採取適當措施加強烹煮完成餐食之保溫效能，使餐食於危險溫度帶之時間不大於2小時。\n3.本準則第32條所稱「製備之菜餚」，係指已完成烹調，供顧客即食之餐食如便當、三明治、燒臘等。"}, {"no": "Q63", "chapter": "第五章 餐飲業", "content": "問：具有居留證及工作證之外籍人士，如持有烹調相關技術士證，是否可換發廚師證書？\n\n答：本準則第34條第2項規定，依食品業者專門職業或技術證照人員設置及管理辦法設置之中餐烹調技術士、西餐烹調技術士或食物製備技術士，得向任一直轄市、縣(市)餐飲相關工會或公會，申請發給廚師證書。具有居留證及工作證之外籍人士，如持有中中餐烹調技術士、西餐烹調技術士或食物製備技術士證，並實際從事餐飲業者，可向衛生主管機關認可之餐飲相關公會或工會，申請發給廚師證書，惟若居留證或工作證到期時，廚師證書一併失效。"}, {"no": "Q64", "chapter": "第五章 餐飲業", "content": "問：外燴業者辦理外燴時，應遵守之規定為何?\n\n答：本準則第33條規定，外燴業者除應符合第30條至第32條規定外，並應遵守下列規定：\n1.烹調場所及供應之食物，不得直接日曬、雨淋或接觸污染源，並有遮蔽、冷凍(藏)設備或設施。\n2.烹調食物時，符合新鮮、清潔、迅速、加熱及冷藏原則，並不得交叉污染。\n3.辦理200人以上餐飲時，於辦理3日前向辦理外燴餐飲地點之衛生局(所)報請備查；其備查內容應包括委辦者、承辦者、辦理地點、參加人數及菜單。"}, {"no": "Q65", "chapter": "第六章 食品添加物業", "content": "問：第六章食品添加物業所規範之對象，是否僅針對食品添加物之製造業者？\n\n答：否。本準則第2條規定，本準則適用於食安法第3條第7款所定之食品業者。即從事食品添加物之製造、加工、調配、包裝、運送、貯存、販賣、輸入、輸出之業者，均為所規範之對象。"}, {"no": "Q66", "chapter": "第六章 食品添加物業", "content": "問：依複方食品添加物之用詞定義，係指以食品添加物為關鍵原料，再調配食品原料或其他食品添加物而製成之專供食品加工使用之複合調製原料，其中何謂關鍵原料？\n\n答：關鍵原料係指提供該產品主要功能之原料，應由產品功能用途(常會透由產品品名或標示之用途訴求加以揭露)加以認定，並非以比例多寡判定。例如：「0.1%維生素B12」之關鍵原料為維生素B12；「營養強化麵粉」之關鍵原料包含提供營養強化的成分及麵粉。"}, {"no": "Q67", "chapter": "第六章 食品添加物業", "content": "問：如複合調製品之關鍵原料同時含食品添加物及「非食品添加物之食品原料」，其屬性如何判定？\n\n答：依複方食品添加物之定義，複方食品添加物所含「非食品添加物之食品原料」，係指作為輔料用途，輔料係指具輔助食品添加物之加工、貯存、溶解、稀釋、增量、均勻分布等功能之原料。故如複合調製品含有一種以上做為關鍵原料之「非食品添加物之食品原料」(含有一種以上非作為輔料之「非食品添加物之食品原料」)，則該複合調製品不屬食品添加物。舉例如下：\n1.某產品「高湯粉_1」用途作為調味劑，成分含「豬肉萃取物、豬大骨萃取物、洋蔥粉、蒜粉、黑胡椒、鹽」等「非食品添加物之食品原料」及「味精、5'-次黃嘌呤核苷磷酸二鈉及5'-鳥嘌呤核苷磷酸二鈉」等食品添加物，因高湯粉係作為湯頭調味之用途，其所含「豬肉萃取物、豬大骨萃取物、洋蔥粉、蒜粉、黑胡椒」等「非食品添加物之食品原料」具有調味功能，非作為輔料，故該「高湯粉_1」不屬食品添加物。\n2.某產品「高湯調味粉_2」用途作為調味劑，成分含「鹽及糖」等「非食品添加物之食品原料」及「香料、5'-次黃嘌呤核苷磷酸二鈉、5'-鳥嘌呤核苷磷酸二鈉、L-麩酸鈉」等食品添加物，產品提供調味之關鍵原料皆為食品添加物，所含「鹽及糖」等「非食品添加物之食品原料」雖具有調味功能，惟其屬於調味產品普遍皆使用之原料，非屬本產品關鍵原料，故「高湯調味粉_2」應屬食品添加物。"}, {"no": "Q68", "chapter": "第六章 食品添加物業", "content": "問：香辛料屬於食品添加物嗎？\n\n答：香辛料，例如：胡椒、孜然、花椒、茴香、八角等，係屬「非食品添加物之食品原料」。"}, {"no": "Q69", "chapter": "第六章 食品添加物業", "content": "問：食品添加物業是否需設置食品衛生管理人員？\n\n答：依食安法第11條第1項規定，衛生福利部發布訂定「應置衛生管理人員之食品製造工廠類別及規模」，係包括乳品製造業、罐頭食品製造業、冷凍食品製造業、即食餐食製造業、特殊營養食品製造業、食品添加物製造業、水產食品業、肉類加工食品業、健康食品製造業及其他食品製造業等10項業別。故具食品添加物工廠登記之食品添加物製造工廠，應設置食品衛生管理人員。"}, {"no": "Q70", "chapter": "第六章 食品添加物業", "content": "問：具食品添加物工廠登記之食品添加物製造工廠，所設置之食品衛生管理人員應具備之資格為何？\n\n答：有關食品衛生管理人員之資格，已規定於食品製造工廠衛生管理人員設置辦法，可至全國法規資料庫查詢(http://law.moj.gov.tw/LawClass/LawAll.aspx?PCode=L0040005)。"}, {"no": "Q71", "chapter": "第六章 食品添加物業", "content": "問：食品添加物製造工廠設置衛生管理人員時，是否須向所轄衛生局進行核備?若需核備，須檢附哪些文件？\n\n答：「食品製造工廠衛生管理人員設置辦法」第7條規定，具食品添加物工廠登記之食品添加物製造工廠設置衛生管理人員時，應檢具下列文件送請直轄市、縣(市)衛生主管機關核備，異動時亦同：\n1.申報書一份及資料卡一式三份。\n2.衛生管理人員之資格證件文件、身分證、契約書影本一份。\n3.工廠登記證明文件影本一份。"}, {"no": "Q72", "chapter": "第六章 食品添加物業", "content": "問：食品添加物業者所指派之管理衛生人員，是否須向所轄衛生局進行核備？\n\n答：否。具食品添加物工廠登記之食品添加物製造工廠，其設置衛生管理人員時，始須向所轄衛生局辦理核備。"}, {"no": "Q73", "chapter": "第七章 熱殺菌密閉容器包裝低酸性食品及酸化食品製造業", "content": "問：原罐頭食品製造業於修法後即無相關規範？\n\n答：本準則所稱之熱殺菌密閉容器包裝低酸性食品及酸化食品，即為俗稱之「罐頭食品」。爰修法前之罐頭食品製造業應符合修法後之熱殺菌密閉容器包裝低酸性食品及酸化食品製造業相關規範。"}, {"no": "Q74", "chapter": "第八章 食品器具、食品容器或包裝製造業", "content": "問：食品器具、食品容器或包裝製造業者於生產產品過程中，應符合哪些規定？\n\n答：1. 食品器具、食品容器或包裝製造業者，除應符合本準則總則有關食品業者之規定外，另應符合本準則第八章(即第45條至50條)有關食品器具、食品容器或包裝製造業者專章之規定，\n2. 倘僅為食品器具容器或包裝輸入或販售業者，符合本準則總則有關食品業者之規定即可。"}, {"no": "Q75", "chapter": "第八章 食品器具、食品容器或包裝製造業", "content": "問：陶瓷或玻璃餐具製造業者是否須符合GHP準則規定？實施緩衝期？\n\n答：1. 原GHP準則規範「塑膠類」食品器具、食品容器或包裝製造業，修正後擴大管理至各類材質業者包括陶瓷、金屬、玻璃、紙類及其他材質食品器具、容器或包裝製造業，其從業人員、作業場所、設施衛生管理及其品保制度亦應遵守GHP準則規定。\n2. 考量陶瓷、金屬、玻璃、紙類及其他材質食品器具、容器或包裝製造業落實本準則規定需要時間，爰依業者規模大小，分別給予施行緩衝期，非塑膠類之製造工廠，其資本額新臺幣三千萬以上者，自本準則中華民國114年6月4日修正發布後三年施行。資本額新臺幣三千萬以下之非塑膠類製造業，自本準則114年6月4日修正發布後五年施行。"}, {"no": "Q76", "chapter": "第八章 食品器具、食品容器或包裝製造業", "content": "問：塑膠類食品器具、食品容器或包裝之印刷作業應符合哪些規定？\n\n答：塑膠類食品器具、食品容器或包裝之印刷作業，應避免油墨移轉或附著於食品接觸面。油墨有浸出、溶出等接觸食品之虞，應使用食品添加物使用範圍及限量暨規格標準准用之著色劑。"}, {"no": "Q77", "chapter": "第九章 食品用洗潔劑製造業", "content": "問：食品用洗潔劑業者，應符合哪些規定?\n\n答：1.食品用洗潔劑製造業者，除應符合本準則總則有關食品業者之規定外，另應符合本準則第九章(即第51條至53條)有關食品用洗潔劑製造業者專章之規定，\n2.倘僅為食品用洗潔劑輸入或販售業者，符合本準則總則有關食品業者之規定即可。"}], "食品工廠建築及設備設廠標準_20180927": [{"no": "第一條", "chapter": "第一章 通則", "content": "本標準依食品安全衛生管理法第十條第二項規定訂定之。"}, {"no": "第二條", "chapter": "第一章 通則", "content": "食品工廠建築及設備之設置，除法令另有規定外，依本標準之規定。"}, {"no": "第三條", "chapter": "第一章 通則", "content": "本標準所定之食品工廠，應依法辦理工廠登記。"}, {"no": "第四條", "chapter": "第一章 通則", "content": "食品工廠設廠，應符合第二章之規定，下列專業食品工廠並應符合第三章之相關規定：\n一、罐頭食品工廠。\n二、冷凍食品工廠。\n三、蜜餞醃漬工廠。\n四、飲料工廠。\n五、醬油工廠。\n六、乳品工廠。\n七、食用油脂工廠。\n八、脫水蔬果工廠。\n九、餐盒食品工廠。\n十、速食麵工廠。\n十一、食品添加物工廠。\n前項專業食品工廠之類別，參考中華民國行業標準分類及經濟部工業產品分類認定。"}, {"no": "第五條", "chapter": "第二章 食品工廠之基本共同標準", "content": "食品工廠之廠區環境應符合下列規定：\n一、廠區內應築有通暢之排水溝，空地應舖設混凝土、柏油或予以綠化，不得有塵土飛揚，環境應隨時保持清潔，地面應隨時清掃、保持清潔。\n二、排水系統應經常清理，保持暢通，不得有異味。\n三、禽畜、寵物等應予管制，並有適當的措施以避免污染食品。\n四、員工宿舍應與作業場所完全隔離並分別設置出入口。\n五、應實施病媒防治措施。"}, {"no": "第六條", "chapter": "第二章 食品工廠之基本共同標準", "content": "食品工廠包括辦公室、原料處理場、加工或調理場、檢驗或研究室、包裝室、倉庫、機電室、鍋爐室、修護室、更衣室、洗手消毒室、餐廳、員工休息室、員工宿舍及廁所等。凡使用性質或清潔程度要求不同之場所，應個別設置或有效隔離及管理，其建築並應符合下列規定：\n一、牆壁與支柱：原料處理場、加工或調理場等建築物之牆壁與支柱面應為白色或淺色，離地面至少一公尺以內之部分應使用非吸收性、不透水、易清洗之材料舖設，其表面應平滑無裂縫並經常保持清潔。\n二、地面：原料處理場、加工或調理場、內包裝室建築物之地面，應採非吸收性、不透水且耐酸鹼、耐磨之材料舖設。地面應有良好之排水斜度及排水系統。\n三、樓板或天花板：應為白色或淺色、易清掃、可防止灰塵積儲之構築。食品暴露之正上方樓板或天花板不得有結露現象，並保持清潔、良好維修之狀態。\n四、光線：食品工廠之廠房除倉庫以外，其他各項建築物應有足夠的光線，工作台面或調理台面應保持二百勒克斯以上，機器設備台面應保持一百勒克斯以上，使用之光源應不致改變食品之顏色。\n五、通風：廠房建築物應通風良好，視需要裝設風扇、抽風機等有效換氣設備，且通風口應有防止病媒侵入之設施。如有密閉之加工室或包裝室，則應有空調設備。\n六、出入口、門窗及其他孔道：應以非吸收性、易清洗、不透水堅固材料製作，並應設置防止病媒侵入之設施。\n七、排水系統：應有完整暢通之排水系統，排水溝應有攔截固體廢棄物之設施，出口處並應有防止病媒侵入之設施。\n八、倉庫：原料倉庫及成品倉庫應分別設置或予獨立，庫內地面應較庫外為高，並採用不透水材料建築，庫內所設之棧板須足以配合存貨及生產作業之需要。\n九、廁所：\n(一) 廁所之設置地點應防止污染水源。\n(二) 廁所不得正面開向食品作業場所，但如有緩衝設施及有效控制空氣流向以防止污染者，不在此限。\n(三) 應有良好之通風、採光、防蟲、防鼠等設施，並備有流動自來水、清潔劑、烘手器或擦手紙巾等之洗手、乾手設施及垃圾桶。\n(四) 應有如廁後應洗手之標示。\n十、更衣室：食品工廠視其需要得設置更衣室，更衣室應設於加工調理場旁適當位置並與食品作業場所隔離，不同性別之更衣室應分開，室內應備有更衣鏡、潔塵設備及數量足夠之個人用衣物櫃及鞋櫃等。\n十一、洗手消毒室：食品工廠視其需要得設置洗手消毒室，其應與加工調理場或內包裝室相鄰，並設置數量足夠之洗手及乾手設施。\n十二、冷凍設備應有安全設施設置。"}, {"no": "第七條", "chapter": "第二章 食品工廠之基本共同標準", "content": "食品工廠之機器設備設計及機器設備材質應符合下列規定：\n一、機器設備設計：用於食品或食品添加物產製用機器設備之設計和構造應能防止危害食品或食品添加物品質衛生，易於清洗消毒，並容易檢查。應有使用時可避免潤滑油、金屬碎屑、污水或其他可能引起污染之物質混入產品之結構。\n二、機器設備材質：所有用於食品或食品添加物處理區及可能接觸食品或食品添加物之設備與器具，應由不會產生或溶出毒素、無臭味或異味、非吸收性、耐腐蝕且可承受重複清洗和消毒之材料製造，同時應避免使用會發生接觸腐蝕的材料。"}, {"no": "第八條", "chapter": "第三章 專業食品工廠之生產設備、檢驗設備及基本設施標準", "content": "罐頭食品工廠應具備下列生產及檢驗設備：\n一、生產設備：\n(一) 穩定熱能來源：蒸氣主管壓力應維持在六公斤/平方公分以上。\n(二) 封蓋設備：封蓋設備應能確保封蓋之安全性，其種類應符合產品之需要設置。\n(三) 殺菌設備。\n二、檢驗設備：\n(一) 定溫保溫箱。\n(二) 罐頭真空測定器及耐壓測定器（金屬罐裝罐頭食品工廠必備）。\n(三) pH 測定器或試紙。\n(四) 捲封測微器（金屬罐裝罐頭食品工廠必備）。\n(五) 耐壓強度測定裝置（殺菌袋裝罐頭食品工廠必備）。\n罐頭食品工廠視需要得具備下列生產及檢驗設備：\n一、生產設備：\n(一) 原料洗滌設備。\n(二) 殺菁設備（附冷卻設備）。\n(三) 調理台及調理工具。\n(四) 脫氣設備。\n(五) 清洗消毒設備。\n(六) 殺菌後冷卻設備。\n(七) 填充液調配設備。\n(八) 批號及日期標示設備。\n(九) 空罐（瓶）噴洗設備。\n(十) 冷凍（藏）庫。\n(十一) 線上真空檢測器或打檢棒。\n二、檢驗設備：\n(一) 固定之開罐器。\n(二) 秤量器。\n(三) 溫度計。\n(四) 糖度計。\n(五) 餘氯測定器或試紙。\n(六) 給水裝置及洗滌等設備。\n(七) 袋內殘留空氣量測定裝置。\n(八) 罐頭檢漏設備。\n(九) 尖頭型鐵皮厚度測微器。"}, {"no": "第九條", "chapter": "第三章 專業食品工廠之生產設備、檢驗設備及基本設施標準", "content": "冷凍食品工廠應具備凍結之生產設備。\n冷凍食品工廠視需要得具備下列生產及檢驗設備：\n一、生產設備：\n(一) 原料洗滌設備。\n(二) 殺菁及冷卻設備。\n(三) 冷凍車：其溫度應能維持品溫在攝氏負十八度以下。\n(四) 清洗消毒設備。\n(五) 金屬或其他異物檢出設備。\n二、檢驗設備：\n(一) 餘氯測定器或試紙。\n(二) 微生物檢驗設備。\n(三) 產品品溫測定儀器。\n(四) 秤量器。\n(五) 氧化酵素測定設備、pH 測定器或試紙、糖度計。\n(六) 藥物殘留測定儀器。\n(七) 揮發性鹽基態氮定量裝置。\n(八) 粗脂肪定量裝置。\n(九) 組織胺定量裝置。"}, {"no": "第十條", "chapter": "第三章 專業食品工廠之生產設備、檢驗設備及基本設施標準", "content": "蜜餞醃漬工廠應具備下列基本設施及檢驗設備：\n一、基本設施：\n(一) 加工及包裝場所如為密閉者，應有空氣調節設備。\n(二) 鹽漬池應為遮蓋設施，糖漬槽或缸桶等均應設在室內並有遮蓋設施。\n(三) 需用曬場乾燥者，其曬場應以不透水材料構築。\n(四) 二重釜、湯煮桶、糖漬槽或桶、匙槳、盤、刀、叉等用具，宜為不銹鋼材質，未產蜜餞之工廠免設。\n二、檢驗設備：\n(一) 糖度計或糖度折射計（未產蜜餞之工廠免設）。\n(二) 鹽度計。\n蜜餞醃漬工廠視需要得具備下列檢驗設備：\n一、餘氯測定器或試紙。\n二、二氧化硫定量裝置。\n三、溫度計。\n四、pH 測定器或試紙。\n五、秤量器。"}, {"no": "第十一條", "chapter": "第三章 專業食品工廠之生產設備、檢驗設備及基本設施標準", "content": "飲料工廠應具備下列生產設備：\n一、一般飲料工廠：\n(一) 充填設備。\n(二) 過濾設備。\n(三) 殺菌設備。\n二、果蔬汁飲料工廠：\n(一) 充填設備。\n(二) 精濾機、離心機或均質機。\n(三) 殺菌設備。\n飲料工廠視需要得具備下列生產及檢驗設備：\n一、生產設備：\n(一) 一般飲料工廠：\n1. 容器洗滌消毒設備。\n2. 貯水槽：其容量應足供當日加工用水量。\n3. 不銹鋼調和器及不銹鋼槽。\n4. 瓶裝飲料檢查設備、浸水槽及燈光透視檢查台。\n5. 瓶裝飲料自動裝瓶機及打蓋機。\n6. 罐裝飲料動力封蓋機。\n7. 碳酸氣混合機。\n8. 冷凍機。\n(二) 果蔬汁飲料工廠：\n1. 容器洗滌消毒設備。\n2. 洗滌槽或迴轉式洗滌機。\n3. 破碎機。\n4. 榨汁機。\n5. 冷卻設備。\n二、檢驗設備：\n(一) 顯微鏡。\n(二) 微生物檢驗設備。\n(三) 定溫保溫箱。\n(四) pH 測定器或試紙。\n(五) 糖度計或糖度折射計（包裝飲用水及礦泉水工廠除外）。\n(六) 秤量器。\n(七) 餘氯測定器或試紙。\n(八) 離心分離器及真空測定器。\n(九) 壓力測定器。\n(十) 濁度及色度測定設備。"}, {"no": "第十二條", "chapter": "第三章 專業食品工廠之生產設備、檢驗設備及基本設施標準", "content": "醬油工廠應具備下列檢驗設備：\n一、pH 測定器或試紙。\n二、秤量器。\n三、食鹽測定或分析設備或鹽度計。\n四、酸度檢驗設備。\n五、餘氯測定器或試紙。\n醬油工廠視需要得具備下列生產及檢驗設備：\n一、生產設備：\n(一) 原料選別設備（使用經選別之原料者得免設置）。\n(二) 蒸煮設備。\n(三) 炒麥設備（不加麥者免設）。\n(四) 混合設備。\n(五) 製麴設備。\n(六) 食鹽溶解設備。\n(七) 發酵設備。\n(八) 壓榨設備。\n(九) 過濾設備。\n(十) 澄清槽。\n(十一) 殺菌設備或加熱調煮設備。\n(十二) 噴洗瓶設備（重複性使用之玻璃瓶裝醬油工廠必備）。\n(十三) 充填設備（包括封瓶機）。\n二、檢驗設備：\n(一) 無菌室、無菌箱或微生物培養室。\n(二) 總氮測定裝置。\n(三) 氨基態氮測定設置。\n(四) 水份測定器。\n(五) 色度分析設備或比色板。"}, {"no": "第十三條", "chapter": "第三章 專業食品工廠之生產設備、檢驗設備及基本設施標準", "content": "乳品工廠應具備下列基本設施及檢驗設備：\n一、基本設施：\n(一) 乳品工廠貯乳、加工、分裝、或調配等過程必需在調理場內進行，所有之加工設備必須具備優良之衛生條件，乳液或乳粉流經之管道，及與乳液或乳粉接觸之設備，應為內壁光滑、無針孔、無直角、無狹縫之不銹鋼製品。\n(二) 乳品工廠應具備供應冷卻水（或其他冷卻液）之設備，此等設備並應與加工調理場隔離（乳粉調配除外）。\n(三) 收乳及貯乳設備（非使用生乳為原料之乳製品除外）：秤量設備、儲乳槽、乳桶洗滌殺菌設備、牛乳幫浦、過濾器或雜質離心分離機、乳液冷卻設備、具冷卻設備之貯乳槽、生乳檢查設備（包括酒精試驗、沉澱物檢查器及取樣工具等）一套、冷藏運輸車。\n二、檢驗設備：\n(一) 生乳取樣器（乳粉調配除外）。\n(二) 酸度滴定裝置或滴定管。\n(三) 生乳比重計（乳粉調配除外）。\n(四) 溫度計。\n(五) 水分測定用乾燥器（生產廠必備）。\n(六) 秤量器。\n(七) 餘氧測定器（乳粉調配或製造必備）。\n(八) 藥物殘留檢驗設備。\n乳品工廠視需要得具備下列生產及檢驗設備：\n一、生產設備：\n(一) 鮮乳及調味乳處理工廠：\n1. 牛乳幫浦。\n2. 均質機。\n3. 乳脂肪分離機。\n4. 洗瓶機（包括殺菌設備）及裝瓶機或自動紙器包裝機。\n5. 成品低溫（攝氏七度以下凍結點以上）貯存室（保久乳除外）。\n(二) 濃縮乳（奶水及煉乳）製造：\n1. 均質機。\n2. 預熱設備。\n3. 濃縮設備。\n4. 冷卻設備。\n5. 調合處理設備。\n6. 牛乳幫浦。\n7. 空罐清洗及殺菌設備。\n8. 奶水及煉乳自動裝罐封罐機。\n(三) 乳粉製造：\n1. 牛乳幫浦。\n2. 乳脂肪分離機。\n3. 均質機。\n4. 貯乳槽。\n5. 乳液預熱設備。\n6. 濃縮設備。\n7. 乾燥製粉設備。\n8. 集粉處理設備。\n9. 乳粉貯槽。\n10. 添加物混合設備。\n11. 空罐殺菌、清潔設備。\n12. 乳粉自動充填、封蓋設備。\n13. 即溶奶粉相關設備。\n(四) 醱酵乳製造：\n1. 牛乳幫浦。\n2. 乳脂肪分離機。\n3. 醱酵液調和槽。\n4. 醱酵槽。\n5. 均質機。\n6. 稀釋調合設備。\n7. 洗瓶機及裝瓶機、或紙器包裝機、或其他容器包裝設備。\n8. 菌種管制設備。\n9. 成品低溫（攝氏七度以下凍結點以上）貯存室。\n(五) 乳粉調配：\n1. 空調設備（調配及包裝場所必備）。\n2. 真空吸塵設備。\n3. 充氮設備或脫氧劑等同等設備替代之。\n4. 檢重機。\n5. 金屬或其他異物檢出設備。\n6. 空罐殺菌或清潔設備。\n7. 乳粉自動充填、封蓋設備。\n8. 秤量設備。\n9. 攪拌混合設備。\n10. 篩粉機。\n11. 儲粉設備或容器。\n二、檢驗設備：\n(一) 微生物檢驗設備。\n(二) 餘氯測定器或試紙。\n(三) 體細胞數測定設備。"}, {"no": "第十四條", "chapter": "第三章 專業食品工廠之生產設備、檢驗設備及基本設施標準", "content": "食用油脂工廠應具備下列基本設施：\n一、溶劑提油廠應設置溶劑貯桶及其貯藏場所，溶劑廠應有防爆裝置、滅火器、消防砂等消防設備。\n二、內包裝室：生產小包裝（三公斤以下包裝）產品工廠，應獨立設置內包裝室，並裝設紗窗、紗門或空氣簾、空氣清淨器相關設備，必要時設置殺菌裝置（無生產小包裝者得免設置）。\n三、動物性油脂工廠應設有攝氏零度以下之凍藏庫。\n四、各種食用油貯槽宜為不銹鋼材質，並有原料貯槽或原料儲存專區及成品貯槽。\n食用油脂工廠視需要得具備下列生產及檢驗設備：\n一、生產設備：\n(一) 大豆油工廠：\n1. 原油煉製廠：\n(1) 篩別機。\n(2) 乾燥機。\n(3) 粉碎機。\n(4) 壓扁機。\n(5) 烘焙機。\n(6) 提油機（附 Miscella 蒸餾器、脫脂粕之脫溶劑器、溶劑蒸氣回收器）。\n2. 精製油煉製：\n(1) 精製大豆油工廠：離心分離機、脫色相關設備、壓濾機、真空幫浦、預熱相關設備、脫臭相關設備、冷卻相關設備。\n(2) 大豆沙拉油工廠：同精製大豆油工廠，另宜設置冷凍室、脫臘設備及氮氣充填設備。\n(二) 動物油脂工廠：\n1. 熱炸法原油煉製廠：切（碎）肉機、炸油鍋、油壓機、冷卻槽。\n2. 精製動物油脂廠：同精製大豆油工廠。\n(三) 人造奶油（Margarine）、脂肪抹醬（Fat spreads）及烤酥油（Shortening）工廠：\n1. 一貫作業工廠：同精製大豆油工廠，另需乳化槽（間接加熱式）、殺菌設備、急冷捏和機（附設冷凍機）、計量器。\n2. 購用精製油為原料之加工廠：同一貫作業工廠。\n二、檢驗設備：\n(一) 原油煉製廠：應能化驗酸價等項之儀器、器具及化學藥品，另置秤量器、乾燥箱及乾燥器。\n(二) 精製油煉製廠：除應具備原油煉製廠檢驗設備外，尚應能化驗碘價、過氧化價及顏色，主要設備含顏色測定器、秤量器、恆溫箱、乾燥箱。\n(三) 溶劑提油廠應購置溶劑殘留測定器。\n(四) 人造奶油、脂肪抹醬及烤酥油工廠：\n1. 一貫作業工廠：除精製油煉製廠設備外，尚應能檢驗融點、凍點、大腸桿菌、雜菌、含皂份等，主要設備含細菌培養檢驗設備、無菌室或微生物培養室（烤酥油工廠得免設）、融點凍點測定裝置。\n2. 購用精製油之加工廠：同一貫作業工廠規定。"}, {"no": "第十五條", "chapter": "第三章 專業食品工廠之生產設備、檢驗設備及基本設施標準", "content": "脫水蔬果工廠應具備下列檢驗設備：\n一、水分或水活性測定設備。\n二、秤量器。\n脫水蔬果工廠視需要得具備下列生產及檢驗設備：\n一、生產設備：\n(一) 蔬菜工廠：洗滌機、殺菁機、除頭尾機、切條或切片機、熱風或冷凍或其他乾燥設備、磨粉機（製粉工廠必備）、包裝設備。\n(二) 果實工廠：去皮器具、除芯器具、批次或連續糖漬設備、洗滌機或容器、切角機、磨粉機（製粉工廠必備）、切片機、殺菁機、熱風或冷凍或其他乾燥設備、包裝設備。\n二、檢驗設備：\n(一) 餘氯測定器或試紙。\n(二) 糖度計或糖度折射計。\n(三) pH 測定器或試紙。\n(四) 灰分測定裝置。\n(五) 乾燥箱。"}, {"no": "第十六條", "chapter": "第三章 專業食品工廠之生產設備、檢驗設備及基本設施標準", "content": "餐盒食品工廠應具備下列基本設施及檢驗設備：\n一、基本設施：\n(一) 原料處理場。\n(二) 加工調理場。\n(三) 冷凍庫、冷藏庫。\n(四) 包裝場所：產品之配膳包裝應有獨立或專用之場所與設備。\n二、檢驗設備：\n(一) 微生物檢驗設備。\n(二) 一般品質檢驗設備（測中心溫度之不銹鋼探針溫度計及餘氯測定器或試紙等）。\n餐盒食品工廠視需要得具備下列生產設備：\n一、洗米煮飯設備或其他主食加工設備。\n二、切菜切肉機及專用刀具。\n三、煎、煮、炒、油炸等烹飪設備。\n四、輸送帶或不銹鋼調理台。\n五、食品器具容器洗滌消毒設備。\n六、刀具砧板保管箱設備。\n七、洗滌（熱水或蒸汽）設備。\n八、加工調理場在發生蒸汽、熱氣、煙臭或油炸等油脂加熱處理之機器或設備上應裝設排氣罩裝置（含抽油煙設備）。\n九、包裝作業場所應有空氣過濾及換氣設施。\n十、成品應有適當之運送設備及運送專用車輛。"}, {"no": "第十七條", "chapter": "第三章 專業食品工廠之生產設備、檢驗設備及基本設施標準", "content": "速食麵工廠應具備下列生產設備：\n一、麵條製造設備。\n二、連續式油炸設備或蒸麵乾燥機。\n速食麵工廠視需要得具備下列生產及檢驗設備：\n一、生產設備：\n(一) 鍋爐。\n(二) 蒸煮機。\n(三) 冷卻設備。\n(四) 包裝設備。\n(五) 金屬或其他異物檢出設備。\n二、檢驗設備：\n(一) 水份測定設備。\n(二) 秤量器。\n(三) 粗脂肪測定設備。\n(四) 油脂性質檢驗設備（含水份、酸價、過氧化價、碘價、總極性化合物等）。"}, {"no": "第十八條", "chapter": "第三章 專業食品工廠之生產設備、檢驗設備及基本設施標準", "content": "食品添加物工廠應具備下列基本設施及檢驗設備：\n一、味精工廠：\n(一) 基本設施：\n1. 應具備從基本原料至結晶味精一貫作業之整套設備（包括原料處理場、發酵工廠、麩酸工廠、精製工廠及包裝室等）。\n2. 自結晶罐排出之味精中間製品，應以密閉式之脫水機、輸送機、乾燥機、篩選機等連貫設備完成作業。\n3. 微生物培養室及設備。\n4. 包裝室，其設施應符合本標準第六條相關規定，包裝室外應有洗手設備。\n(二) 檢驗設備：\n1. 麩酸測定器或自動化學分析儀。\n2. 秤量器。\n3. pH 測定器或試紙。\n4. 總氮測定裝置。\n5. 氨基態氮測定裝置。\n6. 微生物檢驗設備。\n二、除味精工廠外之食品添加物工廠應具備下列檢驗設備：\n(一) 秤量器（感度在一毫克以下）。\n(二) pH 測定器或試紙。\n(三) 水分測定器。\n食品添加物工廠視需要得具備下列生產設備及檢驗設備：\n一、味精工廠之檢驗設備：\n(一) 餘氯測定器或試紙。\n(二) 顯微鏡。\n(三) 水分或水活性測定設備。\n(四) 保溫箱。\n(五) 乾燥箱。\n(六) 光電比色計。\n(七) 粒度篩別機。\n(八) 菌體量測定器。\n二、除味精工廠外之食品添加物工廠：\n(一) 生產設備：粉碎機、篩粉機、混合或煉合機、乾燥機或乾燥箱、噴霧送風乾燥設備、集粉處理設備、攪拌及混合設備、過濾設備、加熱反應設備、濃縮設備、電解設備、溶解設備、儲存設備、充填設備、金屬或其他異物檢出設備。\n(二) 檢驗設備：光電比色計、氣相層析儀、液相層析儀、分光光度計、微生物檢驗設備、比重計、原子吸收光譜儀、濁度計、導電度計、比旋光度計、折射計。"}, {"no": "第十九條", "chapter": "第三章 專業食品工廠之生產設備、檢驗設備及基本設施標準", "content": "本標準第八條至第十八條專業食品工廠未設應具備之基本設施、生產設備或檢驗設備者，應提出合理說明及相關文件。"}, {"no": "第二十條", "chapter": "第四章 附則", "content": "本標準自發布日施行。"}], "自來水水質標準_20030820": [{"no": "第1條", "chapter": null, "content": "本標準依自來水法第十條規定訂定之。"}, {"no": "第2條", "chapter": null, "content": "本標準用詞定義如下：\n一、大腸桿菌群：指能分解乳糖，格蘭姆染色陰性，無芽胞之桿菌，或以膜濾法培養，產生金屬光澤之深色菌落。\n二、大腸桿菌群密度：指以多管醱酵法一百毫升水樣中所存在之大腸桿菌群最大可能數值（以下簡稱最大可能數（MPN）），或以膜濾法時一百毫升水樣在濾膜上所實際產生之菌落數值。\n三、陶姆斯（H.A.Thomas,Jr）公式：最大可能數等於醱酵為正值之管數乘以一百後，除以醱酵數為負值之水樣與接種之全部水樣相乘後開根號之值。\n四、多管醱酵法：指以不同容積或以不同稀釋度之細菌水樣（稀釋水樣之稀釋水須經滅菌）核定大腸桿菌群存否及密度之方法。\n五、膜濾法：指以特製過濾介質，核定大腸桿菌群存否及密度之方法。\n六、總菌落數：指一毫升水樣在標準平板培養基上，實際產生之菌落數。\n七、細菌水樣：指專供檢驗細菌之取樣容器所採取之水樣。\n八、有效餘氯：指水經加氯或氯化合物作消毒處理後，仍存在之有效剩餘氯量。\n九、自由有效餘氯：指以次氯酸或次氯酸根離子存在之有效餘氯。\n十、結合有效餘氯：指以氯胺、二氯胺存在之有效餘氯。\n十一、總三鹵甲烷：指水中之氯仿、溴化二氯甲烷、二溴化氯甲烷、溴仿等四種三鹵甲烷之總和。"}, {"no": "第3條", "chapter": null, "content": "自來水水質細菌最大容許量如下：\n一、大腸桿菌群密度月平均值為一．○。\n二、單一細菌水樣大腸桿菌群密度為六．○。\n三、單一細菌水樣總菌落數為一○○。"}, {"no": "第4條", "chapter": null, "content": "自來水水質濁度、色度、臭度及味最大容許量如下：\n一、濁度：\n（一）水源濁度在五○○濁度單位（NTU）以下：四個濁度單位（NTU）。\n（二）水源濁度超過五○○濁度單位（NTU）至一五○○濁度單位（NTU）：十個濁度單位（NTU）。\n（三）水源濁度超過一五○○濁度單位（NTU）：三十個濁度單位（NTU）。\n二、色度：十五鉑鈷單位。\n三、臭度：初嗅數三。\n四、味：無異常。\n前項水質檢驗，應每週取樣一次以上。"}, {"no": "第5條", "chapter": null, "content": "自來水水質化學性物質最大容許量或容許範圍如下：\n一、鉛（Pb）：○．○五毫克／公升。\n二、硒（Se）：○．○五毫克／公升。\n三、砷（As）：○．○五毫克／公升。\n四、鉻（Cr）：○．○五毫克／公升。\n五、鎘（Cd）：○．○○五毫克／公升。\n六、銀（Ag）：○．○五毫克／公升。\n七、汞（Hg）：○．○○二毫克／公升。\n八、鐵（Fe）：○．三毫克／公升。\n九、錳（Mn）：○．○五毫克／公升。\n十、銅（Cu）：一．○毫克／公升。\n十一、鋅（Zn）：五．○毫克／公升。\n十二、氰鹽（CN-1）：○．○五毫克／公升。\n十三、氟鹽（F-1）：○．八毫克／公升。\n十四、氯鹽（Cl-1）：二五○毫克／公升。\n十五、硫酸鹽（SO4-2）：二五○毫克／公升。\n十六、氨氮（NH3-N）：○．五毫克／公升。\n十七、亞硝酸鹽氮（NO2--N）：○‧一毫克／公升。\n十八、硝酸鹽氮（NO3--N）：一○．○毫克／公升。\n十九、總三鹵甲烷（年平均值表示）：○．一五毫克／公升。\n二十、總溶解固體量：八○○毫克／公升。\n二十一、酚類：○．○○一毫克／公升。\n二十二、陰離子界面活性劑（MBAS）：○．五毫克／公升。\n二十三、總硬度（CaCO3）：四○○毫克／公升。\n二十四、自由有效餘氯：○．二至一．五毫克／公升。\n二十五、氫離子濃度指數（PH）：六．○至八．五。\n二十六、農藥：\n（一）有機磷劑（巴拉松、大利松、達馬松、亞素靈、一品松）加氨基甲酸鹽（滅必蝨、加保扶、納乃得）：○．○五毫克／公升。\n（二）靈丹（Lindane）：○．○○○二毫克／公升。\n（三）安殺番（Endosulfan）：○．○○三毫克／公升。\n（四）除草劑：\n1. 丁基拉草（Butachlor）：○．○二毫克／公升。\n2. 巴拉刈（Paraquat）：○．○一毫克／公升。\n3. 2,4-地（2,4-D）：○．○七毫克／公升。\n（五）其他有害水質之農藥，其容許量由中央主管機關訂定並公告之。"}, {"no": "第6條", "chapter": null, "content": "自來水水質放射性標準，依游離輻射防護安全標準之規定辦理。"}, {"no": "第7條", "chapter": null, "content": "自來水水質細菌之檢驗，應自送配水系統上採取代表性水樣，每月最少取樣數按供水人口計算如下：\n一、二千五百人以下者，一件。\n二、逾二千五百人至一萬人者，五件。\n三、逾一萬人至二萬五千人者，十五件。\n四、逾二萬五千人至五萬人者，二十件。\n五、逾五萬人至十萬人者，三十件。\n六、逾十萬人至二十五萬人者，四十五件。\n七、逾二十五萬人至五十萬人者，六十五件。\n八、逾五十萬人至一百萬人者，八十件。\n九、逾一百萬人者，一百件。\n前項檢驗過程中或檢驗後，發現大腸桿菌群或總菌落數，超過最大容許量時，應即在該取樣點連續採取水樣。"}, {"no": "第8條", "chapter": null, "content": "自來水水質化學性物質之檢驗，每季取樣一次；遇特殊情況，應增加取樣頻率。但第五條第一款至第七款、第十二款、第十三款、第十六款至第十九款或第二十六款取樣數如連續三年檢測值未超過最大容許量或容許範圍者，自次年起取樣頻率得改為每年一次。"}, {"no": "第9條", "chapter": null, "content": "自來水水質檢驗方法，由中央主管機關另訂公告之。"}, {"no": "第10條", "chapter": null, "content": "本標準自發布日施行。"}], "飲用水水質標準_20170110": [{"no": "第1條", "chapter": null, "content": "本標準依飲用水管理條例（以下簡稱本條例）第十一條第二項規定訂定之。"}, {"no": "第2條", "chapter": null, "content": "本標準適用於本條例第四條所定飲用水設備供應之飲用水及其他經中央主管機關指定之飲用水。"}, {"no": "第3條", "chapter": null, "content": "本標準規定如下：\n\n一、細菌性標準（總菌落數採樣地點限於有消毒系統之水廠配水管網）：\n項目 / 最大限值 / 單位\n1. 大腸桿菌群（Coliform Group）：六（多管發酵酵法）MPN／一○○毫升；六（濾膜法）CFU／一○○毫升。\n2. 總菌落數（Total Bacterial Count）：一○○ CFU／毫升。\n\n二、物理性標準：\n1. 臭度（Odour）：三 初嗅數。\n2. 濁度（Turbidity）：二 NTU。\n3. 色度（Colour）：五 鉑鈷單位。\n\n三、化學性標準：\n（一）影響健康物質：\n1. 砷（Arsenic）：○‧○一毫克／公升。\n2. 鉛（Lead）：○‧○一毫克／公升。\n3. 硒（Selenium）：○‧○一毫克／公升。\n4. 鉻（總鉻，Total Chromium）：○‧○五毫克／公升。\n5. 鎘（Cadmium）：○‧○○五毫克／公升。\n6. 鋇（Barium）：二‧○毫克／公升。\n7. 銻（Antimony）：○‧○一毫克／公升。\n8. 鎳（Nickel）：○‧一毫克／公升（自民國一百零七年七月一日起○‧○七；自民國一百零九年七月一日起○‧○二）。\n9. 汞（Mercury）：○‧○○二毫克／公升（自民國一百零九年七月一日起○‧○○一）。\n10. 氰鹽（以CN-計，Cyanide）：○‧○五毫克／公升。\n11. 亞硝酸鹽氮（以氮計，Nitrite-Nitrogen）：○‧一毫克／公升。\n消毒副產物：\n12. 總三鹵甲烷（Total Trihalomethanes）：○‧○八毫克／公升。\n13. 鹵乙酸類（Haloacetic acids，HAA5）：○‧○六○毫克／公升（以一氯乙酸、二氯乙酸、三氯乙酸、一溴乙酸、二溴乙酸等5項化合物濃度總和計算）。\n14. 溴酸鹽（Bromate）：○‧○一毫克／公升。\n15. 亞氯酸鹽（Chlorite，僅限添加氣態二氧化氯消毒之供水系統）：○‧七毫克／公升。\n揮發性有機物：\n16. 三氯乙烯（Trichloroethene）：○‧○○五毫克／公升。\n17. 四氯化碳（Carbon tetrachloride）：○‧○○五毫克／公升。\n18. 1,1,1-三氯乙烷（1,1,1-Trichloroethane）：○‧二○毫克／公升。\n19. 1,2-二氯乙烷（1,2-Dichloroethane）：○‧○○五毫克／公升。\n20. 氯乙烯（Vinyl chloride）：○‧○○二毫克／公升（自民國一百零七年七月一日起○‧○○○三）。\n21. 苯（Benzene）：○‧○○五毫克／公升。\n22. 對-二氯苯（1,4-Dichlorobenzene）：○‧○七五毫克／公升。\n23. 1,1-二氯乙烯（1,1-Dichloroethene）：○‧○○七毫克／公升。\n24. 二氯甲烷（Dichloromethane）：○‧○二毫克／公升。\n25. 鄰-二氯苯（1,2-Dichlorobenzene）：○‧六毫克／公升。\n26. 甲苯（Toluene）：○‧七毫克／公升。\n27. 二甲苯（Xylenes，含鄰、間、對二甲苯三種同分異構物濃度總和）：○‧五毫克／公升。\n28. 順-1,2-二氯乙烯（cis-1,2-Dichloroethene）：○‧○七毫克／公升（自民國一百零三年七月一日施行）。\n29. 反-1,2-二氯乙烯（trans-1,2-Dichloroethene）：○‧一毫克／公升。\n30. 四氯乙烯（Tetrachloroethene）：○‧○○五毫克／公升。\n農藥：\n31. 安殺番（Endosulfan）：○‧○○三毫克／公升。\n32. 靈丹（Lindane）：○‧○○○二毫克／公升。\n33. 丁基拉草（Butachlor）：○‧○二毫克／公升。\n34. 2,4-地（2,4-D）：○‧○七毫克／公升。\n35. 巴拉刈（Paraquat）：○‧○一毫克／公升。\n36. 納乃得（Methomyl）：○‧○一毫克／公升。\n37. 加保扶（Carbofuran）：○‧○二毫克／公升。\n38. 滅必蝨（Isoprocarb）：○‧○二毫克／公升。\n39. 達馬松（Methamidophos）：○‧○二毫克／公升。\n40. 大利松（Diazinon）：○‧○○五毫克／公升。\n41. 巴拉松（Parathion）：○‧○二毫克／公升。\n42. 一品松（EPN）：○‧○○五毫克／公升。\n43. 亞素靈（Monocrotophos）：○‧○○三毫克／公升。\n持久性有機污染物：\n44. 戴奧辛（Dioxin，以17項氯化化合物毒性當量TEQ計）：三皮克–WHO–總毒性當量／公升（pg-WHO-TEQ/L）。\n（二）可能影響健康物質：\n1. 氟鹽（以F-計，Fluoride）：○‧八毫克／公升。\n2. 硝酸鹽氮（以氮計，Nitrate-Nitrogen）：一○‧○毫克／公升。\n3. 銀（Silver）：○‧○五毫克／公升。\n4. 鉬（Molybdenum）：○‧○七毫克／公升。\n5. 銦（Indium）：○‧○七毫克／公升。\n（三）影響適飲性、感觀物質：\n1. 鐵（Iron）：○‧三毫克／公升。\n2. 錳（Manganese）：○‧○五毫克／公升。\n3. 銅（Copper）：一‧○毫克／公升。\n4. 鋅（Zinc）：五‧○毫克／公升。\n5. 硫酸鹽（以SO4-2計，Sulfate）：二五○毫克／公升。\n6. 酚類（以酚計，Phenols）：○‧○○一毫克／公升。\n7. 陰離子界面活性劑（MBAS）：○‧五毫克／公升。\n8. 氯鹽（以Cl-計，Chloride）：二五○毫克／公升。\n9. 氨氮（以氮計，Ammonia-Nitrogen）：○‧一毫克／公升。\n10. 總硬度（以CaCO3計，Total Hardness）：三○○毫克／公升。\n11. 總溶解固體量（Total Dissolved Solids）：五○○毫克／公升。\n12. 鋁（Aluminium，以總鋁形式濃度計）：○‧三毫克／公升（自民國一百零八年七月一日起○‧二；颱風期間水源濁度超過500 NTU時及警報解除後三日內水源濁度超過1000 NTU時，鋁標準不適用）。\n（四）有效餘氯限值範圍（僅限加氯消毒之供水系統）：\n自由有效餘氯（Free Residual Chlorine）：○‧二～一‧○毫克／公升。\n（五）氫離子濃度指數（公私場所供公眾飲用之連續供水固定設備處理後之水不在此限）：pH值 六‧○～八‧五。"}, {"no": "第4條", "chapter": null, "content": "自來水、簡易自來水、社區自設公共給水因暴雨或其他天然災害致飲用水水源濁度超過一五○○ NTU時，其飲用水水質濁度最大限值為四 NTU。\n前項飲用水水源濁度檢測數據，由自來水事業、簡易自來水管理單位或社區自設公共給水管理單位提供。"}, {"no": "第5條", "chapter": null, "content": "自來水、簡易自來水、社區自設公共給水因暴雨或其他天然災害致飲用水水源濁度超過一五○○ NTU時，其飲用水水質自由有效餘氯（僅限加氯消毒之供水系統）得適用下列水質標準：\n自由有效餘氯（Free Residual Chlorine）：○‧二～二‧○毫克／公升。"}, {"no": "第6條", "chapter": null, "content": "（刪除）"}, {"no": "第7條", "chapter": null, "content": "本標準所定各水質項目之檢驗方法，由中央主管機關訂定公告之。"}, {"no": "第8條", "chapter": null, "content": "主管機關辦理本標準水質之檢驗，得委託合格之檢驗測定機構協助辦理。"}, {"no": "第9條", "chapter": null, "content": "本標準規定事項，除另定施行日期者外，自發布日施行。"}], "市售包裝食品有效日期評估指引_20130424": [{"no": "1. 目的", "chapter": null, "content": "本指引為提供食品製造業者在評估及訂定其所製造之包裝食品有效日期之參考依據，業者可參考本指引，自行擬定適用之有效日期評估/訂定計畫，以自主管理訂定食品之有效日期，確保食品在有效日期內，無變質、腐敗或其他違反食品衛生管理法規之情事發生。\n本指引亦做為衛生主管機關針對食品製造業者執行食品有效日期稽查工作之指引與參考。"}, {"no": "2. 法源依據", "chapter": null, "content": "市售包裝食品應依食品衛生管理法第22條第1項第7款及第24條第1項第5款標示有效日期。"}, {"no": "3. 訂定有效日期的責任", "chapter": null, "content": "食品之「有效日期」會受到所使用的原料、製造過程，以及運輸、儲存及販售環境等因素的影響，應依前述之個別情況設計保存試驗，據以研訂保存期限。食品製造業者有責任自行評估，或委由相關食品專家執行有效日期訂定評估計畫。"}, {"no": "4. 適用範圍", "chapter": null, "content": "食品製造業者。"}, {"no": "5. 名詞定義", "chapter": null, "content": "5.1 包裝食品：係指經固定密封包裝且可延長保存時間之食品。\n5.2 保存期限：在特定儲存條件下，市售包裝食品可保持產品價值的期間，其為時間範圍，例如「保存期限：二年」。\n5.3 有效日期：在特定儲存條件下，市售包裝食品可保持產品價值的最終期限，應為時間點，例如「有效日期：○年○月○日」。\n5.4 水活性（aw）：係指食品中自由水之表示法，為密閉容器中該食品之水蒸汽壓與在同溫度下純水飽和水蒸汽壓所得之比值。\n5.5 感官品評（sensory evaluation）：以科學的方法，藉著人的視、嗅、味、觸及聽等五種感覺，測量與分析食品外觀、風味及質地等感官品質的方法。\n5.6 產品價值（product value）：係包括食品的衛生安全、營養品質及感官品質。\n5.7 保存期限的加速試驗（accelerated shelf life studies）：通常以提高溫度的方法，故意的加速產品劣化，以估算在所建議的正常儲存條件下的產品保存期限。"}, {"no": "6. 有效日期的訂定與考量因子", "chapter": null, "content": "訂定食品有效日期時，必須依據食品組成分、製程及可能受到環境因素（如溫度、濕度及光線等）之影響與時間變化之關係，研析出食品劣化曲線，據以推定有效日期，確保食品食用時的有效性及安全性。\n\n包裝食品之日期標示，依各國法規要求不同而有不同標示意義，例如「use by」和「expiry date」與國內的「有效日期」定義相似；另外，「best before」和「賞味期限」則表示在此日期之前食品可保持最佳品質，但並不表示在此日期之後食品就不安全或變質。食品業者在標示進口食品有效日期時，僅在能請製造商提供足以佐證相等於我國「有效日期」定義的相關資料，方可於包裝上標示與原包裝不同的有效日期；若無法提供，則「best before」和「賞味期限」應視為「有效日期」。\n\n6.1 必須充分考量各個食品的特性，以客觀的指標，正確的評估食品之安全性與品質，設定有效日期。\n6.2 客觀指標是指「物理試驗」、「化學試驗」、「微生物試驗」等可以數值化的指標；感官品評中的「色」、「風味」等，在適當的控制條件下，經適當的品評員以正確的方法所得到的數據，可視為客觀的指標，與主觀累積的「經驗值」不同。\n6.3 必須瞭解各個試驗與指標的特性，並確實執行，以確保結果的信賴性、妥當性及客觀性，做綜合性的判斷，以設定有效日期。\n6.4 可依據各項食品內在與外在因子，建立該產品的劣變資料，並參考法規標準，續依 7.1 或 7.2 評估方法，以訂定有效日期。"}, {"no": "7.1 直接方法（6步驟）", "chapter": "7. 有效日期的評估方法", "content": "步驟1：分析食品劣變的因子\n‧ 產品本身之劣變因子：原料、產品配方組成、水活性（aw）、酸鹼度（pH）、氧化還原電位（Eh）、透氧性等。\n‧ 加工及倉儲過程之劣變因子：加工過程、殺（滅）菌方法、製造環境與設備、包裝材料與材質，以及儲存環境、溫度、濕度等。\n‧ 產品流通販賣過程之劣變因子：儲運及展售環境、溫度、濕度等條件。\n\n步驟2：選擇評估產品品質或安全性的方法\n依步驟1找出可能影響食品劣變的因子，選擇適當分析方法。微生物分析為評估有效日期之首要評估指標；成分或營養標示符合性為第二評估指標；物理及化學分析以及感官品評列為第三評估指標。\n‧ 微生物學分析：選擇能有效評估的微生物指標，如總生菌數、大腸桿菌群數、大腸桿菌數、低溫菌數、芽孢菌數等。\n‧ 感官品評：以視覺、嗅覺、味覺等評估食品性質，須在適當控制條件下，由經過訓練的品評員以正確方法進行並以統計學分析。\n‧ 物理及化學分析：分析指標可包括黏度、濁度、比重、過氧化價、酸價、酸鹼度、糖度、酸度、上部空隙氣體分析、游離脂肪酸和易揮發氣體等。\n‧ 成分分析：評估維生素、多酚類、脂肪酸等營養素或特定成分之劣化，判斷是否符合成分標示值。\n\n步驟3：擬定有效日期的評估計畫\n‧ 選擇測試實驗；決定保存期限試驗時間及取樣測試頻率，建議至少包括製造日起始點、預定有效日期終點及中間三個時間點，並於終點後再延長採樣一次。\n‧ 每次採樣測試之樣品數目採三重複，或依產品特性擬定。\n‧ 建議在產品開發最後階段或生產市售產品時，且在最有可能造成安定性問題的季節（通常是夏季），安排一次以上之實驗。\n\n步驟4：執行有效日期的評估計畫\n食品最好與平常生產製造至消費者端有相同的運輸和儲存條件，或儲存在特定的溫度和濕度下，所有條件均應正確控制並詳加記錄。\n\n步驟5：決定有效日期\n參考法規標準，以微生物學方法評估食品劣化程度，必須考慮到不同種類食品微生物限量標準或指標值；以最先發生變化至不可接受程度的指標，決定有效日期。\n\n步驟6：監控有效日期\n生產過程或製造環境中有任何足以影響產品有效日期的改變時，需重新評估；在產品上市後，從運輸和零售系統中實際採樣測試，若測試結果顯示有效日期不適當，必須修正之。"}, {"no": "7.2 間接方法", "chapter": "7. 有效日期的評估方法", "content": "7.2.1 對於有效期限較長的產品，可以保存期限加速試驗（accelerated shelf life studies）來預估有效日期，通常採提高所預設的儲存溫度以加速產品劣化，再估算產品在設定的儲存條件下的有效日期。\n7.2.2 本（他）廠有相似配方或製程且已上市一年以上之市售產品，未曾發生有效日期內產品異常或客訴事件者，可作為評估有效日期的參考。"}, {"no": "8.1 評估實例：冷凍預炸雞塊", "chapter": "8. 有效日期評估實例", "content": "產品描述：內容物為裹漿重組雞塊；加工方式為原料驗收→儲存→前處理→調理（含預炸）→冷凍→包裝；包裝方式為積層袋；儲存及運輸為-18°C冷凍；使用方式為復熱/烹調後食用。\n\n評估說明：\n‧ 步驟1：冷凍雞塊經預炸處理，且產品在冷凍儲存時一般微生物不易生長，有效日期之訂定與感官品評之接受度較有關係。\n‧ 步驟2：選擇評估油耗味、質地等變化。\n‧ 步驟3、4：因油耗味、質地變化緩慢，且參考市售相似產品之保存期限為12個月，規劃進行0、6、9、12、15個月的儲存試驗。\n‧ 步驟5：依據感官品評之接受度，決定仍保有原有良好氣味與質地的保存期，據以推算有效日期。\n‧ 步驟6：上市後繼續監控儲運與展售端造成的產品安全性與品質之變化，據以修正有效日期。"}, {"no": "8.2 評估實例：冷藏蔬菜沙拉", "chapter": "8. 有效日期評估實例", "content": "產品描述：內容物為生鮮蔬菜與沙拉醬包；加工方式為原料驗收→儲存→清洗→截切→包裝→冷藏；包裝方式為積層袋；儲存及運輸為0-7°C冷藏；使用方式為即食。\n\n評估說明：\n‧ 步驟1：產品初始菌數高且不經加熱滅菌，容易有微生物生長造成腐敗；生鮮截切蔬菜的色澤與氣味等可能快速變化。\n‧ 步驟2：選擇評估微生物以及氣味與色澤的感官品質。\n‧ 步驟3、4：因其變化迅速，且參考市售相似產品之保存期限為5天，規劃進行0、1、3、5、7天的儲存試驗，分析大腸桿菌群及大腸桿菌數量，以及氣味與色澤的感官品質。\n‧ 步驟5：參考法規標準——冷藏蔬菜沙拉產品的大腸桿菌群必須103 MPN/g以下，大腸桿菌必須10 MPN/g以下。綜合判斷儲存期間微生物與品質的變化，決定最適當的保存期，據以推算有效日期。\n‧ 步驟6：上市後繼續監控儲運與展售端的影響，據以修正有效日期。"}, {"no": "8.3 評估實例：健康食品認證茶花綠茶飲料", "chapter": "8. 有效日期評估實例", "content": "產品描述：內容物含水、可溶性纖維、綠茶、天然香料、L-抗壞血酸鈉、碳酸氫鈉、茶花抽出物、茶多酚；加工方式為原料驗收→儲存→前處理→調配→殺菌→包裝；包裝為無菌充填PET瓶；儲存及運輸為常溫；使用方式為開瓶可飲用。\n\n評估說明：\n‧ 步驟1：產品經高溫殺菌且為無菌充填，較無衛生安全問題，考量風味或色澤之品質變化；同時因具有健康食品認證，必須符合指標成分（可溶性纖維）的標示含量。\n‧ 步驟2：選擇評估指標成分及風味或色澤之變化。\n‧ 步驟3、4：因指標成分及風味或色澤之變化緩慢，且參考市售相似產品之保存期限為9個月，規劃進行0、6、9、12個月的儲存試驗。\n‧ 步驟5：依據指標成分含量及感官品評結果，綜合評估其保存期，據以推算有效日期。\n‧ 步驟6：上市後繼續監控儲運與展售端的影響，據以修正有效日期。"}, {"no": "9. 備註", "chapter": null, "content": "9.1 食品添加物業者在執行訂定產品有效日期時，亦可參考本指引。\n9.2 相關檢驗方法及衛生標準參考「衛生福利部食品藥物管理署（FDA）網頁」。"}],

      {"no": "說明", "chapter": null, "content": "本表為衛生福利部公告「可同時提供食品使用之中藥材品項」，共收錄 37 項中藥材，可同時作為食品原料使用。本清單之品名、基原及部位應以主管機關最新公告版本為準。"},

    "草案-得供食品原料使用之中藥材品項及其產品屬性認定基準_20260413": [
      {"no": "第一點", "chapter": "得供食品原料使用之中藥材品項及其產品屬性認定基準（草案）", "content": "衛生福利部（以下簡稱本部）為界定得供食品原料使用中藥材品項及其產品之屬性，兼顧國人中藥用藥安全及膳食文化，特訂定本基準。"},
      {"no": "第二點", "chapter": "得供食品原料使用之中藥材品項及其產品屬性認定基準（草案）", "content": "本基準所稱中藥材，指源自於自然界，依中醫藥理論，載於臺灣中藥典或本部認定之中醫藥固有典籍及其補充典籍，得供藥品使用之礦物或特定基原之植物與動物之原藥材、加工品或飲片。"},
      {"no": "第三點", "chapter": "得供食品原料使用之中藥材品項及其產品屬性認定基準（草案）", "content": "得供食品原料使用之中藥材分類及品項如下（附表所列之品名、學名及部位如有修正，應以最新版臺灣中藥典為準）：\n（一）第一類中藥材：具傳統食用文化得供食品原料用途者，共 75 項，包含百合、荷葉、銀耳（白木耳）、山藥、生薑、乾薑、昆布、薤白、海藻、龍眼肉、枸杞子、烏梅、大棗（紅棗、黑棗）、山楂、芡實、淡豆豉、蓮子、菊花、黃精、薄荷、石斛、陳皮、人參花、羅漢果、橘紅、青皮、桑葚（桑椹）、薏苡仁、羅勒、牡蠣、紫蘇葉、佛手柑、桑葉、野菊花（油菊）、玉米鬚、苦杏仁（須高溫處理）、餘甘子、小茴香（蘹香）、八角茴香（大茴香）、花椒（秦椒）、胡椒、砂仁、草豆蔻、肉豆蔻、丁香、豆蔻（白豆蔻）、番紅花（藏紅花、西紅花）、山柰、甘松（甘松香、香松）、草果、桂子、薑黃、白芥子、靈香（零陵香、廣零陵香）、排草、蓽澄茄（馬告）、桂智（蒂）、高良薑、白芷，以及限茶飲用途之仙鶴草（龍牙草）、積雪草、白茅根（茅根）、伸筋草（石松）、地骨皮、金錢草、廣藿香、車前草、小金英（兔仔菜、鵝仔菜）、細本山葡萄、苦蘵（燈籠草、炮仔草）、魚腥草、藿香、貓鬚草、萬點金、咸豐草、石南葉、馬鞭草。\n（二）第二類中藥材：食用時須注意安全性者，共 73 項，各項均訂有每人每日食用限量，包含馬齒莧、赤小豆、決明子（須炒製）、絞股藍（七葉膽）、五加皮、冬瓜子、枇杷葉、麥門冬（麥冬）、淡竹葉、粉葛、葛根、葛花、刺五加、當歸（孕婦慎用）、黃耆、紅耆、白朮、玉竹（萎蕤）、肉桂（桂皮）、桂枝、黨參、桑枝、白扁豆、天麻、人參、西洋參（花旗參、粉光參）、紫蘇子、茯苓、太子參、地黃、玄參（元參）、海螵蛸、天門冬、艾葉（孕婦慎用）、紅花（孕婦慎用）、枸骨葉（功勞葉）、益母草（孕婦慎用）、女貞子、金銀花、山銀花、忍冬藤、桔梗、紅景天、土茯苓、白芍、赤芍、白果（銀杏果，須蒸熟）、甘草（孕婦慎用）、川芎（孕婦慎用）、胖大海（膨大海）、酸棗仁（孕婦慎用）、冬蟲夏草、鹿茸、鹿角（含鹿角膠、鹿角霜）、龜板（含龜板膠，來源不得為保育類）、蒲公英、阿膠、杜仲、葫蘆巴（孕婦慎用）、萊菔子、枳椇子、苧麻、川貝母、製何首烏（限膳食料理湯品型態，不得加酒燉煮）、五味子、南五味子、丹參（孕婦慎用）、管花肉蓯蓉（僅限萃取物）、茵陳（僅限健康食品）、蛇床子（僅限健康食品）、番瀉（限茶包，番瀉苷每日 12 mg 以下）、苦橙（含枳實、枳殼）、夏枯草（限茶飲）、白花蛇舌草（限茶飲）、雞內金、龍眼籽、荔枝核、桃膠、望江南（限茶飲）。"},
      {"no": "第四點", "chapter": "得供食品原料使用之中藥材品項及其產品屬性認定基準（草案）", "content": "添加非本基準得供食品原料使用之中藥材品項者，以藥品管理。"},
      {"no": "第五點", "chapter": "得供食品原料使用之中藥材品項及其產品屬性認定基準（草案）", "content": "添加第二類中藥材之產品，具下列情形之一者，以藥品管理。但符合第六點者，不在此限：\n（一）第二類中藥材總量占比百分之五十以上。\n（二）第二類中藥材任一品項之含量（中藥材萃取物須回推），換算每日食用量超過臺灣中藥典所載該品項最低用量百分之五十（即附表所載每人日食用限量）。"},
      {"no": "第六點", "chapter": "得供食品原料使用之中藥材品項及其產品屬性認定基準（草案）", "content": "依健康食品管理法提供安全評估試驗資料並取得健康食品許可證，或依食安法公告應辦理查驗登記之輸入錠狀膠囊狀食品或國產維生素類錠狀膠囊狀食品，提供安全評估試驗資料，經查驗登記取得許可文件，且同時符合下列情形者，不以藥品管理：\n（一）第二類中藥材總量占比百分之五十以上，然未達百分之百。\n（二）第二類中藥材任一品項之含量（中藥材萃取物須回推），換算每日食用量超過臺灣中藥典所載該品項最低用量百分之五十，然未達最低用量。\n（三）組成不得與附表 2 所列之中醫藥固有典籍收載之方劑相同。\n前項所稱安全評估試驗資料，指依本部公告之健康食品安全評估方法規定，提供產品安全評估報告；本基準生效前已取得相關許可文件之產品，其展延申請案應提供安全評估試驗資料備查。"},
      {"no": "第七點", "chapter": "得供食品原料使用之中藥材品項及其產品屬性認定基準（草案）", "content": "符合下列產品型態之一者，不以藥品管理：\n（一）糖果、餅乾、蜜漬品、果凍、烘焙食品、甜味料或調味醬。\n（二）滷包、燉包、藥膳調理包或其他以食材為主體之藥膳食品，且產品外包裝應清楚載明與食材燉煮之料理方式。\n（三）經粗碎後以棉紙袋或不織布袋包裝製成之茶包型態。"},
      {"no": "第八點", "chapter": "得供食品原料使用之中藥材品項及其產品屬性認定基準（草案）", "content": "第二類中藥材總量占比計算方式如下：\n（一）固態產品：占比(%) = ΣC₂ ÷ [(ΣC₁ + ΣC₂) + ΣO] × 100%\n　ΣC₂：第二類中藥材含量之總和（萃取物須回推）\n　ΣC₁：第一類中藥材含量之總和（萃取物須回推）\n　ΣO：其他原料含量之總和（不回推）\n（二）液態產品：占比(%) = ΣC₂ ÷ ΣT × 100%\n　ΣC₂：第二類中藥材含量之總和（萃取物須回推）\n　ΣT：產品標示之淨重或容量"},
      {"no": "第九點", "chapter": "得供食品原料使用之中藥材品項及其產品屬性認定基準（草案）", "content": "中藥材萃取物回推估算方式：以原型態中藥材之使用量與其萃取所得之萃取物重量計算其萃取倍率，再將產品中實際使用之中藥材萃取物含量乘以該萃取倍率，即可回推估算產品中相當於原型態中藥材之重量。"},
      {"no": "第十點", "chapter": "得供食品原料使用之中藥材品項及其產品屬性認定基準（草案）", "content": "得供食品原料使用之中藥材，其批發零售，除附表 1 備註「其批發零售得依食品安全衛生管理法相關規定辦理」者外，應符合藥事法相關規定。"},
      {"no": "第十一點", "chapter": "得供食品原料使用之中藥材品項及其產品屬性認定基準（草案）", "content": "第五點及第六點所定不以藥品管理之產品，其品名標示不得與中醫藥固有典籍收載之方劑名稱類似。"},
      {"no": "附表1－第一類品項說明", "chapter": "附表 1 得供食品原料使用之中藥材品項表", "content": "第一類（共 75 項）依用途限制分為三群組：\n\n【無特殊限制，批發零售得依食安法辦理者（共 26 項）】：百合、荷葉、銀耳（白木耳）、山藥、生薑、乾薑、昆布、薤白、海藻、龍眼肉、枸杞子、烏梅、大棗（紅棗、黑棗）、山楂、芡實、淡豆豉、蓮子、菊花、黃精、薄荷、石斛、陳皮、人參花、薏苡仁、羅勒、牡蠣。\n\n【辛香調味料（萃取或濃縮型態僅限食品原料，不得供民眾直接食用）】：羅漢果、橘紅、青皮、桑葚（桑椹）、紫蘇葉、佛手柑、桑葉、野菊花（油菊）、玉米鬚、苦杏仁（不得生食，須高溫 100°C 處理）、餘甘子、小茴香（蘹香）、八角茴香（大茴香）、花椒（秦椒）、胡椒、砂仁、草豆蔻、肉豆蔻、丁香、豆蔻（白豆蔻）、番紅花（孕婦慎用，避免同時服用阿斯匹靈和抗凝血藥物）、山柰、甘松（甘松香）、草果、桂子、薑黃、白芥子、靈香（零陵香）、排草、蓽澄茄（馬告）、桂智（蒂）、高良薑、白芷。\n\n【限茶飲用途（以水煎煮或沖泡製成的茶湯）（共 18 項）】：仙鶴草（龍牙草）、積雪草、白茅根（茅根）、伸筋草（石松）、地骨皮、金錢草、廣藿香、車前草、小金英（兔仔菜）、細本山葡萄、苦蘵（燈籠草）、魚腥草、藿香、貓鬚草、萬點金、咸豐草、石南葉、馬鞭草。"},

      {"no": "附表2－禁止相同方劑清單", "chapter": "附表 2 組成不得與中醫藥固有典籍收載之方劑相同", "content": "依本基準第六點，取得相關許可之產品，其組成不得與下列 38 個中醫藥固有典籍收載之方劑相同（組成所列中藥材包含其炮製品）：\n七補丸、人參丸、人參飲、八珍益母丸、八珍湯、十全大補湯、三子養親湯、大建中湯、小建中湯、川貝枇杷膏、不老丹、六神散、四君子湯、四物理中湯、四物湯、甘麥大棗湯、生脈飲、百合固金湯、芍藥甘草湯、芎歸膠艾湯、兩儀膏、苓桂朮甘湯、桂枝人參湯、桂枝加芍藥湯、桂枝湯、參仲四物湯、參苓白朮散、排膿散、清肺飲、理中湯、腎著湯、黃耆五物湯、黃耆建中湯、當歸補血湯、聖愈湯、龜鹿二仙膠、歸耆建中湯、瓊玉膏。"}
