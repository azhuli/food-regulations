\n- Staphylococcus aureus (ATCC 25923; BCRC 10781)\n- Rhodococcus equi (ATCC 6939; BCRC 12859)\n- Listeria monocytogenes (ATCC 19111; BCRC 14845、ATCC 19115; BCRC 15352)"}, {"no": "第一部 § 2.2.39", "chapter": "第一部：分離與鑑別", "content": "【試藥】<div class=\"reg-table-block\"><div class=\"table-scroll\"><table class=\"annex-table\"><thead><tr><th>品名</th><th>說明</th></tr></thead><tbody>\n<tr><td>試藥級</td><td>磷酸二氫鉀(KH₂PO₄)、磷酸氫二鈉(Na₂HPO₄)、磷酸氫二鉀(K₂HPO₄)、丙酮酸鈉鹽、粟糖苷(esculin)、檸檬酸鐵銨、氯化鋰、萘利啶酸鈉鹽、環己胺、大腸菌素硫酸鹽、吖啶黃素(acriflavin-HCl)、頭孢泰坦、弗斯弗黴素、95%乙醇、氯化鈉、甘露糖醇、葡萄糖、酚紅、多黏桿菌素B硫酸鹽、西他利汀、硝酸鉀、溴甲酚紫、澱粉、鼠李糖、木糖、麥芽糖、結晶紫、草酸銨、碘化鉀、碘、沙黃O、30%過氧化氫溶液、對-胺基苯磺酸、冰醋酸、萘基乙二胺鹽酸鹽、甲基紅、α-萘酚、無水乙醇、腸黏菌素、拉他頭孢、氫氧化鉀、鋅粉、肌酸、N,N,N',N'-四甲基對苯二胺鹽酸鹽、聚山梨醇酯80及甘油。</td></tr>\n<tr><td>微生物級</td><td>酵母抽出物、牛肉抽出物、蛋白腖、洋菜、胰化酪蛋白腖、植物蛋白腖、月示蛋白腖3號、緩衝蛋白腖粉末、哥倫比亞血液基礎培養基、血液基礎培養基及去纖維之綿羊血。</td></tr>\n</tbody></table></div></div>"}, {"no": "第一部 § 2.2.40.1–2.2.40.7", "chapter": "第一部：分離與鑑別", "content": "【試劑調製（一）】\n2.2.40.1. 革蘭氏染色液\n(1) 哈克氏結晶紫液（初染劑）：溶液A（結晶紫2 g + 95%乙醇20 mL）+ 溶液B（草酸銨0.8 g + 蒸餾水80 mL），混合靜置24小時後過濾。\n(2) 革蘭氏碘液（媒染劑）：碘化鉀2 g + 碘1 g研磨溶於蒸餾水，定容至300 mL，置褐色瓶。\n(3) 哈克氏複染液（複染劑）：沙黃O 2.5 g溶於95%乙醇100 mL為原液，使用時取原液10 mL + 蒸餾水90 mL。\n\n2.2.40.2. 3%過氧化氫溶液：30%過氧化氫溶液5 mL + 無菌蒸餾水45 mL，避光冷藏。\n\n2.2.40.3. 0.85%生理食鹽水：氯化鈉8.5 g溶於蒸餾水1000 mL，121℃滅菌15分鐘。\n\n2.2.40.4. 0.5%吖啶黃素溶液：吖啶黃素0.5 g溶於蒸餾水100 mL，過濾除菌，避光冷藏。\n\n2.2.40.5. 0.5%萘利啶酸鈉鹽溶液：萘利啶酸鈉鹽0.5 g溶於蒸餾水100 mL，過濾除菌，冷藏。\n\n2.2.40.6. 10%丙酮酸鈉鹽溶液：丙酮酸鈉鹽10 g溶於蒸餾水100 mL，過濾除菌，冷藏。\n\n2.2.40.7. 含1%環己胺之40%乙醇溶液：環己胺1 g溶於無水乙醇：蒸餾水(2:3, v/v) 100 mL，過濾除菌，冷藏。"}, {"no": "第一部 § 2.2.40.8–2.2.40.17", "chapter": "第一部：分離與鑑別", "content": "【試劑調製（二）】\n2.2.40.8. 亞硝酸鹽試驗試劑：\n溶液A：對-胺基苯磺酸1 g溶於5 N醋酸溶液125 mL，冷藏。\n溶液B：萘基乙二胺鹽酸鹽0.25 g溶於5 N醋酸溶液200 mL，冷藏。\n\n2.2.40.9. 甲基紅指示劑：甲基紅0.1 g溶於95%乙醇300 mL，加蒸餾水至500 mL。\n\n2.2.40.10. 歐普氏試劑(VP reagents)：\n溶液A：α-萘酚5 g溶於無水乙醇100 mL。\n溶液B：氫氧化鉀40 g溶於蒸餾水至100 mL。\n\n2.2.40.11. 氧化酶試劑：N,N,N',N'-四甲基對苯二胺鹽酸鹽1 g溶於蒸餾水100 mL，置褐色瓶冷藏，使用期限一週。\n\n2.2.40.12. 0.1 M磷酸鉀緩衝液：磷酸氫二鉀17.4 g溶於蒸餾水500 mL，調pH 6.0 ± 0.1，加水至1000 mL，121℃滅菌15分鐘。\n\n2.2.40.13. 1%腸黏菌素溶液：腸黏菌素1 g溶於0.1 M磷酸鉀緩衝液100 mL，冷藏。\n\n2.2.40.14. 拉他頭孢溶液：拉他頭孢1 g溶於0.1 M磷酸鉀緩衝液100 mL，過濾除菌，分裝2 mL冷藏。\n\n2.2.40.15. 5 N醋酸溶液：冰醋酸286 mL加蒸餾水至1000 mL。\n\n2.2.40.16. 5%鼠李糖溶液：鼠李糖25 g溶於蒸餾水500 mL，過濾除菌，冷藏。\n\n2.2.40.17. 5%木糖溶液：木糖25 g溶於蒸餾水500 mL，過濾除菌，冷藏。"}, {"no": "第一部 § 2.2.41.1–2.2.41.5", "chapter": "第一部：分離與鑑別", "content": "【培養基（一）】\n2.2.41.1. 胰化酪蛋白大豆培養液(TSB)：胰化酪蛋白腖17 g、植物蛋白腖3 g、氯化鈉5 g、K₂HPO₄ 2.5 g、葡萄糖2.5 g + 蒸餾水1000 mL，加熱溶解，121℃/15 min，最終pH 7.3 ± 0.2。\n\n2.2.41.2. 增菌培養液(BLEB)：胰化酪蛋白腖17 g、植物蛋白腖3 g、氯化鈉5 g、K₂HPO₄ 2.5 g、葡萄糖2.5 g、酵母抽出物6 g、KH₂PO₄ 1.35 g、Na₂HPO₄ 9.6 g + 蒸餾水1000 mL，加熱溶解，121℃/15 min，加入10%丙酮酸鈉鹽溶液11.1 mL，最終pH 7.3 ± 0.1。\n\n2.2.41.3. 牛津培養基(OXA)：哥倫比亞血液基礎培養基39～44 g、粟糖苷1 g、檸檬酸鐵銨0.5 g、氯化鋰15 g + 蒸餾水1000 mL，121℃/15 min，冷卻至50℃，加入含環己胺0.4 g、大腸菌素硫酸鹽0.02 g、吖啶黃素0.005 g、頭孢泰坦0.002 g及弗斯弗黴素0.01 g之乙醇/蒸餾水(1:1)溶液10 mL。\n\n2.2.41.4. PALCAM培養基：蛋白腖11.5 g、澱粉0.5 g、氯化鈉2.5 g、甘露糖醇5 g、粟糖苷0.4 g、葡萄糖0.25 g、檸檬酸鐵銨0.25 g、氯化鋰7.5 g、酚紅0.04 g、洋菜6.5 g + 蒸餾水500 mL，121℃/15 min，冷卻至50℃，加入含多黏桿菌素B硫酸鹽0.005 g、吖啶黃素0.0025 g及西他利汀0.01 g之水溶液1 mL，最終pH 7.2 ± 0.1。\n\n2.2.41.5. 改良式牛津培養基(MOX)：哥倫比亞血液基礎培養基39～44 g、洋菜2 g、粟糖苷1 g、檸檬酸鐵銨0.5 g、氯化鋰15 g、1%腸黏菌素溶液1 mL + 蒸餾水1000 mL，121℃/10 min，pH 7.2 ± 0.1，迅速冷卻至46℃，加入拉他頭孢溶液2 mL（本培養基勿添加任何補充劑）。"}, {"no": "第一部 § 2.2.41.6–2.2.41.12", "chapter": "第一部：分離與鑑別", "content": "【培養基（二）】\n2.2.41.6. TSBYE培養液：胰化酪蛋白腖17 g、植物蛋白腖3 g、氯化鈉5 g、K₂HPO₄ 2.5 g、葡萄糖2.5 g、酵母抽出物6 g + 蒸餾水1000 mL，121℃/15 min，pH 7.3 ± 0.2。\n\n2.2.41.7. TSAYE培養基：胰化酪蛋白腖15 g、植物蛋白腖5 g、氯化鈉5 g、洋菜15 g、酵母抽出物6 g + 蒸餾水1000 mL，121℃/15 min，pH 7.3 ± 0.2。\n\n2.2.41.8. 運動性測試培養基(MTM)：牛肉抽出物3 g、蛋白腖10 g、氯化鈉5 g、洋菜4 g + 蒸餾水1000 mL，分取5 mL注入試管，121℃/15 min，pH 7.4 ± 0.2。\n\n2.2.41.9. 綿羊血培養基：血液基礎培養基33～44 g + 蒸餾水1000 mL，121℃/15 min，冷卻至45～46℃，加入去纖維之綿羊血50 mL。\n\n2.2.41.10. 硝酸鹽培養液：牛肉抽出物3 g、蛋白腖5 g、硝酸鉀(nitrite-free)1 g + 蒸餾水1000 mL，分取5 mL注入試管，121℃/15 min，pH 7.0 ± 0.2。\n\n2.2.41.11. MR-VP培養液：緩衝蛋白腖粉末7 g、葡萄糖5 g、K₂HPO₄ 5 g + 蒸餾水1000 mL，取5 mL注入試管，121℃/15 min，pH 6.9 ± 0.2。\n\n2.2.41.12. 紫色碳水化合物培養液：月示蛋白腖3號10 g、牛肉抽出物1 g、氯化鈉5 g、溴甲酚紫0.02 g + 蒸餾水1000 mL。\n葡萄糖、粟糖苷、麥芽糖、甘露糖醇利用試驗：以上述培養液稀釋後各取2.5 mL，118℃/10 min，pH 6.8 ± 0.2。\n鼠李糖、木糖利用試驗：以過濾滅菌之5%溶液稀釋至最終濃度0.5%，取2.5 mL，pH 6.8 ± 0.2。"}, {"no": "第一部 § 2.3", "chapter": "第一部：分離與鑑別", "content": "【檢液之調製】\n2.3.1. 固態檢體：取25 g + 增菌培養液225 mL，混合均勻，作10倍稀釋。\n2.3.2. 粉狀/粒狀檢體：同法取25 g + 225 mL。\n2.3.3. 液態檢體：取25 mL + 增菌培養液225 mL。\n2.3.4. 凝態及濃稠液態（如布丁、煉乳）：取25 g + 225 mL。\n2.3.5. 冷凍檢體：須解凍者在2～5℃冷藏18小時內解凍，或45℃以下水浴15分鐘快速解凍；冰品類速切小塊取25 g + 225 mL。無法立即檢驗者貯存於-20℃。\n2.3.6. 系列稀釋：取10倍稀釋液10 mL加至90 mL稀釋液，依序製備100倍、1000倍、10000倍稀釋液。\n2.3.7. 塗抹物(Swab)：將棉棒頭置無菌試管，折斷木柄，加增菌培養液5 mL，10秒內叩擊手心50次（振幅≥15公分）或旋渦混合，取溶出液。\n\n【附註】\n- 含高油脂檢體：加已滅菌乳化劑（如Tween 80至1%），充分振搖乳化。\n- 檢體量不足25 g(mL)時：依量添加稀釋液作10倍稀釋。"}, {"no": "第一部 § 2.4.1.1", "chapter": "第一部：分離與鑑別", "content": "【增菌培養】\n將2.3節之檢液充分振搖混合均勻，放入無菌容器，於30℃培養4小時，分別加入：\n- 0.5%吖啶黃素溶液 0.5 mL\n- 0.5%萘利啶酸鈉鹽溶液 2 mL\n- 含1%環己胺之40%乙醇溶液 1.25 mL\n\n繼續培養至48小時。於培養24及48小時後，各以棉棒沾取增菌液塗抹於選擇性培養基，於35℃培養24～48小時。"}, {"no": "第一部 § 2.4.1.2", "chapter": "第一部：分離與鑑別", "content": "【直接平板法(Direct plate count method)】\n1. 將2.3節之稀釋檢液及/或原液充分搖勻後，進行適當連續稀釋。\n2. 各吸取每一稀釋液1 mL，置入3-5個選擇性培養基（例如0.3 mL、0.3 mL及0.4 mL，總量1 mL），每一稀釋液至少做二重複。\n3. 以已滅菌塗抹曲棒均勻塗抹乾後，於35℃培養24～48小時，觀察菌落生長狀態。\n4. 選取含25～250個菌落之平板予以計數。\n\n【附註】各稀釋倍數典型菌落數小於25或大於250時，以最低或最高稀釋倍數之平板計數。"}, {"no": "第一部 § 2.4.2", "chapter": "第一部：分離與鑑別", "content": "【選擇性培養基】\n2.4.2.1. 由OXA、PALCAM及MOX等含粟糖苷之選擇性培養基中擇一選用，並建議同時選用1種市售李斯特菌選擇性呈色培養基(chromogenic differential selective agars)，以助區分單核球增多性李斯特菌及其他李斯特菌屬。\n\n2.4.2.2. 以無菌棉花棒沾取增菌液塗抹於選擇性培養基約1/2皿面積，再以接種環進行二區劃線。於35℃培養24～48小時。典型單核球增多性李斯特菌菌落呈灰至黑色，菌落周圍培養基顏色變深；部分生長較慢菌株需再培養24小時。\n\n2.4.2.3. 每個培養基挑取至少5個可疑菌落，接種於TSAYE培養基，30℃培養24～48小時，再接種於TSBYE培養液，30℃培養24～48小時，以備進行生化鑑定。"}, {"no": "第一部 § 2.4.3.1–2.4.3.2", "chapter": "第一部：分離與鑑別", "content": "【鑑定（一）：革蘭氏染色與觸酶試驗】\n2.4.3.1. 革蘭氏染色(Gram stain)：\n(1) 取菌塗片，風乾後通過火焰3～4次固定。\n(2) 初染：哈克氏結晶紫液1分鐘，水洗。\n(3) 媒染：革蘭氏碘液1分鐘，水洗。\n(4) 脫色：95%乙醇洗至不再有紫色褪出，約30秒，水洗。\n(5) 複染：哈克氏複染液30秒，水洗。\n(6) 風乾後鏡檢：深紫色＝革蘭氏陽性，淡紅色＝陰性。\n\n單核球增多性李斯特菌：革蘭氏陽性，菌體呈單一或短鏈排列之球桿菌，不產芽孢。\n\n2.4.3.2. 觸酶試驗(Catalase test)：\n取菌塗於載玻片，加3%過氧化氫溶液1～2滴，產生氣泡者＝正反應；無氣泡＝負反應。\n單核球增多性李斯特菌應為正反應（＋）。"}, {"no": "第一部 § 2.4.3.3–2.4.3.4", "chapter": "第一部：分離與鑑別", "content": "【鑑定（二）：傘狀運動試驗與β-溶血試驗】\n2.4.3.3. 傘狀運動試驗(Umbrella motility test)：\n取菌穿刺於MTM培養基中約1/2管深，於20～25℃培養，每24小時觀察一次，至多7天。在培養基上緣下3～5 mm處出現傘狀＝正反應。\n單核球增多性李斯特菌應為正反應（＋）。\n\n2.4.3.4. β-溶血試驗(β-hemolysis test)：\n取菌接種於綿羊血培養基，35℃培養48小時，觀察溶血現象。有溶血現象＝正反應。\n單核球增多性李斯特菌具微弱溶血現象，應為正反應（＋）。"}, {"no": "第一部 § 2.4.3.5", "chapter": "第一部：分離與鑑別", "content": "【鑑定（三）：醣類利用試驗】\n取菌分別接種於含0.5%鼠李糖、木糖、甘露糖醇、葡萄糖、麥芽糖或粟糖苷之紫色碳水化合物培養液，35℃培養，每24小時觀察一次，至多7天。培養液轉黃色＝正反應；未變色＝負反應。\n\n單核球增多性李斯特菌之預期反應：\n- 鼠李糖：正(+)\n- 葡萄糖：正(+)\n- 麥芽糖：正(+)\n- 粟糖苷：正(+)\n- 木糖：負(−)\n- 甘露糖醇：負(−)"}, {"no": "第一部 § 2.4.3.6–2.4.3.8", "chapter": "第一部：分離與鑑別", "content": "【鑑定（四）：VP試驗、MR試驗及氧化酶試驗】\n2.4.3.6. 歐普氏試驗(VP test)：\n取菌接種於MR-VP培養液，35℃培養48 ± 2小時，取1 mL至試管，加歐普氏試劑A 0.6 mL、試劑B 0.2 mL及少許肌酸，輕輕搖勻，4小時後觀察。呈粉紅色＝正反應。\n單核球增多性李斯特菌應為正反應（＋）。\n\n2.4.3.7. 甲基紅試驗(MR test)：\n將VP試驗剩餘之MR-VP培養液再於35℃培養48 ± 2小時，加甲基紅指示劑0.3 mL，呈紅色＝正反應，呈黃色＝負反應。\n單核球增多性李斯特菌應為正反應（＋）。\n\n2.4.3.8. 氧化酶試驗(Oxidase test)：\n取新鮮單一菌落（避免使用鎳鉻製品）塗抹於含氧化酶試劑試紙，10～15秒內變深藍紫色＝正反應，否則＝負反應。\n單核球增多性李斯特菌應為負反應（−）。"}, {"no": "第一部 § 2.4.3.9–2.4.3.11", "chapter": "第一部：分離與鑑別", "content": "【鑑定（五）：CAMP試驗、硝酸鹽還原試驗及菌種保存】\n2.4.3.9. CAMP試驗：\n將R. equi及S. aureus（或S. pseudintermedius）接種於TSAYE，35℃培養24小時後配製>1.0 McFarland菌液，以棉花棒平行接種於新鮮綿羊血培養基；於兩者之間接種2.0 McFarland之可疑菌株，距R. equi及S. aureus各2～3 mm，不交互重疊。35℃培養24～48小時。\n靠近S. aureus（或S. pseudintermedius）處溶血較多、近R. equi處溶血不明顯＝正反應。\n單核球增多性李斯特菌應為正反應（＋）。\n\n2.4.3.10. 硝酸鹽還原試驗(Nitrate reduction test)：\n取菌接種於硝酸鹽培養液，35℃培養5天，依序加入亞硝酸鹽試劑A及B各0.2 mL。呈紅紫色＝正反應；無顏色變化時加入少許鋅粉，出現紅紫色則為負反應。\n單核球增多性李斯特菌應為負反應（−）。\n\n2.4.3.11. 菌種保存：\n取TSB培養液培養6～12小時之菌液1 mL，加甘油0.1 mL（121℃/15 min）至無菌冷凍試管，以液態氮冷凍或立刻置入-70℃超低溫冷凍櫃保存。"}, {"no": "第一部 § 2.5", "chapter": "第一部：分離與鑑別", "content": "【判定標準】\n單核球增多性李斯特菌陽性者，應符合下列結果：\n\n1. 觸酶試驗：正(+)（氣泡產生）\n2. 革蘭氏染色：正(+)（陽性、無芽孢、短桿菌）\n3. 傘狀運動試驗：正(+)（培養基上緣下3～5 mm出現傘狀）\n4. CAMP試驗：正(+)（與S. aureus相接處具溶血現象，與R. equi相接處則否）\n5. 硝酸鹽還原試驗：負(−)\n6. 氧化酶試驗：負(−)\n7. 歐普氏試驗(VP)：正(+)（粉紅色）\n8. 甲基紅試驗(MR)：正(+)（紅色）\n9. 鼠李糖利用試驗：正(+)（黃色）\n10. 木糖利用試驗：負(−)\n11. 甘露糖醇利用試驗：負(−)\n12. 粟糖苷利用試驗：正(+)（黃色）\n13. 葡萄糖利用試驗：正(+)（黃色）\n14. 麥芽糖利用試驗：正(+)（黃色）\n15. β-溶血試驗：正(+)（具微弱溶血透明現象）"}, {"no": "第一部 § 2.6", "chapter": "第一部：分離與鑑別", "content": "【計數方法】<div class=\"reg-table-block\"><div style=\"font-family:monospace;font-size:0.92em;line-height:2.2;\">【比率 R】<br>R = <span style=\"display:inline-flex;flex-direction:column;align-items:center;font-size:0.9em;vertical-align:middle;\"><span>N₁</span><span style=\"border-top:1px solid currentColor;padding-top:1px;\">N₀</span></span>　（N₀：可疑菌落數；N₁：判定為李斯特菌之菌落數）<br><br>【單一稀釋倍數（菌落數 25～250）】<br>菌數（CFU/g 或 CFU/mL）= ∑a × <span style=\"display:inline-flex;flex-direction:column;align-items:center;font-size:0.9em;vertical-align:middle;\"><span>A</span><span style=\"border-top:1px solid currentColor;padding-top:1px;\">VA</span></span> × R<br>∑a：A稀釋倍數所有平板可疑菌落數之總和；VA：A稀釋倍數所有平板檢液總體積；A：稀釋倍數<br><br>【兩種稀釋倍數均在 25～250】<br>菌數 = ［∑a × <span style=\"display:inline-flex;flex-direction:column;align-items:center;font-size:0.9em;vertical-align:middle;\"><span>A</span><span style=\"border-top:1px solid currentColor;padding-top:1px;\">VA</span></span> ＋ ∑b × <span style=\"display:inline-flex;flex-direction:column;align-items:center;font-size:0.9em;vertical-align:middle;\"><span>B</span><span style=\"border-top:1px solid currentColor;padding-top:1px;\">VB</span></span>］× <span style=\"display:inline-flex;flex-direction:column;align-items:center;font-size:0.9em;vertical-align:middle;\"><span>R</span><span style=\"border-top:1px solid currentColor;padding-top:1px;\">2</span></span></div></div>【記錄方式】菌數應採四捨六入（第三位數字為5時，第二位奇數進位、偶數捨去），有效數取兩位，以CFU/g或CFU/mL表示。\n\n2.7. 如使用經確效認可之市售培養基、生化檢測套組或生化試驗鑑定系統，其檢驗結果有爭議時，以本檢驗方法為準。"}, {"no": "第二部 § 1–2.2", "chapter": "第二部：real-time PCR檢測", "content": "【適用範圍與裝置】\n適用範圍：適用於單核球增多性李斯特菌之鑑別。本方法可視需要執行。\n\n檢驗方法：檢體增菌液或分離純化後之菌株，經DNA萃取後，以即時聚合酶鏈反應(real-time PCR)鑑別菌種。\n\n工作環境：工作平台需寬敞、潔淨、光線良好。檢體前處理、DNA抽取、PCR試劑配製及PCR等過程皆需有區隔空間，避免交叉污染。Real-time PCR試劑之配製應於生物安全操作櫃內進行。\n\n裝置：\n2.2.1. 即時聚合酶鏈反應器：Applied Biosystems 7500 Real-Time PCR System或同級品。\n2.2.2. 高壓滅菌釜：可達121℃以上。\n2.2.3. 生物安全操作櫃：第二等級(class II)以上。\n2.2.4. 加熱振盪器：具溫控及振盪功能。\n2.2.5. 微量冷凍離心機：可達20000 × g，並具4℃溫控。\n2.2.6. 離心機：供各式微量離心管用。\n2.2.7. 冰箱：5 ± 3℃。\n2.2.8. 冷凍櫃：-20 ± 3℃。\n2.2.9. 旋渦混合器。\n2.2.10. 酸鹼度測定儀。\n2.2.11. 分光光度計：具波長260 nm、280 nm。\n2.2.12. 天平：最大稱重2000 g，靈敏度0.1 g；最大稱重100 g，靈敏度1 mg。"}, {"no": "第二部 § 2.3", "chapter": "第二部：real-time PCR檢測", "content": "【試藥與引子探針】\n2.3.1. DNA抽出用：適用於革蘭氏陽性細菌DNA抽出之市售套組。\n\n2.3.2.1. Listeria monocytogenes（標的基因：iap gene）：\n引子F（Lm835F）：5'-AACTGGTTTCGTTAACGGTAAATACTTA-3'\n引子R（Lm998R）：5'-TAGGCGCAGGTGTAGTTGCT-3'\n探針P（Lm918P）：5'-FAM-CTACTACTCAACAAGCTGCACCTGCTGC-BHQ-3'\nPCR增幅產物：163 bp\n探針標記：5'端FAM，3'端BHQ-3\n\n2.3.2.1.2. Listeria spp.（標的基因：iap gene）：\n引子F（Lall1055F）：5'-GTTAAAAGCGGTGACACTATTTGG-3'\n引子R（Lall1163R）：5'-TTTGACCTACATAAATAGAAGAAGAAGATAA-3'\n探針P（Lall1118P）：5'-FAM-ATGTCATGGAATAAT-MGB-3'\nPCR增幅產物：108 bp\n探針標記：5'端FAM，3'端MGB\n\n引子及探針拆封後以無菌去離子水稀釋，分裝於-20℃冷凍保存，探針需避光。\n\n2.3.2.2. TaqMan Fast Reagents Starter Kit（適用於Applied Biosystems 7500 Real-Time PCR System）：含real-time PCR所需去氧核糖核苷三磷酸及聚合酶等。\n\n2.3.3. 對照用物質：單核球增多性李斯特菌參考菌株或其DNA。"}, {"no": "第二部 § 2.4–2.5", "chapter": "第二部：real-time PCR檢測", "content": "【器具及Real-time PCR溶液配製】\n器具：\n2.4.1. 微量吸管：10 µL、20 µL、200 µL及1000 µL。\n2.4.2. 吸管尖：已滅菌，10 µL、20 µL、200 µL及1000 µL。\n2.4.3. 離心管：200 µL、600 µL、1.5 mL及2 mL。\n2.4.4. Real-time PCR反應管：100 µL。\n2.4.5. Real-time PCR反應盤：96孔，適用Applied Biosystems 7500。\n2.4.6. 玻璃或塑膠瓶：50 mL～2000 mL。\n（所有塑膠或玻璃器皿均為無DNase污染。）\n\nReal-time PCR溶液配製（Applied Biosystems 7500，每反應25 µL）：\n- 5 µM引子F：2.0 µL\n- 5 µM引子R：2.0 µL\n- 5 µM探針：1.0 µL\n- TaqMan Fast Reagents Starter Kit：12.5 µL\n- 檢體DNA溶液：5.0 µL\n- 無菌去離子水：2.5 µL\n（Real-time PCR溶液應於冰浴中配製。）"}, {"no": "第二部 § 2.6", "chapter": "第二部：real-time PCR檢測", "content": "【檢體DNA溶液之製備】\n2.6.1. 增菌液DNA製備：\n吸取增菌液1 mL置1.5 mL離心管，15000 × g離心3分鐘，去除上清液。\n\n2.6.1.1. 直接煮沸法：加無菌去離子水1 mL，振盪均勻，15000 × g離心3分鐘，去上清液，再加無菌去離子水1 mL，振盪均勻，置加熱振盪器煮沸10分鐘，作為DNA原液，-20℃冷凍保存。\n\n2.6.1.2. 抽取DNA法：採用適用於革蘭氏陽性細菌DNA抽取之市售套組，依說明操作，收集至1.5 mL離心管，-20℃冷凍保存。\n\n2.6.2. 分離菌株DNA製備：\n取一接種環菌株置含無菌去離子水1 mL之1.5 mL離心管，振盪均勻，煮沸10分鐘，冷卻後15000 × g離心3分鐘，吸取上清液作為DNA原液，-20℃冷凍保存。（亦可依2.6.1.2節操作。）\n\n2.6.3. DNA濃度測定及純度判斷：\n取適量DNA原液以無菌去離子水稀釋，分別測定260 nm及280 nm之吸光值。\nDNA原液濃度 = O.D.260 × 50 ng/µL × 稀釋倍數\n純度判斷：O.D.260/O.D.280比值應介於1.7～2.0。"}, {"no": "第二部 § 2.7", "chapter": "第二部：real-time PCR檢測", "content": "【Real-time PCR操作步驟與結果判讀】\n2.7.1. 操作步驟：\n以無菌去離子水適當稀釋DNA原液、引子及探針。取已滅菌1.5 mL離心管，依2.5節配製real-time PCR溶液，分裝20 µL入反應孔，各加入DNA溶液5 µL，以200 × g瞬間離心，移入real-time PCR反應器，依下列條件進行：\n\n步驟1 熱活化：95℃，20秒\n步驟2 變性：95℃，5秒\n步驟3 黏接、延展：60℃，30秒\n步驟2至步驟3共進行45個循環。\n同時另製作正反應及負反應對照組。\n\n（上述條件不適時，可依所使用之儀器設定適合之反應條件。）\n\n2.7.2. 螢光分析：\n反應後直接從儀器螢幕觀察探針所產生之螢光增幅曲線，判讀反應結果。\n\n2.7.3. 確認：\n當檢體DNA與正反應對照組之real-time PCR螢光分析圖均出現螢光增幅曲線，即確認該增幅產物為標的基因片段，可確認檢體中含有Listeria monocytogenes或Listeria spp.。\n\n參考文獻：Hitchins, A. D., Jinneman, K. and Chen, Y. 2022. Chapter 10 Detection of Listeria monocytogenes in foods and environmental samples, and enumeration of Listeria monocytogenes in foods. Bacteriological Analytical Manual."}]});

  
  Object.assign(lawArticles, {"食品微生物之檢驗方法－大腸桿菌之檢驗": [{"no": "公告資訊", "chapter": "基本資訊", "content": "方法代號：MOHWM0023.02\n公告日期：110年10月6日（衛授食字第1101902155號）\n生效日期：111年1月1日\n適用範圍：本方法適用於食品中大腸桿菌之檢驗。\n檢驗原理：檢體經系列稀釋後，以選擇性培養基培養及計數或以三階三支進行培養，配合MPN計數之方法。"}, {"no": "2.1", "chapter": "工作環境", "content": "工作平台須寬敞、潔淨、光線良好，操作平台光度為100呎燭光以上，密閉室內換氣良好，儘可能沒有灰塵及流動空氣。每15分鐘落菌數不得超過15 CFU/培養皿。"}, {"no": "2.2", "chapter": "器具及材料", "content": "主要器具：\n・乾熱滅菌器（能維持170±10℃）\n・高壓滅菌釜（可達121℃以上）\n・冰箱（能維持5±3℃）\n・培養箱（溫差±1℃以內）\n・水浴（溫差±0.2℃以內）\n・攪拌均質器或鐵胃\n・顯微鏡（放大至1000倍）\n・天平（可稱量2000g，靈敏度0.1g；可稱量100g者，靈敏度1mg）\n・攪拌器、旋渦混合器、酸鹼度測定儀、加熱器、振盪器、吸管輔助器或微量吸管\n\n耗材：\n・吸管（1mL應有0.01mL刻度；5及10mL應有0.1mL刻度）\n・容器（可耐121℃滅菌20分鐘以上）\n・培養皿（已滅菌，內徑約90mm，深約15mm）\n・接種針及接種環（直徑約3mm）\n・試管（16×150mm）\n・杜蘭發酵管（外徑9×22mm）\n・載玻片及蓋玻片"}, {"no": "2.2.26", "chapter": "試劑配製", "content": "稀釋液：\n(1) 生理食鹽水：氯化鈉8.5g溶於蒸餾水1000mL，121℃滅菌15分鐘。\n(2) 磷酸鹽緩衝液（BPBW）：磷酸二氫鉀34g溶於蒸餾水500mL，以1N NaOH調pH值7.2，加水至1000mL，121℃滅菌15分鐘（原液）。使用時取原液1.25mL加入蒸餾水1000mL，121℃滅菌15分鐘。\n(3) 0.1%蛋白腖稀釋液：蛋白腖1g溶於蒸餾水1000mL，121℃滅菌15分鐘，最終pH 7.0±0.2。\n\n革蘭氏染色液：\n・初染劑（Hucker's結晶紫液）：溶液A（結晶紫2g+95%乙醇20mL）+溶液B（草酸銨0.8g+蒸餾水80mL），混合靜置24小時後過濾。\n・媒染劑（革蘭氏碘液）：碘化鉀2g及碘1g研磨，加蒸餾水至300mL。\n・複染劑（Hucker's複染液）：沙黃O 2.5g溶於95%乙醇100mL（原液），使用時取10mL加蒸餾水90mL。\n\n其他試劑：\n・柯瓦克氏試劑（Kovacs'）：對-二甲胺基苯甲醛5g+戊醇75mL+鹽酸25mL，呈黃色，冷藏備用。\n・甲基紅指示劑：甲基紅0.1g溶於95%乙醇300mL，加水至500mL。\n・歐普氏試劑（VP）：溶液A（α-萘酚5g+無水乙醇100mL）；溶液B（KOH 40g+蒸餾水100mL）。"}, {"no": "2.2.27", "chapter": "培養基配製", "content": "1. LST培養液：胰化蛋白腖20g、乳糖5g、KH₂PO₄2.75g、K₂HPO₄2.75g、NaCl 5g、硫酸月桂酸鈉0.1g、蒸餾水1000mL；分取10mL注入有發酵管試管，121℃滅菌15分鐘，pH 6.8±0.2。\n\n2. EC培養液：胰化蛋白腖20g、乳糖5g、膽鹽3號1.5g、KH₂PO₄1.5g、K₂HPO₄4g、NaCl 5g、蒸餾水1000mL；分取8mL，121℃滅菌15分鐘，pH 6.9±0.2。\n\n3. L-EMB培養基：蛋白腖10g、乳糖10g、K₂HPO₄2g、洋菜15g、伊紅Y 0.4g、亞甲藍0.065g、蒸餾水1000mL；121℃滅菌15分鐘，pH 7.1±0.2；注皿前搖動使沈澱物分散，每皿倒15～20mL，乾燥後使用。\n\n4. PCA（Plate count agar）：胰化蛋白腖5g、酵母抽出物2.5g、葡萄糖1g、洋菜15g、蒸餾水1000mL；121℃滅菌15分鐘，pH 7.0±0.2。\n\n5. 胰化蛋白腖培養液：胰化蛋白腖10g、蒸餾水1000mL；分取5mL，121℃滅菌15分鐘，pH 6.9±0.2。\n\n6. MR-VP培養液：蛋白腖緩衝液粉末7g、葡萄糖5g、K₂HPO₄5g、蒸餾水1000mL；分取5mL，121℃滅菌15分鐘，pH 6.9±0.2。\n\n7. 柯塞爾氏檸檬酸鹽培養液：磷酸氫銨鈉1.5g、KH₂PO₄1g、MgSO₄·7H₂O 0.2g、檸檬酸鈉3g、蒸餾水1000mL；分取10mL，121℃滅菌15分鐘，pH 6.7±0.2。\n\n8. TBX培養基：胰化蛋白腖20g、膽鹽3號1.5g、5-溴-4-氯-3-吲哚-β-葡萄糖醛酸環己基銨鹽0.075g、洋菜15g、蒸餾水1000mL；121℃滅菌15分鐘，pH 7.2±0.2。"}, {"no": "2.3", "chapter": "檢液之調製", "content": "固態檢體：取50g加入稀釋液450mL，混合均勻，作成10倍稀釋液。\n粉狀/粒狀：粉碎混勻後，取50g加入稀釋液450mL。\n液態檢體：取50mL加入稀釋液450mL。\n冷凍檢體：於冷藏溫度（2～5℃，18小時內）解凍，或45℃以下水浴15分鐘快速解凍；解凍後再切碎混勻。冰類製品（冰塊、冰棒、冰淇淋等）取50g加稀釋液450mL。\n凝態/濃稠液態：如布丁、煉乳，取50g加稀釋液450mL。\n系列稀釋：取10倍稀釋液10mL加稀釋液90mL，依序作成100倍、1000倍、10000倍等稀釋液。\n\n【注意事項】\n・除肉製品使用0.1%蛋白腖稀釋液外，其他以磷酸鹽緩衝液為稀釋液，其次為生理食鹽水。\n・檢體總量不足50g（mL）時，依檢體量添加適量稀釋液作成10倍稀釋液。\n・含油脂量多之檢體，應加入適量已滅菌乳化劑（如Tween 80，使濃度為1%），充分振搖乳化。"}, {"no": "2.4.1", "chapter": "MPN計數法", "content": "最確數（MPN）計數法\n\n【推定試驗－步驟1（LST初篩）】\n取三個連續稀釋倍數檢液各1mL，接種於裝有LST培養液10mL之試管（3階3支）。自調製至接種應於15分鐘內完成。35℃培養24±2小時，觀察是否產氣；未產氣者繼續培養24小時。仍無氣體即為陰性；產氣者疑似陽性。\n\n【推定試驗－步驟2（EC確認）】\n由產氣試管取一接種環量，接種於EC培養液，於44.5℃有蓋水浴箱培養24±2小時；未產氣者繼續培養24±2小時。仍無氣體即為陰性，產氣者疑似陽性。\n\n【注意】輕搖試管後，若發酵管內之培養液可為氣泡所取代，則判為產氣。"}, {"no": "2.4.1.2", "chapter": "MPN計數法－菌株分離培養", "content": "由EC培養液產氣試管取一接種環量，在L-EMB培養基表面劃線，35℃培養18～24小時。\n\n典型大腸桿菌菌落形態：中央呈暗紫色，扁平，帶有或不帶有金屬光澤。\n\n每片L-EMB培養基鉤取5個可疑菌落（可疑菌落少於5個時鉤取全部），接種於PCA，35℃培養18～24小時，供後續確定試驗使用。\n\n【注意】鉤取菌落中只要1個確定試驗陽性，即可認定該EC試管為正反應，得終止其餘菌落之確定試驗。"}, {"no": "2.4.1.3", "chapter": "MPN計數法－確定試驗", "content": "革蘭氏染色：取菌液塗薄抹片，風乾後通過火焰3～4次固定。初染（結晶紫1分鐘）→媒染（碘液1分鐘）→脫色（95%乙醇，約30秒）→複染（沙黃O 30秒）→水洗風乾。深紫色=陽性菌；淡紅色=陰性菌。大腸桿菌為革蘭氏陰性、無芽胞、桿狀或短桿狀。\n\n吲哚試驗：接種於胰化蛋白腖培養液，35℃培養24±2小時，加柯瓦克氏試劑0.2～0.3mL，靜置10分鐘；上層呈紅色為正反應。大腸桿菌通常為正反應（+/-）。\n\n歐普氏試驗（VP）：接種於MR-VP培養液，35℃培養48±2小時，取1mL，加VP試劑溶液A 0.6mL及溶液B 0.2mL，再加少許肌酸，靜置2小時；呈粉紅色為正反應。大腸桿菌為陰性（-）。\n\n甲基紅試驗（MR）：VP試驗後剩餘培養液再培養48±2小時，加甲基紅指示劑5滴；呈紅色為正反應。大腸桿菌為陽性（+）。\n\n檸檬酸鹽利用試驗：接種於柯塞爾氏檸檬酸鹽培養液，35℃培養96小時；混濁為正反應，澄清為陰性。大腸桿菌為陰性（-）。\n\n乳糖產氣試驗：接種於LST培養液，35℃培養48±2小時；產氣為正反應。大腸桿菌為陽性（+）。"}, {"no": "2.4.1.4", "chapter": "MPN計數法－判定標準", "content": "大腸桿菌陽性應符合下列結果：\n\n試驗項目｜大腸桿菌反應\n革蘭氏染色｜陰性（粉紅色）－\n吲哚試驗｜+/－（通常為正）\n甲基紅試驗｜正反應（紅色）＋\n歐普氏試驗（VP）｜陰性－\n檸檬酸鹽利用試驗｜陰性（澄清）－\n乳糖產氣試驗｜正反應（產氣）＋"}, {"no": "2.4.1.5", "chapter": "MPN計數法－最確數計算", "content": "由確定試驗判定之各階正反應試管數，利用三階三支最確數表推算MPN/g或MPN/mL（接種量各階含檢體0.1、0.01、0.001 g或mL）。\n\n換算公式（接種量不同時）：\nMPN/g（mL）= 最確數表之最確數 ÷（第一階試管含檢體量 × 10）\n\n計算範例（正反應管數3-1-0，表列MPN=43）：\n・接種量1、0.1、0.01 g/mL → MPN = 4.3 MPN/g\n・接種量0.1、0.01、0.001 g/mL → MPN = 43 MPN/g\n・接種量0.01、0.001、0.0001 g/mL → MPN = 430 MPN/g\n\n<div class=\"reg-table-block\"><div class=\"table-scroll\"><table class=\"reg-table\">\n<thead>\n<tr>\n  <th rowspan=\"2\">正反應試管數<br>（0.1* / 0.01 / 0.001）</th>\n  <th rowspan=\"2\">最確數<br>（MPN/g 或 MPN/mL）</th>\n  <th colspan=\"2\">95% 信賴界限</th>\n</tr>\n<tr>\n  <th>下限</th><th>上限</th>\n</tr>\n</thead>\n<tbody>\n<tr><td>0-0-0</td><td>&lt;3.0</td><td>—</td><td>9.5</td></tr>\n<tr><td>0-0-1</td><td>3.0</td><td>0.15</td><td>9.6</td></tr>\n<tr><td>0-1-0</td><td>3.0</td><td>0.15</td><td>11</td></tr>\n<tr><td>0-1-1</td><td>6.1</td><td>1.2</td><td>18</td></tr>\n<tr><td>0-2-0</td><td>6.2</td><td>1.2</td><td>18</td></tr>\n<tr><td>0-3-0</td><td>9.4</td><td>3.6</td><td>38</td></tr>\n<tr><td>1-0-0</td><td>3.6</td><td>0.17</td><td>18</td></tr>\n<tr><td>1-0-1</td><td>7.2</td><td>1.3</td><td>18</td></tr>\n<tr><td>1-0-2</td><td>11</td><td>3.6</td><td>38</td></tr>\n<tr><td>1-1-0</td><td>7.4</td><td>1.3</td><td>20</td></tr>\n<tr><td>1-1-1</td><td>11</td><td>3.6</td><td>38</td></tr>\n<tr><td>1-2-0</td><td>11</td><td>3.6</td><td>42</td></tr>\n<tr><td>1-2-1</td><td>15</td><td>4.5</td><td>42</td></tr>\n<tr><td>1-3-0</td><td>16</td><td>4.5</td><td>42</td></tr>\n<tr><td>2-0-0</td><td>9.2</td><td>1.4</td><td>38</td></tr>\n<tr><td>2-0-1</td><td>14</td><td>3.6</td><td>42</td></tr>\n<tr><td>2-0-2</td><td>20</td><td>4.5</td><td>42</td></tr>\n<tr><td>2-1-0</td><td>15</td><td>3.7</td><td>42</td></tr>\n<tr><td>2-1-1</td><td>20</td><td>4.5</td><td>42</td></tr>\n<tr><td>2-1-2</td><td>27</td><td>8.7</td><td>94</td></tr>\n<tr><td>2-2-0</td><td>21</td><td>4.5</td><td>42</td></tr>\n<tr><td>2-2-1</td><td>28</td><td>8.7</td><td>94</td></tr>\n<tr><td>2-2-2</td><td>35</td><td>8.7</td><td>94</td></tr>\n<tr><td>2-3-0</td><td>29</td><td>8.7</td><td>94</td></tr>\n<tr><td>2-3-1</td><td>36</td><td>8.7</td><td>94</td></tr>\n<tr><td>3-0-0</td><td>23</td><td>4.6</td><td>94</td></tr>\n<tr><td>3-0-1</td><td>38</td><td>8.7</td><td>110</td></tr>\n<tr><td>3-0-2</td><td>64</td><td>17</td><td>180</td></tr>\n<tr><td>3-1-0</td><td>43</td><td>9</td><td>180</td></tr>\n<tr><td>3-1-1</td><td>75</td><td>17</td><td>200</td></tr>\n<tr><td>3-1-2</td><td>120</td><td>37</td><td>420</td></tr>\n<tr><td>3-1-3</td><td>160</td><td>40</td><td>420</td></tr>\n<tr><td>3-2-0</td><td>93</td><td>18</td><td>420</td></tr>\n<tr><td>3-2-1</td><td>150</td><td>37</td><td>420</td></tr>\n<tr><td>3-2-2</td><td>210</td><td>40</td><td>430</td></tr>\n<tr><td>3-2-3</td><td>290</td><td>90</td><td>1,000</td></tr>\n<tr><td>3-3-0</td><td>240</td><td>42</td><td>1,000</td></tr>\n<tr><td>3-3-1</td><td>460</td><td>90</td><td>2,000</td></tr>\n<tr><td>3-3-2</td><td>1,100</td><td>180</td><td>4,100</td></tr>\n<tr><td>3-3-3</td><td>&gt;1,100</td><td>420</td><td>—</td></tr>\n</tbody>\n</table></div>\n<p class=\"table-note\">*：各階試管中所含檢體量（g 或 mL）。接種量不同時，MPN/g = 表列最確數 ÷（第一階含檢體量 × 10）。</p></div>"}, {"no": "2.4.2", "chapter": "直接平板法", "content": "直接平板法（Direct plate count method）\n\n操作步驟：\n1. 充分搖動稀釋檢液及/或原液，混合均勻。\n2. 各吸取每一稀釋液1mL，置入培養皿，每稀釋倍數至少做二重複。\n3. 各培養皿倒入已冷卻至47～50℃之TBX培養基15mL，搖動混合，靜置待凝固後倒置。先於37℃培養4小時，再於44℃培養20～24小時。\n4. 選取含15～150個典型菌落（藍色或藍綠色）之平板予以計數。（若各稀釋倍數菌落數均不在15～150範圍內，以最低或最高稀釋倍數計數。）\n\n計算公式：\n・僅一稀釋倍數在15～150範圍：\n  大腸桿菌菌數（CFU/g或mL）= Σa × A ÷ VA\n  （Σa=A稀釋倍數所有平板典型菌落數總和；VA=所有平板中檢液總體積；A=稀釋倍數）\n\n・兩種稀釋倍數均在15～150範圍：\n  大腸桿菌菌數 = [(Σa × A ÷ VA) + (Σb × B ÷ VB)] ÷ 2\n\n記錄菌數時第三位數字四捨六入（第三位為5時，第二位奇數進位、偶數捨去），有效數字兩位，單位CFU/g或CFU/mL。\n\n【附註】使用經確效認可之市售培養基、生化套組或鑑定系統，有爭議時以本方法為準。"}]});
  
Object.assign(lawArticles, {"食品微生物之檢驗方法－大腸桿菌群之檢驗": [{"no": "1. 適用範圍", "chapter": null, "content": "本方法適用於食品中大腸桿菌群之檢驗。\n\n公告字號：101年11月19日署授食字第1011902820號公告；102年9月6日部授食字第1021950329號公告修正。"}, {"no": "2. 檢驗方法概述", "chapter": null, "content": "檢體經系列稀釋後，以三階三支進行培養，配合最確數（MPN）計數之方法。"}, {"no": "2.1 工作環境", "chapter": null, "content": "工作平台須寬敞、潔淨、光線良好，操作平台光度為100呎燭光以上，密閉室內換氣良好，儘可能沒有灰塵及流動空氣。每15分鐘落菌數不得超過15 CFU/培養皿。"}, {"no": "2.2 器具及材料", "chapter": null, "content": "所需器具及材料包括：乾熱滅菌器、高壓滅菌釜、冰箱（5±3℃）、培養箱（溫差±1.0℃以內）、水浴（溫差±0.2℃以內）、攪拌均質器（Blender）或鐵胃（Stomacher）、天平（靈敏度0.1 g及5 mg）、精密天平（靈敏度0.001 g）、酸鹼度測定儀（pH meter）、吸管輔助器（Pipette aid）、稀釋用容器（無菌袋或有1000 mL、500 mL、99 mL及90 mL標記之附蓋廣口瓶）、15×150 mm試管、發酵管（Durham，內徑7×20 mm，倒置於試管內）、接種針及接種環（直徑約3 mm）、已滅菌吸管（1 mL含0.01 mL刻度；5 mL及10 mL含0.1 mL刻度）。"}, {"no": "2.2.16 試藥", "chapter": null, "content": "試藥級：氯化鈉、磷酸二氫鉀（KH₂PO₄）、磷酸氫二鉀（K₂HPO₄）、氫氧化鈉、乳糖（lactose）、硫酸月桂酸鈉（sodium lauryl sulfate）、牛膽汁粉末（oxgall powder）、煌綠（brilliant green）及油酸聚醇山梨酯（polysorbate 80, Tween 80）。\n微生物級：胰化蛋白腖（tryptose）及蛋白腖（peptone）。"}, {"no": "2.2.18 稀釋液之配製", "chapter": null, "content": "可選用以下三種稀釋液：\n\n(1) 生理食鹽水：取氯化鈉8.5 g，溶於蒸餾水1000 mL，分裝後以121℃滅菌15分鐘。\n\n(2) 磷酸鹽緩衝液（Butterfield's phosphate-buffered dilution water）：取磷酸二氫鉀34 g，溶於蒸餾水500 mL，以1N NaOH調整pH值為7.2，再加蒸餾水至1000 mL，以121℃滅菌15分鐘作為原液。使用時取原液1.25 mL加蒸餾水至1000 mL，分裝後以121℃滅菌15分鐘。\n\n(3) 0.1%蛋白腖稀釋液：取蛋白腖1 g，溶於蒸餾水至1000 mL，以121℃滅菌15分鐘，最終pH值7.0±0.1。"}, {"no": "2.2.19 培養基", "chapter": null, "content": "（一）硫酸月桂胰化蛋白腖培養液（Lauryl sulfate tryptose broth, LST）：\n胰化蛋白腖20.0 g、乳糖5.0 g、K₂HPO₄ 2.75 g、KH₂PO₄ 2.75 g、氯化鈉5.0 g、硫酸月桂酸鈉0.1 g、蒸餾水1000 mL。攪拌溶解後分取10 mL注入裝有發酵管之試管內，以121℃滅菌15分鐘，最後pH值為6.8±0.2。\n\n（二）煌綠乳糖膽汁培養液（Brilliant green lactose bile broth, BGLB）：\n蛋白腖10.0 g、乳糖10.0 g、牛膽汁粉末20.0 g、煌綠0.0133 g、蒸餾水1000 mL。攪拌溶解後分取10 mL注入裝有發酵管之試管內，以121℃滅菌15分鐘，最後pH值為6.8±0.2。"}, {"no": "2.3 檢液之調製", "chapter": null, "content": "依檢體性質分別調製：\n\n固態檢體：切碎混合後取50 g，加稀釋液450 mL，混合均勻，作為10倍稀釋檢液。\n\n粉狀、粒狀或易粉碎檢體：粉碎混合後取50 g，以下步驟同固態檢體。\n\n液態檢體：振搖均勻後取50 mL作為原液，以下步驟同固態檢體。\n\n冷凍檢體：於2～5℃下解凍（18小時內），或以45℃以下水浴快速解凍（15分鐘內）；如冰塊、冰棒等，先破碎為小塊再依固態檢體操作。如檢驗無法立即進行，貯存於-20℃。\n\n凝態及濃稠液態檢體（如布丁、煉乳、海苔醬等）：攪拌均勻後取50 g，以下步驟同固態檢體。\n\n系列稀釋：取10倍稀釋檢液10 mL加入稀釋液90 mL，依序作成100倍、1000倍、10000倍等一系列稀釋檢液。\n\n注意事項：\n1. 肉製品使用0.1%蛋白腖稀釋液；其他檢體以磷酸鹽緩衝液為主，其次為生理食鹽水。\n2. 檢體不足50 g (mL)時，依檢體量添加適量稀釋液作成10倍稀釋檢液。\n3. 含油脂量多之檢體，加入適量已滅菌乳化劑（如Tween 80，使於檢液中濃度為1%），充分振搖使之乳化。"}, {"no": "2.4.1 推定試驗", "chapter": "2.4 鑑別試驗", "content": "將稀釋檢液及（或）原液充分振搖均勻後，分別吸取1 mL接種於已裝有硫酸月桂胰化蛋白腖培養液（LST）試管中，每稀釋濃度各接種3支（稱三階三支），自檢液調製至此步驟應於15分鐘內完成。\n\n於35℃培養24±2小時，觀察是否產生氣體；未產生氣體者，繼續培養24小時。若仍無氣體產生，為大腸桿菌群陰性；產生氣體者，為可疑大腸桿菌群陽性。"}, {"no": "2.4.2 確定試驗", "chapter": "2.4 鑑別試驗", "content": "由推定試驗（2.4.1）產生氣體之各試管中，取一白金耳量培養液，接種於另一支煌綠乳糖膽汁培養液（BGLB），於35℃培養24±2小時，觀察是否產生氣體；未產生氣體者，繼續培養24小時，若仍無氣體產生即為大腸桿菌群陰性；產生氣體者，判定為大腸桿菌群陽性。"}, {"no": "2.4.3 最確數（MPN）計算", "chapter": "2.4 鑑別試驗", "content": "由確定試驗（2.4.2）BGLB確定為大腸桿菌群陽性者，推算各階LST大腸桿菌群陽性之試管數，利用最確數表（如附表），推算大腸桿菌群之最確數（MPN/g 或 MPN/mL）。\n\n最確數表適用的接種量為各階試管含檢體0.1、0.01、0.001（g或mL）。當接種量不同時，換算公式為：\n最確數 MPN/g（MPN/mL） = 最確數表之最確數 ÷（第一階試管含檢體量 × 10）\n\n計算範例：經判定正反應試管數為3-1-0，對照最確數表為43。\n(1) 接種量1, 0.1, 0.01（g或mL）：MPN = 43÷(1×10) = 4.3 MPN/g\n(2) 接種量0.1, 0.01, 0.001（g或mL）：MPN = 43÷(0.1×10) = 43 MPN/g\n(3) 接種量0.01, 0.001, 0.0001（g或mL）：MPN = 43÷(0.01×10) = 430 MPN/g"}, {"no": "附表：最確數表（MPN Table）", "chapter": null, "content": "本表列出三階三支MPN法各正反應組合對應之最確數及95%信賴界限。<div class=\"reg-table-block\"><div class=\"table-scroll\"><table class=\"reg-table\">\n<thead>\n<tr>\n  <th rowspan=\"2\">正反應試管數<br>（0.1* / 0.01 / 0.001）</th>\n  <th rowspan=\"2\">最確數<br>（MPN/g 或 MPN/mL）</th>\n  <th colspan=\"2\">95% 信賴界限</th>\n</tr>\n<tr>\n  <th>下限</th><th>上限</th>\n</tr>\n</thead>\n<tbody>\n<tr><td>0-0-0</td><td>&lt;3.0</td><td>—</td><td>9.5</td></tr>\n<tr><td>0-0-1</td><td>3.0</td><td>0.15</td><td>9.6</td></tr>\n<tr><td>0-1-0</td><td>3.0</td><td>0.15</td><td>11</td></tr>\n<tr><td>0-1-1</td><td>6.1</td><td>1.2</td><td>18</td></tr>\n<tr><td>0-2-0</td><td>6.2</td><td>1.2</td><td>18</td></tr>\n<tr><td>0-3-0</td><td>9.4</td><td>3.6</td><td>38</td></tr>\n<tr><td>1-0-0</td><td>3.6</td><td>0.17</td><td>18</td></tr>\n<tr><td>1-0-1</td><td>7.2</td><td>1.3</td><td>18</td></tr>\n<tr><td>1-0-2</td><td>11</td><td>3.6</td><td>38</td></tr>\n<tr><td>1-1-0</td><td>7.4</td><td>1.3</td><td>20</td></tr>\n<tr><td>1-1-1</td><td>11</td><td>3.6</td><td>38</td></tr>\n<tr><td>1-2-0</td><td>11</td><td>3.6</td><td>42</td></tr>\n<tr><td>1-2-1</td><td>15</td><td>4.5</td><td>42</td></tr>\n<tr><td>1-3-0</td><td>16</td><td>4.5</td><td>42</td></tr>\n<tr><td>2-0-0</td><td>9.2</td><td>1.4</td><td>38</td></tr>\n<tr><td>2-0-1</td><td>14</td><td>3.6</td><td>42</td></tr>\n<tr><td>2-0-2</td><td>20</td><td>4.5</td><td>42</td></tr>\n<tr><td>2-1-0</td><td>15</td><td>3.7</td><td>42</td></tr>\n<tr><td>2-1-1</td><td>20</td><td>4.5</td><td>42</td></tr>\n<tr><td>2-1-2</td><td>27</td><td>8.7</td><td>94</td></tr>\n<tr><td>2-2-0</td><td>21</td><td>4.5</td><td>42</td></tr>\n<tr><td>2-2-1</td><td>28</td><td>8.7</td><td>94</td></tr>\n<tr><td>2-2-2</td><td>35</td><td>8.7</td><td>94</td></tr>\n<tr><td>2-3-0</td><td>29</td><td>8.7</td><td>94</td></tr>\n<tr><td>2-3-1</td><td>36</td><td>8.7</td><td>94</td></tr>\n<tr><td>3-0-0</td><td>23</td><td>4.6</td><td>94</td></tr>\n<tr><td>3-0-1</td><td>38</td><td>8.7</td><td>110</td></tr>\n<tr><td>3-0-2</td><td>64</td><td>17</td><td>180</td></tr>\n<tr><td>3-1-0</td><td>43</td><td>9</td><td>180</td></tr>\n<tr><td>3-1-1</td><td>75</td><td>17</td><td>200</td></tr>\n<tr><td>3-1-2</td><td>120</td><td>37</td><td>420</td></tr>\n<tr><td>3-1-3</td><td>160</td><td>40</td><td>420</td></tr>\n<tr><td>3-2-0</td><td>93</td><td>18</td><td>420</td></tr>\n<tr><td>3-2-1</td><td>150</td><td>37</td><td>420</td></tr>\n<tr><td>3-2-2</td><td>210</td><td>40</td><td>430</td></tr>\n<tr><td>3-2-3</td><td>290</td><td>90</td><td>1000</td></tr>\n<tr><td>3-3-0</td><td>240</td><td>42</td><td>1000</td></tr>\n<tr><td>3-3-1</td><td>460</td><td>90</td><td>2000</td></tr>\n<tr><td>3-3-2</td><td>1100</td><td>180</td><td>4100</td></tr>\n<tr><td>3-3-3</td><td>&gt;1100</td><td>420</td><td>—</td></tr>\n</tbody>\n</table></div>\n<p class=\"table-note\">*：各階試管中所含檢體量（g 或 mL）。接種量不同時，MPN/g = 表列最確數 ÷（第一階含檢體量 × 10）。</p></div>"}, {"no": "2.5 檢驗流程摘要", "chapter": null, "content": "1. 檢體50 g，加入稀釋液450 mL，作成10倍稀釋檢液。\n2. 依序作成100倍、1000倍等稀釋檢液。\n3. 分別吸取1 mL稀釋檢液，接種於LST試管中，三階三支，35℃培養24～48小時。\n4. 觀察是否產生氣體：\n   - 未產生氣體 → 大腸桿菌群陰性\n   - 產生氣體 → 由產氣試管取一白金耳接種於BGLB，35℃培養24～48小時\n5. BGLB產生氣體 → 大腸桿菌群陽性；未產生氣體 → 陰性。\n6. 依陽性試管數，利用最確數表推算coliform之最確數（MPN/g或MPN/mL）。"}, {"no": "2.6 可參考使用市售培養基", "chapter": null, "content": "可參考使用經確效認可之市售培養基、生化檢測套組或鑑定系統，惟檢驗結果有爭議時，應以本檢驗方法為準。"}]});
  Object.assign(lawArticles, {"食品微生物之檢驗方法－沙門氏菌之檢驗":[{"no": "公告資訊", "chapter": "公告修正歷程", "content": "95年9月4日署授食字第0951800021號公告修正\n102年12月23日部授食字第1021951187號公告修正\n\n本方法分為兩部：\n第一部：沙門氏桿菌之分離（傳統培養鑑定法）\n第二部：沙門氏桿菌之Real-time PCR檢測（附註：可視需要執行）"}, {"no": "第一部§1", "chapter": "第一部：沙門氏桿菌之分離", "content": "適用範圍：本方法適用於食品中沙門氏桿菌之檢驗。"}, {"no": "第一部§2", "chapter": "第一部：沙門氏桿菌之分離", "content": "檢驗方法：檢體經增菌後，續以選擇性培養基培養，配合沙門氏桿菌型別鑑定之方法。"}, {"no": "第一部§2.1", "chapter": "第一部：沙門氏桿菌之分離", "content": "工作環境：工作平台須寬敞、潔淨、光線良好，操作平台光度為100呎燭光以上，密閉室內換氣良好，儘可能沒有灰塵及流動空氣。每15分鐘落菌數不得超過15 CFU/培養皿。"}, {"no": "第一部§2.2", "chapter": "第一部：沙門氏桿菌之分離", "content": "器具及材料（主要項目）：\n‧ 生物安全操作櫃(BSC)：第二等級(class II)以上\n‧ 乾熱滅菌器、高壓滅菌釜\n‧ 冰箱5±3℃；冷凍櫃-30±3℃\n‧ 培養箱：溫差±1.0℃以內；水浴：溫差±0.2℃以內\n‧ 攪拌均質器(Blender)或鐵胃(Stomacher)\n‧ 增菌用廣口瓶(500 mL)或無菌塑膠袋\n‧ 天平：2000 g(靈敏度0.1 g)；120 g(靈敏度1 mg)\n‧ 培養皿：滅菌，內徑約90 mm，深約15 mm\n‧ 接種針及接種環(直徑約3 mm)：鎳鉻合金或鉑銥材質\n‧ 無菌濾膜：孔徑0.45 µm以下親水性醋酸纖維膜\n‧ pH試紙(pH 6～8)、酸鹼度測定儀\n‧ 旋渦混合器、振盪器、杜蘭發酵管"}, {"no": "第一部§2.2.29", "chapter": "第一部：沙門氏桿菌之分離", "content": "血清（所需抗血清）：\n‧ 沙門氏桿菌多價本體(O)抗血清\n‧ 沙門氏桿菌多價鞭毛(H)抗血清\n‧ 沙門氏桿菌單價本體族群(O)抗血清，包括A、B、C1、C2、C3、D1、D2、E1、E2、E3、E4、F、G、H、I及Vi"}, {"no": "第一部§2.2.30", "chapter": "第一部：沙門氏桿菌之分離", "content": "主要培養基一覽（共29種）：\n1. 乳糖培養液(Lactose broth)，pH 6.9±0.2，121℃/15min\n2. 無脂乳粉溶液，121℃/15min\n3. 蛋白腖緩衝液(Buffered peptone water)，pH 7.2±0.2，121℃/15min\n4. 亞硒酸胱胺酸培養液(SC)，pH 7.0±0.2，沸水浴10min（不可高壓）\n5. 四硫代硫酸鹽培養液(TT)，pH 8.4±0.2，使用前加碘-碘化鉀液0.2 mL及0.1%煌綠0.1 mL\n6. Rappaport-Vassiliadis培養液(RV)，pH 5.5±0.2，115℃/15min，配製完成後冰箱存放不超過1個月\n7. 木糖離胺酸去氧膽酸鹽培養基(XLD)，pH 7.4±0.2，每皿約20 mL，勿儲存超過1天\n8. 海克頓腸內菌培養基(HE)，pH 7.5±0.2，每皿約20 mL，勿儲存超過1天\n9. 亞硫酸鉍培養基(BS)，pH 7.7±0.2，不須高壓滅菌，最多存放48小時，貯存於暗處\n10. 三糖鐵培養基(TSI)，pH 7.4±0.2，121℃/15min，斜面4～5 cm，底部2～3 cm\n11. 胰化蛋白腖培養液，pH 6.9±0.2，121℃/15min\n12. 胰化酪蛋白大豆培養液(TSB)，pH 7.3±0.2，121℃/15min\n13. 胰化酪蛋白大豆胰化蛋白培養液，pH 7.2±0.2\n14. 含亞硫酸鉀胰化酪蛋白大豆培養液，121℃/15min\n15. MR-VP培養液，pH 6.9±0.2，121℃/12～15min\n16. 辛蒙斯檸檬酸鹽培養基，pH 6.8±0.2，121℃/15min，斜面4～5 cm\n17. 尿素培養液(傳統法)，pH 6.8±0.2，過濾除菌\n18. 尿素培養液(快速法)，pH 6.8±0.2，過濾除菌\n19. 丙二酸鹽培養液，pH 6.7±0.2，121℃/15min\n20. 離胺酸鐵培養基(LIA)，pH 6.7±0.2，121℃/12min，斜面2.5 cm，底部4 cm\n21. 離胺酸脫羧酶培養液，pH 6.5～6.8，121℃/15min\n22. 氰化鉀培養液(劇毒，須抽氣櫃操作)，pH 7.6±0.2，冰箱存放不超過2週\n23. 酚紅碳水化合物培養液(含半乳糖醇/乳糖/蔗糖)，pH 7.4±0.2，118℃/10min\n24. 紫色碳水化合物培養液，pH 6.8±0.2\n25. 麥康奇培養基(MacConkey agar)，pH 7.1±0.2，121℃/15min\n26. 營養培養液，pH 6.8±0.2，121℃/15min\n27. 腦心浸出物培養液(BHI)，pH 7.4±0.2，121℃/15min\n28. 含硫酸亞鐵胰化酪蛋白大豆培養液，pH 7.3±0.2，121℃/15min\n29. 預增菌培養液(Universal preenrichment broth)，pH 6.3±0.2，121℃/15min"}, {"no": "第一部§2.3", "chapter": "第一部：沙門氏桿菌之分離", "content": "檢液之調製與增菌培養（各類食品前處理）：\n‧ 一般原則：無菌操作稱取檢體25 g，加入增菌液225 mL，室溫靜置60±5分鐘，必要時調整pH至6.8±0.2，再於35℃培養24±2小時。\n‧ 冷凍檢體：勿解凍，需回溫切割時，於45℃以下水浴搖動15分鐘以內，或2～5℃/18小時以內。\n‧ 各類食品適用增菌液：\n  - 蛋品類（帶殼蛋、全蛋液）：含硫酸亞鐵胰化酪蛋白大豆培養液225 mL\n  - 水煮蛋：胰化酪蛋白大豆培養液225 mL\n  - 脫脂乳粉（即溶）：0.002%煌綠溶液225 mL，勿混合或調pH\n  - 乳酸酪蛋白：預增菌培養液225 mL\n  - 酶凝酪蛋白、黃豆粉、椰子：乳糖培養液225 mL\n  - 酪蛋白鈉：乳糖培養液225 mL，調整pH\n  - 肉類、海鮮、含蛋製品、蔬果等：乳糖培養液225 mL，均質2分鐘\n  - 乾酵母：胰化酪蛋白大豆培養液225 mL\n  - 糖霜及甜點加覆料：營養培養液225 mL\n  - 香辛料（黑胡椒、辣椒粉等）：胰化酪蛋白大豆培養液225 mL\n  - 香辛料（洋蔥、大蒜）：含亞硫酸鉀胰化酪蛋白大豆培養液225 mL\n  - 丁香：以1:1000比例；其他葉狀調味料至少1:10\n  - 糖果及糖衣（含巧克力）：無脂乳粉溶液225 mL，均質後加1%煌綠0.45 mL\n  - 關華豆膠：乳糖培養液加1%纖維素酶溶液2.25 mL，磁攪拌加入\n  - 柳橙汁、蘋果汁：預增菌培養液225 mL，無需調pH\n  - 網紋甜瓜：預增菌培養液，完整果實約1.5倍培養液\n  - 芒果：蛋白腖緩衝液225 mL，完整果實約1.5倍培養液\n  - 蕃茄塊：蛋白腖緩衝液225 mL；完整蕃茄：預增菌培養液\n  - 塗抹物(Swab)：蛋白腖緩衝液5 mL，叩擊手心50次或旋渦振盪"}, {"no": "第一部§2.4", "chapter": "第一部：沙門氏桿菌之分離", "content": "選擇性增菌培養與分離：\n\n接種比例：\n‧ 一般食品：檢液0.1 mL → RV培養液10 mL；檢液1 mL → TT培養液10 mL\n‧ 關華豆膠：檢液1 mL → SC培養液10 mL；另1 mL → TT培養液10 mL\n\n選擇性增菌溫度：\n‧ 高度污染食品：RV 42℃水浴24±2h；TT 43℃水浴24±2h\n‧ 低度污染食品：RV 42℃水浴24±2h；TT 35℃ 24±2h\n‧ 關華豆膠：SC及TT均35℃ 24±2h\n\n分離培養：分別自RV、SC、TT增菌液各取一接種環，劃線於HE、XLD、BS培養基，35℃培養24±2小時。\n\n典型菌落特徵：\n‧ HE培養基：藍綠或藍色，有(或無)黑色中心；非典型為黃色\n‧ XLD培養基：粉紅色，有(或無)黑色中心；非典型為黃色\n‧ BS培養基：褐色、灰色或黑色，有時有金屬光澤；周圍培養基出現光環效應；未發現典型菌落須再培養24±2小時"}, {"no": "第一部§2.5", "chapter": "第一部：沙門氏桿菌之分離", "content": "鑑定試驗：\n\n步驟1 — TSI/LIA接種：\n自HE、BS、XLD各挑2個以上可疑菌落，同時接種於TSI及LIA斜面，35℃培養24±2h。\n‧ TSI典型反應：斜面紅色(鹼性)、底部黃色(酸性)、有/無產H₂S變黑\n‧ LIA典型反應：底部紫色(鹼性)，多數產H₂S呈黑色\n‧ LIA底部酸性+TSI鹼性斜面/酸性底部→保留，進行後續試驗\n‧ LIA底部酸性+TSI酸性斜面/酸性底部→可丟棄\n每25 g檢體至少須檢測6株TSI呈疑似沙門氏桿菌反應之菌株。\n\n步驟2 — 尿素酶試驗：\n‧ 傳統法：35℃ 24±2h；快速法：37±0.5℃水浴2h\n‧ 顏色不變=負反應（沙門氏桿菌應為負）\n\n步驟3 — 本體抗血清試驗(O)：\n‧ 多價O試驗：玻片凝集法，與抗血清凝集且與生理食鹽水不凝集=正反應\n‧ 單價O族群試驗：Vi抗血清凝集者煮沸20～30分鐘後再確認\n  - 加熱後與D族凝集→可能S. typhi\n  - 加熱後與C1族凝集→可能S. paratyphi C\n\n步驟4 — 多價鞭毛(H)抗血清試驗：\nBHI培養4～6h或胰化酪蛋白大豆胰化蛋白月示培養液24±2h，加福馬林化生理食鹽水，48～50℃水浴觀察至1小時。\n\n步驟5 — 主要生化試驗：\n‧ 離胺酸脫羧酶(LDC)：35℃ 48±2h，紫色=正（沙門氏桿菌應為正）\n‧ 半乳糖醇利用：35℃ 24～48h，黃色/產氣=正（大部分沙門氏為正）\n‧ 氰化鉀試驗(KCN，劇毒)：35℃ 24～48h，混濁=正（大部分沙門氏為負）\n‧ 丙二酸鹽試驗：35℃ 24～48h，藍色=正（大部分沙門氏為負）\n‧ 吲哚試驗：加柯瓦克氏試劑，上層深紅色=正（大部分沙門氏為負）\n‧ 吲哚正反應+鞭毛H抗血清負反應，或KCN正反應+LDC負反應→判定為非沙門氏桿菌"}, {"no": "表一、表二", "chapter": "第一部：沙門氏桿菌之分離", "content": "<div class=\"reg-table-block\"><p style=\"margin:0 0 6px 0;font-size:0.92em;color:#6b5344;\">符號說明：＋ = 90%以上在1～2天內為正反應；－ = 90%以上為負反應；Ｖ = 不一定</p>\n<p style=\"margin:0 0 4px 0;font-weight:600;font-size:0.95em;\">表一 ── 沙門氏桿菌典型生化及血清反應</p>\n<div class=\"table-scroll\"><table class=\"reg-table\"><thead><tr><th>編號</th><th>試驗或基質</th><th>沙門氏桿菌反應</th><th>正反應結果</th><th>負反應結果</th><th>備註</th></tr></thead><tbody><tr><td>1</td><td>葡萄糖（TSI底部）</td><td>＋</td><td>黃色</td><td>紅色</td><td></td></tr><tr><td>2</td><td>離胺酸脫羧酶（LIA底部）</td><td>＋</td><td>紫色</td><td>黃色</td><td></td></tr><tr><td>3</td><td>硫化氫（TSI 和 LIA）</td><td>＋</td><td>變黑</td><td>無變黑</td><td></td></tr><tr><td>4</td><td>尿素酶試驗</td><td>－</td><td>紫紅色</td><td>顏色不變</td><td></td></tr><tr><td>5</td><td>離胺酸脫羧酶培養液</td><td>＋</td><td>紫色</td><td>黃色</td><td></td></tr><tr><td>6</td><td>半乳糖醇培養液</td><td>＋</td><td>黃色，產氣</td><td>顏色不變，不產氣</td><td>S. arizonae 多為負</td></tr><tr><td>7</td><td>氰化鉀培養液</td><td>－</td><td>混濁（生長）</td><td>澄清（不生長）</td><td></td></tr><tr><td>8</td><td>丙二酸鹽培養液</td><td>－</td><td>藍色</td><td>顏色不變</td><td>S. arizonae 多為正</td></tr><tr><td>9</td><td>吲哚試驗</td><td>－</td><td>表面深紅或紫色</td><td>表面黃色</td><td></td></tr><tr><td>10</td><td>多價本體及鞭毛血清試驗</td><td>＋</td><td>凝集</td><td>無凝集</td><td></td></tr><tr><td>11</td><td>乳糖培養液</td><td>－</td><td>黃色，產氣</td><td>不產氣，顏色不變</td><td>S. arizonae 多為正</td></tr><tr><td>12</td><td>蔗糖培養液</td><td>－</td><td>黃色，產氣</td><td>不產氣，顏色不變</td><td></td></tr><tr><td>13</td><td>歐普氏試驗（VP）</td><td>－</td><td>粉紅或紅色</td><td>顏色不變</td><td></td></tr><tr><td>14</td><td>甲基紅試驗（MR）</td><td>＋</td><td>紅色</td><td>黃色</td><td></td></tr><tr><td>15</td><td>辛蒙斯檸檬酸鹽培養基</td><td>Ｖ</td><td>生長，藍色</td><td>不生長，顏色不變</td><td></td></tr></tbody></table></div>\n<p style=\"margin:12px 0 4px 0;font-weight:600;font-size:0.95em;\">表二 ── 非沙門氏桿菌之判定條件（符合任一條件即排除）</p>\n<div class=\"table-scroll\"><table class=\"reg-table\"><thead><tr><th>條件編號</th><th>試驗組合</th><th>結果</th><th>附註</th></tr></thead><tbody><tr><td>1</td><td>尿素酶</td><td>陽性（紫紅色）</td><td></td></tr><tr><td>2</td><td>吲哚試驗＋多價鞭毛H抗血清</td><td>吲哚陽性 且 H抗血清陰性</td><td></td></tr><tr><td>3</td><td>離胺酸脫羧酶＋氰化鉀培養液</td><td>LDC陰性 且 KCN陽性</td><td></td></tr><tr><td>4</td><td>乳糖培養液</td><td>陽性（黃色，產氣）</td><td>LIA為正反應之菌株不應丟棄，應繼續確認是否為 S. arizonae</td></tr><tr><td>5</td><td>蔗糖培養液</td><td>陽性（黃色，產氣）</td><td>LIA為正反應之菌株應繼續確認</td></tr><tr><td>6</td><td>氰化鉀培養液＋歐普氏試驗＋甲基紅試驗</td><td>KCN陽性 且 VP陽性 且 MR陰性</td><td></td></tr></tbody></table></div></div>"}, {"no": "第一部§2.6", "chapter": "第一部：沙門氏桿菌之分離", "content": "判定原則：\n‧ 符合表一結果→沙門氏桿菌陽性\n‧ 符合表二結果→非沙門氏桿菌\n‧ 不屬上述二類→進行其他試驗（依Ewing 1986年版《Identification of Enterobacteriacae》第4版）\n‧ 使用市售培養基、生化套組或鑑定系統，結果有爭議時，以本方法為準\n‧ 商業生化套組疑似陽性，仍須進行本體族群(O)抗血清及鞭毛血清試驗，兩者均為正反應方可確認"}, {"no": "第二部§1-2", "chapter": "第二部：沙門氏桿菌之Real-time PCR檢測", "content": "適用範圍：本方法適用於沙門氏桿菌之鑑別。\n\n附註：第二部Real-time PCR檢測可視需要執行。\n\n檢驗方法：檢體增菌液或分離純化菌株，經DNA萃取後，以即時聚合酶鏈反應(real-time PCR)鑑別。\n\n工作環境：各步驟須有區隔空間避免交叉污染；試劑配製應於BSC class II以上內進行。"}, {"no": "第二部§2.3", "chapter": "第二部：沙門氏桿菌之Real-time PCR檢測", "content": "試藥：\n‧ DNA抽取：適用革蘭氏陰性細菌之市售DNA抽取套組\n‧ 鑑別引子及探針（標的基因：invA，增幅產物116 bp）：\n  引子F：5'-CAA CGT TTC CTG CGG TAC TGT-3'\n  引子R：5'-CCC GAA CGT GGC GAT AAT T-3'\n  探針P：5'-(FAM)-CTC TTT CGT CTG GCA TTA TCG ATC AGT ACC A-(BHQ1)-3'\n  （探針5'端FAM標記，3'端BHQ1標記，需避光，拆封稀釋分裝於-20℃保存）\n‧ TaqMan® Fast Reagents Starter Kit（適用Applied Biosystems 7500）\n‧ 對照物質：沙門氏桿菌標準菌株或其DNA"}, {"no": "第二部§2.5", "chapter": "第二部：沙門氏桿菌之Real-time PCR檢測", "content": "Real-time PCR溶液配製（總體積25 µL，置冰浴中配製）：\n‧ 5 µM引子F：2.0 µL\n‧ 5 µM引子R：2.0 µL\n‧ 10 µM探針：0.5 µL\n‧ TaqMan® Fast Reagents Starter Kit：13.0 µL\n‧ 檢體DNA溶液：2.0 µL\n‧ 無菌去離子水：5.5 µL"}, {"no": "第二部§2.6", "chapter": "第二部：沙門氏桿菌之Real-time PCR檢測", "content": "檢體DNA溶液之製備：\n\n直接煮沸法：取增菌液1 mL，15000×g離心3分鐘，去上清液；加無菌水1 mL振盪再離心，重複一次；沉澱物加無菌水1 mL，加熱振盪器煮沸10分鐘，作為DNA原液，置-20℃保存。\n\n抽取DNA法：採市售套組依說明抽取，收集至1.5 mL離心管，置-20℃保存。\n\n分離菌株法：取一接種環菌株置含無菌水1 mL之離心管，煮沸10分鐘，冷卻後15000×g離心3分鐘，吸取上清液作為DNA原液。\n\nDNA純度：O.D.260/O.D.280應介於1.7～2.0；濃度= O.D.260 × 50 ng/µL × 稀釋倍數。"}, {"no": "第二部§2.7", "chapter": "第二部：沙門氏桿菌之Real-time PCR檢測", "content": "鑑別試驗操作步驟及判讀：\n\nReal-time PCR反應條件（Applied Biosystems 7500）：\n‧ 熱活化：95℃，20秒\n‧ 最初變性：95℃，15秒\n‧ 黏接/延展：60℃，30秒\n‧ 步驟2→3共進行40個循環\n（使用其他機型時，應自行探討反應條件）\n\n同時設正反應及負反應對照組。\n\n判讀：檢體DNA與正反應對照組之FAM螢光增幅曲線相符，即確認含沙門氏桿菌(invA基因)之DNA片段。"}]});
  
  Object.assign(lawArticles, {"食品微生物之檢驗方法－生菌數之檢驗": [{"no": "1. 適用範圍", "chapter": "基本資訊", "content": "本方法適用於食品中生菌數之檢驗。\n\n公告文號：101年11月19日署授食字第1011902832號公告；102年9月6日部授食字第1021950329號公告修正。\n\n英文名稱：Methods of Test for Food Microorganisms－Test of Standard Plate Count (Aerobic Plate Count)"}, {"no": "2.1 工作環境", "chapter": "器具及材料", "content": "工作平台須寬敞、潔淨、光線良好，操作平台光度為100呎燭光以上，密閉室內換氣良好，儘可能沒有灰塵及流動空氣。每15分鐘落菌數不得超過15 CFU/培養皿。"}, {"no": "2.2 器具及材料", "chapter": "器具及材料", "content": "主要器具及材料包括：\n\n(1) 乾熱滅菌器\n(2) 高壓滅菌釜\n(3) 冰箱：能維持5 ± 3℃者\n(4) 培養箱：能維持內部溫度溫差±1.0℃以內者\n(5) 水浴：能維持水溫溫差±1.0℃以內者\n(6) 攪拌均質器(Blender)或鐵胃(Stomacher)：能適用於無菌操作者\n(7) 天平：可稱量到2000 g，靈敏度為0.1 g；可稱量到120 g，靈敏度為5 mg\n(8) 旋渦混合器(Vortex mixer)\n(9) 酸鹼度測定儀(pH meter)\n(10) 菌落計數器\n(11) 吸管輔助器(Pipette aid)\n(12) 吸管(Pipette)：已滅菌。1 mL吸管應有0.01 mL之刻度；5 mL及10 mL吸管應有0.1 mL刻度\n(13) 培養皿：已滅菌，內徑約90 mm，深度約15 mm\n(14) 稀釋用容器：無菌袋或有1000 mL、500 mL、99 mL及90 mL標記附蓋(栓)之可滅菌廣口瓶\n(15) 藥勺、剪刀、小刀、壓舌板及鑷子：可滅菌或可拋棄式者\n(16) pH試紙：範圍6-8"}, {"no": "2.2.17–2.2.20 試藥與培養基", "chapter": "器具及材料", "content": "試藥規格：氯化鈉、磷酸二氫鉀(KH2PO4)、氫氧化鈉、葡萄糖(glucose)及油酸聚醇山梨酯(polysorbate 80, Tween 80)均採用試藥級；蛋白腖(peptone)、胰化蛋白腖(tryptone)、酵母抽出物(yeast extract)及洋菜(agar)均採用微生物級。\n\n1N 氫氧化鈉溶液：稱取氫氧化鈉4 g，加入無菌水溶解使成100 mL。\n\n稀釋液配製：\n・生理食鹽水：取氯化鈉8.5 g，溶於蒸餾水1000 mL，分裝，經121℃滅菌15分鐘。\n・磷酸鹽緩衝液(Butterfield phosphate-buffered dilution water)：取磷酸二氫鉀34 g，溶於蒸餾水500 mL，以1N氫氧化鈉溶液調整pH值為7.2，再加蒸餾水使成1000 mL，121℃滅菌15分鐘，貯存於冰箱作為原液。使用時取原液1.25 mL加蒸餾水使成1000 mL，分裝後121℃滅菌15分鐘。\n・0.1%蛋白腖稀釋液：取蛋白腖1 g，溶於蒸餾水使成1000 mL，分裝後121℃滅菌15分鐘，最終pH值7.0 ± 0.1。\n\n平板計數培養基(Plate count agar, PCA)配方：\n・胰化蛋白腖(tryptone)：5 g\n・酵母抽出物(yeast extract)：2.5 g\n・葡萄糖(glucose)：1 g\n・洋菜(agar)：15 g\n・蒸餾水：1000 mL\n加熱溶解後分裝，經121℃滅菌15分鐘，最後pH值為7.0 ± 0.2。\n\n稀釋液選擇原則：除肉製品使用0.1%蛋白腖稀釋液外，其他檢體以磷酸鹽緩衝液為優先，其次為生理食鹽水。"}, {"no": "2.3 檢液之調製", "chapter": "操作程序", "content": "依檢體型態分別處理：\n\n(1) 固態檢體：將檢體切碎混合均勻後，取50 g，加入稀釋液450 mL，混合均勻，作為10倍稀釋檢液。\n\n(2) 粉狀、粒狀或其他易於粉碎之檢體：以已滅菌之藥勺粉碎後，混合均勻，取50 g，以下步驟同固態檢體操作。\n\n(3) 液態檢體：將檢體振搖均勻混合，取50 mL，作為原液，以下步驟同固態檢體操作。\n\n(4) 冷凍檢體：須解凍者（如冷凍魚、禽畜肉、蔬果、水餃等），應在冷藏之溫度下解凍（2～5℃，18小時內即可解凍完全）；亦可置於45℃以下之水浴中快速解凍（可在15分鐘內解凍之檢體適用）。不須解凍者（如食用冰塊、冰棒等），應速先行使成適當小塊，再製成10倍稀釋檢液。如檢驗工作無法立即進行，應將檢體貯存於-20℃。\n\n(5) 凝態及濃稠液態檢體（如布丁、煉乳、海苔醬等）：經攪拌均勻後，取50 g，以下步驟同固態檢體操作。\n\n(6) 系列稀釋：吸取10倍稀釋檢液10 mL加至稀釋液90 mL，依序作成100倍、1000倍、10000倍等系列稀釋檢液。\n\n注意事項：檢體總量不足50 g (mL)時，應依檢體量添加適量稀釋液，作成10倍稀釋檢液。處理含油脂量多、不易勻散及易起泡沫之檢體時，應加入適量已滅菌之乳化劑（如Tween 80，使其於檢液中濃度為1%），並充分振搖使之乳化。"}, {"no": "2.4 生菌之培養", "chapter": "操作程序", "content": "培養操作步驟：\n\n(1) 將稀釋檢液及（或）原液充分振搖，混合均勻。\n(2) 各吸取各稀釋檢液及（或）原液1 mL，分別置入培養皿中，各檢液至少做二重複。\n(3) 另吸取稀釋液1 mL置入培養皿中，作為空白對照組（二重複）。\n(4) 各培養皿中倒入冷卻至45 ± 1℃之平板計數培養基(PCA) 12～15 mL，搖動混合。自檢液之調製至此步驟應於15分鐘內完成。\n(5) 將培養基平板靜置，待培養基凝固後，倒置於35℃培養48 ± 2小時。"}, {"no": "2.5.1–2.5.2 生菌數計算基本原則", "chapter": "計算與判定", "content": "培養後，選取25～250個菌落之兩個平板來計數，結果以CFU/g或CFU/mL表示。<div class=\"reg-table-block\"><div style=\"font-family:monospace;font-size:0.92em;line-height:2.2;\">【僅一種稀釋倍數在範圍內】<br>生菌數 = 平均菌落數 × 稀釋倍數<br><br>【兩種稀釋倍數均在範圍內】<br>生菌數（CFU/g 或 CFU/mL）= ［（<span style=\"display:inline-flex;flex-direction:column;align-items:center;font-size:0.9em;vertical-align:middle;\"><span>Aa＋Ab</span><span style=\"border-top:1px solid currentColor;padding-top:1px;\">2</span></span>× A）＋（<span style=\"display:inline-flex;flex-direction:column;align-items:center;font-size:0.9em;vertical-align:middle;\"><span>Ba＋Bb</span><span style=\"border-top:1px solid currentColor;padding-top:1px;\">2</span></span>× B）］× <span style=\"display:inline-flex;flex-direction:column;align-items:center;font-size:0.9em;vertical-align:middle;\"><span>1</span><span style=\"border-top:1px solid currentColor;padding-top:1px;\">2</span></span><br>Aa、Ab：A稀釋倍數各平板菌落數；Ba、Bb：B稀釋倍數各平板菌落數；A、B：稀釋倍數</div></div>結果表示時第三位數字四捨六入（第三位為五時，第二位奇數進位、偶數捨去），有效數為兩位。"}, {"no": "2.5.3–2.5.10 特殊情況計算規則", "chapter": "計算與判定", "content": "各種特殊情況之處理規則：\n\n(3) 各稀釋倍數菌落數均小於25個：以最低稀釋倍數兩個平板菌落數平均值乘其稀釋倍數，並註明為估計值(*)。\n\n(4) 平板菌落數大於250個：先計數平板中菌落分佈代表性之一部份，再計算生菌數，以估計值(*)表示。\n\n(5) 擴散菌落分為三種形式：鏈狀菌落；細菌生長介於培養基及培養皿底部間之水氣中；細菌生長於培養基邊緣或表面之水氣上。\n・擴散菌落覆蓋面積（含抑制生長範圍）超過平板面積1/2，或抑制生長範圍超過1/4時，應不予計數，記錄為「擴散菌落」。\n・擴散菌落形成鏈狀時，若僅一條則視為一個菌落；兩條以上時應視鏈源處之不同分別計數。\n\n(6) 各稀釋倍數均無菌落生長者：生菌數應小於1乘以最低稀釋倍數，並註明估計值(*)。\n\n(7) 二重複平板，其中一片在25～250個之間，另一片大於250個：兩者均應計數。\n\n(8) 二稀釋倍數各有一片在25～250個之間，另一片大於250個或小於25個：四片皆計數，依公式計算。\n\n(9) 一稀釋倍數之2重複均在25～250之間，另一稀釋倍數之2重複中一片在25～250之間、另一片超出範圍：四片皆計數，依公式計算。\n\n(10) 確證被污染者或依其他理由認為不適當者，應不得計算之。"}, {"no": "附表 計算舉例說明", "chapter": "計算與判定", "content": "生菌數計算舉例說明（2平板/稀釋倍數）：\n<div class=\"reg-table-block\"><div class=\"table-scroll\"><table class=\"reg-table\"><thead><tr><th rowspan=\"2\">樣品</th><th colspan=\"3\">菌落數（各稀釋倍數 / 各平板）</th><th rowspan=\"2\">CFU/g</th><th rowspan=\"2\">計算依據</th></tr><tr><th>1:100</th><th>1:1000</th><th>1:10000</th></tr></thead><tbody><tr><td>1</td><td>TNTC/TNTC</td><td>175/208</td><td>16/17</td><td>190,000</td><td>2.5.2</td></tr><tr><td>2</td><td>TNTC/TNTC</td><td>224/245</td><td>25/30</td><td>250,000</td><td>2.5.2</td></tr><tr><td>3</td><td>18/14</td><td>2/0</td><td>0/0</td><td>1,600*</td><td>2.5.3 估計值</td></tr><tr><td>4</td><td>TNTC/TNTC</td><td>TNTC/TNTC</td><td>523/487</td><td>5,100,000*</td><td>2.5.4 估計值</td></tr><tr><td>5</td><td>TNTC/TNTC</td><td>245/230</td><td>35/擴散菌落</td><td>290,000</td><td>2.5.5</td></tr><tr><td>6</td><td>0/0</td><td>0/0</td><td>0/0</td><td>&lt;100*</td><td>2.5.6 估計值</td></tr><tr><td>7</td><td>TNTC/TNTC</td><td>245/278</td><td>23/20</td><td>260,000</td><td>2.5.7</td></tr><tr><td>8</td><td>TNTC/TNTC</td><td>225/255</td><td>21/40</td><td>270,000</td><td>2.5.8</td></tr><tr><td>9</td><td>TNTC/TNTC</td><td>210/240</td><td>18/28</td><td>230,000</td><td>2.5.9</td></tr><tr><td>10</td><td>TNTC/TNTC</td><td>260/230</td><td>30/28</td><td>270,000</td><td>2.5.9</td></tr></tbody></table></div><p class=\"table-note\">TNTC = Too Numerous To Count（菌落數明顯多於250）；*星號表示估計值。</p></div>"}, {"no": "2.6 檢驗流程", "chapter": "操作程序", "content": "檢驗流程摘要：\n\n① 檢體50 g，加入稀釋液450 mL，作成10倍稀釋檢液\n② 製備100倍、1000倍等系列稀釋檢液\n③ 稀釋檢液充分振搖，分別吸取1 mL注入培養皿中（二重複）\n④ 培養皿中倒入12～15 mL已冷卻至45 ± 1℃之PCA培養基，搖動混合，待培養基凝固後，倒置\n⑤ 35℃培養48 ± 2 hr\n⑥ 選取25～250個菌落之培養皿，結果以CFU/g或CFU/mL表示"}, {"no": "2.7 備註", "chapter": "基本資訊", "content": "可參考使用經確效認可之市售培養基、生化檢測套組或鑑定系統，惟檢驗結果有爭議時，應以本檢驗方法為準。"}]});

Object.assign(lawArticles, {"食品微生物之檢驗方法－金黃色葡萄球菌之檢驗": [{"no": "適用範圍", "chapter": "第一部：金黃色葡萄球菌之分離及其腸毒素之檢驗", "content": "本方法（MOHWM0002.02）適用於食品中金黃色葡萄球菌及其腸毒素（enterotoxins）之檢驗。依據公告：98年6月9日署授食字第0981800188號訂定；102年9月6日部授食字第1021950329號修正；104年10月13日部授食字第1041901818號修正。\n\n檢驗方法：檢體經稀釋後，以選擇性培養基培養之方法。"}, {"no": "工作環境", "chapter": "第一部：金黃色葡萄球菌之分離及其腸毒素之檢驗", "content": "工作平台須寬敞、潔淨、光線良好，操作平台光度為100呎燭光以上，密閉室內換氣良好，儘可能沒有灰塵及流動空氣。每15分鐘落菌數不得超過15 CFU/培養皿。"}, {"no": "器具及材料", "chapter": "第一部：金黃色葡萄球菌之分離及其腸毒素之檢驗", "content": "主要儀器設備：\n- 生物安全操作櫃（BSC）：第二等級（class II）以上\n- 乾熱滅菌器、高壓滅菌釜\n- 冰箱（5±3℃）、培養箱（±1.0℃以內）、水浴（±0.2℃以內）\n- 攪拌均質器（Blender）或鐵胃（Stomacher）\n- 天平：2000 g（靈敏度0.1 g）及120 g（靈敏度1 mg）\n- 顯微鏡（1000倍以上光學顯微鏡）\n- 旋渦混合器、離心機（≥3000 rpm）、pH meter\n- 微量吸管（10、20、200、1000 μL）\n- 培養皿（已滅菌，內徑約9 cm，深約15 mm）\n- 無菌濾膜（孔徑0.45 μm以下親水性濾膜）\n\n主要試藥：氯化鈉、磷酸鹽類、過氧化氫、EDTA、革蘭氏染色試藥（結晶紫、碘化鉀、草酸銨、碘、沙黃O）、亞碲酸鉀、葡萄糖、甘露糖醇、丙酮酸鈉、甘胺酸、氯化鋰、酚紅、DNA、甲苯胺藍O等（均採化學試藥級）；蛋白腖、溶菌素、胰化蛋白腖、牛肉抽出物、酵母抽出物、洋菜、凝固酶血漿（兔來源，EDTA處理）等（均採微生物級）。"}, {"no": "試劑配製", "chapter": "第一部：金黃色葡萄球菌之分離及其腸毒素之檢驗", "content": "主要試劑配製方法：\n\n(1) 3%過氧化氫溶液：取30%過氧化氫1 mL加蒸餾水至10 mL，使用時新鮮配製。\n\n(2) 1%亞碲酸鉀溶液：取1 g溶於蒸餾水100 mL，稍加熱溶解，經0.45 μm濾膜過濾，貯冰箱備用；有白色沉澱即不可使用，期限不超過1個月。\n\n(3) 含1%氯化鈉之0.02 M磷酸鹽緩衝溶液（pH 7.3～7.4）：溶液A（Na₂HPO₄+NaCl）與溶液B（NaH₂PO₄+NaCl）混合調至pH 7.3～7.4。\n\n(4) 溶菌素溶液：2 mg溶於上述緩衝溶液40 mL，分裝冷凍保存，期限不超過3星期。\n\n(5) 液態石蠟油或礦物油：20～50 mL裝容器約1/2滿，121℃滅菌30分鐘。\n\n(6) 革蘭氏染色液：\n- 初染劑（哈克氏結晶紫液）：結晶紫2 g溶於95%乙醇20 mL（溶液A）+ 草酸銨0.8 g溶於蒸餾水80 mL（溶液B），混合靜置24小時過濾。\n- 媒染劑（革蘭氏碘液）：碘化鉀2 g+碘1 g研磨溶解，加蒸餾水至300 mL。\n- 複染劑（哈克氏複染液）：沙黃O 2.5 g溶於95%乙醇100 mL為原液，使用時取原液10 mL加蒸餾水90 mL。"}, {"no": "稀釋液及培養基", "chapter": "第一部：金黃色葡萄球菌之分離及其腸毒素之檢驗", "content": "稀釋液（擇一使用）：\n- 生理食鹽水：NaCl 8.5 g/L，121℃ 15分鐘。\n- 磷酸鹽緩衝液（Butterfield's）：KH₂PO₄原液，使用時稀釋至1.25 mL/L，pH 7.2，121℃ 15分鐘。\n- 0.1%蛋白腖稀釋液：pH 7.0±0.1，121℃ 15分鐘。\n- 蛋白腖緩衝液（Buffered peptone water）：pH 7.2±0.2，121℃ 15分鐘。\n（除肉製品用蛋白腖稀釋液外，其他檢體通常以磷酸鹽緩衝液稀釋）\n\n主要培養基：\n(1) 巴德派克培養基（Baird-Parker, BP）：胰化蛋白腖10 g、牛肉抽出物5 g、酵母抽出物1 g、丙酮酸鈉10 g、甘胺酸12 g、氯化鋰5 g、洋菜20 g、蒸餾水950 mL，121℃ 15分鐘，pH 7.0±0.2；加入蛋黃亞碲酸鹽強化培養液（EYT）即為完全培養基，製備好之培養基20～25℃使用期限不超過5天。\n(2) 腦心浸出物培養液（BHI）：含牛腦、牛心浸出物、月示蛋白腖、NaCl、Na₂HPO₄、葡萄糖，121℃ 15分鐘，pH 7.4±0.2。\n(3) 胰化酪蛋白大豆培養基（TSA）：pH 7.3±0.2，121℃ 15分鐘。\n(4) 酚紅碳水化合物培養液（含葡萄糖或甘露醇）：118℃ 10分鐘，pH 7.4±0.2。\n(5) 甲苯胺藍去氧核糖核酸培養基（TDNA）：調pH至9.0，貯存期限不超過4個月，室溫下取3 mL滴於載玻片製成2 mm凹洞。\n(6) 胰化酪蛋白大豆培養液（含10% NaCl及1%丙酮酸鈉）：pH 7.3±0.2，121℃ 15分鐘。"}, {"no": "檢液調製", "chapter": "第一部：金黃色葡萄球菌之分離及其腸毒素之檢驗", "content": "各類檢體之調製方法：\n\n(1) 固態檢體：切碎混均後取50 g，加稀釋液450 mL，製成10倍稀釋檢液。\n(2) 粉狀/粒狀檢體：粉碎混均後，同固態操作。\n(3) 液態檢體：充分振搖混均，取50 mL原液，同上操作。\n(4) 冷凍檢體：冷藏下解凍（2～5℃，18小時內）或水浴快速解凍（45℃以下，15分鐘內）；冰類製品先切成小塊後依固態操作。無法立即檢驗應貯於-20℃。\n(5) 凝態及濃稠液態檢體（布丁、煉乳等）：充分攪拌後取50 g，同固態操作。\n(6) 系列稀釋：以已滅菌吸管取10倍稀釋液10 mL加入90 mL稀釋液，依序作成100倍、1000倍、10000倍等。\n(7) 塗抹物（Swab）檢體：棒頭置於滅菌試管中，折斷木柄，加蛋白腖緩衝液5 mL，旋緊管蓋，10秒內叩擊手心50次（幅度15 cm）或以旋渦混合器振盪至棉絮鬆開，取溶出液供檢。\n\n注意：油脂量多之檢體應加1% Tween 80乳化劑；檢體不足50 g(mL)時依比例添加稀釋液。"}, {"no": "分離培養－直接平板法", "chapter": "第一部：金黃色葡萄球菌之分離及其腸毒素之檢驗", "content": "直接平板計數法（Direct plate count method）：\n\n(1) 充分振搖稀釋液及原液使均勻。\n(2) 吸取各稀釋倍數檢液0.1 mL，分別置入BP培養基平板，每檢液至少2重複（共2個平板）。若預期低菌量，可各取1 mL分置3個BP培養基平板（0.3+0.3+0.4 mL），每檢液至少2重複（共6個平板）。\n(3) 以滅菌塗抹曲棒均勻塗布，倒置於35℃培養45～48小時。可疑菌落特徵：圓形，直徑2～3 mm，表面凸起、平滑、具乳酪膠狀，呈灰黑色或黑色，周邊色淡，菌落外圍由內而外有不透明環及透明環環繞。\n(4) 選取含20～200個菌落之平板，鉤取可疑菌落接種於1 mL BHI培養液（製成懸浮液）並同時接種於TSA斜面培養基，35℃培養18～24小時，供後續試驗使用。\n\n注意：若可疑菌落只出現在＞200或＜20個菌落之平板，則以出現可疑菌落之平板進行；若有不同型態可疑菌落，各型態均鉤取至少2個；必要時應純化。"}, {"no": "分離培養－最確數法（MPN）", "chapter": "第一部：金黃色葡萄球菌之分離及其腸毒素之檢驗", "content": "最確數計數法（Most Probable Number，MPN）：預期檢體中只含低菌量金黃色葡萄球菌時使用。\n\n(1) 充分混合各稀釋倍數檢液及原液。\n(2) 各取1 mL接種於已裝有10 mL TSB培養液（含10% NaCl及1%丙酮酸鈉）試管，每稀釋倍數各接3支（三階三支，各階含檢體量：1, 0.1, 0.01 g或mL；或0.1, 0.01, 0.001 g或mL），35℃培養48±2小時。\n（注意：接種之稀釋檢液應以最高稀釋倍數有負反應者才可用於計數）\n(3) 各取一接種環菌量，自每支呈混濁（細菌生長）之TSB試管劃線於BP培養基，35℃培養48小時。\n(4) 每個有細菌生長之平板至少鉤取一可疑菌落，接種於BHI培養液及TSA斜面培養基，35℃培養18～24小時，供後續試驗使用。"}, {"no": "革蘭氏染色", "chapter": "第一部：金黃色葡萄球菌之分離及其腸毒素之檢驗", "content": "革蘭氏染色（Gram stain）操作步驟：\n\n(1) 自TSA斜面培養基鉤取適量菌株，均勻塗抹成薄抹片，風乾後通過火焰3～4次微熱固定（勿直接火烤）。\n(2) 初染：哈克氏結晶紫液染1分鐘後水洗（不超過5秒）。\n(3) 媒染：革蘭氏碘液作用1分鐘，水洗。\n(4) 脫色：95%乙醇洗至紫色不再褪出，水洗（僅數秒，視抹片厚薄）。\n(5) 複染：哈克氏複染液複染30秒，水洗。\n(6) 自然風乾後鏡檢。\n\n判讀：深紫色=革蘭氏陽性菌；淡紅色=革蘭氏陰性菌。\n金黃色葡萄球菌：革蘭氏陽性，菌體呈單一、成對或不規則簇狀排列的球菌，不產芽孢。"}, {"no": "凝固酶試驗", "chapter": "第一部：金黃色葡萄球菌之分離及其腸毒素之檢驗", "content": "凝固酶試驗（Coagulase test）：\n\n吸取凝固酶血漿0.5 mL，加入BHI增菌液0.2～0.3 mL，35℃培養6小時，每隔1小時觀察有無凝塊形成；若無，繼續培養至24小時。\n\n判定：凝塊仍留在試管傾斜/倒置後原處，凝固程度4+，判定為陽性。若凝固程度為3+、2+、1+或可疑，應繼續進行輔助試驗。"}, {"no": "輔助試驗", "chapter": "第一部：金黃色葡萄球菌之分離及其腸毒素之檢驗", "content": "輔助試驗（Ancillary tests）：\n\n(1) 觸酶試驗（Catalase test）：自TSA斜面培養基鉤菌，塗抹於載玻片，加3%過氧化氫1～2滴。產生氣泡=正反應；金黃色葡萄球菌為正反應（+）。\n\n(2) 溶菌素敏感性試驗（Lysostaphin sensitivity test）：製備菌懸浮液（試管A），取0.1 mL至試管B；試管A加溶菌素液0.1 mL（最終濃度25 μg/mL）作試驗組，試管B加緩衝液0.1 mL作對照組，35℃放置2小時。由混濁變澄清=正反應；金黃色葡萄球菌為正反應（+）。\n\n(3) 厭氧下葡萄糖利用（Anaerobic utilization of glucose）：接種於酚紅葡萄糖培養液，加液態石蠟油至高度約2.5 cm，37℃培養5天。由紅轉黃=正反應；金黃色葡萄球菌為正反應（+）。\n\n(4) 厭氧下甘露醇利用（Anaerobic utilization of mannitol）：同上，改用酚紅甘露糖醇培養液，37℃ 5天。由紅轉黃=正反應；金黃色葡萄球菌為正反應（+）。\n\n(5) 熱安定型核酸分解酶試驗（Thermostable nuclease test）：BHI增菌液沸水加熱15分鐘後冷卻，取約0.01 mL滴入TDNA培養基凹洞，35℃培養4小時。凹洞旁由藍色變粉紅色、環寬≥1 mm=正反應；金黃色葡萄球菌為正反應（+）。"}, {"no": "判定標準", "chapter": "第一部：金黃色葡萄球菌之分離及其腸毒素之檢驗", "content": "金黃色葡萄球菌陽性者，應符合下列所有試驗結果（各項90%以上為正反應）：\n\n<div class=\"reg-table-block\"><div class=\"table-scroll\"><table class=\"annex-table\"><thead><tr><th>試驗項目</th><th>正反應(+)</th><th>金黃色葡萄球菌反應</th></tr></thead><tbody><tr><td>革蘭氏染色</td><td>陽性、無芽孢球菌，單一/成對/簇狀排列</td><td>+</td></tr><tr><td>凝固酶試驗</td><td>凝塊形成</td><td>+</td></tr><tr><td>觸酶試驗</td><td>氣泡產生</td><td>+</td></tr><tr><td>厭氧下葡萄糖利用</td><td>培養液轉黃色</td><td>+</td></tr><tr><td>厭氧下甘露糖醇利用</td><td>培養液轉黃色</td><td>+</td></tr><tr><td>溶菌素敏感性試驗</td><td>懸浮液澄清</td><td>+</td></tr><tr><td>熱安定型核酸分解酶試驗</td><td>粉紅色環，寬度≥1 mm</td><td>+</td></tr></tbody></table></div></div>\n\n判定為陽性後，依計數方法計算菌數。"}, {"no": "直接平板法菌數計算", "chapter": "第一部：金黃色葡萄球菌之分離及其腸毒素之檢驗", "content": "直接平板法菌數計算：<div class=\"reg-table-block\"><div style=\"font-family:monospace;font-size:0.92em;line-height:2.2;\">比率 R = <span style=\"display:inline-flex;flex-direction:column;align-items:center;font-size:0.9em;vertical-align:middle;\"><span>N₁</span><span style=\"border-top:1px solid currentColor;padding-top:1px;\">N₀</span></span>　（N₀：可疑菌落數；N₁：判定為金黃色葡萄球菌之菌落數）<br><br>【單一稀釋倍數（菌落數 20～200）】<br>金黃色葡萄球菌數（CFU/g 或 CFU/mL）= Σa × <span style=\"display:inline-flex;flex-direction:column;align-items:center;font-size:0.9em;vertical-align:middle;\"><span>A</span><span style=\"border-top:1px solid currentColor;padding-top:1px;\">VA</span></span> × R<br>Σa：A稀釋倍數所有平板可疑菌落總和；VA：A稀釋倍數所有平板檢液總體積；A：稀釋倍數<br><br>【兩種稀釋倍數均在 20～200（取平均值）】<br>金黃色葡萄球菌數（CFU/g 或 CFU/mL）= ［Σa × <span style=\"display:inline-flex;flex-direction:column;align-items:center;font-size:0.9em;vertical-align:middle;\"><span>A</span><span style=\"border-top:1px solid currentColor;padding-top:1px;\">VA</span></span> ＋ Σb × <span style=\"display:inline-flex;flex-direction:column;align-items:center;font-size:0.9em;vertical-align:middle;\"><span>B</span><span style=\"border-top:1px solid currentColor;padding-top:1px;\">VB</span></span>］× <span style=\"display:inline-flex;flex-direction:column;align-items:center;font-size:0.9em;vertical-align:middle;\"><span>R</span><span style=\"border-top:1px solid currentColor;padding-top:1px;\">2</span></span><br>Σb：B稀釋倍數所有平板可疑菌落總和；VB：B稀釋倍數所有平板檢液總體積</div></div>菌數以CFU/g或CFU/mL表示，第三位數字四捨五入，有效數字為兩位。\n\n具有不同型態之可疑菌落時，應分別計數、分別計算比率R、分別求得各型態菌數，再將之相加總。"}, {"no": "最確數計算（MPN）", "chapter": "第一部：金黃色葡萄球菌之分離及其腸毒素之檢驗", "content": "由判定為金黃色葡萄球菌之各階試管數，利用三階三支最確數表推算MPN/g或MPN/mL（接種量各階含檢體0.1、0.01、0.001 g或mL）。\n\n換算公式（接種量不同時）：\nMPN/g（mL）= 最確數表之最確數 ÷（第一階試管含檢體量 × 10）\n\n計算範例（正反應管數3-1-0，表列MPN=43）：\n・接種量1、0.1、0.01 g/mL → MPN = 4.3 MPN/g\n・接種量0.1、0.01、0.001 g/mL → MPN = 43 MPN/g\n・接種量0.01、0.001、0.0001 g/mL → MPN = 4.3×10² MPN/g\n\n<div class=\"reg-table-block\"><div class=\"table-scroll\"><table class=\"reg-table\">\n<thead>\n<tr>\n  <th rowspan=\"2\">正反應試管數<br>（0.1* / 0.01 / 0.001）</th>\n  <th rowspan=\"2\">最確數<br>（MPN/g 或 MPN/mL）</th>\n  <th colspan=\"2\">95% 信賴界限</th>\n</tr>\n<tr>\n  <th>下限</th><th>上限</th>\n</tr>\n</thead>\n<tbody>\n<tr><td>0-0-0</td><td>&lt;3.0</td><td>—</td><td>9.5</td></tr>\n<tr><td>0-0-1</td><td>3.0</td><td>0.15</td><td>9.6</td></tr>\n<tr><td>0-1-0</td><td>3.0</td><td>0.15</td><td>11</td></tr>\n<tr><td>0-1-1</td><td>6.1</td><td>1.2</td><td>18</td></tr>\n<tr><td>0-2-0</td><td>6.2</td><td>1.2</td><td>18</td></tr>\n<tr><td>0-3-0</td><td>9.4</td><td>3.6</td><td>38</td></tr>\n<tr><td>1-0-0</td><td>3.6</td><td>0.17</td><td>18</td></tr>\n<tr><td>1-0-1</td><td>7.2</td><td>1.3</td><td>18</td></tr>\n<tr><td>1-0-2</td><td>11</td><td>3.6</td><td>38</td></tr>\n<tr><td>1-1-0</td><td>7.4</td><td>1.3</td><td>20</td></tr>\n<tr><td>1-1-1</td><td>11</td><td>3.6</td><td>38</td></tr>\n<tr><td>1-2-0</td><td>11</td><td>3.6</td><td>42</td></tr>\n<tr><td>1-2-1</td><td>15</td><td>4.5</td><td>42</td></tr>\n<tr><td>1-3-0</td><td>16</td><td>4.5</td><td>42</td></tr>\n<tr><td>2-0-0</td><td>9.2</td><td>1.4</td><td>38</td></tr>\n<tr><td>2-0-1</td><td>14</td><td>3.6</td><td>42</td></tr>\n<tr><td>2-0-2</td><td>20</td><td>4.5</td><td>42</td></tr>\n<tr><td>2-1-0</td><td>15</td><td>3.7</td><td>42</td></tr>\n<tr><td>2-1-1</td><td>20</td><td>4.5</td><td>42</td></tr>\n<tr><td>2-1-2</td><td>27</td><td>8.7</td><td>94</td></tr>\n<tr><td>2-2-0</td><td>21</td><td>4.5</td><td>42</td></tr>\n<tr><td>2-2-1</td><td>28</td><td>8.7</td><td>94</td></tr>\n<tr><td>2-2-2</td><td>35</td><td>8.7</td><td>94</td></tr>\n<tr><td>2-3-0</td><td>29</td><td>8.7</td><td>94</td></tr>\n<tr><td>2-3-1</td><td>36</td><td>8.7</td><td>94</td></tr>\n<tr><td>3-0-0</td><td>23</td><td>4.6</td><td>94</td></tr>\n<tr><td>3-0-1</td><td>38</td><td>8.7</td><td>110</td></tr>\n<tr><td>3-0-2</td><td>64</td><td>17</td><td>180</td></tr>\n<tr><td>3-1-0</td><td>43</td><td>9</td><td>180</td></tr>\n<tr><td>3-1-1</td><td>75</td><td>17</td><td>200</td></tr>\n<tr><td>3-1-2</td><td>120</td><td>37</td><td>420</td></tr>\n<tr><td>3-1-3</td><td>160</td><td>40</td><td>420</td></tr>\n<tr><td>3-2-0</td><td>93</td><td>18</td><td>420</td></tr>\n<tr><td>3-2-1</td><td>150</td><td>37</td><td>420</td></tr>\n<tr><td>3-2-2</td><td>210</td><td>40</td><td>430</td></tr>\n<tr><td>3-2-3</td><td>290</td><td>90</td><td>1,000</td></tr>\n<tr><td>3-3-0</td><td>240</td><td>42</td><td>1,000</td></tr>\n<tr><td>3-3-1</td><td>460</td><td>90</td><td>2,000</td></tr>\n<tr><td>3-3-2</td><td>1,100</td><td>180</td><td>4,100</td></tr>\n<tr><td>3-3-3</td><td>&gt;1,100</td><td>420</td><td>—</td></tr>\n</tbody></table></div>\n<p class=\"table-note\">*：各階試管中所含檢體量（g 或 mL）。接種量不同時，MPN/g = 表列最確數 ÷（第一階含檢體量 × 10）。</p></div>"}, {"no": "腸毒素之檢驗", "chapter": "第一部：金黃色葡萄球菌之分離及其腸毒素之檢驗", "content": "腸毒素之檢驗：\n\n(1) 金黃色葡萄球菌腸毒素：鉤取確認為金黃色葡萄球菌之單一菌落，接種於BHI培養液，35℃培養24小時，3000 rpm離心20分鐘，取上清液進行腸毒素檢驗。可使用經確效認可之腸毒素檢測方法或市售套組。\n\n(2) 食品中金黃色葡萄球菌腸毒素：萃取方法依食品種類及檢測方式而異，可逕自參考使用經確效認可之腸毒素檢測方法或市售套組，依建議及產品說明進行萃取及檢測。\n\n注意：如使用經確效認可之市售培養基、生化檢測套組或生化試驗鑑定系統，其檢驗結果有爭議時，以本公告檢驗方法為準。"}, {"no": "第二部適用範圍", "chapter": "第二部：金黃色葡萄球菌之real-time PCR檢測", "content": "本方法適用於金黃色葡萄球菌菌種及其A、B、C、D、E型腸毒素基因之鑑別。\n\n檢驗方法：檢體之增菌液或經分離純化後之菌株，經DNA萃取後，以即時聚合酶鏈反應（real-time PCR）進行鑑別。\n\n附註：第二部金黃色葡萄球菌之real-time PCR檢驗可視需要執行。"}, {"no": "第二部裝置及試藥", "chapter": "第二部：金黃色葡萄球菌之real-time PCR檢測", "content": "主要裝置：\n- 即時聚合酶鏈反應器（Applied Biosystems 7500 Real-Time PCR System或同級品）\n- 生物安全操作櫃（class II以上）\n- 加熱振盪器（具溫控及振盪功能）\n- 微量冷凍離心機（可達20000×g，具4℃溫控）\n- 分光光度計（260 nm、280 nm）\n\n主要試藥：\n- DNA抽取用：適用於革蘭氏陽性細菌DNA抽取之市售套組。\n- TaqMan® Fast Reagents Starter Kit\n- 對照用物質：金黃色葡萄球菌參考菌株、產毒型（A/B/C/D/E型腸毒素）參考菌株或其DNA。\n\nReal-time PCR溶液配製（每反應25 μL）：\n5 μM引子F：2.0 μL；5 μM引子R：2.0 μL；5 μM探針：1.5 μL；TaqMan® Fast Reagents：12.5 μL；檢體DNA：5.0 μL；無菌去離子水：2.0 μL（溶液應置於冰浴中配製）"}, {"no": "引子及探針序列", "chapter": "第二部：金黃色葡萄球菌之real-time PCR檢測", "content": "鑑別試驗用引子及探針（探針5'端以FAM標記，3'端以BHQ1或MGB標記）：\n\n(1) 菌種鑑別基因（標的：nuc，64 bp）\n引子F：5'-AAATTACATAAAGAACCTGCGACA-3'\n引子R：5'-GAATGTCATTGGTTGACCTTTGTA-3'\n探針P：5'-(FAM)-AATTTAACCGTATCACCATCAATCGCTTT-(BHQ1)-3'\n\n(2) A型腸毒素（entA，80 bp）\n引子F：5'-TTTGGAAACGGTTAAAACGAATAAG-3'\n引子R：5'-TTTCCTGTAAATAACGTCTTGCTTGA-3'\n探針P：5'-(FAM)-CTGTTCAGGAGTTGGATC-(MGB)-3'\n\n(3) B型腸毒素（entB，84 bp）\n引子F：5'-AGGTGACTGCTCAAGAATTAGATTACC-3'\n引子R：5'-AAGGCGAGTTGTTAAATTCATAGAGTT-3'\n探針P：5'-(FAM)-AACTCGTCACTATTTGGTG-(MGB)-3'\n\n(4) C型腸毒素（entC，90 bp）\n引子F：5'-GGCGATAAGTTTGACCAATCTAAATAT-3'\n引子R：5'-AAGGTGGACTTCTATCTTCACACTTTT-3'\n探針P：5'-(FAM)-TGTACAACGACAATAAA-(MGB)-3'\n\n(5) D型腸毒素（entD，151 bp）\n引子F：5'-CACAAGCAAGGCGCTATTTG-3'\n引子R：5'-TCGGGAAAATCACCCTTAACA-3'\n探針P：5'-(FAM)-ATACAGCGCGGAAA-(MGB)-3'\n\n(6) E型腸毒素（entE，60 bp）\n引子F：5'-CTTTGGCGGTAAGGTGCAA-3'\n引子R：5'-ACCGTGGACCCTTCAGAAGA-3'\n探針P：5'-(FAM)-AGGCTTGATTGTGTTTCA-(MGB)-3'"}, {"no": "DNA製備及鑑別試驗", "chapter": "第二部：金黃色葡萄球菌之real-time PCR檢測", "content": "檢體DNA溶液製備：\n\n(1) 增菌液DNA製備：吸取菌液1 mL，15000×g離心3分鐘，去除上清液。\n- 直接煮沸法：沉澱物加無菌去離子水1 mL振盪，15000×g離心3分鐘，再加1 mL去離子水沸水中煮沸10分鐘，作為DNA原液，-20℃保存。\n- 抽取DNA法：採適用於革蘭氏陽性菌之市售DNA抽取套組，收集DNA原液，-20℃保存。\n\n(2) 分離菌株DNA製備：鉤取一接種環菌量於1 mL無菌去離子水中，煮沸10分鐘，冷卻後15000×g離心3分鐘，取上清液作為DNA原液。\n\n(3) DNA濃度及純度：以260 nm吸光值×50 ng/μL×稀釋倍數求得濃度；O.D.₂₆₀/O.D.₂₈₀比值應介於1.7～2.0。\n\nReal-time PCR鑑別試驗條件（Applied Biosystems 7500系統）：\n<div class=\"reg-table-block\"><div class=\"table-scroll\"><table class=\"annex-table\"><thead><tr><th>步驟</th><th>溫度(℃)</th><th>時間(sec)</th></tr></thead><tbody><tr><td>1. 熱活化</td><td>95</td><td>20</td></tr><tr><td>2. 最初變性</td><td>95</td><td>15</td></tr><tr><td>3. 黏接、延展</td><td>60</td><td>30</td></tr></tbody></table></div></div>\n（步驟2至步驟3，共進行45個循環）\n\n確認：當檢體DNA與正反應對照組之real-time PCR螢光增幅曲線均出現，即確認含有金黃色葡萄球菌或其A/B/C/D/E型腸毒素基因。"}]});

      Object.assign(lawArticles, {"包裝食品營養宣稱應遵行事項問答集_20240219": [{"no": "Q1.1", "chapter": "一、總則", "content": "問：為何要修訂「包裝食品營養宣稱應遵行事項」？\n\n答：為使法規更加清楚易懂，參考國際規範與實務情形，使業者更能落實，並保障消費者選購食品時知的權益。"}, {"no": "Q1.2", "chapter": "一、總則", "content": "問：本公告查詢處？\n\n答：\n1. 全國法規資料庫 http://law.moj.gov.tw/\n2. 衛生福利部食品藥物管理署(http://www.fda.gov.tw/)>公告資訊>本署公告\n3. 食品標示諮詢服務平台 http://www.foodlabel.org.tw"}, {"no": "Q2.1", "chapter": "二、適用範圍", "content": "問：如果我的產品品名為「乳酸菌糖果」或「乳酸菌球飲料」，是否屬於營養宣稱的範圍？\n\n答：乳酸菌非屬營養素，故該產品品名不涉及營養宣稱的範圍。惟應確認產品確實含有乳酸菌成分，不得有不實、誇張或易生誤解之情形。"}, {"no": "Q2.2", "chapter": "二、適用範圍", "content": "問：若僅於產品內容物敘述原料成分有「維生素A」、「維生素B2」，而未於外包裝內容物欄位以外之其他處標示「含維生素A」、「含維生素B2」，是否屬於營養宣稱？\n\n答：否。於內容物欄位內對產品原料成分之敘述，並不屬於營養宣稱。例如：內容物：麥芽糊精、玉米油、卵磷脂、碳酸鈣、維生素A、棕櫚酸、維生素B2、維生素D3，均屬於食品原料成分之敘述。惟倘於內容物欄位外之其他包裝處，另有敘述如「產品添加維生素A」、「使用維生素B2」等，表達該產品具有該項特定營養素，則應明確於營養標示欄位中，標明「維生素A」及「維生素B2」之含量。"}, {"no": "Q2.3", "chapter": "二、適用範圍", "content": "問：如果我的產品有宣稱「高維生素C」，營養標示之項目應包括哪些？\n\n答：應包括「包裝食品營養標示應遵行事項」公告內之營養標示項目（熱量、蛋白質、脂肪、飽和脂肪、反式脂肪、碳水化合物、糖、鈉）以及出現於營養宣稱中之營養素（維生素C）含量。"}, {"no": "Q2.4", "chapter": "二、適用範圍", "content": "問：請問有營養宣稱之復水食品是否須註明沖泡方式？該怎麼標示？\n\n答：若食品以復水後或沖泡後進行營養宣稱，則須將其沖泡方式於包裝上註明或標示於食用說明（如復水水量、溫度、時間等），以提供消費者之參考依據。"}, {"no": "Q2.5", "chapter": "二、適用範圍", "content": "問：直接供應飲食場所供應之食品及散裝食品，是否也需要符合「包裝食品營養宣稱應遵行事項」？\n\n答：不需要。倘直接供應飲食場所供應之食品及散裝食品欲自願標示、宣稱營養資訊提供消費者參考，其內容須符合食品安全衛生管理法第28條規定，食品之標示、宣傳或廣告，不得有不實、誇張或易生誤解之情形。"}, {"no": "Q2.6", "chapter": "二、適用範圍", "content": "問：「特殊營養食品」是否要符合「包裝食品營養宣稱應遵行事項」？\n\n答：特殊營養食品因具有特殊性，除適用「包裝食品營養宣稱應遵行事項」外，需同時符合特殊營養食品另訂相關規定。"}, {"no": "Q3.1", "chapter": "三、實施日期", "content": "問：修訂之「包裝食品營養宣稱應遵行事項」何時正式實施？\n\n答：本應遵行事項除第四點第一款、第四款、第五點及第六點規定，預定自115年1月1日實施（以產製日期為準），其餘規定自113年2月19日正式公告起開始實施。另，公告日前已取得特殊營養食品許可證之產品，於115年1月1日起製造者，應依本公告規定辦理。"}, {"no": "Q3.2", "chapter": "三、實施日期", "content": "問：如果發現產品的營養宣稱不符合規定，請問包裝之營養宣稱是否可以用黏貼方式修正？黏貼位置有無限制？\n\n答：可以，須將不符合規定之營養宣稱覆蓋，其貼紙應具備不易再撕開、不易換貼或不易脫落之特性，且不得遮蓋到其他依食品安全衛生管理法第22條所必須標示之項目。"}, {"no": "Q4.1", "chapter": "四、定義", "content": "問：可否舉例說明何謂「營養宣稱」？\n\n答：例如，標示「含有維生素A、高鈣、低鈉、無糖、高纖維」或等同意義詞句以表達該食品具有或不具有特定之營養素含量。"}, {"no": "Q4.2", "chapter": "四、定義", "content": "問：除了需適量攝取的8項營養素及可補充攝取的23項營養素，其餘的營養素可作「無」、「低」、「高」等詞句之營養宣稱嗎？\n\n答：不可以。僅熱量、脂肪、飽和脂肪、膽固醇、鈉、糖、乳糖及反式脂肪等8項需適量攝取營養素，得作「無、不含、零、低、少、薄、微、略含」或等同意義詞句之營養宣稱；僅蛋白質、膳食纖維、維生素A、維生素B1、維生素B2、維生素B6、維生素B12、維生素C、維生素D、維生素E、維生素K、菸鹼素、葉酸、泛酸、生物素、膽素、鈣、鐵、碘、鎂、鋅、氟、硒等23項之可補充攝取營養素，得作「高、多、強化、富含」或等同意義詞句之營養宣稱。"}, {"no": "Q5.1", "chapter": "五、營養宣稱", "content": "問：產品包裝上未做任何「高、多、強化、富含」營養宣稱，但在食品包裝上寫出或突顯（如字體加大、加粗、變色）膳食纖維這4個字是否有違反食品標示相關法規？\n\n答：如於成分欄位外其他處僅標示「膳食纖維」之營養素字樣或圖樣呈現，仍屬於以隱喻或暗示方式，表達該食品具有特定之營養素（如膳食纖維），須依「包裝食品營養標示應遵行事項」於營養標示欄位內標示膳食纖維含量。"}, {"no": "Q5.2", "chapter": "五、營養宣稱", "content": "問：若於產品包裝上宣稱「含有18種必需胺基酸」，是否可僅標示18種胺基酸加總之總量於營養標示欄位中？或須將18種胺基酸之名稱及含量，分別標示於營養標示欄位中？\n\n答：如於成分欄位外其他處標示宣稱「18種胺基酸」或等同意義描述、圖樣，表達該食品具有18種胺基酸之營養性質，應依「包裝食品營養標示應遵行事項」，於營養標示欄位內明確標示18種胺基酸之個別含量，不得僅以胺基酸總量標示之。"}, {"no": "Q5.3", "chapter": "五、營養宣稱", "content": "問：我的產品如果命名為「維生素C飲料」，是否需要在營養標示欄位內標示維生素C含量？\n\n答：該產品如欲命名為「維生素C飲料」，以隱喻或暗示方式，表達該食品具有特定的營養素，須依「包裝食品營養標示應遵行事項」於營養標示欄位內標示維生素C含量。"}, {"no": "Q5.4", "chapter": "五、營養宣稱", "content": "問：請問產品外包裝標示非「可補充攝取」之營養素含量，例如每份精胺酸1公克、每顆葉黃素15毫克等，是否有違反食品標示相關法規？\n\n答：\n1. 依據「包裝食品營養宣稱應遵行事項」，記載食品所含營養素含量之數值者，以該食品之單位重量、容量、數量或每份量，表達所含營養素之含量。\n2. 一般包裝食品倘於外包裝標示，例如每份精胺酸1公克、每顆葉黃素15毫克等，同時符合「包裝食品營養標示應遵行事項」規定，於營養標示欄位內標示該等營養素含量，且未作「可補充攝取」或「需適量攝取」之營養宣稱，尚屬適法。"}, {"no": "Q5.5", "chapter": "五、營養宣稱", "content": "問：一般包裝食品於包裝上是否可宣稱「250 mg鈣/每包(5公克)」？另，是否可使用百分比的方式呈現，例如10%蛋白質，不用再標示食品之單位重量、容量、數量或每份量？\n\n答：依據「包裝食品營養宣稱應遵行事項」，記載食品所含營養素含量之數值者，應明確以該食品之單位重量、容量、數量或每份量標示，例如每100公克蛋白質○公克、每份蛋白質○公克、每1包含鈣○毫克等，亦可更清楚標示，例如每1包(○公克)含鈣○毫克、每份(50公克)蛋白質○公克等，供消費者選購之參考。"}, {"no": "Q5.6", "chapter": "五、營養宣稱", "content": "問：如果欲引進國外進口的包裝飲用水（非礦泉水），在外包裝文字標示「含有礦物質成分」，請問是否需依法進行營養標示或得免標示？\n\n答：\n1. 銷售於國內之輸入及國產食品，均應依食品安全衛生管理法第22條之規定，以中文作完整標示，並遵守該法之相關規範。惟依據「得免營養標示之包裝食品規定」，未有營養宣稱之包裝飲用水、礦泉水、冰塊；或未有營養宣稱之包裝食品，其熱量及營養素含量皆符合「包裝食品營養標示應遵行事項」得以「０」標示之條件者，得免標示營養標示。\n2. 產品外包裝標示「含有礦物質成分」，以隱喻或暗示方式表達該食品具有特定的營養素，其營養標示應依「包裝食品營養標示應遵行事項」辦理，於營養標示欄位內明確標示含有哪些礦物質及其含量。\n3. 若產品外包裝標示符合CNS相關規範，而依該標準以條列式或表格式標示礦物質成分、含量，並未涉及前揭營養宣稱應遵行事項。"}, {"no": "Q5.7", "chapter": "五、營養宣稱", "content": "問：我的產品品名是否可命名為「金盞花萃取物（含葉黃素）」或是「魚油（含EPA、DHA）」？\n\n答：如欲以原料及其所含營養素成分緊連標示方式作為品名，如「金盞花萃取物（含葉黃素）」、「金盞花萃取物（葉黃素）」或是「魚油（含EPA、DHA）」、「魚油（EPA、DHA）」，以隱喻或暗示方式，表達該食品具有特定之營養素，須依「包裝食品營養標示應遵行事項」將該等營養素含量標示於營養標示欄位內，且原料及其所含營養素成分亦須緊連標示於內容物欄位中。"}, {"no": "Q5.8", "chapter": "五、營養宣稱", "content": "問：產品品名為「xx纖維食品」，須於營養標示中標示膳食纖維含量嗎？\n\n答：產品品名（xx纖維食品）以隱喻或暗示方式，表達該食品具有特定的營養性質，須於營養標示欄位內標示膳食纖維之含量。"}, {"no": "Q5.9", "chapter": "五、營養宣稱", "content": "問：有關宣稱或可標示為「０」之營養素含量值規定，是否包括等於含量值？是否有誤差允許範圍可言？\n\n答：宣稱或可標示為「０」之營養素含量值規定，包含等於所定之含量值，例如，產品每份及每100公克脂肪含量為0.5公克，符合脂肪標示為「０」之條件，可於產品包裝上標示「不含脂肪」。但宣稱或可標示為「０」之營養素含量值，並無誤差允許範圍。"}, {"no": "Q5.10", "chapter": "五、營養宣稱", "content": "問：如果產品為冰淇淋，想要宣稱低脂，是要依據液體的宣稱標準，還是固體的宣稱標準呢？\n\n答：\n1. 依據「包裝食品營養標示應遵行事項」，固體（半固體）應以公克表示，液體應以毫升表示。另，依據「包裝食品營養宣稱應遵行事項」，產品如欲宣稱「低脂」，應符合每100公克固體（半固體）食品之脂肪含量不超過3公克，或每100毫升液體食品之脂肪含量不超過1.5公克。\n2. 冰淇淋產品，其販售予消費者之產品形態為固體，如欲進行營養宣稱，則應以每100公克固體食品作為宣稱之衡量基準。"}, {"no": "Q5.11", "chapter": "五、營養宣稱", "content": "問：乾麵條產品是否可標示或宣稱「低醣麵條」？\n\n答：\n1. 依「包裝食品營養標示應遵行事項」，碳水化合物定義為醣類，係指總碳水化合物。\n2. 依據「包裝食品營養宣稱應遵行事項」，非屬「需適量攝取」之營養素，不得標示「無、不含、零、低、少、薄、微略含」或等同意義詞句之營養宣稱，以及營養素含量比較之詞句。「碳水化合物（醣類）」非屬「需適量攝取」之營養素，故產品標示不得宣稱「低醣」、「減醣」。\n3. 另，倘產品外包裝欲宣稱「低糖」，其糖含量應符合前揭應遵行事項規定，固體食品每100公克糖含量不得超過5公克。"}, {"no": "Q5.12", "chapter": "五、營養宣稱", "content": "問：請問產品為捕撈之魚類包裝食品，是否能宣稱或在成分上提及富含DHA呢？\n\n答：依據「包裝食品營養宣稱應遵行事項」，得宣稱「高、多、強化、富含」或等同意義詞句之營養素，有蛋白質、膳食纖維、維生素A、維生素B1、維生素B2、維生素B6、維生素B12、維生素C、維生素D、維生素E、維生素K、菸鹼素、葉酸、泛酸、生物素、膽素、鈣、鐵、碘、鎂、鋅、氟、硒等23項。「DHA」非屬前揭營養素範疇，故產品包裝不得宣稱「富含DHA」之字樣。"}, {"no": "Q5.13", "chapter": "五、營養宣稱", "content": "問：是否可以在產品包裝上進行「高蛋白」之宣稱？\n\n答：\n1. 一般食品於外包裝標示「高蛋白質」或等同意義詞句之營養宣稱，其蛋白質含量應符合「包裝食品營養宣稱應遵行事項」之規定。惟該應遵行事項表七所列之食品，如額外使用營養添加劑之零食類食品、糖果類食品、碳酸飲料、調味料等，不得作「高、多、富含、強化」或等同意義詞句之營養宣稱。\n2. 特定疾病配方食品，確實依適用對象營養需求設計，符合適用對象營養需求之特殊營養食品，依食品安全衛生管理法第21條規定，特殊營養食品應事先向衛生福利部辦理查驗登記手續，經核准始得輸入或上市販售。"}, {"no": "Q5.14", "chapter": "五、營養宣稱", "content": "問：產品若為訴求「富含維他命」的飲品，是否產品營養標示表所列營養素皆須符合修正草案中表三所列營養素第三欄或第四欄規範量？\n\n答：依「包裝食品營養宣稱應遵行事項」第4點第3款規定，倘液體食品於外包裝成分欄位外之其他處，標示宣稱「富含維他命」，該食品每100毫升所含個別維生素量皆應達到或超過表三第3欄所示之量，或其每100大卡所含個別維生素量，皆應達到或超過第4欄所示之量。又，依該應遵行事項第6點規定，液體食品有2項以上營養宣稱者，如以100大卡為衡量基準者，應於包裝上註明該衡量基準。"}, {"no": "Q5.15", "chapter": "五、營養宣稱", "content": "問：如果是肉鬆食品，想要宣稱「富含膳食纖維」，其宣稱標準為何？\n\n答：肉鬆食品屬於「包裝食品營養宣稱應遵行事項」中表五所列之食品品項，如欲宣稱「富含膳食纖維」，該食品每30公克（實重）所含膳食纖維量須達到或超過6公克，才可以宣稱「富含膳食纖維」。"}, {"no": "Q5.15b", "chapter": "五、營養宣稱", "content": "問：進口葵花油產品，原文包裝有標示「high-oleic」高油酸字樣，是否涉及營養宣稱？請問產品是否可命名，如「高油酸葵花油」？\n\n答：\n1. 依「包裝食品營養宣稱應遵行事項」，非屬該公告規範「可補充攝取」之營養素，不得標示「高、多、強化、富含」或等同意義詞句之營養宣稱。\n2. 於產品外包裝標示「high-oleic」，涉及前揭遵行事項，不得作「可補充攝取」營養宣稱標示。惟倘產品確實符合中華民國國家標準（CNS）第14768號食用高油酸葵花籽油之品質標準，品名標示為「高油酸葵花籽油」，且於營養標示欄位內標示油酸含量，尚屬適法。"}, {"no": "Q5.16", "chapter": "五、營養宣稱", "content": "問：請問可以將穀類和蔬果中膳食纖維的含量作對比宣稱？\n\n答：不可以，穀類產品不得與蔬果類產品互相比較膳食纖維的含量。一般包裝食品如有營養宣稱，應於營養標示欄位內標示該營養素含量，且須依「包裝食品營養宣稱應遵行事項」規定辦理。依據「包裝食品營養宣稱應遵行事項」，欲以「較…高」、「較…多」、「…倍」或等同意義詞句比較方式宣稱膳食纖維時，該固體（半固體）或液體食品所含膳食纖維含量與同類參考食品所含膳食纖維含量之差距，必須分別達到或超過該規定表三所示二分之一之量，且須標明被比較的同類參考食品之品名及其增加之量或其增加之比例數。"}, {"no": "Q5.17", "chapter": "五、營養宣稱", "content": "問：請問台灣地區食品營養成分資料庫的資料是否可以作為營養素比較宣稱的比較對象？\n\n答：不可以，台灣地區食品營養成分資料庫之資料，不可作為「包裝食品營養宣稱應遵行事項」營養素含量比較宣稱之被比較之食品。"}, {"no": "Q5.18", "chapter": "五、營養宣稱", "content": "問：拿鐵咖啡產品，包裝上標示「減糖65%」，並標示「本產品使用的蔗糖較同系列商品拿鐵咖啡減少65%」，而減糖65%的計算方式是以同系列的兩支拿鐵咖啡產品的外添加蔗糖含量之比較，並非單醣和雙醣的總和，且該兩產品每100毫升的糖含量差距有達2.5公克以上，請問上述標示是否符合規定？\n\n答：針對營養標示、宣稱部分，「糖」定義為單醣與雙醣總和。液體食品外包裝欲標示「減糖○%」，仍應依「包裝食品營養宣稱應遵行事項」辦理，其所含「糖」量與同類參考食品所含「糖」量之差距必須達到或超過2.5公克/每100毫升，且須標明被比較的同類參考食品之品名及其減低之量或其減低之比例數。"}, {"no": "Q5.19", "chapter": "五、營養宣稱", "content": "問：如果我的產品有營養宣稱（例如：高鈣），是否可以在外包裝處加註「鈣質可以預防骨質疏鬆症」？\n\n答：不可以。依據食品安全衛生管理法第28條之規定，對於食品之標示，不得有不實、誇張、易生誤解、醫療效能之標示，所以不可以標示「鈣質可以預防骨質疏鬆症」。但得依「食品及相關產品標示宣傳廣告涉及不實誇張易生誤解或醫療效能認定準則」，標示可敘述之生理功能例句，例如：鈣有助維持於骨骼與牙齒的正常發育及健康。"}, {"no": "Q5.20", "chapter": "五、營養宣稱", "content": "問：如果果凍中每份量（15公克）含有20毫克的維生素C，超過包裝食品營養宣稱條件表四之標準（15毫克/100公克），可以標示維生素C之生理功能例句嗎？\n\n答：如欲於果凍產品外包裝宣稱、標示維生素C生理功能者，其含量須符合「包裝食品營養宣稱應遵行事項」規定，產品每100公克之固體（半固體）所含維生素C須確實達到或超過15毫克，並於營養標示欄位內標示維生素C含量。另，維生素C可敘述之生理功能例句，須符合「食品及相關產品標示宣傳廣告涉及不實誇張易生誤解或醫療效能認定準則」之規定。"}, {"no": "Q5.21", "chapter": "五、營養宣稱", "content": "問：若產品僅訴求「每份含蛋白質○公克」或標示「含有葉黃素」，是否須達到表四含量標準？\n\n答：\n1. 考量「來源」、「供給」等通常是事實描述的營養宣稱，故如產品確實含有特定營養素，可標示「供給」、「含」等宣稱詞句，例如每份含蛋白質○公克、含葉黃素等，應依「包裝食品營養標示遵行事項」規定，於營養標示欄位內標示宣稱之營養素含量。\n2. 惟產品外包裝倘欲宣稱營養素之生理功能詞句，例如蛋白質幫助生長發育等，依該應遵行事項第4點第4款規定，除依「食品及相關產品標示宣傳廣告涉及不實誇張易生誤解或醫療效能認定準則」之規定外，該蛋白質含量須符合表四所示之量。"}, {"no": "Q5.22", "chapter": "五、營養宣稱", "content": "問：若於蝦製零食產品外包裝標示富含豐富的甲殼素、蝦紅素及鈣、磷？其含量需要標示於營養標示欄位內嗎？\n\n答：\n1. 依「包裝食品營養宣稱應遵行事項」，非屬「可補充攝取」之營養素，不得作「高」、「多」、「強化」、「富含」或等同意義字句之營養宣稱，且該應遵行事項表七所列之食品，如額外使用營養添加劑之零食類食品，不得作「高」、「多」、「強化」、「富含」或等同意義字句之營養宣稱。倘該蝦製品確實未額外使用營養添加劑，得依上開應遵行事項進行宣稱。\n2. 礦物質「磷」係屬廠商自願標示之營養素範疇。另，磷非屬「可補充攝取」之營養素，包裝不得宣稱「富含豐富的磷」之字樣。另，甲殼素、蝦紅素非屬營養素，如產品外包裝標示「富含豐富的甲殼素、蝦紅素」，應有相關充分科學資料證實其正確性，否則恐有違反食品安全衛生管理法第28條之虞。如欲標示非營養素含量，該等成分不得標示於營養標示欄位內，須與營養標示欄位明顯區隔，並有適當的標題。"}, {"no": "Q5.23", "chapter": "五、營養宣稱", "content": "問：糖果類食品，如果另外添加維生素C的量，達到「高、多、強化、富含」宣稱標準時，我可以在產品包裝上標示「富含維生素C」及維生素C之生理功能例句嗎？\n\n答：\n1. 額外使用營養添加劑之糖果類食品屬於「包裝食品營養宣稱應遵行事項」中表七所列之食品品項，得於外包裝標示「添加維生素C」或「每顆糖果含維生素C○毫克」等與事實相符之陳述，惟不得作「高、多、強化、富含」或等同意義詞句之營養宣稱及生理功能例句。\n2. 另，倘符合「無糖」宣稱且未使用甜味劑之糖果類食品，得作「高、多、強化、富含」或等同意義詞句之營養宣稱及營養素之生理功能例句。"}, {"no": "Q5.24", "chapter": "五、營養宣稱", "content": "問：若碳酸飲料產品確實添加或含有特定營養素，是否可於外包裝上標示該營養素名稱或其含量？\n\n答：\n1. 碳酸飲料產品屬於「包裝食品營養宣稱應遵行事項」中表七所列之食品品項，倘產品確實添加或含有特定營養素，得於外包裝標示與事實相符之營養素或含量，例如添加維生素C、維生素C名稱之圖示等。惟產品整體表現仍不得使消費者誤解產品含高量之維生素C。\n2. 另，倘符合「無糖」宣稱之碳酸飲料產品，得作「高、多、強化、富含」或等同意義詞句之營養宣稱及營養素之生理功能例句。"}, {"no": "Q5.25", "chapter": "五、營養宣稱", "content": "問：若需經復水食品依產品標示調製後之100毫升液體作營養宣稱，營養標示只能使用「每份」（毫升為單位）及「每100毫升」之格式嗎？\n\n答：\n1. 依「包裝食品營養宣稱應遵行事項」第5點，復水食品倘依產品標示建議量調製後之100毫升液體之營養素含量，作為需適量攝取或可補充攝取營養素之營養衡量基準，其營養標示方式應與營養宣稱之衡量基準一致（即應以復水後之液體作為營養標示基準）。\n2. 另，營養標示格式應依「包裝食品營養標示應遵行事項」，復水後之液體所含熱量及營養素含量標示，以「每份」（毫升為單位）及「每100毫升」標示，並加註該產品每包裝所含之份數；或以「每份」（毫升為單位）及其所提供「每日參考值百分比」標示，並加註該產品每包裝所含之份數，擇一辦理。"}, {"no": "Q5.26", "chapter": "五、營養宣稱", "content": "問：請問奶粉類產品以沖泡後的牛奶液體作為宣稱型態，該營養宣稱是否可同時選擇，低脂以100毫升為衡量基準、高鈣以100大卡為衡量基準？\n\n答：依「包裝食品營養宣稱應遵行事項」第5點，需再經復水或稀釋才可供食用之食品（例如奶粉），倘欲於產品外包裝宣稱「低脂、高鈣」，應以產品標示建議量調製後的100毫升作為需適量攝取或可補充攝取營養素之營養宣稱衡量基準，不得以液體之100大卡為衡量基準。"}, {"no": "Q5.27", "chapter": "五、營養宣稱", "content": "問：如果我的產品，其糖含量為每100毫升含2.5公克，而每100大卡含膳食纖維3公克以上，皆為以液體100毫升為基準之規定，進行「低糖」與「高纖」之營養宣稱。其中，低糖宣稱符合「包裝食品營養宣稱應遵行事項」之表二第三欄（液體）每100毫升之糖含量不超過2.5公克宣稱標準，高纖宣稱符合該應遵行事項之表三第四欄（液體）每100大卡標準達到或超過3公克，該產品品名宣稱「低糖高纖」是否合乎該遵行事項之規定？\n\n答：\n1. 依據「包裝食品營養宣稱應遵行事項」，當一食品有二項或以上之營養素符合營養含量宣稱條件時，得同時作此等營養宣稱，但同一食品須以同型態【固體（半固體）或液體】作為衡量基準；其選擇以液體作為衡量基準者，以100毫升為原則；如以100大卡為衡量基準者，應於包裝上註明。\n2. 上述問題，建議同時以每100毫升液體作為衡量基準，達上開應遵行事項「低糖高纖」之標準，以利消費者辨識。如欲以每100毫升液體符合「低糖」及每100大卡液體符合「高膳食纖維」之情形，於產品外包裝標示、宣稱「低糖高纖」之字樣，應於外包裝註明，例如該產品每100大卡之膳食纖維含量或等同意義詞句表達膳食纖維衡量基準為每100大卡，以利消費者參考。"}, {"no": "Q5.28", "chapter": "五、營養宣稱", "content": "問：請問發泡錠產品是否適用於「包裝食品營養宣稱應遵行事項」，可同時宣稱「零熱量」、「低鈉」或「富含維生素C」？若可以，如何宣稱？例如：產品有標示每日限量1錠，建議以150毫升沖泡，其鈉含量每錠為150毫克，沖泡後其鈉含量相當為1毫克/毫升。\n\n答：\n1. 依「包裝食品營養宣稱應遵行事項」，如欲針對「需適量攝取之營養素」進行營養宣稱，應符合表一或表二所示之量；如欲針對「可補充攝取之營養素」進行營養宣稱，則每日最低攝取量須達到或超過表三所示之量。另，當一食品有二項以上之營養素符合營養素含量宣稱之條件時，得同時作此等營養宣稱，且同一食品須以同型態【固體（半固體）或液體】作為衡量基準。\n2. 發泡錠屬於膠囊狀、錠狀管理，且營養宣稱之衡量基準須同型態。以案內產品（每日最低攝取量1錠）同時宣稱「富含維生素C」、「零熱量」及「低鈉」，其宣稱基準方式有二，得擇一衡量之，如符合，則得同時宣稱「富含維生素C」、「零熱量」及「低鈉」：\n(1) 固體：1錠之維生素C含量須達到或超過30毫克；每100公克產品之熱量不得超過4大卡；每100公克產品之鈉含量不得超過120毫克。\n(2) 沖泡液：1錠沖泡成150毫升之維生素C含量須達到或超過30毫克；每100毫升沖泡液之熱量不得超過4大卡；每100毫升沖泡液之鈉含量不得超過120毫克。"}, {"no": "其他-Q1", "chapter": "其他", "content": "問：如果產品標示「本產品不額外添加砂糖，糖主要來自乳原料及異麥芽寡糖，原料中砂糖係由柑橘果膠夾帶而來，含量低於0.5%」，但其營養標示中糖含量卻超過0.5%，請問是否違法？\n\n答：\n1. 依據食品安全衛生管理法第28條規定，食品標示、宣傳或廣告，不得有不實、誇張或易生誤解之情形。如產品營養標示中糖含量超過0.5%，但確實不額外添加砂糖的情況下，於包裝上標示「本產品不額外添加砂糖，糖主要來自乳原料及異麥芽寡糖，原料中砂糖係由柑橘果膠夾帶而來」之文句，尚屬適法。\n2. 針對營養標示部分，依據「包裝食品營養標示應遵行事項」，「糖」定義為最終市售包裝食品所含單醣與雙醣總和，主要為葡萄糖、果糖、半乳糖、麥芽糖、蔗糖、乳糖之總和。"}, {"no": "其他-Q2", "chapter": "其他", "content": "問：產品可以標示「減脂」嗎？\n\n答：產品外包裝標示「減脂」字樣，倘影射產品減肥、塑身，涉及違反食品安全衛生管理法第28條，「涉及維持或改變人體器官、組織、生理或外觀之功能」，認定為涉及不實、誇張或易生誤解情形。"}]});

    },

  function escapeHtml(s) {
    return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');

  function highlight(text, q) {
    const escaped = escapeHtml(text);
    if (!q) return escaped;
    const escQ = q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    return escaped.replace(new RegExp(escQ, 'gi'), m => `<mark>${m}</mark>`);
  }

  // ---- 內容格式化：將附表資料轉為表格/清單 ----
  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function hlText(s, q) {
    if (!q) return escHtml(s);
    const safe = escHtml(s);
    const safeQ = escHtml(q).replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
    return safe.replace(new RegExp(safeQ, 'gi'), m => `<mark>${m}</mark>`);
  }

  function formatContent(text, q) {
    // 若 content 包含 HTML（reg-table-block），處理前綴純文字後直接輸出 HTML 部分
    if (text.includes('<div class="reg-table-block">')) {
      const idx = text.indexOf('<div class="reg-table-block">');
      const prefix = text.slice(0, idx).trim();
      let html = text.slice(idx);
      // 若尚無 table-scroll 容器，把每個 <table> 包進可橫向滾動的容器
      if (!html.includes('class="table-scroll"')) {
        html = html.replace(/<table /g, '<div class="table-scroll"><table ').replace(/<\/table>/g, '</table></div>');
      }
      const prefixHtml = prefix ? hlText(prefix, q).replace(/\n/g, '<br>') + '<br><br>' : '';
      // 注意：HTML 表格部分不在字串層做 regex highlight（會破壞 DOM 結構）
      // 改由呼叫端插入 DOM 後透過 highlightDomNode() 做 text-node 層級 highlight
      return prefixHtml + html;
    }
    if (!text.includes('【')) {
      // 若包含 @@TABLE，整段交給 formatAnnexBody 處理
      if (text.includes('@@TABLE')) {
        return formatAnnexBody(text, q);
      }
      // 純條文
      return hlText(text, q).replace(/\n/g, '<br>');
    }

    // 含【附表】區塊：拆分主文 vs 附表
    const blockRegex = /(【[^】]+】)/g;
    const parts = text.split(blockRegex);
    let html = '';

    for (let i = 0; i < parts.length; i++) {
      const part = parts[i];
      if (!part) continue;

      if (part.startsWith('【') && part.endsWith('】')) {
        html += `<div class="annex-wrap"><div class="annex-subtitle">${hlText(part, q)}</div>`;
        i++;
        const body = (parts[i] || '').trim();
        html += formatAnnexBody(body, q);
        html += '</div>';
      } else {
        const trimmed = part.trim();
        if (trimmed) {
          html += hlText(trimmed, q).replace(/\n/g, '<br>');
        }
      }
    }
    return html;
  }

  function formatAnnexBody(body, q) {
    if (!body) return '';
    const lines = body.split('\n').map(l => l.trim());
    let html = '';
    let i = 0;

    while (i < lines.length) {
      const line = lines[i];
      if (!line) { i++; continue; }

      // @@TABLE … @@END：多欄表格（欄位以 || 分隔）
      if (line === '@@TABLE') {
        i++;
        const rows = [];
        while (i < lines.length && lines[i] !== '@@END') {
          rows.push(lines[i]);
          i++;
        }
        if (lines[i] === '@@END') i++;
        if (rows.length === 0) continue;

        const headers = rows[0].split('||');
        html += '<div style="overflow-x:auto;margin:10px 0"><table class="annex-table" style="min-width:600px"><thead><tr>';
        headers.forEach(h => { html += `<th>${hlText(h.trim(), q)}</th>`; });
        html += '</tr></thead><tbody>';
        for (let r = 1; r < rows.length; r++) {
          if (!rows[r].trim()) continue;
          const cells = rows[r].split('||');
          html += '<tr>';
          cells.forEach((c, ci) => {
            const style = ci === 0 ? ' style="white-space:nowrap;font-weight:600"' : (ci === 1 ? ' style="white-space:nowrap;font-size:12px;color:var(--muted)"' : '');
            html += `<td${style}>${hlText(c.trim(), q)}</td>`;
          });
          html += '</tr>';
        }
        html += '</tbody></table></div>';
        continue;
      }

      // 數字小標題（如 1. 總砷及無機砷：）
      const numHeader = line.match(/^(\d+)\.\s(.+)/);
      if (numHeader) {
        html += `<div class="annex-subtitle" style="margin-top:12px">${hlText(line, q)}</div>`;
        i++;
        continue;
      }

      // 中文數字小標題（一、二、）
      if (/^[一二三四五六七八九十]+、/.test(line)) {
        html += `<div class="annex-subtitle" style="margin-top:8px">${hlText(line, q)}</div>`;
        i++;
        continue;
      }

      // 備註文字
      if (line.startsWith('備註') || line.startsWith('註')) {
        html += `<div style="font-size:12.5px;color:var(--muted);margin-top:8px">${hlText(line, q)}</div>`;
        i++;
        continue;
      }

      // • 開頭清單項目：收集連續的
      if (line.startsWith('•') || line.startsWith('‧') || line.startsWith('- ')) {
        const items = [];
        while (i < lines.length && (lines[i].startsWith('•') || lines[i].startsWith('‧') || lines[i].startsWith('- '))) {
          items.push(lines[i].replace(/^[•‧]\s*/, '').replace(/^- /, ''));
          i++;
        }

        // 判斷每個 item 是否為「食品名：限量值」格式 → 表格
        // 特徵：item 含有「：」，且「：」後的部分看起來像數值或短說明
        const isLimitTable = items.length >= 2 && items.every(it => {
          const colonIdx = it.indexOf('：');
          if (colonIdx < 0) return false;
          const val = it.slice(colonIdx + 1).trim();
          return val.length < 80; // 值部分不超過80字
        });

        if (isLimitTable) {
          html += '<table class="annex-table"><thead><tr><th>食品品項</th><th>限量 / 規定</th></tr></thead><tbody>';
          items.forEach(it => {
            const colonIdx = it.indexOf('：');
            const k = it.slice(0, colonIdx).trim();
            const v = it.slice(colonIdx + 1).trim();
            html += `<tr><td>${hlText(k, q)}</td><td>${hlText(v, q)}</td></tr>`;
          });
          html += '</tbody></table>';
        } else {
          html += '<ul class="annex-list">';
          items.forEach(it => { html += `<li>${hlText(it, q)}</li>`; });
          html += '</ul>';
        }
        continue;
      }

      // 「品名（英文）：說明文字。」格式的品項行（天然色素、加工助劑附表）
      // 特徵：行首為中文字，含有（ 或 (，含有「：」
      if (/^[\u4e00-\u9fff]/.test(line) && /[（(]/.test(line) && line.includes('：')) {
        // 收集連續的同類行
        const rows = [];
        while (i < lines.length && /^[\u4e00-\u9fff]/.test(lines[i]) && /[（(]/.test(lines[i]) && lines[i].includes('：')) {
          rows.push(lines[i]);
          i++;
        }
        // 每行格式：品名（英文）：說明
        html += '<table class="annex-table"><thead><tr><th>品名</th><th>說明</th></tr></thead><tbody>';
        rows.forEach(r => {
          // 拆：品名（英文）  vs  說明
          const colonIdx = r.indexOf('：');
          const nameRaw = r.slice(0, colonIdx).trim();
          const desc = r.slice(colonIdx + 1).trim();
          // 把「英文名稱」提取並以淺色顯示
          const nameFmt = nameRaw.replace(/[（(][^）)]+[）)]/g, m =>
            `<span style="font-size:12px;color:var(--muted)">${escHtml(m)}</span>`
          );
          html += `<tr><td style="white-space:nowrap">${q ? nameFmt.replace(new RegExp(escHtml(q).replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'gi'), m=>`<mark>${m}</mark>`) : nameFmt}</td><td>${hlText(desc, q)}</td></tr>`;
        });
        html += '</tbody></table>';
        continue;
      }

      // 一般行
      html += hlText(line, q) + '<br>';
      i++;
    }
    return html;
  }

    function renderArticleList(articles, q) {
    const list = document.getElementById('articleList');
    list.innerHTML = '';
    let lastChapter = null;
    let matchCount = 0;

    articles.forEach(a => {
      const matches = !q || a.no.includes(q) || a.content.includes(q);
      if (!matches) return;
      matchCount++;

      if (a.chapter && a.chapter !== lastChapter) {
        lastChapter = a.chapter;
        const div = document.createElement('div');
        div.className = 'chapter-divider';
        div.innerHTML = `<span>${a.chapter}</span><div class="rule"></div>`;
        list.appendChild(div);
      }

      const card = document.createElement('div');
      card.className = 'article-card' + (q ? ' open hl' : '');
      card.setAttribute('data-no', a.no);

      const _previewText = a.content.includes('<') ? a.content.slice(0, a.content.indexOf('<')) : a.content;
      const _isTable = _previewText.trim().startsWith('@@TABLE') || _previewText.trim() === '';
      const preview = _isTable ? '' : _previewText.split('\n')[0].slice(0, 60);

      card.innerHTML = `
        <div class="article-head">
          <span class="art-no">${a.no}</span>
          <span class="art-preview">${highlight(preview, q)}</span>
          <svg class="caret" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
        </div>
        <div class="article-body">${formatContent(a.content, q)}</div>
      `;
      card.querySelector('.article-head').addEventListener('click', () => {
        card.classList.toggle('open');
      });

      // 若有搜尋關鍵字，對 reg-table-block 內的 text node 做 DOM-level highlight
      // （避免用 regex 替換 HTML 字串破壞表格結構）
      if (q) {
        const rtb = card.querySelector('.reg-table-block');
        if (rtb) {
          const safeQ = q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
          const re = new RegExp('(' + safeQ + ')', 'gi');
          const walker = document.createTreeWalker(rtb, NodeFilter.SHOW_TEXT);
          const textNodes = [];
          let node;
          while ((node = walker.nextNode())) textNodes.push(node);
          textNodes.forEach(tn => {
            if (!re.test(tn.nodeValue)) return;
            re.lastIndex = 0;
            const frag = document.createDocumentFragment();
            let last = 0, m;
            while ((m = re.exec(tn.nodeValue)) !== null) {
              if (m.index > last) frag.appendChild(document.createTextNode(tn.nodeValue.slice(last, m.index)));
              const mark = document.createElement('mark');
              mark.textContent = m[1];
              frag.appendChild(mark);
              last = re.lastIndex;
            }
            if (last < tn.nodeValue.length) frag.appendChild(document.createTextNode(tn.nodeValue.slice(last)));
            tn.parentNode.replaceChild(frag, tn);
          });
        }
      }

      // 若有搜尋關鍵字，過濾表格中不相關的列
      if (q) {
        card.querySelectorAll('table').forEach(table => {
          const tbody = table.querySelector('tbody');
          if (!tbody) return;
          const rows = Array.from(tbody.querySelectorAll('tr'));
          if (rows.length < 4) return; // 太小的表不過濾

          const qLower = q.toLowerCase();

          // 判斷是否為 section header row（含 cat-row class，或只有一個 td 且有 colspan）
          function isSectionHeader(tr) {
            const tds = tr.querySelectorAll('td');
            if (tds.length === 0) return false;
            if (tds[0].classList.contains('cat-row')) return true;
            if (tds.length === 1 && parseInt(tds[0].getAttribute('colspan') || '1') > 1) return true;
            return false;
          }

          // 先標記每行是否「直接命中」
          rows.forEach(tr => {
            tr.dataset.hit = (!isSectionHeader(tr) && tr.textContent.toLowerCase().includes(qLower)) ? '1' : '0';
          });

          // Section header：往後找，若有任何子行命中則顯示
          rows.forEach((tr, idx) => {
            if (isSectionHeader(tr)) {
              let anyChildHit = false;
              for (let j = idx + 1; j < rows.length; j++) {
                if (isSectionHeader(rows[j])) break;
                if (rows[j].dataset.hit === '1') { anyChildHit = true; break; }
              }
              tr.style.display = anyChildHit ? '' : 'none';
            } else {
              tr.style.display = tr.dataset.hit === '1' ? '' : 'none';
            }
          });
        });
      }

      list.appendChild(card);
    });

    document.getElementById('matchInfo').textContent = q
      ? `符合關鍵字「${q}」共 ${matchCount} 條`
      : `共 ${articles.length} 條`;

    if (matchCount === 0) {
      list.innerHTML = `<div class="empty-note">找不到符合的條文</div>`;
    }
  }
