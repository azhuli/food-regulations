<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>食品法規快速查詢</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2563eb">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;600;700;900&family=Noto+Sans+TC:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #F8F4EA;
    --bg-alt: #F1EADC;
    --tea: #A9784C;
    --tea-dark: #6E4E30;
    --tea-light: #E4D2B4;
    --tea-tint: #F0E3CB;
    --ink: #3B362F;
    --gray: #746C60;
    --gray-soft: #A79E90;
    --line: #DCD2BF;
    --seal: #8C4A3A;
    --muted: #8A8278;
    --radius: 14px;
    --shadow: 0 2px 10px rgba(59,54,47,0.06), 0 10px 30px rgba(59,54,47,0.05);
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: "Noto Sans TC", sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  body {
    background-image:
      radial-gradient(circle at 50% 0%, rgba(169,120,76,0.06), transparent 60%);
  }

  a { color: inherit; text-decoration: none; }

  /* ---------- Header ---------- */
  header.site-header {
    border-bottom: 1px solid var(--line);
    background: linear-gradient(180deg, var(--bg-alt) 0%, var(--bg) 100%);
  }

  .header-inner {
    max-width: 1080px;
    margin: 0 auto;
    padding: 28px 24px 22px;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 20px;
    flex-wrap: wrap;
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .brand-mark {
    width: 46px;
    height: 46px;
    border-radius: 10px;
    background: var(--tea);
    color: #FBF6EC;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: "Noto Serif TC", serif;
    font-weight: 700;
    font-size: 20px;
    letter-spacing: 1px;
    flex-shrink: 0;
    box-shadow: var(--shadow);
  }

  .brand-text h1 {
    margin: 0;
    font-family: "Noto Serif TC", serif;
    font-weight: 700;
    font-size: 22px;
    letter-spacing: 0.5px;
    color: var(--tea-dark);
  }

  .brand-text p {
    margin: 4px 0 0;
    font-size: 13px;
    color: var(--gray);
    letter-spacing: 0.5px;
  }

  .header-meta {
    font-size: 12.5px;
    color: var(--gray-soft);
    text-align: right;
    line-height: 1.6;
    font-variant-numeric: tabular-nums;
  }

  .header-meta strong {
    color: var(--gray);
    font-weight: 600;
  }

  /* ---------- Search bar ---------- */
  .search-wrap {
    max-width: 1080px;
    margin: 0 auto;
    padding: 22px 24px 0;
  }

  .search-box {
    display: flex;
    align-items: center;
    gap: 10px;
    background: #FFFDF8;
    border: 1px solid var(--line);
    border-radius: 999px;
    padding: 12px 18px;
    box-shadow: var(--shadow);
  }

  .search-box svg { flex-shrink: 0; color: var(--gray-soft); }

  .search-box input {
    border: none;
    outline: none;
    background: transparent;
    font-size: 15px;
    font-family: "Noto Sans TC", sans-serif;
    color: var(--ink);
    width: 100%;
  }

  .search-box input::placeholder { color: var(--gray-soft); }

  /* ---------- Section title ---------- */
  main {
    max-width: 1080px;
    margin: 0 auto;
    padding: 30px 24px 80px;
  }

  .section-eyebrow {
    display: flex;
    align-items: center;
    gap: 10px;
    margin: 8px 0 20px;
  }

  .section-eyebrow .rule {
    flex: 1;
    height: 1px;
    background: var(--line);
  }

  .section-eyebrow span {
    font-size: 13px;
    color: var(--gray);
    letter-spacing: 2px;
  }

  /* ---------- Category grid ---------- */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
    gap: 18px;
  }

  .card {
    position: relative;
    background: #FFFDF8;
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 22px 20px 20px;
    cursor: pointer;
    transition: transform .18s ease, box-shadow .18s ease, border-color .18s ease;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  .card::before {
    content: "";
    position: absolute;
    top: 0; left: 0;
    width: 4px; height: 100%;
    background: var(--tea-light);
    transition: background .18s ease;
  }

  .card:hover {
    transform: translateY(-3px);
    box-shadow: var(--shadow);
    border-color: var(--tea-light);
  }

  .card:hover::before { background: var(--tea); }

  .card-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 10px;
  }

  .ordinal {
    font-family: "Noto Serif TC", serif;
    font-weight: 700;
    font-size: 15px;
    color: var(--tea);
    background: var(--tea-tint);
    border: 1px solid var(--tea-light);
    border-radius: 6px;
    padding: 2px 9px;
    letter-spacing: 1px;
  }

  .card-icon {
    width: 34px;
    height: 34px;
    border-radius: 9px;
    background: var(--tea-tint);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--tea-dark);
    flex-shrink: 0;
  }

  .card-icon svg { width: 18px; height: 18px; }

  .card h3 {
    font-family: "Noto Serif TC", serif;
    font-size: 18px;
    font-weight: 600;
    margin: 16px 0 6px;
    color: var(--ink);
    line-height: 1.4;
  }

  .card p.desc {
    margin: 0;
    font-size: 13px;
    color: var(--gray);
    line-height: 1.6;
    flex: 1;
  }

  .card-foot {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 16px;
    padding-top: 12px;
    border-top: 1px dashed var(--line);
  }

  .card-foot .count {
    font-size: 12px;
    color: var(--gray-soft);
  }

  .card-foot .go {
    font-size: 13px;
    color: var(--tea-dark);
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .card-foot .go svg {
    width: 14px; height: 14px;
    transition: transform .18s ease;
  }

  .card:hover .card-foot .go svg { transform: translateX(3px); }

  /* ---------- Placeholder view (layer 2/3 stub) ---------- */
  .view { display: none; }
  .view.active { display: block; }

  .back-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 13.5px;
    color: var(--tea-dark);
    font-weight: 600;
    cursor: pointer;
    margin-bottom: 18px;
    padding: 8px 4px;
  }
  .back-btn svg { width: 16px; height: 16px; }

  .stub-panel {
    background: #FFFDF8;
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 60px 30px;
    text-align: center;
    box-shadow: var(--shadow);
  }

  .stub-panel .stub-ordinal {
    font-family: "Noto Serif TC", serif;
    color: var(--tea);
    font-size: 14px;
    letter-spacing: 3px;
    margin-bottom: 10px;
  }

  .stub-panel h2 {
    font-family: "Noto Serif TC", serif;
    font-size: 24px;
    margin: 0 0 10px;
    color: var(--ink);
  }

  .stub-panel p {
    color: var(--gray);
    font-size: 14px;
    max-width: 420px;
    margin: 0 auto;
    line-height: 1.7;
  }

  /* ---------- List header (層二) ---------- */
  .list-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 16px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }

  .list-header .lh-ordinal {
    font-family: "Noto Serif TC", serif;
    font-weight: 700;
    font-size: 14px;
    color: var(--tea);
    background: var(--tea-tint);
    border: 1px solid var(--tea-light);
    border-radius: 6px;
    padding: 2px 9px;
    letter-spacing: 1px;
    margin-right: 8px;
  }

  .list-header h2 {
    font-family: "Noto Serif TC", serif;
    font-size: 22px;
    margin: 0;
    color: var(--ink);
    display: inline;
  }

  .list-header .lh-count {
    font-size: 12.5px;
    color: var(--gray-soft);
    white-space: nowrap;
    padding-top: 6px;
  }

  .mini-search {
    display: flex;
    align-items: center;
    gap: 8px;
    background: #FFFDF8;
    border: 1px solid var(--line);
    border-radius: 999px;
    padding: 9px 16px;
    box-shadow: var(--shadow);
    margin-bottom: 18px;
  }

  .mini-search svg { flex-shrink: 0; color: var(--gray-soft); }

  .mini-search input {
    border: none;
    outline: none;
    background: transparent;
    font-size: 14px;
    font-family: "Noto Sans TC", sans-serif;
    color: var(--ink);
    width: 100%;
  }

  .mini-search input::placeholder { color: var(--gray-soft); }

  /* ---------- Law list (層二清單) ---------- */
  .law-list {
    display: flex;
    flex-direction: column;
    border: 1px solid var(--line);
    border-radius: var(--radius);
    overflow: hidden;
    background: #FFFDF8;
    box-shadow: var(--shadow);
  }

  .law-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 15px 18px;
    cursor: pointer;
    border-bottom: 1px solid var(--line);
    transition: background .15s ease;
  }

  .law-item:last-child { border-bottom: none; }

  .law-item:hover { background: var(--tea-tint); }

  .law-icon {
    width: 30px;
    height: 30px;
    border-radius: 8px;
    background: var(--tea-tint);
    color: var(--tea-dark);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .law-icon svg { width: 15px; height: 15px; }

  .law-name {
    flex: 1;
    font-size: 14.5px;
    color: var(--ink);
    line-height: 1.5;
  }

  .law-tag {
    font-size: 11.5px;
    color: var(--tea-dark);
    background: var(--tea-tint);
    border: 1px solid var(--tea-light);
    border-radius: 999px;
    padding: 2px 9px;
    white-space: nowrap;
    font-variant-numeric: tabular-nums;
    flex-shrink: 0;
  }

  .law-item .chevron {
    width: 14px; height: 14px;
    color: var(--gray-soft);
    flex-shrink: 0;
    transition: transform .15s ease;
  }

  .law-item:hover .chevron { transform: translateX(3px); color: var(--tea-dark); }

  .empty-note {
    padding: 30px 18px;
    text-align: center;
    color: var(--gray-soft);
    font-size: 13.5px;
  }

  /* ---------- Article detail view (層三) ---------- */
  .jump-row {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 16px;
    padding: 12px;
    background: var(--bg-alt);
    border: 1px solid var(--line);
    border-radius: 10px;
    max-height: 96px;
    overflow-y: auto;
  }

  .jump-chip {
    font-size: 12px;
    font-family: "Noto Serif TC", serif;
    color: var(--tea-dark);
    background: #FFFDF8;
    border: 1px solid var(--tea-light);
    border-radius: 999px;
    padding: 3px 10px;
    cursor: pointer;
    white-space: nowrap;
    transition: background .15s ease, color .15s ease;
  }

  .jump-chip:hover { background: var(--tea); color: #FBF6EC; }

  .expand-toggle-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
    gap: 12px;
    flex-wrap: wrap;
  }

  #matchInfo {
    font-size: 12.5px;
    color: var(--gray-soft);
  }

  .expand-toggle-btns { display: flex; gap: 8px; }

  .mini-btn {
    font-family: "Noto Sans TC", sans-serif;
    font-size: 12.5px;
    color: var(--tea-dark);
    background: var(--tea-tint);
    border: 1px solid var(--tea-light);
    border-radius: 8px;
    padding: 6px 12px;
    cursor: pointer;
    transition: background .15s ease;
  }

  .mini-btn:hover { background: var(--tea-light); }

  .article-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .chapter-divider {
    display: flex;
    align-items: center;
    gap: 10px;
    margin: 18px 0 4px;
  }

  .chapter-divider:first-child { margin-top: 0; }

  .chapter-divider .rule {
    flex: 1;
    height: 1px;
    background: var(--line);
  }

  .chapter-divider span {
    font-family: "Noto Serif TC", serif;
    font-size: 13.5px;
    font-weight: 600;
    color: var(--tea-dark);
    letter-spacing: 1px;
    white-space: nowrap;
  }

  .article-card {
    background: #FFFDF8;
    border: 1px solid var(--line);
    border-radius: 12px;
    overflow: hidden;
    scroll-margin-top: 90px;
    transition: border-color .15s ease;
  }

  .article-card.hl { border-color: var(--tea); }

  .article-head {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 16px;
    cursor: pointer;
    user-select: none;
  }

  .article-head .art-no {
    font-family: "Noto Serif TC", serif;
    font-weight: 700;
    font-size: 14.5px;
    color: var(--tea-dark);
    background: var(--tea-tint);
    border-radius: 6px;
    padding: 2px 9px;
    flex-shrink: 0;
  }

  .article-head .art-preview {
    flex: 1;
    font-size: 13.5px;
    color: var(--gray);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .article-head .caret {
    width: 16px; height: 16px;
    color: var(--gray-soft);
    flex-shrink: 0;
    transition: transform .18s ease;
  }

  .article-card.open .caret { transform: rotate(90deg); }

  .article-body {
    display: none;
    padding: 0 16px 16px 16px;
    font-size: 14.5px;
    line-height: 1.9;
    color: var(--ink);
    white-space: pre-wrap;
    border-top: 1px dashed var(--line);
    padding-top: 12px;
  }
  /* reg-table-block 內不套用 pre-wrap */
  .article-body .reg-table-block,
  .article-body .reg-table-block * {
    white-space: normal;
  }

  /* ---------- 附表表格樣式 ---------- */
  .article-body .annex-wrap {
    white-space: normal;
    margin: 8px 0 14px 0;
  }
  .article-body .annex-wrap .annex-subtitle {
    font-weight: 600;
    color: var(--tea-dark);
    font-size: 13.5px;
    margin: 10px 0 4px 0;
    padding-left: 2px;
    border-left: 3px solid var(--tea);
    padding-left: 8px;
  }
  .article-body table.annex-table {
    white-space: normal;
    width: 100%;
    border-collapse: collapse;
    margin: 6px 0 12px 0;
    font-size: 13px;
    line-height: 1.55;
  }
  .article-body table.annex-table th,
  .article-body table.annex-table td {
    border: 1px solid var(--line);
    padding: 5px 9px;
    text-align: left;
    vertical-align: top;
  }
  .article-body table.annex-table th {
    background: var(--tea-light);
    color: var(--tea-dark);
    font-weight: 600;
  }
  .article-body table.annex-table tr:nth-child(even) td {
    background: rgba(0,0,0,.018);
  }
  .article-body .annex-list {
    white-space: normal;
    margin: 4px 0 10px 0;
    padding-left: 20px;
    font-size: 13.5px;
    line-height: 1.75;
  }
  .article-body .annex-list li { margin-bottom: 2px; }
  /* ── reg-table-block：附表直接嵌入 HTML 的表格樣式 ── */
  .reg-table-block {
    font-size: 13.5px;
    line-height: 1.6;
  }
  .reg-table-block .reg-intro {
    margin: 0 0 12px 0;
    color: var(--ink);
  }
  .reg-table-block .annex-h {
    font-size: 14px;
    font-weight: 700;
    color: var(--tea-dark);
    margin: 16px 0 8px 0;
    padding-bottom: 4px;
    border-bottom: 2px solid var(--tea);
  }
  .reg-table-block .annex-h2 {
    font-size: 13px;
    font-weight: 600;
    color: var(--ink);
    margin: 14px 0 5px 0;
    background: var(--tea-light);
    padding: 4px 8px;
    border-radius: 4px;
  }
  .reg-table-block table.annex-table,
  .reg-table-block table.reg-table {
    width: 100%;
    border-collapse: collapse;
    margin: 4px 0 12px 0;
    font-size: 13px;
    line-height: 1.5;
  }
  .reg-table-block .table-scroll {
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    margin: 4px 0 12px 0;
  }
  .reg-table-block .table-scroll table.annex-table,
  .reg-table-block .table-scroll table.reg-table {
    margin: 0;
    min-width: 360px;
  }
  .reg-table-block table.annex-table th,
  .reg-table-block table.annex-table td,
  .reg-table-block table.reg-table th,
  .reg-table-block table.reg-table td {
    border: 1px solid var(--line);
    padding: 5px 9px;
    text-align: left;
    vertical-align: top;
  }
  .reg-table-block table.annex-table th,
  .reg-table-block table.reg-table th {
    background: var(--tea-light);
    color: var(--tea-dark);
    font-weight: 600;
    white-space: nowrap;
  }
  .reg-table-block table.annex-table td.cat-row,
  .reg-table-block table.reg-table td.cat-row {
    background: rgba(0,0,0,.04);
    font-weight: 600;
    color: var(--tea-dark);
  }
  .reg-table-block table.annex-table tr:hover td:not(.cat-row),
  .reg-table-block table.reg-table tr:hover td:not(.cat-row) {
    background: var(--tea-light);
  }
  .reg-table-block .annex-notes {
    margin-top: 14px;
    padding: 10px 12px;
    background: rgba(0,0,0,.025);
    border-radius: 6px;
    border-left: 3px solid var(--tea);
    font-size: 12.5px;
    line-height: 1.7;
  }
  .reg-table-block .annex-notes .notes-title {
    font-weight: 700;
    color: var(--tea-dark);
    margin: 0 0 6px 0;
  }
  .reg-table-block .annex-notes ol {
    margin: 0;
    padding-left: 20px;
  }
  .reg-table-block .annex-notes li {
    margin-bottom: 3px;
    color: var(--muted);
  }
  

  .article-card.open .article-body { display: block; }

  .article-body mark, .art-preview mark, .law-name mark {
    background: var(--tea-light);
    color: var(--tea-dark);
    border-radius: 3px;
    padding: 0 2px;
  }

  /* ---------- External link button ---------- */
  .external-link-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: var(--tea);
    color: #FBF6EC;
    font-family: "Noto Sans TC", sans-serif;
    font-size: 14px;
    font-weight: 600;
    padding: 12px 22px;
    border-radius: 10px;
    text-decoration: none;
    transition: background .18s ease, transform .18s ease;
    box-shadow: var(--shadow);
  }

  .external-link-btn:hover {
    background: var(--tea-dark);
    transform: translateY(-2px);
    color: #FBF6EC;
  }

  .external-link-btn svg { flex-shrink: 0; }

  /* ---------- Footer ---------- */
  footer {
    border-top: 1px solid var(--line);
    padding: 22px 24px;
    text-align: center;
    font-size: 12.5px;
    color: var(--gray-soft);
  }

  /* ---------- Responsive ---------- */
  @media (max-width: 600px) {
    .header-inner { flex-direction: column; align-items: flex-start; }
    .header-meta { text-align: left; }
    .grid { grid-template-columns: 1fr; }
    main { padding: 24px 16px 60px; }
    .search-wrap { padding: 18px 16px 0; }
  }

  /* ---------- Dark mode ---------- */
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1A1612;
      --bg-alt: #211D18;
      --tea: #C8956A;
      --tea-dark: #E8B98A;
      --tea-light: #4A3525;
      --tea-tint: #2D2218;
      --ink: #EDE8DF;
      --gray: #B8B0A4;
      --gray-soft: #7A7268;
      --line: #3A342C;
      --seal: #C87060;
      --muted: #9A9088;
      --shadow: 0 2px 10px rgba(0,0,0,0.3), 0 10px 30px rgba(0,0,0,0.2);
    }

    body {
      background-image: radial-gradient(circle at 50% 0%, rgba(200,149,106,0.08), transparent 60%);
    }

    /* 搜尋框 */
    .search-box,
    .mini-search {
      background: #26211A;
      border-color: var(--line);
    }

    .search-box input,
    .mini-search input {
      color: var(--ink);
    }

    /* 第一層分類卡片 */
    .card {
      background: #221E19;

  // 解析法規名稱結尾的日期標記，例如 "_20190612" → 標籤 2019/06/12
  function parseLawName(raw) {
    let m = raw.match(/^(.*)_(\d{8})$/);
    if (m) {
      const d = m[2];
      return { name: m[1], tag: `${d.slice(0,4)}/${d.slice(4,6)}/${d.slice(6,8)}` };
    }
    m = raw.match(/^(.*)_(\d{6})$/);
    if (m) {
      const d = m[2];
      return { name: m[1], tag: `${d.slice(0,4)}/${d.slice(4,6)}` };
    }
    return { name: raw, tag: null };
  }

        <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
      `;
      const open = () => openLaw(cat, raw);

  const lawArticles = {"問答集_201812": [{"no": "壹-Q1", "chapter": "壹、應訂定食品安全監測計畫", "content": "問：訂定食品安全監測計畫之食品業者為何?\n\n答：\n1. 依據食品安全衛生管理法（下稱食安法)第7條第1項規定，食品業者應實施自主管理，訂定食品安全監測計畫，確保食品衛生安全。\n2. 衛生福利部107年9月20日以衛授食字第1071302231號公告修正「應訂定食品安全監測計畫與應辦理檢驗之食品業者、最低檢驗週期及其他相關事項」，其中應訂定食品安全監測計畫之食品業者類別、規模及實施日期如下：\n(1) 食用油脂之製造、加工、調配業者自105年7月31日實施（辦理工廠登記且資本額3,000萬元以上）；輸入業者自107年10月1日實施（辦理商業、公司或工廠登記，且半年內或單一批次輸入量達5公噸(含)以上）。\n(2) 肉類加工食品、乳品加工食品、水產加工食品之製造、加工、調配業者自105年7月31日實施（辦理工廠登記並符合相關HACCP準則規定）；輸入業者自107年10月1日實施（辦理商業、公司或工廠登記，肉類加工食品三個月內或單一批次達25公噸以上，乳品及水產加工食品達15公噸以上）。\n(3) 食品添加物之製造、加工、調配業者自105年7月31日實施（工廠登記且資本額3,000萬元以上）；輸入業者自106年7月31日實施（辦理商業、公司或工廠登記）。\n(4) 取得特殊營養食品查驗登記許可業者，自106年7月31日實施。\n(5) 黃豆輸入業者自107年10月1日實施，三個月內或單一批次達40公噸以上。\n(6) 玉米輸入業者自107年10月1日實施，三個月內或單一批次達150公噸以上。\n(7) 麥類及燕麥輸入業者自107年10月1日實施，三個月內或單一批次達460公噸以上。\n(8) 茶葉輸入業者自107年10月1日實施，三個月內或單一批次達10公噸以上。\n(9) 澱粉之製造、加工、調配業者自105年7月31日實施；輸入業者自107年10月1日實施，三個月內或單一批次達60公噸以上。\n(10) 麵粉之製造、加工、調配業者自105年7月31日實施；輸入業者自107年10月1日實施，三個月內或單一批次達20公噸以上。\n(11) 糖之製造、加工、調配業者自105年7月31日實施；輸入業者自107年10月1日實施，三個月內或單一批次達150公噸以上。\n(12) 食鹽（氯化鈉含量95%以上）之製造、加工、調配業者自105年7月31日實施；輸入業者自107年10月1日實施，三個月內或單一批次達15公噸以上。\n(13) 醬油之製造、加工、調配業者自105年7月31日實施；輸入業者自107年10月1日實施，三個月內或單一批次達700公斤以上。\n(14) 茶葉飲料之製造、加工、調配業者自105年7月31日實施（工廠登記且資本額3,000萬元以上）。\n(15) 綜合商品零售業者自106年7月31日實施，需達三家以上連鎖品牌獨立門市且資本額三千萬元以上、非百貨公司之業者。\n(16) 農產植物、菇(蕈)類及藻類製品之製造、加工、調配業者及輸入業者自107年10月1日實施。\n(17) 麵條、粉條類食品、食用醋、蛋製品及非屬麵粉、澱粉之農產植物磨粉製品之製造、加工、調配業者自107年10月1日實施。\n(18) 調味品、烘焙炊蒸食品、營養補充食品、非酒精飲料之製造、加工、調配業者自108年1月1日實施。\n(19) 巧克力及糖果、食用冰製品、膳食及菜餚、餐盒食品、其他食品之製造、加工、調配業者自109年1月1日實施。\n(20) 嬰幼兒食品(嬰兒與較大嬰兒配方食品除外)輸入業者自107年10月1日實施，三個月內或單一批次達1公噸以上。\n(21) 蜂產品食品輸入業者自107年10月1日實施，三個月內或單一批次達1公噸以上。\n3. 前述食品輸入業者之食品安全監測計畫，自訂定之年度起應為期至次年12月31日止。"}, {"no": "壹-Q2", "chapter": "壹、應訂定食品安全監測計畫", "content": "問：什麼是食品安全監測計畫？應含括什麼內容？建議需檢視或更新食品安全監測計畫情況為何？\n\n答：\n1. 食品安全監測計畫係於符合食品相關法規規範前提下，依照風險評估及危害分析與管制精神，就各產業特性於來源、輸入、製造、儲藏、銷售等各項重要管制環節均能善盡管理之責，其內容包括每一重要管制環節之管制項目、方法、頻率及操作人員。\n2. 本署公布「食品製造業者訂定食品安全監測計畫指引」及「食品輸入業者訂定食品安全監測計畫指引」供相關業者訂定計畫時參考。\n3. 當主管機關發布監測資訊、公告相關法規、衛生標準與指引；各國發布新知或警訊；新聞媒體報導或公協會報刊更新；及業者自身產品或其來源、輸入、製造、儲藏、銷售等各項重要管制環節異動時，須針對所訂定之食品安全監測計畫進行重新檢視及再確認。\n4. 參照美國聯邦法規規定「至少每三年須重新分析一次食品安全計畫」，建議食品業者倘前項所述資訊來源異動時，可重新檢視及再確認所訂定之食品安全監測計畫內容，以確保符合法規要求及業者自主管理之需求。"}, {"no": "壹-Q3", "chapter": "壹、應訂定食品安全監測計畫", "content": "問：業者如果已自有管理系統及相關程序書，是否須再撰寫一冊食品安全監測計畫書？\n\n答：如食品業者現有相關文件已涵蓋食品安全監測計畫指引內容，則尚無需另外訂定一本食品安全監測計畫書，惟應依據指引之附件「食品安全監測計畫自檢表(如製造業、輸入業、零售業)」，確認符合所有必備要件。"}, {"no": "壹-Q4", "chapter": "壹、應訂定食品安全監測計畫", "content": "問：經公告指定應訂定食品安全監測計畫之食品業者，如未訂定該計畫之罰則為何？\n\n答：依據食安法第48條規定，違反第7條第1項規定未訂定食品安全監測計畫，經命限期改正，屆期不改正者，處新臺幣三萬元以上三百萬元以下罰鍰。情節重大者，並得命其歇業、停業一定期間、廢止其公司、商業、工廠之全部或部分登記事項，或食品業者之登錄；經廢止登錄者，一年內不得再申請重新登錄。"}, {"no": "壹-Q5", "chapter": "壹、應訂定食品安全監測計畫", "content": "問：本公告所指各類食品業別之範圍為何？\n\n答：各相關範圍摘要如下：\n1. 「食用油脂」：包括來自植物、動物或海洋生物來源中提取之油脂或脂肪，不包括植物性奶精或乳製品油脂。\n2. 「肉類加工食品」製造業：以畜禽肉類或其雜碎類為主成分，含量達50%以上者，如冷藏冷凍畜禽生鮮肉品、醃漬肉品、香腸、乾燥肉品、調理肉品及肉類罐頭。\n3. 「乳品加工食品」製造業：以生乳或乳製品為原料，如鮮乳、保久乳、調味乳、乳粉、發酵乳、煉乳、乳油、乳酪等。\n4. 「水產加工食品」：產品含水產動物類含量達50%以上，如水產罐頭食品、冷凍冷藏水產食品、乾燥水產食品及其他水產食品。\n5. 「食品添加物」：單方食品添加物及複方食品添加物。\n6. 「黃豆」輸入業者：依食品藥物業者登錄平台之貨品分類號列查詢，輸入屬黃豆類者。\n7. 「玉米」輸入業者：依食品藥物業者登錄平台查詢，輸入屬玉米類者。\n8. 「麥類及燕麥」輸入業者：依食品藥物業者登錄平台查詢，輸入屬麥類及燕麥類者（含蕎麥、藜麥、黑小麥）。\n9. 「茶葉」輸入業者：依食品藥物業者登錄平台查詢，輸入屬茶葉類者（含綠茶、普洱茶、部分發酵茶、紅茶、馬黛茶類）。\n10. 「麵粉」：以食用小麥磨製之穀粉及相關產品。\n11. 「澱粉」：萃取後之植物組織中所含顆粒狀碳水化合物，不包括澱粉衍生物及穀物單純加工磨製而成的穀粉。\n12. 「食鹽」：氯化鈉含量95%以上，由海水、鹽礦或天然滷水精製所得，不包括低鈉鹽等鹽替代品。\n13. 「糖」：以甘蔗、甜菜為原料製成之蔗糖產品，如砂糖、冰糖、紅糖及黑糖等。\n14. 「醬油」：包括釀造醬油、速成醬油、水解醬油、混合或調合醬油等。\n15. 「茶葉飲料」：以茶樹之葉芽、葉梗為原料，製成完整包裝之液態飲料。\n16. 「金針」：以萱草之花蕾為原料，製成鮮品或乾品之製品。\n17. 「蘿蔔乾」：以蘿蔔之根部為原料，經分切、醃製、陰乾、曬乾等過程製作而成之製品。\n18. 「蜜餞」：以糖溶液醃漬或以糖溶液醃漬後乾燥的水果，不包括未以糖處理之產品。\n19. 「即食鮮食食品」：以0~18℃冷藏保存，可供直接食用或加(復)熱後供直接食用之生鮮、調理食品。\n20. 「現場調理即食食品」：於現場進行加熱、保溫、烹調之即食熟食，或於現場調理之各式冷盤小菜。\n21. 「直接生食之截切生鮮蔬果產品」：生鮮蔬菜及水果經篩選、清洗及輕度加工，以非原蔬果型態販售者，不包括供烹調用者。\n22. 「農產植物、菇(蕈)類及藻類製品」：以農產植物、菇(蕈)類及藻類為原料，細分為冷凍冷藏製品、脫水製品、醃漬製品、凝膠製品、餡料製品、植物蛋白及其製品、大豆加工製品等7項。\n23. 「蜂產品食品」輸入業者：輸入屬蜂產品類（天然蜜、蜂王漿及其他蜂產品）者。\n24. 「麵條、粉條類食品」：以麵粉、米、綠豆或其他食用澱粉或穀物雜糧為主原料，製成細長、扁平或其他形狀之成品。\n25. 「食用醋」：包含釀造食醋、調理食醋及合成食醋。\n26. 「蛋製品」：以蛋為原料，細分為液蛋、乾燥蛋品、醃漬蛋品及其他蛋品等4項。\n27. 「非屬麵粉、澱粉之農產植物、菇(蕈)類及藻類磨粉製品」：如穀粉、豆類粉、根莖類粗細粉、咖啡粉等。\n28. 「調味品」：細分為非屬醬油、食用醋之其他釀造調味品及其他調味品兩類。\n29. 「烘焙炊蒸食品」：細分為麵包、饅頭類及其他烘焙炊蒸食品兩類。\n30. 「營養補充食品」：以補充膳食營養為目的，型態包括膠囊、錠狀、粉體或液體產品。\n31. 「非酒精飲料」：細分為包裝飲用水、碳酸飲料及其他飲料三類。\n32. 「巧克力及糖果」：巧克力及各式糖果製品。\n33. 「食用冰製品」：包含冰棒、冰淇淋、霜淇淋、刨冰、食用冰塊等。\n34. 「膳食及菜餚」：冷凍、罐裝或真空包裝保存之膳食及菜餚，如微波食品、冷凍熟水餃等。\n35. 「餐盒食品」：以米、麵等穀類或加工品為主食，搭配農、畜或水產等原料，配膳組合成盒或盛裝於大容器之即食產品。\n36. 「嬰幼兒食品」輸入業者：依食品藥物業者登錄平台查詢，輸入屬嬰幼兒食品類者。\n37. 「其他食品」：非屬上列之食品。"}, {"no": "壹-Q5-1", "chapter": "壹、應訂定食品安全監測計畫", "content": "問：如果購買上游業者已磨好之各種植物粉，僅再加以混合調配成沖泡包，是否屬公告之「非屬麵粉、澱粉之農產植物、菇(蕈)類及藻類磨粉製品」之製造、加工、調配業者？\n\n答：查條文內容係「非屬麵粉、澱粉之農產植物、菇(蕈)類及藻類磨粉製品之製造、加工、調配業者」，爰僅具調配行為之業者，仍屬該業別範圍。"}, {"no": "壹-Q5-2", "chapter": "壹、應訂定食品安全監測計畫", "content": "問：蛋糕、麵包、美乃滋等有使用蛋為原料，是否屬公告之蛋製品之製造、加工、調配業者？\n\n答：本公告所指蛋製品係以蛋作為全部或主要成分之產品，例如水煮蛋、皮蛋、蛋粉等。如產品使用到蛋原料，但非以蛋為主要成分之產品（如蛋糕、麵包、美乃滋等），尚非屬公告之蛋製品之製造、加工、調配業者。"}, {"no": "壹-Q6", "chapter": "壹、應訂定食品安全監測計畫", "content": "問：公告應建立食品安全監測計畫及實施強制檢驗之食品添加物輸入業者，排除依食品安全衛生管理法第30條第3項免申請食品輸入查驗者，所指為何？\n\n答：如進口人依食品安全衛生管理法第30條第3項輸入食品添加物非供販賣，且其金額、數量符合中央主管機關公告或經中央主管機關專案核准者，得免申請查驗者，尚無須建立食品安全監測計畫及實施強制檢驗。惟輸入食品添加物如已辦理輸入食品查驗，取得輸入許可通知，則不論是否供販售用途，皆應建立食品安全監測計畫及實施強制檢驗。"}, {"no": "壹-Q7", "chapter": "壹、應訂定食品安全監測計畫", "content": "問：食品輸入業者針對輸入多項產品類別時，應分別訂定食品安全監測計畫？\n\n答：不需要，食品業者可在一份食品安全監測計畫書內涵蓋多項產品類別，並可依據指引之附件「食品安全監測計畫自檢表」中，「產品類別」複選及填寫多項產品類別。"}, {"no": "壹-Q8", "chapter": "壹、應訂定食品安全監測計畫", "content": "問：輸入業負責人如同時有三家公司名稱，三家公司之程序文件是否可共用？\n\n答：三家公司如各自之輸入產品流程及管理措施相同，程序文件可共用，不須各寫成三份程序文件。然程序文件抬頭建議列上三家公司名稱，並各自填報自檢表。"}, {"no": "壹-Q9", "chapter": "壹、應訂定食品安全監測計畫", "content": "問：食品追溯追蹤管理資訊系統是否有協助計算輸入量之功能，以便業者確認是否執行食品安全監測計畫？\n\n答：現行食品追溯追蹤管理資訊系統已有將「收貨資料」資料(輸入重量)匯出成EXCEL功能，業者可藉由其計算貴司每季的輸入量，以確認是否需要執行食品安全監測計畫。"}, {"no": "貳-一-Q1", "chapter": "貳、應辦理檢驗之食品業者、最低檢驗週期及其他相關事項（強制檢驗）", "content": "問：依據107年9月20日公告修正，應辦理強制檢驗的類別規模及實施日期？\n\n答：應辦理強制檢驗之食品業者類別、規模及實施日期如下：\n1. 食用油脂之製造、加工、調配業者（工廠登記且資本額3,000萬元以上）自103年10月31日實施；輸入業者（辦理商業、公司或工廠登記）自105年7月31日實施。\n2. 肉類加工食品、乳品加工食品、水產加工食品之製造、加工、調配業者（工廠登記並符合HACCP準則）自103年12月31日實施；輸入業者（辦理商業、公司或工廠登記）自107年10月1日實施。\n3. 食品添加物製造、加工、調配業者及輸入業者（辦理商業、公司或工廠登記）自103年12月31日實施。\n4. 取得特殊營養食品查驗登記許可業者（辦理商業、公司或工廠登記）自103年12月31日實施。\n5. 黃豆、玉米、麥類及燕麥、茶葉輸入業者（辦理商業、公司或工廠登記）自107年10月1日實施。\n6. 麵粉、澱粉、食鹽、糖、醬油之製造、加工、調配業者（工廠登記且資本額3,000萬元以上）自104年7月31日實施；輸入業者（辦理商業、公司或工廠登記）自107年10月1日實施。\n7. 茶葉飲料之製造、加工、調配業者（工廠登記且資本額3,000萬元以上）自104年7月31日實施。\n8. 綜合商品零售業者（三家以上連鎖品牌獨立門市且資本額3,000萬元以上、非百貨公司）自105年7月31日實施。\n9. 農產植物、菇(蕈)類及藻類製品、麵條粉條類食品、食用醋、蛋製品、非屬麵粉澱粉之農產植物磨粉製品之製造、加工、調配業者（工廠登記且資本額3,000萬元以上）自107年10月1日實施。\n10. 調味品、烘焙炊蒸食品、營養補充食品、非酒精飲料之製造、加工、調配業者（工廠登記且資本額3,000萬元以上）自107年10月1日實施。\n11. 巧克力及糖果、食用冰製品、膳食及菜餚、餐盒食品、其他食品之製造、加工、調配業者（工廠登記且資本額3,000萬元以上）自108年1月1日實施。\n12. 嬰幼兒食品（嬰兒與較大嬰兒配方食品除外）及蜂產品食品輸入業者（辦理商業、公司或工廠登記）自107年10月1日實施。"}, {"no": "貳-二-Q4", "chapter": "貳、應辦理檢驗之食品業者、最低檢驗週期及其他相關事項（強制檢驗）", "content": "問：食用油脂製造工廠及輸入業者，依公告強制實施必要檢驗之目的及內容為何？\n\n答：食用油脂業者應對其動物性油脂產品及植物性油脂產品，就原料、粗製原油、直接供食用之粗榨原油及精製油等階段，每半年或每批檢驗至少一次：\n1. 製造、加工、調配業者：\n(1) 動物性油脂產品：原料應檢驗動物用藥殘留、農藥殘留；粗製原油及精製油應檢驗重金屬、總極性化合物、苯駢芘(BaP)或其他依衛生安全風險擇定之衛生管理項目。\n(2) 植物性油脂產品：原料應檢驗農藥殘留、真菌毒素；供精製用之粗製原油及直接供食用之粗榨原油應檢驗重金屬、真菌毒素、總極性化合物、苯駢芘；精製油應檢驗重金屬、棉籽酚(使用棉籽油者)、總極性化合物、苯駢芘。\n2. 輸入業者：動物性油脂產品應檢驗重金屬、總極性化合物、苯駢芘；植物性油脂產品應檢驗重金屬、真菌毒素、總極性化合物、苯駢芘、棉籽酚(使用棉籽油者)。"}, {"no": "貳-二-Q4-1", "chapter": "貳、應辦理檢驗之食品業者、最低檢驗週期及其他相關事項（強制檢驗）", "content": "問：食用油脂製造工廠依公告應實施強制檢驗之項目為何列有總極性化合物？\n\n答：油脂是非極性的物質，在加熱過程中，會發生裂解或聚合作用，而產生醛、酮、酸等極性物質，這些極性物質的總稱為「總極性化合物」。依據GHP準則，油炸用油之總極性化合物含量達25%以上時，不得再予使用。為避免食用油脂製造業者所使用之原料來自於被使用過或品質劣化之油脂，爰訂定「總極性化合物」為食用油脂製造業之粗製（榨）原油、精製油的強制檢驗項目。"}, {"no": "貳-二-Q5", "chapter": "貳、應辦理檢驗之食品業者、最低檢驗週期及其他相關事項（強制檢驗）", "content": "問：水產加工食品、肉類加工食品及乳品加工食品之食品工廠或輸入業者，依公告強制實施必要檢驗之目的及內容為何？\n\n答：鑒於水產加工、肉類加工及乳品加工食品所使用的養殖動物性來源之主原料，如殘留有不符規定的動物用藥，無法以後續一般加工製程予以去除，相關業者應強制實施動物用藥殘留量或其他依衛生安全風險擇定之衛生管理項目檢驗，每季或每批至少一次：\n1. 水產加工食品之食品工廠：應對養殖魚貝類原料（含魚肉胚、魚漿、水產品乾貨、蜆精等）進行動物用藥殘留量檢驗。\n2. 肉類加工食品之食品工廠：應對畜禽肉類及其他可供食用部位原料（含家畜類、家禽類及其雜碎類與水煮後之肉胚）進行動物用藥殘留量檢驗。\n3. 乳品加工食品之食品工廠：應對生乳原料進行動物用藥殘留量檢驗。\n4. 水產加工食品、肉類加工食品、乳品加工食品之輸入業者：應對輸入之產品進行動物用藥殘留量或其他依衛生安全風險擇定之衛生管理項目檢驗，每季或每批至少一次。"}, {"no": "貳-二-Q6", "chapter": "貳、應辦理檢驗之食品業者、最低檢驗週期及其他相關事項（強制檢驗）", "content": "問：食品添加物之製造業者及輸入業者，依公告強制實施必要檢驗之目的及內容為何？\n\n答：食品添加物為高度風險項目，應由業者確行自主管理。對於單方食品添加物產品之成品、複方食品添加物產品之原料、半成品或成品，依公告檢驗週期辦理：\n1. 單方食品添加物產品：應檢驗重金屬含量或其他不純物或其他依衛生安全風險擇定之衛生管理項目。\n2. 複方食品添加物產品：業者應評估配方組成及製程之風險來源，選擇關鍵性檢驗項目，包括重金屬或其他不純物等。香料產品可就其共同使用之溶劑或載體進行重金屬或其他不純物之檢驗。\n3. 最低檢驗週期為每季或每批至少一次。業者可依風險管理原則，採週期性輪替檢驗，惟應有相關支持性或佐證資料。"}, {"no": "貳-二-Q7", "chapter": "貳、應辦理檢驗之食品業者、最低檢驗週期及其他相關事項（強制檢驗）", "content": "問：特殊營養食品業者（已取得查驗登記許可的業者），依公告強制實施必要檢驗之目的及內容為何？\n\n答：特殊營養食品提供使用族群為病人及嬰兒等具特殊及敏感性族群，應予加強管理。依照公告事項，取得查驗登記許可之特殊營養食品業者，強制實施檢驗：\n1. 特定疾病配方食品：應依產品屬性擇定微生物及營養素含量之衛生管制項目進行檢驗。\n2. 嬰兒與較大嬰兒配方食品：應參考相關衛生標準擇定微生物衛生管制項目，並參考CNS及CODEX對於嬰兒配方食品之營養素規定擇定營養素檢驗項目。\n3. 最低檢驗週期為每季或每批至少一次。"}, {"no": "貳-二-Q8", "chapter": "貳、應辦理檢驗之食品業者、最低檢驗週期及其他相關事項（強制檢驗）", "content": "問：黃豆、玉米、麥類及燕麥、茶葉輸入業者，以及資本額3,000萬元以上的茶葉飲料製造工廠，依公告強制實施必要檢驗之目的及內容為何？\n\n答：鑒於黃豆、玉米、麥類及燕麥、茶葉等農產品，如殘留有不符規定的農藥殘留、重金屬，或儲運過程受真菌滋長所產生之毒素汚染，難以後續一般加工製程予以去除，故要求業者每季或每批辦理以下項目的檢驗：\n(1) 黃豆產品：真菌毒素、農藥殘留、重金屬或其他依衛生安全風險擇定之衛生管理項目。\n(2) 玉米產品：真菌毒素、農藥殘留、重金屬或其他依衛生安全風險擇定之衛生管理項目。\n(3) 麥類及燕麥產品：真菌毒素、農藥殘留或其他依衛生安全風險擇定之衛生管理項目。\n(4) 茶葉產品：農藥殘留或其他依衛生安全風險擇定之衛生管理項目。\n(5) 茶葉飲料產品：針對其茶葉原料，檢驗農藥殘留或其他依衛生安全風險擇定之衛生管理項目。"}, {"no": "貳-二-Q9", "chapter": "貳、應辦理檢驗之食品業者、最低檢驗週期及其他相關事項（強制檢驗）", "content": "問：麵粉、澱粉、食鹽、糖及醬油輸入業者及資本額3,000萬元以上製造工廠，依公告強制實施必要檢驗之目的及內容為何？\n\n答：依照公告事項，每季或每批辦理以下項目的檢驗：\n(1) 製造、加工、調配業者：\nA. 麵粉：針對成品檢驗真菌毒素或其他依衛生安全風險擇定之衛生管理項目。\nB. 澱粉：針對農產植物原料檢驗真菌毒素、農藥殘留、重金屬；針對成品檢驗順丁烯二酸（酐）。\nC. 食鹽：針對成品檢驗重金屬。\nD. 糖：針對農產植物原料檢驗農藥殘留、重金屬；針對半成品或成品檢驗二氧化硫。\nE. 醬油：針對農產植物原料檢驗真菌毒素；針對半成品或成品檢驗單氯丙二醇（3-MCPD）。\n(2) 輸入業者：\nA. 麵粉：針對輸入產品檢驗真菌毒素。\nB. 澱粉：針對輸入產品檢驗順丁烯二酸（酐）。\nC. 食鹽：針對輸入產品檢驗重金屬。\nD. 糖：針對輸入產品檢驗二氧化硫。\nE. 醬油：針對輸入產品檢驗單氯丙二醇（3-MCPD）。"}, {"no": "貳-二-Q9-1", "chapter": "貳、應辦理檢驗之食品業者、最低檢驗週期及其他相關事項（強制檢驗）", "content": "問：食用澱粉輸入業者是否需對其農產植物原料辦理強制檢驗？\n\n答：不需要，食用澱粉輸入業者針對其輸入之食用澱粉成品，每季或每批應就順丁烯二酸(酐)或其他依衛生安全風險擇定之衛生管理項目至少檢驗一次。具工廠登記且資本額3,000萬元以上之澱粉製造業者，如以農產植物原料產製其產品，則應針對農產植物原料檢驗真菌毒素、農藥殘留、重金屬；該澱粉成品則應檢驗順丁烯二酸(酐)。"}, {"no": "貳-二-Q9-2", "chapter": "貳、應辦理檢驗之食品業者、最低檢驗週期及其他相關事項（強制檢驗）", "content": "問：達三家以上綜合商品零售業獨立門市之連鎖品牌，且資本額三千萬元以上、非百貨公司之綜合商品零售業者，依公告強制實施必要檢驗之目的及內容為何？\n\n答：鑒於市面金針、蘿蔔乾及蜜餞為常被發現使用漂白劑或防腐劑等食品添加物之產品，故要求相關業者依照公告事項辦理食品添加物之檢驗；另針對即食鮮食食品、現場調理即食食品及直接生食之截切生鮮蔬果產品，因其具有潛在微生物危害，故要求辦理微生物數量之檢驗。\n(1) 金針、蘿蔔乾、蜜餞：針對其成品或半成品，檢驗食品添加物用量或其他依衛生安全風險擇定之衛生管理項目。\n(2) 即食鮮食食品、現場調理即食食品及直接生食之截切生鮮蔬果產品：針對其成品，檢驗其微生物數量或其他依衛生安全風險擇定之衛生管理項目。"}, {"no": "貳-二-Q10", "chapter": "貳、應辦理檢驗之食品業者、最低檢驗週期及其他相關事項（強制檢驗）", "content": "問：農產植物、菇(蕈)類及藻類製品、麵條粉條類食品、食用醋、蛋製品、非屬麵粉澱粉之農產植物磨粉製品之製造工廠，以及農產植物製品輸入業者，依公告強制實施必要檢驗之內容為何？\n\n答：依照公告事項，每季或每批辦理以下項目的檢驗：\n(1) 製造、加工、調配業者：\nA. 農產植物、菇(蕈)類及藻類之冷凍、冷藏、脫水製品：針對農產植物原料檢驗真菌毒素、農藥殘留、重金屬。\nB. 醃漬、凝膠及餡料製品、植物蛋白及其製品、大豆加工製品：針對農產植物原料檢驗真菌毒素、農藥殘留、重金屬；針對半成品或成品檢驗食品添加物使用範圍及相關衛生標準。\nC. 麵條、粉條類食品：針對麵粉原料檢驗真菌毒素、食品添加物；針對麵粉以外之其他原料（不包含食品添加物、食用油脂或糖、食鹽、醬油等調味料）檢驗真菌毒素、農藥殘留、動物用藥殘留、重金屬；針對成品檢驗食品添加物使用範圍及相關衛生標準。\nD. 食用醋：針對農產植物原料檢驗真菌毒素、農藥殘留、重金屬；針對成品檢驗食品添加物使用範圍及衛生標準。\nE. 蛋製品：針對原料檢驗動物用藥殘留；針對半成品或成品檢驗食品添加物使用範圍及衛生標準。\nF. 非屬麵粉、澱粉之農產植物磨粉製品：針對農產植物原料檢驗真菌毒素、農藥殘留、重金屬；針對成品檢驗相關衛生標準。\n(2) 輸入業者：\nA. 冷凍、冷藏、脫水產品：針對輸入產品檢驗真菌毒素、農藥殘留、重金屬。\nB. 醃漬、凝膠、餡料製品、植物蛋白及其製品、大豆加工製品：針對輸入產品檢驗真菌毒素、農藥殘留、重金屬、食品添加物使用範圍及相關衛生標準。"}, {"no": "貳-二-Q10-1", "chapter": "貳、應辦理檢驗之食品業者、最低檢驗週期及其他相關事項（強制檢驗）", "content": "問：公告中所提之「農產植物、菇(蕈)類及藻類原料」範圍為何？\n\n答：「農產植物、菇(蕈)類及藻類原料」包括未經加工或僅輕度加工之水果類、蔬菜類、根莖類、菇(蕈)類子實體、藻類、穀物類、雜糧類、核果類等。不包含菇(蕈)類菌絲體、植物萃取液(粉)、植物濃縮液(粉)等。"}, {"no": "貳-二-Q11", "chapter": "貳、應辦理檢驗之食品業者、最低檢驗週期及其他相關事項（強制檢驗）", "content": "問：資本額3,000萬元以上之調味品、烘焙炊蒸食品、營養補充食品、非酒精飲料、巧克力及糖果、食用冰製品、膳食及菜餚、餐盒食品、其他食品之製造工廠，依公告強制實施必要檢驗之內容為何？\n\n答：依照公告事項，每季或每批至少一次辦理以下項目的檢驗：\n(1) 調味品：分為釀造調味品（針對農產植物原料檢驗真菌毒素、農藥殘留、重金屬；針對成品檢驗食品添加物使用範圍及衛生標準）和其他調味品（另需針對油脂類原料檢驗相關衛生標準）。\n(2) 烘焙炊蒸食品：麵包、饅頭類針對原料檢驗真菌毒素、農藥殘留、重金屬、漂白劑；針對成品檢驗相關衛生標準。\n(3) 營養補充食品：針對原料檢驗真菌毒素、農藥殘留、重金屬、塑化劑(膠囊殼)；針對成品檢驗相關衛生標準及重金屬。\n(4) 非酒精飲料：包裝飲用水及碳酸飲料針對成品檢驗相關衛生標準；其他飲料類另需針對農產植物原料檢驗真菌毒素、農藥殘留、重金屬。\n(5) 巧克力及糖果：針對成品檢驗相關衛生標準。\n(6) 食用冰製品：針對成品檢驗相關衛生標準。\n(7) 膳食及菜餚：針對成品檢驗相關衛生標準。\n(8) 餐盒食品：針對原料檢驗真菌毒素、農藥殘留、動物用藥殘留、重金屬；針對成品檢驗相關衛生標準。\n(9) 其他食品：針對原料、半成品或成品，檢驗依衛生安全風險擇定之衛生管理項目。"}, {"no": "貳-二-Q12", "chapter": "貳、應辦理檢驗之食品業者、最低檢驗週期及其他相關事項（強制檢驗）", "content": "問：嬰幼兒食品之輸入業者，依公告強制實施必要檢驗之目的及內容為何？\n\n答：嬰幼兒為社會大眾關注之族群，嬰幼兒食品為其主要食物來源，故針對其輸入之嬰幼兒食品產品，檢驗微生物、真菌毒素、農藥殘留、動物用藥殘留、重金屬或其他依衛生安全風險擇定之衛生管理項目。"}, {"no": "貳-二-Q13", "chapter": "貳、應辦理檢驗之食品業者、最低檢驗週期及其他相關事項（強制檢驗）", "content": "問：蜂產品食品之輸入業者，依公告強制實施必要檢驗之目的及內容為何？\n\n答：蜂產品食品之原料如有殘留不符規定的動物用藥、農藥等，尚難經由加工製程予以去除，故針對其輸入之蜂產品食品檢驗農藥殘留、動物用藥殘留或其他依衛生安全風險擇定之衛生管理項目。"}, {"no": "貳-三-Q14", "chapter": "貳、應辦理檢驗之食品業者、最低檢驗週期及其他相關事項（強制檢驗）", "content": "問：條文規定業者自行或送交其他檢驗機關（構）、法人或團體檢驗，應以中央主管機關訂定之檢驗方法，或國際間通用之檢驗方法為之，所謂「國際間通用之檢驗方法」為何？\n\n答：\n(1) 「國際間通用之檢驗方法」係指使用ISO國際標準化組織開發之方法，或其他國際上知名技術組織如AFNOR、MicroVal、AOAC與NordVal等；如使用替代方法(如快篩)須符合EN/ISO 16140標準或其他國際上可被接受之機構認證方法。\n(2) 各技術組織方法可至下列網站查詢：ISO(www.iso.org)、AFNOR(nf-validation.afnor.org)、AOAC(www.aoac.org)、NordVal(www.nmkl.org)。\n(3) 業者應對於檢驗方法之可信度有所確認及要求，並應定期以主管機關或法令規定之檢驗方法確認結果，避免檢驗流於形式。"}, {"no": "貳-三-Q15", "chapter": "貳、應辦理檢驗之食品業者、最低檢驗週期及其他相關事項（強制檢驗）", "content": "問：業者依公告進行強制檢驗，對於自行檢驗或委外檢驗的檢驗實驗室的規定為何？\n\n答：業者依公告事項進行自行檢驗或委外檢驗，進行相關檢驗之實驗室雖不強制須為認證實驗室，但建議自行檢驗之實驗室宜參照ISO/IEC 17025或CNS 17025等實驗室管理系統相關規範，或申請通過為認證實驗室（如取得TFDA或TAF等認證）；採委外檢驗時，宜優先委託認證實驗室，並注意採、送樣之代表性及保存方式。TFDA認證實驗室名單可逕上衛生福利部食品藥物管理署網站查詢。"}, {"no": "貳-四-Q16", "chapter": "貳、應辦理檢驗之食品業者、最低檢驗週期及其他相關事項（強制檢驗）", "content": "問：食用油脂業者進行強制性檢驗之最低檢驗週期？\n\n答：食用油脂業者依本公告事項，最低檢驗週期為每半年或每批至少一次，亦可依產品屬性自行評估增加檢驗頻率。若食用油脂產品應檢驗之原料、粗製原油、直接供食用之粗榨原油及精製油，倘屬不同種類、來源，或是其檢驗項目包含細項者，業者可依HACCP之精神、食用油脂製程特性、供應商管理及風險控管等原則，採週期性輪替檢驗，惟應有相關支持性或佐證資料，提供合理性說明。"}, {"no": "貳-四-Q17", "chapter": "貳、應辦理檢驗之食品業者、最低檢驗週期及其他相關事項（強制檢驗）", "content": "問：依據本公告應辦理強制檢驗的食品製造、加工、調配業別及零售業別，其最低檢驗週期為多久？\n\n答：強制檢驗的最低檢驗週期，除指定之食用油脂及綜合商品零售業者為每半年或每批次至少一次進行外，其餘皆為每季（即每三個月）至少一次，應檢驗的原料或成品若未能達到至少每季進料或出貨一次時，則改由逐批進行檢驗，業者亦可依產品屬性自行評估增加檢驗頻率。"}, {"no": "貳-四-Q18", "chapter": "貳、應辦理檢驗之食品業者、最低檢驗週期及其他相關事項（強制檢驗）", "content": "問：依據本公告強制檢驗之輸入產品的最低檢驗週期為多久？\n\n答：依據本公告強制性檢驗之輸入產品除食用油脂為每半年或每批至少一次外，其餘業別包括進口黃豆、玉米、小麥、茶葉、麵粉、澱粉、食鹽、糖及醬油等，強制檢驗之最低檢驗週期為每季一次（三個月）；若向本署申請輸入產品查驗批數未能達到每季至少一批時，則改為逐批檢驗。"}, {"no": "貳-四-Q19", "chapter": "貳、應辦理檢驗之食品業者、最低檢驗週期及其他相關事項（強制檢驗）", "content": "問：輸入食用油脂業者規定每半年自主檢驗產品1次，如果同一批產品輸入半年後尚有庫存，請問是否需針對該批輸入產品再進行第2次自主檢驗？\n\n答：本公告強制檢驗之輸入產品最低檢驗週期，係以自輸入產品之放行日期起，於每半年或每批至少進行一次檢驗，非指庫存期間。是以，輸入半年後之庫存食用油脂產品，尚無需強制檢驗第2次。"}, {"no": "貳-五-Q20", "chapter": "貳、應辦理檢驗之食品業者、最低檢驗週期及其他相關事項（強制檢驗）", "content": "問：強制檢驗結果紀錄的相關要求？\n\n答：食品業者依本公告所辦理之檢驗結果紀錄至少應保存5年，對於強制實施檢驗結果紀錄，業者應予以善用，檢驗結果如有不符相關法規規定者，應採取有效改善措施處理，並作成紀錄，進而落實自主管理。"}, {"no": "貳-五-Q21", "chapter": "貳、應辦理檢驗之食品業者、最低檢驗週期及其他相關事項（強制檢驗）", "content": "問：強制檢驗結果紀錄的記載事項？\n\n答：強制檢驗結果紀錄的記載事項，建議參照ISO/IEC 17025或CNS 17025等實驗室管理系統相關規範，並宜記載所採用檢驗方法，以及檢驗之原材料、半成品或成品之標記識別資訊等，可供追溯來源及追蹤該所製成之產品。衛生機關執行本公告事項之符合性查核時，業者應提供強制性檢驗結果紀錄及相關支持性或佐證等資料予其確認。"}, {"no": "貳-六-Q22", "chapter": "貳、應辦理檢驗之食品業者、最低檢驗週期及其他相關事項（強制檢驗）", "content": "問：未依規定實施強制檢驗的相關處分？\n\n答：如未依規定進行檢驗，將涉及違反食安法第7條第2項，可依同法第48條命限期改正，屆期不改正者，可處3萬元以上3百萬元以下罰鍰，情節重大者，並得命其歇業、停業一定期間、廢止其公司、商業、工廠之全部或部分登記事項，或食品業者之登錄；經廢止登錄者，一年內不得再申請重新登錄。"}, {"no": "貳-六-Q23", "chapter": "貳、應辦理檢驗之食品業者、最低檢驗週期及其他相關事項（強制檢驗）", "content": "問：如果強制檢驗報告的檢驗結果不符規定，業者應如何處理？\n\n答：業者對於檢驗結果可信度應有所確認及要求，避免檢驗流於形式，檢驗結果如有不符相關法規規定者，應採取有效改善措施處理，並予以作成紀錄，以確保食品衛生安全。並應依食品安全衛生管理法第7條第5項規定，於發現產品有危害衛生安全之虞時，應即主動停止製造、加工、販賣及辦理回收，並通報直轄市、縣（市）主管機關。"}, {"no": "貳-六-Q24", "chapter": "貳、應辦理檢驗之食品業者、最低檢驗週期及其他相關事項（強制檢驗）", "content": "問：經公告之食品業者只要進行強制檢驗，即可達到自主管理責任？\n\n答：不是，強制食品業者將重點項目進行必要之檢驗，是作為要求業者落實自主管理之其中一種方式，且自主管理並不以檢驗為唯一手段，業者對其產品製程管控及品保制度，仍應符合食品良好衛生規範準則等相關法規規定。本公告規定檢驗相關事項為基本要求，業者仍應依自主管理精神及風險控管原則，自行判定實施等同或優於基本要求之相關檢驗事項及其他檢驗項目。"}, {"no": "貳-七-Q25", "chapter": "貳、應辦理檢驗之食品業者、最低檢驗週期及其他相關事項（強制檢驗）", "content": "問：供應商若有提供檢驗報告或於衛生福利部食品藥物管理署邊境報驗時已抽驗合格，還是需要自行或委外檢驗嗎？\n\n答：如為應辦理檢驗的食品業者，對於應實施的強制檢驗，須由該業者自行檢驗或委外檢驗，該檢驗結果可與供應商所提供的檢驗報告互為確認比對，但不能以供應商提供的檢驗報告或邊境報驗抽驗合格，取代或規避實施強制性檢驗。"}, {"no": "貳-七-Q25-1", "chapter": "貳、應辦理檢驗之食品業者、最低檢驗週期及其他相關事項（強制檢驗）", "content": "問：有機農產品業者欲進口輸入有機黃豆時，依照農糧署規範，該業者需強制送至藥毒所檢驗，該檢驗報告是否可視為業者已執行強制檢驗？\n\n答：依據有機農產品管理作業要點，如業者輸入有機農產品且檢驗項目符合公告之檢驗項目，則該檢驗報告可視為業者已執行強制性檢驗，惟業者仍應依公告及週期輪替性檢驗建議事項，執行其他檢驗項目。"}, {"no": "貳-七-Q26", "chapter": "貳、應辦理檢驗之食品業者、最低檢驗週期及其他相關事項（強制檢驗）", "content": "問：輸入原裝進口產品如有國外原廠之檢驗報告，還是需要自行或委外檢驗嗎？\n\n答：輸入原裝進口產品之輸入業者，需依自主管理規定，針對其輸入之產品辦理自主檢驗。我國輸入業者與產品產製之國外原廠無論是否具有母公司與子公司關係，均應對已通關輸入我國且收貨之產品依風險管理原則進行抽樣檢驗。國外原廠之檢驗報告係對於該產品尚在原廠庫存或出貨前之時間點之檢驗結果，無法代表該產品於輸入後之時間點之檢驗結果。"}, {"no": "貳-七-Q27", "chapter": "貳、應辦理檢驗之食品業者、最低檢驗週期及其他相關事項（強制檢驗）", "content": "問：應實施強制檢驗的食品製造業者，對於受託代工製造或是產品的原材料、半成品或成品，是否也須依公告進行強制檢驗？\n\n答：是，應實施強制檢驗的食品製造業者，對於客戶委託製造產品，也須依公告進行強制檢驗；所有食品產品如有違反衛生安全等相關衛生法規規定之情事，則依食品安全衛生管理法等相關規定處辦。"}, {"no": "貳-七-Q28", "chapter": "貳、應辦理檢驗之食品業者、最低檢驗週期及其他相關事項（強制檢驗）", "content": "問：A公司某產品屬經公告應訂定食品安全監測計畫或應實施強制檢驗之業別範圍者，若委託B代工廠生產，但B代工廠非屬本公告規範者，此代工廠是否需訂定食品安全監測計畫或應實施強制檢驗？\n\n答：本公告內業別所定義之範圍，係屬規模符合且實際製造公告業別內產品者，倘實際製造者非為A公司，且B代工廠確實非屬規範內業者，則A公司及B代工廠皆無須訂定食品安全監測計畫及辦理強制檢驗。惟A公司及B代工廠仍須符合其他食品安全相關法規規定。如A公司製造之其他產品如屬公告業別者，仍須訂定食品安全監測計畫及辦理強制檢驗。A公司倘屬取得特殊營養食品查驗登記許可之業者，應對查驗登記許可產品負完全責任，應訂定食品安全監測計畫及應實施強制檢驗。"}, {"no": "貳-七-Q29", "chapter": "貳、應辦理檢驗之食品業者、最低檢驗週期及其他相關事項（強制檢驗）", "content": "問：食品業者已參加自願性驗證標章制度（如CAS標章認證），由該制度委託第三方所進行相關檢驗，是否可以視為強制檢驗？\n\n答：業者如依自願驗證標章制度之規定，由第三方單位於該指定實施強制檢驗業別、規模之食品工廠內進行相關原料、半成品或成品之抽驗，且該抽驗品項符合本公告事項之檢驗內容及檢驗方法，則該次抽驗可視為當次應檢頻率之強制檢驗。"}, {"no": "貳-七-Q29-1", "chapter": "貳、應辦理檢驗之食品業者、最低檢驗週期及其他相關事項（強制檢驗）", "content": "問：如業者因輸出產品向食藥署申請外銷證明，衛生局至業者工廠抽驗產品之檢驗報告是否可視為已執行強制檢驗？\n\n答：倘該抽驗檢驗報告之檢驗產品、檢驗項目符合強制性檢驗公告事項，且報告所示之委託者/申請廠商亦為業者，或報告加註業者名稱，則該次抽驗可視為當次應檢頻率之強制檢驗。惟業者不得將該外銷證明作為內銷證明之文件或作為廣告等用途。"}, {"no": "貳-八-Q30", "chapter": "貳、應辦理檢驗之食品業者、最低檢驗週期及其他相關事項（強制檢驗）", "content": "問：有關食品製造業者實施強制性檢驗之輪替性檢驗建議事項為何？\n\n答：強制檢驗旨在強化業者自主管理，考量檢驗資源及成本有效運用，每次最低檢驗週期之強制檢驗標的及項目，可在符合強制性檢驗公告規定之前提下，業者可依其HACCP、供應商管理、年度檢驗計畫、官方有關產品之安全資訊揭露及風險控管等原則，採合理「週期輪替檢驗」，惟應有相關支持性或佐證資料，提供合理性說明。詳細建議事項請參見原公告附件。"}, {"no": "貳-八-Q31", "chapter": "貳、應辦理檢驗之食品業者、最低檢驗週期及其他相關事項（強制檢驗）", "content": "問：針對大宗穀物（黃豆、麥類及燕麥、玉米）輸入業者，是否須訂定週期性輪替？\n\n答：考量實務上輸入業者，不會將進口之大宗穀物食品庫存太久，強制檢驗項目中真菌毒素會因儲存環境條件以及儲藏時間產生，因此不建議週期性輪替；至於農藥殘留、重金屬之週期性輪替，可由業者自行評估。針對不同產品或不同來源（產地）之大宗穀物應依最低檢驗週期實施強制檢驗。"}, {"no": "貳-八-Q32", "chapter": "貳、應辦理檢驗之食品業者、最低檢驗週期及其他相關事項（強制檢驗）", "content": "問：麵粉、澱粉、食鹽、糖、醬油、茶葉、肉類加工食品、乳品加工食品、水產加工食品、農產植物製品、嬰幼兒食品及蜂產品食品之輸入業者，是否須訂定週期性輪替？\n\n答：比照食品製造業者週期性輪替檢驗建議事項辦理。"}, {"no": "貳-八-Q32-1", "chapter": "貳、應辦理檢驗之食品業者、最低檢驗週期及其他相關事項（強制檢驗）", "content": "問：販賣金針、蘿蔔乾、蜜餞、即食鮮食食品、現場調理即食食品、直接生食之截切生鮮蔬果產品之綜合商品零售業者，是否得訂定週期性輪替？\n\n答：得比照「金針、蘿蔔乾、蜜餞、即食鮮食食品、現場調理即食食品、直接生食之截切生鮮蔬果產品週期輪替性檢驗建議事項」辦理。"}, {"no": "貳-九-Q33", "chapter": "貳、應辦理檢驗之食品業者、最低檢驗週期及其他相關事項（強制檢驗）", "content": "問：依據本公告，應辦理強制檢驗之製造、加工、調配業者，未包括改裝業者，請問改裝業者之定義為何？\n\n答：依「食品安全衛生管理法施行細則」第10條，「改裝業者」係指「分裝、切割、裝配、組合等改裝製程，且足以影響產品衛生安全者」，其亦屬製造業者，惟考量主要製程已納入強制檢驗範圍，爰該業別目前無須列入強制檢驗範圍。"}, {"no": "貳-九-Q34", "chapter": "貳、應辦理檢驗之食品業者、最低檢驗週期及其他相關事項（強制檢驗）", "content": "問：本公告規定之製造業者及取得特殊營養食品查驗登記許可之業者，如產品為商業樣品、展覽品、研發測試用品(不包含活動試吃產品或活動贈品)者，是否屬強制檢驗之範圍？\n\n答：考量製造業者及取得特殊營養食品查驗登記許可之業者，其商業樣品、展覽品、研發測試用品係內部或供客戶測試樣品為目的，非供消費者食用，且應無流入市面之虞，爰排除應辦理強制檢驗，惟仍須納入食品安全監測計畫及保存相關資料供衛生主管機關查核。"}, {"no": "貳-九-Q35", "chapter": "貳、應辦理檢驗之食品業者、最低檢驗週期及其他相關事項（強制檢驗）", "content": "問：本公告規定之輸入業者，其輸入產品依規定向食藥署申請食品輸入查驗並完成查驗，惟如屬自用品、商業樣品、展覽品、研發測試用品或非供食品用途者？\n\n答：辦理商業登記、公司登記或工廠登記之輸入業者，如輸入之產品為自用品、商業樣品、展覽品、研發測試用品或非供食品用途者，自107年10月1日起對於該輸入產品得免辦理強制檢驗，惟仍應依規定進行追溯追蹤管理及保存相關資料供衛生主管機關查核。"}, {"no": "貳-九-Q35-1", "chapter": "貳、應辦理檢驗之食品業者、最低檢驗週期及其他相關事項（強制檢驗）", "content": "問：辦理商業登記、公司登記或工廠登記之輸入業者輸入之產品，供作「自用品」是指那些？\n\n答：辦理商業登記、公司登記或工廠登記之輸入業者輸入之產品，供作該公司及其自家事業體（如兼具餐飲業者、製造業者）直接販賣、製造、加工、調配、包裝等，且其作為食品用途者；或商業活動（如展覽供食、試吃贈品）仍需辦理強制檢驗；排除上述者則屬「自用品」得免辦理強制檢驗。"}, {"no": "貳-九-Q36", "chapter": "貳、應辦理檢驗之食品業者、最低檢驗週期及其他相關事項（強制檢驗）", "content": "問：如A公司向上游業者(B公司)購入原料，B公司所提供之原料已屬經公告應訂定食品安全監測計畫或應實施強制檢驗者，A公司所製成之產品亦屬經公告之業別範圍，則A公司是否應訂定食品安全監測計畫或應實施強制檢驗？\n\n答：\n(1) 查公告條文內容係「製造、加工、調配業者」，爰經公告業別範圍之業者(A公司)即應依規定執行，不論其上游原料供應業者是否已屬應訂定食品安全監測計畫或應實施強制檢驗者。\n(2) 若業者考量檢驗資源及成本有效運用，可在符合強制性檢驗公告規定之前提下，採合理「週期輪替檢驗」，惟應有相關支持性或佐證資料。\n(3) 如非屬經公告應訂定食品安全監測計畫或應實施強制檢驗之範圍者，仍須符合食品安全衛生管理法、食品良好衛生規範準則及適用之衛生標準等相關衛生法規規定。"}, {"no": "貳-九-Q37", "chapter": "貳、應辦理檢驗之食品業者、最低檢驗週期及其他相關事項（強制檢驗）", "content": "問：強制檢驗可否委託國外第三方實驗室進行（並非原廠報告）？\n\n答：本署尚無規定，惟送驗人應為輸入業者自身公司，必須針對已通關輸入我國收貨之產品依風險管理原則進行抽樣檢驗，且不能以供應商提供的檢驗報告取代強制檢驗。建議檢驗之實驗室宜參照ISO/IEC 17025或CNS 17025等實驗室管理系統相關規範，或申請通過為認證實驗室。"}, {"no": "貳-九-Q38", "chapter": "貳、應辦理檢驗之食品業者、最低檢驗週期及其他相關事項（強制檢驗）", "content": "問：若多家工廠使用同一來源之原料進行加工，此原料送驗時，將使用此相同原料的各工廠列為送驗者，請問此份檢驗報告是否可被列名送驗者的工廠共用？\n\n答：本公告規定內業者，如各工廠均屬公告規範之應辦理強制檢驗業者，應個別依規定辦理相關檢驗事項，善盡源頭及自主管理之責。鑒於在不同工廠之使用及管理情形，可能因廠區環境、倉儲、運輸及製程等控管條件不同，導致危害發生，爰不得以當次共同送驗之檢驗報告作為各工廠各別之檢驗報告。"}, {"no": "貳-九-Q39", "chapter": "貳、應辦理檢驗之食品業者、最低檢驗週期及其他相關事項（強制檢驗）", "content": "問：輸入業者同一個負責人有A及B兩家公司，其檢驗報告上之送驗公司有並列A及B兩家公司，請問這份檢驗報告是否可同時代表兩家公司之強制檢驗報告？\n\n答：兩家公司分別為不同之權利義務主體，應善盡各自之義務辦理相關檢驗事項，因此此份報告不能同時代表兩家公司之檢驗報告，惟輸入同船艙，多家輸入業者共購之產品（如大宗物資、油脂等），統由公證公司取樣送驗者除外。"}, {"no": "貳-九-Q40", "chapter": "貳、應辦理檢驗之食品業者、最低檢驗週期及其他相關事項（強制檢驗）", "content": "問：負責人同時有不同事業體之輸入公司及製造公司，製造公司之原料皆來自輸入公司，如輸入公司已完成檢驗，製造公司是否於同一批號原料不需要再行檢驗？\n\n答：不同事業體之輸入公司及製造公司應個別依規定辦理相關檢驗事項，如輸入業者已完成檢驗，製造業者得無須對同一批號原料再行檢驗，惟應針對其半成品或成品採合理「週期輪替檢驗」，並有相關支持性或佐證資料，提供合理性說明。"}, {"no": "貳-九-Q41", "chapter": "貳、應辦理檢驗之食品業者、最低檢驗週期及其他相關事項（強制檢驗）", "content": "問：檢驗報告有顯示抬頭廠商名稱及申請廠商名稱，兩家名稱不同，請問此份檢驗報告是歸屬哪家廠商？\n\n答：依108年3月14日訂定「檢驗機構實驗室品質系統基本規範」7.8.2.1.之規定，每份檢驗報告應包括顧客名稱與聯絡資料，不得以共同送驗之檢驗報告作為個別公司之檢驗報告，得請業者提供檢驗委託單、檢驗機構與顧客之合約等憑據進行綜合研判，以利釐清該份檢驗報告歸屬之業者。"}, {"no": "貳-九-Q42", "chapter": "貳、應辦理檢驗之食品業者、最低檢驗週期及其他相關事項（強制檢驗）", "content": "問：食品輸入我國後進行加工及存放，但未進入國內販售，直接轉賣國外之業者，是否需要建立食品安全監測計畫及強制檢驗？如未進行加工及存放，直接轉賣國外之業者，是否需要建立食品安全監測計畫及強制檢驗？\n\n答：依現行衛生福利部107年9月20日衛授食字第1071302231號公告修正「應訂定食品安全監測計畫與應辦理檢驗之食品業者、最低檢驗週期及其他相關事項」中並無排除上述條件之業者，因此仍須建立食品安全監測計畫及強制檢驗。"}, {"no": "貳-九-Q43", "chapter": "貳、應辦理檢驗之食品業者、最低檢驗週期及其他相關事項（強制檢驗）", "content": "問：食品輸入業者輸入產品後，於邊境由下游業者直接運走，並由下游業者將產品送驗，檢驗報告上之送驗公司為下游業者，該檢驗報告是否可為該輸入業者的強制性檢驗報告？\n\n答：此份報告非屬該輸入業者之檢驗報告，其原因係下游業者取樣送檢，且檢驗報告上之送檢公司為下游業者。如輸入業者及下游業者均屬公告規範之應辦理強制檢驗業者，應個別依規定辦理相關檢驗事項。"}, {"no": "貳-九-Q44", "chapter": "貳、應辦理檢驗之食品業者、最低檢驗週期及其他相關事項（強制檢驗）", "content": "問：延續上述問題，食品輸入業者輸入產品後於邊境由下游業者直接拖走，那輸入業者要如何送驗？\n\n答：輸入業者應善盡源頭及自主管理之責任，依據訂定之抽樣計畫，取樣後自行或送交產品或其原材料、半成品或成品至其他檢驗機關（構）、法人或團體檢驗。"}],"包裝食品裝量檢驗法_19911114": [{"no": "第1條", "chapter": null, "content": "適用範圍：本標準規定食品罐頭及冷凍食品以外之包裝食品裝量檢驗方法，其他食品類國家標準有規定者，從其標準。"}, {"no": "第2條", "chapter": null, "content": "檢查試料：以開封後全部內容物行之。"}, {"no": "第3條", "chapter": null, "content": "秤量器：應使用感量在秤量仟分之一以下者。"}, {"no": "第4條", "chapter": null, "content": "檢查方法：先秤包裝食品之全重，記錄為A。將容器開啟後全部倒出，必要時以清水洗清容器，滴乾再秤，記錄為B。\n計算方法　　淨重＝A-B　　容量＝淨重／比重"}, {"no": "第5條", "chapter": null, "content": "抽驗數量<div class=\"reg-table-block\"><div class=\"table-scroll\"><table class=\"reg-table\">\n<thead>\n<tr>\n  <th colspan=\"2\">件數（註）</th>\n  <th rowspan=\"2\">應開驗件數</th>\n</tr>\n<tr>\n  <th>內容量1公斤（1公升）以下</th>\n  <th>內容量超過1公斤（1公升）以上</th>\n</tr>\n</thead>\n<tbody>\n<tr><td>1,200以下</td><td>600以下</td><td>3</td></tr>\n<tr><td>1,201至2,400</td><td>601至1,200</td><td>6</td></tr>\n<tr><td>2,401至4,800</td><td>1,201至2,400</td><td>13</td></tr>\n<tr><td>4,801至24,000</td><td>2,401至12,000</td><td>21</td></tr>\n<tr><td>24,001至48,000</td><td>12,001至24,000</td><td>29</td></tr>\n<tr><td>48,001至84,000</td><td>24,001至42,000</td><td>48</td></tr>\n<tr><td>84,001至144,000</td><td>42,001至72,000</td><td>84</td></tr>\n<tr><td>144,001至240,000</td><td>72,001至120,000</td><td>126</td></tr>\n<tr><td>超過240,000</td><td>超過120,000</td><td>200</td></tr>\n</tbody>\n</table></div>\n<p class=\"table-note\">註：件數係以最小單位包裝計。</p></div>"}, {"no": "第6條", "chapter": null, "content": "內容淨量容許負誤差<div class=\"reg-table-block\"><div class=\"table-scroll\"><table class=\"reg-table\">\n<thead>\n<tr>\n  <th rowspan=\"2\">標示量（公克或公撮）<br>（Nominal Quantity）N</th>\n  <th colspan=\"2\">容許負誤差t（Tolerable Negative Error）</th>\n</tr>\n<tr>\n  <th>百分比（％）</th>\n  <th>公克或公撮</th>\n</tr>\n</thead>\n<tbody>\n<tr><td>5-50</td><td>9.0</td><td>-</td></tr>\n<tr><td>50-100</td><td>-</td><td>4.5</td></tr>\n<tr><td>100-200</td><td>4.5</td><td>-</td></tr>\n<tr><td>200-300</td><td>-</td><td>9</td></tr>\n<tr><td>300-500</td><td>3.0</td><td>-</td></tr>\n<tr><td>500-1000</td><td>-</td><td>15</td></tr>\n<tr><td>1000-10000</td><td>1.5</td><td>-</td></tr>\n<tr><td>10000-15000</td><td>-</td><td>150</td></tr>\n<tr><td>15000以上</td><td>1.0</td><td>-</td></tr>\n</tbody>\n</table></div>\n<p class=\"table-note\">註：容許負誤差標示為百分比者，依百分比檢驗，未標示百分比者，則依重量（公克）或容量（公撮）檢驗。</p>\n<p>範例</p>\n<div class=\"table-scroll\"><table class=\"reg-table\">\n<thead>\n<tr>\n  <th rowspan=\"2\">標示量（N）<br>（公克或公撮）</th>\n  <th colspan=\"2\">容許負誤差（t）之表示</th>\n  <th rowspan=\"2\">最低限量（N-t）<br>公克或公撮</th>\n</tr>\n<tr>\n  <th>標示量之％</th>\n  <th>公克或公撮</th>\n</tr>\n</thead>\n<tbody>\n<tr><td>5</td><td>9</td><td>0.45</td><td>4.55</td></tr>\n<tr><td>15</td><td>9</td><td>1.35</td><td>13.65</td></tr>\n<tr><td>50</td><td>9</td><td>4.5</td><td>45.5</td></tr>\n<tr><td>75</td><td>6</td><td>4.5</td><td>70.5</td></tr>\n<tr><td>100</td><td>4.5</td><td>4.5</td><td>95.5</td></tr>\n<tr><td>200</td><td>4.5</td><td>9.0</td><td>191.0</td></tr>\n<tr><td>250</td><td>3.6</td><td>9.0</td><td>241.0</td></tr>\n<tr><td>400</td><td>3</td><td>12.0</td><td>388.0</td></tr>\n<tr><td>450</td><td>3</td><td>13.5</td><td>436.5</td></tr>\n<tr><td>600</td><td>2.5</td><td>15.0</td><td>585.0</td></tr>\n<tr><td>900</td><td>1.7</td><td>15.0</td><td>885.0</td></tr>\n<tr><td>1000</td><td>1.5</td><td>15.0</td><td>985.0</td></tr>\n</tbody>\n</table></div></div>"}, {"no": "第7條", "chapter": null, "content": "評定：裝量應符合下列條件"}, {"no": "第7.1條", "chapter": null, "content": "內容淨量（Actual Content）平均值不得低於標準規定及標示量。"}, {"no": "第7.2條", "chapter": null, "content": "開驗個別樣品內容淨量若低於最低限量，計為一允收缺點，各批開驗樣品之允收缺點數不得超過第7.3節之規定。"}, {"no": "第7.3條", "chapter": null, "content": "允收缺點數<div class=\"reg-table-block\"><div class=\"table-scroll\"><table class=\"reg-table\">\n<thead>\n<tr>\n  <th>開驗數量（件）</th>\n  <th>允收缺點數（件）</th>\n</tr>\n</thead>\n<tbody>\n<tr><td>3</td><td>0</td></tr>\n<tr><td>6</td><td>1</td></tr>\n<tr><td>15</td><td>2</td></tr>\n<tr><td>21</td><td>3</td></tr>\n<tr><td>29</td><td>4</td></tr>\n<tr><td>48</td><td>6</td></tr>\n<tr><td>72</td><td>8</td></tr>\n<tr><td>84</td><td>9</td></tr>\n<tr><td>126</td><td>13</td></tr>\n<tr><td>200</td><td>19</td></tr>\n</tbody>\n</table></div></div>"}],"食品安全衛生管理法_20190612": [{"no": "第一條", "chapter": "第一章 總則", "content": "為管理食品衛生安全及品質，維護國民健康，特制定本法。"}, {"no": "第二條", "chapter": "第一章 總則", "content": "本法所稱主管機關：在中央為衛生福利主管機關；在直轄市為直轄市政府；在縣（市）為縣（市）政府。"}, {"no": "第二條之一", "chapter": "第一章 總則", "content": "為加強全國食品安全事務之協調、監督、推動及查緝，行政院應設食品安全會報，由行政院院長擔任召集人，召集相關部會首長、專家學者及民間團體代表共同組成，職司跨部會協調食品安全風險評估及管理措施，建立食品安全衛生之預警及稽核制度，至少每三個月開會一次，必要時得召開臨時會議。召集人應指定一名政務委員或部會首長擔任食品安全會報執行長，並由中央主管機關負責幕僚事務。\n各直轄市、縣（市）政府應設食品安全會報，由各該直轄市、縣（市）政府首長擔任召集人，職司跨局處協調食品安全衛生管理措施，至少每三個月舉行會議一次。\n第一項食品安全會報決議之事項，各相關部會應落實執行，行政院應每季追蹤管考對外公告，並納入每年向立法院提出之施政方針及施政報告。\n第一項之食品安全會報之組成、任務、議事程序及其他應遵行事項，由行政院定之。"}, {"no": "第三條", "chapter": "第一章 總則", "content": "本法用詞，定義如下：\n一、食品：指供人飲食或咀嚼之產品及其原料。\n二、特殊營養食品：指嬰兒與較大嬰兒配方食品、特定疾病配方食品及其他經中央主管機關許可得供特殊營養需求者使用之配方食品。\n三、食品添加物：指為食品著色、調味、防腐、漂白、乳化、增加香味、安定品質、促進發酵、增加稠度、強化營養、防止氧化或其他必要目的，加入、接觸於食品之單方或複方物質。複方食品添加物使用之添加物僅限由中央主管機關准用之食品添加物組成，前述准用之單方食品添加物皆應有中央主管機關之准用許可字號。\n四、食品器具：指與食品或食品添加物直接接觸之器械、工具或器皿。\n五、食品容器或包裝：指與食品或食品添加物直接接觸之容器或包裹物。\n六、食品用洗潔劑：指用於消毒或洗滌食品、食品器具、食品容器或包裝之物質。\n七、食品業者：指從事食品或食品添加物之製造、加工、調配、包裝、運送、貯存、販賣、輸入、輸出或從事食品器具、食品容器或包裝、食品用洗潔劑之製造、加工、輸入、輸出或販賣之業者。\n八、標示：指於食品、食品添加物、食品用洗潔劑、食品器具、食品容器或包裝上，記載品名或為說明之文字、圖畫、記號或附加之說明書。\n九、營養標示：指於食品容器或包裝上，記載食品之營養成分、含量及營養宣稱。\n十、查驗：指查核及檢驗。\n十一、 基因改造：指使用基因工程或分子生物技術，將遺傳物質轉移或轉殖入活細胞或生物體，產生基因重組現象，使表現具外源基因特性或使自身特定基因無法表現之相關技術。但不包括傳統育種、同科物種之細胞及原生質體融合、雜交、誘變、體外受精、體細胞變異及染色體倍增等技術。\n十二、 加工助劑：指在食品或食品原料之製造加工過程中，為達特定加工目的而使用，非作為食品原料或食品容器具之物質。該物質於最終產品中不產生功能，食品以其成品形式包裝之前應從食品中除去，其可能存在非有意，且無法避免之殘留。"}, {"no": "第四條", "chapter": "第二章 食品安全風險管理", "content": "主管機關採行之食品安全衛生管理措施應以風險評估為基礎，符合滿足國民享有之健康、安全食品以及知的權利、科學證據原則、事先預防原則、資訊透明原則，建構風險評估以及諮議體系。\n前項風險評估，中央主管機關應召集食品安全、毒理與風險評估等專家學者及民間團體組成食品風險評估諮議會為之。其成員單一性別不得少於三分之一。\n第一項諮議體系應就食品衛生安全與營養、基因改造食品、食品廣告標示、食品檢驗方法等成立諮議會，召集食品安全、營養學、醫學、毒理、風險管理、農業、法律、人文社會領域相關具有專精學者組成之。其成員單一性別不得少於三分之一。\n諮議會委員議事之迴避，準用行政程序法第三十二條之規定；諮議會之組成、議事、程序與範圍及其他應遵行事項之辦法，由中央主管機關定之。\n中央主管機關對重大或突發性食品衛生安全事件，必要時得依預警原則、風險評估或流行病學調查結果，公告對特定產品或特定地區之產品採取下列管理措施：\n一、限制或停止輸入查驗、製造及加工之方式或條件。\n二、下架、封存、限期回收、限期改製、沒入銷毀。"}, {"no": "第五條", "chapter": "第二章 食品安全風險管理", "content": "各級主管機關依科學實證，建立食品衛生安全監測體系，於監測發現有危害食品衛生安全之虞之事件發生時，應主動查驗，並發布預警或採行必要管制措施。\n前項主動查驗、發布預警或採行必要管制措施，包含主管機關應抽樣檢驗、追查原料來源、產品流向、公布檢驗結果及揭露資訊，並令食品業者自主檢驗。"}, {"no": "第六條", "chapter": "第二章 食品安全風險管理", "content": "各級主管機關應設立通報系統，劃分食品引起或感染症中毒，由衛生福利部食品藥物管理署或衛生福利部疾病管制署主管之，蒐集並受理疑似食品中毒事件之通報。\n醫療機構診治病人時發現有疑似食品中毒之情形，應於二十四小時內向當地主管機關報告。"}, {"no": "第七條", "chapter": "第三章 食品業者衛生管理", "content": "食品業者應實施自主管理，訂定食品安全監測計畫，確保食品衛生安全。\n食品業者應將其產品原材料、半成品或成品，自行或送交其他檢驗機關（構）、法人或團體檢驗。\n上市、上櫃及其他經中央主管機關公告類別及規模之食品業者，應設置實驗室，從事前項自主檢驗。\n第一項應訂定食品安全監測計畫之食品業者類別與規模，與第二項應辦理檢驗之食品業者類別與規模、最低檢驗週期，及其他相關事項，由中央主管機關公告。\n食品業者於發現產品有危害衛生安全之虞時，應即主動停止製造、加工、販賣及辦理回收，並通報直轄市、縣（市）主管機關。"}, {"no": "第八條", "chapter": "第三章 食品業者衛生管理", "content": "食品業者之從業人員、作業場所、設施衛生管理及其品保制度，均應符合食品之良好衛生規範準則。\n經中央主管機關公告類別及規模之食品業，應符合食品安全管制系統準則之規定。\n經中央主管機關公告類別及規模之食品業者，應向中央或直轄市、縣（市）主管機關申請登錄，始得營業。\n第一項食品之良好衛生規範準則、第二項食品安全管制系統準則，及前項食品業者申請登錄之條件、程序、應登錄之事項與申請變更、登錄之廢止、撤銷及其他應遵行事項之辦法，由中央主管機關定之。\n經中央主管機關公告類別及規模之食品業者，應取得衛生安全管理系統之驗證。\n前項驗證，應由中央主管機關認證之驗證機構辦理；\n有關申請、撤銷與廢止認證之條件或事由，執行驗證之收費、程序、方式及其他相關事項之管理辦法，由中央主管機關定之。"}, {"no": "第九條", "chapter": "第三章 食品業者衛生管理", "content": "食品業者應保存產品原材料、半成品及成品之來源相關文件。\n經中央主管機關公告類別與規模之食品業者，應依其產業模式，建立產品原材料、半成品與成品供應來源及流向之追溯或追蹤系統。\n中央主管機關為管理食品安全衛生及品質，確保食品追溯或追蹤系統資料之正確性，應就前項之業者，依溯源之必要性，分階段公告使用電子發票。\n中央主管機關應建立第二項之追溯或追蹤系統，食品業者應以電子方式申報追溯或追蹤系統之資料，其電子申報方式及規格由中央主管機關定之。\n第一項保存文件種類與期間及第二項追溯或追蹤系統之建立、應記錄之事項、查核及其他應遵行事項之辦法，由中央主管機關定之。"}, {"no": "第十條", "chapter": "第三章 食品業者衛生管理", "content": "食品業者之設廠登記，應由工業主管機關會同主管機關辦理。\n食品工廠之建築及設備，應符合設廠標準；其標準，由中央主管機關會同中央工業主管機關定之。\n食品或食品添加物之工廠應單獨設立，不得於同一廠址及廠房同時從事非食品之製造、加工及調配。但經中央主管機關查核符合藥物優良製造準則之藥品製造業兼製食品者，不在此限。\n本法中華民國一百零三年十一月十八日修正條文施行前，前項之工廠未單獨設立者，由中央主管機關於修正條文施行後六個月內公告，並應於公告後一年內完成辦理。"}, {"no": "第十一條", "chapter": "第三章 食品業者衛生管理", "content": "經中央主管機關公告類別及規模之食品業者，應置衛生管理人員。\n前項衛生管理人員之資格、訓練、職責及其他應遵行事項之辦法，由中央主管機關定之。"}, {"no": "第十二條", "chapter": "第三章 食品業者衛生管理", "content": "經中央主管機關公告類別及規模之食品業者，應置一定比率，並領有專門職業或技術證照之食品、營養、餐飲等專業人員，辦理食品衛生安全管理事項。\n前項應聘用專門職業或技術證照人員之設置、職責、業務之執行及管理辦法，由中央主管機關定之。"}, {"no": "第十三條", "chapter": "第三章 食品業者衛生管理", "content": "經中央主管機關公告類別及規模之食品業者，應投保產品責任保險。\n前項產品責任保險之保險金額及契約內容，由中央主管機關定之。"}, {"no": "第十四條", "chapter": "第三章 食品業者衛生管理", "content": "公共飲食場所衛生之管理辦法，由直轄市、縣（市）主管機關依中央主管機關訂定之各類衛生標準或法令定之。"}, {"no": "第十五條", "chapter": "第四章 食品衛生管理", "content": "食品或食品添加物有下列情形之一者，不得製造、加工、調配、包裝、運送、貯存、販賣、輸入、輸出、作為贈品或公開陳列：\n一、變質或腐敗。\n二、未成熟而有害人體健康。\n三、有毒或含有害人體健康之物質或異物。\n四、染有病原性生物，或經流行病學調查認定屬造成食品中毒之病因。\n五、殘留農藥或動物用藥含量超過安全容許量。\n六、受原子塵或放射能污染，其含量超過安全容許量。\n七、攙偽或假冒。\n八、逾有效日期。\n九、從未於國內供作飲食且未經證明為無害人體健康。\n十、添加未經中央主管機關許可之添加物。\n前項第五款、第六款殘留農藥或動物用藥安全容許量及食品中原子塵或放射能污染安全容許量之標準，由中央主管機關會商相關機關定之。\n第一項第三款有害人體健康之物質，包括雖非疫區而近十年內有發生牛海綿狀腦病或新型庫賈氏症病例之國家或地區牛隻之頭骨、腦、眼睛、脊髓、絞肉、內臟及其他相關產製品。\n國內外之肉品及其他相關產製品，除依中央主管機關根據國人膳食習慣為風險評估所訂定安全容許標準者外，不得檢出乙型受體素。\n國內外如發生因食用安全容許殘留乙型受體素肉品導致中毒案例時，應立即停止含乙型受體素之肉品進口；國內經確認有因食用致中毒之個案，政府應負照護責任，並協助向廠商請求損害賠償。"}, {"no": "第十五條之一", "chapter": "第四章 食品衛生管理", "content": "中央主管機關對於可供食品使用之原料，得限制其製造、加工、調配之方式或條件、食用部位、使用量、可製成之產品型態或其他事項。\n前項應限制之原料品項及其限制事項，由中央主管機關公告之。"}, {"no": "第十六條", "chapter": "第四章 食品衛生管理", "content": "食品器具、食品容器或包裝、食品用洗潔劑有下列情形之一，不得製造、販賣、輸入、輸出或使用：\n一、有毒者。\n二、易生不良化學作用者。\n三、足以危害健康者。\n四、其他經風險評估有危害健康之虞者。"}, {"no": "第十七條", "chapter": "第四章 食品衛生管理", "content": "販賣之食品、食品用洗潔劑及其器具、容器或包裝，應符合衛生安全及品質之標準；其標準由中央主管機關定之。"}, {"no": "第十八條", "chapter": "第四章 食品衛生管理", "content": "食品添加物之品名、規格及其使用範圍、限量標準，由中央主管機關定之。\n前項標準之訂定，必須以可以達到預期效果之最小量為限制，且依據國人膳食習慣為風險評估，同時必須遵守規格標準之規定。"}, {"no": "第十八條之一", "chapter": "第四章 食品衛生管理", "content": "食品業者使用加工助劑於食品或食品原料之製造，應符合安全衛生及品質之標準；其標準由中央主管機關定之。\n加工助劑之使用，不得有危害人體健康之虞之情形。"}, {"no": "第十九條", "chapter": "第四章 食品衛生管理", "content": "第十五條第二項及前二條規定之標準未訂定前，中央主管機關為突發事件緊急應變之需，於無法取得充分之實驗資料時，得訂定其暫行標準。"}, {"no": "第二十條", "chapter": "第四章 食品衛生管理", "content": "屠宰場內畜禽屠宰及分切之衛生查核，由農業主管機關依相關法規之規定辦理。\n運送過程之屠體、內臟及其分切物於交付食品業者後之衛生查核，由衛生主管機關為之。\n食品業者所持有之屠體、內臟及其分切物之製造、加工、調配、包裝、運送、貯存、販賣、輸入或輸出之衛生管理，由各級主管機關依本法之規定辦理。\n第二項衛生查核之規範，由中央主管機關會同中央農業主管機關定之。"}, {"no": "第二十一條", "chapter": "第四章 食品衛生管理", "content": "經中央主管機關公告之食品、食品添加物、食品器具、食品容器或包裝及食品用洗潔劑，其製造、加工、調配、改裝、輸入或輸出，非經中央主管機關查驗登記並發給許可文件，不得為之；其登記事項有變更者，應事先向中央主管機關申請審查核准。\n食品所含之基因改造食品原料非經中央主管機關健康風險評估審查，並查驗登記發給許可文件，不得供作食品原料。\n經中央主管機關查驗登記並發給許可文件之基因改造食品原料，其輸入業者應依第九條第五項所定辦法，建立基因改造食品原料供應來源及流向之追溯或追蹤系統。\n第一項及第二項許可文件，其有效期間為一年至五年，由中央主管機關核定之；期滿仍需繼續製造、加工、調配、改裝、輸入或輸出者，應於期滿前三個月內，申請中央主管機關核准展延。但每次展延，不得超過五年。\n第一項及第二項許可之廢止、許可文件之發給、換發、補發、展延、移轉、註銷及登記事項變更等管理事項之辦法，由中央主管機關定之。\n第一項及第二項之查驗登記，得委託其他機構辦理；\n其委託辦法，由中央主管機關定之。\n本法中華民國一百零三年一月二十八日修正前，第二項未辦理查驗登記之基因改造食品原料，應於公布後二年內完成辦理。"}, {"no": "第二十二條", "chapter": "第五章 食品標示及廣告管理", "content": "食品及食品原料之容器或外包裝，應以中文及通用符號，明顯標示下列事項：\n一、品名。\n二、內容物名稱；其為二種以上混合物時，應依其含量多寡由高至低分別標示之。\n三、淨重、容量或數量。\n四、食品添加物名稱；混合二種以上食品添加物，以功能性命名者，應分別標明添加物名稱。\n五、製造廠商或國內負責廠商名稱、電話號碼及地址。國內通過農產品生產驗證者，應標示可追溯之來源；有中央農業主管機關公告之生產系統者，應標示生產系統。\n六、原產地（國）。\n七、有效日期。\n八、營養標示。\n九、含基因改造食品原料。\n十、其他經中央主管機關公告之事項。\n前項第二款內容物之主成分應標明所佔百分比，其應標示之產品、主成分項目、標示內容、方式及各該產品實施日期，由中央主管機關另定之。\n第一項第八款及第九款標示之應遵行事項，由中央主管機關公告之。\n第一項第五款僅標示國內負責廠商名稱者，應將製造廠商、受託製造廠商或輸入廠商之名稱、電話號碼及地址通報轄區主管機關；主管機關應開放其他主管機關共同查閱。"}, {"no": "第二十三條", "chapter": "第五章 食品標示及廣告管理", "content": "食品因容器或外包裝面積、材質或其他之特殊因素，依前條規定標示顯有困難者，中央主管機關得公告免一部之標示，或以其他方式標示。"}, {"no": "第二十四條", "chapter": "第五章 食品標示及廣告管理", "content": "食品添加物及其原料之容器或外包裝，應以中文及通用符號，明顯標示下列事項：\n一、品名。\n二、「食品添加物」或「食品添加物原料」字樣。\n三、食品添加物名稱；其為二種以上混合物時，應分別標明。其標示應以第十八條第一項所定之品名或依中央主管機關公告之通用名稱為之。\n四、淨重、容量或數量。\n五、製造廠商或國內負責廠商名稱、電話號碼及地址。\n六、有效日期。\n七、使用範圍、用量標準及使用限制。\n八、原產地（國）。\n九、含基因改造食品添加物之原料。\n十、其他經中央主管機關公告之事項。\n食品添加物之原料，不受前項第三款、第七款及第九款之限制。前項第三款食品添加物之香料成分及第九款標示之應遵行事項，由中央主管機關公告之。\n第一項第五款僅標示國內負責廠商名稱者，應將製造廠商、受託製造廠商或輸入廠商之名稱、電話號碼及地址通報轄區主管機關；主管機關應開放其他主管機關共同查閱。"}, {"no": "第二十五條", "chapter": "第五章 食品標示及廣告管理", "content": "中央主管機關得對直接供應飲食之場所，就其供應之特定食品，要求以中文標示原產地及其他應標示事項；對特定散裝食品販賣者，得就其販賣之地點、方式予以限制，或要求以中文標示品名、原產地（國）、含基因改造食品原料、製造日期或有效日期及其他應標示事項。國內通過農產品生產驗證者，應標示可追溯之來源；有中央農業主管機關公告之生產系統者，應標示生產系統。\n前項特定食品品項、應標示事項、方法及範圍；與特定散裝食品品項、限制方式及應標示事項，由中央主管機關公告之。\n第一項應標示可追溯之來源或生產系統規定，自中華民國一百零四年一月二十日修正公布後六個月施行。"}, {"no": "第二十六條", "chapter": "第五章 食品標示及廣告管理", "content": "經中央主管機關公告之食品器具、食品容器或包裝，應以中文及通用符號，明顯標示下列事項：\n一、品名。\n二、材質名稱及耐熱溫度；其為二種以上材質組成者，應分別標明。\n三、淨重、容量或數量。\n四、國內負責廠商之名稱、電話號碼及地址。\n五、原產地（國）。\n六、製造日期；其有時效性者，並應加註有效日期或有效期間。\n七、使用注意事項或微波等其他警語。\n八、其他經中央主管機關公告之事項。"}, {"no": "第二十七條", "chapter": "第五章 食品標示及廣告管理", "content": "食品用洗潔劑之容器或外包裝，應以中文及通用符號，明顯標示下列事項：\n一、品名。\n二、主要成分之化學名稱；其為二種以上成分組成者，應分別標明。\n三、淨重或容量。\n四、國內負責廠商名稱、電話號碼及地址。\n五、原產地（國）。\n六、製造日期；其有時效性者，並應加註有效日期或有效期間。\n七、適用對象或用途。\n八、使用方法及使用注意事項或警語。\n九、其他經中央主管機關公告之事項。"}, {"no": "第二十八條", "chapter": "第五章 食品標示及廣告管理", "content": "食品、食品添加物、食品用洗潔劑及經中央主管機關公告之食品器具、食品容器或包裝，其標示、宣傳或廣告，不得有不實、誇張或易生誤解之情形。\n食品不得為醫療效能之標示、宣傳或廣告。\n中央主管機關對於特殊營養食品、易導致慢性病或不適合兒童及特殊需求者長期食用之食品，得限制其促銷或廣告；其食品之項目、促銷或廣告之限制與停止刊播及其他應遵行事項之辦法，由中央主管機關定之。\n第一項不實、誇張或易生誤解與第二項醫療效能之認定基準、宣傳或廣告之內容、方式及其他應遵行事項之準則，由中央主管機關定之。"}, {"no": "第二十九條", "chapter": "第五章 食品標示及廣告管理", "content": "接受委託刊播之傳播業者，應自廣告之日起六個月，保存委託刊播廣告者之姓名或名稱、國民身分證統一編號、公司、商號、法人或團體之設立登記文件號碼、住居所或事務所、營業所及電話等資料，且於主管機關要求提供時，不得規避、妨礙或拒絕。"}, {"no": "第三十條", "chapter": "第六章 食品輸入管理", "content": "輸入經中央主管機關公告之食品、基因改造食品原料、食品添加物、食品器具、食品容器或包裝及食品用洗潔劑時，應依海關專屬貨品分類號列，向中央主管機關申請查驗並申報其產品有關資訊。\n執行前項規定，查驗績效優良之業者，中央主管機關得採取優惠之措施。\n輸入第一項產品非供販賣，且其金額、數量符合中央主管機關公告或經中央主管機關專案核准者，得免申請查驗。"}, {"no": "第三十一條", "chapter": "第六章 食品輸入管理", "content": "前條產品輸入之查驗及申報，中央主管機關得委任、委託相關機關（構）、法人或團體辦理。"}, {"no": "第三十二條", "chapter": "第六章 食品輸入管理", "content": "主管機關為追查或預防食品衛生安全事件，必要時得要求食品業者、非食品業者或其代理人提供輸入產品之相關紀錄、文件及電子檔案或資料庫，食品業者、非食品業者或其代理人不得規避、妨礙或拒絕。\n食品業者應就前項輸入產品、基因改造食品原料之相關紀錄、文件及電子檔案或資料庫保存五年。\n前項應保存之資料、方式及範圍，由中央主管機關公告之。"}, {"no": "第三十三條", "chapter": "第六章 食品輸入管理", "content": "輸入產品因性質或其查驗時間等條件特殊者，食品業者得向查驗機關申請具結先行放行，並於特定地點存放。\n查驗機關審查後認定應繳納保證金者，得命其繳納保證金後，准予具結先行放行。\n前項具結先行放行之產品，其存放地點得由食品業者或其代理人指定；產品未取得輸入許可前，不得移動、啟用或販賣。\n第三十條、第三十一條及本條第一項有關產品輸入之查驗、申報或查驗、申報之委託、優良廠商輸入查驗與申報之優惠措施、輸入產品具結先行放行之條件、應繳納保證金之審查基準、保證金之收取標準及其他應遵行事項之辦法，由中央主管機關定之。"}, {"no": "第三十四條", "chapter": "第六章 食品輸入管理", "content": "中央主管機關遇有重大食品衛生安全事件發生，或輸入產品經查驗不合格之情況嚴重時，得就相關業者、產地或產品，停止其查驗申請。"}, {"no": "第三十五條", "chapter": "第六章 食品輸入管理", "content": "中央主管機關對於管控安全風險程度較高之食品，得於其輸入前，實施系統性查核。\n前項實施系統性查核之產品範圍、程序及其他相關事項之辦法，由中央主管機關定之。\n中央主管機關基於源頭管理需要或因個別食品衛生安全事件，得派員至境外，查核該輸入食品之衛生安全管理等事項。\n食品業者輸入食品添加物，其屬複方者，應檢附原產國之製造廠商或負責廠商出具之產品成分報告及輸出國之官方衛生證明，供各級主管機關查核。但屬香料者，不在此限。"}, {"no": "第三十六條", "chapter": "第六章 食品輸入管理", "content": "境外食品、食品添加物、食品器具、食品容器或包裝及食品用洗潔劑對民眾之身體或健康有造成危害之虞，經中央主管機關公告者，旅客攜帶入境時，應檢附出產國衛生主管機關開具之衛生證明文件申報之；對民眾之身體或健康有嚴重危害者，中央主管機關並得公告禁止旅客攜帶入境。\n違反前項規定之產品，不問屬於何人所有，沒入銷毀之。"}, {"no": "第三十七條", "chapter": "第七章 食品檢驗", "content": "食品、食品添加物、食品器具、食品容器或包裝及食品用洗潔劑之檢驗，由各級主管機關或委任、委託經認可之相關機關（構）、法人或團體辦理。\n中央主管機關得就前項受委任、委託之相關機關（構）、法人或團體，辦理認證；必要時，其認證工作，得委任、委託相關機關（構）、法人或團體辦理。\n前二項有關檢驗之委託、檢驗機關（構）、法人或團體認證之條件與程序、委託辦理認證工作之程序及其他相關事項之管理辦法，由中央主管機關定之。"}, {"no": "第三十八條", "chapter": "第七章 食品檢驗", "content": "各級主管機關執行食品、食品添加物、食品器具、食品容器或包裝及食品用洗潔劑之檢驗，其檢驗方法，經食品檢驗方法諮議會諮議，由中央主管機關定之；未定檢驗方法者，得依國際間認可之方法為之。"}, {"no": "第三十九條", "chapter": "第七章 食品檢驗", "content": "食品業者對於檢驗結果有異議時，得自收受通知之日起十五日內，向原抽驗之機關（構）申請複驗；受理機關（構）應於三日內進行複驗。但檢體無適當方法可資保存者，得不受理之。"}, {"no": "第四十條", "chapter": "第七章 食品檢驗", "content": "發布食品衛生檢驗資訊時，應同時公布檢驗方法、檢驗單位及結果判讀依據。"}, {"no": "第四十一條", "chapter": "第八章 食品查核及管制", "content": "直轄市、縣（市）主管機關為確保食品、食品添加物、食品器具、食品容器或包裝及食品用洗潔劑符合本法規定，得執行下列措施，業者應配合，不得規避、妨礙或拒絕：\n一、進入製造、加工、調配、包裝、運送、貯存、販賣場所執行現場查核及抽樣檢驗。\n二、為前款查核或抽樣檢驗時，得要求前款場所之食品業者提供原料或產品之來源及數量、作業、品保、販賣對象、金額、其他佐證資料、證明或紀錄，並得查閱、扣留或複製之。\n三、查核或檢驗結果證實為不符合本法規定之食品、食品添加物、食品器具、食品容器或包裝及食品用洗潔劑，應予封存。\n四、對於有違反第八條第一項、第十五條第一項、第四項、第十六條、中央主管機關依第十七條、第十八條或第十九條所定標準之虞者，得命食品業者暫停作業及停止販賣，並封存該產品。\n五、接獲通報疑似食品中毒案件時，對於各該食品業者，得命其限期改善或派送相關食品從業人員至各級主管機關認可之機關（構），接受至少四小時之食品中毒防治衛生講習；調查期間，並得命其暫停作業、停止販賣及進行消毒，並封存該產品。\n中央主管機關於必要時，亦得為前項規定之措施。"}, {"no": "第四十二條", "chapter": "第八章 食品查核及管制", "content": "前條查核、檢驗與管制措施及其他應遵行事項之辦法，由中央主管機關定之。"}, {"no": "第四十二條之一", "chapter": "第八章 食品查核及管制", "content": "為維護食品安全衛生，有效遏止廠商之違法行為，警察機關應派員協助主管機關。"}, {"no": "第四十三條", "chapter": "第八章 食品查核及管制", "content": "主管機關對於檢舉查獲違反本法規定之食品、食品添加物、食品器具、食品容器或包裝、食品用洗潔劑、標示、宣傳、廣告或食品業者，除應對檢舉人身分資料嚴守秘密外，並得酌予獎勵。公務員如有洩密情事，應依法追究刑事及行政責任。\n前項主管機關受理檢舉案件之管轄、處理期間、保密、檢舉人獎勵及其他應遵行事項之辦法，由中央主管機關定之。\n第一項檢舉人身分資料之保密，於訴訟程序，亦同。"}, {"no": "第四十四條", "chapter": "第九章 罰則", "content": "有下列行為之一者，處新臺幣六萬元以上二億元以下罰鍰；情節重大者，並得命其歇業、停業一定期間、廢止其公司、商業、工廠之全部或部分登記事項，或食品業者之登錄；經廢止登錄者，一年內不得再申請重新登錄：\n一、違反第八條第一項或第二項規定，經命其限期改正，屆期不改正。\n二、違反第十五條第一項、第四項或第十六條規定。\n三、經主管機關依第五十二條第二項規定，命其回收、銷毀而不遵行。\n四、違反中央主管機關依第五十四條第一項所為禁止其製造、販賣、輸入或輸出之公告。\n前項罰鍰之裁罰標準，由中央主管機關定之。"}, {"no": "第四十五條", "chapter": "第九章 罰則", "content": "違反第二十八條第一項或中央主管機關依第二十八條第三項所定辦法者，處新臺幣四萬元以上四百萬元以下罰鍰；違反同條第二項規定者，處新臺幣六十萬元以上五百萬元以下罰鍰；再次違反者，並得命其歇業、停業一定期間、廢止其公司、商業、工廠之全部或部分登記事項，或食品業者之登錄；經廢止登錄者，一年內不得再申請重新登錄。\n違反前項廣告規定之食品業者，應按次處罰至其停止刊播為止。\n違反第二十八條有關廣告規定之一，情節重大者，除依前二項規定處分外，主管機關並應命其不得販賣、供應或陳列；且應自裁處書送達之日起三十日內，於原刊播之同一篇幅、時段，刊播一定次數之更正廣告，其內容應載明表達歉意及排除錯誤之訊息。\n違反前項規定，繼續販賣、供應、陳列或未刊播更正廣告者，處新臺幣十二萬元以上六十萬元以下罰鍰。"}, {"no": "第四十六條", "chapter": "第九章 罰則", "content": "傳播業者違反第二十九條規定者，處新臺幣六萬元以上三十萬元以下罰鍰，並得按次處罰。\n直轄市、縣（市）主管機關為前條第一項處罰時，應通知傳播業者及其直轄市、縣（市）主管機關或目的事業主管機關。傳播業者自收到該通知之次日起，應即停止刊播。\n傳播業者未依前項規定停止刊播違反第二十八條第一項或第二項規定，或違反中央主管機關依第二十八條第三項所為廣告之限制或所定辦法中有關停止廣告之規定者，處新臺幣十二萬元以上六十萬元以下罰鍰，並應按次處罰至其停止刊播為止。\n傳播業者經依第二項規定通知後，仍未停止刊播者，直轄市、縣（市）主管機關除依前項規定處罰外，並通知傳播業者之直轄市、縣（市）主管機關或其目的事業主管機關依相關法規規定處理。"}, {"no": "第四十六條之一", "chapter": "第九章 罰則", "content": "散播有關食品安全之謠言或不實訊息，足生損害於公眾或他人者，處三年以下有期徒刑、拘役或新臺幣一百萬元以下罰金。"}, {"no": "第四十七條", "chapter": "第九章 罰則", "content": "有下列行為之一者，處新臺幣三萬元以上三百萬元以下罰鍰；情節重大者，並得命其歇業、停業一定期間、廢止其公司、商業、工廠之全部或部分登記事項，或食品業者之登錄；經廢止登錄者，一年內不得再申請重新登錄：\n一、違反中央主管機關依第四條所為公告。\n二、違反第七條第五項規定。\n三、食品業者依第八條第三項、第九條第二項或第四項規定所登錄、建立或申報之資料不實，或依第九條第三項開立之電子發票不實致影響食品追溯或追蹤之查核。\n四、違反第十一條第一項或第十二條第一項規定。\n五、違反中央主管機關依第十三條所為投保產品責任保險之規定。\n六、違反直轄市或縣（市）主管機關依第十四條所定管理辦法中有關公共飲食場所安全衛生之規定。\n七、違反中央主管機關依第十八條之一第一項所定標準之規定，經命其限期改正，屆期不改正。\n八、違反第二十一條第一項及第二項、第二十二條第一項或依第二項及第三項公告之事項、第二十四條第一項或依第二項公告之事項、第二十六條或第二十七條規定。\n九、除第四十八條第九款規定者外，違反中央主管機關依第十八條所定標準中有關食品添加物規格及其使用範圍、限量之規定。\n十、違反中央主管機關依第二十五條第二項所為之公告。\n十一、規避、妨礙或拒絕本法所規定之查核、檢驗、查扣或封存。\n十二、對依本法規定應提供之資料，拒不提供或提供資料不實。\n十三、經依本法規定命暫停作業或停止販賣而不遵行。\n十四、違反第三十條第一項規定，未辦理輸入產品資訊申報，或申報之資訊不實。\n十五、違反第五十三條規定。"}, {"no": "第四十八條", "chapter": "第九章 罰則", "content": "有下列行為之一者，經命限期改正，屆期不改正者，處新臺幣三萬元以上三百萬元以下罰鍰；情節重大者，並得命其歇業、停業一定期間、廢止其公司、商業、工廠之全部或部分登記事項，或食品業者之登錄；經廢止登錄者，一年內不得再申請重新登錄：\n一、違反第七條第一項規定未訂定食品安全監測計畫、第二項或第三項規定未設置實驗室。\n二、違反第八條第三項規定，未辦理登錄，或違反第八條第五項規定，未取得驗證。\n三、違反第九條第一項規定，未保存文件或保存未達規定期限。\n四、違反第九條第二項規定，未建立追溯或追蹤系統。\n五、違反第九條第三項規定，未開立電子發票致無法為食品之追溯或追蹤。\n六、違反第九條第四項規定，未以電子方式申報或未依中央主管機關所定之方式及規格申報。\n七、違反第十條第三項規定。\n八、違反中央主管機關依第十七條或第十九條所定標準之規定。\n九、食品業者販賣之產品違反中央主管機關依第十八條所定食品添加物規格及其使用範圍、限量之規定。\n十、違反第二十二條第四項或第二十四條第三項規定，未通報轄區主管機關。\n十一、違反第三十五條第四項規定，未出具產品成分報告及輸出國之官方衛生證明。\n十二、違反中央主管機關依第十五條之一第二項公告之限制事項。"}, {"no": "第四十八條之一", "chapter": "第九章 罰則", "content": "有下列情形之一者，由中央主管機關處新臺幣三萬元以上三百萬元以下罰鍰；情節重大者，並得暫停、終止或廢止其委託或認證；經終止委託或廢止認證者，一年內不得再接受委託或重新申請認證：\n一、依本法受託辦理食品業者衛生安全管理驗證，違反依第八條第六項所定之管理規定。\n二、依本法認證之檢驗機構、法人或團體，違反依第三十七條第三項所定之認證管理規定。\n三、依本法受託辦理檢驗機關（構）、法人或團體認證，違反依第三十七條第三項所定之委託認證管理規定。"}, {"no": "第四十九條", "chapter": "第九章 罰則", "content": "有第十五條第一項第三款、第七款、第十款或第十六條第一款行為者，處七年以下有期徒刑，得併科新臺幣八千萬元以下罰金。情節輕微者，處五年以下有期徒刑、拘役或科或併科新臺幣八百萬元以下罰金。\n有第四十四條至前條行為，情節重大足以危害人體健康之虞者，處七年以下有期徒刑，得併科新臺幣八千萬元以下罰金；致危害人體健康者，處一年以上七年以下有期徒刑，得併科新臺幣一億元以下罰金。\n犯前項之罪，因而致人於死者，處無期徒刑或七年以上有期徒刑，得併科新臺幣二億元以下罰金；致重傷者，處三年以上十年以下有期徒刑，得併科新臺幣一億五千萬元以下罰金。\n因過失犯第一項、第二項之罪者，處二年以下有期徒刑、拘役或科新臺幣六百萬元以下罰金。\n法人之代表人、法人或自然人之代理人、受僱人或其他從業人員，因執行業務犯第一項至第三項之罪者，除處罰其行為人外，對該法人或自然人科以各該項十倍以下之罰金。\n科罰金時，應審酌刑法第五十八條規定。"}, {"no": "第四十九條之一", "chapter": "第九章 罰則", "content": "犯本法之罪，其犯罪所得與追徵之範圍及價額，認定顯有困難時，得以估算認定之；其估算辦法，由行政院定之。"}, {"no": "第四十九條之二", "chapter": "第九章 罰則", "content": "經中央主管機關公告類別及規模之食品業者，違反第十五條第一項、第四項或第十六條之規定；或有第四十四條至第四十八條之一之行為致危害人體健康者，其所得之財產或其他利益，應沒入或追繳之。\n主管機關有相當理由認為受處分人為避免前項處分而移轉其財物或財產上利益於第三人者，得沒入或追繳該第三人受移轉之財物或財產上利益。如全部或一部不能沒入者，應追徵其價額或以其財產抵償之。\n為保全前二項財物或財產上利益之沒入或追繳，其價額之追徵或財產之抵償，主管機關得依法扣留或向行政法院聲請假扣押或假處分，並免提供擔保。\n主管機關依本條沒入或追繳違法所得財物、財產上利益、追徵價額或抵償財產之推估計價辦法，由行政院定之。"}, {"no": "第五十條", "chapter": "第九章 罰則", "content": "雇主不得因勞工向主管機關或司法機關揭露違反本法之行為、擔任訴訟程序之證人或拒絕參與違反本法之行為而予解僱、調職或其他不利之處分。\n雇主或代表雇主行使管理權之人，為前項規定所為之解僱、降調或減薪者，無效。\n雇主以外之人曾參與違反本法之規定且應負刑事責任之行為，而向主管機關或司法機關揭露，因而破獲雇主違反本法之行為者，減輕或免除其刑。"}, {"no": "第五十一條", "chapter": "第九章 罰則", "content": "有下列情形之一者，主管機關得為處分如下：\n一、有第四十七條第十四款規定情形者，得暫停受理食品業者或其代理人依第三十條第一項規定所為之查驗申請；產品已放行者，得視違規之情形，命食品業者回收、銷毀或辦理退運。\n二、違反第三十條第三項規定，將免予輸入查驗之產品供販賣者，得停止其免查驗之申請一年。\n三、違反第三十三條第二項規定，取得產品輸入許可前，擅自移動、啟用或販賣者，或具結保管之存放地點與實際不符者，沒收所收取之保證金，並於一年內暫停受理該食品業者具結保管之申請；\n擅自販賣者，並得處販賣價格一倍至二十倍之罰鍰。"}, {"no": "第五十二條", "chapter": "第九章 罰則", "content": "食品、食品添加物、食品器具、食品容器或包裝及食品用洗潔劑，經依第四十一條規定查核或檢驗者，由當地直轄市、縣（市）主管機關依查核或檢驗結果，為下列之處分：\n一、有第十五條第一項、第四項或第十六條所列各款情形之一者，應予沒入銷毀。\n二、不符合中央主管機關依第十七條、第十八條所定標準，或違反第二十一條第一項及第二項規定者，其產品及以其為原料之產品，應予沒入銷毀。\n但實施消毒或採行適當安全措施後，仍可供食用、使用或不影響國人健康者，應通知限期消毒、改製或採行適當安全措施；屆期未遵行者，沒入銷毀之。\n三、標示違反第二十二條第一項或依第二項及第三項公告之事項、第二十四條第一項或依第二項公告之事項、第二十六條、第二十七條或第二十八條第一項規定者，應通知限期回收改正，改正前不得繼續販賣；屆期未遵行或違反第二十八條第二項規定者，沒入銷毀之。\n四、依第四十一條第一項規定命暫停作業及停止販賣並封存之產品，如經查無前三款之情形者，應撤銷原處分，並予啟封。\n前項第一款至第三款應予沒入之產品，應先命製造、販賣或輸入者立即公告停止使用或食用，並予回收、銷毀。必要時，當地直轄市、縣（市）主管機關得代為回收、銷毀，並收取必要之費用。\n前項應回收、銷毀之產品，其回收、銷毀處理辦法，由中央主管機關定之。\n製造、加工、調配、包裝、運送、販賣、輸入、輸出第一項第一款或第二款產品之食品業者，由當地直轄市、縣（市）主管機關公布其商號、地址、負責人姓名、商品名稱及違法情節。\n輸入第一項產品經通關查驗不符合規定者，中央主管機關應管制其輸入，並得為第一項各款、第二項及前項之處分。"}, {"no": "第五十三條", "chapter": "第九章 罰則", "content": "直轄市、縣（市）主管機關經依前條第一項規定，命限期回收銷毀產品或為其他必要之處置後，食品業者應依所定期限將處理過程、結果及改善情形等資料，報直轄市、縣（市）主管機關備查。"}, {"no": "第五十四條", "chapter": "第九章 罰則", "content": "食品、食品添加物、食品器具、食品容器或包裝及食品用洗潔劑，有第五十二條第一項第一款或第二款情事，除依第五十二條規定處理外，中央主管機關得公告禁止其製造、販賣、輸入或輸出。\n前項公告禁止之產品為中央主管機關查驗登記並發給許可文件者，得一併廢止其許可。"}, {"no": "第五十五條", "chapter": "第九章 罰則", "content": "本法所定之處罰，除另有規定外，由直轄市、縣（市）主管機關為之，必要時得由中央主管機關為之。但有關公司、商業或工廠之全部或部分登記事項之廢止，由直轄市、縣（市）主管機關於勒令歇業處分確定後，移由工、商業主管機關或其目的事業主管機關為之。"}, {"no": "第五十五條之一", "chapter": "第九章 罰則", "content": "依本法所為之行政罰，其行為數認定標準，由中央主管機關定之。"}, {"no": "第五十六條", "chapter": "第九章 罰則", "content": "食品業者違反第十五條第一項第三款、第七款、第十款或第十六條第一款規定，致生損害於消費者時，應負賠償責任。但食品業者證明損害非由於其製造、加工、調配、包裝、運送、貯存、販賣、輸入、輸出所致，或於防止損害之發生已盡相當之注意者，不在此限。\n消費者雖非財產上之損害，亦得請求賠償相當之金額，並得準用消費者保護法第四十七條至第五十五條之規定提出消費訴訟。\n如消費者不易或不能證明其實際損害額時，得請求法院依侵害情節，以每人每一事件新臺幣五百元以上三十萬元以下計算。\n直轄市、縣（市）政府受理同一原因事件，致二十人以上消費者受有損害之申訴時，應協助消費者依消費者保護法第五十條之規定辦理。\n受消費者保護團體委任代理消費者保護法第四十九條第一項訴訟之律師，就該訴訟得請求報酬，不適用消費者保護法第四十九條第二項後段規定。"}, {"no": "第五十六條之一", "chapter": "第九章 罰則", "content": "中央主管機關為保障食品安全事件消費者之權益，得設立食品安全保護基金，並得委託其他機關（構）、法人或團體辦理。\n前項基金之來源如下：\n一、違反本法罰鍰之部分提撥。\n二、依本法科處並繳納之罰金，及因違反本法規定沒收或追徵之現金或變賣所得。\n三、依本法或行政罰法規定沒入、追繳、追徵或抵償之不當利得部分提撥。\n四、基金孳息收入。\n五、捐贈收入。\n六、循預算程序之撥款。\n七、其他有關收入。\n前項第一款及第三款來源，以其處分生效日在中華民國一百零二年六月二十一日以後者適用。\n第一項基金之用途如下：\n一、補助消費者保護團體因食品衛生安全事件依消費者保護法之規定，提起消費訴訟之律師報酬及訴訟相關費用。\n二、補助經公告之特定食品衛生安全事件，有關人體健康風險評估費用。\n三、補助勞工因檢舉雇主違反本法之行為，遭雇主解僱、調職或其他不利處分所提之回復原狀、給付工資及損害賠償訴訟之律師報酬及訴訟相關費用。\n四、補助依第四十三條第二項所定辦法之獎金。\n五、補助其他有關促進食品安全之相關費用。\n中央主管機關應設置基金運用管理監督小組，由學者專家、消保團體、社會公正人士組成，監督補助業務。\n第四項基金之補助對象、申請資格、審查程序、補助基準、補助之廢止、前項基金運用管理監督小組之組成、運作及其他應遵行事項之辦法，由中央主管機關定之。"}, {"no": "第五十七條", "chapter": "第十章 附則", "content": "本法關於食品器具或容器之規定，於兒童常直接放入口內之玩具，準用之。"}, {"no": "第五十八條", "chapter": "第十章 附則", "content": "中央主管機關依本法受理食品業者申請審查、檢驗及核發許可證，應收取審查費、檢驗費及證書費；其費額，由中央主管機關定之。"}, {"no": "第五十九條", "chapter": "第十章 附則", "content": "本法施行細則，由中央主管機關定之。"}, {"no": "第六十條", "chapter": "第十章 附則", "content": "本法除第三十條申報制度與第三十三條保證金收取規定及第二十二條第一項第五款、第二十六條、第二十七條，自公布後一年施行外，自公布日施行。\n第二十二條第一項第四款自中華民國一百零三年六月十九日施行。\n本法一百零三年一月二十八日修正條文第二十一條第三項，自公布後一年施行。\n本法一百零三年十一月十八日修正條文，除第二十二條第一項第五款應標示可追溯之來源或生產系統規定，自公布後六個月施行；第七條第三項食品業者應設置實驗室規定、第二十二條第四項、第二十四條第一項食品添加物之原料應標示事項規定、第二十四條第三項及第三十五條第四項規定，自公布後一年施行外，自公布日施行。"}], "食品安全衛生管理法施行細則_20170713": [{"no": "第1條", "chapter": null, "content": "本細則依食品安全衛生管理法 (以下簡稱本法) 第五十九條規定訂定之。"}, {"no": "第2條", "chapter": null, "content": "本法第三條第二款所定嬰兒與較大嬰兒配方食品，包括嬰兒配方食品、較大嬰兒配方輔助食品及特殊醫療用途嬰兒配方食品。"}, {"no": "第3條", "chapter": null, "content": "本法第三條第三款所稱中央主管機關之准用許可字號，指下列情形之一：\n一、依本法第八條第三項規定完成登錄，取得之登錄字號及產品登錄碼。\n二、依本法第十八條所定食品添加物使用範圍及限量暨規格標準附表一食品添加物使用範圍及限量所定之編號。\n三、依本法第二十一條第一項規定，取得之查驗登記許可字號。"}, {"no": "第4條", "chapter": null, "content": "本法第八條第五項所稱衛生安全管理系統，指本法第八條第一項或第二項規定之食品良好衛生規範準則或食品安全管制系統準則。"}, {"no": "第5條", "chapter": null, "content": "本法第十五條第一項第三款所稱有毒，指食品或食品添加物含有天然毒素或化學物品，而其成分或含量對人體健康有害或有害之虞者。"}, {"no": "第6條", "chapter": null, "content": "本法第十五條第一項第四款所稱染有病原性生物者，指食品或食品添加物受病因性生物或其產生之毒素污染，致對人體健康有害或有害之虞者。"}, {"no": "第7條", "chapter": null, "content": "本法第二十二條第一項第一款及第二十五條第一項所定品名，其標示應依下列規定辦理：\n一、名稱與食品本質相符。\n二、經中央主管機關規定者，依中央主管機關規定之名稱；未規定者，得使用中華民國國家標準所定之名稱或自定其名稱。"}, {"no": "第8條", "chapter": null, "content": "本法第二十二條第一項第三款所定淨重、容量，應以法定度量衡單位或其代號標示之，並依下列規定辦理：\n一、內容物中液汁與固形物混合者，分別標明內容量及固形量。但其為均勻混合且不易分離者，得僅標示內容物淨重。\n二、內容物含量，得視食品性質，註明最低、最高或最低與最高含量。"}, {"no": "第9條", "chapter": null, "content": "本法第二十二條第一項第四款所定食品添加物名稱，應以食品添加物使用範圍及限量暨規格標準附表一食品添加物使用範圍及限量所定之品名，或一般社會通用之名稱標示之，並依下列規定辦理：\n一、屬甜味劑、防腐劑、抗氧化劑者，應同時標示其功能性名稱。\n二、屬複方食品添加物者，應標示各別原料名稱。\n食品中之食品添加物係透過合法原料之使用而帶入食品，且其含量明顯低於直接添加於食品之需用量，對終產品無功能者，得免標示之。"}, {"no": "第10條", "chapter": null, "content": "本法第二十二條第一項第五款及第二十四條第一項第五款所稱製造廠商，指下列各款情形之一者：\n一、製造、加工、調配製成終產品之廠商。\n二、委託製造、加工或調配者，其受託廠商。\n三、經分裝、切割、裝配、組合等改裝製程，且足以影響產品衛生安全者，其改裝廠商或前二款之廠商。\n前項製造廠商之標示，應依下列規定辦理：\n一、輸入食品或食品添加物之製造廠商名稱、地址，以中文標示之。但難以中文標示者，得以國際通用文字或符號標示之。\n二、食品或食品添加物係由同一公司所屬之工廠製造，且其設立地皆屬同一國家者，製造廠商得以總公司或所屬製造工廠擇一為之；其名稱、地址及電話，應與標示之總公司或工廠一致。但其設立地屬不同國家者，仍應以實際製造工廠標示之。\n三、前項第三款之改裝廠商，以「改裝製造廠商」標示之。"}, {"no": "第11條", "chapter": null, "content": "本法第二十二條第一項第五款、第二十四條第一項第五款、第二十六條第四款及第二十七條第四款所稱國內負責廠商，指對該產品於國內直接負法律責任之食品業者。\n本法第二十二條第一項第五款及第二十四條第一項第五款所稱應標示製造廠商或國內負責廠商名稱、電話號碼及地址，屬輸入之食品或食品添加物，指應標示國內負責廠商之名稱、電話號碼及地址，並得另標示國外製造廠商之名稱、電話號碼及地址；屬國內製造之食品或食品添加物，指應標示製造廠商之名稱、電話號碼及地址，或標示國內負責廠商之名稱、電話號碼及地址，或二者均標示。"}, {"no": "第12條", "chapter": null, "content": "本法第二十二條第一項第六款所稱原產地(國)，指製造、加工或調配製成終產品之國家或地區。\n前項原產地(國)之標示，應依下列規定辦理：\n一、輸入食品之原產地（國），依進口貨物原產地認定標準認定之。\n二、輸入食品依進口貨物原產地認定標準，屬不得認定為實質轉型之混裝食品，應依各食品混裝含量多寡由高至低標示各別原產地（國）。\n三、中文標示之食品製造廠商地址足以表徵為原產地（國）者，得免為標示。"}, {"no": "第13條", "chapter": null, "content": "本法第二十二條第一項第七款所定有效日期之標示，應印刷於容器或外包裝之上，並依習慣能辨明之方式標明年月日。但保存期限在三個月以上者，其有效日期得僅標明年月，並以當月之末日為終止日。"}, {"no": "第14條", "chapter": null, "content": "本法第二十四條第一項第一款所定品名，其為單方食品添加物者，應以食品添加物使用範圍及限量暨規格標準附表一食品添加物使用範圍及限量所定之品名，或中央主管機關公告之通用名稱標示之；其為複方食品添加物者，得自定其名稱。\n依前項規定自定品名者，其名稱應能充分反映其性質或功能。\n本細則中華民國一百零六年七月十三日修正施行前，經中央主管機關查驗登記，取得許可文件之食品添加物，其品名未能符合前二項規定者，應於一百零七年七月一日前，依本法第二十一條第一項規定申請品名變更登記；一百零八年一月一日以後製造者，應以變更後之品名標示於容器或外包裝。"}, {"no": "第15條", "chapter": null, "content": "本法第二十四條第一項第三款所定食品添加物名稱，應以食品添加物使用範圍及限量暨規格標準附表一食品添加物使用範圍及限量所定之品名，或中央主管機關公告之通用名稱標示之。"}, {"no": "第16條", "chapter": null, "content": "本法第二十四條第一項第四款所定淨重、容量，應以法定度量衡單位或其代號標示之。"}, {"no": "第17條", "chapter": null, "content": "本法第二十四條第一項第六款所定有效日期之標示，應印刷於容器或外包裝之上，並依習慣能辨明之方式標明年月日。但保存期限在三個月以上者，其有效日期得僅標明年月，並以當月之末日為終止日。"}, {"no": "第18條", "chapter": null, "content": "本法第二十四條第一項第八款所稱原產地(國)，指製造、加工或調配製成終產品之國家或地區。\n前項原產地(國)之標示，應依下列規定辦理：\n一、輸入食品添加物之原產地（國），依進口貨物原產地認定標準認定之；其產品經於我國進行產品之分類、分級、分裝、包裝、加作記號或重貼標籤者，不得認定為實質轉型，仍應標示實際製造、加工或調配製成終產品之國家或地區。\n二、中文標示之食品添加物製造廠商地址足以表徵為原產地（國）者，得免為標示。"}, {"no": "第19條", "chapter": null, "content": "有容器或外包裝之食品、食品原料、食品添加物及食品添加物原料之標示，應依下列規定辦理：\n一、標示字體之長度及寬度各不得小於二毫米。但最大表面積不足八十平方公分之小包裝，除品名、廠商名稱及有效日期外，其他項目標示字體之長度及寬度各得小於二毫米。\n二、在國內製造者，其標示如兼用外文時，應以中文為主，外文為輔。\n三、輸入者，應依本法第二十二條及第二十四條規定加中文標示，始得輸入。但需再經改裝、分裝或其他加工程序者，輸入時應有品名、廠商名稱、日期等標示，或其他能達貨證相符目的之標示或資訊，並應於販賣前完成中文標示。"}, {"no": "第20條", "chapter": null, "content": "本法第二十五條第一項所稱散裝食品，指陳列販賣時無包裝，或有包裝而有下列情形之ㄧ者:\n一、不具啟封辨識性。\n二、不具延長保存期限。\n三、非密封。\n四、非以擴大販賣範圍為目的。"}, {"no": "第21條", "chapter": null, "content": "依本法第二十六條公告之食品器具、食品容器或包裝，應依下列規定標示：\n一、標示之位置:以印刷、打印、壓印或貼標於最小販賣單位之包裝或本體上，標示內容並應於販賣流通時清晰可見。經中央主管機關規定者，其主要本體之材質名稱及耐熱溫度二項標示，應以印刷、打印或壓印方式，標示於主要本體上。\n二、標示之方式:其以印刷或打印為之者，以不褪色且不脫落為準。\n三、標示之日期:依習慣能辨明之方式標明年月日或年月；\n標示年月者，以當月之末日為終止日，或以當月之末日為有效期間之終止日。\n四、標示之字體:其長度及寬度，各不得小於二毫米。"}, {"no": "第22條", "chapter": null, "content": "食品用洗潔劑之標示，應依下列規定辦理：\n一、標示之位置：以印刷、打印、壓印或貼標於最小販賣單位之包裝上，標示內容並應於販賣流通時清晰可見。\n二、標示之方式：其以印刷或打印為之者，以不褪色且不脫落為準。\n三、標示之日期：依習慣能辨明之方式標明年月日或年月；\n標示年月者，以當月之末日為終止日，或以當月之末日為有效期間之終止日。\n四、標示之字體：其長度及寬度，各不得小於二毫米。\n五、輸入者，應依本法第二十七條規定加中文標示，始得輸入。但需再經改裝、分裝或其他加工程序者，輸入時應有品名、廠商名稱、日期等標示，或其他能達貨證相符目的之標示或資訊，並應於販賣前完成中文標示。"}, {"no": "第23條", "chapter": null, "content": "本法第二十六條第一款及第二十七條第一款所定品名，應與產品本質相符。"}, {"no": "第24條", "chapter": null, "content": "本法第二十六條第三款及第二十七條第三款所定淨重、容量，應以法定度量衡單位或其代號標示之。"}, {"no": "第25條", "chapter": null, "content": "本法第二十六條第五款及第二十七條第五款所稱原產地(國)，指製造、加工或調配製成終產品之國家或地區。\n前項原產地(國)之標示，應依下列規定辦理：\n一、輸入產品之原產地（國），依進口貨物原產地認定標準認定之；其產品經於我國進行產品之分類、分級、分裝、包裝、加作記號或重貼標籤者，不得認定為實質轉型，仍應標示實際製造、加工或調配製成終產品之國家或地區。\n二、中文標示之製造廠商地址足以表徵為原產地（國）者，得免為標示。"}, {"no": "第26條", "chapter": null, "content": "本法第二十七條第二款所稱主要成分或成分，指食品用洗潔劑中具消毒、清潔作用者。"}, {"no": "第27條", "chapter": null, "content": "食品、食品添加物、食品器具、食品容器或包裝及食品用洗潔劑專供外銷者，其標示事項得免依本法第二十二條、第二十四條、第二十六條及第二十七條規定辦理。"}, {"no": "第28條", "chapter": null, "content": "本法第四十條所定檢驗方法、檢驗單位及結果判讀依據，其內容如下:\n一、檢驗方法:包括方法依據、實驗流程、儀器設備及標準品。\n二、檢驗單位:包括實驗室名稱、地址、聯絡方式及負責人姓名。\n三、結果判讀依據:包括檢體之抽樣方式、產品名稱、來源、包裝、批號或製造日期或有效日期、最終實驗數據、判定標準及其出處或學理依據。"}, {"no": "第29條", "chapter": null, "content": "食品、食品添加物、食品器具、食品容器或包裝及食品用洗潔劑，經依本法第五十二條第一項第一款至第三款規定沒入銷毀或通知限期消毒、改製或採行安全措施者，其範圍及於相同有效日期或批號之產品；未標示有效日期或批號無法辨識者，其範圍及於全部產品；其為來源不明而無法通知限期消毒、改製或採行安全措施者，沒入銷毀之。"}, {"no": "第30條", "chapter": null, "content": "經營食品、食品添加物、食品器具或食品容器輸出之業者，為應出具證明文件之需要，得向主管機關申請辦理檢驗或查驗；其符合規定者，核發衛生證明、檢驗報告或自由銷售證明等外銷證明文件。"}, {"no": "第31條", "chapter": null, "content": "本細則除第二十二條自發布後一年施行外，自發布日施行。"}], "食品良好衛生規範準則_20250604": [{"no": "第1條", "chapter": "第一章 總則", "content": "本準則依食品安全衛生管理法（以下簡稱本法）第八條第四項規定訂定之。"}, {"no": "第2條", "chapter": "第一章 總則", "content": "本準則適用於本法第三條第七款所定之食品業者。\n食品業設有食品工廠者，該工廠之建築、設施及設備，除應符合本準則之規定外，並應符合食品工廠建築及設備設廠標準。"}, {"no": "第3條", "chapter": "第一章 總則", "content": "本準則用詞，定義如下：\n一、原材料：指食品、食品添加物、食品器具、容器、包裝或食品用洗潔劑，其成品之原料及包裝材料。\n二、原料：指成品之構成材料。\n三、食品從業人員：指工作內容與食品、食品添加物直接接觸，或製程中用器械及工具處理食品、食品添加物，且影響產品衛生安全之人員。\n四、作業場所：指原材料、半成品、成品之處理、製造、加工、調配、配膳、包裝及貯存之場所。\n五、有害微生物：指造成食品腐敗、品質劣化或危害公共衛生之微生物。\n六、接觸面：\n（一）直接接觸面︰指食品或食品添加物直接接觸之器具、容器、包裝、設備或設施之表面。\n（二）間接接觸面︰指加工或製造作業中，所流出之液體或蒸氣與食品、食品添加物直接接觸之設備。\n七、區隔：指就作業場所，依場所、時間、空氣流向等條件，予以有形或無形隔離之措施。\n八、食品工廠：指適用工廠管理輔導法之食品製造業者。\n九、真空包裝即食食品：指脫氣密封於密閉容器內，拆封後即可食用之食品。\n十、熱殺菌：指經加熱程序殺死病原菌、腐敗菌及其他微生物之措施。\n十一、密閉容器：指密封後可防止微生物侵入之容器。\n十二、商業滅菌：指利用熱、化學殺菌劑或其他方式，將密閉容器包裝食品中，對人體健康有害之活性微生物及其孢子殺滅，且於室溫下，對人體健康無害之微生物無法生長之措施。\n十三、熱殺菌密閉容器包裝低酸性食品：指平衡之酸鹼值(以下稱pH值)大於四點六，及水活性大於零點八五，並於包裝至密閉容器前或後，施行商業滅菌，得於室溫下保存之食品。\n十四、酸化食品：指添加酸化劑、酸性食品，且平衡pH值小於或等於四點六，及水活性大於零點八五，並於包裝至密閉容器前或後，施行熱殺菌，可於室溫下保存之食品。"}, {"no": "第4條", "chapter": "第一章 總則", "content": "食品業者之場區、設施及設備衛生管理，應符合附件一之規定。\n\n【附件一】場區、設施及設備之衛生管理規定\n一、場區應符合下列規定：\n(一)地面隨時清掃，保持清潔，避免塵土飛揚。\n(二)排水系統經常清理，保持暢通，避免有異味。\n(三)禽畜、寵物應予管制，並有適當之措施。\n二、建築及設施應符合下列規定：\n(一)牆壁、支柱及地面保持清潔，避免有納垢、侵蝕或積水等情形。\n(二)樓板或天花板保持清潔，避免長黴、剝落、積塵、納垢或結露等現象。\n(三)出入口、門窗、通風口及其他孔道保持清潔，並設置防止病媒侵入設施。\n(四)排水系統完整暢通，避免有異味，排水溝有攔截固體廢棄物之設施，並設置防止病媒侵入設施。\n(五)一般作業場所之光照度應達一百勒克斯(Lux)以上，工作或調理檯面之光照度達二百勒克斯(Lux)以上；使用之光源，不得改變食品之顏色；食品上方之照明設備，應有防護設備；照明設備保持清潔。\n(六)通風良好，無不良氣味。\n(七)配管外表保持清潔。\n(八)場所清潔度要求不同者，加以有效區隔及管理，且有足夠供搬運之空間。\n(九)除第三款及第四款外，實施有效之病媒防治措施，避免病媒出沒或其留下之痕跡。\n三、冷凍與冷藏之貯存及運輸設備，應符合下列規定：\n(一)冷凍貯存或運輸設備保持在攝氏負十八度以下；冷藏貯存或運輸設備保持在攝氏七度以下凍結點以上。\n(二)避免溫度劇烈變動，並定期除霜，保持清潔。\n(三)於明顯處設置溫度指示器，並作成紀錄。相關設備及儀器，定期維護或確認效能及校正其準確性。\n(四)冷凍、冷藏之運輸、貯存及陳列，不得逾貯存或運輸設備之最大裝載線；無最大裝載線者，其貯存或陳列，應考量氣體之適當流動，維持適當之冷空氣循環。\n四、設有員工宿舍、餐廳、休息室、更衣室、檢驗場所或研究室者，應與作業場所為有形之區隔，且經常保持清潔，並指派專人負責。\n五、廁所應符合下列規定：\n(一)設置地點避免污染水源。\n(二)不得正面開向作業場所。但有緩衝設施及有效控制空氣流向防止污染者，不在此限。\n(三)保持整潔，避免有異味，並備有洗手設施。\n(四)於明顯處標示「如廁後應洗手」或相類文義之用語。\n六、供水設施應符合下列規定：\n(一)食品、食品添加物、食品用洗潔劑製程中之用水、冰塊，及清洗製造有關之設備與用具之用水，符合飲用水水質標準。\n(二)有足夠之水量及供水設施。\n(三)使用地下水源者，其水源與化糞池、廢棄物堆積場所等污染源，至少保持十五公尺之距離。\n(四)蓄水池（塔、槽）設置地點應距離化糞池、廢棄物堆積場所或其他污染源三公尺以上，並保持清潔，每年至少清理一次，並作成紀錄。\n(五)飲用水與非飲用水之管路系統，應完全分離；第一款與非第一款用水，能明顯辨識區分出水口。\n七、作業場所洗手設施應符合下列規定：\n(一)洗手及乾手設備之設置地點應適當，數目足夠。其使用方式之設計，應避免手部再度遭受污染。\n(二)備有流動水源、清潔劑，及擦手紙巾或其他乾手設備；必要時，設置消毒設備。\n(三)於明顯之位置標示簡明易懂之洗手步驟及方法。\n八、設有更衣室者，應有工作人員存放衣物之衣櫃。"}, {"no": "第5條", "chapter": "第一章 總則", "content": "食品業者之從業人員、設備器具、化學物質、廢棄物及油炸時所使用之食用油衛生管理，應符合附件二之規定。\n\n【附件二】從業人員、器具設備、化學物質、廢棄物及油炸時所使用之食用油之衛生管理規定\n一、人員衛生管理，應符合下列規定：\n(一)進用食品從業人員時，經醫療機構檢查Ａ型肝炎、傷寒、出疹、膿瘡、外傷、手部皮膚病等合格後，始得聘僱；雇主每年應主動辦理食品從業人員前述檢查至少一次。\n(二)新進食品從業人員應經至少三小時教育訓練，使其執行能力符合生產、衛生及品質管理要求之要求，並作成紀錄；在職食品從業人員，除法令另有規定外，定期接受食品業者自行、衛生主管機關或其認可之機構辦理之食品安全、衛生及品質管理教育訓練，每年至少三小時，並作成紀錄；業者自行辦理者，其講師應由具食品安全衛生及品質管理相關學、經歷之人員或外聘專家擔任。\n(三)罹患或感染Ａ型肝炎、傷寒、出疹、膿瘡、外傷、手部皮膚病或其他可能造成食品污染之疾病，其罹患或感染期間，應主動告知現場主管，不得從事與食品接觸之工作。\n(四)食品從業人員於作業場所內，穿戴整潔之工作衣帽(鞋)及戴口罩；其個人衣物，不得帶入作業場所。\n(五)於作業場所工作之人員，其手部應保持清潔；不得蓄留指甲、塗抹指甲油、指甲彩繪、使用指甲貼片或佩戴飾物，並不得使肌膚上之化粧品、藥品及其他物品污染產品。於進入作業場所前、如廁、吐痰、擤鼻涕或其他可能污染手部之行為後，立即洗淨再工作。\n(六)於作業場所內工作時，不得有吸菸、嚼檳榔、嚼口香糖、飲食或其他可能污染產品之行為。\n(七)食品從業人員調理即食食品之手部，應澈底洗淨及消毒，必要時應穿戴清潔之不透水手套。\n(八)食品從業人員調理即食食品之手部，不得同時或接續接觸金錢或其他有污染之虞物品。\n(九)非食品從業人員，出入食品作業場時，應予適當管制；進入時，應符合第四款至第七款有關食品從業人員之衛生要求。\n二、設備及器具之清洗衛生，應符合下列規定：\n(一)依設備或器具所標示注意事項及其供應商提供之正確使用方式使用，其食品接觸面保持平滑、無凹陷或裂縫，並保持清潔。\n(二)設備及器具使用前，確認其清潔，使用後清洗乾淨，並避免再受污染。\n(三）清洗消毒作業，應防止清潔劑或消毒劑污染食品接觸面、原材料、半成品、成品及包(盛)裝材料。\n三、病媒防治用、清潔或消毒用，或其他化學物質，及其施作用具之衛生管理，應符合下列規定：\n(一)使用環境保護主管機關許可之病媒防治用藥，明確標示及存放於固定場所，且不得污染食品或食品接觸面，並指定專人負責保管及記錄其用量。\n(二)清潔劑、消毒劑及其他化學物質、藥劑，明確標示及存放於固定場所，並指定專人負責保管及記錄其用量。\n(三)作業場所內，除製造或維護衛生所必要使用之化學物質、藥劑外，不得存放其他化學物質或藥劑。\n(四)清潔、清洗及消毒施作用具或機具，置放於專用場所並妥善保管。\n四、廢棄物處理，應符合下列規定：\n(一)作業場所內及其四周，不得任意堆置廢棄物。\n(二)放置廢棄物場所，不得有異味或有害（毒）氣體溢出，並依廢棄物清理法相關法規清除及處理。\n(三)反覆使用盛裝廢棄物之容器及處理廢棄物之機器設備，於使用後，應立即清洗，必要時進行消毒。\n(四)化學藥品、放射性物質、有害微生物、腐敗物、過期回收產品或其他足以危害人體健康及食品安全衛生之廢棄物，應分別設置專用貯存設備。\n五、油炸時所使用之食用油，其總極性化合物（total polar compounds）含量達百分之二十五時，應全部更換新油，不得再予使用。\n前項總極性化合物，指油脂經加熱發生裂解或聚合作用，產生具有化學極性之化合物之總和。\n六、食品業者應指派管理衛生人員，就建築與設施及衛生管理情形，按日填報衛生管理紀錄，其內容包括本準則所定衛生工作。\n管理衛生人員之教育訓練，應符合第一點第二款之規定。"}, {"no": "第6條", "chapter": "第一章 總則", "content": "食品業者之製程及品質管制，應符合附件三之規定。\n\n【附件三】製程及品質管制規定\n一、使用之原材料，應符合本法及其相關法令之規定，並有可追溯來源之相關資料或紀錄。\n二、原材料進貨時，應經驗收程序，驗收不合格者，明確標示，並適當處理，免遭誤用。\n三、原材料之暫存，應避免製程中之半成品或成品遭受污染；需溫溼度管制者，應建立管制方法及基準，並作成紀錄。冷凍食品解凍時，應防止品質劣化。\n四、原材料，依先到期先出或先進先出原則使用；於外包裝或置放處，載明名稱、日期或其他可供辨識及追溯之資訊；於分裝或拆除外箱後，亦同。\n五、食品添加物應與其他原材料、半成品或成品得明顯辨別之專區貯存，並指定專人負責管理，並以紙本或電子檔案專冊登載食品添加物之品名、種類、許可證字號或產品登錄碼、進貨量、領用與庫存之數量、日期。\n六、食品添加物之使用，應符合食品添加物使用範圍及限量暨規格標準之規定；具使用限量者，其秤量及投料，應重複檢核，並作成紀錄。\n七、製程應符合下列規定：\n(一)製程規劃，符合衛生安全原則。\n(二)所使用之設備、器具及容器，其操作、使用與維護，符合衛生安全原則。\n(三)原材料、半成品及成品，於製程中不得與地面直接接觸。\n(四)應有防止金屬或其他異物混入產品及交叉污染之措施。\n八、產品之包裝，應避免產品於貯運及銷售過程中變質或污染。\n九、得回收使用之器具、容器及包裝，應於回收後，予以清潔，並以適當方式消毒或殺菌。"}, {"no": "第7條", "chapter": "第一章 總則", "content": "食品業者之倉儲管制，應符合下列規定：\n一、原材料、半成品及成品倉庫，依其作業性質或清潔程度，分別設置或予以適當區隔，並有足夠供搬運之空間。\n二、物品應予分類，採取有效措施離地貯放，並保持整潔及良好通風。\n三、倉儲作業，依先到期先出或先進先出原則辦理，並確實記錄。\n四、倉儲作業，避免溫度劇烈變動；有管制溫度或溼度必要者，訂定合理溫度或溼度管制方法及基準，並定期檢查及確實記錄。\n五、倉儲過程中，原材料、半成品及成品，除有合理原因及依據，並作成紀錄者外，不得改變原設定之貯存條件。\n六、定期檢查貯存物之性狀及有效日期，必要時得予檢驗，並確實記錄其檢查或檢驗結果；其有異狀者，立即為適當之處理，並作成紀錄。\n七、有污染原材料、半成品或成品之虞之物品或包裝材料，設防止交叉污染之措施；其無從防止者，不得與原材料、半成品或成品一起貯存。"}, {"no": "第8條", "chapter": "第一章 總則", "content": "食品業者之運輸管制，應符合下列規定：\n一、運輸用之車輛及容器，定期清理，不得有結霜或結露現象，並保持清潔衛生。\n二、產品堆疊時，保持穩固，並維持空氣流通。\n三、收貨、裝貨、理貨及卸貨儘速完成，避免發生運輸設備廂體及容器或產品之溫度劇烈變動。\n四、運輸過程中，避免溫度劇烈變動；有管制溫度或溼度必要者，訂定合理溫度或溼度管制方法及基準，定期檢測，並作成紀錄。\n五、裝載訂有保存溫度之原材料、半成品或成品前，運輸設備之廂體或容器確保維持有效保溫狀態；除有合理原因及依據，並作成紀錄者外，不得改變原設定之條件。\n六、具冷凍或冷藏功能之運輸設備廂體，裝載訂有保存溫度之食品原材料、半成品或成品者，於每日收貨、裝貨、理貨或卸貨時，抽測運輸設備廂體內環境溫度，並作成紀錄。\n七、前款環境溫度，裝載冷凍食品之廂體，不得高於攝氏負十二度。裝載冷藏食品之廂體，不得高於攝氏七度。\n八、運輸過程中，食品有遮蔽、覆蓋或其他適當管理之措施。\n九、同時載運可能污染原材料、半成品或成品之其他物品者，設置防止交叉污染之措施；其未能防止交叉污染者，不得同時載運。"}, {"no": "第9條", "chapter": "第一章 總則", "content": "食品業者就申訴案件之處理及產品之回收與處理，應作成紀錄。"}, {"no": "第10條", "chapter": "第一章 總則", "content": "食品業者之檢驗及量測管制，應符合下列規定：\n一、設有檢驗場所者，具有足夠空間及檢驗設備，供進行品質管制及衛生管理相關之檢驗工作；必要時，得委託具公信力之專業檢驗或研究機構檢驗。\n二、設有微生物檢驗場所者，與其他檢驗場所為有形之區隔。\n三、檢驗採用簡便方法者，定期與主管機關或法令規定之檢驗方法核對，並作成紀錄。\n四、就檢驗中可能產生之生物性、物理性及化學性污染源，建立有效管制措施。\n五、定期校正檢驗儀器、測量器或記錄儀，維持其準確性，並作成紀錄。"}, {"no": "第11條", "chapter": "第一章 總則", "content": "食品業者依本準則作成之紀錄、報告或其他相關文件、資料，應至少保存五年。"}, {"no": "第12條", "chapter": "第二章 食品製造業", "content": "食品製造業作業場所之配置及空間，應符合下列規定：\n一、作業性質不同之場所，個別設置或有效區隔，並採取避免交叉污染之措施。\n二、具足夠空間，供作業設備與食品器具、容器、包裝之放置、衛生設施之設置及原材料之貯存。"}, {"no": "第13條", "chapter": "第二章 食品製造業", "content": "食品製造業在製程中，應符合下列規定：\n一、應管制溫度、溼度、pH值、水活性、壓力、流速、時間及其他相關事項或有必要者，建立管制方法及基準，並作成紀錄。\n二、就原料、半成品及成品之檢驗狀況，為適當標示，並依其狀況為適當之處理。\n三、製程及品質管制，應作成紀錄；有異常發生者，應採取矯正及預防措施，並作成紀錄。"}, {"no": "第14條", "chapter": "第二章 食品製造業", "content": "食品製造業訂定產品有效日期，應以保存性之試驗或其他合理文件、資料為據，並將其試驗結果作成紀錄；產品並應留樣保存至有效日期。"}, {"no": "第15條", "chapter": "第二章 食品製造業", "content": "食品製造業每批成品應確認符合其品保要求；不符合者，應有適當處理程序，並作成紀錄。"}, {"no": "第16條", "chapter": "第二章 食品製造業", "content": "食品製造業產品銷售予非自然人之直接買受者，應有可追蹤流向之相關資料或紀錄。"}, {"no": "第17條", "chapter": "第二章 食品製造業", "content": "食品製造業應對成品回收之處理，訂定回收及處理計畫，並據以執行。"}, {"no": "第18條", "chapter": "第二章 食品製造業", "content": "食品製造業製造之真空包裝即食食品具下列條件之一者，得於常溫貯存及販售：\n一、水活性零點八五以下。\n二、平衡pH值九點零以上。\n三、經熱殺菌或商業滅菌。\n四、天然酸性食品。\n五、平衡pH值小於四點六或鹽濃度大於百分之十之發酵食品。\n六、碳酸飲料。\n七、其他於常溫得抑制肉毒桿菌生長之條件。\n前項第四款天然酸性食品，指未經調整酸鹼，其平衡pH值小於四點六之食品。\n第一項第五款發酵食品，指經微生物代謝作用所製造、加工、調配之食品。"}, {"no": "第19條", "chapter": "第二章 食品製造業", "content": "食品製造業者製造之真空包裝即食食品以冷藏保存者，除具下列條件之一者外，其保存期間不得超過十日：\n一、添加亞硝酸鹽或硝酸鹽。\n二、水活性零點九四以下。\n三、產品平衡pH值小於四點六。\n四、鹽濃度大於百分之三點五之煙燻或發酵產品。\n五、其他具有得抑制肉毒桿菌之條件。"}, {"no": "第20條", "chapter": "第二章 食品製造業", "content": "第十八條第一項第一款至第五款，及前條第二款至第四款之產品，食品製造業者應留存各該款條件量測報告之證明。\n第十八條第一項第三款之產品，並應依第七章之規定辦理。"}, {"no": "第21條", "chapter": "第二章 食品製造業", "content": "食品工廠應就第四條至第十七條所定事項，訂定標準作業程序據以執行，並作成紀錄。"}, {"no": "第22條", "chapter": "第三章 食品物流業", "content": "食品物流業者，應訂定物流管制標準作業程序據以執行，並作成紀錄。\n前項作業程序，應包括倉儲及運送管制。"}, {"no": "第23條", "chapter": "第三章 食品物流業", "content": "食品物流業者，應依製造業者設定之溫度及其他貯存條件運送。"}, {"no": "第24條", "chapter": "第三章 食品物流業", "content": "食品及食品添加物之物流作業，應確保其容器、包裝完整，避免產品擠壓或碰撞。"}, {"no": "第25條", "chapter": "第三章 食品物流業", "content": "食品外送平台業者提供食品外送服務，衛生管理應符合下列規定：\n一、外送員應經衛生安全管理之教育訓練，並作成紀錄。\n二、外送員取得及交付食品時，不得有吸菸、嚼檳榔、嚼口香糖或其他污染食品之行為。\n三、外送箱具密封保溫效果。\n四、外送食品前，檢查裝備，並保持清潔乾淨。\n五、運送過程中，外送食品應完整包覆，並有確保食品未遭受污染之措施。\n六、運送過程中，避免溫度劇烈變動，並有外送時間及溫度之管控措施。\n七、指派管理衛生人員，管理外送員及外送箱之衛生。"}, {"no": "第26條", "chapter": "第四章 食品販賣業", "content": "食品販賣業應符合下列規定：\n一、販賣、貯存食品或食品添加物之設施及場所，保持清潔，並設置有效防止病媒侵入之設施。\n二、食品或食品添加物應分別妥善保存、整齊堆放。\n三、食品添加物應置於與其他原材料、半成品或成品明顯辨別之專區販賣、貯存，並指定專人管理，且以紙本或電子檔案，專冊登載食品添加物種類、許可證字號或產品登錄碼、進貨量、出貨量及存量。\n四、食品熱藏之溫度，保持攝氏六十度以上。\n五、指派管理衛生人員，於現場負責食品衛生管理工作。\n六、販賣、貯存作業，遵行先到期先出或先進先出之原則。\n七、販賣、貯存作業，應管制溫度、溼度者，建立管制方法及基準，據以執行並作成紀錄。\n八、販賣、貯存作業中，定期檢查產品之有效日期、保存條件及貯存狀態；有異狀時，立即處理。\n九、有污染原材料、半成品或成品之虞之物品或包裝材料，設防止交叉污染之措施；其無從防止者，不得與原材料、半成品或成品一起貯存。\n十、販賣場所之光線達到二百勒克斯(Lux)以上；使用之光源，不得改變食品之顏色。\n食品販賣業屬連鎖品牌門市達三家以上，且該品牌總公司資本額達新臺幣三千萬元以上之便利商店、超級市場及量販店，應依第四條、第五條及第七條至第九條規定，訂定相關標準作業程序據以執行，並作成紀錄。"}, {"no": "第27條", "chapter": "第四章 食品販賣業", "content": "販賣、貯存冷凍食品或冷藏食品，不得改變製造業者原來設定之保存溫度。\n冷凍食品應予包裝或適當包裹；包裝、包裹脫落或破損時，不得販賣。\n食品貯存或陳列於冷凍（藏）貯存設備時，不得超越最大裝載線；無最大裝載線者，其貯存或陳列，應考量氣體之適當流動，維持保存溫度。"}, {"no": "第28條", "chapter": "第四章 食品販賣業", "content": "販賣、貯存烘焙食品者，應符合下列規定：\n一、未包裝者，使用清潔之容器、器具裝貯，分類陳列，並有防止污染之措施及設備，且備有清潔之夾子及盛物籃（盤）供消費者選購使用。\n二、以奶油、布丁、果凍、水果或易變質、腐敗之餡料或其他相關食品裝飾或充餡者，貯放於冷藏貯存設備內。"}, {"no": "第29條", "chapter": "第四章 食品販賣業", "content": "販賣禽畜、水產食品者，應符合下列規定：\n一、陳列檯面採用不易透水及耐腐蝕之材質，且符合食品器具容器包裝衛生標準之規定。\n二、販賣場所有適當洗滌及排水設施。\n三、禽畜、水產食品之販賣及處理，分類貯放於棧板、貨架或採取其他隔離措施，不得直接放置地面，並保持良好通風及排水。\n四、工作檯面、砧板或刀具，保持平整清潔；供應生食或不經加熱即可食用之魚類、肉類及其製品，另備專用刀具、砧板。\n五、使用絞肉機、切片機或其他相關機具，保持清潔，並避免污染。\n六、生鮮禽畜、水產食品之清洗，以水槽或適當容器盛裝；清洗之用水符合飲用水水質標準。\n七、禽畜、水產食品之貯存、陳列或販賣，進行時間管制，並維持適當溫度。\n八、販賣冷凍、冷藏之禽畜、水產食品，有冷凍、冷藏之貯存設備或設施。\n九、禽畜、水產食品以冰藏方式貯存、陳列或販賣者，使用之冰塊符合飲用水水質標準。"}, {"no": "第30條", "chapter": "第五章 餐飲業", "content": "餐飲業作業場所，應符合下列規定：\n一、洗滌場所有符合飲用水水質標準之流動水，並具有洗滌、沖洗及有效殺菌功能之餐具清洗設施；水龍頭高度高於水槽滿水位高度，防水逆流污染；無充足之符合飲用水水質標準之流動水者，使用用畢即行丟棄之餐具。\n二、截油設施，經常清理乾淨。\n三、油煙有
