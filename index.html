    "食品有效日期訂定公文(FDA食字第1041303237號)": [{"no": "公文基本資料", "chapter": null, "content": "發文機關：衛生福利部食品藥物管理署\n發文日期：中華民國104年9月16日\n發文字號：FDA食字第1041303237號\n主旨：有關食品有效日期之訂定，詳如說明，請查照並轉知所屬。\n附件：FDA食字第1021351916號函影本"}, {"no": "說明一：有效日期之訂定原則", "chapter": null, "content": "包裝食品之有效日期，應由原製造工廠依其所使用之原料、產品製程、產品特性等因素，並經相關儲存試驗而據以制定，而有效日期除廠商為其產品品質之保證外，更有對該產品在效期內負責之意義，故不得擅自制定或更改。"}, {"no": "說明二：分裝與加工之區別", "chapter": null, "content": "產品倘僅由大包裝分裝成小包裝，未再經進一步之加工製程，恐已增加食品安全風險，為保障消費者食的安全，不得延長保存期限；惟產品倘經調配、殺菌等加工程序或處理，而改變原廠之保存期限，則業者應提供科學依據佐證備查。\n\n本署102年12月25日FDA食字第1021351916號函示所述「產品僅進行分裝、改裝動作，因新包材或變更包材方式而縮短或延長原廠之保存期限，則業者應提供科學依據」之內容，停止適用。"}, {"no": "說明三：冷凍轉冷藏販售規定", "chapter": null, "content": "原為冷凍貯存之產品倘於冷凍效期內轉以冷藏形式販售，原製造商應對其產品具有改變溫層之設定及備有相關保存試驗等資料以供佐證，且業者應依原製造商所提供之保存試驗等資料，據以決定產品販售（保存）條件，不應任意改變產品販售溫層。"}, {"no": "附件：FDA食字第1021351916號函（102年12月25日）", "chapter": null, "content": "發文機關：衛生福利部食品藥物管理署\n發文日期：中華民國102年12月25日\n發文字號：FDA食字第1021351916號\n主旨：有關食品（含油品）有效日期之訂定，詳如說明，請查照並轉知所屬。\n\n說明一：包裝食品（含油品）之有效日期應由原製造工廠依其所使用之原料、產品製程、產品特性並經相關儲存試驗所制定，而有效日期除為產品品質之保證外，仍賦有廠商對該產品負責之責任意義，故輸入者不得擅自制定或更改。如業者輸入產品後僅進行分裝、改裝動作，則該產品之有效日期標示應與進口之原包裝所標示之有效日期相符，如產品因新包材或變更包裝方式而縮短或延長原廠之保存期限，則業者應提供科學依據。\n\n說明二：依市售包裝食品有效日期評估指引，包裝食品之日期標示，因各國法規要求不同，而有不同的標示意義，例如「use by」和「expiry date」，與國內的「有效日期」定義相似；另外，「best before」和「賞味期限」則表示在此日期之前，食品可保持最佳品質，但並不表示在此日期之後，食品就不安全或變質。\n\n說明三：食品業者在標示進口食品有效日期時，僅在能請製造商提供足以佐證相等於我國「有效日期」定義的相關資料時，方可於包裝上標示與原包裝上標示的「best before」和「賞味期限」日期不同的「有效日期」。若無法提供足以佐證相等於我國「有效日期」定義的相關資料，則「best before」和「賞味期限」日期應視為「有效日期」。"}],
    "問答集_20190412": [{"no": "Q1-1", "chapter": "一、需登錄之業者及事項", "content": "問：何謂本辦法所述之「物流業」?\n\n答：依據食品安全衛生管理法第3條第7項：「食品業者：指從事食品或食品添加物之製造、加工、調配、包裝、運送、貯存、販賣、輸入、輸出或從事食品器具、食品容器或包裝、食品用洗潔劑之製造、加工、輸入、輸出或販賣之業者。」如有上述運送食品或食品添加物之營業行為，即屬物流業，包含僅以車輛作商品運送服務之貨運(商)行。"}, {"no": "Q1-2", "chapter": "一、需登錄之業者及事項", "content": "問：何謂倉儲場所資訊？\n\n答：貯存食品(含原料、半成品和成品)及食品添加物，屬於倉儲行為，故均屬本辦法規範對象。所需填報之倉儲場所資訊包含地址、聯絡電話、儲運條件等。"}, {"no": "Q1-3", "chapter": "一、需登錄之業者及事項", "content": "問：食品或食品添加物產品從製造生產到消費者端有一個以上之倉儲場所，例如工廠倉儲區、通路商產品倉庫等資料，製造商均須填報嗎？\n\n答：各業者僅需填報各自負有管理責任之倉庫資訊，例如：製造商填報其所有或租用的倉庫、而通路商另外自行填報其所有或租用的部分。"}, {"no": "Q1-4", "chapter": "一、需登錄之業者及事項", "content": "問：非純食品或食品添加物物流業者，例如：「食品或食品添加物輸入業者本身有配送」、「食品或食品添加物製造加工業者本身有運送或委託貨運行運送」或「餐飲或販售業者兼有物流行為」等樣態之業者，是否需登錄物流業？\n\n答：\n1. 如業者行為僅係管理自家公司之貨物，則非為本辦法所稱應獨立登錄之「物流業」，惟注意仍應於本身產業類別(製造及加工、餐飲、輸入或販售業等)之項下，登錄其倉儲資訊；如係代為其他公司配送，則應登錄「物流業」相關資訊。\n2. 若是由第三方運輸公司進行配送，則該第三方運輸公司應依本辦法登錄「物流業」相關資訊。"}, {"no": "Q1-5", "chapter": "一、需登錄之業者及事項", "content": "問：運送蔬菜、農產品之業者，是否屬本辦法規範對象？\n\n答：是。食品係指供人飲食或咀嚼之產品及其原料。故運送蔬菜、農產品之業者屬物流業者。"}, {"no": "Q1-6", "chapter": "一、需登錄之業者及事項", "content": "問：保稅倉、進出口貨櫃集散站是否要登錄倉儲資訊？報關行、承攬業者是物流業嗎?\n\n答：以輸入食品為例，倘保稅倉與進出口貨櫃集散站放置之外國產品屬已完成通關之輸入產品，輸入業者需依本辦法登錄其倉儲資訊。倘報關行與承攬業者，對食品或食品添加物產品之運送行為，屬Q1-4第1點所指之管理自家公司之貨品行為，則非本辦法所稱應獨立登錄之「物流業」，非上述情形者，則需依本辦法登錄物流業。"}, {"no": "Q1-7", "chapter": "一、需登錄之業者及事項", "content": "問：食品用洗潔劑、食品器具、食品容器或包裝之運送業者，是否屬本辦法規範對象？\n\n答：否。進行食品用洗潔劑、食品器具、食品容器或包裝運送之業者，非屬食品業者，亦非屬本修正辦法所稱之「物流業」。"}, {"no": "Q1-8", "chapter": "一、需登錄之業者及事項", "content": "問：將食品或食品添加物貯放於長期、短期或臨時一次性外租倉庫之營業行為樣態，需要登錄嗎?\n\n答：是。食品製造及加工、餐飲、輸入或販售業者，若有將食品或食品添加物產品貯存於倉庫內之營業行為，不論租期長短，皆應登錄其所屬業別下的倉儲場所基本資料。"}, {"no": "Q1-9", "chapter": "一、需登錄之業者及事項", "content": "問：具結先行放行產品之存放地點屬於倉儲資訊嗎?\n\n答：是。具結先行放行產品屬已完成通關之輸入產品，輸入業者須依本辦法於食品業者登錄平台(非登不可)登錄，且必須勾選「有」倉儲或存放地點選項及填寫具結先行放行產品之倉儲或存放地點等相關資訊。"}, {"no": "Q1-10", "chapter": "一、需登錄之業者及事項", "content": "問：網路平台業者是否為食品業者?\n\n答：依據食品安全衛生管理法第3條第7款略以：從事食品或食品添加物之運送業者，即為食品業者。網路平台業者如係派案予簽約人員、聘僱外送服務員運送食品，或以平台名義接受消費者之訂單，再另行委託他人提供運送服務，因有參與或提供食品運送服務行為，皆屬食品業者。反之，平台如僅提供雙方資訊，由食品業者自行透過平台資訊尋找物流業者合作，平台沒有參與或提供食品運送服務行為，則非食品業者。"}, {"no": "Q2-1", "chapter": "二、登錄內容", "content": "問：本辦法所稱之物流業者需要登載客戶之產品資料嗎？\n\n答：登錄系統係掌握物流業者基本資料，目前針對物流業者所規範之登錄內容包括：填報人基本資料、食品業者基本資料、倉儲場所基本資料及其他有關物流行為之說明等；尚不包括所貯存產品之詳細資訊。"}, {"no": "Q2-2", "chapter": "二、登錄內容", "content": "問：如單一業者(僅1個統一編號)有好幾個倉庫，要如何填報?\n\n答：系統將以建立清單方式，供業者針對各倉儲場所逐項建檔。"}, {"no": "Q3-1", "chapter": "三、案例說明", "content": "問：如有暫存倉庫、營業據點因連假時有多天暫時存放食品或食品添加物情形，是否需登錄?\n\n答：只要有貯存食品或食品添加物行為，即應依法登錄。當登錄內容有變更(例如臨時發生暫存行為)，即應於事實發生後30天內至系統完成變更。"}, {"no": "Q3-2", "chapter": "三、案例說明", "content": "問：如倉儲所有權人出租其倉庫、供其他業者(使用人)作為其食品或食品添加物產品之貯存場所，誰需要登錄物流倉儲資訊?\n\n答：承租倉庫之使用人如貯存食品或食品添加物，應於其既有營業類別(如製造加工、輸入或倉儲物流)頁籤中，登錄其倉儲資訊。"}, {"no": "Q3-3", "chapter": "三、案例說明", "content": "問：中盤商或代購型態之食品或食品添加物販售業者，對於產品僅涉調貨及出貨行為，並非庫存商品之貯存管理人(例如產品係置於製造加工業者之成品暫存場所)是否需登錄倉儲資訊?\n\n答：所示例之代購業者，應登錄「販售業」頁籤相關資訊，惟倉儲資訊逕由實際涉有食品或食品添加物貯存行為之業者登錄即可。"}, {"no": "Q3-4", "chapter": "三、案例說明", "content": "問：續Q3-3情境，如有「進倉驗收後立即轉售予下游業者」之情形，是否需登錄倉儲資訊？\n\n答：是，業者凡有將食品或食品添加物產品貯存於倉庫內之營業行為，不論租期長短，皆應登錄倉儲資訊。"}, {"no": "Q3-5", "chapter": "三、案例說明", "content": "問：如為臨時性倉庫，該如何進行登錄？\n\n答：業者凡有將食品或食品添加物產品貯存於倉庫內之營業行為，不論租期長短，皆應登錄物流倉儲資訊，又如該倉庫已無使用可能(例如改建、倒塌、明確文書說明挪作他用)，依據食品業者登錄辦法第7條，食品業者應自事實發生之日起30日內，申請變更登錄。惟若該倉庫僅係閒置、尚可提供上述產品貯放，則應維持該場所之倉儲場所資訊。"}, {"no": "Q3-6", "chapter": "三、案例說明", "content": "問：食品業者是否需尋找具食品業者登錄字號之物流業者以委運商品？\n\n答：是，食品業者有委運商品時，應知會及確認所涉之食品或食品添加物物流業者，完成物流業資訊之登錄。"}, {"no": "Q3-7", "chapter": "三、案例說明", "content": "問：運送食品之車輛或儲存食品之倉庫，可運送或貯存非食品嗎？\n\n答：食品安全衛生管理法並無限制物流倉儲之產品種類，惟業者於運輸食品相關產品時，應符合「食品良好衛生規範準則」第7條有關食品業者運輸管制之相關規定，包含應有防止交叉污染之措施等，及該準則第16條之食品物流業相關規定。"}, {"no": "Q3-8", "chapter": "三、案例說明", "content": "問：餐飲業者之冰箱、乾料，需要就倉儲部分登錄嗎?\n\n答：針對「餐飲場所」內暫時存放食品或食品添加物之行為，業者尚無須額外登錄；惟於餐飲場所外的其他場所貯放食品或食品添加物者，即應登錄其倉儲場所資訊。"}, {"no": "Q4-1.1", "chapter": "四、系列情境說明", "content": "情境：A工廠生產食品產品賣給C經銷商（請B貨運公司運送至C經銷商倉庫），C經銷商再販售及運送給商店。\n\n問：B貨運公司是物流業嗎？需辦理食品業者登錄嗎？\n\n答：是。B公司從事食品運送行為，屬本辦法規範對象。應依法辦理食品業者登錄。"}, {"no": "Q4-1.2", "chapter": "四、系列情境說明", "content": "情境：A工廠生產食品產品賣給C經銷商（請B貨運公司運送至C經銷商倉庫），C經銷商再販售及運送給商店。\n\n問：C經銷商是物流業嗎？(若C已有食品業者登錄：販售業，還要登錄物流業？)\n\n答：若有涉及代其他公司運送食品行為，則應登錄「物流業」相關資訊；而若僅有配送自家公司販售之食品，則尚無需登錄「物流業」相關資訊。另，C經銷商確具食品貯存行為，故應於「販售業」頁籤項下登錄其倉儲場所資訊。"}, {"no": "Q4-2.1", "chapter": "四、系列情境說明", "content": "情境：A工廠因廠內倉儲空間不足，請B貨運公司將食品產品運送至A工廠於廠外承租之D民間倉儲廠房存放，出貨時A工廠再請B貨運公司將產品由D倉儲廠房運送至C經銷商。\n\n問：A工廠是物流業嗎？\n\n答：不是。A工廠屬製造及加工業，惟仍應登錄其產品於D業者廠房之倉儲場所資訊。"}, {"no": "Q4-2.2", "chapter": "四、系列情境說明", "content": "情境：A工廠因廠內倉儲空間不足，請B貨運公司將食品產品運送至A工廠於廠外承租之D民間倉儲廠房存放，出貨時A工廠再請B貨運公司將產品由D倉儲廠房運送至C經銷商。\n\n問：B貨運公司是物流業嗎？\n\n答：是。具「運送非B公司自家食品」之行為。"}, {"no": "Q4-3.1", "chapter": "四、系列情境說明", "content": "情境：F公司輸入食品或食品添加物，E船公司下貨到海關，經F公司請G報關行完成報關、報驗後，請H貨運公司運回F公司租賃之I倉庫存放。\n\n問：E船公司是物流業嗎？\n\n答：E船公司不論從事食品或其相關產品之國際或國內運送行為，皆屬食品物流業者。倘E船公司登記為我國船舶且符合食安法第3條第7款定義之物流業，始為本辦法要求應辦理登錄之物流業。"}, {"no": "Q4-3.2", "chapter": "四、系列情境說明", "content": "情境：F公司輸入食品或食品添加物，E船公司下貨到M櫃場，待報關放行後，H貨運公司運回F公司租賃之I倉庫。\n\n問：F公司是否要登錄M櫃場之倉儲資訊？\n\n答：以輸入業為例，M櫃場置放之欲輸入食品，因尚未完成通關程序，因此F公司尚不需進行M櫃場倉儲資訊登錄。"}, {"no": "Q4-3.3", "chapter": "四、系列情境說明", "content": "情境：F公司輸入食品，E船公司下貨到海關，經報關放行後，H貨運公司運回F公司租賃之I倉庫。\n\n問：H貨運公司是物流業嗎？\n\n答：H貨運公司運送F公司輸入之食品或食品添加物等產品，屬物流業者，應依法辦理食品業者登錄。"}, {"no": "Q4-3.4", "chapter": "四、系列情境說明", "content": "情境：F公司輸入食品，完成通關後存放於F公司租賃之I倉庫。\n\n問：F公司是否要登錄I倉庫之倉儲資訊？\n\n答：I倉庫存放之產品屬已完成通關產品，且F公司為輸入業，需將I倉庫登錄至倉儲資訊。"}, {"no": "Q4-3.5", "chapter": "四、系列情境說明", "content": "問：航空公司配合或自有之倉儲地點(如長榮、華儲等)是否需要登錄物流業並登錄其倉儲資訊？\n\n答：航空公司不論從事食品或其相關產品之國際或國內運送行為，皆屬食品物流業者。倘登記為我國航空公司且符合食安法第3條第7款定義之物流業，始為本辦法要求應辦理登錄之物流業。"}, {"no": "Q4-4", "chapter": "四、系列情境說明", "content": "情境：A工廠向K食品添加物販賣公司購買食品添加物，K公司請民間Q貨運公司貨車(專車或物流宅配)載至A工廠。\n\n問：Q貨運公司是物流業嗎？\n\n答：是。Q公司從事食品運送行為，屬本辦法規範對象。應依法辦理食品業者登錄。"}, {"no": "第五章說明", "chapter": "五、實施期程", "content": "說明：將依據公告修正之食品業者登錄辦法，另外預告修正「應申請登錄始得營業之食品業者類別、規模及實施日期」草案。俟評論期間結束後，將循程序辦理公告，屆時經公告指定類別及規模之業者，即應依公告實施日期，依法完成登錄。"}],
    "食品製造工廠衛生管理人員設置辦法_20190409": [
      {"no": "第 一 條", "chapter": "食品製造工廠衛生管理人員設置辦法", "content": "本辦法依食品安全衛生管理法（以下簡稱本法）第十一條第二項規定訂定之。"},
      {"no": "第 二 條", "chapter": "食品製造工廠衛生管理人員設置辦法", "content": "本辦法所稱食品製造工廠，係指依工廠管理輔導法及其相關規定，須辦理食品工廠登記之食品製造業者。"},
      {"no": "第 三 條", "chapter": "食品製造工廠衛生管理人員設置辦法", "content": "食品製造工廠應設置專任衛生管理人員（以下簡稱衛生管理人員）。\n前項衛生管理人員應於工廠實際執行本法第八條第四項所定食品良好衛生規範準則或食品安全管制系統準則之工作。"},
      {"no": "第 四 條", "chapter": "食品製造工廠衛生管理人員設置辦法", "content": "具下列資格之一者，得任衛生管理人員：\n一、公立或經政府立案之私立專科以上學校，或經教育部承認之國外專科以上學校食品、營養、家政、生活應用科學、畜牧、獸醫、化學、化工、農業化學、生物化學、生物、藥學、公共衛生等相關科系所畢業者。\n二、應前款科系所相關類科之高等考試或相當於高等考試之特種考試及格者。\n三、應第一款科系所相關類科之普通考試或相當於普通考試之丙等特種考試及格，並從事食品或食品添加物製造相關工作三年以上，持有證明者。"},
      {"no": "第 五 條", "chapter": "食品製造工廠衛生管理人員設置辦法", "content": "中央廚房食品工廠或餐盒食品工廠設置之衛生管理人員，得由領有中餐烹調乙級技術士證並接受衛生講習一百二十小時以上，持有經中央主管機關認可之食品衛生相關機構核發之證明文件者擔任。"},
      {"no": "第 六 條", "chapter": "食品製造工廠衛生管理人員設置辦法", "content": "資本額未達新臺幣三千萬元之食品製造工廠設置之衛生管理人員，得由同時具備下列資格者擔任：\n一、公立或經政府立案之私立高級職業學校食品科、食品加工科、水產食品科、烘焙科、家政科、畜產保健科、野生動物保育科、農場經營科、園藝科、化工科、環境檢驗科、漁業科、水產養殖科、餐飲管理科、觀光事業科畢業。\n二、於同一事業主體之食品或食品添加物製造工廠從事製造或製程品質管制業務四年以上，持有證明。\n三、持有經中央主管機關認可之食品安全管制系統訓練機關（構）核發之食品安全管制系統訓練六十小時以上之證明文件。\n【施行日期】本條自中華民國一百零九年七月一日施行。"},
      {"no": "第 七 條", "chapter": "食品製造工廠衛生管理人員設置辦法", "content": "中央主管機關依本法第八條第二項公告指定之食品業者，其設置之衛生管理人員除應符合第四條規定外，並應具備以下條件之一：\n一、經食品安全管制系統訓練六十小時以上。\n二、領有食品技師、畜牧技師、獸醫師、水產養殖技師或營養師證書，經食品安全管制系統訓練三十小時以上。\n前項各款食品安全管制系統訓練時數之認定，以中央主管機關認可之食品安全管制系統訓練機關（構）核發之證明文件為據。"},
      {"no": "第 八 條", "chapter": "食品製造工廠衛生管理人員設置辦法", "content": "食品製造工廠設置衛生管理人員時，應檢具下列文件送請直轄市、縣（市）衛生主管機關核備，異動時亦同：\n一、申報書一份及資料卡一式三份。\n二、衛生管理人員之資格證件文件、身分證、契約書影本一份。\n三、工廠登記證明文件影本一份。"},
      {"no": "第 九 條", "chapter": "食品製造工廠衛生管理人員設置辦法", "content": "衛生管理人員執行工作如下：\n一、食品良好衛生規範之執行與監督。\n二、食品安全管制系統之擬訂、執行與監督。\n三、其他有關食品衛生管理及員工教育訓練工作。"},
      {"no": "第 十 條", "chapter": "食品製造工廠衛生管理人員設置辦法", "content": "衛生管理人員於從業期間，每年至少應接受主管機關或經主管機關認可之食品衛生相關機構舉辦之衛生講習八小時。"},
      {"no": "第 十一 條", "chapter": "食品製造工廠衛生管理人員設置辦法", "content": "本辦法除第六條自中華民國一百零九年七月一日施行外，自發布日施行。"}
    ],
    "應置衛生管理人員之食品製造工廠類別及規模_20190409": [
      {"no": "一、訂定依據", "chapter": "應置衛生管理人員之食品製造工廠類別及規模", "content": "訂定依據：食品安全衛生管理法第十一條第一項。"},
      {"no": "二、應置工廠類別", "chapter": "應置衛生管理人員之食品製造工廠類別及規模", "content": "應置衛生管理人員之食品製造工廠類別為：\n（一）乳品製造業。\n（二）罐頭食品製造業。\n（三）冷凍食品製造業。\n（四）即食餐食業。\n（五）特殊營養食品製造業。\n（六）食品添加物製造業。\n（七）水產食品業。\n（八）肉類加工食品業。\n（九）健康食品製造業。\n（十）其他食品製造業。\n前項食品製造工廠之類別及產品業別分類之認定，依食品衛生相關法規之規定、中華民國行業標準分類及經濟部工業產品分類認定。"},
      {"no": "三、其他食品製造業規模及實施日期", "chapter": "應置衛生管理人員之食品製造工廠類別及規模", "content": "第二點第一項第十款（其他食品製造業）應置衛生管理人員之食品製造工廠類別，其規模及實施日期如下：\n（一）資本額新臺幣一億元以上者，自中華民國一百零八年七月一日實施。\n（二）資本額新臺幣三千萬元以上，未達一億元者，自中華民國一百零九年一月一日實施。\n（三）資本額未達新臺幣三千萬元，且食品從業人員五人以上者，自中華民國一百零九年七月一日實施。"}
    ],
    "食品業者專門職業或技術證照人員設置及管理辦法_20201106": [{"no": "第 一 條", "chapter": "食品業者專門職業或技術證照人員設置及管理辦法", "content": "本辦法依食品安全衛生管理法（以下簡稱本法）第十二條第二項規定訂定之。"}, {"no": "第 二 條", "chapter": "食品業者專門職業或技術證照人員設置及管理辦法", "content": "本辦法適用於中央主管機關依本法第十二條第一項經公告類別及規模之食品業者。"}, {"no": "第 三 條", "chapter": "食品業者專門職業或技術證照人員設置及管理辦法", "content": "本辦法所稱專門職業人員，指經考試院專門職業及技術人員高等考試及格，並領有證書者；所稱技術證照人員，指領有中央勞動主管機關所核發之技能檢定之技術士證者，或經其認可之專業認證機構所核發之具有技術士證同等效力之技能職類證書者。"}, {"no": "第 四 條", "chapter": "食品業者專門職業或技術證照人員設置及管理辦法", "content": "依本法第十二條第一項公告應置專門職業人員之食品業者，至少應置一名專任專門職業人員。\n食品業者依產業類別應置之專門職業人員，其範圍如下：\n一、禽畜產加工食品業、乳品加工食品業：食品技師、畜牧技師或獸醫師。\n二、水產加工食品業：食品技師或水產養殖技師。\n三、餐盒食品製造、加工、調配業或餐飲業：食品技師或營養師。\n四、其他食品製造業：食品技師。\n前項各款人員，應曾接受中央主管機關認可之食品安全管制系統訓練機關（構）（以下簡稱訓練機關（構））辦理之課程三十小時以上，且領有合格證書；從業期間，應每年至少八小時接受訓練機關（構）或其他機關（構）辦理與該系統有關之課程。前項其他機關（構）辦理之課程，應經中央主管機關認可。"}, {"no": "第 五 條", "chapter": "食品業者專門職業或技術證照人員設置及管理辦法", "content": "依本法第十二條第一項公告應置技術證照人員之食品業者，依產業類別應置之技術證照人員，其範圍如下：\n一、餐飲業：中餐烹調技術士、西餐烹調技術士或食物製備技術士。\n二、烘焙業：烘焙食品技術士、中式麵食加工技術士、中式米食加工技術士。\n前項食品業者所聘用調理烘焙從業人員中，其技術證照人員比率如下：\n一、觀光旅館之餐飲業：百分之八十五。\n二、承攬機構餐飲之餐飲業：百分之七十五。\n三、供應學校餐飲之餐飲業：百分之七十五。\n四、承攬筵席餐廳之餐飲業：百分之七十五。\n五、外燴飲食餐飲業：百分之七十五。\n六、中央廚房式之餐飲業：百分之七十。\n七、自助餐飲業：百分之六十。\n八、一般餐館餐飲業：百分之五十。\n九、前店後廠小型烘焙業：百分之三十。\n依前項比率計算，小數點後未滿一人者，以一人計。"}, {"no": "第 六 條", "chapter": "食品業者專門職業或技術證照人員設置及管理辦法", "content": "技術證照人員從業期間，每年至少八小時應接受各級主管機關或其認可之衛生講習機關（構）辦理之衛生講習。"}, {"no": "第 七 條", "chapter": "食品業者專門職業或技術證照人員設置及管理辦法", "content": "第四條專門職業人員，其職責如下：\n一、食品安全管制系統之規劃及執行。\n二、食品追溯或追蹤系統之規劃及執行。\n三、食品衛生安全事件緊急應變措施之規劃及執行。\n四、食品原材料衛生安全之管理。\n五、食品品質管制之建立及驗效。\n六、食品衛生安全風險之評估、管控及與機關、消費者之溝通。\n七、實驗室品質保證之建立及管控。\n八、食品衛生安全教育訓練之規劃及執行。\n九、國內外食品相關法規之研析。\n十、其他經中央主管機關指定之事項。"}, {"no": "第 八 條", "chapter": "食品業者專門職業或技術證照人員設置及管理辦法", "content": "第五條技術證照人員，其職責如下：\n一、食品之良好衛生規範準則相關規定之執行及監督。\n二、其他經中央主管機關指定之事項。"}, {"no": "第 九 條", "chapter": "食品業者專門職業或技術證照人員設置及管理辦法", "content": "食品業者置專門職業或技術證照人員，應於中央主管機關建立之登錄平台登錄各該人員資料及衛生講習或訓練時數。\n前項登錄資料如有變更，食品業者應自事實發生之日起三十日內變更登錄。\n食品業者每年應申報確認登錄內容。"}, {"no": "第 十 條", "chapter": "食品業者專門職業或技術證照人員設置及管理辦法", "content": "本辦法自發布日施行。"}],
    "應置專門職業或技術證照人員之食品業者類別及規模_20180501": [{"no": "公告沿革", "chapter": null, "content": "中華民國 107 年 5 月 1 日衛授食字第 1071300319 號公告訂定"}, {"no": "一、訂定依據", "chapter": "應置專門職業或技術證照人員之食品業者類別及規模規定", "content": "本規定依食品安全衛生管理法第十二條第一項規定訂定之。"}, {"no": "二、應置專門職業人員之食品業者類別", "chapter": "應置專門職業或技術證照人員之食品業者類別及規模規定", "content": "應置專門職業人員之食品業者類別如下：\n（一）餐盒食品製造、加工、調配業。\n（二）乳品加工食品製造、加工、調配業。\n（三）水產加工食品製造、加工、調配業。\n（四）肉類加工食品製造、加工、調配業。\n（五）罐頭食品製造、加工、調配業。\n（六）食用油脂製造、加工、調配業。\n（七）蛋製品製造、加工、調配業。\n（八）麵條及粉條類食品製造、加工、調配業。\n（九）醬油製造、加工、調配業。\n（十）食用醋製造、加工、調配業。\n（十一）調味醬製造、加工、調配業。\n（十二）非酒精飲料製造、加工、調配業。\n（十三）設有餐飲之國際觀光旅館業。\n（十四）設有餐飲之五星級旅館業。\n（十五）供應鐵路運輸旅客餐食之餐盒食品業。\n前項食品業者，其類別定義列於附表。"}, {"no": "三、應置專門職業人員之規模及實施日期", "chapter": "應置專門職業或技術證照人員之食品業者類別及規模規定", "content": "前點應置專門職業人員之食品業者，其規模及實施日期如下：\n（一）第一款及第二款之業者：依工廠管理輔導法及其相關規定，須辦理工廠登記者，自發布日實施。\n（二）第三款及第四款之業者：依工廠管理輔導法及其相關規定，須辦理工廠登記，食品從業人員二十人以上且資本額新臺幣三千萬元以上者，自發布日實施。\n（三）第五款至第十二款之業者（資本額一億元以上）：依工廠管理輔導法及其相關規定，須辦理工廠登記，食品從業人員二十人以上且資本額新臺幣一億元以上者，自中華民國一百零八年一月一日實施。\n（四）第五款至第十二款之業者（資本額三千萬元以上未達一億元）：依工廠管理輔導法及其相關規定，須辦理工廠登記，食品從業人員二十人以上且資本額新臺幣三千萬元以上，未達一億元者，自中華民國一百零九年一月一日實施。\n（五）第十三款之業者：辦有營業登記、商業登記或公司登記之國際觀光旅館業者，自發布日實施。\n（六）第十四款之業者：辦有營業登記、商業登記或公司登記之五星級旅館業者，自中華民國一百零七年七月一日實施。\n（七）第十五款之業者：辦有營業登記、商業登記、公司登記或工廠登記供應鐵路運輸旅客餐食之餐盒食品業者或餐飲業者，自中華民國一百零八年一月一日實施。"}, {"no": "四、應置技術證照人員之食品業者類別", "chapter": "應置專門職業或技術證照人員之食品業者類別及規模規定", "content": "應置技術證照人員之食品業者類別如下：\n（一）設有餐飲之觀光旅館業。\n（二）團膳承包之餐飲業。\n（三）供應學校餐盒之餐飲業。\n（四）承攬筵席餐廳之餐飲業。\n（五）外燴餐飲服務之餐飲業。\n（六）中央廚房式之餐飲業。\n（七）自助餐飲業。\n（八）一般餐館餐飲業。\n（九）前店後廠小型烘焙業。\n前項餐飲業及烘焙業，其類別之定義列於附表。"}, {"no": "五、應置技術證照人員之規模及實施日期", "chapter": "應置專門職業或技術證照人員之食品業者類別及規模規定", "content": "前點應置技術證照人員之食品業者，其規模及實施日期如下：\n（一）第一款之業者：辦有商業登記、公司登記者，自發布日實施。\n（二）第二款至第八款之業者：辦有商業登記、公司登記或依工廠管理輔導法及其相關規定，須辦理工廠登記者，自發布日實施。\n（三）第九款之業者：辦有商業登記、公司登記者，自發布日實施。"}, {"no": "附表（序號1–15）：食品製造業類別定義", "chapter": "附表 食品製造業、餐飲業及烘焙業之類別定義", "content": "<div class=\"reg-table-block\"><div class=\"table-scroll\"><table class=\"annex-table\"><thead><tr><th>\u5e8f\u865f</th><th>\u985e\u5225</th><th>\u5b9a\u7fa9</th></tr></thead><tbody>\n<tr><td>1</td><td>\u9910\u76d2\u98df\u54c1\u88fd\u9020\u3001\u52a0\u5de5\u3001\u8abf\u914d\u696d</td><td>\u6307\u4ee5\u7c73\u3001\u9eb5\u7b49\u7a40\u985e\u6216\uff08\u53ca\uff09\u5176\u52a0\u5de5\u54c1\u70ba\u4e3b\u98df\uff0c\u642d\u914d\u8fb2\u3001\u755c\u6216\u6c34\u7522\u7b49\u539f\u6599\uff0c\u7d93\u8abf\u7406\u5f8c\uff0c\u4ee5\u660e\u793a\u83dc\u55ae\u6216\u660e\u793a\u7522\u54c1\u5f62\u5f0f\u4e4b\u65b9\u5f0f\uff08\u5305\u62ec\u76d2\u9910\u8207\u5718\u81b3\uff09\uff0c\u914d\u81b3\u7d44\u5408\u6210\u76d2\u6216\u76db\u88dd\u65bc\u5927\u5bb9\u5668\uff0c\u4f9b\u5718\u9ad4\u6216\u500b\u4eba\u76f4\u63a5\u6216\u7d93\u7c21\u55ae\u5fa9\u71b1\u5f8c\uff0c\u65bc\u77ed\u6642\u9593\u5167\u98df\u7528\u4e4b\u7522\u54c1\uff08\u60df\u50c5\u7531\u70d8\u7119\u98df\u54c1\u7d44\u5408\u6210\u76d2\u8005\u4e0d\u5728\u6b64\u9650\uff09\u4e4b\u88fd\u9020\u3001\u52a0\u5de5\u3001\u8abf\u914d\u696d\u3002</td></tr>\n<tr><td>2</td><td>\u4e73\u54c1\u52a0\u5de5\u98df\u54c1\u88fd\u9020\u3001\u52a0\u5de5\u3001\u8abf\u914d\u696d</td><td>\u6307\u4ee5\u751f\u4e73\u6216\u4e73\u88fd\u54c1\u70ba\u539f\u6599\u4e4b\u4e73\u54c1\u52a0\u5de5\u98df\u54c1\uff0c\u5305\u62ec\u9bae\u4e73\u3001\u4fdd\u4e45\u4e73\u3001\u4e73\u7c89\u3001\u8abf\u5473\u4e73\u3001\u767c\u9175\u4e73\u3001\u7149\u4e73\u3001\u4e73\u8102\u3001\u5976\u6cb9\u3001\u4e7e\u916a\u53ca\u5176\u4ed6\u6db2\u614b\u4e73\u7b49\u7522\u54c1\u4e4b\u88fd\u9020\u3001\u52a0\u5de5\u3001\u8abf\u914d\u5de5\u5ee0\u3002</td></tr>\n<tr><td>3</td><td>\u6c34\u7522\u52a0\u5de5\u98df\u54c1\u88fd\u9020\u3001\u52a0\u5de5\u3001\u8abf\u914d\u696d</td><td>\u6307\u4ee5\u6c34\u7522\u52d5\u7269\u985e\u70ba\u4e3b\u6210\u5206\uff0c\u88fd\u6210\u53ef\u4f9b\u4eba\u98df\u7528\u4e4b\u98df\u54c1\uff0c\u4e14\u88fd\u9020\u4e4b\u7522\u54c1\u542b\u6c34\u7522\u52d5\u7269\u985e\u542b\u91cf\u9054\u767e\u5206\u4e4b\u4e94\u5341\u4ee5\u4e0a\u8005\uff0c\u5305\u62ec\u8abf\u5473\u4e7e\u88fd\u6c34\u7522\u98df\u54c1\u3001\u9e7d\u85cf\u6c34\u7522\u98df\u54c1\u3001\u9e7d\u4e7e\u6c34\u7522\u98df\u54c1\u3001\u7d20\u4e7e\u6c34\u7522\u98df\u54c1\u53ca\u716e\u4e7e\u6c34\u7522\u98df\u54c1\u7b49\u7522\u54c1\u4e4b\u88fd\u9020\u3001\u52a0\u5de5\u3001\u8abf\u914d\u5de5\u5ee0\u3002\u60df\u50c5\u5f9e\u4e8b\u521d\u7d1a\u52a0\u5de5\u8005\uff0c\u5305\u62ec\u5206\u7d1a\u3001\u9078\u5225\u3001\u5206\u5207\u3001\u8caf\u5b58\u3001\u904b\u9001\u4e0d\u5728\u6b64\u9650\u3002</td></tr>\n<tr><td>4</td><td>\u8089\u985e\u52a0\u5de5\u98df\u54c1\u88fd\u9020\u3001\u52a0\u5de5\u3001\u8abf\u914d\u696d</td><td>\u6307\u4ee5\u755c\u79bd\u8089\u985e\u6216\u5176\u96dc\u788e\u985e\u70ba\u4e3b\u6210\u5206\uff0c\u88fd\u6210\u53ef\u4f9b\u4eba\u98df\u7528\u4e4b\u98df\u54c1\uff0c\u4e14\u88fd\u9020\u4e4b\u7522\u54c1\u542b\u755c\u79bd\u8089\u985e\u6216\u5176\u96dc\u788e\u985e\u542b\u91cf\u9054\u767e\u5206\u4e4b\u4e94\u5341\u4ee5\u4e0a\u8005\uff0c\u5305\u62ec\u9183\u6f2c\u8089\u54c1\u3001\u9999\u8178\u3001\u4e7e\u71e5\u8089\u54c1\u53ca\u8abf\u7406\u8089\u54c1\u7b49\u7522\u54c1\u4e4b\u88fd\u9020\u3001\u52a0\u5de5\u3001\u8abf\u914d\u5de5\u5ee0\u3002\u60df\u50c5\u5f9e\u4e8b\u521d\u7d1a\u52a0\u5de5\u8005\uff0c\u5305\u62ec\u5206\u7d1a\u3001\u9078\u5225\u3001\u5206\u5207\u3001\u8caf\u5b58\u3001\u904b\u9001\u4e0d\u5728\u6b64\u9650\u3002</td></tr>\n<tr><td>5</td><td>\u7f50\u982d\u98df\u54c1\u88fd\u9020\u3001\u52a0\u5de5\u3001\u8abf\u914d\u696d</td><td>\u6307\u5c07\u98df\u54c1\u5c01\u88dd\u65bc\u5bc6\u9589\u5bb9\u5668\u5167\uff0c\u65bc\u5c01\u88dd\u524d\u6216\u5c01\u88dd\u5f8c\uff0c\u65bd\u884c\u5546\u696d\u6ec5\u83cc\u800c\u53ef\u65bc\u5ba4\u6eab\u4e0b\u9577\u671f\u4fdd\u5b58\u4e4b\u7f50\u982d\u98df\u54c1\u88fd\u9020\u3001\u52a0\u5de5\u3001\u8abf\u914d\u5de5\u5ee0\u3002</td></tr>\n<tr><td>6</td><td>\u98df\u7528\u6cb9\u8102\u88fd\u9020\u3001\u52a0\u5de5\u3001\u8abf\u914d\u696d</td><td>\u6307\u7531\u690d\u7269\u6216\u52d5\u7269\u7d44\u7e54\u6240\u63d0\u53d6\u4e4b\u6cb9\u8102\u6216\u8102\u80aa\uff0c\u6216\u6df7\u5408\u4e0a\u958b\u6cb9\u8102\u6216\u8102\u80aa\uff0c\u4ee5\u6cb9\u8102\u6216\u8102\u80aa\u70ba\u4e3b\u8981\u6210\u5206\u4e4b\u7522\u54c1\u4e4b\u88fd\u9020\u3001\u52a0\u5de5\u3001\u8abf\u914d\u5de5\u5ee0\u3002</td></tr>\n<tr><td>7</td><td>\u86cb\u88fd\u54c1\u88fd\u9020\u3001\u52a0\u5de5\u3001\u8abf\u914d\u696d</td><td>\u6307\u4ee5\u86cb\u70ba\u4e3b\u6210\u5206\u4e4b\u86cb\u88fd\u54c1\uff0c\u88fd\u9020\u6210\u53ef\u4f9b\u4eba\u98df\u7528\u4e4b\u98df\u54c1\uff0c\u5305\u62ec\u6db2\u86cb\u3001\u4e7e\u71e5\u86cb\u7c89\u53ca\u9183\u88fd\u86cb\u54c1\u4e4b\u88fd\u9020\u3001\u52a0\u5de5\u3001\u8abf\u914d\u5de5\u5ee0\u3002</td></tr>\n<tr><td>8</td><td>\u9eb5\u689d\u53ca\u7c89\u689d\u985e\u98df\u54c1\u88fd\u9020\u3001\u52a0\u5de5\u3001\u8abf\u914d\u696d</td><td>\u6307\u4ee5\u9eb5\u7c89\u3001\u7c73\u3001\u7da0\u8c46\u6216\u5176\u4ed6\u98df\u7528\u5929\u7136\u6216\u4fee\u98fe\u6fb1\u7c89\u70ba\u4e3b\u539f\u6599\uff0c\u7d93\u548c\u6c34\u63c9\u9eb5\u3001\u7cca\u5316\u3001\u64e0\u58d3\u3001\u84b8\u716e\uff08\u6c34\u716e\uff09\u6216\u4e7e\u71e5\uff08\u71b1\u98a8\u4e7e\u71e5\u3001\u98a8\u4e7e\u6216\u6cb9\u70b8\u7b49\uff09\u7b49\u904e\u7a0b\u5f8c\u88fd\u6210\u7d30\u9577\u3001\u6241\u5e73\u6216\u5176\u4ed6\u5f62\u72c0\u7522\u54c1\u4e4b\u88fd\u9020\u3001\u52a0\u5de5\u3001\u8abf\u914d\u5de5\u5ee0\u3002</td></tr>\n<tr><td>9</td><td>\u91ac\u6cb9\u88fd\u9020\u3001\u52a0\u5de5\u3001\u8abf\u914d\u696d</td><td>\u6307\u4ee5\u690d\u7269\u6027\u86cb\u767d\u8cea\u70ba\u539f\u6599\uff0c\u7d93\u91c0\u9020\u6cd5\u3001\u6c34\u89e3\u6cd5\u3001\u901f\u91c0\u6cd5\u53ca\u6df7\u5408\u6cd5\u7b49\u88fd\u5f97\u4e4b\u8abf\u5473\u6db2\uff0c\u4e26\u6dfb\u52a0\u98df\u9e7d\u3001\u7cd6\u985e\u3001\u8abf\u5473\u6599\u6216\u9632\u8150\u5291\u7b49\u88fd\u6210\u4e4b\u91ac\u6cb9\u7522\u54c1\uff0c\u5305\u62ec\u91c0\u9020\u91ac\u6cb9\u3001\u901f\u6210\u91ac\u6cb9\u3001\u6c34\u89e3\u91ac\u6cb9\u3001\u6df7\u5408\u91ac\u6cb9\u6216\u8abf\u5408\u91ac\u6cb9\u4e4b\u88fd\u9020\u3001\u52a0\u5de5\u3001\u8abf\u914d\u5de5\u5ee0\u3002</td></tr>\n<tr><td>10</td><td>\u98df\u7528\u918b\u88fd\u9020\u3001\u52a0\u5de5\u3001\u8abf\u914d\u696d</td><td>\u6307\u4ee5\u7a40\u7269\u3001\u679c\u5be6\u3001\u9152\u7cbe\u3001\u9152\u7c95\u53ca\u7cd6\u871c\u7b49\u539f\u6599\u4e4b\u9152\u91aa\u6216\u518d\u6dfb\u52a0\u9152\u7cbe\u7d93\u918b\u9178\u767c\u9175\u3001\u6216\u4ee5\uff08\u51b0\uff09\u918b\u9178\u8abf\u5473\u6216\u6df7\u5408\u4ee5\u4e0a\u5169\u8005\u7b49\u88fd\u5f97\u4ee5\u918b\u9178\u70ba\u4e3b\u4e4b\u8abf\u5473\u6db2\uff0c\u5305\u62ec\u91c0\u9020\u98df\u918b\u3001\u8abf\u7406\u98df\u918b\u53ca\u5408\u6210\u98df\u918b\u4e4b\u88fd\u9020\u3001\u52a0\u5de5\u3001\u8abf\u914d\u5de5\u5ee0\u3002</td></tr>\n<tr><td>11</td><td>\u8abf\u5473\u91ac\u88fd\u9020\u3001\u52a0\u5de5\u3001\u8abf\u914d\u696d</td><td>\u6307\u4ee5\u8fb2\u755c\u79bd\u6c34\u7522\u54c1\u7b49\u70ba\u539f\u6599\uff0c\u6dfb\u52a0\u98df\u9e7d\u3001\u7cd6\u985e\u3001\u8abf\u5473\u6599\u6216\u9632\u8150\u5291\u7b49\u88fd\u6210\u4e4b\u8abf\u5473\u91ac\u7522\u54c1\u4e4b\u88fd\u9020\u3001\u52a0\u5de5\u3001\u8abf\u914d\u5de5\u5ee0\u3002</td></tr>\n<tr><td>12</td><td>\u975e\u9152\u7cbe\u98f2\u6599\u88fd\u9020\u3001\u52a0\u5de5\u3001\u8abf\u914d\u696d</td><td>\u6307\u542b\u9152\u7cbe\u6210\u5206\u4e0d\u8d85\u904e\u767e\u5206\u4e4b\u96f6\u9ede\u4e94\u4e4b\u98f2\u6599\u88fd\u9020\u3001\u52a0\u5de5\u3001\u8abf\u914d\u5de5\u5ee0\u3002\u60df\u98f2\u7528\u6c34\u5de5\u5ee0\u4e0d\u5728\u6b64\u9650\u3002</td></tr>\n<tr><td>13</td><td>\u8a2d\u6709\u9910\u98f2\u4e4b\u570b\u969b\u89c0\u5149\u65c5\u9928\u696d</td><td>\u6307\u7d93\u4ea4\u901a\u90e8\u89c0\u5149\u5c40\u8a55\u5b9a\u6838\u767c\u89c0\u5149\u65c5\u9928\u696d\u71df\u696d\u57f7\u7167\u4e14\u8a3b\u8a18\u70ba\u570b\u969b\u89c0\u5149\u65c5\u9928\u8005\u3002</td></tr>\n<tr><td>14</td><td>\u8a2d\u6709\u9910\u98f2\u4e4b\u4e94\u661f\u7d1a\u65c5\u9928\u696d</td><td>\u6307\u7d93\u4ea4\u901a\u90e8\u89c0\u5149\u5c40\u661f\u7d1a\u65c5\u9928\u8a55\u9451\u70ba\u4e94\u661f\u7d1a\u65c5\u9928\u8005\u3002</td></tr>\n<tr><td>15</td><td>\u4f9b\u61c9\u9435\u8def\u904b\u8f38\u65c5\u5ba2\u9910\u98df\u4e4b\u9910\u76d2\u98df\u54c1\u696d</td><td>\u6307\u9435\u8def\u904b\u8f38\u696d\u81ea\u8a2d\uff08\u9644\u8a2d\uff09\u5eda\u623f\u6216\u59d4\u5916\u7522\u88fd\u9910\u76d2\u4e4b\u98df\u54c1\u696d\u3002</td></tr>\n</tbody></table></div></div>"}, {"no": "附表（序號16–24）：餐飲業及烘焙業類別定義", "chapter": "附表 食品製造業、餐飲業及烘焙業之類別定義", "content": "<div class=\"reg-table-block\"><div class=\"table-scroll\"><table class=\"annex-table\"><thead><tr><th>\u5e8f\u865f</th><th>\u985e\u5225</th><th>\u5b9a\u7fa9</th></tr></thead><tbody>\n<tr><td>16</td><td>\u8a2d\u6709\u9910\u98f2\u4e4b\u89c0\u5149\u65c5\u9928\u696d</td><td>\u6307\u7d93\u4ea4\u901a\u90e8\u89c0\u5149\u5c40\u8a55\u5b9a\u6838\u767c\u89c0\u5149\u65c5\u9928\u696d\u71df\u696d\u57f7\u7167\u8005\uff0c\u5305\u62ec\u570b\u969b\u89c0\u5149\u65c5\u9928\u53ca\u4e00\u822c\u89c0\u5149\u65c5\u9928\u3002</td></tr>\n<tr><td>17</td><td>\u5718\u81b3\u627f\u5305\u4e4b\u9910\u98f2\u696d</td><td>\u6307\u5c08\u70ba\u5b78\u6821\u3001\u91ab\u9662\u3001\u5de5\u5ee0\u3001\u516c\u53f8\u4f01\u696d\u7b49\u5718\u9ad4\u63d0\u4f9b\u9910\u98f2\u670d\u52d9\u4e4b\u884c\u696d\u3002\u5982\u54e1\u5de5\u9910\u5ef3\u3001\u5b78\u751f\u9910\u5ef3\u7b49\u5718\u9ad4\u81b3\u98df\u3001\u4f19\u98df\u5305\u4f5c\u4e4b\u696d\u5225\u3002</td></tr>\n<tr><td>18</td><td>\u4f9b\u61c9\u5b78\u6821\u9910\u76d2\u4e4b\u9910\u98f2\u696d</td><td>\u6307\u7d93\u71df\u5b78\u6821\u59d4\u8a17\u8fa6\u7406\u5b78\u751f\u9910\u9ede\uff08\u71df\u990a\u5348\u9910\uff09\u4e4b\u696d\u5225\uff0c\u4e14\u8a72\u9910\u9ede\u4e4b\u92b7\u552e\u50f9\u683c\u53d7\u6559\u80b2\u4e3b\u7ba1\u6a5f\u95dc\u76e3\u7763\u6216\u7531\u6559\u80b2\u4e3b\u7ba1\u6a5f\u95dc\u5168\u984d\u7de8\u5217\u9810\u7b97\u652f\u61c9\u4e4b\u9910\u98f2\u670d\u52d9\u3002</td></tr>\n<tr><td>19</td><td>\u627f\u652c\u7b75\u5e2d\u9910\u5ef3\u4e4b\u9910\u98f2\u696d</td><td>\u6307\u5177\u5099\u56fa\u5b9a\u71df\u696d\u5834\u6240\uff0c\u9910\u98f2\u627f\u5305\u670d\u52d9\u8005\uff08\u542b\u7b75\u5e2d\u627f\u8fa6\u3001\u5718\u81b3\u4f9b\u61c9\u7b49\uff09\u3002</td></tr>\n<tr><td>20</td><td>\u5916\u71f4\u9910\u98f2\u670d\u52d9\u4e4b\u9910\u98f2\u696d</td><td>\u6307\u7121\u63d0\u4f9b\u56fa\u5b9a\u9910\u98f2\u5834\u6240\uff0c\u4f9d\u627f\u5305\u5ba2\u6236\u6307\u5b9a\u5730\u9ede\u8fa6\u7406\u904b\u52d5\u6703\u3001\u6703\u8b70\u53ca\u5a5a\u5bb4\u7b49\u985e\u4f3c\u6d3b\u52d5\u4e4b\u5916\u71f4\u9910\u98f2\u670d\u52d9\u3002</td></tr>\n<tr><td>21</td><td>\u4e2d\u592e\u5eda\u623f\u5f0f\u4e4b\u9910\u98f2\u696d</td><td>\u6307\u55ae\u9910\u53ef\u63d0\u4f9b\u4e00\u5343\u4eba\u4efd\u4ee5\u4e0a\u6216\u540c\u6642\u63d0\u4f9b\u4e8c\u5bb6\u4ee5\u4e0a\u9910\u98f2\u5730\u9ede\u4e4b\u719f\u98df\uff0c\u6216\u50c5\u9700\u7c21\u6613\u52a0\u71b1\u4e4b\u9810\u88fd\u98df\u6750\u8005\u3002</td></tr>\n<tr><td>22</td><td>\u81ea\u52a9\u9910\u98f2\u696d</td><td>\u6307\u4ee5\u81ea\u52a9\u578b\u5f0f\u63d0\u4f9b\u4e00\u822c\u9867\u5ba2\u9078\u53d6\u83dc\u991a\uff0c\u4f9b\u9867\u5ba2\u65bc\u5e97\u5167\u98df\u7528\u6216\u5916\u5e36\uff08\u5916\u9001\uff09\u8005\uff0c\u517c\u8ce3\u4fbf\u7576\u3001\u9910\u76d2\u7b49\u56fa\u5b9a\u83dc\u991a\u8005\u4ea6\u5c6c\u4e4b\u3002</td></tr>\n<tr><td>23</td><td>\u4e00\u822c\u9910\u9928\u9910\u98f2\u696d</td><td>\u5305\u62ec\u5404\u5f0f\u4e2d\u5f0f\u53ca\u7570\u570b\u6599\u7406\u9910\u5ef3\uff0c\u4e3b\u8981\u4ee5\u4f9b\u61c9\u98df\u7269\u548c\u98f2\u54c1\u4f9b\u73fe\u5834\u7acb\u5373\u98df\u7528\uff0c\u591a\u70ba\u9867\u5ba2\u5165\u5ea7\u5f8c\u9ede\u83dc\uff0c\u7531\u670d\u52d9\u4eba\u54e1\u9001\u4e0a\u83dc\u991a\u3002\u4ee5\u81ea\u52a9\u5427\u578b\u5f0f\u4f9b\u61c9\u5404\u985e\u578b\u83dc\u991a\u4e4b\u5403\u5230\u98fd\u9910\u5ef3\uff0c\u4ea6\u6b78\u5165\u6b64\u985e\u3002\u4e0d\u5305\u62ec\u901f\u98df\u5e97\u3001\u81ea\u52a9\u706b\u934b\u5e97\u3001\u81ea\u52a9\u70e4\u8089\u5e97\u3001\u65e9\u9910\u5e97\u3001\u9eb5\u5e97\u53ca\u63d0\u4f9b\u4e4b\u9910\u98df\u50c5\u7d93\u9580\u5e02\u7c21\u55ae\u5fa9\u71b1\u3001\u8abf\u7406\u3001\u7d44\u5408\uff0c\u4e0d\u9700\u5c08\u696d\u70f9\u8abf\u6280\u8853\u5373\u53ef\u5b8c\u6210\u4f9b\u9910\u8005\u3002</td></tr>\n<tr><td>24</td><td>\u524d\u5e97\u5f8c\u5ee0\u5c0f\u578b\u70d8\u7119\u696d</td><td>\u6307\u5728\u540c\u4e00\u5730\u9ede\uff0c\u5e97\u9762\u5f8c\u65b9\u88fd\u4f5c\u70d8\u7119\u52a0\u5de5\u98df\u54c1\uff0c\u5e97\u9762\u524d\u65b9\u5247\u9032\u884c\u92b7\u552e\u5176\u88fd\u54c1\u4e4b\u70d8\u7119\u708a\u84b8\u98df\u54c1\u88fd\u9020\u696d\u8005\u3002</td></tr>\n</tbody></table></div></div>"}],
        "應取得衛生安全管理系統驗證之食品業者類別及規模_20251217": [{"no": "公告事項", "chapter": null, "content": "發文日期：中華民國114年12月17日\n發文字號：衛授食字第1141107831號\n依據：食品安全衛生管理法第八條第五項\n\n應取得衛生安全管理系統驗證之食品業者類別及規模如下：\n一、辦理工廠登記之熱殺菌密閉容器包裝低酸性食品、酸化食品、乳品加工食品、食品添加物及特殊營養食品製造、加工、調配業。\n二、辦理工廠登記且資本額達新臺幣三千萬元以上之食用油脂、麵粉、澱粉、食鹽、糖及醬油食品製造、加工、調配業。"}],
        "問答集_20201106": [{"no": "壹-Q1", "chapter": "壹、食品安全管制系統準則相關規定", "content": "問：何謂食品安全管制系統準則？\n\n答：依本準則第2條規定，所稱食品安全管制系統係指為鑑別、評估及管理食品安全危害，使用危害分析重要管制點(Hazard Analysis Critical Control Point System, HACCP)原理，管理原料材料之驗收、加工、製造、貯存及運送全程之系統，其系統包括(1)成立管制小組(2)執行危害分析(3)決定重要管制點(4)建立管制界限(5)研訂及執行監測計畫(6)研訂及執行矯正措施(7)確認本系統執行之有效性(8)建立本系統執行之文件及紀錄。"}, {"no": "壹-Q2", "chapter": "壹、食品安全管制系統準則相關規定", "content": "問：為何要求食品業者實施食品安全管制系統準則？\n\n答：藉由食品業者導入危害分析重要管制點之安全管理概念，確實建立並運作食品安全管制系統，並對整體食品製造過程落實衛生自主管理，以防堵不符合規定之食品流入消費市場，確保食品衛生安全。"}, {"no": "壹-Q3", "chapter": "壹、食品安全管制系統準則相關規定", "content": "問：管制小組之組成人員為何？\n\n答：管制小組成員，由食品業者之負責人或其指定人員，及專門職業人員、品質管制人員、生產部(線)幹部、衛生管理人員或其他幹部人員組成，至少三人，其中負責人或其指定人員為必要之成員。"}, {"no": "壹-Q4", "chapter": "壹、食品安全管制系統準則相關規定", "content": "問：負責人或其指定人員為何列為管制小組之必要成員？\n\n答：實施食品安全管制系統制度成功之因素除相關執行人員具有HACCP之知識和背景、管制小組分工合作之團隊精神、周詳且可行之計劃並確實執行外，決策者之支持亦為實施食品安全管制系統成功之因素。"}, {"no": "壹-Q5", "chapter": "壹、食品安全管制系統準則相關規定", "content": "問：管制小組成員之資格條件為何？\n\n答：應曾接受食品安全管制系統相關課程至少30小時，並領有合格證明書；從業期間應持續接受與本系統有關之課程，每3年累計至少12小時。"}, {"no": "壹-Q6", "chapter": "壹、食品安全管制系統準則相關規定", "content": "問：公告應符合食品安全管制系統準則之食品業者，查核不符合之罰則？\n\n答：衛生主管機關執行食品安全管制系統符合性稽查，對於不符合之食品業者，依食品安全衛生管理法第44條第1款規定，經命其限期改正，屆期不改正，處新台幣6萬元以上2億元以下罰鍰；情節重大者，並得命其歇業、停業一定期間、廢止其公司、商業、工廠之全部或部分登記事項，或食品業者之登錄；經廢止登錄者，一年內不得再申請重新登錄。"}, {"no": "壹-Q7", "chapter": "壹、食品安全管制系統準則相關規定", "content": "問：本次公告「水產加工食品業應符合食品安全管制系統準則之規定」所稱「水產加工食品業」之實施範圍為何？\n\n答：本次公告應符合食品安全管制系統準則之「水產加工食品業」是指從事水產加工食品製造、加工、調配之業者，其範圍如下：\n1. 生鮮處理：含去頭、去尾、去內臟、去鱗、去皮(去殼)、分切。\n2. 二次加工：含製罐、蒸煮、脫水、醃燻、鹽製、調理冷凍(藏)、萃取、發酵等。\n前述所指「水產加工食品」是指以水產動物類為主成分，製成可供人食用之食品，且製造之產品含水產動物類含量達50%以上者。包括水產罐頭食品、冷凍冷藏水產食品、乾燥水產食品及其他水產食品等。"}, {"no": "壹-Q8", "chapter": "壹、食品安全管制系統準則相關規定", "content": "問：本次公告「肉類加工食品業應符合食品安全管制系統準則之規定」所稱「肉類加工食品業」之實施範圍為何？\n\n答：本次公告應符合食品安全管制系統準則之「肉類加工食品業」是指從事肉類加工食品製造、加工、調配之業者，其範圍如下：\n1. 生鮮處理：含原料肉解凍、分切、機械去骨(肉)。\n2. 肉品加工：含切片、切絲、絞碎、細切、醃漬、充填、成型、蒸煮、煙燻、乾燥、脫水、調理冷凍(藏)、萃取、發酵製罐等。\n前述所指「肉類加工食品」是指以畜禽肉類或其雜碎類為主成分，製成可供人食用之食品，且製造之產品含畜禽肉類或雜碎類含量達50%以上者。包括冷藏、冷凍畜禽生鮮肉品、醃漬肉品、香腸、乾燥肉品、調理肉品、肉類罐頭。\n如僅從事分級、選別、貯存、運送者，屬初級簡單加工行為者，將排除於本規定所規範之肉類加工食品業外。"}, {"no": "壹-Q9", "chapter": "壹、食品安全管制系統準則相關規定", "content": "問：本次公告「食用油脂工廠應符合食品安全管制系統準則之規定」所稱「食用油脂工廠」之實施範圍為何？\n\n答：本次公告應符合食品安全管制系統準則之「食用油脂工廠」是指從事食用油脂製造、加工、調配之工廠。前述所指「食用油脂」是指由植物或動物組織所提取之油脂或脂肪，或混合上開油脂或脂肪，以油脂或脂肪為主要成分之產品。"}, {"no": "壹-Q10", "chapter": "壹、食品安全管制系統準則相關規定", "content": "問：本次公告「罐頭食品工廠應符合食品安全管制系統準則之規定」所稱「罐頭食品工廠」之實施範圍為何？\n\n答：本次公告應符合食品安全管制系統準則之「罐頭食品工廠」是指從事罐頭食品製造、加工、調配之工廠。前述所指「罐頭食品」是指將食品封裝於密閉容器內，於封裝前或封裝後，施行商業滅菌而可於室溫下長期保存者，包括低酸性罐頭食品及酸化罐頭食品。"}, {"no": "壹-Q11", "chapter": "壹、食品安全管制系統準則相關規定", "content": "問：本次公告「蛋製品工廠應符合食品安全管制系統準則之規定」所稱「蛋製品工廠」之實施範圍為何？\n\n答：本次公告應符合食品安全管制系統準則之「蛋製品工廠」是指從事蛋製品製造、加工、調配之工廠。前述所指「蛋製品」是指以蛋為主成分，製造成可供人食用之食品，包括液蛋、乾燥蛋粉及醃製蛋品。未經加工製程之洗選蛋，尚非屬本規範範圍。"}, {"no": "壹-Q12", "chapter": "壹、食品安全管制系統準則相關規定", "content": "問：本次公告「水產加工食品」、「肉類加工食品」、「食用油脂」、「罐頭食品」及「蛋製品」等5類食品工廠應符合食品安全管制系統準則，其實施規模及實施期程分別為何？\n\n答：\n1. 「水產加工食品」及「肉類加工食品」等2類食品製造業自發布日實施，其實施規模如下：\n(1) 依工廠管理輔導法及其相關規定，須辦理工廠登記，且食品從業人員5人以上者。\n(2) 辦有商業登記或公司登記，食品從業人員5人以上且資本額3千萬元以上者。\n2. 「食用油脂」、「罐頭食品」及「蛋製品」等3類食品工廠，依工廠管理輔導法及其相關規定，須辦理工廠登記之工廠，依規模分階段實施，其實施規模及實施期程如下：\n(1) 資本額1億元以上者：自107年7月1日實施；\n(2) 資本額3千萬元以上，未達1億元者：自108年7月1日實施；\n(3) 資本額未達3千萬元，且食品從業人員5人以上者：自109年7月1日實施。"}, {"no": "壹-Q13", "chapter": "壹、食品安全管制系統準則相關規定", "content": "問：本次公告同時廢止現行「水產食品業應符合食品安全管制系統準則之規定」及「肉類加工食品業應符合食品安全管制系統準則之規定」之理由為何？\n\n答：因相關規定已分別納入「水產加工食品業應符合食品安全管制系統準則之規定」及「肉類加工食品業應符合食品安全管制系統準則之規定」，爰配合辦理公告廢止現行規定。"}, {"no": "壹-Q14", "chapter": "壹、食品安全管制系統準則相關規定", "content": "問：僅從事水產養殖水產或肉品加工食品販售之食品業者，是否為應符合食品安全管制系統準則之業者？\n\n答：否。倘業者僅從事水產養殖、水產或肉品加工食品販售，且所販售之水產或肉品加工食品係委由合法工廠代工，實際未從事水產或肉品食品製造、加工及調配等產製行為，尚未列屬「水產加工食品業應符合食品安全管制系統準則之規定」及「肉類加工食品業應符合食品安全管制系統準則之規定」之規範對象。惟該水產或肉品加工食品之製造工廠應符合食品安全管制系統準則等相關衛生法令規定，且業者從事水產加工食品販售，仍應符合食安法及食品良好衛生規範準則等相關衛生法令規定。"}, {"no": "貳-Q1", "chapter": "貳、專門職業或技術證照人員設置及管理相關規定", "content": "問：何謂專門職業人員？\n\n答：本辦法第3條規定，所稱專門職業人員，指經考試院專門職業及技術人員高等考試及格，並領有證書者，如食品技師、畜牧技師、獸醫師、水產養殖技師及營養師等專門職業人員。"}, {"no": "貳-Q2", "chapter": "貳、專門職業或技術證照人員設置及管理相關規定", "content": "問：食品業者聘用專門職業人員之目的為何？\n\n答：食品業者聘用專門職業人員之目的，為有效落實業者衛生自主管理制度，運用專門職業人員之專業知識及能力，辦理食品安全衛生管理事宜，藉由導入食品專業素養之人員投入產業，提升我國食品產業之能力與品質，確保食品產製過程中之安全性。"}, {"no": "貳-Q3", "chapter": "貳、專門職業或技術證照人員設置及管理相關規定", "content": "問：應置專門職業人員之食品業者為何？\n\n答：依食安法第12條第1項規定訂定「應置專門職業或技術證照人員之食品業者類別及規模」，應置專門職業之食品業者類別為餐盒食品、乳品加工食品、水產加工食品、肉類加工食品、罐頭食品、食用油脂、蛋製品、麵條及粉條類食品、醬油、食用醋、調味醬、非酒精飲料等製造、加工、調配業、設有餐飲之國際觀光及五星級旅館、供應鐵路運輸旅客餐盒之食品業等15類。"}, {"no": "貳-Q4", "chapter": "貳、專門職業或技術證照人員設置及管理相關規定", "content": "問：只有經公告應置專門職業之食品業者類別才須聘用專門職業人員？\n\n答：不是。非經公告之食品業者亦可聘用專門職業人員，透過專業人才進駐食品產業，可協助業者落實衛生自主管理，進而避免食品安全事件發生，以強化我國整體食品產業之能力與品質。"}, {"no": "貳-Q5", "chapter": "貳、專門職業或技術證照人員設置及管理相關規定", "content": "問：於同一廠址從事二種以上之食品類別，需要聘請幾位專門職業人員？\n\n答：本辦法第4條規定，依食安法第12條第1項公告應置專門職業人員之食品業者，至少應置一名專任專門職業人員。於同一廠址從事二種以上食品類別，原則可置1位，惟如果生產能量甚大時，建議可視情況多聘用專門職業人員，透過食品專業人才進駐，協助落實食品衛生安全自主管理。"}, {"no": "貳-Q6", "chapter": "貳、專門職業或技術證照人員設置及管理相關規定", "content": "問：同一公司體系，分屬不同廠區（獨立廠址）可共用1位專門職業人員嗎？\n\n答：不可，依本辦法第4條規定，公告應置專門職業人員之食品業者，至少應置一名專任專門職業人員。本辦法已明定食品業者所聘的專門職業人員應為駐廠全職人員，不同廠址應各置一名專門職業人員。"}, {"no": "貳-Q7", "chapter": "貳、專門職業或技術證照人員設置及管理相關規定", "content": "問：餐盒食品製造、加工、調配業或餐飲業所設置專門職業人員可以由畜牧技師、獸醫師或水產養殖技師擔任嗎？\n\n答：本辦法第4條第2項第3款規定，食品業者應依產業類別置專門職業人員，餐盒食品製造、加工、調配業或餐飲業者應置專門職業人員科別範圍有食品技師或營養師。"}, {"no": "貳-Q8", "chapter": "貳、專門職業或技術證照人員設置及管理相關規定", "content": "問：其他食品製造業所指產業類別為何？\n\n答：(1)本辦法第4條第2項第4款規定，食品業者依產業類別應置之專門職業人員，其他食品製造應置食品技師。其中「其他食品製造業」係指本辦法第4條第2項第1款至第3款以外之食品業。\n(2)依食安法第12條第1項規定，衛生福利部已公告訂定「應置專門職業或技術證照人員之食品業者類別及規模規定」，除規範水產加工食品、肉類加工食品、乳品加工食品、餐盒食品等食品製造業外，另新增罐頭食品、食用油脂、蛋製品、麵條粉條、醬油、食用醋、調味醬、非酒精飲料等類食品製造業者，規模為資本額三千萬元以上及食品從業人員二十人以上者規定應置專門職業人員。"}, {"no": "貳-Q9", "chapter": "貳、專門職業或技術證照人員設置及管理相關規定", "content": "問：專門職業人員於食品產業之職責為何？\n\n答：依本辦法第7條所賦予專門職業人員之職責為：(1)食品安全管制系統之規劃及執行；(2)食品追溯或追蹤系統之規劃及執行；(3)食品衛生安全事件緊急應變措施之規劃及執行；(4)食品原材料衛生安全之管理；(5)食品品質管制之建立及驗效；(6)食品衛生安全風險之評估、管控及與機關、消費者之溝通；(7)實驗室品質保證之建立及管控；(8)食品衛生安全教育訓練之規劃及執行；(9)國內外食品相關法規之研析；(10)其他經中央主管機關指定之事項。\n食品業者可參酌前述所列之職責及專門職業人員所具備專業技術與知能，規劃其於食品產業之職掌，協助業者有效管理食品安全管制系統之運作，以維護食品生產製造之衛生安全。"}, {"no": "貳-Q10", "chapter": "貳、專門職業或技術證照人員設置及管理相關規定", "content": "問：專門職業人員為何需修習食品安全管制系統訓練課程30小時以上？且從業期間，每年亦需接受由訓練機關(構)或其他機關(構)辦理與該系統有關之課程至少8小時？\n\n答：為增進專門職業人員之衛生管理專業知能，以有效管理食品安全管制系統之運作，確保國民飲食衛生安全，因此規定食品業者聘用之專門職業人員，皆須受有中央主管機關認可之食品衛生相關機關(構)所辦理之食品安全管制系統訓練30小時以上，且領有合格證書始得受聘。此外，專門職業人員從事食品衛生安全工作應隨時自求專業知識與技能長進，持續精進其專業能力，並留意社會脈動，以提升個人與公司價值，故規定專門職業人員從業期間每年須接受至少8小時專業訓練時數，為專門職業人員應達到之基本要求。"}, {"no": "貳-Q11", "chapter": "貳、專門職業或技術證照人員設置及管理相關規定", "content": "問：中央主管機關認可之食品安全管制系統訓練機關(構)辦理之食品安全管制系統訓練課程，應該至何處查詢？\n\n答：目前衛生福利部食品藥物管理署認可之食品安全管制系統訓練機關(構)共計有27間，相關課程資訊可至衛生福利部食品藥物管理署食品衛生安全課程資訊管理系統(http://foodedu.fda.gov.tw/) > HACCP課程查詢項下查閱。"}, {"no": "貳-Q12", "chapter": "貳、專門職業或技術證照人員設置及管理相關規定", "content": "問：針對新進食品產業之專門職業人員，中央主管機關是否有辦理相關培訓課程？\n\n答：衛生福利部食品藥物管理署自102年辦理專門職業人員職能養成班，培訓專門職業人員工廠實務及內部稽核能力。未來衛生福利部食品藥物管理署將持續辦理相關專門職業人員職能養成課程，強化其內部稽核能力與專業知能，協助業者管理食品安全管制系統之運作，以落實食品業者衛生自主管理制度，並發揮專門職業人員把關食品安全之職責。"}, {"no": "貳-Q13", "chapter": "貳、專門職業或技術證照人員設置及管理相關規定", "content": "問：何謂技術證照人員？\n\n答：本辦法第3條規定，所稱技術證照人員，指領有中央勞動主管機關所核發之技能檢定之技術士證者，或經其認可之專業認證機構所核發之具有技術士證同等效力之技能職類證書者，如中餐烹調技術士、西餐烹調技術士、食物製備技術士、烘焙食品技術士、中式麵食加工技術士、中式米食加工技術士等人員。"}, {"no": "貳-Q14", "chapter": "貳、專門職業或技術證照人員設置及管理相關規定", "content": "問：烘焙業設置的技術證照人員僅為領有烘焙食品技術士證者？\n\n答：不是，依本辦法第5條第1項第2款規定，烘焙業應置之技術證照職類範圍為：烘焙食品技術士、中式麵食加工技術士或中式米食加工技術士。"}, {"no": "貳-Q15", "chapter": "貳、專門職業或技術證照人員設置及管理相關規定", "content": "問：經公告應置技術證照人員之餐飲業，其技術證照人員比率之計算母數？\n\n答：餐飲業烹調從業人員其持刀(冷盤、蔬果雕、盤飾)、持鏟(調理、加工、烹調)從事專業烹飪工作，此等人員為計算餐飲業技術證照人員比率時之母數。"}, {"no": "貳-Q16", "chapter": "貳、專門職業或技術證照人員設置及管理相關規定", "content": "問：烘焙業其技術證照人員比率之計算母數？\n\n答：參考勞動部公布之「烘焙食品技術士技能檢定規範」，烘焙食品職類技能檢定在產品製作科目應具備技能包括配方制定、攪拌、發酵、成型、烤焙、裝飾與調餡等技術。烘焙業之從業人員如從事前述工作性質，該等人員即為計算烘焙業技術證照人員比率時之母數。"}, {"no": "貳-Q17", "chapter": "貳、專門職業或技術證照人員設置及管理相關規定", "content": "問：學校安排在學學生至餐廳實習之實習生是否列入技術證照人員比率計算？\n\n答：依本辦法第5條第2項，調理烘焙從業人員為食品業者所聘用公司編制內人員。實習生非公司編制內人員，不列入技術證照人員比率計算。"}, {"no": "貳-Q18", "chapter": "貳、專門職業或技術證照人員設置及管理相關規定", "content": "問：技術證照人員於食品產業之職責為何？\n\n答：依本辦法第8條所賦予技術證照人員之職責為：(1)食品之良好衛生規範準則相關規定之執行及監督；(2)其他經中央主管機關指定之事項。\n食品業者可參酌前述食品之良好衛生規範準則之相關規定，規劃技術證照人員於各類別食品產業中應負之職責，以維護食品衛生安全。"}, {"no": "貳-Q19", "chapter": "貳、專門職業或技術證照人員設置及管理相關規定", "content": "問：技術證照人員從業期間，每年至少8小時應接受各級主管機關或其認可之衛生講習機關(構)辦理之衛生講習，相關講習課程應該至何處查詢？\n\n答：目前衛生福利部食品藥物管理署認可之衛生講習機關(構)共計有111間，各級主管機關或其認可之衛生講習機關(構)辦理之衛生講習所開設之相關課程資訊，可至衛生福利部食品藥物管理署食品衛生安全課程資訊管理系統(http://foodedu.fda.gov.tw/) > 衛生講習課程查詢項下查閱。"}, {"no": "貳-Q20", "chapter": "貳、專門職業或技術證照人員設置及管理相關規定", "content": "問：經公告應置專門職業或技術證照人員之食品業者須向衛生局備查嗎？\n\n答：本辦法第9條規定，食品業者置專門職業或技術證照人員，應於中央主管機關建立之登錄平台登錄各該人員資料及衛生講習或訓練時數。並於完成登錄資料後，每年應申報確認登錄內容，毋須再向衛生局備查。"}, {"no": "貳-Q21", "chapter": "貳、專門職業或技術證照人員設置及管理相關規定", "content": "問：若聘用之專門職業人員或技術證照人員離職，該如何更新登錄資料？\n\n答：依本辦法第9條，登錄資料如有變更，食品業者應自事實發生之日起30日內變更登錄資料。"}, {"no": "貳-Q22", "chapter": "貳、專門職業或技術證照人員設置及管理相關規定", "content": "問：衛生主管機關是否會派員實地查看食品業者聘用專門職業或技術證照人員之情形？\n\n答：會。衛生主管機關為確認食品業者是否依法確實聘用專任之專門職業或技術證照人員，得要求進入食品業者作業場所執行查核及要求其提供相關證明文件，食品業者不得規避、妨礙或拒絕。"}, {"no": "貳-Q23", "chapter": "貳、專門職業或技術證照人員設置及管理相關規定", "content": "問：公告應聘用專門職業或技術證照人員之食品業者，如未依規定聘用，是否違反法令？\n\n答：是。對於未依規定設置專門職業或技術證照人員之食品業者，依食品安全衛生管理法第47條第4款規定處新台幣3萬元以上300萬元以下罰鍰，情節重大者可直接命其歇業、停業，不以一年內再次違反為限，以落實國內食品業者聘用專門職業或技術證照人員之規定。"}],
    "應申請登錄始得營業之食品業者類別、規模及實施日期_20190426": [{"no": "公告沿革", "chapter": null, "content": "中華民國103年10月16日部授食字第1031301884號公告訂定\n中華民國104年9月18日部授食字第1041303127號公告修正\n中華民國108年4月26日衛授食字第1081300875號公告修正"}, {"no": "一、食品業者類別", "chapter": "一、應申請登錄始得營業之食品業者類別、規模及實施日期", "content": "應申請登錄始得營業之食品業者類別如下：\n1. 製造、加工業：食品製造、加工業、食品器具、食品容器或包裝製造、加工業、食品用洗潔劑製造、加工業。\n2. 餐飲業。\n3. 輸入業：依食品安全衛生管理法第三十條第一項公告應申請查驗產品之輸入業。\n4. 販售業。\n5. 物流業：從事運送食品或食品添加物營業行為之業者。"}, {"no": "一(二)1-製造加工業", "chapter": "一、應申請登錄始得營業之食品業者類別、規模及實施日期", "content": "製造、加工業之規模及實施日期：\n\n(1) 103年公告之食品製造、加工業（以103年10月16日為基準）：\n甲. 新辦理工廠登記、商業登記或公司登記業者：自103年10月16日起實施。\n乙. 已辦理工廠登記、商業登記、公司登記業者：自103年12月31日起實施。\n丙. 已辦理工廠登記之食用油脂製造、加工業者：自103年10月31日實施。\n\n(2) 非屬103年公告範圍之其他食品製造、加工業：\n甲. 新辦理稅籍登記業者：自104年9月18日起實施。\n乙. 已辦理稅籍登記業者：自104年12月31日起實施。\n\n(3) 103年公告之食品器具、食品容器或包裝製造、加工業（含塑膠類材質）：\n甲. 新辦理登記業者：自103年10月16日起實施。\n乙. 已辦理登記業者：自103年12月31日起實施。\n\n(4) 非屬103年公告範圍之其他食品器具、食品容器或包裝製造、加工業：\n甲. 新辦理登記業者：自104年9月18日起實施。\n乙. 已辦理登記業者：自104年12月31日起實施。\n\n(5) 食品用洗潔劑製造、加工業：\n甲. 新辦理登記業者：自104年9月18日起實施。\n乙. 已辦理登記業者：自104年12月31日起實施。"}, {"no": "一(二)2-餐飲業", "chapter": "一、應申請登錄始得營業之食品業者類別、規模及實施日期", "content": "餐飲業之規模及實施日期：\n\n(1) 103年公告之餐飲業（以103年10月16日為基準）：\n甲. 新辦理工廠登記、商業登記或公司登記業者：自103年10月16日起實施。\n乙. 已辦理工廠登記、商業登記、公司登記業者：自103年12月31日起實施。\n\n(2) 非屬103年公告範圍之其他餐飲業：\n甲. 新辦理稅籍登記業者或新經地方經建主管機關許可營業之攤(鋪)位使用人及攤販：自104年9月18日起實施。\n乙. 已辦理稅籍登記業者或已經地方經建主管機關許可營業之攤(鋪)位使用人及攤販：自104年12月31日起實施。"}, {"no": "一(二)3-輸入業", "chapter": "一、應申請登錄始得營業之食品業者類別、規模及實施日期", "content": "輸入業之規模及實施日期：\n\n(1) 103年公告之食品輸入業、含塑膠類材質之食品器具、食品容器或包裝輸入業（以103年10月16日為基準）：\n甲. 新辦理工廠登記、商業登記或公司登記業者：自103年10月16日起實施。\n乙. 已辦理工廠登記、商業登記、公司登記業者：自103年12月31日起實施。\n丙. 已辦理登記之食用油脂輸入業者：自103年10月31日實施。\n\n(2) 非屬103年公告範圍之其他輸入業：\n甲. 新辦理登記業者：自104年9月18日起實施。\n乙. 已辦理登記業者：自104年12月31日起實施。"}, {"no": "一(二)4-販售業", "chapter": "一、應申請登錄始得營業之食品業者類別、規模及實施日期", "content": "販售業之規模及實施日期：\n\n(1) 103年公告之販售業（以103年10月16日為基準）：\n甲. 新辦理工廠登記、商業登記或公司登記業者：自103年10月16日起實施。\n乙. 已辦理工廠登記、商業登記、公司登記業者：自103年12月31日起實施。\n\n(2) 非屬103年公告範圍之其他販售業：\n甲. 新辦理稅籍登記業者或新經地方經建主管機關許可營業之攤(鋪)位使用人及攤販：自104年9月18日起實施。\n乙. 已辦理稅籍登記業者或已經地方經建主管機關許可營業之攤(鋪)位使用人及攤販：自104年12月31日起實施。"}, {"no": "一(二)5-物流業", "chapter": "一、應申請登錄始得營業之食品業者類別、規模及實施日期", "content": "物流業之規模及實施日期：\n\n(1) 新辦理工廠登記、商業登記或公司登記業者：自公告日（108年4月26日）起實施。\n(2) 已辦理工廠登記、商業登記或公司登記業者：自108年7月1日實施。"}, {"no": "二、食品添加物業", "chapter": "二、食品添加物製造、加工、輸入及販售業", "content": "食品添加物製造、加工、輸入及販售業者，應依衛生福利部103年4月24日部授食字第1031300763號公告規定登錄。"}, {"no": "三、受理登錄", "chapter": "三、受理登錄", "content": "自公告日起，受理食品業者之登錄。"}],
    "食品輻射照射處理標準_20240119": [{"no": "第一條", "chapter": null, "content": "本標準依食品安全衛生管理法第十七條規定訂定之。"}, {"no": "第二條", "chapter": null, "content": "本標準適用於透過輻射照射處理，使食品達到抑制發芽、微生物等目的之加工。"}, {"no": "第三條", "chapter": null, "content": "作為食品輻射照射處理之輻射線源及其限用之最高能量如下：\n一、以鈷60產生加馬(γ)射線。\n二、電子加速器產生之X射線：五百萬電子伏(5 MeV)以下。\n三、電子加速器產生之電子束：十百萬電子伏(10 MeV)以下。"}, {"no": "第四條", "chapter": null, "content": "得以輻射照射之食品品目、吸收劑量限量及照射目的，應符合附表所列規定。\n\n【附表】\n@@TABLE\n限用照射食品品目||吸收劑量上限（kGy）||照射目的\n馬鈴薯、甘藷、分蔥、洋蔥、大蒜、生薑||0.15||抑制發芽\n生鮮冷凍禽肉及機械去骨禽肉||5||延長儲存期限；去除病原菌之污染\n生鮮冷藏禽肉||4.5||延長儲存期限；控制旋毛蟲生長\n生鮮冷凍畜肉||7||延長儲存期限；控制旋毛蟲生長\n乾燥或脫水之調味用植物（包括香草、種子、香辛料、茶、蔬菜調味料）||30||殺菌\n花粉||8||延長儲存期限\n動物性調味粉||10||延長儲存期限\n@@END\n\n＊吸收劑量：指單位質量物質吸收輻射之平均能量，其單位為千戈雷（kGy）；一千克質量物質吸收一焦耳能量為一戈雷。"}, {"no": "第五條", "chapter": null, "content": "本標準自發布日施行。"}],
"應訂定食品安全監測計畫與應辦理檢驗之食品業者、最低檢驗週期及其他相關事項_20220106": [{"no": "第一點", "chapter": null, "content": "應訂定食品安全監測計畫之食品業者類別如下：\n(一)食用油脂之製造、加工、調配業者及輸入業者。\n(二)經公告應符合「食品安全管制系統準則」之肉類加工食品之製造、加工、調配業者。\n(三)經公告應符合「食品安全管制系統準則」之乳品加工食品之製造、加工、調配業者。\n(四)經公告應符合「食品安全管制系統準則」之水產加工食品之製造、加工、調配業者。\n(五)食品添加物之製造、加工、調配及輸入業者。\n(六)取得特殊營養食品查驗登記許可之業者。\n(七)黃豆之輸入業者。\n(八)玉米之輸入業者。\n(九)麥類及燕麥之輸入業者。\n(十)茶葉之輸入業者。\n(十一)食鹽之輸入業者。\n(十二)麵粉之製造、加工、調配及輸入業者。\n(十三)澱粉之製造、加工、調配及輸入業者。\n(十四)糖之製造、加工、調配及輸入業者。\n(十五)醬油之製造、加工、調配及輸入業者。\n(十六)氯化鈉含量百分之九十五以上食鹽之製造、加工、調配業者。\n(十七)茶葉飲料之製造、加工、調配業者。\n(十八)非百貨公司之綜合商品零售業者。\n(十九)農產植物、菇(蕈)類及藻類之冷凍、冷藏、脫水、醃漬、凝膠及餡料製品、植物蛋白及其製品、大豆加工製品之製造、加工、調配業者及輸入業者。\n(二十)麵條、粉條類食品之製造、加工、調配業者。\n(二十一)食用醋之製造、加工、調配業者。\n(二十二)蛋製品之製造、加工、調配業者。\n(二十三)非屬麵粉、澱粉之農產植物、菇(蕈)類及藻類磨粉製品之製造、加工、調配業者。\n(二十四)調味品之製造、加工、調配業者。\n(二十五)烘焙炊蒸食品之製造、加工、調配業者。\n(二十六)營養補充食品之製造、加工、調配業者。\n(二十七)非酒精飲料之製造、加工、調配業者。\n(二十八)巧克力及糖果之製造、加工、調配業者。\n(二十九)食用冰製品之製造、加工、調配業者。\n(三十)膳食及菜餚之製造、加工、調配業者。\n(三十一)餐盒食品之製造、加工、調配業者。\n(三十二)其他食品之製造、加工、調配業者。\n(三十三)肉類加工食品之輸入業者。\n(三十四)乳品加工食品之輸入業者。\n(三十五)水產加工食品之輸入業者。\n(三十六)嬰幼兒食品之輸入業者(嬰兒與較大嬰兒配方食品除外)。\n(三十七)蜂產品食品之輸入業者。\n前項第一款至第六款、第十二款至第十七款及第十九款至第三十二款所定之製造、加工、調配業者，未包括改裝業者。"}, {"no": "第二點", "chapter": null, "content": "應辦理檢驗之食品業者類別如下：\n(一)食用油脂之製造、加工、調配業者及輸入業者。\n(二)經公告應符合「食品安全管制系統準則」之肉類加工食品之製造、加工、調配業者。\n(三)經公告應符合「食品安全管制系統準則」之乳品加工食品之製造、加工、調配業者。\n(四)經公告應符合「食品安全管制系統準則」之水產加工食品之製造、加工、調配業者。\n(五)食品添加物之製造、加工、調配及輸入業者。\n(六)取得特殊營養食品查驗登記許可之業者。\n(七)黃豆之輸入業者。\n(八)玉米之輸入業者。\n(九)麥類及燕麥之輸入業者。\n(十)茶葉之輸入業者。\n(十一)食鹽之輸入業者。\n(十二)麵粉之製造、加工、調配及輸入業者。\n(十三)澱粉之製造、加工、調配及輸入業者。\n(十四)糖之製造、加工、調配及輸入業者。\n(十五)醬油之製造、加工、調配及輸入業者。\n(十六)氯化鈉含量百分之九十五以上食鹽之製造、加工、調配業者。\n(十七)茶葉飲料之製造、加工、調配業者。\n(十八)非百貨公司之綜合商品零售業者。\n(十九)農產植物、菇(蕈)類及藻類之冷凍、冷藏、脫水、醃漬、凝膠及餡料製品、植物蛋白及其製品、大豆加工製品之製造、加工、調配業者及輸入業者。\n(二十)麵條、粉條類食品之製造、加工、調配業者。\n(二十一)食用醋之製造、加工、調配業者。\n(二十二)蛋製品之製造、加工、調配業者。\n(二十三)非屬麵粉、澱粉之農產植物、菇(蕈)類及藻類磨粉製品之製造、加工、調配業者。\n(二十四)調味品之製造、加工、調配業者。\n(二十五)烘焙炊蒸食品之製造、加工、調配業者。\n(二十六)營養補充食品之製造、加工、調配業者。\n(二十七)非酒精飲料之製造、加工、調配業者。\n(二十八)巧克力及糖果之製造、加工、調配業者。\n(二十九)食用冰製品之製造、加工、調配業者。\n(三十)膳食及菜餚之製造、加工、調配業者。\n(三十一)餐盒食品之製造、加工、調配業者。\n(三十二)其他食品之製造、加工、調配業者。\n(三十三)肉類加工食品之輸入業者。\n(三十四)乳品加工食品之輸入業者。\n(三十五)水產加工食品之輸入業者。\n(三十六)嬰幼兒食品之輸入業者(嬰兒與較大嬰兒配方食品除外)。\n(三十七)蜂產品食品之輸入業者。\n前項第一款至第六款、第十二款至第十七款及第十九款至第三十二款所定之製造、加工、調配業者，未包括改裝業者。"}, {"no": "第三點", "chapter": null, "content": "第一點應訂定食品安全監測計畫之食品業者，其規模及實施日期如下：\n(一)第一款至第五款之製造、加工、調配業者：辦理工廠登記且資本額新臺幣三千萬元以上者，自中華民國一百零五年七月三十一日實施。\n(二)第一款之輸入業者：辦理商業登記、公司登記或工廠登記且半年內或單一批次輸入量達五公噸以上者，自一百零七年十月一日實施。\n(三)第五款之輸入業者：辦理商業登記、公司登記或工廠登記者，自一百零六年七月三十一日實施(依食品安全衛生管理法第三十條第三項免申請食品輸入查驗者除外)。\n(四)第六款：辦理商業登記、公司登記或工廠登記者，自一百零六年七月三十一日實施。\n(五)第七款：辦理商業登記、公司登記或工廠登記且三個月內或單一批次輸入量達四十公噸以上者，自一百零七年十月一日實施。\n(六)第八款：辦理商業登記、公司登記或工廠登記且三個月內或單一批次輸入量達一百五十公噸以上者，自一百零七年十月一日實施。\n(七)第九款：辦理商業登記、公司登記或工廠登記且三個月內或單一批次輸入量達四百六十公噸以上者，自一百零七年十月一日實施。\n(八)第十款：辦理商業登記、公司登記或工廠登記且三個月內或單一批次輸入量達十公噸以上者，自一百零七年十月一日實施。\n(九)第十一款：辦理商業登記、公司登記或工廠登記且三個月內或單一批次輸入量達十五公噸以上者，自一百零七年十月一日實施。\n(十)第十二款至第十七款之製造、加工、調配業者：辦理工廠登記且資本額新臺幣三千萬元以上者，自一百零五年七月三十一日實施。\n(十一)第十二款之輸入業者：辦理商業登記、公司登記或工廠登記且三個月內或單一批次輸入量達二十公噸以上者，自一百零七年十月一日實施。\n(十二)第十三款之輸入業者：辦理商業登記、公司登記或工廠登記且三個月內或單一批次輸入量達六十公噸以上者，自一百零七年十月一日實施。\n(十三)第十四款之輸入業者：辦理商業登記、公司登記或工廠登記且三個月內或單一批次輸入量達一百五十公噸以上者，自一百零七年十月一日實施。\n(十四)第十五款之輸入業者：辦理商業登記、公司登記或工廠登記且三個月內或單一批次輸入量達七百公斤以上者，自一百零七年十月一日實施。\n(十五)第十八款之綜合商品零售業者：達三家以上綜合商品零售業獨立門市之連鎖品牌，且資本額新臺幣三千萬元以上者，自一百零六年七月三十一日實施。\n(十六)第十九款至第二十三款之製造、加工、調配業者：辦理工廠登記且資本額新臺幣三千萬元以上者，自一百零七年十月一日實施。\n(十七)第十九款之輸入業者：辦理商業登記、公司登記或工廠登記且三個月內或單一批次輸入量達十五公噸以上者，自一百零七年十月一日實施。\n(十八)第二十四款至第二十七款之製造、加工、調配業者：辦理工廠登記且資本額新臺幣三千萬元以上者，自一百零八年一月一日實施。\n(十九)第二十八款至第三十二款之製造、加工、調配業者：辦理工廠登記且資本額新臺幣三千萬元以上者，自一百零九年一月一日實施。\n(二十)第三十三款：辦理商業登記、公司登記或工廠登記且三個月內或單一批次輸入量達二十五公噸以上者，自一百零七年十月一日實施。\n(二十一)第三十四款：辦理商業登記、公司登記或工廠登記且三個月內或單一批次輸入量達十五公噸以上者，自一百零七年十月一日實施。\n(二十二)第三十五款：辦理商業登記、公司登記或工廠登記且三個月內或單一批次輸入量達十五公噸以上者，自一百零七年十月一日實施。\n(二十三)第三十六款：辦理商業登記、公司登記或工廠登記且三個月內或單一批次輸入量達一公噸以上者，自一百零七年十月一日實施。\n(二十四)第三十七款：辦理商業登記、公司登記或工廠登記且三個月內或單一批次輸入量達一公噸以上者，自一百零七年十月一日實施。\n(二十五)應訂定食品安全監測計畫之食品輸入業者，自訂定之年度起應為期至次年十二月三十一日止。"}, {"no": "第四點", "chapter": null, "content": "第二點應辦理檢驗之食品業者，其規模及實施日期如下：\n(一)第一款之製造、加工、調配業者：辦理工廠登記且資本額新臺幣三千萬元以上者，自中華民國一百零三年十月三十一日實施。\n(二)第二款至第四款：辦理工廠登記者，自一百零三年十二月三十一日實施。\n(三)第五款之製造、加工、調配業者：辦理商業登記、公司登記或工廠登記者，自一百零三年十二月三十一日實施。\n(四)第五款之輸入業者：辦理商業登記、公司登記或工廠登記者，自一百零三年十二月三十一日實施(依食品安全衛生管理法第三十條第三項免申請食品輸入查驗者除外)。\n(五)第六款：辦理商業登記、公司登記或工廠登記者，自一百零三年十二月三十一日實施。\n(六)第七款至第十一款：辦理商業登記、公司登記或工廠登記者，自一百零七年十月一日實施。\n(七)第十二款至第十五款之輸入業者：辦理商業登記、公司登記或工廠登記者，自一百零七年十月一日實施。\n(八)第十二款至第十七款之製造、加工、調配業者：辦理工廠登記且資本額新臺幣三千萬元以上者，自一百零四年七月三十一日實施。\n(九)第一款之輸入業者：辦理商業登記、公司登記或工廠登記者，自一百零七年十月一日實施。\n(十)第十八款之綜合商品零售業者：達三家以上綜合商品零售業獨立門市之連鎖品牌，且資本額新臺幣三千萬元以上者，自一百零五年七月三十一日實施。\n(十一)第十九款至第二十七款之製造、加工、調配業者：辦理工廠登記且資本額新臺幣三千萬元以上者，自一百零七年十月一日實施。\n(十二)第二十八款至第三十二款之製造、加工、調配業者：辦理工廠登記且資本額新臺幣三千萬元以上者，自一百零八年一月一日實施。\n(十三)第十九款、第三十三款至第三十七款之輸入業者：辦理商業登記、公司登記或工廠登記者，自一百零七年十月一日實施。\n(十四)第一款至第五款、第十二款至第十七款、第十九款至第三十二款製造、加工、調配業者：製造產品僅供商業樣品、展覽品、研發測試用品者除外。\n(十五)第一款、第七款至第十五款、第十九款、第三十三款至第三十七款之輸入業者：輸入產品僅供自用品、商業樣品、展覽品、研發測試用品或非供食品用途者除外。\n(十六)第六款產品僅供商業樣品、展覽品、研發測試用品者除外。"}, {"no": "第五點", "chapter": null, "content": "食用油脂之製造、加工、調配業者，應就下列事項，對其動物性油脂產品及植物性油脂產品之原料、半成品或成品，每半年或每批檢驗至少一次：\n(一)動物性油脂產品應就其原料檢驗動物用藥、農藥殘留或其他依衛生安全風險擇定之衛生管理項目。\n(二)動物性油脂產品應就其粗製原油檢驗重金屬、總極性化合物、苯駢芘或其他依衛生安全風險擇定之衛生管理項目。\n(三)動物性油脂產品應就其精製油檢驗重金屬、總極性化合物、苯駢芘或其他依衛生安全風險擇定之衛生管理項目。\n(四)植物性油脂產品應就其原料檢驗農藥殘留、真菌毒素或其他依衛生安全風險擇定之衛生管理項目。\n(五)植物性油脂產品應就其供精製用之粗製原油檢驗重金屬、真菌毒素、總極性化合物、苯駢芘或其他依衛生安全風險擇定之衛生管理項目。\n(六)植物性油脂產品應就其直接供食用之粗榨原油檢驗重金屬、真菌毒素、總極性化合物、苯駢芘或其他依衛生安全風險擇定之衛生管理項目。\n(七)植物性油脂產品應就其精製油檢驗重金屬、棉籽酚(使用棉籽油者)、總極性化合物、苯駢芘或其他依衛生安全風險擇定之衛生管理項目。\n食用油脂之輸入業者，應就下列事項，對其動物性油脂產品及植物性油脂產品，每半年或每批檢驗至少一次：\n(一)動物性油脂產品應檢驗重金屬、總極性化合物、苯駢芘或其他依衛生安全風險擇定之衛生管理項目。\n(二)植物性油脂產品應檢驗重金屬、真菌毒素、總極性化合物、苯駢芘、棉籽酚(使用棉籽油者)或其他依衛生安全風險擇定之衛生管理項目。"}, {"no": "第六點", "chapter": null, "content": "肉類加工、乳品加工及水產加工食品之製造、加工、調配業者，應就其產品之養殖魚貝類原料、畜禽肉類及其他可供食用部位原料、生乳原料，每季或每批檢驗動物用藥殘留或其他依衛生安全風險擇定之衛生管理項目至少一次。\n肉類加工食品、乳品加工食品及水產加工食品之輸入業者，應就其產品，每季或每批檢驗動物用藥殘留或其他依衛生安全風險擇定之衛生管理項目至少一次。"}, {"no": "第七點", "chapter": null, "content": "食品添加物之製造、加工、調配及輸入業者，應就下列事項，對其單方食品添加物產品及複方食品添加物產品，每季或每批檢驗至少一次：\n(一)單方食品添加物產品應就其成品檢驗重金屬、重金屬以外之不純物或其他依衛生安全風險擇定之衛生管理項目。\n(二)非屬香料之複方食品添加物產品，應就其食品添加物原料、半成品或成品檢驗重金屬、重金屬以外之不純物或其他依衛生安全風險擇定之衛生管理項目。\n(三)屬香料之複方食品添加物產品，應就其原料、半成品或成品檢驗重金屬、重金屬以外之不純物或其他依衛生安全風險擇定之衛生管理項目。"}, {"no": "第八點", "chapter": null, "content": "取得特殊營養食品查驗登記許可之業者，應就其特殊營養食品產品，每季或每批檢驗成品之微生物、營養素含量或其他依衛生安全風險擇定之衛生管理項目至少一次。"}, {"no": "第九點", "chapter": null, "content": "黃豆、玉米之輸入業者，應就黃豆、玉米產品，每季或每批檢驗真菌毒素、農藥殘留、重金屬或其他依衛生安全風險擇定之衛生管理項目至少一次。"}, {"no": "第十點", "chapter": null, "content": "麥類及燕麥之輸入業者，應就麥類及燕麥產品，每季或每批檢驗真菌毒素、農藥殘留或其他依衛生安全風險擇定之衛生管理項目至少一次。"}, {"no": "第十一點", "chapter": null, "content": "茶葉之輸入業者，應就其茶葉產品，每季或每批檢驗農藥殘留或其他依衛生安全風險擇定之衛生管理項目至少一次。"}, {"no": "第十二點", "chapter": null, "content": "麵粉之製造、加工、調配業者，應就麵粉成品，每季或每批檢驗真菌毒素或其他依衛生安全風險擇定之衛生管理項目至少一次。\n麵粉之輸入業者，應就麵粉產品，每季或每批檢驗真菌毒素或其他依衛生安全風險擇定之衛生管理項目至少一次。"}, {"no": "第十三點", "chapter": null, "content": "澱粉之製造、加工、調配業者，應就下列事項，對其澱粉產品之原料或成品，每季或每批檢驗至少一次：\n(一)澱粉產品應就其農產植物原料檢驗真菌毒素、農藥殘留、重金屬或其他依衛生安全風險擇定之衛生管理項目。\n(二)澱粉產品應就其成品檢驗順丁烯二酸（酐）或其他依衛生安全風險擇定之衛生管理項目。\n澱粉之輸入業者，就其澱粉產品，每季或每批檢驗順丁烯二酸（酐）或其他依衛生安全風險擇定之衛生管理項目至少一次。"}, {"no": "第十四點", "chapter": null, "content": "食鹽之製造、加工、調配業者，應就其食鹽成品，每季或每批檢驗重金屬或其他依衛生安全風險擇定之衛生管理項目至少一次。\n食鹽之輸入業者，應就其食鹽產品，每季或每批檢驗重金屬或其他依衛生安全風險擇定之衛生管理項目至少一次。"}, {"no": "第十五點", "chapter": null, "content": "糖之製造、加工、調配業者，應就下列事項，對其糖產品之原料、半成品或成品，每季或每批檢驗至少一次：\n(一)糖產品應就其農產植物原料檢驗農藥殘留、重金屬或其他依衛生安全風險擇定之衛生管理項目。\n(二)糖產品應就其半成品或成品檢驗二氧化硫或其他依衛生安全風險擇定之衛生管理項目。\n糖之輸入業者，應就其糖產品，每季或每批檢驗二氧化硫或其他依衛生安全風險擇定之衛生管理項目至少一次。"}, {"no": "第十六點", "chapter": null, "content": "醬油之製造、加工、調配業者，應就下列事項，對其醬油產品之原料、半成品或成品，每季或每批檢驗至少一次：\n(一)醬油產品應就其農產植物、菇(蕈)類及藻類原料檢驗真菌毒素或其他依衛生安全風險擇定之衛生管理項目。\n(二)醬油產品應就其半成品或成品檢驗單氯丙二醇（3-MCPD）或其他依衛生安全風險擇定之衛生管理項目。\n醬油之輸入業者，就其醬油產品，每季或每批檢驗單氯丙二醇（3-MCPD）或其他依衛生安全風險擇定之衛生管理項目至少一次。"}, {"no": "第十七點", "chapter": null, "content": "茶葉飲料之製造、加工、調配業者，應就其茶葉原料，每季或每批檢驗農藥殘留或其他依衛生安全風險擇定之衛生管理項目至少一次。"}, {"no": "第十八點", "chapter": null, "content": "非屬百貨公司之綜合商品零售業者，應就下列事項，每半年或每批檢驗至少一次：\n(一)金針、蘿蔔乾及蜜餞產品應就其成品或半成品檢驗食品添加物用量或其他依衛生安全風險擇定之衛生管理項目。\n(二)即食鮮食食品、現場調理即食食品及直接生食之截切生鮮蔬果產品應就其成品檢驗微生物數量或其他依衛生安全風險擇定之衛生管理項目。"}, {"no": "第十九點", "chapter": null, "content": "農產植物、菇(蕈)類及藻類之冷凍、冷藏、脫水、醃漬、凝膠及餡料製品、植物蛋白及其製品、大豆加工製品之製造、加工、調配業者，應就下列事項，對其農產植物製品之原料、半成品或成品，每季或每批檢驗至少一次：\n(一)農產植物、菇(蕈)類及藻類之冷凍、冷藏、脫水製品，應就其農產植物、菇(蕈)類及藻類原料檢驗真菌毒素、農藥殘留、重金屬或其他依衛生安全風險擇定之衛生管理項目。\n(二)農產植物、菇(蕈)類及藻類之醃漬、凝膠及餡料製品、植物蛋白及其製品、大豆加工製品：\n1.應就其農產植物、菇(蕈)類及藻類原料檢驗真菌毒素、農藥殘留、重金屬或其他依衛生安全風險擇定之衛生管理項目。\n2.應就其半成品或成品檢驗食品添加物使用範圍及限量暨規格標準、相關衛生標準或其他依衛生安全風險擇定之衛生管理項目。\n農產植物、菇(蕈)類及藻類之冷凍、冷藏、脫水、醃漬、凝膠及餡料製品、植物蛋白及其製品、大豆加工製品產品之輸入業者，應就下列事項，每季或每批檢驗至少一次：\n(一)農產植物、菇(蕈)類及藻類之冷凍、冷藏、脫水產品，應檢驗真菌毒素、農藥殘留、重金屬或其他依衛生安全風險擇定之衛生管理項目。\n(二)農產植物、菇(蕈)類及藻類之醃漬、凝膠及餡料製品、植物蛋白及其製品、大豆加工製品產品，應檢驗真菌毒素、農藥殘留、重金屬、食品添加物使用範圍及限量暨規格標準、相關衛生標準或其他依衛生安全風險擇定之衛生管理項目。"}, {"no": "第二十點", "chapter": null, "content": "麵條、粉條類食品之製造、加工、調配業者，應就下列事項，對其麵條、粉條類麵體產品之原料或成品，每季或每批檢驗至少一次：\n(一)麵條、粉條類產品應就其麵粉原料檢驗真菌毒素、食品添加物使用範圍及限量暨規格標準或其他依衛生安全風險擇定之衛生管理項目。\n(二)麵條、粉條類產品應就其麵粉以外之其他原料(不包含食品添加物、食用油脂或糖、食鹽、醬油等調味料)檢驗真菌毒素、農藥殘留、動物用藥殘留、重金屬或其他依衛生安全風險擇定之衛生管理項目。\n(三)麵條、粉條類產品應就其成品檢驗食品添加物使用範圍及限量暨規格標準、相關衛生標準或其他依衛生安全風險擇定之衛生管理項目。"}, {"no": "第二十一點", "chapter": null, "content": "食用醋之製造、加工、調配業者，應就下列事項，對其食用醋產品之原料或成品每季或每批檢驗至少一次：\n(一)食用醋產品應就其農產植物、菇(蕈)類及藻類原料檢驗真菌毒素、農藥殘留、重金屬或其他依衛生安全風險擇定之衛生管理項目。\n(二)食用醋產品應就其成品檢驗食品添加物使用範圍及限量暨規格標準、相關衛生標準或其他依衛生安全風險擇定之衛生管理項目。"}, {"no": "第二十二點", "chapter": null, "content": "蛋製品之製造、加工、調配業者，應就下列事項，對其蛋製品之原料、半成品或成品，每季或每批檢驗至少一次：\n(一)蛋製品應就其原料檢驗動物用藥殘留或其他依衛生安全風險擇定之衛生管理項目。\n(二)蛋製品應就其半成品或成品檢驗食品添加物使用範圍及限量暨規格標準、相關衛生標準或其他依衛生安全風險擇定之衛生管理項目。"}, {"no": "第二十三點", "chapter": null, "content": "非屬麵粉、澱粉之農產植物、菇(蕈)類及藻類磨粉製品之製造、加工、調配業者，應就下列事項，對其磨粉製品之原料或成品，每季或每批檢驗至少一次：\n(一)非屬麵粉、澱粉之農產植物、菇(蕈)類及藻類磨粉製品應就其農產植物、菇(蕈)類及藻類原料檢驗真菌毒素、農藥殘留、重金屬或其他依衛生安全風險擇定之衛生管理項目。\n(二)非屬麵粉、澱粉之農產植物、菇(蕈)類及藻類磨粉製品應就其成品檢驗相關衛生標準或其他依衛生安全風險擇定之衛生管理項目。"}, {"no": "第二十四點", "chapter": null, "content": "調味品之製造、加工、調配業者，應就下列事項，對其調味品之原料或成品，每季或每批檢驗至少一次：\n(一)非屬醬油、食用醋之其他釀造調味品:\n1.應就其農產植物、菇(蕈)類及藻類原料檢驗真菌毒素、農藥殘留、重金屬或其他依衛生安全風險擇定之衛生管理項目。\n2.應就其成品檢驗食品添加物使用範圍及限量暨規格標準、相關衛生標準或其他依衛生安全風險擇定之衛生管理項目。\n(二)其他調味品:\n1.應就其農產植物、菇(蕈)類及藻類原料檢驗真菌毒素、農藥殘留、重金屬或其他依衛生安全風險擇定之衛生管理項目。\n2.應就其油脂類原料檢驗相關衛生標準或其他依衛生安全風險擇定之衛生管理項目。\n3.應就其成品檢驗食品添加物使用範圍及限量暨規格標準、相關衛生標準或其他依衛生安全風險擇定之衛生管理項目。"}, {"no": "第二十五點", "chapter": null, "content": "烘焙炊蒸食品之製造、加工、調配業者，應就下列事項，對其烘焙炊蒸食品之原料或成品，每季或每批檢驗至少一次：\n(一)麵包、饅頭：\n1.應就其原料檢驗真菌毒素、農藥殘留、重金屬、漂白劑或其他依衛生安全風險擇定之衛生管理項目。\n2.應就其成品檢驗相關衛生標準或其他依衛生安全風險擇定之衛生管理項目。\n(二)其他烘焙炊蒸食品：\n1.應就其原料檢驗真菌毒素、農藥殘留、重金屬或其他依衛生安全風險擇定之衛生管理項目。\n2.應就其成品檢驗相關衛生標準或其他依衛生安全風險擇定之衛生管理項目。"}, {"no": "第二十六點", "chapter": null, "content": "營養補充食品之製造、加工、調配業者，應就下列事項，對其營養補充食品之原料或成品，每季或每批檢驗至少一次：\n(一)營養補充食品應就其原料檢驗真菌毒素、農藥殘留、重金屬、塑化劑(使用膠囊殼者)或其他依衛生安全風險擇定之衛生管理項目。\n(二)營養補充食品應就其成品檢驗重金屬、相關衛生標準或其他依衛生安全風險擇定之衛生管理項目。"}, {"no": "第二十七點", "chapter": null, "content": "非酒精飲料之製造、加工、調配業者，應就下列事項，對其非酒精飲料之原料或成品，每季或每批檢驗至少一次：\n(一)包裝飲用水、包裝礦泉水及碳酸飲料應就其成品檢驗相關衛生標準或其他依衛生安全風險擇定之衛生管理項目。\n(二)其他飲料:\n1.應就其農產植物、菇(蕈)類及藻類原料檢驗真菌毒素、農藥殘留、重金屬或其他依衛生安全風險擇定之衛生管理項目。\n2.應就其成品檢驗相關衛生標準或其他依衛生安全風險擇定之衛生管理項目。"}, {"no": "第二十八點", "chapter": null, "content": "巧克力及糖果之製造、加工、調配業者，應就其成品，每季或每批相關衛生標準或其他依衛生安全風險擇定之衛生管理項目至少一次。"}, {"no": "第二十九點", "chapter": null, "content": "食用冰製品之製造、加工、調配業者，應就其成品，每季或每批檢驗相關衛生標準或其他依衛生安全風險擇定之衛生管理項目至少一次。"}, {"no": "第三十點", "chapter": null, "content": "膳食及菜餚之製造、加工、調配業者，應就其成品，每季或每批檢驗相關衛生標準或其他依衛生安全風險擇定之衛生管理項目至少一次。"}, {"no": "第三十一點", "chapter": null, "content": "餐盒食品之製造、加工、調配業者，應就下列事項，對其餐盒食品產品之原料或成品，每季或每批檢驗至少一次：\n(一)餐盒食品產品應就其原料檢驗真菌毒素、農藥殘留、動物用藥殘留、重金屬或其他依衛生安全風險擇定之衛生管理項目。\n(二)餐盒食品產品應就其成品檢驗相關衛生標準或其他依衛生安全風險擇定之衛生管理項目。"}, {"no": "第三十二點", "chapter": null, "content": "其他食品之製造、加工、調配業者，應就其原料、半成品或成品，每季或每批檢驗依衛生安全風險擇定之衛生管理項目至少一次。"}, {"no": "第三十三點", "chapter": null, "content": "嬰幼兒食品(嬰兒與較大嬰兒配方食品除外)之輸入業者，應就其產品，每季或每批檢驗微生物、真菌毒素、農藥殘留、動物用藥殘留、重金屬或其他依衛生安全風險擇定之衛生管理項目至少一次。"}, {"no": "第三十四點", "chapter": null, "content": "蜂產品食品之輸入業者，應就其蜂產品，每季或每批檢驗動物用藥殘留、農藥殘留或其他依衛生安全風險擇定之衛生管理項目至少一次。"}, {"no": "第三十五點", "chapter": null, "content": "食品業者自行或送交產品或其原材料、半成品或成品至其他檢驗機關（構）、法人或團體檢驗，應以中央主管機關訂定之檢驗方法，或國際間通用之檢驗方法為之。\n前項產品或其原材料、半成品或成品應於我國境內取樣。"}, {"no": "第三十六點", "chapter": null, "content": "食品業者依本公告所訂定食品安全監測計畫，其內容應包含下列項目:\n(一)製造、加工、調配業者：\n1.產品製造流程及危害分析。\n2.製程相關作業標準程序。\n3.內部稽核與供應商管理。\n4.教育訓練。\n(二)輸入業者：\n1.產品輸入流程及危害分析。\n2.輸入相關作業標準程序。\n3.供應商管理。\n4.教育訓練。\n前項食品安全監測計畫應與實際執行情形相符。如變更計畫內容，原版本應自修正日起至少保存五年。"}, {"no": "第三十七點", "chapter": null, "content": "食品業者依本公告所辦理之檢驗結果紀錄至少應保存五年。"}]};

  // ---- 食品衛生標準條文資料（第三層）----
  Object.assign(lawArticles, {
    "天然食用色素衛生標準_20240101": [
      {"no":"第一條","chapter":null,"content":"本標準依食品安全衛生管理法第十七條規定訂定之。"},
      {"no":"第二條","chapter":null,"content":"萃取天然食用色素之溶劑來源，包括：\n一、水、乙醇、植物油或其他食品原料。\n二、加工助劑衛生標準准用之溶劑。"},
      {"no":"第三條","chapter":null,"content":"添加賦形劑或其他添加物之天然食用色素，其所添加者，限於食品添加物使用範圍及限量暨規格標準所載品名別，或其他可供食用之食品原料。"},
      {"no":"第四條","chapter":null,"content":"天然食用色素之來源、主成分及規格，應符合附表之規定。\n\n【附表】\n@@TABLE\n中文名稱||英文名稱||來源／主成分||規格（另有規定者優先）\n藻類胡蘿蔔素||Algal carotenes||來源：鹽生杜氏藻（Dunaliella salina）菌株；主成分：類胡蘿蔔素||—\n紅莧菜色素||Amaranthus Colors||來源：紅莧菜；主成分：莧紅素（Amaranthin）||—\n婀娜多||Annatto||來源：胭脂樹／紅木（Bixa Orellana L.）種子；主成分：水溶性—降紅木素（Norbixin）；油溶性—紅木素（Bixin）||汞 ≤1 mg/kg；鎘 ≤0.5 mg/kg\n花青素||Anthocyanin||來源：紅、藍、紫色等深色植物及果實，如藍莓、接骨木莓、葡萄、洛神花、桑椹、紫蘇、蝶豆花等；主成分：花青素||汞 ≤1 mg/kg；鎘 ≤1 mg/kg\n紅甜菜色素||Beet Red Color||來源：甜菜（Beta vulgaris）根莖；主成分：甜菜苷（Betanin）||汞 ≤1 mg/kg；鎘 ≤1 mg/kg\n胭脂紅||Carmine||來源：雌性胭脂蟲（Dactylopius coccus Costa）；主成分：胭脂蟲酸（Carminic acid）||砷 ≤1 mg/kg；汞 ≤0.5 mg/kg；鎘 ≤0.1 mg/kg；沙門氏菌：陰性\n葉綠素||Chlorophyll||來源：可食植物或綠藻；主成分：葉綠素（Chlorophyll）||汞 ≤1 mg/kg；鎘 ≤1 mg/kg\n可可色素||Cocoa Color||來源：可可（Theobroma cacao）種子；主成分：類黃酮（Flavonoids）||—\n梔子藍||Gardenia Blue||來源：梔子果實萃取物經酵素處理；主成分：Genipin||—\n梔子紅||Gardenia Red||來源：梔子果實萃取物經酵素處理；主成分：Genipin||—\n梔子黃||Gardenia Yellow||來源：梔子果實；主成分：黃梔苷（Crocin）||—\n紫菜色素||Laver Color||來源：紫菜；主成分：藻紅素（Phycoerythrin）||—\n紅麴色素||Monascus Color||來源：紅麴菌（Monascus purpureus, M. anka）；主成分：monascorubin||—\n洋蔥色素||Onion Color||來源：洋蔥鱗莖；主成分：類黃酮（Flavonoids）||—\n柿子色素||Persimmon Color||來源：柿之可食部分，經發酵、分離、加壓、褐變、過濾、濃縮、乾燥；主成分：多酚類（Polyphenol）||—\n植物碳||Plant carbon||來源：木、纖維素、泥炭、椰子殼及果殼，經高溫（800–1000℃）碳化製成之黑色粉末||汞 ≤1 mg/kg；鎘 ≤1 mg/kg\n植物胡蘿蔔素||Plant carotenes||來源：植物或植物油，如胡蘿蔔、紅椒、橘子果皮、黃玉蜀黍、甘薯等；主成分：類胡蘿蔔素（Carotenoids）||—\n紅花黃||Safflower Yellow||來源：紅花（Carthamus tinctorius L.）之花瓣；主成分：類黃酮（Flavonoids）||汞 ≤1 mg/kg；鎘 ≤1 mg/kg\n番紅花||Saffron||來源：番紅花（Crocus sativus L.）之柱頭；主成分：黃梔苷（Crocin）及黃梔配質（Crocetin）||—\n高粱色素||Sorghum Color||來源：高粱果實之殼；主成分：類黃酮（Flavonoids）||—\n螺旋藻／藍藻色素||Spirulina Color||來源：螺旋藻／藍藻（Spirulina）；主成分：藻藍素（Phycocyanin）||汞 ≤1 mg/kg\n酸豆／羅望子色素||Tamarind Color||來源：酸豆／羅望子（Tamarindus indica L.）種子；主成分：類黃酮（Flavonoids）||—\n番茄色素||Tomato Color||來源：番茄之果實；主成分：番茄紅素（Lycopene）||鉛 ≤1 mg/kg；汞 ≤1 mg/kg；鎘 ≤1 mg/kg\n薑黃色素||Turmeric Color||來源：薑黃（Curcuma longa L.）之根莖；主成分：薑黃素（Curcumin）||汞 ≤1 mg/kg；鎘 ≤1 mg/kg\n葉黃素類||Xanthophylls||來源：限苜蓿萃取濃縮；主成分：葉黃素類（Xanthophylls）||汞 ≤1 mg/kg；鎘 ≤1 mg/kg\n@@END\n\n【備註】\n一、砷（除另有規定外）：3 mg/kg以下；鉛（除另有規定外）：2 mg/kg以下。\n二、總黃麴毒素及橘黴素之限量，應符合食品中污染物質及毒素衛生標準之規定。"},
      {"no":"第五條","chapter":null,"content":"本標準自中華民國一百十三年一月一日施行。"}
    ],
    "加工助劑衛生標準_20200811": [
      {"no":"第一條","chapter":null,"content":"本標準依食品安全衛生管理法第十八條之一規定訂定之。"},
      {"no":"第二條","chapter":null,"content":"（刪除）"},
      {"no":"第三條","chapter":null,"content":"加工助劑之使用量應以可達使用目的之最小量為原則，並應儘可能於終產品中降低其殘留量，且該殘留量不應對消費者健康造成危害。"},
      {"no":"第四條","chapter":null,"content":"使用附表一之加工助劑應符合該表列載之使用規定。\n\n【附表一 加工助劑之使用規定（溶劑）】\n@@TABLE\n品名||英文名稱||使用規定\n丙二醇||Propylene Glycol||可於各類食品中視實際需要適量使用\n甘油||Glycerol||可於各類食品中視實際需要適量使用\n己烷||Hexane||可使用於食用油脂之萃取，殘留量0.1 ppm以下；可使用於其他各類食品，殘留量20 ppm以下\n異丙醇||Isopropyl Alcohol||可使用於香辛料精油樹脂，殘留量50 ppm以下；可使用於檸檬油，殘留量6 ppm以下；可使用於啤酒花抽出物，殘留量2.0%以下\n丙酮||Acetone||可使用於香辛料精油之萃取，精油樹脂中殘留量30 ppm以下；可使用於其他各類食品，殘留量0.1 ppm以下\n乙酸乙酯||Ethyl Acetate||可使用於各類食品，殘留量10 ppm以下\n三乙酸甘油酯||Triacetin||可於各類食品中視實際需要適量使用\n@@END\n\n備註：未表列之溶劑品項，業者應備齊該溶劑使用方式、規格與國際組織及先進國家准用法規等評估資料，向衛生福利部提出申請。"},
      {"no":"第五條","chapter":null,"content":"附表一列載之加工助劑規格應符合附表二之規定。\n\n【附表二 加工助劑之規格】\n• 丙二醇（Propylene Glycol）：無色透明糖漿狀液，比重1.036～1.040，氯化物70 ppm以下，重金屬5 ppm以下，熾灼殘渣0.05%以下。\n• 甘油（Glycerol）：含量95.0%以上，無色澄清黏稠液，砷4 ppm以下（以As₂O₃計），重金屬5 ppm以下，熾灼殘渣0.01%以下。\n• 己烷（Hexane）：主含正己烷，無色透明揮發性液體，苯0.25 v/v%以下，蒸餾範圍64～70℃應餾出95 v/v%以上，蒸發殘渣13 ppm以下。\n• 異丙醇（Isopropyl Alcohol）：含量99.5%以上，比重0.784-0.788，水分含量0.2%以下，鉛1 mg/kg以下。\n• 丙酮（Acetone）：含量99.5%以上，比重0.790-0.793，非揮發性殘渣0.001%以下。\n• 乙酸乙酯（Ethyl Acetate）：含量99.0%以上，無色透明液體，具類果實氣味，酸價5.0以下。\n• 三乙酸甘油酯（Triacetin）：含量98.5%以上（無水基準），鉛2 mg/kg以下，硫化灰分0.02%以下。"},
      {"no":"第六條","chapter":null,"content":"本標準自發布日施行。"}
    ],
    "食品中微生物衛生標準_20201006": [
      {"no":"第一條","chapter":null,"content":"本標準依食品安全衛生管理法第十七條規定訂定之。"},
      {"no":"第二條","chapter":null,"content":"本標準之訂定範圍，包括食品微生物及其毒素或代謝物，不包括真菌及其毒素。"},
      {"no":"第三條","chapter":null,"content":"食品中之微生物及其毒素或代謝物限量，應符合附表之規定。\n<div class=\"reg-table-block\">\n<h4 class=\"annex-h\">附表</h4>\n\n<h5 class=\"annex-h2\">1.乳及乳製品類</h5>\n<div class=\"table-scroll\"><table class=\"annex-table\"><thead><tr><th rowspan=\"2\">食品品項</th><th rowspan=\"2\">微生物及其毒素、代謝產物</th><th colspan=\"2\">採樣計畫</th><th colspan=\"2\">限量</th></tr><tr><th>n</th><th>c</th><th>m</th><th>M</th></tr></thead><tbody>\n<tr><td rowspan=\"4\">1.1 鮮乳、調味乳及乳飲品<br>1.2 乳粉、調製乳粉及供為食品加工原料之乳清粉<br>1.3 發酵乳<br>1.4 本表第1.6項所列罐頭食品以外之煉乳</td><td>腸桿菌科</td><td>5</td><td>0</td><td colspan=\"2\">10 CFU/mL (g)</td></tr>\n<tr><td>沙門氏菌</td><td>5</td><td>0</td><td colspan=\"2\">陰性</td></tr>\n<tr><td>單核球增多性李斯特菌</td><td>5</td><td>0</td><td colspan=\"2\">陰性</td></tr>\n<tr><td>金黃色葡萄球菌腸毒素</td><td>5</td><td>0</td><td colspan=\"2\">陰性</td></tr>\n<tr><td rowspan=\"4\">1.5 乾酪(Cheese)、奶油(Butter)及乳脂(Cream)</td><td>大腸桿菌</td><td>5</td><td>2</td><td>10 MPN/g(mL)</td><td>100 MPN/g(mL)</td></tr>\n<tr><td>沙門氏菌</td><td>5</td><td>0</td><td colspan=\"2\">陰性</td></tr>\n<tr><td>單核球增多性李斯特菌</td><td>5</td><td>0</td><td colspan=\"2\">陰性</td></tr>\n<tr><td>金黃色葡萄球菌腸毒素</td><td>5</td><td>0</td><td colspan=\"2\">陰性</td></tr>\n<tr><td>1.6 罐頭食品<sup>1</sup>：保久乳、保久調味乳、保久乳飲品及煉乳</td><td colspan=\"6\">經保溫試驗(37℃，10天)檢查合格：沒有因微生物繁殖而導致產品膨罐、變形或pH值異常改變等情形。</td></tr>\n</tbody></table></div>\n\n<h5 class=\"annex-h2\">2.嬰兒食品類<sup>2</sup></h5>\n<div class=\"table-scroll\"><table class=\"annex-table\"><thead><tr><th rowspan=\"2\">食品品項</th><th rowspan=\"2\">微生物及其毒素、代謝產物</th><th colspan=\"2\">採樣計畫</th><th colspan=\"2\">限量</th></tr><tr><th>n</th><th>c</th><th>m</th><th>M</th></tr></thead><tbody>\n<tr><td rowspan=\"4\">2.1 嬰兒配方食品<br>2.2 較大嬰兒配方輔助食品<br>2.3 特殊醫療用途嬰兒配方食品</td><td>腸桿菌科</td><td>10</td><td>0</td><td colspan=\"2\">10 CFU/g (mL)</td></tr>\n<tr><td>沙門氏菌</td><td>10</td><td>0</td><td colspan=\"2\">陰性</td></tr>\n<tr><td>單核球增多性李斯特菌</td><td>10</td><td>0</td><td colspan=\"2\">陰性</td></tr>\n<tr><td>阪崎腸桿菌(屬)<sup>3</sup></td><td>10</td><td>0</td><td colspan=\"2\">陰性</td></tr>\n<tr><td rowspan=\"3\">2.4 本表第2.5項所列罐頭食品以外之其他專供嬰兒食用之副食品<sup>4</sup></td><td>大腸桿菌群</td><td>5</td><td>2</td><td>陰性</td><td>10 MPN/g(mL)</td></tr>\n<tr><td>沙門氏菌</td><td>5</td><td>0</td><td colspan=\"2\">陰性</td></tr>\n<tr><td>單核球增多性李斯特菌</td><td>5</td><td>0</td><td colspan=\"2\">陰性</td></tr>\n<tr><td>2.5 罐頭食品<sup>1</sup>：其他供直接食用之嬰兒罐頭食品，如：液態即食配方奶、肉泥、水果泥、蔬菜泥等</td><td colspan=\"6\">經保溫試驗(37℃，10天)檢查合格：沒有因微生物繁殖而導致產品膨罐、變形或pH值異常改變等情形。</td></tr>\n</tbody></table></div>\n\n<h5 class=\"annex-h2\">3.生鮮即食食品<sup>5</sup>及生熟食混和即食食品類<sup>6</sup></h5>\n<div class=\"table-scroll\"><table class=\"annex-table\"><thead><tr><th>食品品項</th><th>微生物及其毒素、代謝產物</th><th>限量</th></tr></thead><tbody>\n<tr><td rowspan=\"3\">3.1 生鮮即食水產品<br>3.2 混和生鮮即食水產品之生熟食混和即食食品</td><td>沙門氏菌</td><td>陰性</td></tr>\n<tr><td>腸炎弧菌</td><td>100 MPN/g</td></tr>\n<tr><td>單核球增多性李斯特菌</td><td>陰性</td></tr>\n<tr><td rowspan=\"4\">3.3 生鮮即食蔬果<br>3.4 混和生鮮即食蔬果之生熟食混和即食食品</td><td>大腸桿菌</td><td>10 MPN/g</td></tr>\n<tr><td>大腸桿菌O157:H7<sup>7</sup></td><td>陰性</td></tr>\n<tr><td>沙門氏菌</td><td>陰性</td></tr>\n<tr><td>單核球增多性李斯特菌</td><td>陰性</td></tr>\n<tr><td>3.5 供即食之未全熟蛋及含有未全熟蛋之即食食品</td><td>沙門氏菌</td><td>陰性</td></tr>\n</tbody></table></div>\n\n<h5 class=\"annex-h2\">4.包裝/盛裝飲用水及飲料類</h5>\n<div class=\"table-scroll\"><table class=\"annex-table\"><thead><tr><th>食品品項</th><th>微生物及其毒素、代謝產物</th><th>限量</th></tr></thead><tbody>\n<tr><td rowspan=\"3\">4.1 包裝飲用水及盛裝飲用水</td><td>大腸桿菌群</td><td>陰性</td></tr>\n<tr><td>糞便性鏈球菌</td><td>陰性</td></tr>\n<tr><td>綠膿桿菌</td><td>陰性</td></tr>\n<tr><td>4.2 含碳酸之飲料(如：汽水、可樂及其他添加碳酸之含糖飲料)</td><td>腸桿菌科</td><td>陰性</td></tr>\n<tr><td>4.3 本表第4.7及4.8項所列種類以外之其他還原果蔬汁、果蔬汁飲料、果漿(蜜)<sup>8</sup>及其他類似製品<br>4.4 本表第4.7及4.8項所列種類以外之其他以食品原料萃取而得之飲料(包括咖啡、可可、茶或以穀物、豆類等原料萃取、磨製而成，供飲用之飲料)</td><td>腸桿菌科</td><td>陰性</td></tr>\n<tr><td rowspan=\"3\">4.5 未經商業殺菌之鮮榨果蔬汁、添加少於50 %乳品且未經商業殺菌之含乳鮮榨果蔬汁</td><td>大腸桿菌</td><td>10 MPN/mL</td></tr>\n<tr><td>大腸桿菌O157:H7<sup>7</sup></td><td>陰性</td></tr>\n<tr><td>沙門氏菌</td><td>陰性</td></tr>\n<tr><td>4.6 本表第4.7項所列種類以外之其他發酵果蔬汁(飲料)、添加乳酸調味之酸性飲料、添加發酵液(含活性益生菌)之飲料</td><td>腸桿菌科</td><td>陰性</td></tr>\n<tr><td rowspan=\"2\">4.7 本表第4.5項所列種類以外之其他即時調製、未經殺菌處理，且架售期少於24小時之飲料</td><td>腸桿菌科</td><td>10 CFU /mL</td></tr>\n<tr><td>沙門氏菌</td><td>陰性</td></tr>\n<tr><td>4.8 罐頭食品<sup>1</sup>：罐頭飲料</td><td colspan=\"2\">經保溫試驗(37℃，10天)檢查合格：沒有因微生物繁殖而導致產品膨罐、變形或pH值異常改變等情形。</td></tr>\n</tbody></table></div>\n\n<h5 class=\"annex-h2\">5.冷凍食品及冰類</h5>\n<div class=\"table-scroll\"><table class=\"annex-table\"><thead><tr><th>食品品項</th><th>微生物及其毒素、代謝產物</th><th>限量</th></tr></thead><tbody>\n<tr><td rowspan=\"2\">5.1 食用冰塊<br>5.2 冷凍即食食品<sup>5</sup>，包括:<br>　-冰品，如:冰淇淋、義式冰淇淋、冰棒、刨冰、聖代、雪酪、冰沙等<br>　-冷凍水果<br>5.3 本表第5.6項所列種類以外之其他經加熱煮熟<sup>9</sup>後再冷凍之食品，僅需解凍或復熱即可食用者，包括:<br>　-冷凍熟蔬菜</td><td>腸桿菌科</td><td>10 CFU/g (mL)</td></tr>\n<tr><td>沙門氏菌</td><td>陰性</td></tr>\n<tr><td>5.4 冷凍非即食食品<br>　-須再經加熱煮熟<sup>9</sup>始得食用之冷凍食品<br>　-非供生食之冷凍生鮮水產品</td><td>大腸桿菌</td><td>50 MPN/g</td></tr>\n<tr><td rowspan=\"2\">5.5 供生食之冷凍生鮮水產品</td><td>沙門氏菌</td><td>陰性</td></tr>\n<tr><td>腸炎弧菌</td><td>100 MPN/g</td></tr>\n<tr><td rowspan=\"2\">5.6 經加熱煮熟<sup>9</sup>後再冷凍之水產品，僅需解凍或復熱即可食用者</td><td>沙門氏菌</td><td>陰性</td></tr>\n<tr><td>腸炎弧菌</td><td>陰性</td></tr>\n</tbody></table></div>\n\n<h5 class=\"annex-h2\">6.其他即食食品類</h5>\n<div class=\"table-scroll\"><table class=\"annex-table\"><thead><tr><th>食品品項</th><th>微生物及其毒素、代謝產物</th><th>限量</th></tr></thead><tbody>\n<tr><td rowspan=\"3\">6.1 本表第1類至第5類食品所列以外之其他經復水或沖調即可食用之食品<br>6.2 本表第1類至第5類食品所列以外之其他即食食品，以常溫或熱藏保存者<br>6.3 本表第1類至第5類食品所列以外之其他即食食品，以冷藏或低溫保存者，包括：<br>　-經復熱後即可食用之冷藏或低溫即食食品(如:18℃鮮食)<br>　-冷藏甜點、醬料等</td><td>金黃色葡萄球菌</td><td>100 CFU/g (mL)</td></tr>\n<tr><td>沙門氏菌</td><td>陰性</td></tr>\n<tr><td>單核球增多性李斯特菌<sup>10</sup></td><td>100 CFU /g (mL)</td></tr>\n<tr><td>6.4 本表第1類至第5類食品所列以外之其他罐頭食品<sup>1</sup></td><td colspan=\"2\">經保溫試驗(37℃，10天)檢查合格：沒有因微生物繁殖而導致產品膨罐、變形或pH值異常改變等情形。</td></tr>\n</tbody></table></div>\n\n<h5 class=\"annex-h2\">7.液蛋類<sup>11</sup></h5>\n<div class=\"table-scroll\"><table class=\"annex-table\"><thead><tr><th>食品品項</th><th>微生物及其毒素、代謝產物</th><th>限量</th></tr></thead><tbody>\n<tr><td>7.1 殺菌液蛋(冷藏或冷凍)</td><td>沙門氏菌</td><td>陰性</td></tr>\n<tr><td>7.2 未殺菌液蛋(冷藏或冷凍)</td><td>總生菌數</td><td>10<sup>6</sup> CFU/g</td></tr>\n</tbody></table></div>\n\n<div class=\"annex-notes\"><p class=\"notes-title\">備註：</p><ol>\n<li>本附表中有關「採樣計畫」及「限量」之代號意義表示如下：「n」：同一產品之採樣件數；「c」：允許檢測結果≧「m」並≦「M」之樣品件數；「m」：可接受的微生物限量；「M」：最大安全限量。</li>\n<li>檢驗結果之判定，在 n 個樣品中，允許有≦c 個樣品之微生物檢驗值介於 m 和 M 之間，但不得有任何一個樣品之檢驗值＞M。</li>\n<li>「m=M」之情況下，任何一個樣品之檢驗值均不得＞ m 或 M。</li>\n</ol>\n<p class=\"notes-title\" style=\"margin-top:8px\">腳註：</p><ol>\n<li>符合食品良好衛生規範準則中針對罐頭食品及商業滅菌處理要求者。</li>\n<li>本表所指之嬰兒食品，係指專門提供 12 個月以下嬰兒食用之食品。</li>\n<li>阪崎腸桿菌項目之檢驗，僅適用於可提供 6 個月以下嬰兒食用之食品。</li>\n<li>其他可提供 12 個月以下嬰兒食用之食品，包括穀物類輔助食品及以乳為基質成分之飲料及其製品。</li>\n<li>指直接提供消費者食用之食品，不再經加熱或其他可有效消除或降低微生物含量之處理。</li>\n<li>同時含有「生鮮即食水產品」、「生鮮即食蔬果」、「未全熟蛋」兩種以上之生熟食混和即食食品，從嚴合併適用混和生食種類規範之微生物項目。</li>\n<li>大腸桿菌如「陰性」，得不用加驗大腸桿菌 O157:H7。</li>\n<li>濃糖果漿(含還原果汁或天然果汁 50%以上，並添加糖，總可溶性固形物在 50°Brix 以上，供稀釋後飲用者)不適用。</li>\n<li>「加熱煮熟」係指產品加熱之條件足可確保產品能供即食。</li>\n<li>屬「不易導致李斯特菌生長之即食食品」者，無須檢測李斯特菌。所稱「不易導致李斯特菌生長之即食食品」需符合以下條件之一：(1) pH 值低於 4.4；(2)水活性低於 0.92；(3)同時符合 pH 低於 5.0 和水活性低於 0.94 的產品；(4)添加可抑制李斯特菌生長之抑制劑(inhibitors)，且可提出相關科學證據。糖、蜂蜜、糖果類(含可可及巧克力)及食鹽等產品，且符合上開條件之一者，無須檢測李斯特菌。</li>\n<li>供為液蛋之原料蛋來源，應符合食品安全衛生管理法之規定，且符合以下條件之一:(1)其蛋殼應完整無裂痕 (2)蛋殼受損但蛋殼膜仍完整，無外在污垢黏附，且內容物無洩漏。</li>\n</ol></div>\n</div>"},
      {"no":"第四條","chapter":null,"content":"食品有食品安全衛生管理法第十五條第一項第四款及本法施行細則第六條規定情事者，依違反本法第十五條第一項規定辦理。"},

    "食品中污染物質及毒素衛生標準_20260701": [
      {"no":"第一條","chapter":null,"content":"本標準依食品安全衛生管理法第十七條規定訂定之。"},
      {"no":"第二條","chapter":null,"content":"本標準所稱之污染物質，係指食品於製造、加工、調配、包裝、運送、貯存、販賣中產生或污染者，或因環境之污染，非有意添加而存在於食品者，但不包括蟲體碎片、毛髮或其他外來異物。\n本標準所稱之毒素，包括真菌毒素、海洋生物毒素及植物天然毒素。\n本標準之訂定範圍，不包括農藥、動物用藥及加工助劑之殘留，亦不包括食品中之原子塵或放射能污染物、多氯聯苯及戴奧辛之限量及食品中微生物之衛生標準所規範之微生物及其毒素。"},

1\uff0c\u4f46\u4e0d\u9069\u7528\u65bc\u672a\u6eff\u516d\u500b\u6708\u4e4b\u5b30\u5152\u55ae\u7368\u4f7f\u7528\u3002</li>\n<li>\u672c\u6a19\u6e96\u9069\u7528\u65bc\u8ca9\u8ce3\u4e4b\u7522\u54c1\u3002</li>\n<li>\u7279\u6b8a\u91ab\u7642\u7528\u9014\u5b30\u5152\u914d\u65b9\u98df\u54c1(Infant formula for special medical purposes)\uff1a\u6307\u7279\u88fd\u4e4b\u6bcd\u4e73\u6216\u5b30\u5152\u914d\u65b9\u98df\u54c1\u4e4b\u66ff\u4ee3\u54c1\uff0c\u55ae\u7368\u98df\u7528\u5373\u53ef\u6eff\u8db3\u51fa\u751f\u6578\u6708\u5167\u60a3\u6709\u5931\u8abf\u3001\u75be\u75c5\u6216\u91ab\u7642\u72c0\u6cc1\u4e4b\u5b30\u5152\u4e4b\u7279\u6b8a\u71df\u990a\u9700\u6c42\uff0c\u76f4\u5230\u8f03\u5927\u6642\u518d\u63a1\u7528\u9069\u7576\u4e4b\u8f14\u52a9\u98df\u54c1\u3002</li>\n<li>\u5b30\u5e7c\u5152\u7a40\u7269\u985e\u8f14\u52a9\u98df\u54c1(Cereal based foods for infant and young child)\uff1a\u5c08\u70ba\u6eff\u8db3\u5b30\u5152\u65b7\u5976\u5f8c\u4e4b\u5065\u5eb7\u9700\u6c42\u4ee5\u53ca\u8f14\u52a9\u5e7c\u5152\u9010\u6b65\u9069\u61c9\u4e00\u822c\u98df\u54c1\u53ca\u88dc\u5145\u71df\u990a\u4e4b\u7a40\u7269\u985e\u98df\u54c1\uff0c\u5305\u62ec\u9808\u4ee5\u725b\u5976\u6216\u6c34\u7b49\u6db2\u9ad4\u5fa9\u539f\u5f8c\u98df\u7528\u4e4b\u7a40\u7269\u3001\u9eb5\u98df\u3001\u9eb5\u5305\u53ca\u9905\u4e7e\u7b49\u3002</li>\n<li>\u5b30\u5e7c\u5152\u526f\u98df\u54c1(Baby food):\u5c08\u70ba\u6eff\u8db3\u5b30\u5152\u65b7\u5976\u5f8c\u4e4b\u5065\u5eb7\u9700\u6c42\u4ee5\u53ca\u8f14\u52a9\u5e7c\u5152\u9010\u6b65\u9069\u61c9\u4e00\u822c\u98df\u54c1\u53ca\u88dc\u5145\u71df\u990a\u4e4b\u98df\u54c1\uff0c\u4e0d\u5305\u62ec\u5b30\u5e7c\u5152\u7a40\u7269\u985e\u8f14\u52a9\u98df\u54c1\u53ca\u4ee5\u4e73\u70ba\u57fa\u8cea\u6210\u5206\u4e4b\u98f2\u6599\u53ca\u5176\u88fd\u54c1\u3002</li>\n<li>\u4ee5\u7e3d\u6c30\u9178\u8a08\u3002</li>\n<li>\u4ee5\u6e38\u96e2\u6c30\u9178\u8a08\u3002</li>\n<li>\u4ee5\u5df2\u516c\u958b\u6aa2\u9a57\u65b9\u6cd5\u4e4b\u5b9a\u91cf\u6975\u9650\u70ba\u6e96\uff0c\u5176\u4e2d\u6e38\u96e2\u68c9\u915a\u70ba 0. 05 ppm\uff0c\u7e3d\u68c9\u7c7d\u915a\u70ba 1 ppm\u3002</li>\n<li>MU(mouse units)\u4fc2\u6307\u8c9d\u6bd2\u5c0f\u9f20\u55ae\u4f4d\uff0c\u4ee5\u8c9d\u6bd2\u5c0f\u9f20\u55ae\u4f4d\u6216\u7576\u91cf\u8a08\u3002</li>\n<li>\u50c5\u9069\u7528\u65bc\u6c34\u5206\u542b\u91cf 7 %\u4ee5\u4e0b\u4e4b\u7da0\u85fb\u53ca\u85cd\u85fb(\u4ee5\u4e7e\u91cd\u8a08)\uff0c\u751f\u9bae\u7522\u54c1\u53ca\u7d05\u85fb\u3001\u8910\u85fb\u7b49\u7522\u54c1\u5747\u4e0d\u9069\u7528\u3002</li>\n<li>\u5c24\u5176\u662f\u9bd6\u79d1(Scombridae)\u3001\u9be1\u79d1(Clupeidae)\u3001\u9bf7\u79d1(Engraulidae)\u3001\u9c70\u79d1(Coryfenidae)\u3001\u6241\u9c3a\u79d1(Pomatomidae)\u3001\u79cb\u5200\u9b5a\u79d1(Scombresocidae)\u7b49\u9b5a\u7a2e\u3002</li>\n<li>\u9069\u7528\u65bc\u5728\u6d41\u901a\u8ca9\u8ce3\u671f\u9593\u6216\u6709\u6548\u65e5\u671f\u5167\u8ca9\u8ce3\u4e4b\u7522\u54c1\u3002</li>\n<li>\u672a\u7d93\u7cbe\u7149\u7a0b\u5e8f\u4e4b\u521d\u69a8\u6cb9\u8102\u4e0d\u9069\u7528\u3002</li>\n</ol></div></div>"},
      {"no":"第六條","chapter":null,"content":"本標準自中華民國一百零八年一月一日施行。\n本標準中華民國一百零九年六月十七日修正發布之第三條附表一、第四條附表二、第五條附表三，自一百十年一月一日施行。\n本標準中華民國一百十年二月四日修正發布之第五條附表三，自一百十年七月一日施行。\n本標準中華民國一百十一年五月三十一日修正發布之第五條附表三，自一百十三年一月一日施行。\n本標準中華民國一百十三年三月二十八日修正發布之第三條附表一，自一百十三年七月一日施行。"}

    "食品用洗潔劑衛生標準_20240911": [
      {"no":"第一條","chapter":null,"content":"本標準依食品安全衛生管理法第十七條規定訂定之。"},
      {"no":"第二條","chapter":null,"content":"本標準所稱食品用洗潔劑，指用於消毒或洗滌食品、食品器具、食品容器或包裝之物質。作為商業滅菌用途之食品用洗潔劑，不適用本標準。"},
      {"no":"第三條","chapter":null,"content":"食品用洗潔劑之衛生應符合下列標準：\n一、砷：0.05 ppm以下（以As₂O₃計）；依產品標示，於稀釋後使用時之溶液濃度為基準。\n二、重金屬：1 ppm以下（以Pb計）；依產品標示，於稀釋後使用時之溶液濃度為基準。\n三、甲醇含量：1 mg/mL以下。\n四、壬基苯酚類界面活性劑（nonylphenol及nonylphenol ethoxylate）：百分之0.1（重量比）以下。\n五、螢光增白劑：不得檢出。\n六、香料及著色劑，應以准用之食品添加物為限。\n前項規定，僅適用於以合成界面活性劑為主成分之液態洗潔劑，供餐具自動洗淨機使用之洗潔劑，不適用之。"},
      {"no":"第四條","chapter":null,"content":"用於清洗食品器具、容器及包裝等食品接觸面之主要消毒成分，使用後不再經清水沖洗，且列於附表一者，應符合附表一之使用規定。\n\n<div class=\"reg-table-block\"><div class=\"annex-h\">附表一　用於食品器具容器包裝等食品接觸面之主要消毒成分</div><div class=\"table-scroll\"><table class=\"annex-table\"><thead><tr><th>NO</th><th>CAS 編號</th><th>名稱</th><th>使用濃度限量*</th></tr></thead><tbody><tr><td>1</td><td>64-19-7</td><td>乙酸<br><span style=\"color:var(--muted);font-size:12px\">Acetic acid</span></td><td>686 ppm</td></tr><tr><td>2</td><td>98-55-5</td><td>松油醇<br><span style=\"color:var(--muted);font-size:12px\">Alpha-terpineol</span></td><td>無（註2）</td></tr><tr><td>3</td><td>12125-02-9</td><td>氯化銨<br><span style=\"color:var(--muted);font-size:12px\">Ammonium chloride</span></td><td>48 ppm</td></tr><tr><td>4</td><td>10043-52-4</td><td>氯化鈣<br><span style=\"color:var(--muted);font-size:12px\">Calcium chloride</span></td><td>17 ppm</td></tr><tr><td>5</td><td>7778-54-3</td><td>次氯酸鈣<br><span style=\"color:var(--muted);font-size:12px\">Calcium hypochlorite</span></td><td>總有效氯 200 ppm 以下（註2）</td></tr><tr><td>6</td><td>1592-23-0</td><td>硬脂酸鈣<br><span style=\"color:var(--muted);font-size:12px\">Calcium stearate</span></td><td>無</td></tr><tr><td>7</td><td>3347-48-5</td><td>癸酸<br><span style=\"color:var(--muted);font-size:12px\">Decanoic acid</span></td><td>乳品類加工設備：90 ppm<br>其他食品接觸面：234 ppm</td></tr><tr><td>8</td><td>7173-51-5</td><td>二癸基二甲基氯化銨<br><span style=\"color:var(--muted);font-size:12px\">Didecyldimethylammonium chloride</span></td><td>活性四級化合物：200 ppm（註2）</td></tr><tr><td>9</td><td>139-33-3</td><td>乙二胺四醋酸二鈉<br><span style=\"color:var(--muted);font-size:12px\">Disodium ethylenediaminetetraacetate</span></td><td>1400 ppm</td></tr><tr><td>10</td><td>27176-87-0</td><td>十二烷基苯磺酸<br><span style=\"color:var(--muted);font-size:12px\">Dodecyl-benzenesulfonic acid</span></td><td>乳品類加工設備：5.5 ppm<br>其他食品接觸面：400 ppm</td></tr><tr><td>11</td><td>64-17-5</td><td>乙醇<br><span style=\"color:var(--muted);font-size:12px\">Ethanol</span></td><td>無</td></tr><tr><td>12</td><td>111-76-2</td><td>乙二醇丁醚<br><span style=\"color:var(--muted);font-size:12px\">Ethylene glycol monobutyl ether</span></td><td>無（註2）</td></tr><tr><td>13</td><td>7790-92-3</td><td>次氯酸<br><span style=\"color:var(--muted);font-size:12px\">Hypochlorous acid</span></td><td>總有效氯 200 ppm 以下</td></tr><tr><td>14</td><td>10034-85-2</td><td>碘化氫<br><span style=\"color:var(--muted);font-size:12px\">Hydriodic acid</span></td><td>可滴定碘 25 ppm</td></tr><tr><td>15</td><td>7722-84-1</td><td>過氧化氫<br><span style=\"color:var(--muted);font-size:12px\">Hydrogen peroxide</span></td><td>乳品類加工設備：465 ppm<br>其他食品接觸面：1100 ppm</td></tr><tr><td>16</td><td>7553-56-2</td><td>碘<br><span style=\"color:var(--muted);font-size:12px\">Iodine</span></td><td>可滴定碘 25 ppm</td></tr><tr><td>17</td><td>13840-33-0</td><td>次氯酸鋰<br><span style=\"color:var(--muted);font-size:12px\">Lithium hypochlorite</span></td><td>總有效氯 200 ppm 及鋰 30 ppm（註2）</td></tr><tr><td>18</td><td>50-21-5</td><td>乳酸<br><span style=\"color:var(--muted);font-size:12px\">Lactic acid</span></td><td>乳品類加工設備：138 ppm<br>其他食品接觸面：無</td></tr><tr><td>19</td><td>1309-48-4</td><td>氧化鎂<br><span style=\"color:var(--muted);font-size:12px\">Magnesium oxide</span></td><td>無</td></tr><tr><td>20</td><td>7558-80-7</td><td>磷酸二氫鈉<br><span style=\"color:var(--muted);font-size:12px\">Monosodium phosphate</span></td><td>350 ppm</td></tr><tr><td>21</td><td>26896-20-8</td><td>新癸酸<br><span style=\"color:var(--muted);font-size:12px\">Neo-decanoic acid</span></td><td>174 ppm（註2）</td></tr><tr><td>22</td><td>7697-37-2</td><td>硝酸<br><span style=\"color:var(--muted);font-size:12px\">Nitric acid</span></td><td>1000 ppm</td></tr><tr><td>23</td><td>112-05-0</td><td>壬酸<br><span style=\"color:var(--muted);font-size:12px\">Nonanoic acid</span></td><td>90 ppm</td></tr><tr><td>24</td><td>7378-99-6</td><td>N,N-二甲基正辛胺<br><span style=\"color:var(--muted);font-size:12px\">N,N-dimethyloctanamine</span></td><td>113 ppm</td></tr><tr><td>25</td><td>124-07-2</td><td>辛酸<br><span style=\"color:var(--muted);font-size:12px\">Octanoic acid</span></td><td>乳品類加工設備：176 ppm<br>其他食品接觸面：234 ppm</td></tr><tr><td>26</td><td>3944-72-7</td><td>辛烷磺酸<br><span style=\"color:var(--muted);font-size:12px\">1-Octanesulfonic acid</span></td><td>172 ppm（註2）</td></tr><tr><td>27</td><td>28805-58-5</td><td>辛烯基琥珀酸<br><span style=\"color:var(--muted);font-size:12px\">Octenyl succinic acid</span></td><td>156 ppm</td></tr><tr><td>28</td><td>90-43-7</td><td>2-苯基-苯酚<br><span style=\"color:var(--muted);font-size:12px\">ortho-Phenylphenol</span></td><td>400 ppm（註2）</td></tr><tr><td>29</td><td>—</td><td>氯氧化物類水溶液（主成分為亞氯酸鹽、氯酸鹽及二氧化氯）產生二氧化氯溶液或酸化之鹼性溶液<br><span style=\"color:var(--muted);font-size:12px\">Oxychloro species (predominantly chlorite, chlorate and chlorine dioxide)</span></td><td>總有效氯 200 ppm 以下</td></tr><tr><td>30</td><td>—</td><td>氯氧化物類水溶液（含二氧化氯）：由亞氯酸鈉水溶液酸化生成<br><span style=\"color:var(--muted);font-size:12px\">Oxychloro species (including chlorine dioxide) generated by acidification of sodium chlorite</span></td><td>總有效氯 200 ppm 以下</td></tr><tr><td>31</td><td>79-21-0</td><td>過氧乙酸<br><span style=\"color:var(--muted);font-size:12px\">Peroxyacetic acid</span></td><td>315 ppm</td></tr><tr><td>32</td><td>33734-57-5</td><td>過氧辛酸<br><span style=\"color:var(--muted);font-size:12px\">Peroxyoctanoic acid</span></td><td>122 ppm</td></tr><tr><td>33</td><td>2809-21-4</td><td>羥基亞乙基二磷酸<br><span style=\"color:var(--muted);font-size:12px\">1-hydroxyethylidene-1,1-diphosphonic acid (HEDP)</span></td><td>34 ppm</td></tr><tr><td>34</td><td>7664-38-2</td><td>磷酸<br><span style=\"color:var(--muted);font-size:12px\">Phosphoric acid</span></td><td>無</td></tr><tr><td>35</td><td>7758-02-3</td><td>溴化鉀<br><span style=\"color:var(--muted);font-size:12px\">Potassium bromide</span></td><td>乳品類加工設備：總有效鹵素 46 ppm<br>其他食品接觸面：總有效鹵素 200 ppm</td></tr><tr><td>36</td><td>7681-11-0</td><td>碘化鉀<br><span style=\"color:var(--muted);font-size:12px\">Potassium iodide</span></td><td>可滴定碘 25 ppm</td></tr><tr><td>37</td><td>7778-66-7</td><td>次氯酸鉀<br><span style=\"color:var(--muted);font-size:12px\">Potassium hypochlorite</span></td><td>總有效氯 200 ppm 以下（註2）</td></tr><tr><td>38</td><td>79-09-4</td><td>丙酸<br><span style=\"color:var(--muted);font-size:12px\">Propionic acid</span></td><td>297 ppm</td></tr><tr><td>39</td><td>499-83-2</td><td>2,6-吡啶二甲酸<br><span style=\"color:var(--muted);font-size:12px\">2,6-Pyridinedicarboxylic acid</span></td><td>1.2 ppm</td></tr><tr><td>40</td><td>112-02-7</td><td>十六烷基三甲基氯化銨<br><span style=\"color:var(--muted);font-size:12px\">Cetyltrimethylammonium chloride (CTAC)</span></td><td>活性四級化合物：200 ppm（註2）</td></tr><tr><td>41</td><td>6004-24-6</td><td>西吡氯銨<br><span style=\"color:var(--muted);font-size:12px\">Cetylpyridinium chloride</span></td><td>活性四級化合物：200 ppm（註2）</td></tr><tr><td>42</td><td>8001-54-5</td><td>苯扎氯銨<br><span style=\"color:var(--muted);font-size:12px\">Benzalkonium chloride</span></td><td>活性四級化合物：200 ppm（註2）</td></tr><tr><td>43</td><td>121-54-0</td><td>苄索氯銨<br><span style=\"color:var(--muted);font-size:12px\">Benzethonium chloride</span></td><td>活性四級化合物：200 ppm（註2）</td></tr><tr><td>44</td><td>3401-74-9</td><td>N,N-二(3-胺基丙基)十二烷基胺<br><span style=\"color:var(--muted);font-size:12px\">N,N-Di(3-aminopropyl)dodecylamine</span></td><td>活性四級化合物：400 ppm（註2）</td></tr><tr><td>45</td><td>7173-51-5</td><td>二癸基二甲基氯化銨（DDAC）<br><span style=\"color:var(--muted);font-size:12px\">Didecyl dimethyl ammonium chloride</span></td><td>活性四級化合物：200 ppm（註2）</td></tr><tr><td>46</td><td>5324-84-5</td><td>1-辛烷磺酸鈉<br><span style=\"color:var(--muted);font-size:12px\">Sodium 1-octanesulfonate</span></td><td>312 ppm（註2）</td></tr><tr><td>47</td><td>7647-15-6</td><td>溴化鈉<br><span style=\"color:var(--muted);font-size:12px\">Sodium bromide</span></td><td>總有效鹵素 200 ppm（註2）</td></tr><tr><td>48</td><td>527-07-1</td><td>葡萄糖酸鈉<br><span style=\"color:var(--muted);font-size:12px\">Sodium gluconate</span></td><td>760 ppm</td></tr><tr><td>49</td><td>7681-52-9</td><td>次氯酸鈉<br><span style=\"color:var(--muted);font-size:12px\">Sodium hypochlorite</span></td><td>總有效氯 200 ppm 以下</td></tr><tr><td>50</td><td>7681-82-5</td><td>碘化鈉<br><span style=\"color:var(--muted);font-size:12px\">Sodium iodide</span></td><td>可滴定碘 25 ppm（註2）</td></tr><tr><td>51</td><td>7775-19-1</td><td>偏硼酸鈉<br><span style=\"color:var(--muted);font-size:12px\">Sodium metaborate</span></td><td>無（註2）</td></tr><tr><td>52</td><td>68309-27-3</td><td>磺化妥爾油脂肪酸<br><span style=\"color:var(--muted);font-size:12px\">Sulfonated tall oil fatty acid</span></td><td>66 ppm（註2）</td></tr><tr><td>53</td><td>7664-93-9</td><td>硫酸<br><span style=\"color:var(--muted);font-size:12px\">Sulfuric acid</span></td><td>228 ppm（註2）</td></tr><tr><td>54</td><td>64-02-8</td><td>乙二胺四乙酸四鈉<br><span style=\"color:var(--muted);font-size:12px\">Tetrasodium ethylenediamine tetraacetate</span></td><td>無</td></tr></tbody></table></div><div class=\"annex-notes\"><div class=\"notes-title\">備註</div><ol><li>複合配方產品則以各單一成分之使用濃度限量適用本表規定。</li><li>乳品類加工設備不得使用。</li><li>使用含本表成分之洗潔劑後，應確實經排放或風乾揮發等程序，以避免清潔劑殘留於食品接觸面。</li></ol><p style=\"font-size:12px;margin-top:8px\">＊「使用濃度限量」係指於稀釋後使用時之溶液濃度上限。</p></div></div>"},
      {"no":"第五條","chapter":null,"content":"用於清洗食品之主要消毒成分，除該成分為合法食品原料者外，其成分限制、殘留濃度及使用範圍，依附表二之規定。為使前項殘留濃度符合規定，必要時，使用後得再經飲用水清洗或其他適當處理。\n\n<div class=\"reg-table-block\"><div class=\"annex-h\">附表二　用於清洗食品之主要消毒成分</div><div class=\"table-scroll\"><table class=\"annex-table\"><thead><tr><th>NO</th><th>CAS 編號</th><th>名稱</th><th>殘留濃度</th><th>使用範圍</th></tr></thead><tbody><tr><td>1</td><td>—</td><td>酸化亞氯酸鈉<br><span style=\"color:var(--muted);font-size:12px\">Acidified sodium chlorite solutions (ASC)</span></td><td>氯酸鹽及亞氯酸鹽總和 1 ppm 以下</td><td>生鮮即食食品</td></tr><tr><td>2</td><td>10049-04-4</td><td>二氧化氯<br><span style=\"color:var(--muted);font-size:12px\">Chlorine dioxide</span></td><td>氯酸鹽及亞氯酸鹽總和 1 ppm 以下</td><td>生鮮即食食品</td></tr><tr><td>3</td><td>7790-92-3</td><td>次氯酸<br><span style=\"color:var(--muted);font-size:12px\">Hypochlorous acid</span></td><td>總有效氯 1 ppm 以下</td><td>生鮮即食食品</td></tr><tr><td>4</td><td>7681-52-9</td><td>次氯酸鈉<br><span style=\"color:var(--muted);font-size:12px\">Sodium hypochlorite</span></td><td>總有效氯 1 ppm 以下</td><td>生鮮即食食品</td></tr><tr><td>5</td><td>79-21-0</td><td>過氧乙酸<br><span style=\"color:var(--muted);font-size:12px\">Peracetic acid</span></td><td>1 ppm 以下</td><td>生鮮即食食品</td></tr></tbody></table></div><div class=\"annex-notes\"><div class=\"notes-title\">備註</div><ol><li>非供食用之蛋殼或果皮，非本表限制範疇。</li><li>酸化亞氯酸鈉：由亞氯酸鈉（CAS No. 7758-19-2）與其他通過 GRAS 認可之酸性溶液調配，pH 介於 2.3–2.9 之範圍。</li><li>「生鮮即食食品」指未經加熱處理之生鮮且欲即供食用之食品，例如已去皮截切之蔬果、生魚片。</li><li>次氯酸鈉之溴酸鹽含量應為 50 ppm 以下。</li></ol></div></div>"},
