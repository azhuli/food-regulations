    Object.assign(lawArticles, {"食品過敏原標示規定_20190101": [{"no": "一", "chapter": null, "content": "本規定依食品安全衛生管理法第二十二條第一項第十款規定訂定之。"}, {"no": "二", "chapter": null, "content": "市售有容器或包裝之食品，含下列對特殊過敏體質者致生過敏之內容物者，應於其容器或外包裝上，標示含有致過敏性內容物名稱之顯著醒語資訊：\n(一)甲殼類及其製品。\n(二)芒果及其製品。\n(三)花生及其製品。\n(四)牛奶、羊奶及其製品。但由牛奶、羊奶取得之乳糖醇，不在此限。\n(五)蛋及其製品。\n(六)堅果類及其製品。\n(七)芝麻及其製品。\n(八)含麩質之穀物及其製品。但由穀類製得之葡萄糖漿、麥芽糊精及酒類，不在此限。\n(九)大豆及其製品。但由大豆製得之高度提煉或純化取得之大豆油（脂）、混合形式之生育醇及其衍生物、植物固醇、植物固醇酯，不在此限。\n(十)魚類及其製品。但由魚類取得之明膠，並作為製備維生素或類胡蘿蔔素製劑之載體或酒類之澄清用途者，不在此限。\n(十一)使用亞硫酸鹽類等，其終產品以二氧化硫殘留量計每公斤十毫克以上之製品。"}, {"no": "三", "chapter": null, "content": "前點醒語資訊，依下列方式擇一標示：\n(一)「本產品含有○○」、「本產品含有○○，不適合對其過敏體質者食用」或等同意義字樣。\n(二)品名載明「○○」，以此方式標示者，其所含致過敏性內容物應於品名全部載明。"}], "散裝食品標示規定_20210101": [{"no": "一", "chapter": null, "content": "本規定依食品安全衛生管理法第二十五條第二項規定訂定之。"}, {"no": "二", "chapter": null, "content": "本規定所稱散裝食品指食品安全衛生管理法施行細則第二十條所定之食品。"}, {"no": "三", "chapter": null, "content": "具公司登記或商業登記之食品販賣業者販售散裝食品，應標示品名及原產地（國）。但現場烘焙(烤)及現場調理即食食品不在此限。"}, {"no": "四", "chapter": null, "content": "未具公司登記或商業登記之食品販賣業者販售下列散裝食品，應標示原產地（國）：\n生鮮、冷藏、冷凍、脫水、乾燥、碾碎、研磨、簡單切割之花生、紅豆、綠豆、黑豆、黃豆、蕎麥、薏苡(仁)、藜麥、芝麻(胡麻)、小米、大蒜、香菇、茶葉、紅棗、枸杞子、杭菊、雞、豬、羊、牛。"}, {"no": "五", "chapter": null, "content": "所有食品販賣業者販售以牛肉及牛可食部位為原料之散裝食品，應以其屠宰國標示牛肉及牛可食部位原料之原產地（國）。\n前項所定牛肉及牛可食部位原料，不包含牛乳及牛脂，其內容物僅含有單一生牛肉或生牛可食部位者，得擇一標示食品原產地（國）或牛肉及牛可食部位原料之原產地（國）。"}, {"no": "六", "chapter": null, "content": "本規定之標示應以中文顯著標示，其得以卡片、標記（標籤）或標示牌（板）等型式，採懸掛、立（插）牌、黏貼或其他足以明顯辨明之方式，擇一為之。\n前項以標記（標籤）者，其字體長度及寬度各不得小於零點二公分；以其他標示型式者，各不得小於二公分。"}]});
    Object.assign(lawArticles, {"連鎖飲料便利商店及速食業之現場調製飲料標示規定_20230101": [{"no": "一", "chapter": null, "content": "本規定依食品安全衛生管理法第二十五條第二項規定訂定之。"}, {"no": "二", "chapter": null, "content": "具稅籍登記之連鎖飲料業、連鎖便利商店業及連鎖速食業（以下簡稱為連鎖業者）之現場調製飲料，應依本規定辦理標示。"}, {"no": "三", "chapter": null, "content": "前點所稱之連鎖業者，指公司或商業登記上使用相同之名義，或經由加盟、授權等方式使用相同名義者。"}, {"no": "四", "chapter": null, "content": "現場調製飲料，應標示該杯飲料之總糖量及總熱量，總糖量及總熱量標示值之誤差允許範圍應符合「包裝食品營養標示應遵行事項」規定；總糖量及總熱量亦得以最高值表示之，以最高值表示者，應加註「最高值」。\n前項總糖量得以換算方糖數標示之(每顆方糖以五公克計)。\n含咖啡因成分之現場調製飲料，應標示該杯飲料總咖啡因含量之最高值，並加註「最高值」；或以紅黃綠標示區分總咖啡因含量，該標示得以符號或圖樣標示之：\n(一)紅色代表每杯之總咖啡因含量二百零一毫克以上。\n(二)黃色代表每杯之總咖啡因含量一百零一毫克至二百毫克。\n(三)綠色代表每杯之總咖啡因含量一百毫克以下。"}, {"no": "五", "chapter": null, "content": "添加茶、咖啡，或以果蔬為品名之飲料，應依下列規定標示：\n(一)添加茶或以茶香料調製之飲料：\n1. 以茶葉、茶粉、茶湯、茶湯之濃縮液，或以天然茶葉製得之原料調製者，應標示茶葉原料來源之原產地(國)。如茶葉原料混合二個以上產地(國)者，應依其含量多寡由高至低標示之。\n2. 不含茶葉、茶粉、茶湯、茶湯之濃縮液，或以天然茶葉製得之原料，僅以茶香料調製者，應於品名標示「○○風味」或「○○口味」字樣。\n(二)添加咖啡之飲料：\n咖啡原料來源之原產地(國)。若咖啡原料混合二個以上產地(國)者，應依其含量多寡由高至低標示之。\n(三)以果蔬為品名之飲料：\n1. 果蔬汁含量應達百分之十以上，始得以「○○汁」為品名。\n2. 果蔬汁含量未達百分之十者，品名應標示為「○○飲料」或等同意義字樣。\n3. 未含果蔬汁者，應於品名標示「○○風味」或「○○口味」字樣。"}, {"no": "六", "chapter": null, "content": "本規定之標示應以中文顯著標示，得以卡片、菜單註記、標記(標籤)、標示牌(板)、QR Code 或其他電子化方式揭露，採張貼懸掛、立（插）牌、黏貼或其他足以明顯辨明之方式，擇一為之。\n前項以菜單註記、標記（標籤）者，其字體長度及寬度各不得小於零點二公分；以其他標示型式者，字體之長度及寬度各不得小於一公分。"}, {"no": "七", "chapter": null, "content": "前點以 QR Code 或其他電子化方式揭露者，應於電子化標示等上方或下方位置，註明「掃描此處可獲得標示資訊」或等同意義字樣，且現場應設置可讀碼之行動裝置。"}]});
  Object.assign(lawArticles, {"包裝蜂蜜及其糖漿類產品標示規定_20230701": [{"no": "第一點", "chapter": null, "content": "本規定依食品安全衛生管理法（下稱本法）第二十二條第一項第十款規定訂定之。"}, {"no": "第二點", "chapter": null, "content": "包裝蜂蜜及其糖漿類產品，其蜂蜜含量達百分之六十以上者，品名之字體大小應一致，並符合下列規定：\n(一) 有添加糖（糖漿）者，品名應標示「加糖蜂蜜」或等同意義字樣。\n(二) 添加糖（糖漿）以外之其他原料，而未添加糖（糖漿）者，品名應標示「含〇〇（非蜂蜜之原料名稱）蜂蜜」或「調製蜂蜜」或等同意義字樣。"}, {"no": "第三點", "chapter": null, "content": "包裝蜂蜜及其糖漿類產品，其蜂蜜含量未達百分之六十，且其品名含「蜂蜜（蜜）」字樣者，其品名之字體大小應一致，並完整標示「蜂蜜（蜜）口味」、「蜂蜜（蜜）風味」或等同意義字樣。"}, {"no": "第四點", "chapter": null, "content": "包裝蜂蜜及其糖漿類產品，應標示蜂蜜原料原產地，並依蜂蜜含量多寡由高至低依序標示之。"}, {"no": "第五點", "chapter": null, "content": "包裝蜂蜜產品，標示「蜂蜜（蜜）」、「100%蜂蜜（蜜）」、「純蜂蜜（蜜）」或等同意義字樣，應為僅含蜂蜜成分之產品。\n未添加蜂蜜之包裝糖漿產品，品名不得標示「蜂蜜（蜜）」或等同意義字樣。"}, {"no": "第六點", "chapter": null, "content": "產品之品名標示未符合本規定，其涉不實、誇張或易生誤解者，依本法之相關規定辦理。"}], "包裝維生素礦物質類之錠狀膠囊狀食品營養標示應遵行事項_20191107": [{"no": "一", "chapter": null, "content": "本應遵行事項依食品安全衛生管理法第二十二條第三項規定訂定之。"}, {"no": "二", "chapter": null, "content": "本應遵行事項所稱維生素、礦物質類之錠狀、膠囊狀食品，指以營養添加劑作為維生素、礦物質來源之錠狀、膠囊狀食品。"}, {"no": "三", "chapter": null, "content": "包裝維生素、礦物質類之錠狀、膠囊狀食品營養標示方式，於包裝容器外表之明顯處以表格方式由上至下依序標示下列內容：\n(一) 「營養標示」之標題。\n(二) 每一份量(或每一份、每份)○顆(或粒、錠)、本包裝所(含)○份。\n(三) 每份(或每一份量、每一份)及「每日參考值百分比」。\n(四) 各項維生素含量。\n(五) 各項礦物質含量。\n(六) 其他於包裝容器上宣稱或自願標示之營養素含量。\n\n以垂直表格方式無法完整呈現者，得切割以橫向連續性表格方式標示。\n總表面積小於一百平方公分之包裝食品，得以表格框橫向方式依第一項所列各款之順序標示。"}, {"no": "四", "chapter": null, "content": "各項維生素、礦物質及其他營養素含量標示之方式，數值應以阿拉伯數字標示：應以一次建議食用量（須為整數）為單位標示含量，標示「每一份量（或每一份、每份）」及其所提供「每日參考值百分比」，並加註該產品每包裝所含之份數；未訂定「每日參考值」之營養素，應於每日參考值百分比處加註「＊」符號，並註明「＊參考值未訂定」字樣。"}, {"no": "五", "chapter": null, "content": "包裝維生素、礦物質類之錠狀、膠囊狀食品之各項營養素之每日參考值及單位，應依附表一規定辦理；未列於附表一之其他營養素以通用單位標示。"}, {"no": "六", "chapter": null, "content": "維生素 A、維生素 D 及維生素 E 應加註明國際單位（IU）之含量標示。"}, {"no": "七", "chapter": null, "content": "包裝維生素、礦物質類之錠狀、膠囊狀食品營養標示之數據修整方式，應依下列規定辦理：\n(一) 每包裝所含之份數，以整數標示。\n(二) 每日參考值百分比，以整數或至小數點後一位標示。\n(三) 維生素、礦物質含量以有效數字不超過三位為原則。\n(四) 宣稱或其他營養素以整數或至小數點後一位標示。\n(五) 數據修整應參照中華民國國家標準 CNS2925「規定極限值之有效位數指示法」規定或四捨五入法。"}, {"no": "八", "chapter": null, "content": "包裝維生素、礦物質類之錠狀、膠囊狀食品欲敘述維生素、礦物質之生理功能，其每日最低攝取量需達每日參考值百分之十五以上。"}, {"no": "九", "chapter": null, "content": "包裝維生素、礦物質類之錠狀、膠囊狀食品之各項維生素、礦物質及其他營養素含量標示之標示值產生方式，得以檢驗分析或計算方式依實際需要為之；其標示值之誤差允許範圍應符合附表二之規定。"}, {"no": "十", "chapter": null, "content": "包裝維生素、礦物質類之錠狀、膠囊狀食品須於包裝容器外表明顯處加註標示「一日請勿超過○顆（或錠、粒）」及「多食無益」之警語。"}, {"no": "十一", "chapter": null, "content": "本應遵行事項不適用於非以營養添加劑作為維生素、礦物質來源之錠狀、膠囊狀食品。"}, {"no": "附表一", "chapter": "附表", "content": "附表一　各項營養素之每日參考值\n<div class=\"reg-table-block\"><p><strong>附表一　各項營養素之每日參考值</strong></p>\n<div class=\"table-scroll\"><table class=\"annex-table\" border=\"1\">\n<thead><tr><th rowspan=\"2\">項目</th><th colspan=\"3\">適用對象</th></tr><tr><th>無特定指定族群</th><th>一歲至三歲</th><th>孕乳婦</th></tr></thead>\n<tbody>\n<tr><td>維生素 A</td><td>700 微克 RE</td><td>400 微克 RE</td><td>600 微克 RE</td></tr>\n<tr><td>維生素 B1</td><td>1.4 毫克</td><td>0.6 毫克</td><td>1.1 毫克</td></tr>\n<tr><td>維生素 B2</td><td>1.6 毫克</td><td>0.7 毫克</td><td>1.2 毫克</td></tr>\n<tr><td>維生素 B6</td><td>1.6 毫克</td><td>0.5 毫克</td><td>1.9 毫克</td></tr>\n<tr><td>維生素 B12</td><td>2.4 微克</td><td>0.9 微克</td><td>2.6 微克</td></tr>\n<tr><td>維生素 C</td><td>100 毫克</td><td>40 毫克</td><td>110 毫克</td></tr>\n<tr><td>維生素 D</td><td>10 微克</td><td>5 微克</td><td>10 微克</td></tr>\n<tr><td>維生素 E</td><td>13 毫克 α-TE</td><td>5 毫克 α-TE</td><td>14 毫克 α-TE</td></tr>\n<tr><td>維生素 K</td><td>120 微克</td><td>30 微克</td><td>90 微克</td></tr>\n<tr><td>菸鹼素</td><td>18 毫克 NE</td><td>9 毫克 NE</td><td>16 毫克 NE</td></tr>\n<tr><td>葉酸</td><td>400 微克</td><td>170 微克</td><td>600 微克</td></tr>\n<tr><td>泛酸</td><td>5 毫克</td><td>2 毫克</td><td>6 毫克</td></tr>\n<tr><td>生物素</td><td>30 微克</td><td>9 微克</td><td>30 微克</td></tr>\n<tr><td>膽素</td><td>500 毫克</td><td>180 毫克</td><td>410 毫克</td></tr>\n<tr><td>鈣</td><td>1200 毫克</td><td>500 毫克</td><td>1000 毫克</td></tr>\n<tr><td>磷</td><td>1000 毫克</td><td>400 毫克</td><td>800 毫克</td></tr>\n<tr><td>鐵</td><td>15 毫克</td><td>10 毫克</td><td>45 毫克</td></tr>\n<tr><td>碘</td><td>140 微克</td><td>65 微克</td><td>200 微克</td></tr>\n<tr><td>鎂</td><td>390 毫克</td><td>80 毫克</td><td>355 毫克</td></tr>\n<tr><td>鋅</td><td>15 毫克</td><td>5 毫克</td><td>15 毫克</td></tr>\n<tr><td>氟</td><td>3 毫克</td><td>0.7 毫克</td><td>3 毫克</td></tr>\n<tr><td>硒</td><td>55 微克</td><td>20 微克</td><td>60 微克</td></tr>\n<tr><td>鈉</td><td>2000 毫克</td><td>1200 毫克</td><td>2000 毫克</td></tr>\n<tr><td>蛋白質</td><td>60 公克</td><td>20 公克</td><td>65 公克</td></tr>\n<tr><td>脂肪</td><td>60 公克</td><td>＊</td><td>65 公克</td></tr>\n<tr><td>碳水化合物</td><td>300 公克</td><td>＊</td><td>330 公克</td></tr>\n<tr><td>飽和脂肪</td><td>18 公克</td><td>＊</td><td>18 公克</td></tr>\n<tr><td>膽固醇</td><td>300 毫克</td><td>＊</td><td>300 毫克</td></tr>\n<tr><td>膳食纖維</td><td>25 公克</td><td>15 公克</td><td>30 公克</td></tr>\n</tbody></table></div>\n<p>＊參考值未訂定<br>\n註1：RE (Retinol Equivalent) 即視網醇當量。1 μg RE = 1 μg 視網醇(Retinol) = 6 μg β-胡蘿蔔素(β-Carotene)<br>\n註2：α-TE (α-Tocopherol Equivalent) 即生育醇當量。1 mg α-TE = 1 mg α-Tocopherol<br>\n註3：NE (Niacin Equivalent) 即菸鹼素當量。菸鹼素包括菸鹼酸及菸鹼醯胺及菸鹼醯胺先質之色胺酸(tryptophan)，以菸鹼素當量表示之。1 mg NE = 60 mg tryptophan<br>\n註4：公克得以 g 標示，毫克得以 mg 標示，微克得以 μg 標示。</p></div>"}, {"no": "附表二", "chapter": "附表", "content": "附表二　營養標示值誤差允許範圍\n<div class=\"reg-table-block\"><p><strong>附表二　營養標示值誤差允許範圍</strong></p>\n<div class=\"table-scroll\"><table class=\"annex-table\" border=\"1\">\n<thead><tr><th>項目</th><th>誤差允許範圍</th></tr></thead>\n<tbody>\n<tr><td>維生素 A、維生素 D</td><td>標示值之 80%～180%</td></tr>\n<tr><td>維生素（不包括維生素 A、維生素 D）；礦物質（不包括鈉）</td><td>≧ 標示值之 80%</td></tr>\n<tr><td>自願標示之營養素：蛋白質、碳水化合物、熱量、脂肪、飽和脂肪、反式脂肪、膽固醇、鈉、糖</td><td>≦ 標示值之 120%</td></tr>\n<tr><td>自願標示之其他營養素</td><td>≧ 標示值之 80%</td></tr>\n</tbody></table></div></div>"}], "食品器具容器包裝塑膠類材質名稱標示原則_20191210": [{"no": "一、法規背景", "chapter": null, "content": "依據食品安全衛生管理法第26條，「食品接觸面含塑膠材質之食品器具、食品容器或包裝」等經中央主管機關公告之食品器具、食品容器或包裝，應以中文及通用符號，明顯標示材質名稱等事項；其為二種以上材質組成者，應分別標明。\n依據食安法施行細則第21條第1款，標示內容應印刷、打印、壓印或貼標於最小販賣單位之包裝或本體上，並應於販賣流通時清晰可見；重複性使用之塑膠類食品器皿及容器等經中央主管機關規定者，其主要本體之材質名稱及耐熱溫度二項標示，並應以印刷、打印或壓印方式，標示於主要本體上。"}, {"no": "二、塑膠類「材質名稱」標示原則", "chapter": null, "content": "(一) 應以「明確指稱材質之中文名稱或通用符號」標示材質名稱；其中通用符號認定原則，詳見附錄1。二種以上塑膠類材質組成者，應分別標明其材質名稱。\n(二) 除「一般已認知具有特定填充材料與強化材料之塑膠材質，應依附錄2所列方式標示」外，塑膠類材質無需加註「材質特性」、「添加物」或非塑膠類材質之「填充材料與強化材料」；惟欲自願性加註者，即應符合附錄2及附錄3所列加註方式，否則整體名稱均不視為材質名稱。\n(三) 組合部件或積層材質者，至少應展開標明「食品接觸面」及「構成材質主體」之材質名稱；另建議以圖例或由內至外排序等方式，呈現各部件或積層之材質名稱。（例如不得僅標示「淋膜紙」，而應標示「PE」（食品接觸面）及「紙」（構成材質主體）。）"}, {"no": "三、其他注意事項", "chapter": null, "content": "(一) 本原則係作為核判「食品器具、食品容器或包裝標示其塑膠類材質名稱」符合性之原則說明，並非代表已有實際產品使用相關材料，亦無涉各類材質之適用性或衛生安全等；業者應自主管理，確認產品符合食安法相關規定，包括該法第16條及依該法第17條所定「食品器具容器包裝衛生標準」等。\n(二) 針對本原則之附錄及附表內容，本署將不定期彙整更新、檢視、調整及週知。"}, {"no": "附錄1 塑膠類材質名稱之通用符號認定原則", "chapter": "附錄", "content": "針對一般塑膠類材質，附表1所列之「縮寫名稱」得視為通用符號；針對橡膠類材質，附表2所列之「縮寫名稱」得視為通用符號；針對熱塑性彈性體（TPE）得以「熱塑性彈性體」、「TPE」、附表3所列之「分類名稱」或「次分類名稱」擇一表示為材質之中文名稱或通用符號。\n材質（基材）如有塗布其他材質之薄膜，則應「分別標明薄膜及基材之材質名稱」或「於基材之材質名稱前方，加註附表4所列之前綴代號」（例如標示「KPET」表示以 PVDC 塗布之 PET，亦得逕標示「PVDC、PET」）。\n其他非循本原則設定之縮寫或名稱（包括僅標示「塑膠」、「橡膠」、商標名稱如 Tritan、單純外文音譯或其他無法明確指稱材質之名稱），應滿足下列其一條件，否則整體名稱均不視為材質名稱：\n一、由業者舉證為 CNS、ISO、JIS、ASTM 文件或其他非由業者自訂之國際通用文件所列出之材質縮寫名稱，並確認非與本原則矛盾，且舉證資料於產品販售前已由標示負責業者函報本署備查；或\n二、雖產品以其他縮寫或名稱進行標示，惟已同時於產品明確提供「得公開檢視該標示內容所指稱之材質中文名稱或通用符號之連結」。"}, {"no": "附錄2 塑膠類材質應標示及自願性加註填充材料與強化材料之加註方式", "chapter": "附錄", "content": "如材質屬於「一般已認知具有特定填充材料與強化材料」且經列於附表5者，則應循下列方式擇一標示（以石頭紙為例），否則已涉易生誤解等標示違規之情事：\n一、展開標示其「塑膠類材質名稱」及「一般認知具有之填充材料及強化材料名稱」，例如：「聚乙烯、碳酸鈣」；或\n二、併列標示附表5所列之「一般中文名稱」及所含之塑膠類材質名稱，例如：「石頭紙（聚乙烯）」。\n非列於附表5之材質，其材質名稱無需加註填充材料與強化材料，惟如欲自願性加註，則應以下列方式擇一進行加註，否則整體名稱均不視為材質名稱：\n一、以中文加註填充材料與強化材料；或\n二、於材質名稱後方，以附表6所列「種類記號」及附表7所列「型態記號」加註填充材料與強化材料之資訊，材質名稱與記號之間並以連字號「-」區隔，且需同時於產品明確提供「得公開檢視該記號意義之連結」（例如標示「PE-MD(Al)60」，表示「含60%鋁粉之聚乙烯」）。"}, {"no": "附錄3 塑膠類材質自願性加註材質特性之加註方式", "chapter": "附錄", "content": "材質名稱無需加註材質特性，惟如欲自願性加註，則應以下列方式擇一進行加註，否則整體名稱均不視為材質名稱：\n一、針對常見已加註材質特性之材料，附表8所列之「縮寫名稱」得視為材質名稱之通用符號；或\n二、以中文於材質名稱加註材質特性；或\n三、於材質名稱後方，以附表9所列之「特性記號」加註其材質特性，材質名稱與記號之間並以連字號「-」區隔，且需同時於產品明確提供「得公開檢視該記號意義之連結」。"}, {"no": "附表1 一般塑膠類材質之縮寫名稱對照表", "chapter": "附表", "content": "@@TABLE\n縮寫名稱||其他縮寫用語||英文名稱||參考中文名稱\nAB||||acrylonitrile-butadiene plastic||丙烯腈-丁二烯塑膠\nABAK||ABA||acrylonitrile-butadiene-acrylate plastic|| ystyrene||發泡性聚苯乙烯\nHDPE；或 PE-HD||high-density polyethylene||高密度聚乙烯\nHIPP||high-impact polypropylene||耐衝擊性聚丙烯\nHIPS；或 PS-HI||high-impact polystyrene||耐衝擊性聚苯乙烯\nLDPE；或 PE-LD||low-density polyethylene||低密度聚乙烯\nLLDPE；或 PE-LLD||linear low-density polyethylene||線性低密度聚乙烯\nMDPE；或 PE-MD||medium-density polyethylene||中密度聚乙烯\nOPP||oriented polypropylene||定向聚丙烯\nUHMWPE；或 PE-UHMW||ultra-high-molecular weight polyethylene||超高分子量聚乙烯\nVLDPE；或 PE-VLD||very-low-density polyethylene||極低密度聚乙烯\n@@END\n註：CPP 之進一步區別（如 GCPP、MCPP、RCPP）已過於細化，不予採認，應以 PP、CPP 或中文名稱標示。"}, {"no": "附表9 塑膠類材質之特性記號對照表", "chapter": "附表", "content": "@@TABLE\n特性記號||中文意義||特性記號||中文意義\nA||酸(改質)；或非晶形(非規)，雜排||N||正常的；或線型酚醛樹脂\nB||雙軸；或嵌段；或溴化的||O||定向的\nC||氯化的；或晶態，順排||P||塑化的；或熱塑性的\nD||密度||R||隆起的；或隨機的；或A階酚醛樹脂；或硬質的\nE||彈性體；或發泡/可發泡的；或環氧化的||S||飽和的；或磺化；或對排(間規)；或熱固性\nF||可撓的；或氟化的；或流體||T||耐溫性；或韌化的\nG||乙二醇(改質)||U||超；或未塑化的；或不飽和的\nH||高；或同元||V||極\nI||衝擊||W||重量\nL||線性；或低||X||交聯的，可交聯的\nM||中；或分子的||||\n@@END"}], "巧克力之品名及標示規定_20220101": [{"no": "第一點", "chapter": null, "content": "本規定依據食品安全衛生管理法第二十二條第一項第十款及第二十五條第二項訂定之。"}, {"no": "第二點", "chapter": null, "content": "以可可脂、可可粉或可可膏等可可製品為原料，並可添加糖、乳製品或食品添加物製成不含內餡固體型態之產品，其品名標示應遵守下列規定：\n(一) 品名標示為「黑巧克力」者，其總可可固形物含量至少百分之三十五、可可脂至少百分之十八、非脂可可固形物至少百分之十四。\n(二) 品名標示為「白巧克力」者，其可可脂含量至少百分之二十、牛乳固形物至少百分之十四。\n(三) 品名標示為「牛奶巧克力」者，其總可可固形物含量至少百分之二十五、非脂可可固形物至少百分之二點五、牛乳固形物至少百分之十二。\n(四) 品名標示為「巧克力」者，其原料及含量應以前三款為限。"}, {"no": "第三點", "chapter": null, "content": "前點巧克力有添加其他植物油者，其添加量不得超過該產品總重量之百分之五。其產品應於品名附近加標示「添加植物油」或等同之字義。"}, {"no": "第四點", "chapter": null, "content": "以前二點所定巧克力添加其他食品原料製成之固體型態產品，並以巧克力為品名者，其巧克力含量至少百分之二十五。其產品應於品名前加標示「含餡」或「加工」或等同之字義。"}, {"no": "第五點", "chapter": null, "content": "品名標示為「巧克力抹醬（或糖漿）」或等同之字義者，應以可可脂、可可粉或可可膏等可可製品為原料，並得添加其他食品原料製成半固體型態或流體型態，其總可可固形物含量至少百分之五或可可脂至少百分之二。"}, {"no": "第六點", "chapter": null, "content": "本規定之標示方式：\n(一) 包裝巧克力依第二點至前點之規定標示，其字體長度及寬度不得小於零點二公分。\n(二) 具稅籍登記之食品販賣業者，販售散裝巧克力，應於販售之場所依第二點至前點之規定標示，並得以卡片、標記（標籤）或標示牌（板）等型式，採懸掛、立（插）牌、黏貼或其他足以明顯辨明之方式為之。以標記（標籤）標示者，其字體長度及寬度各不得小於零點二公分；以其他標示型式者，各不得小於二公分。"}, {"no": "第七點", "chapter": null, "content": "產品之品名標示未符合本規定，其涉不實、誇張或易生誤解者，依食品安全衛生管理法之相關規定辦理。"}], "重組肉及注脂肉食品標示規定_20220701": [{"no": "第一點", "chapter": null, "content": "本規定依食品安全衛生管理法第二十二條第一項第十款及第二十五條第二項訂定之。"}, {"no": "第二點", "chapter": null, "content": "本規定所稱重組肉食品，指以禽畜肉或水產品為原料，經組合、黏著、壓型或其他方式，以一種或多種加工過程製造之產品，且該產品外觀易造成消費者誤解為單一肉（水產品）塊（排、片）之產品。"}, {"no": "第三點", "chapter": null, "content": "本規定所稱注脂肉食品，指以畜肉為原料，經油脂或以油脂混加食品原料、食品添加物注入、調理過程製造之產品。"}, {"no": "第四點", "chapter": null, "content": "包裝重組肉、注脂肉食品應以中文於品名顯著標示「重組」、「注脂」或等同字義說明，並加註「僅供熟食」或等同字義之醒語。"}, {"no": "第五點", "chapter": null, "content": "具稅籍登記之食品販賣業者，販售散裝重組肉、注脂肉食品，應於販售之場所，以中文於品名顯著標示「重組」、「注脂」或等同字義說明，並加註「僅供熟食」或等同字義之醒語。\n前項標示得以卡片、標記（標籤）、標示牌（板）或其他相類型式，採懸掛、立（插）牌、黏貼或其他足以明顯辨明之方式為之。以標記（標籤）標示者，其字體長度及寬度各不得小於零點二公分；以其他標示型式者，各不得小於二公分。"}, {"no": "第六點", "chapter": null, "content": "直接供應飲食場所販售重組肉、注脂肉食品，應於供應之飲食場所，以中文顯著標示該食品為「重組」、「注脂」或等同字義說明，並加註「熟食供應」或等同字義之醒語。\n前項標示得以卡片、菜單註記、標記（標籤）、標示牌（板）或其他相類型式，採張貼懸掛、立（插）牌、黏貼或其他足以明顯辨明之方式為之。以菜單註記、標記（標籤）者，其字體長度及寬度各不得小於零點二公分；以其他標示型式者，各不得小於二公分。"}]});
