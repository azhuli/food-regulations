90 微克</td><td>45 微克</td><td>30 微克</td></tr>\n<tr><td>泛酸</td><td>0.9 毫克</td><td>0.45 毫克</td><td>0.3 毫克</td></tr>\n<tr><td>生物素</td><td>4.5 微克</td><td>2.25 微克</td><td>1.5 微克</td></tr>\n<tr><td>鈣</td><td>150 毫克</td><td>75 毫克</td><td>50 毫克</td></tr>\n<tr><td>鐵</td><td>6.75 毫克</td><td>3.38 毫克</td><td>2.25 毫克</td></tr>\n<tr><td>碘</td><td>30 微克</td><td>15 微克</td><td>10 微克</td></tr>\n<tr><td>鎂</td><td>53.25 毫克</td><td>26.63 毫克</td><td>17.75 毫克</td></tr>\n<tr><td>鋅</td><td>2.25 毫克</td><td>1.13 毫克</td><td>0.75 毫克</td></tr>\n</tbody></table></div></div>"}, {"no": "表五", "chapter": "附表", "content": "表五　以每三十公克（實重）為基準之食品類別\n<div class=\"reg-table-block\"><p><strong>表五　以每三十公克（實重）為基準之食品類別</strong></p>\n<p>起司、起司粉、乳油（Cream）、奶精；肉鬆、肉醬、肉燥、肉酥、肉脯、肉絨、醃燻肉品；魚鬆、魚醬、醃漬水產類、海苔醬；豆腐乳、素肉鬆、素肉醬、拌飯料；果醬、花生醬、芝麻醬、花生粉；西式烘焙食品（包括餅乾類，不包括蛋糕類、麵包類、披薩）；中式糕餅（包括餅乾類）。</p></div>"}, {"no": "表六", "chapter": "附表", "content": "表六　以每一公克（乾貨）為基準之食品類別\n<div class=\"reg-table-block\"><p><strong>表六　以每一公克（乾貨）為基準之食品類別</strong></p>\n<p>蝦皮、蝦米、海菜、髮菜、柴魚、海帶芽、海苔片、紫菜、洋菜、海蜇皮。</p></div>"}, {"no": "表七", "chapter": "附表", "content": "表七　不得作「高、多、強化、富含、較…高、較…多」或等同意義詞句之食品\n<div class=\"reg-table-block\"><p><strong>表七　不得作「高、多、強化、富含、較…高、較…多」或等同意義詞句之食品</strong></p>\n<p><strong>額外使用營養添加劑之零食類食品：</strong>米果、膨發及擠壓類；蜜餞及脫水蔬果類；種子類；核果類；豆類製品；水產休閒食品。</p>\n<p><strong>碳酸飲料</strong>（不包含符合表一之無糖宣稱者）。</p>\n<p><strong>額外使用營養添加劑之糖果類食品</strong>（不包含符合表一之無糖宣稱且未使用甜味劑者）：硬糖；軟糖類；冬瓜糖、木瓜糖、蜜甘薯；巧克力；口齒芳香糖、口香糖、泡泡糖；其他糖果。</p>\n<p><strong>調味料類：</strong>乾粉類；味增、豆豉；調味油類；調味醬（用量較大）；沾醬（用量較小）；蘑菇醬、黑胡椒醬；義大利麵醬；糖類（固體、液體）；鮮味劑；蒜頭酥、紅蔥頭；八角粒、粉狀香料；桂花醬；其他調味料。</p>\n<p><strong>醃漬醬菜類。</strong></p>\n<p>註：碳酸飲料係指添加二氧化碳之飲料。</p></div>"}], "包裝食品營養標示應遵行事項_20240701": [{"no": "第一條", "chapter": "第一章 總則", "content": "本應遵行事項依食品安全衛生管理法（以下簡稱食安法）第二十二條第三項規定訂定之。"}, {"no": "第二條", "chapter": "第一章 總則", "content": "本應遵行事項用詞，定義如下：\n(一) 反式脂肪（酸）：指食品中非共軛反式脂肪（酸）之總和。\n(二) 碳水化合物：即醣類，指總碳水化合物。\n(三) 糖：指單醣與雙醣之總和。\n(四) 膳食纖維：指人體小腸無法消化與吸收之三個以上單醣聚合之可食碳水化合物及木質素。\n(五) 營養宣稱：指任何以說明、隱喻或暗示方式，表達該食品具有或不具有特定之熱量或營養素性質。"}, {"no": "第三條", "chapter": "第一章 總則", "content": "包裝食品營養標示方式，應於包裝容器外表之明顯處以表格方式由上至下依序提供以下文字記載或內容：\n(一) 「營養標示」之標題。\n(二) 每一份量（或每一份、每份）○公克（或毫升、顆、粒、錠）、本包裝（含）○份。\n(三) 「每份」、「每100公克（或毫升）」，或「每份」、「每日參考值百分比」。\n(四) 熱量。\n(五) 蛋白質含量。\n(六) 脂肪、飽和脂肪（或飽和脂肪酸）、反式脂肪（或反式脂肪酸）含量。\n(七) 碳水化合物、糖含量。\n(八) 鈉含量。\n(九) 符合營養宣稱定義之營養素或出現於「包裝食品營養宣稱應遵行事項」中之宣稱營養素含量；廠商自願標示之其他營養素含量。\n\n以垂直表格無法完整呈現者，得切割後以橫向連續性表格方式標示。\n多項包裝食品或口味共同使用同一營養標示，得以組合併列格式標示。\n總表面積小於一百平方公分之包裝食品，得以表格框橫向方式依前項各款之順序標示。"}, {"no": "第四條", "chapter": "第一章 總則", "content": "包裝食品之熱量及營養素含量標示，數值應以阿拉伯數字標示，除第二項規定外，應依下列規定擇一辦理：\n(一) 以「每一份量」及「每100公克（或毫升）」標示，並加註每包裝所含之份數。\n(二) 以「每一份量」及其所提供「每日參考值百分比」標示，並加註每包裝所含之份數。對訂定每日營養素攝取參考值之營養素，應另註明各項營養素之每日參考值（總表面積小於一百平方公分之包裝食品除外）；對未訂定每日營養素攝取參考值之營養素，應於每日參考值百分比處加註「＊」符號，並註明「＊參考值未訂定」字樣。\n\n未滿一歲嬰兒食用之食品，應以第一款之格式標示；食品型態為錠狀、膠囊狀（不包含糖果類食品）應以第二款之格式標示。"}, {"no": "第五條", "chapter": "第一章 總則", "content": "包裝食品各類產品每一份量之重量（或容量），應考量國民飲食習慣及市售包裝食品型態之一般每次食用量。食品型態為錠狀、膠囊狀（不包含糖果類食品）應以建議食用量（須為整數）作為每一份量之標示。"}, {"no": "第六條", "chapter": "第一章 總則", "content": "包裝食品營養標示之單位，應依下列規定辦理：\n(一) 「每一份量」之單位：固體（半固體）以公克或g標示；液體以毫升、mL或ml標示；錠狀、膠囊狀（不包含糖果類食品）以公克、g、顆、粒或錠標示。\n(二) 熱量以大卡、Kcal或kcal標示。\n(三) 蛋白質、脂肪、飽和脂肪（酸）、反式脂肪（酸）、單元及多元不飽和脂肪（酸）總量、碳水化合物、糖、膳食纖維以公克或g標示。\n(四) 鈉、膽固醇、胺基酸以毫克或mg標示。\n(五) 胺基酸以公克或g、毫克或mg標示。\n(六) 維生素、礦物質之名稱及單位應依附表一規定辦理。\n(七) 其他營養素以通用單位標示。"}, {"no": "第七條", "chapter": "第一章 總則", "content": "包裝食品之每日熱量及各項營養素攝取參考值，應依附表一規定辦理。"}, {"no": "第八條", "chapter": "第一章 總則", "content": "包裝食品營養標示之熱量、蛋白質、脂肪、碳水化合物、鈉、飽和脂肪酸、反式脂肪酸、糖含量，符合附表二之條件者，得以「０」標示；蛋白質、脂肪或碳水化合物項下之個別營養素，其實際含量不得以「０」標示者，其蛋白質、脂肪或碳水化合物亦不得以「０」標示。"}, {"no": "第九條", "chapter": "第一章 總則", "content": "包裝食品營養標示之數據修整方式，應依下列規定辦理：\n(一) 每一份量、份數、每日參考值百分比，以整數或至小數點後一位標示。食品型態為錠狀、膠囊狀（不包含糖果類食品）每一份量以顆、粒或錠為單位者，以整數標示。\n(二) 每一份量之重量或容量經數據修整以小數點後一位標示仍無法呈現數值時，得以至小數點後二位標示。\n(三) 非拼裝販售且無法固定重量之產品，得將份數數值修整為整數後，再加標「約」字。\n(四) 熱量、蛋白質、胺基酸、脂肪、脂肪酸、膽固醇、碳水化合物、糖、鈉、膳食纖維及其他自願標示項目，以整數或至小數點後一位標示為原則。\n(五) 維生素、礦物質以有效數字不超過三位為原則。\n(六) 數據修整應參照中華民國國家標準CNS2925「規定極限值之有效位數指示法」規定或四捨五入法。"}, {"no": "第十條", "chapter": "第一章 總則", "content": "包裝食品各項營養標示值產生方式，得以檢驗分析或計算方式依實際需要為之；其標示值之誤差允許範圍應符合附表三之規定。食品之特定營養素含量如依其特性隨時間改變，得以加註標示特定營養素含量之實際衰退情形。"}, {"no": "第十一條", "chapter": "第一章 總則", "content": "包裝食品營養標示之熱量計算方式，應依下列規定辦理：\n(一) 蛋白質之熱量，以每公克四大卡計算。\n(二) 脂肪之熱量，以每公克九大卡計算。\n(三) 碳水化合物之熱量，以每公克四大卡計算，但加以標示膳食纖維者，其膳食纖維熱量得以每公克二大卡計算。\n(四) 赤藻糖醇之熱量得以零大卡計算，其他糖醇之熱量得以每公克二‧四大卡計算；有機酸之熱量得以每公克三大卡計算；酒精（乙醇）之熱量得以每公克七大卡計算。並應將糖醇含量標示於營養標示格式中，有機酸及酒精（乙醇）含量應於營養標示格式外明顯處註明。\n(五) 每份熱量計算方式，得以每一百公克（或毫升）之熱量換算之，或以每一百公克（或毫升）之蛋白質、脂肪及碳水化合物含量換算為每份含量後，再計算每份之熱量。"}, {"no": "第十二條", "chapter": "第一章 總則", "content": "包裝維生素礦物質類之錠狀、膠囊狀食品，不適用本規定。"}, {"no": "第十三條", "chapter": "第二章 嬰兒與較大嬰兒配方食品營養標示", "content": "嬰兒與較大嬰兒配方食品之營養標示項目，應於包裝或容器外表之明顯處以表格方式由上至下依序提供以下文字記載或內容：\n(一) 嬰兒配方食品及特殊醫療用途嬰兒配方食品：\n1. 「營養標示」之標題。\n2. 「每100公克（或大卡）」、「每100毫升」。\n3. 熱量。\n4. 蛋白質含量。\n5. 脂肪、飽和脂肪(酸)、反式脂肪(酸)、亞麻油酸、α-次亞麻油酸。\n6. 碳水化合物、糖含量。\n7. 鈉含量。\n8. 水分含量。\n9. 附表四所列維生素含量。\n10. 膽素含量。\n11. 肌醇含量。\n12. 左旋肉鹼含量。\n13. 灰分含量。\n14. 附表四所列礦物質（不包括鈉）含量。\n15. 廠商自願標示之其他營養素含量。\n(二) 較大嬰兒配方輔助食品：\n1. 「營養標示」之標題。\n2. 「每100公克（或大卡）」、「每100毫升」。\n3. 熱量。\n4. 蛋白質含量。\n5. 脂肪、飽和脂肪(酸)、反式脂肪(酸)、亞麻油酸含量。\n6. 碳水化合物、糖含量。\n7. 鈉含量。\n8. 水分含量。\n9. 附表四所列維生素含量。\n10. 灰分含量。\n11. 附表四所列礦物質（不包括鈉、銅、錳、硒）含量。\n12. 廠商自願標示之其他營養素含量。"}, {"no": "第十四條", "chapter": "第二章 嬰兒與較大嬰兒配方食品營養標示", "content": "嬰兒與較大嬰兒配方食品營養標示之單位，應依下列規定辦理：\n(一) 熱量以大卡、Kcal或kcal標示。\n(二) 蛋白質、脂肪、飽和脂肪(酸)、反式脂肪(酸)、碳水化合物、糖、膳食纖維、水分、灰分以公克或g標示。\n(三) 脂肪酸總量以公克或毫克、g或mg標示。\n(四) 鈉、膽固醇、胺基酸、膽素、肌醇、左旋肉鹼以毫克或mg標示。\n(五) 維生素、礦物質之單位以附表一規定標示。惟菸鹼素應以毫克或mg標示，維生素B1、維生素B2、維生素B6得以微克或μg標示。\n(六) 其他營養素以通用單位標示。"}, {"no": "第十五條", "chapter": "第二章 嬰兒與較大嬰兒配方食品營養標示", "content": "嬰兒與較大嬰兒配方食品營養標示值之誤差允許範圍應符合附表四之規定。"}, {"no": "第十六條", "chapter": "第三章 特定疾病配方食品營養標示", "content": "特定疾病配方食品之營養標示項目，應於包裝或容器外表之明顯處以表格方式由上至下依序提供以下文字記載或內容：\n(一) 營養均衡完整配方食品、營養調整完整配方食品及營養調整補充配方食品：\n1.「營養標示」之標題。\n2.每一份量（或每一份、每份）○公克（或毫升）、本包裝(含)○份。\n3.「每份」、「每100公克（或毫升）」。\n4.熱量。\n5.蛋白質含量。\n6.脂肪、飽和脂肪(酸)、反式脂肪(酸)含量。\n7.碳水化合物、糖、膳食纖維含量。\n8.鈉含量。\n9.其他依食安法第二十二條第一項第十款所訂特定疾病配方食品應加標示事項中之營養素含量；其中乳糖，得列於碳水化合物項下，糖標示之後。\n10.符合第二點營養宣稱定義之營養素含量；出現於「包裝食品營養宣稱應遵行事項」中之宣稱營養素含量；廠商自願標示之其他營養素含量。\n(二) 特殊單素配方食品：\n1.「營養標示」之標題。\n2.每一份量（或每一份、每份）○公克（或毫升）、本包裝(含)○份。\n3.「每份」、「每100公克（或毫升）」。\n4.熱量。\n5.蛋白質含量。\n6.脂肪、飽和脂肪(酸)、反式脂肪(酸)含量。\n7.碳水化合物、糖含量。\n8.鈉含量。\n9.主要訴求之營養素含量。\n10.符合第二點營養宣稱定義之營養素含量；出現於「包裝食品營養宣稱應遵行事項」中之宣稱營養素含量；廠商自願標示之其他營養素含量。"}, {"no": "第十七條", "chapter": "第三章 特定疾病配方食品營養標示", "content": "特定疾病配方食品營養標示之單位，應依下列規定辦理：\n(一) 固體(半固體)以公克或g標示，液體以毫升、mL或ml標示。\n(二) 熱量以大卡、Kcal或kcal標示。\n(三) 蛋白質、脂肪、飽和脂肪(酸)、反式脂肪(酸)、碳水化合物、糖、乳糖、膳食纖維以公克或g標示。\n(四) 胺基酸、脂肪酸總量以公克或毫克、g或mg標示。\n(五) 鈉、膽固醇以毫克或mg標示。\n(六) 維生素、礦物質之單位以附表一規定標示。\n(七) 其他營養素以通用單位標示。"}, {"no": "第十八條", "chapter": "第三章 特定疾病配方食品營養標示", "content": "特定疾病配方食品營養標示值之誤差允許範圍應符合附表五之規定。"}, {"no": "附表一", "chapter": "附表", "content": "附表一　每日熱量及各項營養素攝取參考值\n<div class=\"reg-table-block\"><p><strong>附表一　每日熱量及各項營養素攝取參考值</strong></p>\n<div class=\"table-scroll\"><table class=\"annex-table\" border=\"1\">\n<thead><tr><th>項目</th><th>四歲以上</th><th>一歲至三歲</th><th>孕乳婦</th></tr></thead>\n<tbody>\n<tr><td>熱量</td><td>2000 大卡</td><td>1200 大卡</td><td>2200 大卡</td></tr>\n<tr><td>蛋白質</td><td>60 公克</td><td>20 公克</td><td>65 公克</td></tr>\n<tr><td>脂肪</td><td>60 公克</td><td>＊</td><td>65 公克</td></tr>\n<tr><td>碳水化合物</td><td>300 公克</td><td>＊</td><td>330 公克</td></tr>\n<tr><td>鈉</td><td>2000 毫克</td><td>1200 毫克</td><td>2000 毫克</td></tr>\n<tr><td>飽和脂肪</td><td>18 公克</td><td>＊</td><td>18 公克</td></tr>\n<tr><td>膽固醇</td><td>300 毫克</td><td>＊</td><td>300 毫克</td></tr>\n<tr><td>膳食纖維</td><td>25 公克</td><td>15 公克</td><td>30 公克</td></tr>\n<tr><td>維生素A</td><td>700 微克RE</td><td>400 微克RE</td><td>600 微克RE</td></tr>\n<tr><td>維生素B1</td><td>1.4 毫克</td><td>0.6 毫克</td><td>1.1 毫克</td></tr>\n<tr><td>維生素B2</td><td>1.6 毫克</td><td>0.7 毫克</td><td>1.2 毫克</td></tr>\n<tr><td>維生素B6</td><td>1.6 毫克</td><td>0.5 毫克</td><td>1.9 毫克</td></tr>\n<tr><td>維生素B12</td><td>2.4 微克</td><td>0.9 微克</td><td>2.6 微克</td></tr>\n<tr><td>維生素C</td><td>100 毫克</td><td>40 毫克</td><td>110 毫克</td></tr>\n<tr><td>維生素D</td><td>10 微克</td><td>5 微克</td><td>10 微克</td></tr>\n<tr><td>維生素E</td><td>13 毫克α-TE</td><td>5 毫克α-TE</td><td>14 毫克α-TE</td></tr>\n<tr><td>維生素K</td><td>120 微克</td><td>30 微克</td><td>90 微克</td></tr>\n<tr><td>菸鹼素</td><td>18 毫克NE</td><td>9 毫克NE</td><td>16 毫克NE</td></tr>\n<tr><td>葉酸</td><td>400 微克</td><td>170 微克</td><td>600 微克</td></tr>\n<tr><td>泛酸</td><td>5 毫克</td><td>2 毫克</td><td>6 毫克</td></tr>\n<tr><td>生物素</td><td>30 微克</td><td>9 微克</td><td>30 微克</td></tr>\n<tr><td>膽素</td><td>500 毫克</td><td>180 毫克</td><td>410 毫克</td></tr>\n<tr><td>鈣</td><td>1200 毫克</td><td>500 毫克</td><td>1000 毫克</td></tr>\n<tr><td>磷</td><td>1000 毫克</td><td>400 毫克</td><td>800 毫克</td></tr>\n<tr><td>鐵</td><td>15 毫克</td><td>10 毫克</td><td>45 毫克</td></tr>\n<tr><td>碘</td><td>140 微克</td><td>65 微克</td><td>200 微克</td></tr>\n<tr><td>鎂</td><td>390 毫克</td><td>80 毫克</td><td>355 毫克</td></tr>\n<tr><td>鋅</td><td>15 毫克</td><td>5 毫克</td><td>15 毫克</td></tr>\n<tr><td>氟</td><td>3 毫克</td><td>0.7 毫克</td><td>3 毫克</td></tr>\n<tr><td>硒</td><td>55 微克</td><td>20 微克</td><td>60 微克</td></tr>\n</tbody></table></div>\n<p>＊參考值未訂定<br>\n註1：RE（Retinol Equivalent）即視網醇當量。1 g RE = 1 g 視網醇 = 6 g β-胡蘿蔔素<br>\n註2：α-TE（α-Tocopherol Equivalent）即生育醇當量。1 mg α-TE = 1 mg α-Tocopherol<br>\n註3：NE（Niacin Equivalent）即菸鹼素當量。1 mg NE = 60 mg tryptophan<br>\n註4：公克得以 g 標示，毫克得以 mg 標示，微克得以 μg 標示。</p></div>"}, {"no": "附表二", "chapter": "附表", "content": "附表二　熱量及營養素得以「０」標示之條件\n<div class=\"reg-table-block\"><p><strong>附表二　熱量及營養素得以「０」標示之條件</strong></p>\n<div class=\"table-scroll\"><table class=\"annex-table\" border=\"1\">\n<thead><tr><th>項目</th><th>每份及每100公克（或毫升）</th></tr></thead>\n<tbody>\n<tr><td>熱量</td><td>不超過4大卡，且碳水化合物、糖、蛋白質、脂肪、反式脂肪、飽和脂肪含量皆符合得以「０」標示之條件</td></tr>\n<tr><td>蛋白質</td><td rowspan=\"3\">該營養素量不超過0.5公克</td></tr>\n<tr><td>脂肪</td></tr>\n<tr><td>碳水化合物</td></tr>\n<tr><td>鈉</td><td>不超過5毫克</td></tr>\n<tr><td>飽和脂肪</td><td>不超過0.1公克</td></tr>\n<tr><td>反式脂肪</td><td>總脂肪不超過1.0公克；或反式脂肪量不超過0.3公克</td></tr>\n<tr><td>糖</td><td>不超過0.5公克</td></tr>\n</tbody></table></div>\n<p>註1：嬰兒與較大嬰兒配方食品標示同時以每100公克（或大卡）及每100毫升為記載者，其每100公克（或大卡）及每100毫升之數值均應符合本表之條件，始得以「０」標示。<br>\n註2：熱量及營養素得以「０」標示之條件，不適用本應遵行事項第十點標示值之誤差允許範圍規定。</p></div>"}, {"no": "附表三", "chapter": "附表", "content": "附表三　營養標示值誤差允許範圍\n<div class=\"reg-table-block\"><p><strong>附表三　營養標示值誤差允許範圍</strong></p>\n<div class=\"table-scroll\"><table class=\"annex-table\" border=\"1\">\n<thead><tr><th>項目</th><th>誤差允許範圍</th></tr></thead>\n<tbody>\n<tr><td>蛋白質、碳水化合物</td><td>標示值之80%～120%（食品型態屬膠囊錠狀者標示值之120%）</td></tr>\n<tr><td>熱量、脂肪、飽和脂肪、反式脂肪、膽固醇、鈉、糖</td><td>標示值之120%</td></tr>\n<tr><td>胺基酸；維生素（不包括維生素A、維生素D）；礦物質（不包括鈉）；膳食纖維；其他自願標示之營養素</td><td>標示值之80%</td></tr>\n<tr><td>維生素A、維生素D</td><td>標示值之80%～180%</td></tr>\n</tbody></table></div></div>"}, {"no": "附表四", "chapter": "附表", "content": "附表四　嬰兒與較大嬰兒配方食品營養標示值誤差允許範圍\n<div class=\"reg-table-block\"><p><strong>附表四　嬰兒與較大嬰兒配方食品營養標示值誤差允許範圍</strong></p>\n<div class=\"table-scroll\"><table class=\"annex-table\" border=\"1\">\n<thead><tr><th>項目</th><th>誤差允許範圍</th><th>備註</th></tr></thead>\n<tbody>\n<tr><td>蛋白質、碳水化合物、熱量、脂肪、水分、灰分</td><td>標示值之80%～120%</td><td>粉狀食品之水分含量誤差允許範圍應小於或等於標示值之120%。</td></tr>\n<tr><td>飽和脂肪、反式脂肪、膽固醇、糖</td><td>標示值之120%</td><td></td></tr>\n<tr><td>維生素A、D、E、K</td><td>標示值之80%～180%</td><td rowspan=\"3\"></td></tr>\n<tr><td>維生素B1、B2、菸鹼素、維生素B6</td><td>標示值之80%～250%</td></tr>\n<tr><td>維生素C、B12、葉酸、泛酸、生物素</td><td>標示值之80%～300%</td></tr>\n<tr><td>鈉、鉀、氯、鈣、磷、鎂</td><td>標示值之80%～150%</td><td rowspan=\"2\"></td></tr>\n<tr><td>鐵、鋅、銅、錳、硒、碘</td><td>標示值之80%～200%</td></tr>\n<tr><td>胺基酸、多元/單元不飽和脂肪、膳食纖維、膽素、肌醇、左旋肉鹼</td><td>標示值之80%～300%</td><td></td></tr>\n<tr><td>其他營養素</td><td>標示值之80%</td><td>誤差允許範圍上限不得超過原製造廠訂定之營養成分規格上限。</td></tr>\n</tbody></table></div></div>"}, {"no": "附表五", "chapter": "附表", "content": "附表五　特定疾病配方食品營養標示值誤差允許範圍\n<div class=\"reg-table-block\"><p><strong>附表五　特定疾病配方食品營養標示值誤差允許範圍</strong></p>\n<div class=\"table-scroll\"><table class=\"annex-table\" border=\"1\">\n<thead><tr><th>項目</th><th>誤差允許範圍</th></tr></thead>\n<tbody>\n<tr><td>蛋白質、碳水化合物、熱量、脂肪</td><td>標示值之80%～120%</td></tr>\n<tr><td>飽和脂肪、反式脂肪、膽固醇、鈉、糖、乳糖</td><td>標示值之120%</td></tr>\n<tr><td>胺基酸；多元/單元不飽和脂肪；維生素（不包括維生素A、維生素D）；礦物質（不包括鈉）；膳食纖維</td><td>標示值之80%</td></tr>\n<tr><td>維生素A、維生素D</td><td>標示值之80%～180%</td></tr>\n<tr><td>其他營養素</td><td>標示值之80%</td></tr>\n</tbody></table></div></div>"}]});






  
  Object.assign(lawArticles, {
  "即食鮮食散裝食品標示作業指引_20210317": [
    {
      "no": "一、前言",
      "chapter": null,
      "content": "近年來消費型態改變，民眾逐漸趨向於便利商店或超級市場等購買方便之即食鮮食食品食用，為鼓勵相關食品業者於即食鮮食散裝食品包裝上，除依食品安全衛生管理法第二十五條規定標示品名、原產地外，再揭示更多產品資訊，以利消費者作為選購食品之參考，爰訂定本作業指引供食品業者遵循。"
    },
    {
      "no": "二、適用對象",
      "chapter": null,
      "content": "即食鮮食散裝食品，惟現場烘焙（烤）食品、現場調理即食食品及未經處理或加工之生鮮水果、蔬菜、家畜、家禽和水產品除外。"
    },
    {
      "no": "三、用詞定義",
      "chapter": null,
      "content": "本作業指引相關用詞定義如下：\n（一）即食鮮食食品：係以0～18℃冷藏之保存方式，可供直接食用或加（復）熱後（非以高溫殺菌為目的之加熱方式）供直接食用之生鮮、調理食品。\n（二）即食鮮食散裝食品：符合食品安全衛生管理法施行細則第二十條所稱散裝食品，且為本點第一款定義之食品。"
    },
    {
      "no": "四、標示項目",
      "chapter": null,
      "content": "（一）內容物名稱；其為二種以上混合物時，應分別標明。\n（二）淨重、容量或數量。\n（三）食品添加物名稱；其名稱應使用中央主管機關所定之品名，如為二種以上混合添加物時，應分別標明。\n（四）製造商或負責廠商名稱、電話號碼及地址。\n（五）有效日期。\n（六）其他自願性標示：如保存方法或保存條件、需調理後供食者，其調理方法、營養標示、過敏原警語資訊等。\n前款營養標示，所標示營養素之標示值誤差允許範圍，請業者依附表一辦理；營養標示方式得依「包裝食品正面營養資訊標示作業指引」辦理，或以「QR Code」等電子化方式揭露資訊。\n前項「QR Code」等應以不易磨損之固定標籤或印刷標示，並於QR Code等上方或下方位置，應附有「掃描此處可獲得營養標示資訊」或等同意義字樣，且以可利用市面流通之行動裝置（如智慧型手機）QR Code等讀碼軟體或販售場所供應QR Code讀碼設備，使消費者直接讀取營養標示資訊。"
    },
    {
      "no": "五、標示字體大小",
      "chapter": null,
      "content": "應依照食品安全衛生管理法施行細則第十九條規定辦理。"
    },
    {
      "no": "附表一、營養標示值誤差允許範圍",
      "chapter": null,
      "content": "@@TABLE\n項目||誤差允許範圍\n蛋白質、碳水化合物||標示值之80%～120%\n熱量、脂肪、飽和脂肪、反式脂肪、膽固醇、鈉、糖||≤標示值之120%\n其他標示之營養素||≥標示值之80%\n維生素A、維生素D||標示值之80%～180%\n@@END"
    }
  ]
});
Object.assign(lawArticles, {"降低食品中塑化劑含量之企業指引_201110": [{"no": "壹、前言", "chapter": null, "content": "一、鄰苯二甲酸酯類化合物（phthalic acid esters, PAEs）為常見之塑化劑，具有良好的分散性和黏著性等特性，可增加聚合物材料的延展性和柔軟度，因而廣泛地應用於塑膠製品。研究顯示，部分PAEs會干擾動物內分泌系統，導致生殖、發育和行為異常，長期累積可能會對健康造成影響。\n二、食品中所含之微量塑化劑，多因食品原料遭受環境污染，或於食品生產、加工及貯存過程中，透過塑膠材質設備、容器或包材等之游離溶出，間接污染食品，並非基於食品加工需要而添加者。\n三、針對該種污染物質之管理，應注重預防，而非善後處理，管制措施應針對現況，以及污染源頭；食品企業在此，即扮演著第一線為食品衛生安全把關的主要角色。"}, {"no": "貳、目的", "chapter": null, "content": "本指引係提供業者自訂預防或改善產品受塑化劑污染之品質管理工作時，可參考之監測指標及行動準則，以落實食品企業自主管理之精神，確保食品安全、兼顧產業發展。"}, {"no": "參、國際管理現況", "chapter": null, "content": "一、國際食品法典委員會（Codex）對食品中檢出污染物質之處理原則，係針對污染物含量，與環境或食品中正常背景值比較，分析是否有遭受污染情形，如有偏高且經科學評估證實涉有民眾健康風險者，則依據評估結果決定適當解決方案，包括：\n（一）採取相關管制措施（例如污染食品回收、加工及儲存條件之改善等）。\n（二）考量建立最大限量之必要性。\n（三）當相關措施不足以排除該污染物對健康之危害時，必須考慮給予飲食建議（dietary recommendations）。\n二、歐盟於2007年3月30日公告的2007/19/EC號指令中，針對所有塑膠材質之食品包裝、廚具、餐具，以及用以製作食品之機械及器材等，訂有DEHP等6種塑化劑之遷移限值（Specific migration limit, SML）。\n三、日本則已禁止PVC手套用於食物處理、禁止含DEHP之PVC產品與含油脂類食品接觸，針對塑膠材質食品包裝之DEHP含量則需低於0.1%。\n四、由於高油脂食品較容易導致塑化劑之溶出，故美國FDA僅限高水分食品之包裝材料可使用DEHP作為塑化劑。"}, {"no": "肆、我國管理現況", "chapter": null, "content": "一、食品如經確認係遭人為直接添加塑化劑，即已違反食品衛生管理法第十一條第一項第三款，有關食品或食品添加物，有毒或含有害人體健康之物質或異物者，不得製造、加工、調配、包裝、運送、貯存、販賣、輸入、輸出、作為贈品或公開陳列等規定。\n二、我國已依食品衛生管理法第十條訂定「食品器具容器包裝衛生標準」，針對塑膠材質塑化劑DEHP及DBP，以正庚烷為溶媒，於25℃、1小時之溶出試驗條件下，分別訂有1.5 ppm及0.3 ppm之溶出限量規定，與歐盟相同，並將依國內外使用及管理現況適時修正。所有與食品直接接觸之塑膠材質設備、器具、容器及包材，均應確認是否符合上開衛生標準。\n三、食品良好衛生規範之「參、食品製造業者良好衛生規範」之「八、食品製造業者製程及品質管制」乙節規定，食品製造流程規劃應符合安全衛生原則，避免食品遭受污染，製造過程中所使用之設備、器具及容器，其操作、使用與維護應避免食品遭受污染。"}, {"no": "伍、國人塑化劑每日耐受量（TDI）", "chapter": null, "content": "衛生署發布之塑化劑每人每日耐受量（Tolerable Daily Intake, TDI），如表1。\n（每人每日耐受量（Tolerable Daily Intake, TDI），針對不可食用之污染物所計算出之終身每日攝食無風險劑量，單位為每日每公斤體重之耐受量（毫克）。）<div class=\"reg-table-block\"><div class=\"table-scroll\"><table class=\"annex-table\"><thead><tr><th colspan=\"2\">塑化劑</th><th>每日耐受量<br>（mg/kg bw/day）</th></tr><tr><th>中文名稱</th><th>英文名稱（簡稱）</th><th></th></tr></thead><tbody><tr><td>鄰苯二甲酸二(2-乙基己基)酯</td><td>Di(2-ethylhexyl)phthalate（DEHP）</td><td>0.05</td></tr><tr><td>鄰苯二甲酸二丁酯</td><td>Di-n-butyl phthalate（DBP）</td><td>0.01</td></tr><tr><td>鄰苯二甲酸二異壬酯</td><td>Di-isononyl phthalate（DINP）</td><td>0.15</td></tr><tr><td>鄰苯二甲酸二異癸酯</td><td>Di-isodecyl phthalate（DIDP）</td><td>0.15</td></tr><tr><td>鄰苯二甲酸丁基苯甲酯</td><td>Benzyl butyl phthalate（BBP）</td><td>0.5</td></tr></tbody></table></div></div>"}, {"no": "陸、食品中塑化劑含量背景值", "chapter": null, "content": "截至目前為止，衛生署針對一般食品塑化劑含量之監測結果彙整，如表2。<div class=\"reg-table-block\"><div class=\"table-scroll\"><table class=\"annex-table\"><thead><tr><th>產品類別</th><th>總抽驗件數</th><th>塑化劑種類</th><th>以1 ppm為篩檢值之篩檢結果</th><th>件數</th><th colspan=\"2\">以1 ppm為篩檢值篩檢出者之檢出值範圍百分比（ppm）</th></tr><tr><th></th><th></th><th></th><th></th><th></th><th>90百分位</th><th>98百分位</th></tr></thead><tbody><tr><td rowspan=\"3\">果汁、茶飲、運動飲料</td><td rowspan=\"3\">307</td><td>DEHP</td><td>均未篩檢出</td><td>307</td><td>&lt;1</td><td>&lt;1</td></tr><tr><td>DINP</td><td>均未篩檢出</td><td>307</td><td>&lt;1</td><td>&lt;1</td></tr><tr><td>DBP</td><td>均未篩檢出</td><td>307</td><td>&lt;1</td><td>&lt;1</td></tr><tr><td rowspan=\"5\">果醬、果漿或果凍（甜點）</td><td rowspan=\"5\">74</td><td rowspan=\"2\">DEHP</td><td>未篩檢出</td><td>73</td><td rowspan=\"2\">&lt;1</td><td rowspan=\"2\">&lt;1</td></tr><tr><td>篩檢出</td><td>1</td></tr><tr><td rowspan=\"2\">DINP</td><td>未篩檢出</td><td>72</td><td rowspan=\"2\">&lt;1</td><td rowspan=\"2\">&lt;1</td></tr><tr><td>篩檢出</td><td>2</td></tr><tr><td>DBP</td><td>均未篩檢出</td><td>74</td><td>&lt;1</td><td>&lt;1</td></tr><tr><td rowspan=\"6\">膠囊錠狀粉狀之型態</td><td rowspan=\"6\">417</td><td rowspan=\"2\">DEHP</td><td>未篩檢出</td><td>362</td><td rowspan=\"2\">2.5–3.5</td><td rowspan=\"2\">11.5–12.5</td></tr><tr><td>篩檢出</td><td>55</td></tr><tr><td rowspan=\"2\">DINP</td><td>未篩檢出</td><td>406</td><td rowspan=\"2\">&lt;1</td><td rowspan=\"2\">2.5–3.5</td></tr><tr><td>篩檢出</td><td>11</td></tr><tr><td rowspan=\"2\">DBP</td><td>未篩檢出</td><td>408</td><td rowspan=\"2\">&lt;1</td><td rowspan=\"2\">1.5–2.5</td></tr><tr><td>篩檢出</td><td>9</td></tr><tr><td rowspan=\"3\">高油脂食品（油品、奶油等）</td><td rowspan=\"3\">38</td><td rowspan=\"2\">DEHP</td><td>未篩檢出</td><td>35</td><td rowspan=\"2\">&lt;1</td><td rowspan=\"2\">7.5–8.5</td></tr><tr><td>篩檢出</td><td>3</td></tr><tr><td>DINP</td><td>均未篩檢出</td><td>38</td><td>&lt;1</td><td>&lt;1</td></tr><tr><td>DBP</td><td>均未篩檢出</td><td>38</td><td>&lt;1</td><td>&lt;1</td></tr><tr><td rowspan=\"4\">米麵製品（餅乾、泡麵）</td><td rowspan=\"4\">76</td><td rowspan=\"2\">DEHP</td><td>未篩檢出</td><td>69</td><td rowspan=\"2\">&lt;1</td><td rowspan=\"2\">1.5–2.5</td></tr><tr><td>篩檢出</td><td>7</td></tr><tr><td rowspan=\"2\">DINP</td><td>未篩檢出</td><td>72</td><td rowspan=\"2\">&lt;1</td><td rowspan=\"2\">3.5–4.5</td></tr><tr><td>篩檢出</td><td>4</td></tr><tr><td>DBP</td><td>均未篩檢出</td><td>76</td><td>&lt;1</td><td>&lt;1</td></tr><tr><td rowspan=\"3\">嬰幼兒食品</td><td rowspan=\"3\">16</td><td>DEHP</td><td>均未篩檢出</td><td>16</td><td>&lt;1</td><td>&lt;1</td></tr><tr><td>DINP</td><td>均未篩檢出</td><td>16</td><td>&lt;1</td><td>&lt;1</td></tr><tr><td>DBP</td><td>均未篩檢出</td><td>16</td><td>&lt;1</td><td>&lt;1</td></tr><tr><td rowspan=\"3\">乳製品</td><td rowspan=\"3\">63</td><td>DEHP</td><td>均未篩檢出</td><td>63</td><td>&lt;1</td><td>&lt;1</td></tr><tr><td>DINP</td><td>均未篩檢出</td><td>63</td><td>&lt;1</td><td>&lt;1</td></tr><tr><td>DBP</td><td>均未篩檢出</td><td>63</td><td>&lt;1</td><td>&lt;1</td></tr></tbody></table></div></div>\n※資料來源：行政院衛生署食品藥物管理局研究檢驗組\n※本表檢驗結果係以1 ppm為篩檢值。"}, {"no": "柒、企業監測塑化劑指標值", "chapter": null, "content": "衛生署依據國人塑化劑每人每日耐受量（Tolerable Daily Intake, TDI）及食品中塑化劑含量背景值，倡議企業監測塑化劑指標值，如表3，以提供各界遵循。<div class=\"reg-table-block\"><div class=\"table-scroll\"><table class=\"annex-table\"><thead><tr><th colspan=\"2\">食品類別</th><th>DEHP</th><th>DBP</th><th>DINP</th><th>BBP</th><th>DIDP</th></tr></thead><tbody><tr><td colspan=\"2\">飲料</td><td>1</td><td>0.5</td><td>3</td><td>10</td><td>3</td></tr><tr><td rowspan=\"4\">嬰幼兒食品</td><td>嬰兒奶粉</td><td>0.5</td><td>0.1</td><td>1.5</td><td>5</td><td>1.5</td></tr><tr><td>嬰兒輔助食品</td><td>0.5</td><td>0.1</td><td>1.5</td><td>5</td><td>1.5</td></tr><tr><td>益生菌粉末</td><td>1</td><td>0.2</td><td>3</td><td>10</td><td>3</td></tr><tr><td>維生素</td><td>1</td><td>0.2</td><td>3</td><td>10</td><td>3</td></tr><tr><td colspan=\"2\">膠囊、錠狀食品</td><td>5</td><td>0.6</td><td>9</td><td>30</td><td>9</td></tr><tr><td colspan=\"2\">油脂類</td><td>3</td><td>0.6</td><td>9</td><td>30</td><td>9</td></tr><tr><td>主食類</td><td>米麵製品</td><td>1</td><td>0.3</td><td>3</td><td>10</td><td>3</td></tr><tr><td colspan=\"2\">甜點及其他加工食品</td><td>3</td><td>1</td><td>9</td><td>30</td><td>9</td></tr></tbody></table></div></div>\n備註：\n一、本表中未列之食品類別，暫無建議指標值，惟食品業者仍應自主管理，並可依本指引「第捌節」乙段之管理原則，自訂品管指標，加強預防塑化劑之污染。\n二、本表中各食品類別適用範圍如下：\n1. 飲料：主成分為水，供飲用之產品。\n2. 嬰幼兒食品：供3歲以下嬰幼兒攝食之產品。\n3. 膠囊、錠狀食品：所有膠囊狀及錠狀型態之食品。\n4. 油脂類：動物及植物性食用油脂、乳油（butter）等主成分為油脂之產品。\n5. 主食類：米飯及麵類。\n6. 甜點及其他加工食品：含果凍、果漿、果醬之加工食品。"}, {"no": "捌、企業監測措施", "chapter": null, "content": "一、食品設備、容器及包材：針對與食品直接接觸之塑膠材質設備、器具、容器及包材，應確認是否符合衛生標準，並有相關證明備查。對於塑膠材質設備、器具及容器等之使用期限，亦應考量長期使用或儲存將增加塑化劑溶出風險等之因素，訂定適當之維護保養或更換頻率，並考量以其他材質取代。\n二、食品原料及食品添加物等源頭之生產商/供應商，應先進行塑化劑含量監測試驗，依據自主監測結果，針對不同產品分別訂定品管指標（即該原料或添加物正常之塑化劑含量範圍）。該等監測試驗之頻率及品管指標等資料，應保留供下游業者或衛生機關確認及稽查之參考。\n三、食品業者購買食品原料、食品添加物、半成品及成品等，可要求供應商提供品管監測值等資料，以證明未有其他超過正常背景值之污染情事，作為該等產品允收之依據，相關證明應留存備查。\n四、食品業者於食品之製造、加工、調配、包裝、運送、儲存、販賣、輸入或輸出等過程，應自主管理，避免產品因塑膠材質塑化劑溶出而有間接污染食品之機會，並應確認所生產或販售之產品，符合本指引有關食品之監測指標。\n五、食品業者應擬定防止產品遭人為添加塑化劑之相關管制措施。"}, {"no": "玖、異常處理", "chapter": null, "content": "一、加工食品經檢驗其塑化劑含量超過本指引之監測指標者，業者應立即採取以下異常處理程序：\n（一）清查異常產品之範圍及數量，控管異常產品之出貨/販售，必要時應有產品回收措施。\n（二）就異常產品之原料及製程全面檢視，釐清塑化劑之可能污染原因。\n（三）針對污染原因提出改善方案，並進行測試，確認排除異常或減少產品塑化劑含量至監測指標值以下。\n（四）保留異常處理過程之完整紀錄備查。\n（五）檢討並加強品管抽驗。\n二、通報衛生機關：加工食品經檢驗其塑化劑含量超過本指引之監測指標，且有以下情形時，業者除應依本指引採取異常處理程序外，並應即時向所轄衛生機關通報，及副知衛生署，並於異常處理程序結束後，提送完整報告，由衛生機關錄案列管及備查。\n（一）每日攝取量超過100 g（mL）者之產品，其塑化劑檢出量經計算，超過50% TDI者；或\n（二）每日攝取量少於100 g（mL）者之產品，其塑化劑檢出量經計算，超過10% TDI者。\n三、業者如發現食品、食品原料或食品添加物，其塑化劑含量異常偏高，或有遭人為添加之虞者，除應立即依本指引進行異常通報作業外，並應提出回收計畫，立即針對可疑產品進行下架回收，俟衛生機關調查確認，無危害之虞者，始可重新上架販售。\n四、衛生機關針對企業之異常通報情形應列管備查，必要時得發布相關新聞提醒民眾。"}, {"no": "拾、結語", "chapter": null, "content": "針對食品中可能遭受塑化劑污染之風險管理，衛生署除將食品中塑化劑之含量列為市場監測之例行稽查抽驗項目，進行全食品之背景值監測計畫外，亦將持續修正塑膠類食品包裝及食品容器之規格、衛生標準及使用規範，以期減少由塑膠製品遷移而間接污染食品之機會。\n同時，期望國內企業亦能負起維護食品衛生安全之社會責任，透過自主管理、評估原料、製程及塑膠製品之可能污染途徑，並訂定品質改善計畫，以降低食品中塑化劑之含量；透過政府及企業之共同努力，維護國人飲食安全。"}, {"no": "附錄1", "chapter": "歐盟 2007/19/EC 號指令之 PAEs 用途限制與 SML 標準", "content": "<div class=\"reg-table-block\"><div class=\"table-scroll\"><table class=\"annex-table\"><thead><tr><th>PAEs</th><th>限制用途</th><th>塑膠材料中最大限值</th><th>SML（mg/kg）</th></tr></thead><tbody><tr><td>DEHP</td><td>接觸非脂肪類食物之重複使用材料的塑化劑</td><td>0.1%</td><td>1.5</td></tr><tr><td>DBP</td><td>接觸非脂肪類食物之重複使用材料的塑化劑</td><td>0.05%</td><td>0.3</td></tr><tr><td>BBzP</td><td rowspan=\"3\">1. 重複使用材料中的塑化劑。2. 接觸非脂肪類食物之單次使用材料的塑化劑，91/321/EC指令之嬰幼兒配方及96/5/EC指令之嬰幼兒加工穀物食品除外</td><td>0.1%</td><td>30</td></tr><tr><td>DINP</td><td>0.1%</td><td>9</td></tr><tr><td>DIDP</td><td>0.1%</td><td>9</td></tr><tr><td>DNOP+DNDP</td><td>—</td><td>—</td><td>5</td></tr></tbody></table></div></div>"}]});
  Object.assign(lawArticles, {"降低食品中多環芳香族碳氫化合物含量之作業指引_20210112": [{"no": "壹、前言", "chapter": null, "content": "一、多環芳香族碳氫化合物（polycyclic aromatic hydrocarbons，以下簡稱PAHs）為一群具有數個苯環之化學結構物，係由有機質經不完全燃燒或熱裂解（pyrolysis）反應所生成，環境中之PAHs可能達百種，來源包括森林大火、火山爆發、工業污染及食品加工等。\n二、國際癌症研究中心（IARC）已報告有多種PAHs具致突變性或致癌性，其中以苯(a)駢芘（benzo(a)pyrene，以下簡稱BaP）之致癌性最強，被列為一級致癌物。西元2006年JECFA建議可將BaP作為評估PAHs污染之監測指標。其他亦受關注且具致癌性列屬2B之PAHs，包括苯(a)駢蒽（BaA）、苯(b)苯駢苊（BbF）和chrysene，已被歐盟列屬適合作為監測PAHs之指標物質。\n三、人體暴露於PAHs之來源，除來自空氣及菸品之吸入外，最主要的就是透過食物之攝入。生鮮食品中存在之PAHs多來自空氣及土壤之污染，而加工食品除可能來自食品原料，亦可由加工過程產生。\n四、在食品製造過程中，煙燻、乾燥、烘焙、燒烤等加工製程，則是另一個使PAHs含量增加之主因。由於食品經過上述加工，可賦予其特殊質地、風味或口感，無法逕予禁止該等加工操作，故為了減少自食物暴露過多之PAHs，應優先透過加工操作過程之改善，以收預防重於善後處理之效。"}, {"no": "貳、目的", "chapter": null, "content": "本指引係提供食品產業自訂預防或改善產品受PAHs污染之品質管理工作時，可參考之監測指標及行動準則，以落實食品產業自主管理之精神，確保食品安全、兼顧產業發展。"}, {"no": "參、國際管理現況", "chapter": null, "content": "一、國際食品法典委員會（Codex）對食品中檢出污染物質之處理原則，係對污染物含量與環境或食品中正常背景值比較，分析是否有遭受污染情形，如有偏高且經科學評估證實涉有民眾健康風險者，則依據評估結果決定適當解決方案，包括：\n(一)採取相關管制措施（例如回收受污染食品、改善加工方式或儲存條件管理等）。\n(二)考量有無必要建立食品中之限量。\n(三)當相關措施不足以排除該污染物對健康之危害時，必須考慮給予飲食建議。\n二、針對食品中含有PAHs之管制措施，Codex於西元2009年制定「煙燻食品及直接乾烘食品之多環芳香族碳氫化合物污染減量控制操作規範」，提供源頭生產端業者依據該規範自主檢視，改善其加工操作過程，以減少食品受PAHs污染之風險。\n三、歐盟原於西元2006年公告之1881號指令中，即已針對油脂類、煙燻肉製品、煙燻魚肉製品、煙燻雙殼貝類及嬰兒食品等訂有BaP之限值，於西元2011年又以835號指令更新。依據歐盟最新報告指出，由BaP、BaA、BbF和chrysene之總和所組成之PAH4，更適合做為監測PAHs之指標，故歐盟亦增訂PAH4於食品中之限量標準，並於西元2014年起調降煙燻肉製品、煙燻魚肉製品之標準。歐盟復於西元2015年再度新增可可纖維及其產品、香蕉片、含有植物藥及其製劑之膳食補充劑、含有蜂膠/蜂王漿/螺旋藻或其製劑之膳食補充劑、乾草本植物、除荳蔻和煙燻辣椒外之乾香料等項目之PAHs標準。"}, {"no": "肆、我國管理現況", "chapter": null, "content": "一、本指引自102年起實施迄今，期間未接獲適用疑義；鑒於PAHs於食品製程中之污染風險明確，且各界已瞭解相關污染及減量操作等前提下，遂於107年5月8日訂定之「食品中污染物質及毒素衛生標準」中，定明食品中BaP之限量，並自108年1月1日生效實施。本指引則參採歐盟納入PAH4之規定，以加強食品業者對PAH4風險監控之自主管理。\n二、由於鰹魚乾/柴魚之製程需重複進行煙燻烘乾等程序，導致可能累積較高濃度之PAHs，考量鰹魚乾/柴魚多供作調味用途，攝食量不高，相對經飲食之暴露風險有限；為持續輔導鰹魚乾/柴魚相關業者加強製程品管及尋求更佳之減量操作方式，針對鰹魚乾/柴魚之BaP及PAH4規範，仍列於本指引中，持續加強食品業者自主管理。"}, {"no": "伍、減少PAHs污染食品之操作原則", "chapter": null, "content": "一、一般原則\n(一)食品業者應確認加工、調配或製造之食品原料符合「食品中污染物質及毒素衛生標準」中有關BaP之限量，所含之PAHs亦能符合本指引附件1之監測指標值，以減少可能自原料帶入之污染。\n(二)食品業者應自主檢視產品生產過程之各階段，尤其是煙燻、乾燥等經高溫處理的步驟，所使用之設備、環境、各項加工條件（如熱源、時間、溫度）等，是否易大量產生PAHs，必要時應經實地試驗，以分析結果為依據，調整並確認適當之PAHs減量操作條件。\n(三)食品業者所採取之PAHs減量操作，必須維護其他基本衛生安全條件，例如微生物含量及可能含有其他污染物的風險；至於其他產品價值條件（如外觀、風味、口感、營養成分等），亦可為評價相關減量操作可行性之參考依據。\n(四)食品業者應定期採取監測檢驗工作，以檢視PAHs減量管制措施之成效。\n\n二、煙燻處理之PAHs減量操作原則\n(一)燃料之選擇：如係使用木頭當燃料，必須避免使用經防水、防火或樹脂等化學處理之木頭；松柏類木頭因含高木質素，不建議使用；含水量低之木頭會快速燃燒，亦容易產生較多PAHs。另外，不建議使用木材或植物材料以外之燃料，如柴油、橡膠（廢輪胎）或廢油等。\n(二)煙燻室（間）之設置：\n1. 火源與食材距離越近，食物吸附PAHs粒子之量越多，故應保持火源與食材適當之距離。\n2. 為減少食材油脂滴落而產生更多PAHs，必要時可於火源與食材間加裝有孔的擋板阻隔。\n3. 以間接煙燻取代直接煙燻，將更能顯著降低食物受PAHs之污染。\n4. 使用濾網等設備協助移除燻煙中之顆粒物質，降低可能之PAHs污染。\n5. 應確認有適當之氧氣供應，氧氣不足造成燃燒不完全，或氧氣過多造成溫度太高，均會增加PAHs之生成。應適當調控溫度以降低PAHs之生成量。\n(三)煙燻時間應越短越好。\n(四)食材煙燻後可透過適當清（浸）洗（魚類產品不宜）、去皮（如魚類產品）或刮除表面煙燻處（如：柴魚）等方式，顯著降低PAHs之含量。\n\n三、乾燥處理之PAHs減量操作原則\n(一)透過風吹或日曬等暴露於室外或露天之乾燥法，應避免靠近可能有污染源之區域，例如有燃燒氣體之工業區域、焚化爐、水泥廠或緊鄰交通密集之道路，必要時，可使用有蓋之乾燥器，以減少污染。\n(二)其他透過加熱方式進行乾燥之相關注意事項，得比照煙燻處理者。\n(三)合併脫水及乾燥等操作方式，可增加乾燥效率、減少乾燥時間，間接減少PAHs之污染。\n(四)穀類與油籽（榨油原料）乾燥時，應避免與熱源直接接觸，尤其避免以火源直接乾燥種籽；油品精製過程可透過使用活性碳，以減少PAHs之污染含量。\n(五)可透過監視燃燒氣體中之一氧化碳、火焰溫度或燻煙累積量等，確認燃料是否完全燃燒。\n(六)以間接乾燥取代直接乾燥，能顯著降低PAHs的污染。\n\n四、燒烤處理之PAHs減量操作原則\n比照煙燻及乾燥法之操作重點辦理。"}, {"no": "陸、PAHs監測指標值", "chapter": null, "content": "PAHs指標化學物BaP多數已納入衛生標準強制實施，為強化食品產業自主品管，針對BaP及PAH4之濃度，倡議監測指標值如附件1，以提供食品產業遵循，未來仍將依據科學研究資訊之更新及實務需求，滾動評估修正PAH4之監測指標值或提出其他PAHs之監測指標值。"}, {"no": "柒、異常處理", "chapter": null, "content": "檢驗加工食品之PAHs含量，如超過本指引之監測指標值時，應分別採取以下異常處理措施：\n一、經依附件2之風險評估計算結果，其暴露限值（MOE）10,000以上者：應自行加強產品之品管監測頻率。\n二、經依附件2之風險評估計算結果，其暴露限值（MOE）未達10,000者：應採取以下處理程序：\n(一)清查異常產品之範圍及數量，控管異常產品之出貨/販售，必要時應有產品回收措施。\n(二)就異常產品之原料及製程全面檢視，釐清PAHs之可能污染原因。\n(三)針對污染原因提出改善方案，並進行測試，確認排除異常或減少產品PAHs含量至監測指標值以下。\n(四)保留異常處理過程之完整紀錄備查。\n(五)檢討並加強品管抽驗。"}, {"no": "捌、結語", "chapter": null, "content": "由於PAHs可於多種加工操作過程中產生，屬於加工食品中無法避免之污染物質，故如何降低該等污染物之含量，應為食品業者進行品質安全管制之重點；另外，對於複合多種食品原料之加工食品，其PAHs多來自於原料之污染，故源頭管理（包括原材料之採購驗收等）亦應為管制重點之一。\n本指引提供食品產業界進行產品品質管制及確認製程條件之參考，針對食品原料或產品之安全性所提供之監測指標值，亦可提供食品產業進行自主品管分析之結果是否採取異常處理措施之指標。"}, {"no": "附件1", "chapter": "附件", "content": "PAHs監測指標值（Indicative PAHs values）<div class=\"reg-table-block\"><div class=\"table-scroll\"><table class=\"annex-table\" border=\"1\">\n<thead>\n<tr><th colspan=\"2\">食品類別</th><th>指標值（μg/kg）</th></tr>\n</thead>\n<tbody>\n<tr><td colspan=\"3\" style=\"font-weight:600;background:#f5f5f5\">1. 苯(a)駢芘（Benzo(a)pyrene）</td></tr>\n<tr><td>1.1</td><td>鰹魚乾/柴魚</td><td>30.0</td></tr>\n<tr><td>1.2</td><td>作為食品原料用途之可可豆殼</td><td>3.0</td></tr>\n<tr><td>1.3</td><td>含植物成分或植物萃取之膳食補充品</td><td>10.0 ※(2)</td></tr>\n<tr><td colspan=\"3\" style=\"font-weight:600;background:#f5f5f5\">2. PAH4（苯(a)駢芘、苯(a)駢蒽、苯(b)苯駢苊和chrysene之總和）</td></tr>\n<tr><td colspan=\"3\" style=\"font-weight:600\">2.1 食用油脂</td></tr>\n<tr><td>2.1.1</td><td>直接供食或作為食品加工使用之油脂，不包括可可脂及椰子油</td><td>10.0</td></tr>\n<tr><td>2.1.2</td><td>直接供食或作為食品加工使用之椰子油</td><td>20.0</td></tr>\n<tr><td colspan=\"3\" style=\"font-weight:600\">2.2 蔬果植物類</td></tr>\n<tr><td>2.2.1</td><td>作為食品原料用途之可可豆殼</td><td>15.0</td></tr>\n<tr><td>2.2.2</td><td>除2.2.1外之可可豆及其製品（以可可脂之含量為基準）</td><td>30.0</td></tr>\n<tr><td>2.2.3</td><td>香蕉片</td><td>20.0</td></tr>\n<tr><td>2.2.4</td><td>乾燥香草植物</td><td>50.0</td></tr>\n<tr><td>2.2.5</td><td>乾燥香辛植物，不包括荳蔻和煙燻辣椒屬植物</td><td>50.0</td></tr>\n<tr><td colspan=\"3\" style=\"font-weight:600\">2.3 肉及肉製品</td></tr>\n<tr><td>2.3.1</td><td>煙燻肉及煙燻肉製品</td><td>12.0</td></tr>\n<tr><td>2.3.2</td><td>販賣供最終消費者之燒烤肉及燒烤肉製品</td><td>30.0</td></tr>\n<tr><td colspan=\"3\" style=\"font-weight:600\">2.4 水產動物</td></tr>\n<tr><td>2.4.1</td><td>煙燻或燒烤鯡魚及其罐頭（Sprattus sprattus）；魚體長度≦14公分之煙燻或燒烤波羅地海鯡魚及其罐頭（Clupea harengus membras）</td><td>30.0</td></tr>\n<tr><td>2.4.2</td><td>鰹魚乾/柴魚</td><td>180.0</td></tr>\n<tr><td>2.4.3</td><td>煙燻或燒烤雙殼貝類（不含殼）</td><td>35.0</td></tr>\n<tr><td>2.4.4</td><td>雙殼貝類（新鮮、冷藏或冷凍，不含殼）</td><td>30.0</td></tr>\n<tr><td>2.4.5</td><td>除2.4.1至2.4.4外之煙燻或燒烤魚肉及水產製品（煙燻或燒烤甲殼類適用於附肢及腹部之肌肉；煙燻或燒烤蟹類適用於附肢之肌肉）</td><td>12.0</td></tr>\n<tr><td colspan=\"3\" style=\"font-weight:600\">2.5 嬰幼兒食品</td></tr>\n<tr><td>2.5.1</td><td>嬰兒配方食品及較大嬰兒配方輔助食品</td><td>1.0 ※(9)</td></tr>\n<tr><td>2.5.2</td><td>特殊醫療用途嬰兒配方食品</td><td>1.0 ※(9)</td></tr>\n<tr><td>2.5.3</td><td>嬰幼兒穀物類輔助食品及嬰幼兒副食品</td><td>1.0 ※(9)</td></tr>\n<tr><td colspan=\"3\" style=\"font-weight:600\">2.6 膳食補充品</td></tr>\n<tr><td>2.6.1</td><td>含蜂膠、蜂王乳之膳食補充品</td><td>50.0 ※(9)</td></tr>\n<tr><td>2.6.2</td><td>含螺旋藻之膳食補充品</td><td>50.0 ※(9)</td></tr>\n<tr><td>2.6.3</td><td>含植物成分或植物萃取之膳食補充品</td><td>50.0 ※(2)</td></tr>\n</tbody>\n</table></div>\n<p class=\"table-note\">※(2) 該限量不適用於含有植物油的膳食補充品。作為膳食補充品原料之植物油，其BaP應符合「食品中污染物質及毒素衛生標準」中有關植物油之規定；其PAH4則應符合第2.1.1規定之限量。</p>\n<p class=\"table-note\">※(9) 本指標值適用於販賣之產品。</p>\n<p class=\"table-note\">備註：本表之監測指標值，係供食品產業自主品管監測產品之參考。食品經檢驗PAHs含量之結果，如有超出本表所訂之監測指標值，應另依本指引第柒節，進行暴露限值評估及視評估結果採取適當之異常處理措施。本表未列之食品類別，業者仍可自主管理，依本指引第柒節之風險評估原則，及不同產品之加工屬性，自訂品管指標，預防PAHs之污染。</p></div>"}, {"no": "附件2", "chapter": "附件", "content": "食品中檢出BaP或PAH4之健康風險評估——暴露限值評估模式（Margin of Exposure, MOE）\n\n暴露限值評估模式（MOE）係某物質對動物產生不良反應之劑量與人類膳食攝入量之比值，如該引起不良反應之劑量與人類攝取量越接近，則計算結果（MOE值）越低，代表對健康危害的影響越大。MOE係用以評定其健康風險之關注程度，而非量化風險，可作為釐定風險管理措施的優先順序。\n\n針對具有遺傳毒性或致癌性之物質，可使用基準劑量（BMD）的最低信賴區間下限（BMDL）評估。\n\n計算公式：MOE = BMDL10 ÷ 膳食攝入量\n\n‧ BMDL10：依據歐盟食品安全局（EFSA）所提出之BMDL10，BaP為每日每公斤體重0.07毫克（0.07 mg/kg bw per day）、PAH4為每日每公斤體重0.34毫克（0.34 mg/kg bw per day）；估算時須帶入體重參數計算。\n‧ 膳食攝入量：每人平均每日攝入量，依不同食品之攝取量推估。\n\n評估基準（參考EFSA之評估基準）：\n‧ MOE在10,000以上（含10,000）→低關注等級，加強品管抽驗。\n‧ MOE未達10,000 →採取異常處理措施。"}, {"no": "附件3", "chapter": "附件", "content": "風險評估計算範例\n\n範例1：假設柴魚片每日攝食量為5 g，經檢出含BaP 30 μg/kg、PAH4 150 μg/kg，以60 kg體重成人及20 kg體重兒童為例：\n‧ 膳食攝入量：BaP = 0.030 × 0.005 = 0.00015 mg；PAH4 = 0.150 × 0.005 = 0.00075 mg\n‧ 成人MOE：BaP = (0.07 × 60) ÷ 0.00015 = 28,000；PAH4 = (0.34 × 60) ÷ 0.00075 = 27,200 → MOE均＞10,000，屬低健康危害風險關注程度。\n‧ 兒童MOE：BaP = (0.07 × 20) ÷ 0.00015 = 9,333；PAH4 = (0.34 × 20) ÷ 0.00075 = 9,066 → MOE均＜10,000，故該等產品如係供為幼兒食品用途，應即採取異常處理措施。\n\n範例2：以柴魚片熬煮高湯（20 g柴魚片加入2000 mL高湯），假設柴魚片所含之BaP全部溶入湯水中，每日高湯飲用量250 mL，以20 kg體重兒童為例：\n‧ 膳食攝入量：BaP = (0.030 × 0.020) ÷ 8 = 0.000075 mg；PAH4 = (0.150 × 0.020) ÷ 8 = 0.000375 mg\n‧ 兒童MOE：BaP = (0.07 × 20) ÷ 0.000075 = 18,666；PAH4 = (0.34 × 20) ÷ 0.000375 = 18,133 → MOE均＞10,000，屬低健康危害風險關注程度。\n\n範例3：假設每日食用泡麵3包，泡麵調味包（每包10 g）經檢出BaP 5 μg/kg、PAH4 40 μg/kg，以60 kg體重成人為例：\n‧ 膳食攝入量：BaP = (0.005 × 0.010) × 3 = 0.00015 mg；PAH4 = (0.040 × 0.010) × 3 = 0.0012 mg\n‧ 成人MOE：BaP = (0.07 × 60) ÷ 0.00015 = 28,000；PAH4 = (0.34 × 60) ÷ 0.0012 = 17,000 → MOE均＞10,000，屬低健康危害風險關注程度。"}]});
  Object.assign(lawArticles, {"食品中檢出三聚氰胺之管理指引_20220524": [{"no": "壹、前言及目的", "chapter": null, "content": "一、三聚氰胺（melamine）在工業用途上應用廣泛，也是農藥殺蟲劑賽滅淨（Cyromazine）的代謝產物，有關三聚氰胺之簡介及其毒性，詳參附錄Ι。\n二、三聚氰胺並非可供食用之原料或添加物，依法不得添加於食品中，然食品於正常之製造及加工過程中，亦可能因接觸含三聚氰胺之塑膠材質、農藥使用後於食品中殘留之代謝產物，或飼料中之背景值等間接遷移因素，而使食品含有微量之三聚氰胺。\n三、為使國內針對食品中檢出三聚氰胺之後續管理有一致之認定原則，本指引參考國際組織及各先進國家之管理現況，提出預防及減少食品受三聚氰胺微量污染之指導和自主品管措施，並提出食品中之行動指標值。\n四、針對食品中檢出三聚氰胺且超過行動指標值者，應即採取異常處理措施，調查及釐清異常原因；如非人為添加之違法情事，則應就異常原因加以改善及排除，以確保攝食之安全性並協助區別產品是否有被違法添加三聚氰胺之可能。"}, {"no": "貳、國際之風險評估及管理現況", "chapter": null, "content": "一、國際食品法典委員會（CODEX）已於2010年提出食品中三聚氰胺之限量標準，說明訂定標準並非表示三聚氰胺可合法添加，而是考量製造及加工過程中無法避免之微量遷移，此微量三聚氰胺經風險評估後不會危害民眾健康，因此制定限量以區分背景值及惡意添加之情況；若食品中之三聚氰胺含量超過限值係因殺蟲劑或食品接觸材料之正常遷移量所致，且能提出證明者，可不適用其限值。\n二、歐洲食品安全局（EFSA）於2010年提出科學評估意見，因三聚氰胺可導致尿路產生結晶並引起腎小管損傷，且動物及嬰兒嚴重病例中已有死亡案例，故歐盟降低了三聚氰胺之每人每日耐受量（TDI），並於2012年提出食品中三聚氰胺之限量標準。\n三、美國食品藥品監督管理局（USFDA）在2008年之安全評估，已考量食品接觸材質或消毒殺菌劑中分解出之三聚氰胺可能微量遷移至食品，但正常微量遷移所累積之濃度不至於導致人體健康危害，並依據風險評估計算出嬰兒配方食品及其他食品中不致引起公眾健康問題之三聚氰胺濃度。"}, {"no": "參、我國之管理原則", "chapter": null, "content": "一、三聚氰胺非我國准用之食品原料及添加物，故食品如有檢出三聚氰胺，應先釐清是否來自人為之違法；如查獲係經人為違法添加，則無論添加量多寡，均核屬違反食品安全衛生管理法之規定。\n二、依據「食品良好衛生規範準則」，食品製造流程規劃應符合安全衛生原則，避免食品遭受污染；我國已於2012年依食安法第17條訂定「食品器具容器包裝衛生標準」，針對甲醛-三聚氰胺為合成原料之塑膠（美耐皿材質），規定須以4%醋酸溶液作為溶媒、模擬高溫長時間接觸（95℃、30分鐘）下，其三聚氰胺之溶出限量為2.5 ppm以下。\n三、本指引倡議「食品中檢出三聚氰胺之行動指標值（Action level）」如附表，提供各界遵循，作為食品業者自主管理之參據；食品中如經檢出三聚氰胺超過行動指標值時，業者或衛生機關即應依本指引第伍節採取相關異常處理措施。\n（一）三聚氰胺之行動指標值係參考國際間之風險評估參數、我國相關監測背景值及攝食量等綜合評估後所提出，食品中之三聚氰胺含量如符合行動指標值，則於正常飲食情況下，長期尚不致於有危害人體健康之虞。\n（二）有關本指引所提行動指標值之風險估算，詳參附錄Π。"}, {"no": "附表、食品中檢出三聚氰胺之行動指標值", "chapter": null, "content": "@@TABLE\n食品類別||行動指標值（mg/kg）||備註\n粉狀嬰兒配方食品||1||注1\n液狀嬰兒配方食品||0.15||以液態販售之嬰兒配方食品\n其他食品（嬰兒配方食品除外）||2.5||注2\n@@END\n注1：嬰兒配方食品係指特製之母乳替代品，在採用適當之輔助食品前，單獨食用即可滿足正常足月新生兒至六個月內嬰兒之營養需要。\n注2：因合法使用賽滅淨（cyromazine）作為農藥用途之殘留，且於食品中之三聚氰胺檢出量小於賽滅淨於該類食品之殘留標準者，不適用該行動指標值。"}, {"no": "肆、企業監測品管措施", "chapter": null, "content": "一、減少自食品接觸面遷移三聚氰胺之污染來源：\n（一）食品之製造加工及包裝、販賣等過程中，凡有接觸美耐皿材質者，食品業者應自主管理，確認所接觸之材質是否符合食品器具容器包裝衛生標準中材質及溶出試驗之規定，並做成品管檢驗紀錄。\n（二）應避免以美耐皿材質使用於高溫及高酸性之條件中，因高溫及高酸性條件將提高三聚氰胺溶出之風險。\n（三）應考量塑膠材質設備、器具及容器之使用期限，以及長期使用後因表面磨損、刮傷、缺損或裂口等而增加三聚氰胺溶出之風險，食品業者應訂定適當之維護保養及更換頻率，必要時考量更換其他材質。\n（四）用於食品加工之接觸表面，應儘量避免施用塗料或黏著劑，或應使用不含三聚氰胺成分之塗料或黏著劑。\n二、監控自食品原料殘留之三聚氰胺代謝物：\n（一）廣泛使用於蔬菜害蟲之殺蟲劑賽滅淨（cyromazine），使用後可能於動植物體內被代謝成三聚氰胺；動物飼料中所添加之guanidino acetic acid（GAA）、尿素及雙縮尿素等成分，於餵食後亦可能於動物體內代謝而殘留三聚氰胺。食品業者應先確認原料中賽滅淨之殘留量符合我國所定標準後，始得用以進行後續加工。\n（二）三氯三聚氰胺（trichloromelamine）被部分國家批准作為食品接觸材質之消毒劑，使用過程中亦可能分解為三聚氰胺。食品業者應自源頭管理，瞭解食品原料中可能微量含有之三聚氰胺含量背景值，據以做為品管依據。"}, {"no": "伍、異常處理措施", "chapter": null, "content": "食品業者應依據食安法第七條實施自主管理，如經自主品管檢驗發現食品中之三聚氰胺含量超過本指引所提出之行動指標值，應即採取以下異常處理措施：\n一、調查及釐清異常原因：\n（一）應主動通報所轄衛生機關介入調查，並立即清點異常產品數量、控管異常產品之出貨及販售。\n（二）食品中之三聚氰胺檢驗量如顯著高於行動指標值，應優先調查釐清產品或其原料是否有遭人為添加三聚氰胺。\n二、如經調查確認有人為添加三聚氰胺之情事，則已涉及違反食安法第15條規定，應即啟動相關後續處理措施，且無論後端受影響之食品中檢出濃度為何，均不應再供為販賣。\n三、已確認排除人為添加三聚氰胺之後續處理：\n（一）就異常產品之原料及製程（含接觸材質）全面檢視，釐清三聚氰胺之可能污染原因。\n（二）就可能污染原因提出改善方案，並進行測試，確認排除異常或減少產品三聚氰胺含量至行動指標值以下。\n（三）異常產品得於經改製且確認三聚氰胺含量低於行動指標值以下之前提下，續供販售。\n（四）檢討並加強後續相關品管抽驗措施。\n四、保留完整異常處理過程之紀錄備查；相關紀錄、文件及電子檔案或資料庫，至少應保存5年。\n五、衛生機關應視必要性，透過發布新聞方式說明相關調查結果，以解除社會疑慮。"}, {"no": "陸、結語", "chapter": null, "content": "本指引重申，三聚氰胺並非天然存在於食品中之污染物質，亦非合法之食品原料或添加物，故不得人為的添加於食品中。但由於該物質具有多種工業用途，亦可能透過正常製程下之間接遷移或殘留等途徑，使食品中微量含有三聚氰胺，針對該等無法避免之微量污染，實務上無法逕以零檢出作為管理標的，且國際管理趨勢亦均容忍該等有條件的微量殘留。本指引目的即是針對後者所引起之微量污染，提供管理指引，使有關管理規定更合理且符合風險管理原則，未來並將持續依據最新科學研究資訊，滾動修正我國之相關管理規範。"}, {"no": "附錄Ι、三聚氰胺簡介（用途及毒理）", "chapter": null, "content": "壹、三聚氰胺之用途及食品中之污染來源\n一、三聚氰胺（melamine）是一種有機含氮雜環化合物，學名1,3,5-三嗪-2,4,6-三胺（1,3,5-Triazine-2,4,6-Triamine），簡稱三胺、蜜胺、氰尿酰胺。\n二、三聚氰胺具有多種工業用途，可製造胺基樹脂等塑膠材料，因具有不易著火、耐水、耐熱、耐老化、耐電弧、耐化學腐蝕，有良好的絕緣性能和機械強度，廣泛應用於廚房流理台台面、紡織材料、黏膠劑、美耐皿餐具、過濾材料、紙製品、層壓（Laminate）材料及阻燃劑等；三聚氰胺也是殺蟲劑賽滅淨（Cyromazine）的代謝產物。\n三、三聚氰胺並非可供食用之食品原料，亦非我國或國際間核可之食品添加物，故不得食用或直接添加於食品中。\n四、由於傳統針對食品中蛋白質含量之檢驗方法（凱式定氮法）係以氮含量來推算蛋白質含量，而三聚氰胺為高氮含量之化學物質，故引起不肖業者之利用，2008年查獲奶粉中被違法添加三聚氰胺之事件，引起全球廣泛關注。\n\n貳、三聚氰胺之毒理資訊\n一、國際癌症總署（IARC）將三聚氰胺致癌性歸類為Group 2B（在人類可能致癌），即無充分證據顯示對人類有致癌性，但有充分證據顯示三聚氰胺在特定狀況下（如已有膀胱結石），可在雄性大鼠引發膀胱腫瘤。\n二、三聚氰胺可經由尿液迅速被排泄，於大鼠中之口服LD50為3161 mg/kg bw；動物實驗顯示，高劑量的三聚氰胺將對膀胱產生影響，促使形成膀胱結石，但只有長期及高劑量之暴露，才會出現腎臟毒性。\n三、毒性取決於劑量。由於三聚氰胺具水溶性，人體微量攝入下仍可正常迅速自尿液中排出，WHO評估認為一般消費者對三聚氰胺的接觸風險是低的。\n四、2008年中國受污染乳製品（含嬰兒配方奶粉）中之三聚氰胺含量介於0.09至6196.61 mg/kg間，其膳食暴露量估計為每公斤體重8.6至23.4毫克，約為WHO所提TDI之40-120倍，因而在人體（尤其是嬰兒）引起多起腎臟毒性病例。"}, {"no": "附錄Π、三聚氰胺行動指標值之風險估算", "chapter": null, "content": "壹、國際間訂定標準之風險評估情形\n一、聯合國糧農組織/世界衛生組織聯合食品添加物專家委員會（JECFA）：\n（一）JECFA於2008年，以每公斤體重35毫克之BMDL10除以安全係數200推估三聚氰胺每人每日耐受量（TDI）為每日每公斤體重0.2毫克，適用於所有人群，包括嬰兒。\n（二）三聚氰胺結構類似物氰尿酸（cyanuric acid）之TDI，WHO提出每日每公斤體重1.5毫克，EFSA提出1.3毫克，但如同時暴露於三聚氰胺和氰尿酸，其毒性將較單一物質更大。\n二、美國食品藥品監督管理局（USFDA）：\n（一）USFDA於2008年對嬰兒配方食品以外之食品提出TDI為每日每公斤體重0.63毫克（100倍安全係數）。\n（二）由於嬰兒暴露較成人敏感，且嬰兒配方食品是嬰兒唯一之營養來源，USFDA採用1000倍之安全係數，針對嬰兒之TDI設定為每日每公斤體重0.063毫克。\n三、歐洲食品安全局（EFSA）於2010年調整三聚氰胺之TDI為每日每公斤體重0.2毫克。\n四、加拿大衛生部於2018年引用JECFA之TDI（0.2毫克），下修嬰兒配方食品之三聚氰胺與氰尿酸總和臨時標準自1.0 ppm至0.5 ppm；針對其他含乳及乳成分之食品，則維持臨時標準為2.5 ppm。\n\n貳、我國食品中含三聚氰胺之監測及風險評估情形\n一、我國針對自中、港、澳進口之14種食品號列均逐批查驗三聚氰胺；自103年至109年5月，蒐集並統計共325件產品（含嬰兒配方食品、乳製品、食品原料、添加物、蛋品及休閒食品），其檢驗結果均為未檢出（檢驗偵測極限為0.05 ppm）。\n二、背景值分析結果顯示，一般透過正常微量遷移三聚氰胺至食品中之濃度極低，與過去因人為違法添加所導致之污染濃度相比，具有極大差異。\n三、參考JECFA所提出三聚氰胺之TDI（0.2 mg/kg bw/day），針對初生嬰兒（3公斤）之每日耐受量為0.6毫克；假設嬰兒每日食用120克奶粉（最大哺餵量），若奶粉中含三聚氰胺濃度為1 ppm，則每日暴露0.12毫克，仍遠低於每日耐受量0.6毫克，故行動指標值訂為1 mg/kg（粉狀嬰兒配方食品）具有充分之安全空間。"}]});
  Object.assign(lawArticles, {
    "食品工廠及食品製造場所之場區動線規劃作業指引_20241225": [
    {
        "no": "壹、前言",
        "chapter": "食品製造業者之作業場所動線規劃作業指引",
        "content": "食品作業場所動線規劃是食品製造業者營運管理中至關重要的一環。合理的動線設計可以提高生產效率，減少交叉污染之虞，確保產品的安全性和品質，並提升員工的工作效率與滿意度。\n本指引條列食品作業場所之空間動線規劃步驟，供食品製造業者參考執行。業者在合法且具有效預防交叉污染措施之前提下，可依作業場所實際操作情形自行調整。"
    },
    {
        "no": "貳、適用範圍",
        "chapter": "食品製造業者之作業場所動線規劃作業指引",
        "content": "一、食品工廠\n二、食品製造場所\n三、如涉及其他各目的事業主管機關規範之相關法規，應各自符合其規定。"
    },
    {
        "no": "參、專有名詞定義",
        "chapter": "食品製造業者之作業場所動線規劃作業指引",
        "content": "本作業指引相關名詞定義如下：\n一、食品作業場所：指食品之原材料處理、製造、加工、調配、包裝及貯存場所。\n二、食品製造業者：指從事食品之製造、加工、調配之業者。\n（一）食品工廠：指適用工廠管理輔導法之食品製造業者。\n（二）食品製造場所：指從事食品製造，惟未達工廠管理輔導法所稱工廠，得免辦工廠登記之食品製造業者。\n三、原材料驗收區：指原料及包裝材料進貨時，檢查其包裝及規格等標準之區域。\n四、前處理區：指從事原料清洗、解凍、選別、修整及分切等作業之區域。\n五、加工調理區：指將原料以物理、化學或微生物學等方式處理，改變其形態，以增加保藏性、適口性，或營養價值之區域。\n六、緩衝區：係指為避免交叉污染而設置的區域，用來隔離不同生產階段或原料，確保衛生安全和產品品質。\n七、冷卻暫存區：係指儲存剛經過加熱處理後的產品，使其於安全溫度範圍內冷卻的區域，通常用於防止產品過熱或不當冷卻而影響品質或安全。\n八、內包裝區：指從事與食品直接接觸之內包裝作業區域。\n九、外包裝區：指從事未與食品直接接觸之外包裝作業區域。\n十、四流：人流、氣流、物流及水流。\n十一、人流：指食品作業場所內，食品從業人員作業時的動線方向。\n十二、氣流：指食品作業場所內，氣體的流動方向。\n十三、物流：指食品作業場所內，食品由原材料驗收、製成成品到出貨時的行進方向。\n十四、水流：指食品作業場所內，排放水的流動方向。\n十五、清潔區：指清潔度要求最高之作業區域。\n十六、準清潔區：指清潔度要求次於清潔區之作業區域。\n十七、一般作業區：指清潔度要求次於準清潔區之作業區域。\n十八、非食品處理區：指非處理食品之區域，如辦公室、更衣室及廁所等。\n十九、區隔：指食品作業場所，依場所、時間、空氣流向等條件，予以有形或無形隔離之措施。"

    {
        "no": "肆、食品作業場所動線規劃（一至四）",
        "chapter": "食品製造業者之作業場所動線規劃作業指引",
        "content": "食品工廠及食品製造場所之作業環境，須符合「食品良好衛生規範準則」，且食品工廠尚須符合「設廠標準」之規定前提下，可參考下述步驟，妥適規劃場區動線。\n\n一、區域規劃\n（一）食品作業場所之配置及空間，需視產品製程的步驟加以設置，因此食品業者於規劃食品作業場所前，須確認產品種類及製程，針對作業性質或清潔程度需求不同的場所，應個別設置或有效區隔及管理，包含原材料驗收區、原材料貯存區、前處理區、加工調理區、內外包裝區、成品貯存區及出貨區等。\n（二）針對非食品處理區，包含廢棄物區、人員洗手及消毒區、廁所、辦公室及更衣室等，須事先規劃並依人數、場區大小等條件，妥善分配數量及空間。如設置於食品作業場所內時，應有適當之管制措施或區隔。\n\n二、清潔度區隔\n食品業者確認食品作業場所內所需設置的區域後，將各區域依清潔度高低區隔，清潔度由高至低依序為清潔區、準清潔區及一般作業區。\n\n三、四流動線設計\n（一）四流的動線設計，應避免交叉路線，以單一方向行進為原則。其中，氣流為利用氣體從空氣壓力高往空氣壓力低前進之原理，內包裝區以正壓管制，前處理區則保持負壓，如無法保持正壓及負壓，建議可利用空調出風口及風扇控制空氣流向，使氣流由清潔度高往清潔度低之區域。\n（二）四流的流動應遵守下列方向：\n1.人流：從清潔度高往清潔度低之區域。\n2.氣流：從清潔度高往清潔度低之區域。\n3.水流：從清潔度高往清潔度低之區域。\n4.物流：從清潔度低往清潔度高之區域。不包含廢棄物，廢棄物之動線應避免與食品物流交叉污染。\n\n四、時間區隔方式\n（一）如作業場所空間有限，無法以有形之措施，隔離不同性質的區域，可採無形之區隔方式，如時間區隔。\n（二）時間區隔為藉由時間前後順序或週期性，將相同空間區分為不同作業流程。\n（三）每段作業流程結束後，應澈底清潔；必要時可消毒清潔，以避免交叉污染。\n（四）舉例：\n1.前處理及加工調理流程使用相同之作業場所，可以安排早上為前處理作業，下午為加工調理作業。\n2.前處理及加工調理流程使用相同之作業場所，可以安排每週一、三及五為前處理作業，每週二及四為加工調理作業。"
    },
    {
        "no": "肆、食品作業場所動線規劃（五、範例）",
        "chapter": "食品製造業者之作業場所動線規劃作業指引",
        "content": "五、範例\n\n（一）區域規劃：參考食品常見製程，規劃11區食品處理區及6區非食品處理區，共17區。\n\n食品處理區（共11區）：\n（1）原材料驗收區\n（2）原材料貯存區\n（3）食品添加物貯存區\n（4）前處理區（含原料暫存區）\n（5）加工調理區（含半成品暫存區）\n（6）緩衝區\n（7）冷卻暫存區\n（8）內包裝區（含經清潔或消毒後可直接使用之內包材暫存區）\n（9）外包裝區\n（10）成品貯存區\n（11）出貨區\n\n非食品處理區（共6區）：\n（1）廢棄物區\n（2）人員洗手及消毒區（含浴塵室）\n（3）更衣室\n（4）廁所\n（5）辦公室\n（6）其他：如員工餐廳、宿舍、休息室、檢驗場所等。\n\n（二）清潔度區分（僅針對食品處理區）\n清潔區：內包裝區\n準清潔區：\n（1）加工調理區\n（2）冷卻暫存區（如為即食餐食、液態乳品、高水活性豆類加工食品、高水活性烘焙食品、高水活性麵條、冷藏飲料、高水活性糖果、高水活性水產加工食品、高水活性肉類加工食品、冷藏調理食品等建議提升至清潔區）\n（3）緩衝區\n一般作業區：\n（1）原材料驗收區\n（2）原材料貯存區\n（3）食品添加物貯存區\n（4）前處理區\n（5）外包裝區\n（6）成品貯存區\n（7）出貨區\n\n（三）四流動線設計（範例）\n1.人流：從業人員洗手消毒完畢後，依序從內包裝區、加工調理區往前處理區移動。\n2.氣流：內包裝區以正壓管制，前處理區則保持負壓，或利用空調出風口及風扇控制空氣流向。\n3.水流：作業場所內排水系統之排水流向應由內包裝區、加工調理區流向前處理區，或將每個區域之排水，各自流至廠區外之排水系統。\n4.物流：依製造流程進行，依序從前處理區、加工調理區、內外包裝區、成品貯存區到出貨區。"
    },

        "content": "請以最新版本為準，可至食品藥物管理署網站（https://www.fda.gov.tw）或全國法規資料庫（https://law.moj.gov.tw）查詢。\n\n一、食品法規條文：\n（衛生福利部食品藥物管理署食品藥物消費者專區首頁 > 整合查詢服務 > 食品 > 食品法規查詢 > 食品法規條文查詢）\nhttps://consumer.fda.gov.tw/Law/List.aspx?nodeID=518\n\n二、參考資料查詢：\n（衛生福利部食品藥物管理署首頁 > 業務專區 > 食品 > 食品製造業）\nhttps://www.fda.gov.tw/TC/site.aspx?sid=268"

  Object.assign(lawArticles, {"附錄A 一般試驗法 衛授食字第1131901631號附件(檢驗方法)(全)": [
  {"no": "公告資訊", "chapter": "公告說明", "content": "113年8月15日衛授食字第1131901631號公告修正，並自即日生效。\n本附錄A「一般試驗法」為食品添加物品項規格標準之通用分析方法，共收錄56項試驗法，供各品項在品質規格檢驗時引用。凡正文中載有「依附錄A-X」或「按照附錄A-X」者，均依本附錄規定操作。"},
  {"no": "第1法", "chapter": "化學性限量試驗", "content": "氯化物檢查法：\n本法係檢查檢品中所含氯化物是否超過其規定之限量。此限量通常以Cl計算，並以其重量百分率(%)表示之。\n(1) 檢品溶液及對照溶液之調製：取正文規定量之檢品，置50 mL鈉氏比色管中，加水約30 mL溶解，若呈鹼性時，先用稀硝酸(10%)中和，再加稀硝酸(10%) 6 mL及水使成50 mL，作為檢品溶液。另取正文規定量之0.01 N鹽酸液，加稀硝酸(10%) 6 mL及水使成50 mL作為對照溶液。\n(2) 檢查法：各加硝酸銀試液1 mL，充分搖混，避免日光直接照射，放置5分鐘後，襯以黑色背景，自鈉氏比色管之上方及側面觀察比較之；檢品溶液如起混濁，不得較對照溶液所呈者為濃。"},
  {"no": "第2法", "chapter": "化學性限量試驗", "content": "硫酸鹽檢查法：\n本法係檢查檢品中所含硫酸鹽是否超過其規定之限量。此限量通常以SO4計算，並以其重量百分率(%)表示之。\n(1) 檢品溶液及對照溶液之調製：取正文規定量之檢品，置50 mL鈉氏比色管中，加水約30 mL溶解，若呈鹼性時，先用稀鹽酸(10%)中和，再加稀鹽酸(10%) 1 mL及水使成50 mL，作為檢品溶液。另取正文規定量之0.01 N硫酸液，加稀鹽酸(10%) 1 mL及水使成50 mL，作為對照溶液。\n(2) 檢查法：各加氯化鋇試液2 mL，充分搖混，放置10分鐘後，襯以黑色背景，自鈉氏比色管之上方及側面觀察比較之；檢品溶液如起混濁，不得較對照溶液所呈者為濃。"},
  {"no": "第3法", "chapter": "化學性限量試驗", "content": "乾燥減重檢查法：\n本法係測定檢品在規定條件下乾燥時，所減失水分及揮發性物質之重量，並以其重量百分率(%)表示之。\n取稱量瓶於正文規定之溫度先行乾燥30分鐘，置乾燥器內放冷至室溫後，精確稱定。將檢品混合均勻，如為塊狀或大結晶，應研成直徑2 mm以下之細粒，除另有規定外，取1～2 g至前述稱量瓶中再精確稱定。輕輕振搖，使檢品均勻平舖於瓶底，厚度不宜超過5 mm。將稱量瓶置於適當之烘箱或乾燥器內，取下瓶蓋置於瓶旁，按照正文規定之溫度及時間乾燥之。\n如檢品在低於乾燥減重所規定之溫度即行熔融時，應先將檢品以低於其熔點5～10℃之溫度乾燥1～2小時，再於規定溫度乾燥之。"},
  {"no": "第4法", "chapter": "化學性限量試驗", "content": "熾灼殘渣檢查法：\n本法係測定檢品在加硫酸熾灼後，所殘留物質之重量，並以其重量百分率(%)表示之。\n先將白金、石英或瓷製坩鍋，按照正文規定之熾灼條件下熾灼約30分鐘，置乾燥器內放冷後，精確稱定。除另有規定外，取1～2 g至前述坩鍋中精確稱定。以少量之硫酸濕潤後，徐徐加熱，儘量以低溫使充分碳化後，放冷，再加硫酸1 mL，徐徐加熱至不再發生硫酸白煙，移入電氣爐中，除另有規定外，繼以450～550℃熾灼3小時，使完全灰化，於乾燥器中放冷後，精確稱定其重量。如所得之殘渣超過規定量時，應再加硫酸1 mL濕潤，如前操作，熾灼至恆量。"},
  {"no": "第5法", "chapter": "化學性限量試驗", "content": "熾灼減重檢查法：\n本法係測定檢品在規定條件下熾灼時，所減失水分及其他不純物之重量，並以其重量百分率(%)表示之。\n先將白金、石英或瓷製坩鍋，按照正文規定之熾灼條件下熾灼約30分鐘，置乾燥器內放冷後，精確稱定。除另有規定外，取1～2 g置前述坩鍋中再精確稱定。移入電氣爐中，除另有規定外，以450～550℃熾灼3小時，於乾燥器中放冷後，精確稱定其重量。"},
  {"no": "第6法", "chapter": "化學性限量試驗", "content": "易碳化物檢查法：\n本法係檢查檢品中所含易為硫酸所碳化而呈色之微量不純物是否超過其規定之限量，並與規定比合液比較之。\n除另有規定外，檢品如為固體，先將濃度為94.5～95.5%之硫酸5 mL置試管中，再將研成細粉之檢品按照正文規定之量，分數次加入，以玻璃棒攪拌使完全溶解；檢品如為液體，則先取正文規定量之檢品於試管中，再加入濃度94.5～99.5%之硫酸5 mL混搖之。放置15分鐘後，另取規定之比合液置於同規格之試管中，襯以白色背景，由側面觀察比較之。檢品所呈之色不得較比合液所呈之色為濃。"},
  {"no": "第7法", "chapter": "重金屬限量試驗", "content": "重金屬檢查法：\n本法係檢查檢品中所含重金屬是否超過其規定之限量。此處所稱重金屬係指酸性下遇硫化氫試液即顯色之重金屬物質，其限量以Pb計，並以其重量百萬分率(ppm)表示之。對本試驗有反應的典型元素有鉛、汞、鉍、砷、銻、錫、鎘、銀、銅及鉬等，除第I、II法外，亦可依衛生福利部公告之「重金屬檢驗方法總則」分析。\n第I法（適用於無色物質）：取正文規定量之檢品，置50 mL鈉氏比色管中，加水溶解使成25 mL，用氨試液或稀醋酸(1→20)調整pH至3.0～4.0，加水稀釋至50 mL，作為檢品溶液；另精確量取鉛標準溶液2.0 mL，加稀醋酸(1→20) 2 mL及水至50 mL，作為對照溶液。各加硫化鈉試液2滴，放置5分鐘後，由上方及側面觀察比較；檢品溶液所呈之色不得較對照溶液所呈者為濃。\n第II法（適用於有色物質、固定油、揮發性油等）：取正文規定量之檢品，置石英或瓷製坩堝中，加適量硫酸使檢品潤濕，小火熾灼至充分碳化，冷後加硝酸2 mL及硫酸5滴，小心加熱至不再發生白煙，於450～500℃熾灼灰化。冷後加鹽酸2 mL，置水浴上蒸乾，殘留物以鹽酸3滴潤濕，加熱水10 mL浸漬2分鐘，冷後加酚酞試液1滴，滴加氨試液至呈微紅色，再加水稀釋至25 mL，移入鈉氏比色管中，加稀醋酸(1→20) 2 mL及水使成50 mL，作為檢品溶液。"},
  {"no": "第8法", "chapter": "重金屬限量試驗", "content": "砷檢查法：\n除第I、II法外，亦可依衛生福利部公告之「重金屬檢驗方法總則」分析檢品中砷含量。\n第I法（溴化汞試紙法）：本法係基於砷化氫遇溴化汞試紙作用之呈色反應，限量通常以As2O3計算，以ppm表示之。\nI-1法：取正文規定量之檢品，加水5 mL，加溴酚藍試液1滴，以氨試液或稀鹽酸(10%)中和，移入氣體發生瓶；另精確量取砷標準溶液(As2O3) 1.0 mL作為對照溶液。各加稀鹽酸(1：2) 5 mL及碘化鉀試液5 mL，放置2～3分鐘後，加酸性氯化亞錫試液5 mL，靜置10分鐘，加水至40 mL，投入無砷鋅粒(20號篩) 2 g，立即接裝夾有溴化汞試紙之C、D管，浸入25℃水中至瓶肩部，放置1小時後，取出溴化汞試紙，觀察比較其呈色，檢品溶液所呈之色不得較對照溶液所呈者為深。\nI-2法：取正文規定量之檢品，置白金、石英或瓷製坩鍋中，加2%硝酸鎂乙醇溶液10 mL，燃盡後於450～550℃徐徐加熱灰化，殘渣加鹽酸3 mL，置水浴上加溫溶解，作為檢品溶液。以下按I-1法-(2)操作。\n第II法（二乙基二硫代胺基甲酸銀法）：本法係基於砷化氫與二乙基二硫代胺基甲酸銀作用之呈色反應，限量通常以As計算，以ppm表示。使用125 mL錐形燒瓶裝置，吸收液為二乙基二硫代胺基甲酸銀試液3.0 mL，於525 nm測定吸光度，不得較對照溶液所得者為大。"},
  {"no": "第9法", "chapter": "物理性質測定", "content": "比重測定法：\n比重為物質之質量與其同體積標準之質量比。正文中所稱比重(dt t')係指t'℃之檢品與同體積t℃之蒸餾水在空氣中量之比。除另有規定外，通常採用第I及第II法，若數據前冠約字時，可採用第III法。\n第I法－比重瓶(Pycnometer)法：比重瓶通常為內容量10～100 mL之玻璃容器，附有溫度計之磨砂玻塞、標線及磨砂玻蓋之側管。計算式：dt' t = (W1－W)/(W2－W)。\n第II法－奧氏比重瓶(Sprengel Ostwald Pycnometer)法：通常容量1～10 mL之玻璃製容器，兩端為厚質細管，細管A上有標線C。計算式同第I法。\n第III法－浮比重計(Hydrometer)法：選用刻度範圍與預估檢品比重相當之浮比重計，先用乙醇及乙醚拭淨後，於規定溫度下，比重計靜止時，就檢品彎液面上緣讀取其比重。"},
  {"no": "第10法", "chapter": "物理性質測定", "content": "折光率測定法：\n物質之折光率，係指光線在真空中之速度與在該物質中速度之比，亦等於光線對物質之射入角之正弦與其折角之正弦之比。折光率受光線之波長及溫度不同而改變。折光率nD t係以鈉光之D線(589.0 nm及589.6 nm)為光源，於溫度t℃測定物質對空氣之折光率。\n欲達±0.0001理論之正確度，應使用儀器所附之標準品以校正之。蒸餾水之折光率：20℃時為1.3330，25℃時為1.3325。\n測定法：通常用阿培(Abbe)氏折射計，於正文規定溫度之±0.2℃範圍內測定之。至少量測三次，求其平均值。"},
  {"no": "第11法", "chapter": "物理性質測定", "content": "旋光度測定法：\n多數化學物質或其溶液能使偏極光之平面向左或向右旋轉，此種性質稱為旋光性。其強弱以度數表示，旋光方向以「+」及「－」分別表示右旋及左旋。旋光度係指用特定之單色X於溫度t℃時測得之旋光度。\n比旋光度[α]x t之計算方法：[α]x t = 100α / (l × c)，其中t為測定時之溫度，α為偏極光面旋轉之角度，l為貯液管之內層長(dm)，c為檢品溶液100 mL中所含檢品之g數。\n除另有規定外，通常係於20℃，用光徑長10 cm之貯液管，以鈉光之D線測定之。至少測定5次，求其平均值。"},
  {"no": "第12法", "chapter": "物理性質測定", "content": "熔融溫度測定法：\n固體再溫度增高至某一定溫度時，便融化成液體，此稱為熔融。熔融時之溫度稱為熔融溫度，係指自始熔至全熔間之溫度範圍。\n第I法（適用於易磨成粉末者）：取檢品研成微細粉末，乾燥後裝入硬質玻璃毛細管(內徑0.8～1.2 mm，長約120 mm)內，緊集於管底高約2.5～3.5 mm。傳熱液為聚矽桐油(50～100厘斯)。以每分鐘上升3℃速度繼續加熱，至較預計熔融溫度約低5℃時，調整為每分鐘上升1℃。觀察開始明顯潰縮及完全熔融成透明液體時之溫度，此溫度範圍即為熔融溫度。\n第II法（適用於不易磨成粉末者，如脂肪、脂肪酸、石蠟及蠟等）：傳熱液可用水。將檢品以低溫熔化後吸入兩端開口之毛細管中，使高達約10 mm，一端封閉，於10℃或較低之溫度放置24小時。記錄毛細管內檢品向上浮起時之溫度，即為熔融溫度。"},
  {"no": "第13法", "chapter": "光學分析", "content": "吸光度測定法：\n本法係測定物質對某一特定波長光波之吸收程度。透射率T = I/I0，吸光度A = log(I0/I) = -logT。吸光度(A)與溶液之濃度(c)及光徑長度(l)成比例：A = Kcl。當光徑長度以1 cm、濃度以%(w/v)為單位時，此常數稱為比吸光度(E1%1cm)。\n測定吸光度時，濃度以所得吸光度在0.2～0.7之範圍內為宜。採用分光光度計，光源產生之光線，經單色光器而得單色光，通過裝有檢品溶液之貯液管後，其透射率或吸光度可由光度計測定之。\n測定紫外光範圍(185～380 nm)之吸光度須用石英製貯液管；測定可見光範圍(380～780 nm)之吸光度則可用玻璃製或石英製貯液管。除另有規定外，使用光徑為1 cm之貯液管。\n波長校正：可用汞弧燈或重氫放電管波長校正。吸光度校正：取重鉻酸鉀溶於0.01 N硫酸調配為0.006%(w/v)溶液，其E1%1cm於波長235 nm(最小)、257 nm(最大)、313 nm(最小)及350 nm(最大)分別為125.2、145.6、48.9及107.0。"},
  {"no": "第14法", "chapter": "水分測定", "content": "費氏水分測定法：\n本法係應用費氏試劑滴定檢品中所含之水分，費氏試劑由碘、二氧化硫、吡啶及甲醇所組成。反應：H2O + I2 + SO2 + 3C5H5N → 2(C5H5N+H)I- + C5H5N‧SO3。\n費氏試劑之製備：取甲醇670 mL、吡啶170 mL，混合後加碘125 g，閉封口並放冷；另取吡啶100 mL於冰浴內冷卻，通入乾燥之二氧化硫直至容量達200 mL，徐徐加入已冷卻之碘混合液中。本試劑每mL約相當5 mg之水，使用前1小時內應再行標定。\n力價測定法：(1)微量水分(1%以下)：用酒石酸鈉(Na2C4H4O6‧2H2O) 150-350 mg，F = 0.1566 × W/V。(2)較多量水分(1%以上)：用蒸餾水25～250 mg，F = W/V。\n測定法：直接滴定法：M = S × F（M：水分mg數；S：消耗費氏試劑mL數；F：力價）。逆滴定法：M = (S' × F) - (T × F')。"},
  {"no": "第15法", "chapter": "重金屬限量試驗", "content": "鐵檢查法：\n本法係檢查檢品中所含鐵化合物是否超過其規定之限量，此限量通常以Fe計算，並以重量百萬分率(ppm)表示之。除本法外，亦可依衛生福利部公告之「重金屬檢驗方法總則」分析。\n(1) 檢品溶液及對照溶液之調製：取正文規定量之檢品，置於50 mL鈉氏比色管中，加稀硝酸(10%) 6 mL及水10 mL溶解，再加水使成25 mL，供作檢品溶液。另取正文規定量之鐵標準溶液，置另一鈉氏比色管中，加稀硝酸(10%) 6 mL及水使成25 mL，供作對照溶液。\n(2) 檢查法：各加過硫酸銨0.05 g及硫氰酸銨試液(1 N) 5 mL，振盪混合，觀察比較其呈色，檢品溶液所呈之顏色，不得較對照溶液所呈者為深。"},
  {"no": "第16法", "chapter": "物理性測定", "content": "氣體發生量測定法：\n本法係測定合成膨脹劑所發生氣體量是否符合規定。此規定通常以檢品2 g，應發生氣體量在70 mL以上。\n裝置：包含厚質圓底燒瓶(約300 mL)、75℃水浴、酸液添加漏斗、冷凝管、三向玻璃開關、氣體量管(約300 mL，附1 mL刻度)、水位調節瓶(約400 mL)及溫度計。\n置換溶液：取食鹽約100 g，以水350 mL溶解，加入碳酸氫鈉1 g，繼續加入稀鹽酸(10%)，使液對甲基橙呈酸性反應為止。\n計算公式：Vo(mL) = (V-v) × (P-p)/17._ × 273/(273+t)，其中P為大氣壓(mmHg)，p為t℃時之水蒸氣壓(mmHg)，v為空白試驗值(mL)。"},
  {"no": "第17法", "chapter": "一般鑑別試驗", "content": "一般鑑別試驗法：\n本法係供本檢驗法中單純食品添加物鑑別之用，除另有規定外，試料溶液之濃度約為1%，如檢品係屬數種混合物，則除另有規定外，均不適用。\n收錄鑑別試驗項目包括：亞硝酸鹽、亞硫酸鹽及亞硫氫鹽、鋁鹽、鋅鹽、苯甲酸鹽、銨鹽、氯化物、過氧化物、鉀鹽、鈣鹽、檸檬酸鹽、甘油磷酸鹽、琥珀酸鹽、醋酸鹽、水楊酸鹽、溴化物、溴酸鹽、酒石酸鹽、硝酸鹽、碳酸鹽、碳酸氫鹽、硫氰酸鹽、硫代硫酸鹽、亞鐵鹽、鐵鹽、鐵、銅鹽、鈉鹽、乳酸鹽、鎂鹽、硫酸鹽、磷酸鹽等各項之呈色反應及沉澱反應鑑別試驗。\n各項鑑別試驗係利用特定試液產生特徵之呈色、沉澱或氣體反應，以確認檢品之化學組成。"},
  {"no": "第18法", "chapter": "煤焦色素試驗", "content": "煤焦色素試驗法：\n(1) 水不溶物：取檢品約2 g，加熱水200 mL充分振搖混合後放冷，不溶物濾入已知重量之坩堝型玻璃過濾器(1G4)中，水洗至洗液呈無色，於135℃乾燥3小時後精確稱定。\n(2) 氯化物及硫酸鹽：取檢品約2 g，溶於水約100 mL中，加活性碳10 g振搖混合，靜靜煮沸3分鐘後過濾，所得無色濾液作為檢品溶液。氯化物：精確量取50 mL，加稀硝酸(1→2) 2 mL、0.1 N硝酸銀液10.0 mL及硝基苯5 mL振搖混合，以硫酸鐵銨試液1 mL為指示劑，用0.1 N硫氰酸銨液滴定。NaCl量(%) = (a0-a) × 0.00584 × (200-b)/50 × 100 / 檢品取量(g)。硫酸鹽：精確量取25 mL，加酚酞試液1滴，以氫氧化鈉液(1→500)滴至液呈紅色，以稀鹽酸(1→500)滴至紅色消失，加無水酒精25 mL，再加四羥基醌二鈉‧氯化鉀混合試藥0.4 g溶解，以氯化鋇標準溶液滴定至液呈紫紅色。\n(3) 砷：取檢品0.5 g置坩堝中，加硝酸鎂‧乙醇溶液10 mL，燃盡後450～550℃灰化，殘渣加鹽酸3 mL，按照砷檢查法(附錄A-8)檢查之。\n(4) 重金屬：取檢品2.5 g置坩堝中，加少量硫酸濕潤，450～550℃熾灼3小時，加鹽酸3 mL及水7 mL搖勻，過濾後加水使成50 mL。對鐵(波長248.3 nm)、鉻(357.9 nm)、鋅(213.9 nm)、錳(279.5 nm)用原子吸光分析測定。\n(5) 其他色素：用濾紙層析分析，展開溶媒用正丁醇：1%氨水：無水酒精(6：3：2)，以上昇法展開至15公分，層析圖譜上應為單一斑點。\n(6) 含量測定法：用三氯化鈦法（0.1 N三氯化鈦液滴定）或重量法。"},
  {"no": "第19法", "chapter": "煤焦色素試驗", "content": "煤焦色素鋁麗基試驗法：\n(1) 鹽酸及氨水不溶物：取檢品約2 g，加水20 mL混合後，加鹽酸20 mL充分攪勻，再加熱水300 mL振搖混合，於水浴上加熱30分鐘後，濾入已知重量之坩堝型玻璃過濾器(1G4)中，以1%氨水洗至洗液殆無色，繼以稀鹽酸(1→35) 10 mL洗滌，再以水洗至洗液加硝酸銀試液不再呈白濁反應。於135℃乾燥3小時後精確稱定。\n(2) 水溶性氯化物及水溶性硫酸鹽：取檢品約2 g，加水200 mL振搖混合30分鐘後，過濾，必要時加活性碳脫色，所得無色濾液作為檢品溶液。氯化物及硫酸鹽操作同附錄A-18之對應方法。\n(3) 砷：取檢品0.25 g，按A-18之(3)法操作，但酸性氯化亞錫試液改用10 mL，無砷鋅粉改用4 g。\n(4) 重金屬：取檢品2.5 g，加少量硫酸潤濕，450～550℃熾灼3小時，加鹽酸5 mL及硝酸1 mL充分溶解殘渣，加水使成50 mL，用原子吸光分析法測定鐵(248.3 nm)及鋅(213.9 nm)。\n(5) 鋇：取檢品約1 g，加少量硫酸濕潤，熾灼碳化後，移入灰化爐450～550℃熾灼3小時，加無水碳酸鈉5 g充分混合加熱至熔融，後續以鹽酸溶解，蒸發乾涸，加稀硫酸(1→20) 1 mL混合，放置10分鐘時不得混濁。\n(6) 其他色素及含量測定法：詳見煤焦色素試驗法(附錄A-18)中對應各款操作。"},
  {"no": "第20法", "chapter": "定量分析", "content": "鈣鹽定量法：\n本法係採用乙烯二胺四醋酸二鈉(EDTA)定量鈣含量之方法，分為EDTA直接滴定法(第I法)及加過量EDTA後用醋酸鋅逆滴定法(第II法)。\n第I法：精確量取正文規定之檢品溶液10 mL，加水50 mL、氫氧化鉀溶液(1→10) 10 mL，放置約1分鐘後，以NN試藥約0.1 g為指示劑，立即用0.05 M乙烯二胺四醋酸二鈉液滴定至紅紫色完全消失變成青色為止。\n第II法：精確量取正文規定之檢品溶液20 mL，加0.02 M乙烯二胺四醋酸二鈉液25.0 mL，再加水50 mL及氨‧氯化銨緩衝液(pH 10.7) 5 mL，放置約1分鐘後，以愛麗黑T試液2滴為指示劑，立即用0.02 M醋酸鋅液滴定過量之乙烯二胺四醋酸二鈉，至青色變成紅紫色為止，另作一空白試驗予以校正。"},
  {"no": "第21法", "chapter": "油脂類試驗", "content": "油脂類試驗法：\n(1) 酸價測定法：酸價為中和檢品1 g所需氫氧化鉀之mg數。第I法：取正文規定量之檢品，加乙醇與乙醚等容混合液50 mL，加酚酞試液1 mL，用0.1 N酒精性氫氧化鉀液滴定至液呈淡紅色持續30秒。酸價 = 0.1 N酒精性氫氧化鉀液之消耗量(mL) × 5.611 / 檢品之採取量(g)。第II法：用異丙醇與甲苯之等容混合液，依酸價範圍採取不同量之液狀檢品(0～1：20 g；1～4：10 g；4～15：2.5 g；15～75：0.5 g；75以上：0.1 g)。\n(2) 皂化價測定法：皂化價為中和及皂化檢品1 g中之游離酸及酯所需氫氧化鉀之mg數。精確加0.5 N酒精性氫氧化鉀液20 mL，回流加熱30分鐘，用0.5 N鹽酸液滴定。皂化價 = (a-b) × 28.05 / 檢品之採取量(g)。\n(3) 酯價測定法：酯價 = 皂化價 - 酸價。\n(4) 羥基價測定法：於95～100℃加熱乙醯化1小時後，用0.5 N酒精性氫氧化鉀液滴定。羥基價 = (a-b) × 28.053 / 檢品之採取量(g) + 酸價。\n(5) 氧乙烯含量測定法：以氫碘酸裂解，用0.05 N硫代硫酸鈉液滴定。氧乙烯含量(%) = (B-S) × N × 2.203 × 100 / 檢品之採取量(g)。\n(6) 游離脂肪酸測定法(FFA)：依游離脂肪酸含量範圍(0～100%)採不同採取量(56.4～3.525 g)及氫氧化鈉液濃度(0.1～1.0 N)進行滴定。\n(7) 碘價測定法(Wijs法)：以Wijs溶液(氯化碘‧冰醋酸)25.0 mL加入含冰醋酸：環己烷(1：1) 20 mL之試樣，暗處30分鐘，用0.1 N硫代硫酸鈉液滴定。碘價 = (a-a0) × 12.69 × 當量 / 檢品取量(g)。\n(8) 非皂化物測定法：取檢品5.0 g，加氫氧化鉀‧乙醇溶液回流皂化1小時，以石油醚萃取6次，以0.02 N氫氧化鈉液滴定殘留物中脂肪酸(B)。非皂化物(%) = (A-B) × 100 / 檢品之採取量(g)。"},
  {"no": "第22法", "chapter": "定量分析", "content": "氮測定法：\n下列二法均屬凱氏(Kjeldahl)法，用於有機物中氮含量之測定。\n第I法：精確稱(量)取相當於含氮量約20～30 mg之檢品，置凱氏分解燒瓶中，加硫酸鉀與硫酸銅(10：1)之混合物粉末5.5 g及硫酸20 mL，傾斜45°角徐徐加熱至不再起泡，再提高溫度使沸騰，俟內容液變為藍色透明且瓶內壁已無焦化物質存在後，繼續加熱2小時。冷後加水150 mL，裝配後加氫氧化鈉溶液(2→5) 85 mL，進行蒸餾，餾出液以0.1 N硫酸液25 mL接收，再以0.1 N氫氧化鈉液逆滴定。每mL之0.1 N硫酸液相當於1.4007 mg之氮(N)。\n第II法：精確稱(量)取相當於含氮量約2～3 mg之檢品，加硫酸鉀與硫酸銅(10：1)粉末1 g及硫酸7 mL，必要時追加過氧化氫，繼續加熱至液變藍色透明。冷後加水20 mL，以蒸氣蒸餾法，餾出液以硼酸溶液(1→25) 15 mL接收，再用0.01 N硫酸液滴定，另作空白試驗校正之。每mL之0.01 N硫酸液相當於0.1401 mg之氮(N)。"},
  {"no": "第23法", "chapter": "定量分析", "content": "甲氧基測定法：\n本法採檢品與氫碘酸加熱，所得碘代甲烷以溴氧化生成碘酸，再用硫代硫酸鈉液滴定，以定量甲氧基含量之方法。\n洗淨液：取赤磷(Phosphorus, Red) 1 g，加水100 mL使成懸濁液。\n吸收液：取醋酸鉀15 g，溶於醋酸：醋酸酐(9：1)混合液150 mL中，取此液145 mL加溴5 mL，臨用時調製。\n操作法：取相當於含甲氧基(CH3O：31.03)約6.5 mg之檢品，移入分解燒瓶中，加沸石及氫碘酸約6 mL，連接空氣冷卻管，於150℃油浴中煮沸60分鐘。冷後將J管內容物倒入醋酸鈉溶液(1→5) 10 mL之500 mL共栓三角燒瓶中，逐滴加入甲酸至溴之紅棕色消失後，再多加1 mL甲酸，加碘化鉀3 g及稀硫酸(1→20) 15 mL，以澱粉試液為指示劑，用0.1 N硫代硫酸鈉液滴定游離之碘。每mL之0.1 N硫代硫酸鈉液相當於0.5172 mg之CH3O。"},
  {"no": "第24法", "chapter": "重金屬限量試驗", "content": "鉛試驗法(原子吸光分光光度法)：\n除第I、II法外，亦可依衛生福利部公告之「重金屬檢驗方法總則」分析檢品中鉛含量。\n第I法（火焰原子吸光分光光度法）：取規定量檢品，置白金製或石英製坩堝中，加少量硫酸使濕潤，徐徐加熱充分碳化後，加硫酸1 mL，加熱至不再發生白煙，移入電器爐以450～550℃熾灼完全灰化，殘渣加稀硝酸(1→150)使成10 mL，作為檢品溶液；鉛標準溶液1.0 mL加稀硝酸(1→150)使成10 mL，作為對照溶液。以鉛中空陰極射線管，分析波長283.3 nm，助燃氣體空氣，可燃氣體乙炔，測定吸光度，檢品溶液之吸光度不得較對照溶液者為大。\n第II法（二苯硫腙萃取法）：取檢品1.0 g，加硫酸5 mL及玻璃珠，加熱至焦黑後，小心滴加30%過氧化氫，逐步分解至溶液呈無色或淡黃色，加水10 mL蒸發至冒煙，轉移至分液漏斗作為檢品溶液。以檸檬酸銨試液、羥胺試液、氨試液調鹼性後，加氰化鉀試液，以二苯硫腙萃取液萃取，合併萃取液後加稀硝酸振搖，再加二苯硫腙標準液5.0 mL及銨‧氰化鉀試液4 mL振搖30秒，觀察氯仿層色澤，不得較對照溶液所呈者為深。"},
  {"no": "第25法", "chapter": "物理性質測定", "content": "不溶物檢查法：\n取一定量之檢品，置燒杯中，如無特殊規定，加熱水100 mL溶解之。燒杯覆以錶面玻璃，置水浴上加熱1小時，如有不溶物則用已知重量之熔砂坩堝或古氏坩堝過濾，殘留物用熱水洗淨，並於105～110℃乾燥後稱定之。"},
  {"no": "第26法", "chapter": "物理性質測定", "content": "凝固溫度測定法：\n裝置包括：玻璃製圓筒(A)、檢品容器(硬質玻璃製試管)(B)、標線(C)、冷卻水浴(D)、攪拌棒(E)、附浸線之棒狀溫度計(F)及補助溫度計(G)。\n檢品常溫下為固體時，水浴D裝較凝固溫度低5℃水；如為液體時，水浴D之溫度應較凝固溫度低10～15℃。當檢品之溫度冷卻至較其凝固溫度仍高5℃時，將攪拌棒以每分鐘60～80次之速度上下攪動，每隔30秒記錄檢品之溫度。\n通常溫度上升後，暫時維持不變，記錄其最高溫度；連續四次以上之記錄數值，值差不超過0.2℃時，以其平均值為凝固溫度。若混合物含不純物較多時，以固相及液相延長線之交點為凝固溫度。"},
  {"no": "第27法", "chapter": "物理性質測定", "content": "沸騰溫度及蒸餾範圍測定法：\n除另有規定外，沸騰溫度之下限溫度乃是最初第5滴餾出液餾出時之溫度，上限溫度乃是最後1滴液體從蒸餾瓶底蒸發時之溫度；蒸餾範圍係指於規定之溫度範圍內所蒸餾出之容量。\n第I法（沸騰溫度範圍小於5℃之液體）：使用硬質玻璃製蒸餾瓶(50～60 mL)，量取檢品25 mL，蒸餾之餾出速度：200℃以下者每分鐘4～5 mL，200℃以上者每分鐘3～4 mL。氣壓修正：凡較1大氣壓(760 mmHg)每高2.7 mmHg，應於測定溫度減去0.1℃，每低2.7 mmHg，則加0.1℃。\n第II法（沸騰溫度範圍超過5℃之液體）：使用容積為200 mL之蒸餾瓶，量取檢品100 mL，以下與第I法同樣操作。"},
  {"no": "第28法", "chapter": "香料試驗", "content": "香料試驗法：\n(1) 醇類含量定量法：第I法用乙酐‧醋酸鈉乙醯化，計算乙醯價再換算醇類含量。醇類含量 = 乙醯價 × 醇之分子量 / (561.1 - 0.4204 × 乙醯價)(%)。第II法用乙酐‧吡啶試液，以0.5 N酒精性氫氧化鉀液滴定，醇類含量 = 醇之分子量 × (a-b) × 0.5 × 100 / (檢品採取量(g) × 1000)(%)。\n(2) 醛類或酮類含量定量法：利用醛或酮與鹽酸羥胺(NH2OH‧HCl)反應。第I法：加0.5 N鹽酸羥胺試液50 mL，放置或回流後，游離之酸用0.5 N酒精性氫氧化鉀液滴定。第II法：加鹽酸羥胺試液75 mL，過量之羥胺用0.5 N鹽酸液滴定。\n(3) 酯價測定法：酯價 = (a-b) × 28.053 / 檢品之採取量(g)。\n(4) 酯含量定量法：酯含量 = 酯價 × 酯之分子量 / 561.1(%)。\n(5) 氯化合物檢查法：利用氯化銅之顏色反應，以銅網燃燒，火焰不得呈綠色。\n(6) 皂化價測定法：皂化價 = (a-b) × 28.053 / 檢品之採取量(g)。\n(7) 酸價測定法：取檢品約10 g，加中和酒精約50 mL，用0.1 N氫氧化鉀液滴定。酸價 = 0.1 N氫氧化鉀液之消耗量(mL) × 5.611 / 檢品之採取量(g)。\n(8) 酚類含量定量法：精確量取本品10 mL，置Cassia flask中，加1 N氫氧化鉀液75 mL分三次，振搖混合5分鐘，放置1小時後，測定不溶性之油量(mL)。酚類含量 = 10 × [10－不溶性之油量(mL)](% v/v)。"},
  {"no": "第29法", "chapter": "光學分析", "content": "紅外線吸收光譜測定法：\n本法係利用物質化學構造上一定之性質，使檢品於波數4000～667 cm-1紅外線通過時，依據各波數所測定之吸收能量予以鑑別。紅外線吸收光譜以橫軸為波數，縱軸為穿透率或吸光度所繪製之圖譜。\n儀器精度：吸光度之直線部份介於穿透率20～80%(±1%以下)；穿透率再現性在±0.5%以下；波數再現性：於3000 cm-1附近±5 cm-1以下，1000 cm-1附近±1 cm-1以下。\n檢品調製方式：(1)溴化鉀錠劑法：固體檢品1～2 mg與乾燥溴化鉀100～200 mg研磨混合，於5 mmHg以下真空，加5000～10000 kgs/cm2之壓力成型，5～8分鐘成型後測定。(2)溶液法：固體或液體檢品按規定溶媒溶解，注入貯液槽中測定，一般貯液槽之厚度為0.1 mm或0.5 mm。(3)糊狀(Paste)法：固體檢品磨成細粒，與IR用之蠟油研磨混合，夾在二片光窗間測定。(4)液膜法：液體檢品1～2滴夾在二片光窗間，於光窗間生成液層測定。(5)薄膜法：用溶媒溶解，塗抹光窗上，以熱風除去溶媒後測定。(6)氣體檢品測定法：於預先排氣之5～10 cm長氣體槽中，將檢品壓入測定之。"},
  {"no": "第30法", "chapter": "黏度測定", "content": "羧甲基纖維素鈉黏度測定法：\n使用Brookfield粘度計(型號LVG)或同類型粘度計，測定羧甲基纖維素鈉之粘度於25℃之測定範圍為25至10000 cps。\n轉軸與轉速對照（粘度範圍 / 轉軸號碼 / 轉速 / 係數）：10-100 cps / No.1 / 60 rpm / 1；100-200 cps / No.1 / 30 rpm / 2；200-1000 cps / No.2 / 30 rpm / 10；1000-4000 cps / No.3 / 30 rpm / 40；4000-10000 cps / No.4 / 30 rpm / 200。\n測定法：取羧甲基纖維素鈉以乾品計4.8 g，精確稱定，記錄實際重量S g，精確稱取(240-S) g水於檢品容器中，置攪拌器，開始攪拌，慢慢加入檢品並調整轉速約800±100 rpm，完全地混合達2小時後，置於25±0.2℃恆溫中1小時後，以Brookfield粘度計測其粘度，計算粘度(cps) = 讀數 × 係數。"},
  {"no": "第31法", "chapter": "定量分析", "content": "羥丙基測定法：\n使用油浴(可達155℃)、蒸氣發生器、三角燒瓶、Vigreaux管柱及冷凝管組成之裝置。\n取預經105℃乾燥2小時之檢品100 mg，於三角燒瓶中加入三氧化鉻溶液(60→140) 10 mL，通氮氣，使油浴溫度於30分鐘內由室溫升至155℃。蒸餾至收集之餾出液達50 mL，以0.02 N氫氧化鈉液滴定至pH 7，記錄消耗量為Va mL。加入碳酸氫鈉500 mg與稀硫酸試液10 mL，俟CO2氣體停止後，加入碘化鉀1 g，以0.02 N硫代硫酸鈉液滴定生成之碘，記錄消耗量為Ya mL。另作試藥空白試驗記錄Vb與Yb，並以甲基纖維素(不含外來物質) 100 mg作空白記錄Vm與Ym。\n羥丙基含量(mg) = 75.0 × [N1(Va-Vm) - KN2(Ya-Ym)]，其中K = VbN1/YbN2。"},
  {"no": "第32法", "chapter": "黏度測定", "content": "甲基纖維素黏度測定法：\n使用具精密毛細管之粘度計，分為低粘度(15-400 cps，毛細管內徑1.5-3.2 mm)及高粘度(1500-4000 cps，毛細管內徑5.0-6.0 mm)兩型。\n粘度計之校正：用已知粘度之油測定粘度計常數K，K = V/dt（V：檢液之粘度(cps)；K：粘度計常數；d：檢液之比重(20℃/20℃)；t：流出時間(秒)）。\n測定法：製備2%甲基纖維素溶液，記錄檢液於B孔管由上刻度線至下刻度線所需之時間(t)，測得比重(d)，計算粘度：V = Kdt。"},
  {"no": "第33法", "chapter": "重金屬限量試驗", "content": "硒檢查法：\n本法係檢查檢品中所含硒是否超過其規定之限量。此限量通常以Se計算，並以其重量百萬分率(ppm)表示之。\n(1) 檢品溶液及對照溶液之調製：取正文規定量之檢品置於150 mL燒杯中，加4 N鹽酸液25 mL，攪拌並慢慢加熱至沸騰，於蒸氣浴上分解15分鐘後移開熱源，加水25 mL冷卻至室溫，供作檢品溶液。精確量取硒標準溶液2 mL至150 mL燒杯中，加2 N鹽酸液50 mL混合均勻後供作對照溶液。\n(2) 檢查法：各加氨水5 mL，冷後以稀氫氧化銨溶液(1→2)調整pH值至2.0±0.2，各加鹽酸羥胺(Hydroxylamine hydrochloride) 200 mg，立即各加2,3-二胺基萘試液5 mL，混合後靜置100分鐘，移至分液漏斗，加環己烷5 mL萃取激烈震盪2分鐘後分層，將環己烷層移入1 cm貯液管，於380 nm測定其吸光度。當檢品取200 mg時，檢品溶液所得之吸光度不得較對照溶液所得為大。"},
  {"no": "第34法", "chapter": "重金屬限量試驗", "content": "氟化物檢查法：\n第I法（硝酸釷比色分析法）：取正文規定量之檢品，置125 mL蒸餾瓶中，加過氯酸10 mL，加稀硝酸銀溶液2～3滴，加熱蒸餾至135～140℃，收集蒸餾液前100 mL為檢品溶液A，繼續收集50 mL為檢品溶液B。以磺酸茜素鈉溶液(1→1000) 0.1 mL及鹽酸羥胺溶液(1→1000) 1 mL處理後，以稀硝酸釷溶液(1→4000)滴定至淡粉紅色出現；檢品溶液A及B之氟化鈉液之總滴定量不得超過2.5 mL。\n第II法（離子選擇電極A法）：使用緩衝溶液A(醋酸‧氫氧化鉀)、B(檸檬酸鈉‧EDTA)或C(環己烯二四醋酸緩衝液)，配製檢品溶液，以氟離子電極及參考電極量測，計算氟(F)之含量：氟(F)之含量 = [(S×△)-B] × (100/W)，其中△ = V × C/50，V：氟標準溶液取量(mL)，C：氟標準溶液濃度(ppm)，W：檢品重量(g)。\n第III法（離子選擇性電極B法）：以氟化鈉溶液(5 μg F/mL)製作標準曲線，取檢品1.0 g，以電極測定電位差，從標準曲線求得氟化物含量(μg)。\n第IV法（離子選擇性電極C法）：以緩衝溶液稀釋後，用電極法比較氟限值溶液與樣品溶液之電位，樣品溶液之電位不得較氟限值溶液之電位高。"},
  {"no": "第35法", "chapter": "有機溶劑測定", "content": "醇類測定法：\n醇類中之揮發性物質可由氣相層析法加以分離及鑑別，可作為含量測定及純度試驗之用。\n第I法（正丁醇、正丙醇及異丙醇）：精確量取檢品溶液及標準溶液1～5 μL，注入氣相層析儀中，就檢品溶液所得波峰之滯留時間與標準溶液比較鑑別之，並依標準溶液作出檢量線，求出檢品中之含量。\n氣相層析條件：層析管：Chromosorb W (60/80 mesh)上附被有10% P.E.G. 400，內徑6.4 mm，長度1.8 m之玻璃管柱；檢出器：火焰離子檢出器；層析管溫度：90℃；檢出器溫度：150℃；注入器溫度：150℃；移動相氣體氦氣流速：45 mL/min。"},
  {"no": "第36法", "chapter": "定量分析", "content": "揮發性酸測定法：\n裝置：改良式Hortvet-Sellier蒸餾器，U形內管尺寸：38 × 203 mm。\n操作法：取正文規定量之檢品，精確稱定，移入U內管中，將此管放置於已裝有煮沸熱水300 mL之三角燒瓶內，加入4 N過氯酸液10 mL，接裝冷凝管，進行水蒸氣蒸餾。分段收集餾液，每20～25分鐘收集蒸餾液100 mL為一單位，以酚酞試液當指示劑，用0.5 N氫氧化鈉液滴定之，記錄其滴定量(mL)，直到餾液之0.5 N氫氧化鈉液消耗量低於0.5 mL則停止蒸餾。\n計算：揮發性酸含量(mg) = 0.5 N氫氧化鉀液消耗量(mL) × e（e值見正文內規定值）。"},
  {"no": "第37法", "chapter": "有機溶劑測定", "content": "甲醇測定法：\n本法係利用氣相層析法對甲醇之定性及定量。\n(1) 檢品溶液及對照溶液之調製：取檢品10 g置蒸餾瓶中，加水20 mL、氯化鈉2 g、矽油1滴及不含甲醇之乙醇10 mL，於70～80℃徐徐蒸餾，取蒸餾液15 mL，加乙醇使呈50 mL，作為檢品溶液。\n(2) 氣相層析條件：層析管：內徑3～4 mm，長度150～300 cm之不銹鋼或玻璃管柱；填充劑：Chromosorb W，固定相液體為10～25% PEG 400等；層析管溫度：50～70℃；注入器溫度：200℃；檢出器溫度：150～170℃；移動相氣體流量：N2或He，20～40 mL/min。\n標準曲線製作：調配甲醇含量分別為0.01、0.025、0.05、0.1、0.15及0.2%(v/v)之一系列標準溶液，以波峰之面積為縱軸，甲醇濃度為橫軸，反覆3次取平均值作為標準曲線。"},
  {"no": "第38法", "chapter": "有機溶劑測定", "content": "1,4-二氧雜環己烷測定法：\n標準溶液：取1,4-二氧雜環己烷溶於水中，使每mL含100 μg，冷藏保存，每星期新鮮配製。\n使用密閉式真空濃縮裝置，含Chromaflex濃縮管(硼矽酸或石英製玻璃，具10/30接口，精確刻度可定量至0.9 mL以上，可使蒸餾液正確稀釋至2.0 mL)及50 mL圓底燒瓶(具24/40毛玻璃頸口)。\n取檢品約20 g，精確稱定(結晶狀加水2 mL，液狀或蠟狀加水1 mL)，以液態氮冷凍抽真空蒸餾方式收集蒸餾水至少0.9 mL，定容至2.0 mL作為檢品溶液。\n氣相層析條件：層析管：內徑4 mm，長度6尺之玻璃管；填充劑：Chromosorb 104 (80/100或100/120 mesh)；層析管溫度：140℃；注入器溫度：200℃；檢出器溫度：250℃；移動相N2流量：35 mL/min（本層析管須預先以移動相氣體流量每分鐘30～40 mL於250℃調節72小時）。取2～4 μL注入氣相層析儀，其檢品溶液之波峰高度不得超過標準溶液之波峰高度。"},
  {"no": "第39法", "chapter": "定量分析", "content": "海藻酸定量法：\n使用鹼石灰吸著管、水銀活塞、反應燒瓶、電熱包、迴流冷凝管、注入管、捕捉器(含20 mesh之鋅或錫25 g)、吸收塔及250 mL三角瓶等組成之裝置。\n操作法：取預經在60℃減壓乾燥4小時之本品約250 mg，精確稱定，移入反應燒瓶中，加0.1 N鹽酸液25 mL及數粒沸石，以每小時3000～6000 mL之速度抽取不含二氧化碳之空氣，加熱至沸騰並徐徐煮沸2分鐘，放冷15分鐘，注入濃鹽酸23 mL，並加入0.25 N氫氧化鈉液25 mL及正丁醇5滴於吸收塔內，以每小時2000 mL之速度吸進空氣，加熱至沸騰，經2小時後停止。以水15 mL洗滌吸收塔3次，加入10%氯化鋇液10 mL，加酚酞試液，用0.1 N鹽酸液滴定。另作空白試驗，每mL之0.25 N氫氧化鈉液之消耗量相當於5.5 mg之二氧化碳(CO2)，結果以乾重計。"},
  {"no": "第40法", "chapter": "定量分析", "content": "糖醇測定法：\n本法係以高效液相層析法測定乳糖醇製造時所得的乳糖醇及其他糖醇副產品，主要其他糖醇副產品包括sorbitol、mannitol、galactitol (dulcitol)、其他hexitol及glycitols等。\n高效液相層析條件：層析管：Aminex HPX 87 (calcium form)，7.8 ID×300 mm；層析管溫度：85℃；檢出器：折射率檢出器(RI)；移動相：水(脫氣處理)；流速：0.6 mL/min。\n糖醇滯留時間(參考)：lactitol 12 min；ribitol 15 min；erythritol 16 min；mannitol 18 min；galactitol 20 min；sorbitol 21 min。\n取檢品精確稱重配製約40%之檢品溶液，精確量取10 μL注入高效液相層析儀，以波峰面積分別計算乳糖醇及其他糖醇之含量。"},
  {"no": "第41法", "chapter": "定量分析", "content": "還原糖測定法：\n取銅試劑25 mL及乳糖醇15 g於300 mL之燒瓶中，加水25 mL使其溶解，加數粒沸石，加熱約2分鐘內開始沸騰，接上迴流裝置，加熱煮沸正好10分鐘，立刻以水沖冷，5分鐘後，加碘化鉀3 g，再加25%鹽酸20 mL酸化之，振搖直到停止產生氣體後，加2%澱粉1 mL當指示劑，以0.1 N硫代硫酸鈉液滴定直至藍色消失及沈澱物變成乳白色，另以銅試劑25 mL及水25 mL作空白試驗校正之，對照換算表計算還原糖量(以乳糖計)。\n換算表(部分)：0.1 N硫代硫酸鈉液 1 mL = 乳糖3.6 mg；5 mL = 18.4 mg；10 mL = 37.0 mg；15 mL = 56.0 mg；20 mL = 75.7 mg。"},
  {"no": "第42法", "chapter": "物理性質測定", "content": "軟化溫度試驗法：\n本法係將松香或松香衍生物置於特定溫度計球底端，架於恆溫浴中之試管內，偵測其於球底端形成延長欲滴狀時之溫度。\n溫度計：整體浸入式軟化溫度計，溫度範圍為0～250℃，分為10區段，球之長度為15.9±0.8 mm，直徑為6.35±0.4 mm。\n恆溫浴：松香之軟化溫度低於80℃使用水，高於80℃視溫度範圍使用甘油或矽油。以機械攪拌保持均勻溫度。\n檢品溫度計製備：取檢品約20 g，加熱超過軟化點但不超過軟化點以上25～30℃，將已稱重之溫度計底端球加熱後浸入已熔融的檢品中，旋轉使其包在球表面形成薄膜，檢品重約在0.5～0.55 g，置冷至室溫約需15分鐘。\n測定法：觀察溫度計並記錄其軟化點溫度，即檢品開始在球底端形成延長欲滴狀時之溫度。"},
  {"no": "第43法", "chapter": "物理性質測定", "content": "膠強度測定法：\n取本品200 mg，精確稱定，置於瓷製均質機內，加水10 mL，在3500 rpm攪拌均質5分鐘，移入直徑15 mm試管中，在10 mm Hg以下抽出空氣後，在沸騰水浴中精確加熱10分鐘，使形成膠狀，試管立即用流水冷卻10分鐘後於室溫放置30分鐘，從試管取出膠物，除去雙邊，切成10 mm長度切片，用膠強度測定器(Curd Meter)測定。\n計算：膠強度(g/cm2) = W/S × a/100，其中W：掛在彈簧之重量(g)；S：切片之切面面積(cm2)；a：膠裂開點。"},
  {"no": "第44法", "chapter": "定量分析", "content": "粗脂肪測定法：\n裝置：索氏脂肪抽出器(Soxhlet Apparatus)，包括燒瓶(內放沸石，使用前乾燥至恆量)、抽出管(圓筒濾紙)、冷凝管、乙醚蒸氣上昇路及虹吸管。\n取研成粉末之檢品2～10 g，精確稱定，置於圓筒濾紙中，輕塞適量脫脂棉，於100～105℃乾燥2～3小時去除水分後，將圓筒濾紙置入抽出管中，加約1/2燒瓶容量之乙醚，置於60～70℃水浴上，迴流萃取至少8小時後，取出圓筒濾紙，再於水浴上加溫至燒瓶中之乙醚幾乎蒸乾，置於98～100℃烘箱中乾燥至恆量。\n計算：粗脂肪含量(%) = (W-W0)/S × 100，其中W0：放有沸石之燒瓶重量(g)；W：抽出脂肪經乾燥後連燒瓶之重量(g)；S：檢品重量(g)。"},
  {"no": "第45法", "chapter": "定量分析", "content": "二氧化硫測定法：\n本法係檢查檢品中所含二氧化硫是否超過其規定限量。除本法外，亦可依衛生福利部公告之「食品中二氧化硫之檢驗方法」分析。\n裝置：1000 mL三孔圓底蒸餾瓶(A)、125 mL柱狀分離管(B)、30 cm冷凝管(C)、250 mL氣體洗瓶含焦棓酚(D)，8×25 mm U形管含過氧化氫及甲基紅試液(E)。\n測定法：取檢品約100 g，精確稱定，置於300 mL新煮沸且已冷卻之水中，移至圓底蒸餾瓶，加水稀釋至400 mL，加4 N鹽酸溶液90 mL，以氮氣吹著，加熱包加熱迴流約20分鐘達穩定後，繼續加熱迴流約1小時45分鐘，收集U形管中之液體以0.1 N氫氧化鈉液滴定至呈黃色，記錄兩次滴定量之和為S mL，空白試驗記錄B mL。\n計算：二氧化硫(%) = (S-B) × 0.0032 × 100 / W，其中W：檢品重量(g)。"},
  {"no": "第46法", "chapter": "定量分析", "content": "乙醯基(acetyl groups)測定法：\n取檢品約5 g，精確稱定，置於圓底燒瓶中，加水50 mL溶解，加數滴酚酞試液，以0.1 N氫氧化鈉液滴定至呈永久粉紅色。加0.45 N氫氧化鈉溶液25 mL，塞住瓶口，激烈振盪30分鐘後，以0.2 N鹽酸溶液滴定多餘鹼液至粉紅色消失，記錄0.2 N鹽酸之消耗量為S mL。另作空白試驗，記錄消耗量為B mL。\n計算：乙醯基(%) = (B-S) × N × 0.043 × 100/W，其中N：鹽酸溶液之正確當量濃度；W：檢品重量(g)。"},
  {"no": "第47法", "chapter": "有機溶劑測定", "content": "丙氯仲醇(propylene chlorohydrin)測定法：\n本法係測定檢品中所含之丙氯仲醇含量。\n(1) 丙氯仲醇標準溶液之調製：以注射針取丙氯仲醇約25 μL，精確稱重，注入含部份水之500 mL定量瓶中，加水定容至500 mL (使每mL約含丙氯仲醇55 μg)，臨用前配製。\n(2) 檢品溶液之調製：取檢品50.0 g於耐壓瓶中，加2 N硫酸125 mL，加蓋後攪拌均勻，於水浴煮沸10分鐘，振搖均勻後再繼續加熱15分鐘，冷卻至室溫，以25%氫氧化鈉溶液中和至pH 7，過濾，以乙醚50 mL激烈振搖萃取，重複萃取6次，合併乙醚層，於50～55℃水浴濃縮至4 mL，加乙醚定容至5 mL，作為檢品溶液。\n(3) 對照溶液之調製：取未經修飾之糯性玉米澱粉各50 g，分別加入丙氯仲醇配製含0、0.5、1、2及5 ppm之對照溶液。\n(4) 氣相層析條件：固定相10% Carbowax 20 M；層析管溫度110℃；注入器溫度210℃；檢出器溫度240℃；移動相He 25 mL/min，H2 30 mL/min，air 350 mL/min。\n計算：丙氯仲醇含量(ppm) = (C × a) / A，其中C：對照溶液之濃度(ppm)；a：檢品溶液中波峰面積總和；A：對照品溶液中波峰面積總和。"},
  {"no": "第48法", "chapter": "重金屬限量試驗", "content": "錳測定法：\n本法係檢查檢品中所含錳是否超過其規定限量，用原子吸光光度法測定。除本法外，亦可依衛生福利部公告之「重金屬檢驗方法總則」分析。\n(1) 檢品溶液及標準溶液之調製：取檢品10 g，精確稱定，置於預經0.5 N鹽酸溶液潤濕之200 mL定量三角瓶中，加0.5 N鹽酸溶液140 mL，激烈振盪15分鐘後定容至200 mL，離心5分鐘，取澄清液供作檢品溶液。另取錳1.0 g，配製成各含0.5、1.0、1.5及2.0 μg/mL錳之標準溶液。\n(2) 測定：以火焰原子吸光光度法測定，所得值乘以20即為檢品中錳之含量(ppm)。原子吸光分析測定條件：錳中空陰極射線管；測定波長：279.5 nm；助燃性氣體：空氣；可燃性氣體：乙炔。"},
  {"no": "第49法", "chapter": "定量分析", "content": "磷測定法：\n本法係測定檢品中磷之含量。除本法外，亦可依衛生福利部公告之「重金屬檢驗方法總則」分析。\n(1) 磷標準曲線之製作：分別取磷酸鹽標準溶液5.0、10.0及15.0 mL，各依序加硝酸溶液(1→10) 10 mL、0.25%釩酸銨溶液及5%鉬酸銨溶液各10 mL，加水定容至100 mL，放置10分鐘後於波長460 nm測其吸光值。以磷濃度(mg/100 mL)對吸光值製成標準曲線。\n(2) 檢品溶液之調製：取上述處理後之檢品粉末約10 g，於蒸發皿中加10%醋酸鋅溶液10 mL，攪拌均勻後加熱至乾，升溫碳化後於550℃灰化1～2小時，冷卻後加水及硝酸溶解，移入200 mL定量瓶定容，精確量取V mL(含磷量不超過1.5 mg)。\n(3) 測定：於波長460 nm測其吸光值，計算磷含量(ppm) = (A × 200 × 1000) / (V × W)，其中A：對照標準曲線所得含磷含量(mg)；V：取樣體積(mL)；W：檢品重量(g)。"},
  {"no": "第50法", "chapter": "油脂類試驗", "content": "非皂化物測定法（脂質）：\n本法係定脂質中之以鹼不能皂化之脂質。\n取本品5.0 g，置於250 mL燒瓶中，加氫氧化鉀‧乙醇溶液(氫氧化鉀2 g溶於乙醇40 mL)，置迴流冷凝器煮沸1小時使皂化完全後，趁熱移入附蓋之萃取量筒內，燒瓶以溫水及冷水洗至總量為80 mL，再加石油醚50 mL蓋上蓋子激烈萃取1分鐘以上，靜置使分層，分取上層液，各激烈的萃取6次以上，合併萃取液，以10%乙醇25 mL激烈振洗至洗液呈中性，上層液移入已知重量之燒杯，以乙醚10 mL潤洗，移置水浴上蒸乾，置於100℃乾燥箱內烘乾30分鐘，稱重為未校正之非皂化物。\n取殘渣加已中和之溫乙醇50 mL溶解，以0.02 N氫氧化鈉液滴定，每mL相當於5.659 mg之脂肪酸(以油酸計)，將殘渣重量減去脂肪酸重量即為已校正之非皂化物。"},
  {"no": "第51法", "chapter": "重金屬限量試驗", "content": "銅試驗法(原子吸光分光光度法)：\n本法係檢查檢品中所含銅是否超過其規定限量，用原子吸光分光光度法測定，並以重量百萬分率(ppm)表示之。除本法外，亦可依衛生福利部公告之「重金屬檢驗方法總則」分析。\n(1) 檢品溶液及對照溶液之調製：取規定量檢品，置白金製或石英製坩堝中，加少量硫酸使濕潤，徐徐加熱充分碳化後，加硫酸1 mL，加熱至不再生硫酸白煙，移入電器爐以450～550℃熾灼完全灰化，殘渣加稀硝酸(1→150)使成10 mL，作為檢品溶液。另取銅標準溶液1.0 mL，加稀硝酸(1→150)使成10 mL，作為對照溶液。\n(2) 試驗：以火焰原子吸光分光光度法測定，原子吸光分析測定條件：銅中空陰極射線管；測定波長：324.8 nm；助燃性氣體：空氣；可燃性氣體：乙炔。"},
  {"no": "第52法", "chapter": "黏度測定", "content": "Dimethylpolysiloxane黏度測定法：\n使用Ubbelohde黏度計或Cannon-Ubbelohde黏度計(最小流動時間為200秒，黏度單位從300到600 centistokes；No.3型Ubbelohde或No.400型Cannon-Ubbelohde黏度計)，以垂直的支撐架支撐。\n黏度計之校正：使用已知黏度的油測定黏度計黏度常數C，C = cs/t1（cs：黏度(centistokes)；t1：標準液流出時間(秒)）。將黏度計傾斜30°導入足夠量之檢品後回正，在恆溫槽中使檢品恆溫至25±0.2℃後，以指壓封閉第3管，自第2管吸引，移開吸引後精確測量T1段及T2段之時間，記錄時間位數至0.1秒。\n計算：Dimethylpolysiloxane之黏度 = C × t2，其中C：黏度計黏度常數；t2：檢品流出時間。"},
  {"no": "第53法", "chapter": "重金屬限量試驗", "content": "鐵試驗法(原子吸光分光光度法)：\n本法係檢查檢品中所含鐵是否超過其規定限量，用原子吸光分光光度法測定，並以重量百萬分率(ppm)表示之。除本法外，亦可依衛生福利部公告之「重金屬檢驗方法總則」分析。\n(1) 檢品溶液及對照溶液之調製：取規定量檢品，置白金製或石英製坩堝中，加少量硫酸使濕潤，徐徐加熱充分碳化後，加硫酸1 mL，加熱至不再生硫酸白煙，移入電器爐以450～550℃熾灼完全灰化，殘渣加稀硝酸(1→150)使成10 mL，作為檢品溶液。另取鐵標準溶液1.0 mL，加稀硝酸(1→150)使成10 mL，作為對照溶液。\n(2) 試驗：以火焰原子吸光分光光度法測定，原子吸光分析測定條件：鐵中空陰極射線管；測定波長：248.3 nm；助燃性氣體：空氣；可燃性氣體：乙炔。"},
  {"no": "第54法", "chapter": "重金屬限量試驗", "content": "鎘試驗法(原子吸光分光光度法)：\n本法係檢查檢品中所含鎘是否超過其規定限量，用原子吸光分光光度法測定，並以重量百萬分率(ppm)表示之。除本法外，亦可依衛生福利部公告之「重金屬檢驗方法總則」分析。\n(1) 檢品溶液及對照溶液之調製：取規定量檢品，置白金製或石英製坩堝中，加少量硫酸使濕潤，徐徐加熱充分碳化後，加硫酸1 mL，加熱至不再生硫酸白煙，移入電器爐以450～550℃熾灼完全灰化，殘渣加稀硝酸(1→150)使成10 mL，作為檢品溶液。另取鎘標準溶液1.0 mL，加稀硝酸(1→150)使成10 mL，作為對照溶液。\n(2) 試驗：以火焰原子吸光分光光度法測定，操作條件：鎘中空陰極射線管；分析波長：228.8 nm；助燃性氣體：空氣；可燃性氣體：乙炔。"},
  {"no": "第55法", "chapter": "重金屬限量試驗", "content": "鎳試驗法(原子吸光分光光度法)：\n本法係檢查檢品中所含鎳是否超過其規定限量，用原子吸光分光光度法測定，並以重量百萬分率(ppm)表示之。除本法外，亦可依衛生福利部公告之「重金屬檢驗方法總則」分析。\n(1) 檢品溶液及對照溶液之調製：取規定量檢品，置白金製或石英製坩堝中，加少量硫酸使濕潤，徐徐加熱充分碳化後，加硫酸1 mL，加熱至不再生硫酸白煙，移入電器爐以450～550℃熾灼完全灰化，殘渣加稀硝酸(1→150)使成10 mL，作為檢品溶液。另取鎳標準溶液1.0 mL，加稀硝酸(1→150)使成10 mL，作為對照溶液。\n(2) 試驗：以火焰原子吸光分光光度法測定，原子吸光分析測定條件：鎳中空陰極射線管；分析波長：231.6 nm；助燃性氣體：空氣；可燃性氣體：乙炔。"},
  {"no": "第56法", "chapter": "重金屬限量試驗", "content": "鋅試驗法(原子吸光分光光度法)：\n本法係檢查檢品中所含鋅是否超過其規定限量，用原子吸光分光光度法測定，並以重量百萬分率(ppm)表示之。除本法外，亦可依衛生福利部公告之「重金屬檢驗方法總則」分析。\n(1) 檢品溶液及對照溶液之調製：取規定量檢品，置白金製或石英製坩堝中，加少量硫酸使濕潤，徐徐加熱充分碳化後，加硫酸1 mL，加熱至不再生硫酸白煙，移入電器爐以450～550℃熾灼完全灰化，殘渣加稀硝酸(1→150)使成10 mL，作為檢品溶液。另取鋅標準溶液1.0 mL，加稀硝酸(1→150)使成10 mL，作為對照溶液。\n(2) 試驗：以火焰原子吸光分光光度法測定，原子吸光分析測定條件：鋅中空陰極射線管；分析波長：213.9 nm；助燃性氣體：空氣；可燃性氣體：乙炔。"}
]});

Object.assign(lawArticles, {"重金屬檢驗方法總則": [{"no": "1. 適用範圍", "chapter": "適用範圍", "content": "本檢驗方法總則適用於食品中重金屬分析，依元素分析種類、檢體基質、定量極限及實驗室設備等，選擇適當之前處理消化方法及含量測定方法，組合成一個完整之適用分析方法，經方法確效並採相關品質管制規範。\n\n可選用之前處理消化方法：\n- 乾式消化法\n- 酸消化法\n- 微波輔助酸消化法\n- 硫硝酸分解法\n- 氧化鎂灰化法\n- 硫-硝酸還流法\n- 微波輔助硫-硝酸還流法\n\n可選用之含量測定方法：\n- 火焰式原子吸收光譜法(FAAS)\n- 石墨爐式原子吸收光譜法(GFAAS)\n- 感應耦合電漿放射光譜法(ICP-OES)\n- 感應耦合電漿質譜法(ICP-MS)\n- 氫化式-原子吸收光譜法\n- 冷蒸氣-原子吸收光譜法\n- 冷蒸氣-汞原子螢光光譜法\n- 直接進樣汞分析法\n\n以本總則建立之檢驗方法與衛生福利部依衛生標準或特定需求公告之檢驗方法檢驗結果有紛歧時，以後者為準。"}, {"no": "2.1 裝置", "chapter": "檢驗方法", "content": "主要儀器設備包括：\n(1) 火焰式原子吸收光譜儀(Flame atomic absorption spectrophotometer)\n(2) 石墨爐式原子吸收光譜儀(Graphite furnace atomic absorption spectrophotometer)\n(3) 感應耦合電漿放射光譜儀(ICP-OES)\n(4) 感應耦合電漿質譜儀(ICP-MS)\n(5) 氫化物發生裝置(Hydride generator)\n(6) 汞蒸氣發生裝置(Mercury cold vapor generator)\n(7) 汞原子螢光光譜儀\n(8) 直接進樣汞分析儀(Direct mercury analyzer)\n(9) 灰化爐(Furnace)：附有自動溫度調節器\n(10) 電熱板(Hot plate)\n(11) 水浴(Water bath)\n(12) 微波消化器：具溫度或壓力回饋控制系統\n(13) 聚焦式微波消化器：可設定微波輸出功率\n(14) 酸蒸氣清洗裝置\n(15) 攪拌均質機：不鏽鋼，附可拆卸清洗刀具"}, {"no": "2.2 試藥", "chapter": "檢驗方法", "content": "試藥規格要求：\n- 硝酸：試藥特級、低汞級及超純級\n- 鹽酸、硫酸及過氯酸：超純級\n- 正辛醇、草酸銨、氧化鎂、硝酸鎂、碘化鉀、氫氧化鈉、硼氫化鈉、尿素、高錳酸鉀、過氧化氫溶液(30%)、氯化鈉、硫酸羥胺、氯化亞錫及五氧化釩：試藥特級\n- 去離子水：比電阻於25℃可達18 MΩ·cm以上\n\n基質修飾劑：\n- 基質修飾劑Ⅰ：含硝酸鎂1000 μg/mL之溶液\n- 基質修飾劑Ⅱ：含磷酸二氫銨10000 μg/mL及硝酸鎂500 μg/mL之混合溶液\n- 基質修飾劑Ⅲ：含鈀1000 μg/mL及硝酸鎂600 μg/mL之混合溶液\n均採用AA分析級。\n\n對照用標準品（1000 μg/mL）適用範圍：\n- FAAS/GFAAS：鉛、鎘、銅、銻、砷、汞、錫、鋅（AA或ICP分析級）\n- ICP-OES/ICP-MS：鉛、鎘、銅、銻、砷、汞、錫、鋅（ICP分析級）\n- 氫化式-AAS：砷（AA或ICP分析級）\n- 冷蒸氣/直接進樣汞法：汞（AA或ICP分析級）"}, {"no": "2.3 器具及材料", "chapter": "檢驗方法", "content": "器具規格：\n- 容量瓶：25 mL、50 mL、100 mL、200 mL、1000 mL，Pyrex材質\n- 儲存瓶：50 mL，PP材質\n- 坩堝：瓷製、石英玻璃或白金製，附蓋\n- 消化瓶：50 mL，玻璃、PP、Teflon材質或同級品\n- 微波消化瓶：石英玻璃、Teflon材質或同級品\n- 樣品船(Sample boat)：1500 μL，金屬、陶瓷或石英玻璃材質\n- 濾膜：孔徑0.45 μm，Teflon材質\n- 分解瓶(Kjeldahl flask)：500 mL，Pyrex材質\n- 改良式索氏抽出器\n\n器具清洗程序：器具經洗淨後，使用酸蒸氣清洗裝置以硝酸（試藥特級）蒸氣酸洗2小時，或浸於硝酸：水（1:1, v/v）溶液放置過夜，取出以去離子水沖洗乾淨，乾燥備用。"}, {"no": "2.4 試劑調製", "chapter": "檢驗方法", "content": "常用試劑調製方法：\n\n1 N 硝酸溶液：取硝酸（超純級）70 mL，緩緩加入去離子水500 mL中，再加去離子水至1000 mL。\n\n0.1 N 硝酸溶液：取硝酸（超純級）7 mL，同法製備至1000 mL。\n\n1% 硝酸溶液：取硝酸（超純級）15 mL，同法製備至1000 mL。\n\n6 N 鹽酸溶液：取鹽酸500 mL，緩緩加入去離子水300 mL中，再加去離子水至1000 mL。\n\n4 N 鹽酸溶液：取鹽酸334 mL，同法製備至1000 mL。\n\n3 N 鹽酸溶液：取鹽酸250 mL，同法製備至1000 mL。\n\n飽和草酸銨溶液：稱取草酸銨50 g，以去離子水100 mL溶解，再加入草酸銨至無法溶解為止。\n\n40% 碘化鉀溶液：稱取碘化鉀20 g，以去離子水溶解定容至50 mL。\n\n50% 硝酸鎂溶液：稱取硝酸鎂50 g，以去離子水溶解定容至100 mL。\n\n10% 尿素溶液：稱取尿素50 g，以去離子水溶解定容至500 mL。\n\n10% 過氧化氫溶液：取過氧化氫溶液(30%) 33 mL，加去離子水至100 mL。\n\n1% 硼氫化鈉溶液：稱取氫氧化鈉10 g以去離子水500 mL溶解，加入硼氫化鈉10 g，溶解後加去離子水至1000 mL，臨用時調製。\n\n氯化亞錫溶液：取硫酸50 mL加入去離子水300 mL中，冷卻至室溫，加入氯化鈉15 g、硫酸羥胺15 g及氯化亞錫25 g，溶解後加去離子水至500 mL，臨用時調製。\n\n五氧化釩-硫酸溶液：稱取五氧化釩約10 g置坩堝中，200℃加熱24小時後，再以350℃加熱72小時，冷卻後稱取1 g置於硫酸1000 mL中，攪拌溶解備用。"}, {"no": "2.5 標準溶液配製", "chapter": "檢驗方法", "content": "各測定方法之標準溶液配製（均先精確量取各標準品1 mL置50 mL容量瓶中定容後移入儲存瓶，作為標準原液，臨用時再稀釋至所需濃度）：\n\n火焰式原子吸收光譜法(FAAS)：\n以1%硝酸溶液定容；臨用稀釋至1～10 μg/mL。\n\n石墨爐式原子吸收光譜法(GFAAS)：\n以1%硝酸溶液定容；臨用稀釋至10～50 ng/mL。\n\n感應耦合電漿放射光譜法(ICP-OES)：\n以1%硝酸溶液定容；臨用稀釋至10～1000 ng/mL。\n\n感應耦合電漿質譜法(ICP-MS)：\n以1%硝酸溶液定容；臨用稀釋至1～25 ng/mL。\n\n氫化式-原子吸收光譜法：\n以4 N鹽酸溶液定容；臨用稀釋至1～10 ng/mL。\n\n冷蒸氣-原子吸收光譜法：\n以3 N鹽酸溶液定容；臨用稀釋至1～10 ng/mL。\n\n冷蒸氣-汞原子螢光光譜法：\n以0.1 N硝酸溶液定容；臨用稀釋至0.25～1.0 ng/mL。\n\n直接進樣汞分析法：\n精確量取標準品100 μL，以1%硝酸溶液定容；臨用稀釋至10～1000 ng/mL。"}, {"no": "2.6.1 乾式消化法", "chapter": "前處理—消化方法", "content": "適用元素：鉛、鎘、銅及鋅之檢驗。\n\n操作步驟：\n(1) 檢體均質後，取約1～5 g，精確稱定，置於坩堝中。\n(2) 於電熱板加熱碳化至無煙，移入灰化爐，以450℃灰化3～5小時。\n(3) 如灰化不完全，放冷後加硝酸0.5～3 mL，於電熱板加熱乾燥後，再以450℃灰化3～5小時，反覆操作至灰分成白色。\n(4) 放冷後以6 N鹽酸溶液5 mL溶解，再於電熱板蒸乾，加1 N硝酸溶液5 mL加熱溶解。\n(5) 移入25 mL容量瓶中，以1 N硝酸溶液每次5 mL洗滌坩堝及坩堝蓋2次，洗液併入容量瓶。\n(6) 以去離子水定容，經濾膜過濾至儲存瓶，供作檢液。另取空白坩堝依同步驟操作，供作空白檢液。"}, {"no": "2.6.2 酸消化法", "chapter": "前處理—消化方法", "content": "適用元素：鉛、鎘、銅、銻、砷、錫及鋅之檢驗。\n\n操作步驟：\n(1) 檢體均質後，取約1 g，精確稱定，置於消化瓶中。\n(2) 加入硝酸（超純級）10 mL，於電熱板以60℃加熱消化30分鐘，再升溫至95℃加熱消化至澄清。\n(3) 放冷後移入25 mL容量瓶中，以去離子水每次5 mL洗滌消化瓶，洗液併入容量瓶。\n(4) 以去離子水定容，經濾膜過濾至儲存瓶，供作檢液。另取空白消化瓶依同步驟操作，供作空白檢液。"}, {"no": "2.6.3 微波輔助酸消化法", "chapter": "前處理—消化方法", "content": "適用元素：鉛、鎘、銅、銻、砷、汞、錫及鋅之檢驗。\n\n操作步驟：\n(1) 檢體均質後，取約0.2～0.5 g，精確稱定，置於微波消化瓶中。\n(2) 加入硝酸（超純級）10 mL，移入微波消化器。\n(3) 依下列條件消化至澄清：\n   步驟1：輸出功率600 W，升溫10 min，持續10 min，溫度控制180℃，壓力控制40 bar\n   步驟2：輸出功率1000 W，升溫10 min，持續20 min，溫度控制180℃，壓力控制40 bar\n(4) 放冷後移入25 mL容量瓶中，以去離子水每次5 mL洗滌微波消化瓶，洗液併入容量瓶。\n(5) 以去離子水定容，經濾膜過濾至儲存瓶，供作檢液。另取空白微波消化瓶依同步驟操作，供作空白檢液。\n\n（上述消化條件不適時，依所使用之裝置設定適合之消化條件。）"}, {"no": "2.6.4 硫硝酸分解法", "chapter": "前處理—消化方法", "content": "適用元素：砷之檢驗。\n\n操作步驟：\n(1) 檢體均質後，取約5～20 g，精確稱定，置於分解瓶中，加硝酸（超純級）10～40 mL，輕輕搖勻，放置過夜。\n(2) 徐徐加熱至激烈反應停止後冷卻，加硫酸5～20 mL，再徐徐加熱；若激烈發泡，加入正辛醇2～3滴。\n(3) 分解液變暗色時，每次加入硝酸（超純級）2～3 mL至發生白煙且分解液呈淡黃色或無色；若仍不呈淡黃色或無色，加過氯酸1 mL及硝酸（超純級）2～3 mL繼續加熱至分解完全。\n(4) 冷卻後加去離子水30～50 mL及飽和草酸銨溶液10～25 mL，再加熱至白煙出現。\n(5) 放冷後移入200 mL容量瓶中，以6 N鹽酸溶液定容，供作檢液。另取空白分解瓶依同步驟操作，供作空白檢液。"}, {"no": "2.6.5 氧化鎂灰化法", "chapter": "前處理—消化方法", "content": "適用元素：砷之檢驗。\n\n操作步驟：\n(1) 檢體均質後，取約5 g，精確稱定，置於坩堝中，加少量氧化鎂使成鹼性後，再加50%硝酸鎂溶液5 mL均勻潤濕。\n(2) 加熱乾燥後移入灰化爐，以500℃灰化；灰化不完全時，再滴加50%硝酸鎂溶液潤濕，乾燥並灰化，俟灰化完全後放冷。\n(3) 加硫酸1 mL，再加熱至發生白煙，放冷後加6 N鹽酸溶液10 mL，加熱溶解。\n(4) 移入25 mL容量瓶中，以6 N鹽酸溶液每次5 mL洗滌坩堝蓋及坩堝內壁2次，洗液併入容量瓶。\n(5) 加去離子水定容，供作檢液。另取空白坩堝依同步驟操作，供作空白檢液。"}, {"no": "2.6.6 硫-硝酸還流法", "chapter": "前處理—消化方法", "content": "適用元素：汞之檢驗。\n\n操作步驟：\n(1) 檢體均質後，取約5 g，精確稱定，置於改良式索氏抽出器之分解瓶中，加去離子水10 mL及硝酸（低汞級）20 mL，充分混合，放置適當時間後徐徐加入硫酸20 mL，套入分解裝置，移入水浴中徐徐加熱直至分解液呈澄清淡黃色。\n(2) 若分解液不呈澄清淡黃色，放冷後加硝酸（低汞級）5 mL繼續加熱，反覆操作至澄清淡黃色。\n(3) 冷卻後加去離子水50 mL及10%尿素溶液10 mL，加熱沸騰10分鐘，冷卻後加高錳酸鉀1 g振搖混合10分鐘；若紫紅色消失，繼續加高錳酸鉀1 g至紫紅色不消失。\n(4) 冷卻後滴入10%過氧化氫溶液至紫紅色消失，移入200 mL容量瓶中，以1%硫酸溶液洗滌裝置，洗液併入容量瓶，加去離子水定容，供作檢液。另取空白分解瓶依同步驟操作，供作空白檢液。"}, {"no": "2.6.7 微波輔助硫-硝酸還流法", "chapter": "前處理—消化方法", "content": "適用元素：汞之檢驗。\n\n操作步驟：\n(1) 檢體均質後，取約1 g，精確稱定，置於消化瓶中，緩緩加入五氧化釩-硫酸溶液10 mL充分混合，放置2小時，再緩緩加入硝酸（低汞級）10 mL。\n(2) 接上冷凝管放置4小時，移入聚焦式微波消化器中，以微波功率30 W加熱10分鐘，再以微波功率80 W加熱35分鐘，反覆加熱操作至分解液呈澄清淡黃色。\n(3) 靜置1～2小時冷卻，緩緩加入10%尿素溶液20 mL充分混合，待反應完全。\n(4) 移入50 mL容量瓶中，以去離子水洗滌冷凝管及消化瓶，洗液併入容量瓶，加去離子水定容，供作檢液。另取空白消化瓶依同步驟操作，供作空白檢液。"}, {"no": "2.7.1.1 火焰式原子吸收光譜法(FAAS)", "chapter": "含量測定", "content": "適用元素：鉛、鎘、銅、銻、錫及鋅之檢驗。\n\n取檢液、空白檢液及標準溶液，以適當速度分別注入火焰式原子吸收光譜儀中進行分析。\n\n測定條件：\n- 鉛(Pb)：波長283.3 nm，燃燒氣體乙炔，助燃氣體空氣\n- 鎘(Cd)：波長228.8 nm，燃燒氣體乙炔，助燃氣體空氣\n- 銅(Cu)：波長324.7 nm，燃燒氣體乙炔，助燃氣體空氣\n- 銻(Sb)：波長217.6 nm，燃燒氣體乙炔，助燃氣體空氣\n- 錫(Sn)：波長286.3 nm，燃燒氣體乙炔，助燃氣體笑氣(N₂O)\n- 鋅(Zn)：波長213.9 nm，燃燒氣體乙炔，助燃氣體空氣\n\n（上述測定條件不適時，依所使用之儀器設定適合之測定條件。）"}, {"no": "2.7.1.2 石墨爐式原子吸收光譜法(GFAAS)", "chapter": "含量測定", "content": "適用元素：鉛、鎘、銅、銻、砷、錫及鋅之檢驗。\n\n精確量取檢液、空白檢液及標準溶液各20 μL，分別加入基質修飾劑2 μL（銅、銻、砷及錫使用基質修飾劑Ⅲ；鉛及鎘使用基質修飾劑Ⅱ；鋅使用基質修飾劑Ⅰ），注入石墨爐式原子吸收光譜儀中分析。\n\n測定波長：\n- 鉛：283.3 nm｜鎘：228.8 nm｜銅：324.7 nm\n- 銻：217.6 nm｜砷：193.7 nm｜錫：286.3 nm｜鋅：213.9 nm\n\n石墨爐測定條件：\n乾燥：110℃，升溫5 sec，持續30 sec，氬氣250 mL/min\n乾燥：130℃，升溫15 sec，持續30 sec，氬氣250 mL/min\n灰化：450℃，升溫10 sec，持續20 sec，氬氣250 mL/min\n灰化：650℃，升溫10 sec，持續20 sec，氬氣250 mL/min\n原子化：1600℃，持續5 sec，停氣\n清除：2450℃，升溫1 sec，持續3 sec，氬氣250 mL/min"}, {"no": "2.7.1.3 感應耦合電漿放射光譜法(ICP-OES)", "chapter": "含量測定", "content": "適用元素：鉛、鎘、銅、銻、砷、汞、錫及鋅之檢驗。\n\n取檢液、空白檢液及標準溶液，以適當速度分別注入感應耦合電漿放射光譜儀中分析。\n\n儀器條件：\n- 電漿無線電頻功率：1300 W\n- 電漿氬氣流速：15.0 L/min\n- 輔助氬氣流速：0.2 L/min\n- 霧化氬氣流速：0.8 L/min\n\n測定波長(nm)：\n- 鉛：220.353｜鎘：228.802｜銅：327.393\n- 銻：206.836｜砷：193.696｜汞：253.652\n- 錫：189.927｜鋅：206.200"}, {"no": "2.7.1.4 感應耦合電漿質譜法(ICP-MS)", "chapter": "含量測定", "content": "適用元素：鉛、鎘、銅、銻、砷、汞、錫及鋅之檢驗。\n\n取檢液、空白檢液及標準溶液，以適當速度分別注入感應耦合電漿質譜儀中分析。\n\n儀器條件：\n- 電漿無線電頻功率：1300 W\n- 電漿氬氣流速：15.0 L/min\n- 輔助氬氣流速：0.2 L/min\n- 霧化氬氣流速：0.8 L/min\n\n監測質量(m/z)：\n- 鉛(Pb)：208、207、206\n- 鎘(Cd)：114、111\n- 銅(Cu)：63、65\n- 鋅(Zn)：64、66\n- 銻(Sb)：123\n- 砷(As)：75\n- 汞(Hg)：200"}, {"no": "2.7.1.5 氫化式-原子吸收光譜法", "chapter": "含量測定", "content": "適用元素：砷之檢驗。\n\n取空白檢液、檢液及標準溶液各10 mL，加40%碘化鉀溶液1 mL，於暗處靜置30分鐘後，分別注入氫化物發生裝置中反應。\n\n測定條件（氫化物發生裝置流速）：\n遲滯：10 sec，1%硼氫化鈉溶液4.5 mL/min，去離子水9.0 mL/min\n反應：15 sec，1%硼氫化鈉溶液4.5 mL/min，檢液9.0 mL/min\n分析：50 sec，1%硼氫化鈉溶液4.5 mL/min，檢液9.0 mL/min\n清除：60 sec，1%硼氫化鈉溶液4.5 mL/min，去離子水9.0 mL/min"}, {"no": "2.7.1.6 冷蒸氣-原子吸收光譜法", "chapter": "含量測定", "content": "適用元素：汞之檢驗。\n\n將空白檢液、檢液及標準溶液分別注入汞蒸氣發生裝置中反應。\n\n測定條件（汞蒸氣發生裝置流速）：\n遲滯：10 sec，氯化亞錫溶液4.5 mL/min，去離子水9.0 mL/min\n反應：15 sec，氯化亞錫溶液4.5 mL/min，檢液9.0 mL/min\n分析：50 sec，氯化亞錫溶液4.5 mL/min，檢液9.0 mL/min\n清除：60 sec，氯化亞錫溶液4.5 mL/min，去離子水9.0 mL/min"}, {"no": "2.7.1.7 冷蒸氣-汞原子螢光光譜法", "chapter": "含量測定", "content": "適用元素：汞之檢驗。\n\n將空白檢液、檢液及標準溶液分別注入汞原子螢光光譜儀中。\n\n測定條件（汞原子螢光光譜儀流速）：\n遲滯：10 sec，氯化亞錫溶液4.5 mL/min，去離子水9.0 mL/min\n反應：15 sec，氯化亞錫溶液4.5 mL/min，檢液9.0 mL/min\n分析：50 sec，氯化亞錫溶液4.5 mL/min，檢液9.0 mL/min\n清除：60 sec，氯化亞錫溶液4.5 mL/min，去離子水9.0 mL/min"}, {"no": "2.7.1.8 直接進樣汞分析法", "chapter": "含量測定", "content": "適用元素：汞之檢驗。\n\n標準曲線製作：\n精確量取標準溶液各100 μL，置於樣品船中，注入直接進樣汞分析儀中分析，就汞之吸光度與對應之汞重量(ng)，製作標準曲線。\n\n含量測定：\n檢體均質後，取約200 mg，精確稱定，置於樣品船中，注入直接進樣汞分析儀中分析。\n\n計算式：\n檢體中汞之含量(ppm) = C ÷ M\nC：由標準曲線求得檢體中汞之重量(ng)\nM：取樣分析檢體之重量(mg)\n\n直接進樣汞分析儀測定條件：\n樣品裂解腔—乾燥：200℃，升溫120 sec，持續120 sec，氧氣160 mL/min\n樣品裂解腔—裂解：650℃，升溫120 sec，持續180 sec，氧氣160 mL/min\n汞齊管—吸附：持續60 sec，氧氣160 mL/min\n汞齊管—脫吸附：850℃，持續12 sec，氧氣160 mL/min"}, {"no": "2.7.2 含量計算", "chapter": "含量測定", "content": "依2.7.1節測定後，以下列計算式求出檢體中各重金屬之含量(ppm)：\n\n檢體中各重金屬之含量(ppm) = (C - C₀) × V ÷ M\n\n- C：由標準曲線求得檢液中各重金屬之濃度(μg/mL)\n- C₀：由標準曲線求得空白檢液中各重金屬之濃度(μg/mL)\n- V：檢體最後定容之體積(mL)\n- M：取樣分析檢體之重量(g)\n\n附註：\n1. 依本檢驗方法總則分析其他元素時，應經方法確效並採相關品質管制規範。\n2. 依本總則研擬並經確效之檢驗方法，應敘明適用之檢體類別、分析之元素種類及定量極限；衛生福利部業已公告之檢驗方法，定量極限應符合公告檢驗方法。\n3. 檢體中有影響檢驗結果之物質時，應自行探討。"}]});

  Object.assign(lawArticles, {"食品中殘留農藥檢驗方法-410": [{"no": "1. 適用範圍", "chapter": "檢驗方法總則", "content": "本檢驗方法適用於蔬果類、穀類、乾豆類、茶類、香辛植物及其他草本植物等食品中阿巴汀(abamectin)等410項農藥多重殘留分析。\n\n公告文號：111年8月17日衛授食字第1111901537號公告修正，自112年1月1日生效。\n方法代碼：MOHWP0055.05"}, {"no": "2. 檢驗方法概述", "chapter": "檢驗方法總則", "content": "檢體採用QuEChERS方法（Quick, Easy, Cheap, Effective, Rugged, Safe）前處理後，以LC-MS/MS及GC-MS/MS分析。\n\nLC-MS/MS裝置：\n・離子源：電灑離子化(ESI)\n・層析管：CORTECS UPLC C18，1.6 µm，2.1 mm × 10 cm\n・保護管：CORTECS UPLC C18，1.6 µm，2.1 mm × 5 mm\n\nGC-MS/MS裝置：\n・離子源：電子游離(EI)\n・層析管：DB-5MS UI毛細管，0.25 µm，0.25 mm × 30 m\n\n其他裝置：攪拌均質器、粉碎機、高速分散裝置（1000 rpm以上）、離心機（可達3000×g，控溫15℃以下）、氮氣濃縮裝置"}, {"no": "2.2. 試藥", "chapter": "試藥與材料", "content": "冰醋酸、甲酸、醋酸銨（試藥特級）；正己烷、丙酮（殘留量級）；乙腈、甲醇（液相層析級）；無水醋酸鈉、無水硫酸鎂、PSA、C18 EC、GCB（分析級）；去離子水（比電阻≥18 MΩ·cm，25℃）；農藥對照標準品410項；磷酸三苯酯(TPP)內部標準品。"}, {"no": "2.3. 器具及材料", "chapter": "試藥與材料", "content": "・離心管：15 mL及50 mL，PP材質\n・濾膜：孔徑0.22 µm，PTFE材質\n・容量瓶：25 mL及50 mL，褐色\n・陶瓷均質石：Bond Elut QuEChERS P/N 5982-9313或同級品\n・萃取用粉劑：無水硫酸鎂4 g＋無水醋酸鈉1 g\n・淨化用離心管 I（PSA 300 mg＋MgSO₄ 900 mg，6 mL）：適用I類（新鮮蔬果、香辛植物等水分含量高之檢體）\n・淨化用離心管 II（PSA 300 mg＋C18EC 300 mg＋MgSO₄ 900 mg，6 mL）：適用II類（穀類、乾豆類等蠟/油脂/醣類含量高之檢體）\n・淨化用離心管 III（PSA 450 mg＋MgSO₄ 900 mg＋C18EC 300 mg＋GCB 50 mg，6 mL）：適用III類（乾燥茶類等色素含量高之檢體）"}, {"no": "2.4. 試劑調製", "chapter": "試藥與材料", "content": "含1%醋酸之乙腈溶液：冰醋酸10 mL＋乙腈990 mL混勻。\n\n含5%甲酸之乙腈溶液：甲酸5 mL＋乙腈95 mL混勻（供四氯異苯腈確認用）。\n\n丙酮：正己烷(1:1, v/v)溶液：丙酮與正己烷等體積混勻。"}, {"no": "2.5. 移動相溶液調製", "chapter": "試藥與材料", "content": "移動相A（水相）：醋酸銨0.39 g溶於去離子水1000 mL，加甲酸1 mL，混勻後以0.22 µm濾膜過濾。\n\n移動相B（有機相）：醋酸銨0.39 g以甲醇溶解至1000 mL，以0.22 µm濾膜過濾。"}, {"no": "2.6. 內部標準溶液配製", "chapter": "試藥與材料", "content": "取磷酸三苯酯(TPP)約50 mg精確稱定，以甲醇溶解定容至50 mL，作為內部標準原液（-18℃避光貯存）。\n\n使用前稀釋：\n・50 µg/mL（以甲醇稀釋）：供2.8節檢液調製添加用\n・5 µg/mL甲醇液：供LC-MS/MS分析用\n・5 µg/mL丙酮液：供GC-MS/MS分析用"}, {"no": "2.7. 標準溶液配製", "chapter": "試藥與材料", "content": "LC-MS/MS用：各農藥標準品約25 mg精確稱定，以乙腈溶解定容至25 mL（標準原液，-18℃避光貯存）。臨用前以甲醇稀釋至1 µg/mL。\n\nGC-MS/MS用：各農藥標準品約25 mg精確稱定，以丙酮或正己烷溶解定容至25 mL（標準原液，-18℃避光貯存）。臨用前以丙酮：正己烷(1:1)稀釋至1 µg/mL。"}, {"no": "2.8. 檢液之調製", "chapter": "前處理程序", "content": "I類（新鮮蔬果、香辛植物等水分含量高之檢體）：\n取均質檢體約10 g置50 mL離心管，冷凍後加含1%醋酸之乙腈10 mL及50 µg/mL內標溶液10 µL，加陶瓷均質石及萃取粉劑，激烈振盪防止鹽類結塊，1000 rpm高速分散1 min，15℃、3000×g離心1 min。取上清液6 mL置淨化管I，振盪1 min、離心2 min。分取上清液1 mL吹乾，以甲醇1 mL溶解過濾得檢液I（LC-MS/MS）；另取1 mL吹乾，以丙酮：正己烷(1:1)1 mL溶解過濾得檢液II（GC-MS/MS）。\n\nII類（穀類、乾豆類等蠟/油脂/醣類含量高之檢體）：\n取磨粉後檢體約5 g，加冷藏預冷去離子水10 mL靜置20 min，其後前處理同I類，使用淨化管II。\n\nIII類（乾燥茶類等色素含量高之檢體）：\n取磨粉後檢體約2 g，加冷藏預冷去離子水10 mL靜置20 min，其後前處理同I類，使用淨化管III。\n\n注意：本方法不適用於III類中免扶克、nitenpyram及派滅淨之檢驗。"}, {"no": "2.9.1. LC-MS/MS 分析條件", "chapter": "儀器分析條件", "content": "LC-MS/MS正離子及負離子模式；基質匹配檢量線範圍0.002～0.2 µg/mL（芬普尼及其代謝物：0.0004～0.04 µg/mL）。\n\n層析管：CORTECS UPLC C18，1.6 µm，2.1 mm × 10 cm\n移動相梯度（A：甲酸銨水溶液；B：甲酸銨甲醇溶液）：\n  0.0→2.0 min：A 99%→50%\n  2.0→8.0 min：A 50%→30%\n  8.0→10.0 min：A 30%→1%\n  10.0→13.0 min：A 1%（等度）\n  13.0→13.5 min：A 1%→99%\n  13.5→15.0 min：A 99%（平衡）\n流速：0.3 mL/min；注入量：5 µL\n\n離子源條件：\n・ESI＋：毛細管電壓 3.5 kV；ESI－：1.6 kV\n・離子源溫度：150℃；溶媒揮散溫度：450℃\n・Cone gas：30 L/hr；Desolvation flow：900 L/hr\n・偵測模式：MRM（多重反應偵測）"}, {"no": "2.9.2. GC-MS/MS 分析條件", "chapter": "儀器分析條件", "content": "GC-MS/MS電子游離模式；基質匹配檢量線範圍0.004～0.2 µg/mL。\n\n層析管：DB-5MS UI，0.25 µm，0.25 mm × 30 m\n程溫：60℃(1 min) → 40℃/min → 170℃ → 10℃/min → 310℃(2.25 min)\n載流氣體：氦氣，1 mL/min\n注入器溫度：280℃；注入模式：不分流(splitless)；注入量：1 µL\n離子化：EI，70 eV；離子源溫度：300℃\n偵測模式：MRM"}, {"no": "2.10. 計算式", "chapter": "含量計算", "content": "檢體中各農藥含量(ppm) = C × V / M\n\nC：由基質匹配檢量線或標準品添加法求得檢液中各農藥濃度（µg/mL）\nV：萃取用含1%醋酸之乙腈體積（10 mL）\nM：取樣分析檢體重量（g）\n\n相對離子強度容許範圍（定性/定量離子對波峰面積比）：\n  >50%：±20%\n  >20～50%：±25%\n  >10～20%：±30%\n  ≤10%：±50%\n\n可採基質匹配檢量線法或標準品添加法（y = mx + n，Cx = n/m）擇一分析。"}, {"no": "附表說明", "chapter": "附表", "content": "本方法含三份農藥MRM參數及定量極限附表，各類定量極限：I類（新鮮蔬果）/ II類（穀豆類）/ III類（乾燥茶類等）。\n\n附表一：LC-MS/MS正離子模式——阿巴汀等216項農藥\n含前驅離子/產物離子對、進樣錐電壓(V)、碰撞能量(eV)及I/II/III類定量極限\n\n附表二：LC-MS/MS負離子模式——亞醌蟎代謝物等11項農藥\n特別注意：芬普尼(Fipronil)及其代謝物定量極限僅0.001 ppm（I/II類）\n\n附表三：GC-MS/MS——Acetochlor等183項農藥\n含前驅離子/產物離子對、碰撞能量(eV)及I/II/III類定量極限"}, {"no": "附註", "chapter": "附表", "content": "1. 定量極限詳見附表一、二、三。\n2. 各品項可依需求評估以GC-MS/MS或LC-MS/MS分析。\n3. 磷酸三苯酯(TPP)內部標準品無法代表所有農藥物化特性，於計算各農藥濃度時不一定納入計算式，建議用於確認流程及品質管制參考。\n4. GC-MS/MS分析中，當四氯異苯腈(Chlorothalonil)檢出感度受影響時，應加入含5%甲酸之乙腈溶液10 µL確認檢出濃度之正確性。\n5. 本方法不適用於III類中免扶克(Benfuracarb)、nitenpyram及派滅淨(Pymetrozine)之檢驗。\n6. 滅汀、除蟲菊精、賜諾特及賜諾殺含多項化合物，各化合物檢量線最低濃度應以定量極限乘以各化合物於標準品中之比例推算。\n7. 克氯苯與克氯蟎滯留時間相同，如遇訊號應以Select-PAH column（0.15 µm，0.25 mm × 30 m）分離後定量。\n\n參考文獻：NF EN 15662: 2018（CEN QuEChERS多農藥殘留分析方法）"}]});

  Object.assign(lawArticles, {"食品微生物之檢驗方法－食品中單核球增多性李斯特菌之檢驗": [{"no": "公告資訊", "chapter": "基本資料", "content": "公告字號：111年8月18日衛授食字第1111901489號\n生效日期：112年1月1日\n方法代號：MOHWM0029.00\n方法名稱：食品微生物之檢驗方法－食品中單核球增多性李斯特菌之檢驗\n（Methods of Test for Food Microorganisms - Test of Listeria monocytogenes in Foods）\n\n本方法分兩部：\n第一部：單核球增多性李斯特菌之分離與鑑別\n第二部：單核球增多性李斯特菌之real-time PCR檢測（可視需要執行）\n\n備註：孕婦與潛在的免疫功能不正常的個體禁止接近單核球增多性李斯特菌的檢驗工作區域。"}, {"no": "第一部 § 1", "chapter": "第一部：分離與鑑別", "content": "【適用範圍】\n本方法適用於食品中單核球增多性李斯特菌之檢驗。"}, {"no": "第一部 § 2.1", "chapter": "第一部：分離與鑑別", "content": "【工作環境】\n工作平台須寬敞、潔淨、光線良好，操作平台光度為100呎燭光以上，密閉室內換氣良好，儘可能沒有灰塵及流動空氣。每15分鐘落菌數不得超過15 CFU/培養皿。"}, {"no": "第一部 § 2.2.1–2.2.18", "chapter": "第一部：分離與鑑別", "content": "【器具及材料—設備】\n2.2.1. 生物安全操作櫃(BSC)：第二等級(class II)以上。\n2.2.2. 乾熱滅菌器：能維持170 ± 10℃。\n2.2.3. 高壓滅菌釜：可達121℃以上。\n2.2.4. 冰箱：能維持5 ± 3℃。\n2.2.5. 冷凍櫃：能維持-20 ± 3℃。\n2.2.6. 超低溫冷凍櫃：能維持-70 ± 5℃。\n2.2.7. 水浴：能維持水溫溫差± 1℃以內。\n2.2.8. 培養箱：能維持內部溫差在± 1℃以內。\n2.2.9. 攪拌均質器或鐵胃：能適用於無菌操作者。\n2.2.10. 天平：可稱量至2000 g，靈敏度0.1 g；可稱量至100 g，靈敏度1 mg。\n2.2.11. 顯微鏡：能放大至1000倍之一般光學顯微鏡。\n2.2.12. 酸鹼度測定儀。\n2.2.13. 旋渦混合器。\n2.2.14. 離心機。\n2.2.15. 加熱器。\n2.2.16. 攪拌器。\n2.2.17. 振盪器。\n2.2.18. 光源：一般日光燈。"}, {"no": "第一部 § 2.2.19–2.2.37", "chapter": "第一部：分離與鑑別", "content": "【器具及材料—消耗品】\n2.2.19. 培養皿：已滅菌，內徑約90 mm，深度約15 mm。\n2.2.20. 容器：附螺旋蓋之玻璃、聚乙烯、鐵氟龍或耐121℃濕熱滅菌20分鐘以上之三角錐瓶、玻璃瓶、廣口瓶或無菌袋。\n2.2.21. 試管：13 × 100 mm、16 × 150 mm。\n2.2.22. 接種針及接種環（直徑約3 mm）：鎳鉻合金、鉑銥或鉻線，或可拋棄式。\n2.2.23. 塗抹曲棒：直徑3～4 mm，塗抹區域45～55 mm。\n2.2.24. 無菌濾膜：孔徑0.45 µm以下之親水性濾膜。\n2.2.25. 酸鹼度測定試紙：pH 6～8。\n2.2.26. 藥勺、剪刀、小刀、鑷子、研缽及杵：可滅菌或可拋棄式。\n2.2.27. 載玻片及蓋玻片。\n2.2.28. 無菌棉花棒。\n2.2.29. 吸管輔助器或微量吸管。\n2.2.30. 吸管：已滅菌，1 mL（0.01 mL刻度）；5 mL及10 mL（0.1 mL刻度）。\n2.2.31. 微量吸管：10 µL、20 µL、200 µL及1000 µL。\n2.2.32. 吸管尖：已滅菌，10 µL、20 µL、200 µL及1000 µL。\n2.2.33. 馬克法蘭氏濁度標準組(McFarland nephelometer standard units)。\n2.2.34. 濾紙。\n2.2.35. 蠟筆或麥克筆。\n2.2.36. 無菌冷凍試管。\n2.2.37. 褐色試藥瓶。"}, {"no": "第一部 § 2.2.38", "chapter": "第一部：分離與鑑別", "content": "【試驗菌株】\n- Staphylococcus pseudintermedius (ATCC 49444; BCRC 14980)
